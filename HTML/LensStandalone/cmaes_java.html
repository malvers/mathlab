<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Linsenoptimierung | Evolution Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=43">
</head>

<body>
    <div id="app-container">
        <!-- Main Canvas Area -->
        <main id="viewport">
            <div id="lens-stage" class="lens-stage">
                <canvas id="lensCanvas"></canvas>
            </div>

            <!-- Running Indicator (top-left) -->
            <div id="running-indicator" class="hidden">
                <span class="running-dot"></span>
                <span class="running-text">RUNNING</span>
            </div>

            <!-- Branding Header (top-right) -->
            <div class="canvas-branding">
                <h1>DOC ALVERS MATHE-LABOR</h1>
                <div class="canvas-subtitle">Optimierung einer Linse · CMA-ES</div>
            </div>

            <!-- Bottom HUD: Telemetrie + Steuerung, gemeinsam skaliert -->
            <div id="lens-ui-dock">
                <div class="lens-ui-dock-inner" id="lens-ui-dock-inner">
                    <aside id="telemetry">
                <div class="glass-card">
                    <h3>EVOLUTION DATA</h3>
                    <div class="data-grid">
                        <div class="data-item">
                            <label>GENERATION</label>
                            <span id="val-gen" class="neon-text">0</span>
                        </div>
                        <div class="data-item">
                            <label>FITNESS</label>
                            <span id="val-fit" class="neon-text">0.000000</span>
                        </div>
                        <div class="data-item">
                            <label>PENALTY</label>
                            <span id="val-penalty" class="neon-text">0.000</span>
                        </div>
                        <div class="data-item">
                            <label>CALLS</label>
                            <span id="val-calls" class="neon-text">0</span>
                        </div>
                    </div>
                </div>

                <div class="glass-card">
                    <h3>SYSTEM CONFIG</h3>
                    <div class="config-list">
                        <div class="config-item">
                            <label>REFRACTION (n)</label>
                            <span id="val-n">1.60</span>
                        </div>
                        <div class="config-item">
                            <label>DIMENSION</label>
                            <span id="val-dim">13</span>
                        </div>
                        <div class="config-item">
                            <label>SIGMA</label>
                            <span id="val-sigma">0.1</span>
                        </div>
                    </div>
                </div>

                <div class="glass-card">
                    <h3>CONTROL FLAGS</h3>
                    <div class="config-list check-grid">
                        <label class="check-item">
                            <input type="checkbox" id="check-front">
                            <span>OPTIMIZE FRONT</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" id="check-back" checked>
                            <span>OPTIMIZE BACK</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" id="check-symmetry" checked>
                            <span>SYMMETRY MODE</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" id="check-points" checked>
                            <span>SHOW POINTS</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" id="check-oscillate">
                            <span>FOCUS OSCILLATE</span>
                        </label>
                    </div>
                </div>

                </aside>

                    <footer id="control-bar">
                <button type="button" id="btn-dock-toggle" class="action-btn btn-dock-fold"
                    aria-expanded="true" aria-controls="lens-ui-dock-inner"
                    title="Bedienfeld ausblenden" aria-label="Bedienfeld ausblenden">
                    <svg class="dock-chevron" viewBox="0 0 24 24" width="38" height="38" aria-hidden="true">
                        <path fill="currentColor" d="M7 10l5 5 5-5H7z" />
                    </svg>
                </button>
                <div id="control-bar-main" class="control-bar-main">
                <div class="btn-group">
                    <button id="btn-play" class="action-btn primary">
                        <svg class="btn-play-icon" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" aria-hidden="true">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                        <span id="btn-play-label">START</span>
                    </button>
                    <button id="btn-reset" class="action-btn">RESET</button>
                    <button id="btn-reset-view" type="button" class="action-btn"
                        aria-label="Ansicht zurücksetzen"><span class="btn-rv-full">RESET VIEW</span><span
                            class="btn-rv-compact">RV</span></button>
                </div>
                <div class="slider-row" aria-label="Parameter">
                    <div class="slider-group">
                        <label>REFRACTION</label>
                        <input type="range" id="slider-n" min="1.05" max="2.0" step="0.01" value="1.60">
                    </div>
                    <div class="slider-group">
                        <label>SIGMA</label>
                        <input type="range" id="slider-sigma" min="0.01" max="0.5" step="0.01" value="0.1">
                    </div>
                    </div>
                </div>
                </footer>
                </div>
            </div>
        </main>
    </div>

    <!-- Logic Layer -->
    <script src="../js/ui.js?v=4"></script>
    <script>
        CyberUI.init();
    </script>
    <script src="cmaes_java.js?v=31"></script>
</body>

</html>
