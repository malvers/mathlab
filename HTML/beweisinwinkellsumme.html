<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>docalvers | Winkelsumme Beweis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="resources/favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <link rel="stylesheet" href="js/cyber-lab-overrides.css">
    <link rel="stylesheet" href="js/branding.styles.extracted.css">
    <style>
        /* Responsive: Safe Area auf Hauptfläche, Sidebar, umbrechende Gleichungen; Canvas wie Layout */
        body.page-beweisinwinkel #main-content {
            min-height: 0;
            box-sizing: border-box;
            padding-top: env(safe-area-inset-top, 0px);
            padding-right: env(safe-area-inset-right, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
        }

        body.page-beweisinwinkel #sidebar-header {
            min-height: clamp(52px, 14vmin, 80px);
        }

        body.page-beweisinwinkel #side-panel #parameters-container .instrument-card {
            margin-bottom: clamp(4px, 1.2vw, 8px);
            font-size: clamp(0.828rem, 2.34vmin + 0.18rem, 0.9rem);
        }

        body.page-beweisinwinkel .beweis-panel-hint {
            font-size: clamp(0.666rem, 2.16vmin, 0.792rem);
            color: rgba(255, 255, 255, 0.42);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        body.page-beweisinwinkel .beweis-panel-section {
            font-size: clamp(0.666rem, 2.16vmin, 0.792rem);
            color: var(--neon-blue);
            opacity: 0.78;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        body.page-beweisinwinkel .beweis-panel-section + .proof-row,
        body.page-beweisinwinkel .beweis-panel-hint + .radio-group {
            margin-top: 0;
        }

        body.page-beweisinwinkel .beweis-panel-section.is-spaced {
            margin-top: 10px;
        }

        canvas {
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        /* Radio Styling */
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(8px, 2.5vmin, 15px);
            margin-top: 5px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.738rem, 2.43vmin, 0.855rem);
            color: rgba(255, 255, 255, 0.6);
            transition: 0.3s;
        }

        .radio-item:hover {
            color: var(--neon-blue);
        }

        .radio-item input[type="radio"] {
            accent-color: var(--neon-blue);
            cursor: pointer;
            width: clamp(14px, 4vmin, 18px);
            height: clamp(14px, 4vmin, 18px);
        }

        .radio-item.active {
            color: white;
        }

        .proof-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: clamp(6px, 1.8vmin, 10px);
            row-gap: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.792rem, 2.88vmin + 0.378rem, 1.098rem);
            font-weight: bold;
            color: white;
            margin: clamp(5px, 1.5vmin, 8px) 0;
            line-height: 1.35;
        }

        .val-box {
            padding: clamp(4px, 1.2vmin, 7px) clamp(6px, 2vmin, 10px);
            border-radius: clamp(8px, 2vmin, 10px);
            min-width: min(52px, 14vmin);
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            font-size: clamp(0.792rem, 2.88vmin + 0.378rem, 1.098rem);
            letter-spacing: 1px;
        }

        .box-a {
            background: #ffb100;
            color: #000;
        }

        .box-b {
            background: #77b521;
            color: #fff;
        }

        .box-c {
            background: #c62128;
            color: #fff;
        }
    </style>
</head>

<body class="page-beweisinwinkel">
    <!-- Mini Rail -->
    <nav id="mini-rail">
        <div class="nav-btn" onclick="toggleSidebar()" title="Menü umschalten">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
    </nav>

    <aside id="side-panel">
        <header id="sidebar-header"></header>
        <div id="parameters-container"></div>
    </aside>

    <main id="main-content">
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </main>

        <script src="js/cyber-left-chrome.js"></script>
<script src="js/branding/briefings.js?v=539"></script>
    <script src="js/branding/overlays.js?v=539"></script>
    <script src="js/i18n.js"></script>
    <script src="js/branding.js?v=539"></script>
    <script src="js/ui.js?v=539"></script>
    <script>
        function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
            if (window.CyberLeftChrome && typeof CyberLeftChrome.publishResolvedScale === 'function') {
                CyberLeftChrome.publishResolvedScale();
            }

            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
                if (typeof draw === 'function') draw();
            }, 400);
        }
        /**
         * WINKELSUMMEN-BEWEIS LABORATORY - ULTRA v5.3.8
         * Geometric Proof Engine with Interactive Parallel Projection.
         */
        CyberBranding.init({
            useExternalStyles: true,
            title: CyberI18n.get('ui.coach_title'),
            subtitle: CyberI18n.get('sum.title')
        });

        // --- CyberUI Initialization ---
        CyberUI.init();

        if (window.CyberLeftChrome && typeof CyberLeftChrome.configure === 'function') {
            CyberLeftChrome.configure({ viewportOnlyZoom: true });
        }
        CyberUI.createCard('parameters-container', CyberI18n.get('sum.coords'), `
            <div class="beweis-panel-hint">${CyberI18n.get('sum.parallel_point')}</div>
            <div class="radio-group">
                <label class="radio-item"><input type="radio" name="pivot" value="0"> A</label>
                <label class="radio-item"><input type="radio" name="pivot" value="1"> B</label>
                <label class="radio-item active"><input type="radio" name="pivot" value="2" checked> C</label>
            </div>
        `);

        CyberUI.createCard('parameters-container', CyberI18n.get('sum.proof'), `
            <div class="beweis-panel-section">${CyberI18n.get('sum.pivot_point')}</div>
            <div class="proof-row">
                <span class="val-box box-a" id="val-l">0°</span> + 
                <span class="val-box box-c" id="val-g1">0°</span> + 
                <span class="val-box box-b" id="val-p">0°</span> = 180°
            </div>
            
            <div class="beweis-panel-section is-spaced">${CyberI18n.get('sum.internal_angles')}</div>
            <div class="proof-row">
                <span class="val-box box-a" id="val-a">0°</span> + 
                <span class="val-box box-c" id="val-g2">0°</span> + 
                <span class="val-box box-b" id="val-b">0°</span> = 180°
            </div>
        `);

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let points = [];
        let dragIdx = -1;
        let selectedPivotIdx = 2; // Default: C
        let layoutW = 0;
        let layoutH = 0;

        function resetTrianglePositions(w, h) {
            points = [
                { x: w * 0.25, y: h * 0.7 }, // A
                { x: w * 0.75, y: h * 0.7 }, // B
                { x: w * 0.5,  y: h * 0.3 }  // C
            ];
            layoutW = w;
            layoutH = h;
        }

        function initTriangle() {
            const el = canvas.parentElement;
            const w = el.clientWidth;
            const h = el.clientHeight;
            if (w <= 0 || h <= 0) return;
            resetTrianglePositions(w, h);
            draw();
        }

        function onCanvasContainerResize() {
            const el = canvas.parentElement;
            const w = el.clientWidth;
            const h = el.clientHeight;
            if (w <= 0 || h <= 0) return;

            if (layoutW <= 0 || layoutH <= 0 || points.length !== 3) {
                resetTrianglePositions(w, h);
                draw();
                return;
            }

            if (w === layoutW && h === layoutH) {
                draw();
                return;
            }

            const sx = w / layoutW;
            const sy = h / layoutH;
            layoutW = w;
            layoutH = h;
            points.forEach((p) => {
                p.x *= sx;
                p.y *= sy;
            });
            draw();
        }

        function getAngleDeg(v1, v2) {
            let mag1 = Math.hypot(v1.x, v1.y);
            let mag2 = Math.hypot(v2.x, v2.y);
            let dot = v1.x * v2.x + v1.y * v2.y;
            let angle = Math.acos(Math.max(-1, Math.min(1, dot / (mag1 * mag2))));
            return angle * 180 / Math.PI;
        }

        function drawAngle(p, v1, v2, r, color, text, labelFontPx) {
            let a1 = Math.atan2(v1.y, v1.x);
            let a2 = Math.atan2(v2.y, v2.x);
            let diff = a2 - a1;
            while(diff < 0) diff += 2 * Math.PI;
            let ccw = diff > Math.PI;

            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.arc(p.x, p.y, r, a1, a2, ccw);
            ctx.fillStyle = color + "77"; // Weniger transparenter Bogen
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();

            let bisect = a1 + diff/2;
            if(ccw) bisect += Math.PI;
            let lx = p.x + (r * 0.7) * Math.cos(bisect);
            let ly = p.y + (r * 0.7) * Math.sin(bisect) + 5;

            ctx.fillStyle = "white";
            ctx.font = `bold ${labelFontPx}px 'Orbitron'`;
            ctx.textAlign = "center";
            ctx.fillText(text, lx, ly);
        }

        function draw() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, rect.width, rect.height);

            const m = Math.min(rect.width, rect.height);
            const bogenR = Math.round(1.65 * Math.max(26, Math.min(65, m * 0.09)));
            const arcLabelPx = Math.round(Math.max(11, Math.min(15, rect.width * 0.0279)));
            const vertLabelPx = Math.round(Math.max(12, Math.min(17, rect.width * 0.0324)));

            const A = points[0], B = points[1], C = points[2];
            
            // Calculate all internal angles
            const angles = [];
            for (let i = 0; i < 3; i++) {
                const P = points[i];
                const P1 = points[(i + 1) % 3];
                const P2 = points[(i + 2) % 3];
                const v1 = { x: P1.x - P.x, y: P1.y - P.y };
                const v2 = { x: P2.x - P.x, y: P2.y - P.y };
                angles[i] = Math.round(getAngleDeg(v1, v2));
            }

            // Correction for 180 (Rounding errors)
            let sum = angles[0] + angles[1] + angles[2];
            if (sum !== 180) angles[selectedPivotIdx] += (180 - sum);

            // UI Update
            document.getElementById('val-a').innerText = angles[0] + "°";
            document.getElementById('val-b').innerText = angles[1] + "°";
            document.getElementById('val-g2').innerText = angles[2] + "°";
            
            // At Pivot (Always same three angles!)
            document.getElementById('val-l').innerText = angles[(selectedPivotIdx + 1) % 3] + "°";
            document.getElementById('val-p').innerText = angles[(selectedPivotIdx + 2) % 3] + "°";
            document.getElementById('val-g1').innerText = angles[selectedPivotIdx] + "°";

            // --- Geometrie ---
            const P = points[selectedPivotIdx];
            const P1 = points[(selectedPivotIdx + 1) % 3];
            const P2 = points[(selectedPivotIdx + 2) % 3];
            
            // Opposite Side Vector (e.g. AB if P is C)
            const vOpp = { x: P2.x - P1.x, y: P2.y - P1.y };
            const lenOpp = Math.hypot(vOpp.x, vOpp.y);
            const nx = vOpp.x / lenOpp, ny = vOpp.y / lenOpp;
            
            const lineLen = 1000000; // ULTIMATE Nirvana - 1 Million Pixels extension
            ctx.strokeStyle = "rgba(0, 210, 255, 0.95)"; // High-Visibility Neon-Blue
            ctx.lineWidth = 2.0; 
            ctx.setLineDash([]); 
            ctx.shadowBlur = 15; ctx.shadowColor = "rgba(0, 210, 255, 0.6)";

            // 1. Draw Parallel lines (Cyan)
            // Parallel through Pivot P
            ctx.beginPath(); 
            ctx.moveTo(P.x - nx * lineLen, P.y - ny * lineLen); 
            ctx.lineTo(P.x + nx * lineLen, P.y + ny * lineLen); 
            ctx.stroke();

            // Parallel through opposite side (Base line extended to infinity)
            ctx.beginPath(); 
            ctx.moveTo(P1.x - nx * lineLen, P1.y - ny * lineLen); 
            ctx.lineTo(P1.x + nx * lineLen, P1.y + ny * lineLen); 
            ctx.stroke();
            
            ctx.shadowBlur = 0;

            // Draw Internal Angles
            const colors = ["#ffb100", "#77b521", "#c62128"]; // Alpha, Beta, Gamma colors
            for (let i = 0; i < 3; i++) {
                const vert = points[i];
                const pNext = points[(i + 1) % 3];
                const pPrev = points[(i + 2) % 3];
                drawAngle(vert, { x: pNext.x - vert.x, y: pNext.y - vert.y }, { x: pPrev.x - vert.x, y: pPrev.y - vert.y }, bogenR, colors[i], angles[i] + "°", arcLabelPx);
            }
            
            // --- DRAW ALTERNATE ANGLES AT PIVOT ---
            // Vector to P1
            const vToP1 = { x: P1.x - P.x, y: P1.y - P.y };
            const vToP2 = { x: P2.x - P.x, y: P2.y - P.y };
            // Vectors on Parallel line (opposite to side vectors)
            const vPar1 = { x: -nx, y: -ny };
            const vPar2 = { x: nx, y: ny };
            
            // Angle 1: between vPar1 and vToP1
            drawAngle(P, vPar1, vToP1, bogenR, colors[(selectedPivotIdx + 1) % 3], angles[(selectedPivotIdx + 1) % 3] + "°", arcLabelPx);
            // Angle 2: between vPar2 and vToP2
            drawAngle(P, vPar2, vToP2, bogenR, colors[(selectedPivotIdx + 2) % 3], angles[(selectedPivotIdx + 2) % 3] + "°", arcLabelPx);

            // Dreieck (Vordergrund)
            ctx.strokeStyle = "white"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.lineTo(C.x, C.y); ctx.closePath(); ctx.stroke();

            // Points & Labels
            points.forEach((p, i) => {
                const isDragging = (dragIdx === i);
                const label = String.fromCharCode(65 + i); // A, B, C
                
                // Outer Glow / Selection feedback
                ctx.fillStyle = isDragging ? "white" : "#00d2ff";
                ctx.shadowBlur = isDragging ? 25 : 15;
                ctx.shadowColor = "#00d2ff";
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, isDragging ? 10 : 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Label
                ctx.fillStyle = "var(--neon-blue)";
                ctx.font = `bold ${vertLabelPx}px Orbitron`;
                ctx.textAlign = "center";
                
                // Position label outside the triangle
                let offX = 0, offY = 0;
                if (i === 0) { offX = -20; offY = 20; } // A
                if (i === 1) { offX = 20; offY = 20; }  // B
                if (i === 2) { offX = 0; offY = -25; } // C
                
                ctx.fillText(label, p.x + offX, p.y + offY);
            });
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - rect.left, y: cy - rect.top };
        }

        function start(e) {
            const pos = getPos(e);
            const rect = canvas.getBoundingClientRect();
            const hitR = Math.max(28, Math.min(46, rect.width * 0.058));
            dragIdx = points.findIndex((p) => Math.hypot(p.x - pos.x, p.y - pos.y) < hitR);
            if(dragIdx !== -1) e.preventDefault();
        }

        function move(e) {
            if(dragIdx === -1) return;
            const pos = getPos(e);
            points[dragIdx] = pos;
            draw();
            e.preventDefault();
        }

        canvas.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', () => dragIdx = -1);
        canvas.addEventListener('touchstart', start, {passive: false});
        window.addEventListener('touchmove', move, {passive: false});
        window.addEventListener('touchend', () => dragIdx = -1);
        window.addEventListener('resize', onCanvasContainerResize);
        if (typeof ResizeObserver !== 'undefined') {
            new ResizeObserver(() => onCanvasContainerResize()).observe(canvas.parentElement);
        }

        function bootProofLabCanvas() {
            const kick = () => initTriangle();
            if (document.fonts && document.fonts.ready) {
                document.fonts.ready
                    .then(() => {
                        if (typeof document.fonts.load === 'function') {
                            return Promise.all([
                                document.fonts.load("700 14px Orbitron"),
                                document.fonts.load("700 13px Orbitron")
                            ]);
                        }
                    })
                    .then(() => requestAnimationFrame(kick))
                    .catch(kick);
            } else {
                requestAnimationFrame(kick);
            }
        }

        bootProofLabCanvas();

        // Event Listeners for Radio Menu
        document.querySelectorAll('input[name="pivot"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                selectedPivotIdx = parseInt(e.target.value);
                // Update active class
                document.querySelectorAll('.radio-item').forEach(lbl => lbl.classList.remove('active'));
                e.target.parentElement.classList.add('active');
                draw();
            });
        });
    </script>
</body>
</html>
