<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | <script>document.write(CyberI18n.get('arithmetic.div.title'))</script></title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="resources/favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <link rel="stylesheet" href="js/cyber-lab-overrides.css">
    <link rel="stylesheet" href="js/branding.styles.extracted.css">
    <style>
        /* Wie addition / subtraktion: Shell-Füllung, Coach rechts, Canvas 100% */
        :root {
            --side-width: 350px;
            --branding-blue: #00d2ff;
            --neon-blue: #00d2ff;
            --deep-bg: #050b18;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--deep-bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        #side-panel {
            width: var(--side-width);
            min-width: var(--side-width);
            background: rgba(15, 23, 42, 0.6);
            border: none;
            backdrop-filter: blur(25px);
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            box-sizing: border-box;
            z-index: 100;
        }

        #sidebar-header {
            width: 100%;
            min-height: 80px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }

        #main-content {
            flex-grow: 1;
            height: 100vh;
            min-width: 0;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at 10% 20%, rgba(0, 210, 255, 0.05) 0%, transparent 40%);
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at 50% 50%, rgba(5, 25, 55, 1) 0%, rgba(2, 10, 25, 1) 100%);
            overflow: hidden;
        }

        #math-coach-box {
            position: absolute;
            width: min(174px, calc(32vw));
            max-width: calc(100% - 12px);
            box-sizing: border-box;
            background: rgba(10, 20, 40, 0.4);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 12px;
            padding: clamp(6px, 1.35vw, 11px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            color: white;
            font-family: 'Orbitron', sans-serif;
            pointer-events: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            z-index: 10;
            right: max(4px, env(safe-area-inset-right, 0px));
            left: auto;
        }

        #math-coach-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .coach-message {
            font-size: clamp(0.56rem, 1.9vw, 0.72rem);
            line-height: 1.4;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .coach-title {
            font-size: 0.58rem;
            color: #00d2ff;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .coach-title::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00d2ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00d2ff;
        }

        .cyber-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .coach-math-highlight {
            color: #ffde00;
            font-weight: bold;
        }

        .cyber-label {
            font-family: 'Orbitron' !important;
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-bottom: 12px !important;
            display: block;
            text-align: left !important;
        }

        .cyber-control-group {
            margin-bottom: 35px !important;
        }

        .stats-card {
            padding: 8px 12px !important;
            min-height: 50px !important;
        }

        .stats-val {
            font-size: 1.1rem;
        }

        .cyber-card-title {
            text-align: left !important;
            padding-left: 0 !important;
            margin-left: 0 !important;
        }

        .cyber-card-header {
            padding-left: 0 !important;
            margin-bottom: 20px !important;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
            text-align: left !important;
            padding: 15px 20px !important;
            font-size: 1.2rem !important;
            background: rgba(0, 210, 255, 0.05) !important;
            border: 1px solid rgba(0, 210, 255, 0.2) !important;
            text-shadow: none !important;
            box-shadow: none !important;
            width: 100%;
            box-sizing: border-box;
            border-radius: 12px;
        }

        .cyber-select {
            background-image: none !important;
        }

        .cyber-select::after {
            display: none !important;
        }

        @media (max-width: 520px) {
            #sidebar-header {
                min-height: 56px !important;
            }

            .stats-grid {
                gap: 8px !important;
            }

            .stats-card {
                padding: 8px !important;
                min-height: 44px !important;
            }
        }
    </style>
</head>

<body>
    <!-- Mini Rail -->
    <nav id="mini-rail">
        <div class="nav-btn" onclick="toggleSidebar()" title="Menü umschalten">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
    </nav>

    <aside id="side-panel">
        <header id="sidebar-header" style="min-height: 80px;"></header>
        <div id="ui-container"></div>
    </aside>

    <main id="main-content">
        <div id="canvas-container">
            <div class="cyber-grid"></div>
            <div id="math-coach-box">
                <div class="coach-title"><script>document.write(CyberI18n.get('ui.description'))</script></div>
                <div id="coach-content" class="coach-message">...</div>
            </div>
            <canvas id="canvas"></canvas>
        </div>
    </main>

        <script src="js/cyber-left-chrome.js"></script>
<script src="js/branding/briefings.js"></script>
    <script src="js/branding/overlays.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script>
        function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
            if (window.CyberLeftChrome && typeof CyberLeftChrome.publishResolvedScale === 'function') {
                CyberLeftChrome.publishResolvedScale();
            }

            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
                if (typeof init === 'function') init();
            }, 400);
        }
        // 1. Branding & UI Init
        CyberBranding.init({
            useExternalStyles: true,
            title: CyberI18n.get('ui.coach_title'),
            subtitle: CyberI18n.get('arithmetic.div.title')
        });
        CyberUI.init();

        if (window.CyberLeftChrome && typeof CyberLeftChrome.configure === 'function') {
            CyberLeftChrome.configure({ viewportOnlyZoom: true });
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        const BRAND_BLUE = "#00d2ff";
        const BRAND_GOLD = "#ffde00";
        const BRAND_NEON_GREEN = "#00ff00";

        let dividend = 1234567;
        let divisor = 25;
        let currentStep = -1;
        let stepSequence = [];

        let width, height, dpr;

        function setupUI() {
            CyberUI.createCard('ui-container', CyberI18n.get('arithmetic.div.title'), `
                <div class="cyber-control-group">
                    <label class="cyber-label">${CyberI18n.get('ui.dividend')}</label>
                    <input type="number" id="div-input" class="cyber-select" value="${dividend}" onchange="updateValues()">
                </div>
                <div class="cyber-control-group" style="margin-top:25px;">
                    <label class="cyber-label">${CyberI18n.get('ui.divisor')}</label>
                    <input type="number" id="dsor-input" class="cyber-select" value="${divisor}" onchange="updateValues()">
                </div>
                <button class="cyber-btn" onclick="resetSteps()" style="width:100%; margin-top:20px; border-color:var(--neon-blue);">${CyberI18n.get('ui.reset')}</button>
            `, BRAND_BLUE);

            CyberUI.createCard('ui-container', CyberI18n.get('ui.step'), `
                <div class="stats-grid">
                    <div class="stats-card" onclick="nextStep()" style="cursor:pointer; text-align:center;">
                        <span class="stats-label">${CyberI18n.get('ui.next')}</span>
                        <span class="stats-val" style="font-size:1.4rem;">◀</span>
                    </div>
                    <div class="stats-card" onclick="prevStep()" style="cursor:pointer; text-align:center;">
                        <span class="stats-label">${CyberI18n.get('ui.prev')}</span>
                        <span class="stats-val" style="font-size:1.4rem;">▶</span>
                    </div>
                </div>
            `, '#ff9d00');
        }

        function updateValues() {
            dividend = parseInt(document.getElementById('div-input').value) || 0;
            divisor = parseInt(document.getElementById('dsor-input').value) || 1;
            resetSteps();
        }

        function buildStepSequence() {
            stepSequence = [];
            const dStr = String(dividend);
            const div = divisor;
            
            let currentRemainder = 0;
            let quotient = "";

            // Find initial part of dividend
            let i = 0;
            let part = "";
            while (i < dStr.length && (parseInt(part + dStr[i]) < div)) {
                part += dStr[i];
                stepSequence.push({ 
                    type: 'collect', 
                    digitIdx: i, 
                    currentPart: part
                });
                i++;
            }
            
            if (i < dStr.length) {
                part += dStr[i];
                let firstVal = parseInt(part);
                let qDigit = Math.floor(firstVal / div);
                let product = qDigit * div;
                let remainder = firstVal - product;

                stepSequence.push({
                    type: 'divide',
                    digitIdx: i,
                    partStr: part,
                    partVal: firstVal,
                    qDigit: qDigit,
                    product: product,
                    remainder: remainder
                });

                quotient += qDigit;
                currentRemainder = remainder;
                i++;

                while (i < dStr.length) {
                    let nextDigit = dStr[i];
                    let nextVal = parseInt(String(currentRemainder) + nextDigit);
                    
                    stepSequence.push({
                        type: 'bringDown',
                        digitIdx: i,
                        digit: nextDigit,
                        prevRemainder: currentRemainder,
                        newVal: nextVal
                    });

                    let qDigit = Math.floor(nextVal / div);
                    let product = qDigit * div;
                    let remainder = nextVal - product;

                    stepSequence.push({
                        type: 'divide',
                        digitIdx: i,
                        partStr: String(nextVal),
                        partVal: nextVal,
                        qDigit: qDigit,
                        product: product,
                        remainder: remainder
                    });

                    quotient += qDigit;
                    currentRemainder = remainder;
                    i++;
                }

                stepSequence.push({
                    type: 'final',
                    quotient: quotient,
                    remainder: currentRemainder
                });
            }
        }

        function resetSteps() {
            currentStep = -1;
            buildStepSequence();
            draw();
        }

        function nextStep() {
            if (currentStep < stepSequence.length - 1) {
                currentStep++;
                draw();
            }
        }

        function prevStep() {
            if (currentStep > -1) {
                currentStep--;
                draw();
            }
        }

        function init() {
            dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            width = rect.width;
            height = rect.height;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            buildStepSequence();
            draw();
        }

        function draw() {
            const rect = container.getBoundingClientRect();
            width = rect.width;
            height = rect.height;
            ctx.clearRect(0, 0, width, height);

            const dStr = String(dividend);
            const divStr = String(divisor);
            const resStr = String(Math.floor(dividend / divisor));

            const coachMargin = 6;
            const gapWide = 16;
            const coachWidthPx = Math.min(174, Math.max(112, width * 0.168));
            const calcAvailWidth = Math.max(120, width - coachWidthPx - gapWide - coachMargin * 2);

            // 1. GRID METRICS — Rechenfläche wie addition/subtraktion (rechts Coach reserviert)
            const maxChars = Math.max(dStr.length + divStr.length + resStr.length + 5, 12);
            const totalLines = (dStr.length * 2) + 2;

            let fontSizeWidth = (calcAvailWidth * 0.92) / (maxChars * 0.85);
            let fontSizeHeight = (height * 0.85) / (totalLines * 1.3);
            let fontSize = Math.min(fontSizeWidth, fontSizeHeight, 96);
            fontSize = Math.max(11, fontSize);
            fontSize *= 1.1;
            fontSize = Math.min(106, Math.max(12, fontSize));

            ctx.font = `bold ${fontSize}px Orbitron`;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';

            const charWidth = fontSize * 0.85;
            const rowHeight = fontSize * 1.4;

            const lineWide = Math.max(2.25, Math.min(5.5, fontSize * 0.075));
            /* Hilfslinien beim Herunterholen — schmal, keine runden Caps (wirken sonst noch dicker/gelb angehucht) */
            const lineThin = Math.max(1.2, Math.min(2.65, fontSize * 0.036));
            const bracketTopW = Math.max(2.1, Math.min(4.5, fontSize * 0.068));
            const bracketStubW = Math.max(1.25, Math.min(2.2, bracketTopW * 0.48));

            const totalCalcWidth = maxChars * charWidth;
            const ensembleStartX = coachMargin + Math.max(0, (calcAvailWidth - totalCalcWidth) / 2);

            const startX = ensembleStartX + charWidth * 0.5;
            const layoutDownPx = height * 0.05;
            const unusedVert = Math.max(0, height - totalLines * rowHeight);
            const topMarginFrac = 0.16;
            let startY = unusedVert * topMarginFrac + rowHeight * 0.5;
            const bandCap = height * 0.14 + rowHeight * 0.55;
            if (startY > bandCap) startY = bandCap;
            const minRow0CenterY = Math.max(36, height * 0.018 + fontSize * 0.16);
            if (startY < minRow0CenterY) startY = minRow0CenterY;
            startY += layoutDownPx;

            /* Aufgabe 2 % weiter nach unten; Box-Anker nutzt weiter nur startY (ohne diese Extra-Pixel). */
            const taskExtraDownPx = height * 0.02;
            const paintStartY = startY + taskExtraDownPx;
            const getRowY = (r) => paintStartY + r * rowHeight;

            const coachBox = document.getElementById('math-coach-box');
            if (coachBox) {
                coachBox.style.display = 'block';
                coachBox.style.left = 'auto';
                coachBox.style.right = `${coachMargin}px`;
            }

            // Positioning Helpers
            const getColX = (c) => startX + c * charWidth;

            const step = currentStep >= 0 ? stepSequence[currentStep] : null;

            // --- HELPER: Draw Number Digit-by-Digit ---
            const drawNumber = (num, colEnd, row, color, isRightAligned = true) => {
                const s = String(num);
                ctx.fillStyle = color;
                for (let i = 0; i < s.length; i++) {
                    const charX = isRightAligned ? 
                        getColX(colEnd - (s.length - 1 - i)) : 
                        getColX(colEnd + i);
                    ctx.fillText(s[i], charX, getRowY(row));
                }
            };

            // --- 1. BASE EQUATION (Row 0) ---
            // Dividend
            for (let i = 0; i < dStr.length; i++) {
                ctx.fillStyle = (step && step.digitIdx === i) ? BRAND_GOLD : BRAND_BLUE;
                ctx.fillText(dStr[i], getColX(i), getRowY(0));
            }

            // Operator and Result
            ctx.textAlign = 'left';
            ctx.fillStyle = 'white';
            const opCol = dStr.length;
            ctx.fillText(` : ${divStr} = `, getColX(opCol) - charWidth*0.2, getRowY(0));

            // Result (Quotient)
            if (step) {
                const qStr = (step.type === 'final') ? step.quotient : 
                            stepSequence.slice(0, currentStep + 1).filter(s => s.type === 'divide').map(s => s.qDigit).join('');
                
                const qStartCol = opCol + divStr.length + 2.1; // Perfectly symmetric after " : 25 = "
                drawNumber(qStr, qStartCol, 0, BRAND_GOLD, false);
                
                if (step.type === 'final' && step.remainder > 0) {
                   ctx.fillStyle = 'rgba(255,255,255,0.4)';
                   ctx.font = `bold ${fontSize * 0.5}px Orbitron`;
                   ctx.fillText(` REST ${step.remainder}`, getColX(qStartCol + qStr.length), getRowY(0));
                   ctx.font = `bold ${fontSize}px Orbitron`;
                }
            }

            ctx.textAlign = 'center';

            // BRACKET (Over Row 0)
            if (step && (step.type === 'collect' || step.type === 'divide')) {
                const partLen = step.type === 'collect' ? step.currentPart.length : step.partStr.length;
                const partStartIdx = step.type === 'collect' ? 0 : step.digitIdx - partLen + 1;
                
                /* Oben stark, seitliche Stummel dünn → keine „dicke gelbe Säule“ über der Hilfslinie */
                const bLeft = getColX(partStartIdx) - charWidth * 0.45;
                const bWidth = partLen * charWidth - charWidth * 0.1;
                const bTop = getRowY(0) - fontSize * 0.75;
                const stubLen = Math.min(18, Math.max(10, fontSize * 0.18));

                ctx.strokeStyle = BRAND_GOLD;
                ctx.lineJoin = 'miter';

                ctx.lineWidth = bracketStubW;
                ctx.lineCap = 'butt';
                ctx.beginPath();
                ctx.moveTo(bLeft, bTop + stubLen);
                ctx.lineTo(bLeft, bTop);
                ctx.stroke();

                ctx.lineWidth = bracketTopW;
                ctx.lineCap = 'butt';
                ctx.beginPath();
                ctx.moveTo(bLeft, bTop);
                ctx.lineTo(bLeft + bWidth, bTop);
                ctx.stroke();

                ctx.lineWidth = bracketStubW;
                ctx.beginPath();
                ctx.moveTo(bLeft + bWidth, bTop + stubLen);
                ctx.lineTo(bLeft + bWidth, bTop);
                ctx.stroke();
            }

            // --- 2. VERTICAL CALCULATION ---
            if (step) {
                let currentRow = 1;
                let activeSteps = stepSequence.slice(0, currentStep + 1);
                let lastOperationY = getRowY(0);

                activeSteps.forEach((s) => {
                    if (s.type === 'divide') {
                        // 1. SUBTRACTION ROW
                        const colEnd = s.digitIdx;
                        
                        ctx.fillStyle = 'rgba(255,255,255,0.4)';
                        ctx.fillText('-', getColX(colEnd - String(s.product).length), getRowY(currentRow));
                        drawNumber(s.product, colEnd, currentRow, 'white');
                        
                        // Line unter der Subtraktionszeile
                        ctx.strokeStyle = 'rgba(255,255,255,0.38)';
                        ctx.lineWidth = lineWide;
                        ctx.setLineDash([]);
                        ctx.lineCap = 'round';
                        ctx.beginPath();
                        ctx.moveTo(getColX(colEnd - String(s.product).length) - charWidth*0.4, getRowY(currentRow) + fontSize/1.8);
                        ctx.lineTo(getColX(colEnd) + charWidth*0.4, getRowY(currentRow) + fontSize/1.8);
                        ctx.stroke();
                        
                        currentRow++; // Move to Remainder Row
                        
                        // 2. REMAINDER ROW
                        drawNumber(s.remainder, colEnd, currentRow, (s === step) ? BRAND_BLUE : 'rgba(0, 210, 255, 0.4)');
                        lastOperationY = getRowY(currentRow);
                    } else if (s.type === 'bringDown') {
                        // Digit added to the CURRENT remainder row
                        const colPos = s.digitIdx;
                        ctx.fillStyle = BRAND_GOLD;
                        ctx.fillText(s.digit, getColX(colPos), getRowY(currentRow));
                        
                        ctx.strokeStyle = 'rgba(200, 220, 255, 0.45)';
                        ctx.lineWidth = lineThin;
                        ctx.lineCap = 'butt';
                        ctx.setLineDash([]);
                        ctx.beginPath();
                        ctx.moveTo(getColX(colPos), getRowY(0) + fontSize/2 + 5);
                        ctx.lineTo(getColX(colPos), getRowY(currentRow) - fontSize/2 - 5);
                        ctx.stroke();
                        lastOperationY = getRowY(currentRow);
                        
                        currentRow++; // NEXT product goes to next row
                    }
                });

            }

            const coachAnchorY = (r) => startY + r * rowHeight;

            // --- 3. POSITION COACH BOX (After content is updated for correct height) ---
            updateStepInfo();

            if (coachBox) {
                coachBox.classList.add('visible');
                const boxHeight = coachBox.offsetHeight;
                let targetY = coachAnchorY(0);
                if (step) {
                    let currentRow = 1;
                    const activeSteps = stepSequence.slice(0, currentStep + 1);
                    let opY = coachAnchorY(0);
                    activeSteps.forEach((s) => {
                        if (s.type === 'divide') {
                            currentRow++;
                            opY = coachAnchorY(currentRow);
                        } else if (s.type === 'bringDown') {
                            opY = coachAnchorY(currentRow);
                            currentRow++;
                        }
                    });
                    targetY = opY;
                }
                if (step && step.type === 'final') {
                    targetY = Math.max(targetY, height * 0.43);
                }
                const minTop = 20 + boxHeight / 2 + layoutDownPx;
                const maxTop = height - 20 - boxHeight / 2;
                let clampedY = Math.max(minTop, Math.min(maxTop, targetY));
                const coachExtraDownPx = height * 0.055;
                clampedY = Math.min(maxTop, clampedY + coachExtraDownPx);
                coachBox.style.top = `${clampedY - boxHeight / 2}px`;
            }
        }

        function updateStepInfo() {
            const coach = document.getElementById('math-coach-box');
            const content = document.getElementById('coach-content');
            const info = document.getElementById('step-info');
            if (!coach || !content) return;

            let message = "";
            if (currentStep === -1) {
                message = CyberI18n.get('arithmetic.div.ready', { a: dividend, b: divisor });
            } else {
                const step = stepSequence[currentStep];
                if (!step) return;
                
                if (step.type === 'collect') {
                    message = CyberI18n.get('arithmetic.div.collect', { b: divisor, val: `<span class="coach-math-highlight">${step.currentPart}</span>` });
                } else if (step.type === 'divide') {
                    message = CyberI18n.get('arithmetic.div.fit', { b: divisor, val: `<span class="coach-math-highlight">${step.partVal}</span>`, q: step.qDigit, prod: step.product });
                } else if (step.type === 'bringDown') {
                    message = CyberI18n.get('arithmetic.div.bring_down', { d: `<span class="coach-math-highlight">${step.digit}</span>`, newVal: step.newVal });
                } else if (step.type === 'final') {
                    message = `<b>${CyberI18n.get('arithmetic.div.complete', { result: `<span class="coach-math-highlight">${step.quotient}</span>` })}</b>${step.remainder > 0 ? ' with ' + CyberI18n.get('arithmetic.div.rem', { rem: step.remainder }) : ''}.`;
                }
            }

            coach.classList.add('visible');
            content.innerHTML = message;
            if (info) info.innerHTML = message;
        }

        window.onresize = init;

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') nextStep();
            if (e.key === 'ArrowRight') prevStep();
        });

        setupUI();
        document.fonts.ready.then(() => { setTimeout(init, 100); });
    </script>
</body>

</html>
