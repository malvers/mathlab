<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catching Words | docalvers ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
        }

        html {
            background: #050b18;
        }

        body {
            margin: 0;
            padding: 0;
            background: #050b18;
            overflow: visible;
            height: 100vh;
            width: 100vw;
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        body.mode-catching-words {
            background: transparent;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
            filter: brightness(0.62);
        }

        /* Catching Words: final scale 0.9 */
        @keyframes cinematic-fade-in-cw {
            0% {
                opacity: 0;
                transform: scale(0.05);
                letter-spacing: 80px;
            }
            40% {
                opacity: 0.6;
            }
            99.5% {
                opacity: 1;
                transform: scale(0.9);
                letter-spacing: 12px;
            }
            100% {
                opacity: 1;
                transform: scale(0.9);
                letter-spacing: 12px;
            }
        }

        /* Domain line „docalvers.xx“: final scale 1:1 per dramaturgy (pt), no scale(0.9) like other keywords */
        @keyframes cinematic-fade-in-cw-domain {
            0% {
                opacity: 0;
                transform: scale(0.05);
                letter-spacing: 80px;
            }
            40% {
                opacity: 0.6;
            }
            99.5% {
                opacity: 1;
                transform: scale(1);
                letter-spacing: normal;
            }
            100% {
                opacity: 1;
                transform: scale(1);
                letter-spacing: normal;
            }
        }

        .glow-sphere {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            animation: pulse-glow 8s infinite alternate;
        }

        @keyframes pulse-glow {
            from { transform: scale(1); opacity: 0.3; }
            to { transform: scale(1.2); opacity: 0.6; }
        }

        /* Playback pill + ambient / fullscreen / close — one row, centered */
        .intro-top-bar {
            position: fixed;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px 12px;
            max-width: calc(100vw - 24px);
            box-sizing: border-box;
            pointer-events: none;
        }
        .intro-top-bar > * {
            pointer-events: auto;
        }

        .intro-playback-controls {
            position: relative;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            background: rgba(15, 23, 42, 0.92);
            padding: 6px 14px;
            border-radius: 999px;
            border: 1px solid rgba(0, 210, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.15);
            backdrop-filter: blur(12px);
            opacity: 0.92;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .intro-playback-controls:hover {
            opacity: 1;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            border-color: rgba(0, 210, 255, 0.6);
        }

        /* Kein gemeinsamer Kasten — einzelne Flächen siehe .intro-top-bar .fs-toggle / .intro-back-btn */
        .intro-top-actions {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            padding: 0;
            margin: 0;
            background: none;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
            opacity: 1;
        }
        .intro-playback-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            outline: none;
        }
        .intro-playback-btn:hover {
            color: #00d2ff;
            transform: scale(1.15);
            filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.6));
        }
        .intro-playback-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Pro Button: gleiches Surface wie .intro-playback-controls (Rand, HG, Glow) — ohne gemeinsame äußere Pill. */
        .intro-top-bar .fs-toggle,
        .intro-top-bar .intro-back-btn {
            box-sizing: border-box;
            width: 42px;
            height: 42px;
            padding: 0;
            margin: 0;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(0, 210, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            opacity: 0.92;
            color: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .intro-top-bar .fs-toggle:hover,
        .intro-top-bar .intro-back-btn:hover {
            opacity: 1;
            border-color: rgba(0, 210, 255, 0.6);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            color: #00d2ff;
            transform: scale(1.06);
            filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.5));
        }
        .intro-top-bar .fs-toggle svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            stroke-width: 2;
        }
        .intro-top-bar #intro-ambient-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            stroke: none;
        }

        .intro-top-bar .intro-back-btn svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            fill: none;
        }

        .intro-section-nav {
            position: fixed;
            left: 18px;
            right: 18px;
            bottom: 20px;
            z-index: 2600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            gap: 12px;
        }
        .intro-section-btn {
            pointer-events: auto;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(15, 23, 42, 0.9);
            color: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: lowercase;
            cursor: pointer;
            opacity: 0.78;
            transition:
                opacity 0.25s ease,
                border-color 0.25s ease,
                box-shadow 0.25s ease,
                transform 0.2s ease;
            box-shadow: 0 0 14px rgba(0, 210, 255, 0.08);
        }
        .intro-section-btn:hover:not(:disabled) {
            opacity: 1;
            border-color: rgba(0, 210, 255, 0.55);
            box-shadow: 0 0 22px rgba(0, 210, 255, 0.35);
            transform: translateY(-1px);
        }
        .intro-section-btn:disabled {
            opacity: 0.38;
            cursor: not-allowed;
            transform: none;
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: none;
        }
        .intro-section-btn svg {
            flex-shrink: 0;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        #catching-words-panel {
            display: block;
            position: fixed;
            inset: 0;
            z-index: 100;
            overflow: visible;
            --cw-anim-sec: 4;
            --cw-ss-crossfade: 1.25s;
            /* Dimmed video shows through; solid again during fullscreen screenshot runs (see :has). */
            background-color: rgba(5, 11, 24, 0.62);
        }
        #catching-words-panel:has(.cw-stack.cw-stack-fullscreen-mode) {
            background-color: #050b18;
        }
        #catching-words-panel .cw-play {
            position: absolute;
            inset: 0;
            padding: 28px 0 88px;
            box-sizing: border-box;
            cursor: crosshair;
            overflow: visible;
        }
        #catching-words-panel.cw-drag-over {
            box-shadow: inset 0 0 0 3px rgba(0, 210, 255, 0.45);
            background-color: rgba(5, 11, 24, 0.96);
            background-image: linear-gradient(
                rgba(0, 210, 255, 0.06),
                rgba(0, 210, 255, 0.06)
            );
        }
        /* Stacked lines: --cw-stack-pad-top + flex-start so line 1 never shifts when more lines spawn;
           --cw-fit-scale shrinks when content exceeds .cw-play (probe uses same settled metrics). */
        #catching-words-panel .cw-stack {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            --cw-fit-scale: 1;
            --cw-stack-pad-top: 0px;
            margin-top: var(--cw-stack-pad-top);
            transform: scale(var(--cw-fit-scale, 1));
            transform-origin: top center;
            display: flex;
            flex-direction: column;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            max-width: none;
            box-sizing: border-box;
            gap: 24px;
            padding: 0 clamp(6px, 2vw, 16px);
            isolation: isolate;
            overflow: visible;
        }
        #catching-words-panel .cw-stack.cw-stack-align-left {
            top: clamp(96px, 14vh, 180px);
            margin-top: 0;
            transform: scale(var(--cw-fit-scale, 1));
            transform-origin: top center;
            justify-content: flex-start;
            align-items: flex-start;
            padding-left: clamp(20px, 7vw, 140px);
            padding-right: clamp(12px, 4vw, 48px);
            box-sizing: border-box;
        }
        #catching-words-panel .cw-stack-align-left .falling-word {
            align-self: flex-start;
            text-align: left;
            transform-origin: left center;
        }
        /* “docalvers.de”: three spans — script font-size (pt) only, no partial scaling */
        #catching-words-panel .falling-word.cw-domain-host {
            display: inline-flex;
            flex-direction: row;
            align-items: baseline;
            flex-wrap: nowrap;
            gap: 0;
            animation-name: cinematic-fade-in-cw-domain;
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            -webkit-text-fill-color: unset !important;
            color: unset !important;
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.7));
        }
        #catching-words-panel .falling-word.cw-domain-host .cw-domain-inner {
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        #catching-words-panel .falling-word.cw-domain-host .cw-domain-dot {
            font-size: 1em;
            opacity: 0.9;
            padding: 0 0.03em;
            align-self: center;
        }
        #catching-words-panel .falling-word.cw-domain-host .cw-domain-tld {
            font-size: 1em;
            line-height: 1;
            letter-spacing: normal;
        }
        /* Keyword: Orbitron gradient, final scale 0.9 */
        #catching-words-panel .falling-word {
            position: relative;
            left: auto;
            top: auto;
            flex: 0 0 auto;
            align-self: center;
            width: auto;
            max-width: none;
            min-width: max-content;
            overflow: visible;
            margin: 0;
            padding: 0;
            border: none;
            border-radius: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            line-height: 1.12;
            text-align: center;
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.7));
            user-select: none;
            touch-action: manipulation;
            white-space: nowrap;
            cursor: pointer;
            transform-origin: center center;
            opacity: 0;
            transform: scale(0.05);
            letter-spacing: 80px;
            animation-name: cinematic-fade-in-cw;
            animation-duration: calc(var(--cw-anim-sec) * 1s);
            animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
            animation-iteration-count: 1;
            animation-fill-mode: forwards;
        }
        #catching-words-panel .falling-word.cw-settled {
            animation: none;
            transition: none;
            opacity: 1;
            transform: scale(0.9);
            letter-spacing: 12px;
        }
        #catching-words-panel .falling-word.cw-domain-host.cw-settled {
            transform: none;
            letter-spacing: normal;
        }
        @keyframes cinematic-fade-in-cw-emoji {
            0% {
                opacity: 0;
                transform: scale(0.08);
            }
            40% {
                opacity: 0.65;
            }
            100% {
                opacity: 1;
                transform: scale(0.92);
            }
        }
        #catching-words-panel .falling-word.cw-emoji {
            font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', emoji;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            -webkit-text-fill-color: unset !important;
            color: unset;
            animation-name: cinematic-fade-in-cw-emoji;
        }
        #catching-words-panel .falling-word.cw-emoji.cw-settled {
            letter-spacing: 0 !important;
            transform: scale(0.92);
        }
        /* Language line + trailing RI flag: gradient/uppercase only on letters */
        #catching-words-panel .falling-word.cw-lang-with-flag {
            display: inline-flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 0.35em;
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            -webkit-text-fill-color: unset !important;
            color: unset;
        }
        #catching-words-panel .falling-word.cw-lang-with-flag .cw-lang-label-text {
            flex: 0 0 auto;
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            text-transform: uppercase;
        }
        #catching-words-panel .falling-word.cw-lang-with-flag .cw-lang-label-flag {
            flex: 0 0 auto;
            font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', emoji, sans-serif;
            font-weight: 400;
            text-transform: none !important;
            letter-spacing: 0 !important;
            text-indent: 0;
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            -webkit-text-fill-color: unset !important;
            color: rgba(255, 252, 255, 0.96);
            line-height: 1;
            filter: none;
        }
        #catching-words-panel .falling-word.cw-lang-with-flag.cw-purple-pulse .cw-lang-label-text {
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            -webkit-text-fill-color: unset !important;
            color: #d8b4fe !important;
        }
        #catching-words-panel .falling-word.cw-lang-with-flag.cw-settled .cw-lang-label-flag {
            letter-spacing: 0 !important;
        }
        #catching-words-panel .falling-word.caught {
            animation: cw-caught 0.38s ease-out forwards;
        }
        /* %purplepulsating … — purple + stronger pulsing glow (text-shadow + drop-shadow) */
        @keyframes cw-purple-pulse-glow {
            0%,
            100% {
                text-shadow:
                    0 0 6px rgba(255, 255, 255, 0.35),
                    0 0 14px rgba(157, 80, 187, 0.95),
                    0 0 28px rgba(157, 80, 187, 0.55),
                    0 0 42px rgba(192, 132, 252, 0.25);
                filter: drop-shadow(0 0 10px rgba(157, 80, 187, 0.65));
            }
            50% {
                text-shadow:
                    0 0 10px rgba(255, 230, 255, 0.55),
                    0 0 24px rgba(224, 179, 255, 1),
                    0 0 48px rgba(157, 80, 187, 0.85),
                    0 0 72px rgba(192, 132, 252, 0.45);
                filter:
                    drop-shadow(0 0 22px rgba(224, 179, 255, 0.95))
                    drop-shadow(0 0 38px rgba(157, 80, 187, 0.55));
            }
        }
        #catching-words-panel .falling-word.cw-purple-pulse {
            background: none !important;
            -webkit-background-clip: unset !important;
            background-clip: unset !important;
            -webkit-text-fill-color: unset !important;
            color: #d8b4fe !important;
            text-transform: none;
            text-shadow:
                0 0 12px rgba(157, 80, 187, 0.9),
                0 0 26px rgba(192, 132, 252, 0.45);
            filter: drop-shadow(0 0 12px rgba(157, 80, 187, 0.7));
            /* Fly-in + glow pulse in parallel (after fly-in .cw-settled keeps only the pulse) */
            animation-name: cinematic-fade-in-cw, cw-purple-pulse-glow;
            animation-duration: calc(var(--cw-anim-sec) * 1s), 1.85s;
            animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1), ease-in-out;
            animation-iteration-count: 1, infinite;
            animation-fill-mode: forwards, none;
        }
        #catching-words-panel .falling-word.cw-purple-pulse.cw-settled {
            opacity: 1 !important;
            transform: scale(0.9);
            letter-spacing: 12px;
            /* Overrides .cw-settled { animation: none } reliably */
            animation: cw-purple-pulse-glow 1.85s ease-in-out infinite !important;
        }
        @keyframes cw-caught {
            to {
                opacity: 0;
                filter: drop-shadow(0 0 50px rgba(255, 255, 255, 0.9));
                transform: scale(1.05);
            }
        }
        @keyframes cw-portal-in {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.94);
                filter: blur(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }
        #catching-words-panel a.cw-portal-btn {
            position: relative;
            flex: 0 0 auto;
            align-self: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: rgba(240, 252, 255, 0.98);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.28em;
            text-indent: 0.28em;
            text-transform: uppercase;
            padding: 1rem 2.4rem;
            border: 2px solid rgba(0, 210, 255, 0.9);
            border-radius: 6px;
            background: linear-gradient(145deg, rgba(0, 210, 255, 0.14), rgba(168, 85, 247, 0.1));
            box-shadow:
                0 0 32px rgba(0, 210, 255, 0.4),
                0 0 64px rgba(168, 85, 247, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.12);
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
            white-space: nowrap;
            opacity: 0;
            transform: translateY(18px) scale(0.94);
            animation: cw-portal-in calc(var(--cw-anim-sec) * 0.72s) cubic-bezier(0.22, 1, 0.36, 1) forwards;
            transition:
                border-color 0.25s ease,
                box-shadow 0.25s ease,
                color 0.2s ease,
                transform 0.2s ease;
        }
        #catching-words-panel a.cw-portal-btn:hover {
            color: #fff;
            border-color: rgba(200, 120, 255, 0.95);
            transform: translateY(-2px) scale(1.02);
            box-shadow:
                0 0 40px rgba(168, 85, 247, 0.5),
                0 0 80px rgba(0, 210, 255, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        /* Media: load first, then a single cw-portal-in on the wrapper (same look as before,
           without empty blurred frame or parent×child opacity issues). */
        #catching-words-panel .cw-media-wrap {
            position: relative;
            flex: 0 0 auto;
            align-self: center;
            width: fit-content;
            max-width: min(92vw, 960px);
            margin: 0 auto;
            padding: 0;
            border: none;
            border-radius: 12px;
            overflow: hidden;
            box-shadow:
                0 0 28px rgba(0, 210, 255, 0.35),
                0 0 56px rgba(157, 80, 187, 0.18),
                inset 0 0 0 1px rgba(255, 255, 255, 0.12);
            opacity: 0;
            transform: translateY(18px) scale(0.94);
            filter: blur(8px);
            animation: none;
            z-index: 1;
        }
        #catching-words-panel .cw-media-wrap.cw-media-show {
            animation: cw-portal-in calc(var(--cw-anim-sec) * 0.72s) cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        #catching-words-panel .cw-media-wrap.cw-media-fallback-visible {
            opacity: 1 !important;
            transform: none !important;
            filter: none !important;
            animation: none !important;
        }
        @media (prefers-reduced-motion: reduce) {
            #catching-words-panel .cw-media-wrap.cw-media-show {
                animation: none !important;
                opacity: 1 !important;
                transform: none !important;
                filter: none !important;
            }
        }
        #catching-words-panel .cw-stack.cw-stack-fullscreen-mode {
            transform: none !important;
            top: 0 !important;
            margin-top: 0 !important;
            height: 100vh !important;
            justify-content: center !important;
        }
        #catching-words-panel .cw-media-wrap.cw-media-fast {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            max-width: 100vw;
            margin: 0;
            border-radius: 0;
            box-shadow: none;
            filter: none;
            opacity: 0;
            visibility: visible;
            animation: none;
            transform: none;
            transition: opacity var(--cw-ss-crossfade, 1.25s) cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
        }
        #catching-words-panel .cw-media-wrap.cw-media-fast.cw-media-fast-on {

    <script>
        /** Intro dramaturgy language — same codes as CyberI18n (de, en, es, fr, it, pt, nl, sw, tr). */
        window.resolveIntroDramaturgieLang = function () {
            var SUPPORTED = { de: 1, en: 1, es: 1, fr: 1, it: 1, pt: 1, nl: 1, sw: 1, tr: 1 };
            function normalize(tag) {
                if (!tag) return '';
                var s = String(tag).trim().replace(/_/g, '-').toLowerCase();
                var two = s.slice(0, 2);
                return SUPPORTED[two] ? two : '';
            }
            try {
                var qRaw = new URLSearchParams(location.search).get('lang');
                var fromQ = normalize(qRaw);
                if (fromQ) {
                    try {
                        localStorage.setItem('cyber-lab-lang', fromQ);
                    } catch (e) {}
                    return fromQ;
                }
            } catch (e) {}
            try {
                var lsCyber = localStorage.getItem('cyber-lab-lang');
                var fromCyber = normalize(lsCyber);
                if (fromCyber) return fromCyber;
            } catch (e) {}
            try {
                var lsIntro = localStorage.getItem('intro-dramaturgie-lang');
                if (lsIntro && SUPPORTED[lsIntro]) return lsIntro;
            } catch (e) {}
            var list =
                navigator.languages && navigator.languages.length
                    ? navigator.languages
                    : [navigator.language || 'de'];
            for (var i = 0; i < list.length; i++) {
                var cand = normalize(list[i]);
                if (cand) return cand;
            }
            return 'de';
        };
    </script>

    <script>
        try {
            CyberUI.init();
        } catch (err) {
            console.warn('CyberUI.init', err);
        }

        const DEV_MODE = true;
        if (DEV_MODE) {
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    window.location.reload(true);
                }
            });
        }

        window.addEventListener('load', () => {
            const video = document.getElementById('bg-video');
            if (video) video.playbackRate = 0.5;
        });

        function toggleFullscreen() {
            const doc = window.document;
            const docEl = doc.documentElement;
            const isFullScreen = doc.fullscreenElement || doc.mozFullScreenElement || doc.webkitFullscreenElement || doc.msFullscreenElement || doc.webkitIsFullScreen;

            if (!isFullScreen) {
                if (docEl.requestFullscreen) docEl.requestFullscreen();
                else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT);
            } else {
                if (doc.exitFullscreen) doc.exitFullscreen();
                else if (doc.webkitExitFullscreen) doc.webkitExitFullscreen();
            }
        }

        function isCwTypingTarget(target) {
            if (!target || !target.tagName) return false;
            const tag = target.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return true;
            if (target.isContentEditable) return true;
            return false;
        }

        const BG_VIDEO_BRIGHTNESS_DEFAULT = 0.62;
        const BG_VIDEO_BRIGHTNESS_STEP = 0.06;
        const BG_VIDEO_BRIGHTNESS_MIN = 0.15;
        const BG_VIDEO_BRIGHTNESS_MAX = 1.0;
        let bgVideoBrightness = BG_VIDEO_BRIGHTNESS_DEFAULT;

        function syncBgVideoBrightness() {
            const video = document.getElementById('bg-video');
            if (video) video.style.filter = 'brightness(' + bgVideoBrightness + ')';
        }

        function nudgeBgVideoBrightness(brighter) {
            const d = brighter ? BG_VIDEO_BRIGHTNESS_STEP : -BG_VIDEO_BRIGHTNESS_STEP;
            bgVideoBrightness = Math.round(
                Math.max(BG_VIDEO_BRIGHTNESS_MIN, Math.min(BG_VIDEO_BRIGHTNESS_MAX, bgVideoBrightness + d)) * 100
            ) / 100;
            syncBgVideoBrightness();
            saveIntroPersistedPrefs();
        }

        /* keydown: registered below (after CW helpers) so arrow keys work reliably */

        /* —— Catching Words: order via .txt/.md (line = entry) or dropped text —— */
        const CW_SEQUENCE_DEFAULT = Object.freeze([
        ]);
        /** Each line starting with # begins a new section; following words belong to it (incl. # 20pt …). ←/→ switch section. */
        let cwSections = [CW_SEQUENCE_DEFAULT.map((text) => ({ text, fontSizePt: null }))];
        let cwSectionIndex = 0;
        let cwSequence = cwSections[0];
        let cwAnimSec = 4;
        /** Layout constants — match settled .falling-word / .cw-emoji (#catching-words-panel). */
        const CW_STACK_LAYOUT_GAP_PX = 24;
        const CW_WORD_LINE_HEIGHT = 1.12;
        const CW_WORD_SETTLED_LETTER_PX = 12;
        const CW_WORD_SETTLED_SCALE = 0.9;
        const CW_EMOJI_SETTLED_SCALE = 0.92;

        /** Debounced: re-run anticipation fit (e.g. window resize). */
        let cwStackFitRaf = null;
        function scheduleCwStackFit() {
            if (cwStackFitRaf != null) cancelAnimationFrame(cwStackFitRaf);
            cwStackFitRaf = requestAnimationFrame(() => {
                cwStackFitRaf = null;
                if (cwRunning && Array.isArray(cwSequence)) precomputeCwStackFitFromSequence(cwSequence);
            });
        }

        function cwSequenceHasFastFullscreenMedia(seq) {
            if (!Array.isArray(seq)) return false;
            return seq.some(
                (e) => e && e.fast && (e.kind === 'media-image' || e.kind === 'media-video')
            );
        }

        function collectCwMeasurePlan(seq) {
            let alignLeft = false;
            const items = [];
            for (let i = 0; i < seq.length; i++) {
                const e = seq[i];
                if (!e) continue;
                if (e.kind === 'stack-layout') {
                    alignLeft = String(e.align || '').toLowerCase() === 'left';
                    continue;
                }
                if (e.kind === 'pause' || e.kind === 'stop-play-all' || e.kind === 'sfx') continue;
                if (e.kind === 'nav') {
                    items.push({ t: 'nav', label: String(e.label || 'LINK') });
                    continue;
                }
                if (e.kind === 'emoji') {
                    items.push({ t: 'emoji', text: String(e.text || '').trim(), pt: e.fontSizePt });
                    continue;
                }
                if (e.kind === 'media-image' || e.kind === 'media-video') {
                    items.push({ t: 'media', fast: !!e.fast });
                    continue;
                }
                if (e.text != null && String(e.text).trim() !== '') {
                    const lab = String(e.text).trim();
                    const isDomain = /^docalvers\.[a-z]{2}$/i.test(lab);
                    items.push({ t: 'text', text: lab, pt: e.fontSizePt, isDomain: !!isDomain });
                }
            }
            return { alignLeft, items };
        }

        function precomputeCwStackFitFromSequence(sequence) {
            const stack = document.getElementById('cw-stack');
            const play = stack && stack.closest('.cw-play');
            if (!stack || !play || !document.body.classList.contains('mode-catching-words')) return;
            if (stack.classList.contains('cw-stack-fullscreen-mode') || cwSequenceHasFastFullscreenMedia(sequence)) {
                stack.style.setProperty('--cw-fit-scale', '1');
                stack.style.removeProperty('--cw-stack-pad-top');
                return;
            }

            const plan = collectCwMeasurePlan(sequence);
            if (!plan.items.length) {
                stack.style.setProperty('--cw-fit-scale', '1');
                stack.style.removeProperty('--cw-stack-pad-top');
                return;
            }

            const cs = getComputedStyle(play);
            const ptp = parseFloat(cs.paddingTop) || 0;
            const pbp = parseFloat(cs.paddingBottom) || 0;
            const pl = parseFloat(cs.paddingLeft) || 0;
            const pr = parseFloat(cs.paddingRight) || 0;
            const availW = Math.max(64, play.clientWidth - pl - pr);
            const playRect = play.getBoundingClientRect();
            const controlsEl = document.querySelector('.intro-top-bar') || document.querySelector('.intro-playback-controls');
            const ctrlBottom = controlsEl ? controlsEl.getBoundingClientRect().bottom : playRect.top;
            const GAP_BELOW_CONTROLS = 12;
            const bandTopGlobal = Math.max(playRect.top + ptp, ctrlBottom + GAP_BELOW_CONTROLS);
            const bandBottomGlobal = playRect.bottom - pbp;
            const stageH = Math.max(64, bandBottomGlobal - bandTopGlobal);
            const margin = Math.max(16, Math.min(28, Math.round(stageH * 0.04)));
            const sidePad = Math.max(6, Math.min(16, Math.round(availW * 0.02)));
            const innerMaxW = Math.max(80, availW - sidePad * 2);

            const probe = document.createElement('div');
            probe.setAttribute('data-cw-fit-probe', '1');
            probe.style.cssText = [
                'position:fixed',
                'left:-99999px',
                'top:0',
                'visibility:hidden',
                'pointer-events:none',
                'z-index:-1',
                'box-sizing:border-box',
                'display:flex',
                'flex-direction:column',
                'flex-wrap:nowrap',
                'gap:' + CW_STACK_LAYOUT_GAP_PX + 'px',
                'align-items:' + (plan.alignLeft ? 'flex-start' : 'center'),
                'width:' + availW + 'px',
                'padding:0 ' + sidePad + 'px',
            ].join(';');

            for (let j = 0; j < plan.items.length; j++) {
                const item = plan.items[j];
                if (item.t === 'text') {
                    const ptSz0 = item.pt != null && Number.isFinite(item.pt) ? item.pt : 80;
                    const effPt = item.isDomain ? ptSz0 : ptSz0 * CW_WORD_SETTLED_SCALE;
                    const row = document.createElement('div');
                    row.style.cssText =
                        'font-family:Orbitron,sans-serif;font-weight:700;line-height:' +
                        CW_WORD_LINE_HEIGHT +
                        ';white-space:nowrap;width:max-content;max-width:' +
                        innerMaxW +
                        'px;overflow:hidden;text-overflow:clip;text-transform:' +
                        (item.isDomain ? 'none' : 'uppercase') +
                        ';letter-spacing:' +
                        (item.isDomain ? 'normal' : CW_WORD_SETTLED_LETTER_PX + 'px') +
                        ';font-size:' +
                        effPt +
                        'pt;';
                    row.textContent = item.text;
                    probe.appendChild(row);
                } else if (item.t === 'emoji') {
                    const ptSz0 = item.pt != null && Number.isFinite(item.pt) ? item.pt : 80;
                    const effPt = ptSz0 * CW_EMOJI_SETTLED_SCALE;
                    const row = document.createElement('div');
                    row.style.cssText =
                        "font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',emoji,sans-serif;font-weight:400;" +
                        'line-height:1;white-space:nowrap;font-size:' +
                        effPt +
                        'pt;';
                    row.textContent = item.text;
                    probe.appendChild(row);
                } else if (item.t === 'nav') {
                    const row = document.createElement('div');
                    row.textContent = item.label;
                    row.style.cssText =
                        'display:inline-flex;font-family:Orbitron,sans-serif;font-size:1.05rem;font-weight:600;' +
                        'letter-spacing:0.28em;text-indent:0.28em;text-transform:uppercase;' +
                        'padding:1rem 2.4rem;border:2px solid rgba(0,210,255,0.9);box-sizing:border-box;white-space:nowrap;';
                    probe.appendChild(row);
                } else if (item.t === 'media') {
                    if (item.fast) continue;
                    const mh = Math.min(Math.round(stageH * 0.46), 520);
                    const mw = Math.min(960, Math.round(availW * 0.92));
                    const row = document.createElement('div');
                    row.style.cssText = 'width:' + mw + 'px;height:' + mh + 'px;flex-shrink:0;';
                    probe.appendChild(row);
                }
            }

            document.body.appendChild(probe);
            const h = probe.scrollHeight;
            let w = probe.scrollWidth;
            try {
                probe.querySelectorAll(':scope > *').forEach((el) => {
                    const ow = el.offsetWidth;
                    if (ow > w) w = ow;
                });
            } catch (err) {
                const kids = probe.querySelectorAll('div');
                for (let k = 0; k < kids.length; k++) {
                    try {
                        const ow = kids[k].offsetWidth;
                        if (ow > w) w = ow;
                    } catch (e2) {}
                }
            }
            document.body.removeChild(probe);

            if (h < 2 || w < 2) {
                stack.style.setProperty('--cw-fit-scale', '1');
                stack.style.removeProperty('--cw-stack-pad-top');
                return;
            }
            let s = Math.min(1, (stageH - margin) / h, (availW - margin) / w);
            s = Math.max(0.18, Math.min(1, s));
            const scaledH = s * h;
            if (stack.classList.contains('cw-stack-align-left')) {
                stack.style.removeProperty('--cw-stack-pad-top');
            } else {
                const playContentTopGlobal = playRect.top;
                const padTop = Math.max(0, bandTopGlobal - playContentTopGlobal + (stageH - scaledH) / 2);
                stack.style.setProperty('--cw-stack-pad-top', padTop + 'px');
            }
            stack.style.setProperty('--cw-fit-scale', String(s));
        }

        let cwSpawnMs = 700;
        let cwFastSpawnMs = 1200;
        let cwSpawnTimer = null;
        let cwRunning = false;
        let cwSpawnRoundIndex = 0;
        let cwPaused = false;
        let cwDebugHudVisible = false;
        let cwPlayAllActive = false;
        let cwPlayAllTimer = null;
        let cwPlayAllCompletionRaf = null;
        /** Debug HUD: elapsed time from play-all start until `%stop` */
        let cwDbgSwStart = null;
        let cwDbgSwLatchMs = null;
        let cwDbgSwRafId = null;
        const CW_PLAY_ALL_GAP_MS = 320;
        const cwActiveSfxSet = new Set();
        const CW_SFX_FADE_OUT_SEC = 1.15;

        function attachCwSfxFadeOut(snd) {
            snd.volume = 1;
            function armFade() {
                const d = snd.duration;
                if (!Number.isFinite(d) || d <= 0) return;
                const fadeDur = Math.min(CW_SFX_FADE_OUT_SEC, Math.max(0.28, d * 0.55));
                const fadeStart = Math.max(0, d - fadeDur);
                function onTimeUpdate() {
                    const t = snd.currentTime;
                    if (t + 0.02 < fadeStart) return;
                    const rem = Math.max(0, d - t);
                    snd.volume = Math.max(0, Math.min(1, rem / fadeDur));
                    if (rem < 0.025) snd.removeEventListener('timeupdate', onTimeUpdate);
                }
                snd.addEventListener('timeupdate', onTimeUpdate);
                snd.addEventListener(
                    'ended',
                    () => {
                        snd.removeEventListener('timeupdate', onTimeUpdate);
                        snd.volume = 1;
                    },
                    { once: true }
                );
            }
            if (snd.readyState >= 1) armFade();
            else snd.addEventListener('loadedmetadata', armFade, { once: true });
        }

        function clearCwPlayAllTimer() {
            if (cwPlayAllTimer) {
                clearTimeout(cwPlayAllTimer);
                cwPlayAllTimer = null;
            }
            if (cwPlayAllCompletionRaf != null) {
                cancelAnimationFrame(cwPlayAllCompletionRaf);
                cwPlayAllCompletionRaf = null;
            }
        }

        function isCwPlayAllSectionVisuallyComplete() {
            const stack = document.getElementById('cw-stack');
            if (!stack) return true;
            const words = stack.querySelectorAll('.falling-word');
            for (let i = 0; i < words.length; i++) {
                const el = words[i];
                if (!el.classList.contains('cw-settled') && !el.classList.contains('caught')) return false;
            }
            const portals = stack.querySelectorAll('.cw-portal-btn');
            for (let j = 0; j < portals.length; j++) {
                if (!portals[j].classList.contains('cw-portal-settled')) return false;
            }
            const mediaWraps = stack.querySelectorAll('.cw-media-wrap');
            for (let k = 0; k < mediaWraps.length; k++) {
                if (!mediaWraps[k].classList.contains('cw-media-settled')) return false;
            }
            return true;
        }

        function runCwPlayAllSectionCompletionWatch() {
            const tick = () => {
                cwPlayAllCompletionRaf = null;
                if (!cwPlayAllActive || !cwRunning) return;
                if (cwSpawnRoundIndex < cwSequence.length) {
                    cwPlayAllCompletionRaf = requestAnimationFrame(tick);
                    return;
                }
                if (cwPaused) {
                    cwPlayAllCompletionRaf = requestAnimationFrame(tick);
                    return;
                }
                if (!isCwPlayAllSectionVisuallyComplete()) {
                    cwPlayAllCompletionRaf = requestAnimationFrame(tick);
                    return;
                }
                tryAdvanceCwPlayAllAfterCurrentSectionSpawnDone();
            };
            if (cwPlayAllCompletionRaf != null) {
                cancelAnimationFrame(cwPlayAllCompletionRaf);
                cwPlayAllCompletionRaf = null;
            }
            cwPlayAllCompletionRaf = requestAnimationFrame(tick);
        }

        const INTRO_PREFS_KEY = 'docalvers.intro.prefs';
        const INTRO_PREFS_VERSION = 4;
        const INTRO_AMBIENT_MASTER_GAIN = 0.085;

        let introAmbCtx = null;
        let introAmbMaster = null;
        let introAmbGraphBuilt = false;
        let introAmbMuted = false;

        function loadIntroPersistedPrefs() {
            try {
                const raw = localStorage.getItem(INTRO_PREFS_KEY);
                if (!raw) return;
                const s = JSON.parse(raw);
                if (!s || typeof s !== 'object') return;
                if (!s.v || s.v < 1 || s.v > INTRO_PREFS_VERSION) return;
                if (typeof s.bgBrightness === 'number' && Number.isFinite(s.bgBrightness)) {
                    bgVideoBrightness = Math.max(
                        BG_VIDEO_BRIGHTNESS_MIN,
                        Math.min(BG_VIDEO_BRIGHTNESS_MAX, Math.round(s.bgBrightness * 100) / 100)
                    );
                }
                if (typeof s.cwAnimSec === 'number' && Number.isFinite(s.cwAnimSec)) {
                    cwAnimSec = Math.round(Math.max(4, Math.min(18, s.cwAnimSec)) * 10) / 10;
                }
                if (typeof s.cwSpawnMs === 'number' && Number.isFinite(s.cwSpawnMs)) {
                    cwSpawnMs = Math.round(Math.max(400, Math.min(2000, s.cwSpawnMs)));
                }
                if (typeof s.cwFastSpawnMs === 'number' && Number.isFinite(s.cwFastSpawnMs)) {
                    cwFastSpawnMs = Math.round(Math.max(200, Math.min(3000, s.cwFastSpawnMs)));
                }
                if (typeof s.cwDebugHud === 'boolean') {
                    cwDebugHudVisible = s.cwDebugHud;
                }
                if (typeof s.introAmbMuted === 'boolean') {
                    introAmbMuted = s.introAmbMuted;
                }
            } catch (err) {
                /* file:// or private mode */
            }
        }

        function saveIntroPersistedPrefs() {
            try {
                localStorage.setItem(
                    INTRO_PREFS_KEY,
                    JSON.stringify({
                        v: INTRO_PREFS_VERSION,
                        bgBrightness: bgVideoBrightness,
                        cwAnimSec,
                        cwSpawnMs,
                        cwFastSpawnMs,
                        cwDebugHud: cwDebugHudVisible,
                        introAmbMuted,
                    })
                );
            } catch (err) {
                /* quota / private mode */
            }
        }

        function syncIntroAmbientBtn() {
            const btn = document.getElementById('intro-ambient-btn');
            const onIc = document.getElementById('intro-ambient-icon-on');
            const offIc = document.getElementById('intro-ambient-icon-off');
            if (btn) {
                btn.setAttribute('aria-pressed', introAmbMuted ? 'false' : 'true');
                if (!introAmbMuted) {
                    btn.classList.add('is-playing');
                } else {
                    btn.classList.remove('is-playing');
                }
            }
            if (onIc && offIc) {
                onIc.style.display = introAmbMuted ? 'none' : 'block';
                offIc.style.display = introAmbMuted ? 'block' : 'none';
            }
        }

        function buildIntroAmbientGraph() {
            if (introAmbGraphBuilt) return;
            const Ctor = window.AudioContext || window.webkitAudioContext;
            if (!Ctor) return;
            introAmbCtx = new Ctor();
            introAmbMaster = introAmbCtx.createGain();
            introAmbMaster.connect(introAmbCtx.destination);

            const lowPass = introAmbCtx.createBiquadFilter();
            lowPass.type = 'lowpass';
            lowPass.frequency.value = 620;
            lowPass.Q.value = 0.45;
            lowPass.connect(introAmbMaster);

            /** Soft major pad (C major): warm/friendly rather than a dark sci-fi drone */
            function voice(freqHz, type, detuneCents, peakGain) {
                const g = introAmbCtx.createGain();
                g.gain.value = peakGain;
                const o = introAmbCtx.createOscillator();
                o.type = type;
                o.frequency.value = freqHz;
                if (detuneCents) o.detune.value = detuneCents;
                o.connect(g);
                g.connect(lowPass);
                o.start();
            }

            voice(130.81, 'sine', 1.5, 0.048);
            voice(164.81, 'sine', -2, 0.042);
            voice(196.0, 'sine', 2.5, 0.036);
            voice(261.63, 'triangle', 0, 0.014);

            introAmbGraphBuilt = true;
            applyIntroAmbientGainImmediate();
        }

        function applyIntroAmbientGainImmediate() {
            if (!introAmbMaster || !introAmbCtx) return;
            const t = introAmbCtx.currentTime;
            introAmbMaster.gain.cancelScheduledValues(t);
            introAmbMaster.gain.setValueAtTime(introAmbMuted ? 0 : INTRO_AMBIENT_MASTER_GAIN, t);
        }

        let bgAudioObj = new Audio('resources/friendly_small.wav');
        bgAudioObj.preload = 'auto';
        bgAudioObj.loop = true;
        bgAudioObj.volume = 0.5;

        function syncBgAudio() {
            if (introAmbMuted) {
                bgAudioObj.pause();
            } else {
                bgAudioObj.volume = 0.5;
                const p = bgAudioObj.play();
                if (p !== undefined) {
                    p.catch((e) => {
                        console.warn("Autoplay was blocked, but should not be since it is user initiated now.", e);
                    });
                }
            }
        }

        function applyIntroAmbientGainRamp() {
            if (!introAmbMaster || !introAmbCtx) return;
            const t = introAmbCtx.currentTime;
            introAmbMaster.gain.cancelScheduledValues(t);
            const target = introAmbMuted ? 0 : INTRO_AMBIENT_MASTER_GAIN;
            introAmbMaster.gain.setTargetAtTime(target, t, 0.07);
        }

        async function unlockIntroAmbientAudio() {
            if (introAmbMuted) return;
            
            buildIntroAmbientGraph();
            if (!introAmbCtx) return;
            try {
                if (introAmbCtx.state === 'suspended') await introAmbCtx.resume();
            } catch (err) {
                /* ignore */
            }
            applyIntroAmbientGainRamp();
        }

        function toggleIntroAmbientMuted() {
            introAmbMuted = !introAmbMuted;
            
            syncBgAudio();
            
            if (!introAmbMuted) {
                unlockIntroAmbientAudio();
            } else {
                applyIntroAmbientGainRamp();
                cwActiveSfxSet.forEach((snd) => {
                    try {
                        snd.pause();
                    } catch (err) {
                        /* ignore */
                    }
                });
            }
            syncIntroAmbientBtn();
            saveIntroPersistedPrefs();
        }

        loadIntroPersistedPrefs();
        syncIntroAmbientBtn();

        function cwDbgClearStopwatchIdle() {
            if (cwDbgSwRafId != null) {
                cancelAnimationFrame(cwDbgSwRafId);
                cwDbgSwRafId = null;
            }
            cwDbgSwStart = null;
            cwDbgSwLatchMs = null;
        }

        function cwDbgStartStopwatch() {
            if (cwDbgSwRafId != null) {
                cancelAnimationFrame(cwDbgSwRafId);
                cwDbgSwRafId = null;
            }
            cwDbgSwStart = performance.now();
            cwDbgSwLatchMs = null;
            cwDbgScheduleSwTick();
        }

        function cwDbgScheduleSwTick() {
            if (cwDbgSwRafId != null) cancelAnimationFrame(cwDbgSwRafId);
            function tick() {
                syncCwMotionVars();
                const hud = document.getElementById('cw-debug-hud');
                const visible = hud && hud.classList.contains('visible');
                if (
                    cwDbgSwStart != null &&
                    cwDbgSwLatchMs == null &&
                    cwRunning &&
                    visible
                ) {
                    cwDbgSwRafId = requestAnimationFrame(tick);
                } else {
                    cwDbgSwRafId = null;
                }
            }
            const hud = document.getElementById('cw-debug-hud');
            if (
                cwDbgSwStart != null &&
                cwDbgSwLatchMs == null &&
                cwRunning &&
                hud &&
                hud.classList.contains('visible')
            ) {
                cwDbgSwRafId = requestAnimationFrame(tick);
            }
        }

        function syncCwDebugHudDom() {
            if (!document.body.classList.contains('mode-catching-words')) return;
            let hud = document.getElementById('cw-debug-hud');
            if (cwDebugHudVisible) {
                if (!hud) {
                    hud = document.createElement('div');
                    hud.id = 'cw-debug-hud';
                    hud.className = 'cw-debug-hud';
                    hud.setAttribute('aria-live', 'polite');
                    hud.setAttribute('aria-label', 'Intro Debug · Fußzeile');
                    document.body.appendChild(hud);
                }
                hud.classList.add('visible');
            } else if (hud) {
                hud.classList.remove('visible');
            }
            syncCwMotionVars();
        }

        syncCwDebugHudDom();

        function syncCwMotionVars() {
            const panel = document.getElementById('catching-words-panel');
            if (panel) panel.style.setProperty('--cw-anim-sec', String(cwAnimSec));
            const hud = document.getElementById('cw-debug-hud');
            if (hud && hud.classList.contains('visible')) {
                const secLine =
                    cwSections.length > 0
                        ? 'Abschnitt ' + (cwSectionIndex + 1) + ' / ' + cwSections.length
                        : 'Abschnitt —';
                let swLine = null;
                if (cwDbgSwLatchMs != null) {
                    swLine =
                        'Stopuhr → %stop: ' +
                        (cwDbgSwLatchMs / 1000).toFixed(2) +
                        ' s (bei %stop eingefroren)';
                } else if (cwDbgSwStart != null) {
                    swLine =
                        'Stopuhr → %stop: ' +
                        ((performance.now() - cwDbgSwStart) / 1000).toFixed(2) +
                        ' s (läuft …)';
                }
                const head = swLine ? [swLine, ''] : [];
                hud.textContent = head.concat([
                    secLine + '  ·  Play-all ' + (cwPlayAllActive ? 'an' : 'aus'),
                    'Flug (Keyframe): ' + cwAnimSec.toFixed(1) + ' s',
                    'Spawn-Takt:      ' + cwSpawnMs + ' ms (SS: ' + cwFastSpawnMs + ' ms)',
                    '↑ schneller · ↓ langsamer  (±0,1 s · ±10 ms)',
                    '⇧↑ / ⇧↓  SS-Takt schneller / langsamer (±50 ms)',
                    'h · d  Video heller / dunkler',
                    'Beim Laden: automatisch Play-all (alle #‑Sections wie S)',
                    '%stop in Script/.txt beendet Play-all',
                    'S  Play-all neu ab Abschnitt 1 · Wechsel wenn Section fertig animiert',
                    '⌘D  Debug ein/aus (bleibt gespeichert)',
                    'M · Ambient ein/aus (Standard aus · bleibt gespeichert)',
                ]).join('\n');
            }
        }

        function nudgeCwMotion(isUpFaster, isShift) {
            const dir = isUpFaster ? 1 : -1;
            if (isShift) {
                cwFastSpawnMs = Math.round(Math.max(200, Math.min(3000, cwFastSpawnMs - dir * 50)));
            } else {
                cwAnimSec = Math.round(Math.max(4, Math.min(18, cwAnimSec - dir * 0.1)) * 10) / 10;
                cwSpawnMs = Math.round(Math.max(400, Math.min(2000, cwSpawnMs - dir * 10)));
            }
            syncCwMotionVars();
            saveIntroPersistedPrefs();
        }

        function toggleCwDebugHud() {
            if (!document.body.classList.contains('mode-catching-words')) return;
            cwDebugHudVisible = !cwDebugHudVisible;
            syncCwDebugHudDom();
            cwDbgScheduleSwTick();
            saveIntroPersistedPrefs();
        }

        function handleCwSectionSpawnExhausted() {
            if (cwSpawnTimer) {
                clearTimeout(cwSpawnTimer);
                cwSpawnTimer = null;
            }
            if (!cwRunning) return;
            if (cwPlayAllActive) runCwPlayAllSectionCompletionWatch();
        }

        function fadeOutBgMusic() {
            if (introAmbMaster && introAmbCtx) {
                const t = introAmbCtx.currentTime;
                introAmbMaster.gain.cancelScheduledValues(t);
                introAmbMaster.gain.setTargetAtTime(0, t, 4.0);
            }
            
            let vol = bgAudioObj.volume;
            const fadeAudio = setInterval(() => {
                vol -= 0.01;
                if (vol <= 0) {
                    bgAudioObj.volume = 0;
                    bgAudioObj.pause();
                    clearInterval(fadeAudio);
                } else {
                    bgAudioObj.volume = vol;
                }
            }, 80);
            
            const btn = document.getElementById('intro-ambient-btn');
            if (btn) btn.classList.remove('is-playing');
        }

        function stopCwPlayAllFromScript() {
            if (cwDbgSwStart != null && cwDbgSwLatchMs == null) {
                cwDbgSwLatchMs = performance.now() - cwDbgSwStart;
            }
            if (cwDbgSwRafId != null) {
                cancelAnimationFrame(cwDbgSwRafId);
                cwDbgSwRafId = null;
            }
            cwPlayAllActive = false;
            clearCwPlayAllTimer();
            syncCwMotionVars();
            fadeOutBgMusic();
        }

        function beginCwPlayAllSections() {
            if (!document.body.classList.contains('mode-catching-words')) return;
            if (!cwSections.length) return;
            clearCwPlayAllTimer();
            cwPlayAllActive = true;
            cwSectionIndex = 0;
            cwSequence = cwSections[0] || [];
            stopCatchingWords();
            startCatchingWords();
            cwDbgStartStopwatch();
        }

        function tryAdvanceCwPlayAllAfterCurrentSectionSpawnDone() {
            if (!cwPlayAllActive) return;
            clearCwPlayAllTimer();
            if (cwSectionIndex < cwSections.length - 1) {
                const stack = document.getElementById('cw-stack');
                if (stack) {
                    stack.innerHTML = '';
                    stack.classList.remove('cw-stack-align-left');
                    stack.classList.remove('cw-stack-fullscreen-mode');
                    stack.style.setProperty('--cw-fit-scale', '1');
                    stack.style.removeProperty('--cw-stack-pad-top');
                }
                cwPlayAllTimer = setTimeout(() => {
                    cwPlayAllTimer = null;
                    if (!cwPlayAllActive || !document.body.classList.contains('mode-catching-words')) return;
                    stepCwSection('auto');
                }, CW_PLAY_ALL_GAP_MS);
            } else {
                cwPlayAllActive = false;
                cwDbgClearStopwatchIdle();
                stopCatchingWords();
                syncCwMotionVars();
            }
        }

        function syncIntroSectionNav() {
            const prev = document.getElementById('cw-nav-prev');
            const next = document.getElementById('cw-nav-next');
            if (!prev || !next) return;
            const n = cwSections.length;
            const i = cwSectionIndex;
            const multi = n > 1;
            
            // Also sync the top playback controls
            const topPrev = document.getElementById('top-nav-prev');
            const topNext = document.getElementById('top-nav-next');
            if (topPrev && topNext) {
                topPrev.style.opacity = (!multi || i <= 0) ? '0.3' : '1';
                topPrev.style.pointerEvents = (!multi || i <= 0) ? 'none' : 'auto';
                
                topNext.style.opacity = (!multi || i >= n - 1) ? '0.3' : '1';
                topNext.style.pointerEvents = (!multi || i >= n - 1) ? 'none' : 'auto';
            }
            
            // Whole top bar (playback + ambient / fullscreen / close) stays window-centered
            const bar = document.querySelector('.intro-top-bar');
            if (bar) {
                bar.style.left = '50%';
                bar.style.transform = 'translateX(-50%)';
            }

            prev.disabled = !multi || i <= 0;
            next.disabled = !multi || i >= n - 1;
            syncCwMotionVars();
        }

        function stepCwItem(delta) {
            if (!document.body.classList.contains('mode-catching-words')) return;
            if (!cwPaused) toggleCatchingWordsPause(); // Pause if not already paused
            
            cwPlayAllActive = false; // Stop auto-advancing sections when single stepping
            cwDbgClearStopwatchIdle();
            clearCwPlayAllTimer();
            
            const stack = document.getElementById('cw-stack');
            if (!stack) return;
            
            const isFastMedia = cwSequence && cwSequence.some(e => e.fast);
            if (!isFastMedia) {
                stepCwSection(delta);
                return;
            }
            
            if (delta === -1) {
                if (cwSpawnRoundIndex > 0) {
                    cwSpawnRoundIndex--;
                    if (stack.lastElementChild) {
                        stack.removeChild(stack.lastElementChild);
                    }
                }
            } else if (delta === 1) {
                if (cwSpawnRoundIndex < cwSequence.length) {
                    spawnCwWord();
                }
            }
        }

        function introFastForward() {
            if (!document.body.classList.contains('mode-catching-words')) return;
            const isFastMedia = cwSequence && cwSequence.some(e => e.fast);
            if (isFastMedia) {
                cwFastSpawnMs = 200;
                syncCwDebugHudDom();
                saveIntroPersistedPrefs();
                cwPlayAllActive = true; // Resume auto-advancing
                if (cwPaused) toggleCatchingWordsPause();
                else {
                    // Force immediate next frame
                    if (cwSpawnTimer) clearTimeout(cwSpawnTimer);
                    scheduleCwSpawn();
                }
            } else {
                stepCwSection(1);
            }
        }

        function introFastBackward() {
            if (!document.body.classList.contains('mode-catching-words')) return;
            const isFastMedia = cwSequence && cwSequence.some(e => e.fast);
            if (isFastMedia) {
                cwFastSpawnMs = 1200;
                syncCwDebugHudDom();
                saveIntroPersistedPrefs();
                cwPlayAllActive = true; // Resume auto-advancing
                if (cwPaused) toggleCatchingWordsPause();
                else {
                    if (cwSpawnTimer) clearTimeout(cwSpawnTimer);
                    scheduleCwSpawn();
                }
            } else {
                stepCwSection(-1);
            }
        }

        function stepCwSection(delta) {
            if (!document.body.classList.contains('mode-catching-words')) return;
            // Only stop play-all if we manually clicked a button/key, not if it's just advancing
            if (delta !== 'auto') {
                cwPlayAllActive = false;
                cwDbgClearStopwatchIdle();
                clearCwPlayAllTimer();
            }
            const actualDelta = delta === 'auto' ? 1 : delta;
            
            if (cwSections.length === 0) return;
            if (cwSections.length === 1) {
                cwSectionIndex = 0;
                cwSequence = cwSections[0] || [];
                stopCatchingWords();
                startCatchingWords();
                return;
            }
            const next = Math.max(0, Math.min(cwSections.length - 1, cwSectionIndex + actualDelta));
            if (next === cwSectionIndex) return;
            cwSectionIndex = next;
            cwSequence = cwSections[cwSectionIndex];
            stopCatchingWords();
            startCatchingWords();
        }

        function toggleCatchingWordsPause() {
            if (!document.body.classList.contains('mode-catching-words')) return;
            const stack = document.getElementById('cw-stack');
            if (!stack) return;
            cwPaused = !cwPaused;
            
            const iconPause = document.getElementById('icon-pause');
            const iconPlay = document.getElementById('icon-play');
            if (iconPause && iconPlay) {
                iconPause.style.display = cwPaused ? 'none' : 'block';
                iconPlay.style.display = cwPaused ? 'block' : 'none';
            }
            
            if (cwPaused) {
                if (cwSpawnTimer) {
                    clearTimeout(cwSpawnTimer);
                    cwSpawnTimer = null;
                }
                stack.querySelectorAll('.falling-word, .cw-portal-btn, .cw-media-wrap').forEach((el) => {
                    el.style.animationPlayState = 'paused';
                });
                stack.querySelectorAll('.cw-media-video').forEach((v) => {
                    try {
                        v.pause();
                    } catch (err) {
                        /* ignore */
                    }
                });
                cwActiveSfxSet.forEach((snd) => {
                    try {
                        snd.pause();
                    } catch (err) {
                        /* ignore */
                    }
                });
            } else {
                cwPlayAllActive = true; // Resume auto-advancing sections when unpausing
                stack.querySelectorAll('.falling-word, .cw-portal-btn, .cw-media-wrap').forEach((el) => {
                    if (!el.classList.contains('caught')) el.style.animationPlayState = 'running';
                });
                stack.querySelectorAll('.cw-media-video').forEach((v) => {
                    v.play().catch(() => {});
                });
                cwActiveSfxSet.forEach((snd) => {
                    snd.play().catch(() => {});
                });
                scheduleCwSpawn();
            }
        }

        /** Split «keyword 🇩🇪»: gradient + uppercase on letters breaks regional-indicator flags (background-clip / text-transform). */
        function cwSplitTrailingRlFlag(label) {
            const s = String(label || '').trim();
            if (!s) return null;
            const oneRI = '(?:\\uD83C[\\uDDE6-\\uDDFF])';
            const re = new RegExp('^(.*?)(' + '\\s+' + oneRI + '{2}' + ')$');
            const m = s.match(re);
            if (!m) return null;
            const base = m[1].replace(/\s+$/, '');
            const flag = m[2].trim();
            if (!base || !flag) return null;
            return { base: base, flag: flag };
        }

        function spawnCwWord() {
            const playStack = document.getElementById('cw-stack');
            if (!playStack) return;
            if (cwSpawnRoundIndex >= cwSequence.length) {
                handleCwSectionSpawnExhausted();
                return;
            }
            if (!cwRunning) return;

            const entry = cwSequence[cwSpawnRoundIndex];
            cwSpawnRoundIndex += 1;

            if (entry.kind === 'stop-play-all') {
                stopCwPlayAllFromScript();
                return;
            }

            if (entry.kind === 'pause') {
                // Just let the scheduleCwSpawn handle the delay for the next item
                return;
            }

            if (entry.kind === 'stack-layout') {
                const align = String(entry.align || 'center').toLowerCase();
                if (align === 'left') playStack.classList.add('cw-stack-align-left');
                else playStack.classList.remove('cw-stack-align-left');
                precomputeCwStackFitFromSequence(cwSequence);
                return;
            }

            if (entry.kind === 'nav') {
                const a = document.createElement('a');
                a.className = 'cw-portal-btn';
                a.href = entry.href;
                if (/^https?:\/\//i.test(entry.href)) {
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                }
                a.textContent = entry.label;
                a.style.zIndex = String(cwSpawnRoundIndex);
                a.addEventListener('animationend', (ev) => {
                    if (!ev.animationName || ev.animationName.indexOf('cw-portal-in') === -1) return;
                    a.classList.add('cw-portal-settled');
                });
                playStack.appendChild(a);
                return;
            }

            if (entry.kind === 'sfx') {
                let rawSrc = String(entry.src || '').trim();
                if (/^javascript:/i.test(rawSrc)) rawSrc = '';
                if (rawSrc && !introAmbMuted) {
                    try {
                        const snd = new Audio(rawSrc);
                        snd.preload = 'auto';
                        attachCwSfxFadeOut(snd);
                        cwActiveSfxSet.add(snd);
                        function releaseSfx() {
                            cwActiveSfxSet.delete(snd);
                        }
                        snd.addEventListener('ended', releaseSfx, { once: true });
                        snd.addEventListener('error', releaseSfx, { once: true });
                        const p = snd.play();
                        if (p && typeof p.catch === 'function') p.catch(releaseSfx);
                    } catch (err) {
                        /* ignore */
                    }
                }
                return;
            }

            if (entry.kind === 'media-image') {
                const wrap = document.createElement('div');
                wrap.className = 'cw-media-wrap';
                function buryOtherFastPastInstant() {
                    playStack.querySelectorAll('.cw-media-wrap.cw-media-fast').forEach((w) => {
                        if (w !== wrap && !w.classList.contains('cw-media-fast-past')) {
                            w.classList.remove('cw-media-fast-on');
                            w.classList.add('cw-media-fast-past');
                        }
                    });
                }
                function crossfadeFastScreenshots() {
                    const fadeMs = 1550;
                    playStack.querySelectorAll('.cw-media-wrap.cw-media-fast').forEach((w) => {
                        if (w === wrap || w.classList.contains('cw-media-fast-past')) return;
                        if (!w.classList.contains('cw-media-fast-on')) {
                            w.classList.add('cw-media-fast-past');
                            return;
                        }
                        w.classList.remove('cw-media-fast-on');
                        const bury = () => {
                            w.classList.add('cw-media-fast-past');
                        };
                        const onTe = (ev) => {
                            if (ev.target !== w || ev.propertyName !== 'opacity') return;
                            w.removeEventListener('transitionend', onTe);
                            clearTimeout(tid);
                            bury();
                        };
                        w.addEventListener('transitionend', onTe);
                        const tid = setTimeout(() => {
                            w.removeEventListener('transitionend', onTe);
                            bury();
                        }, fadeMs);
                    });
                    requestAnimationFrame(() => {
                        wrap.classList.add('cw-media-fast-on');
                    });
                }
                if (entry.fast) {
                    wrap.classList.add('cw-media-fast');
                    playStack.classList.add('cw-stack-fullscreen-mode');
                    playStack.style.removeProperty('--cw-stack-pad-top');
                    /* Previously: all past frames visibility:hidden at once → gap until new image loads
                       (bg video / black flash). Old screenshots stay visible until load (underneath). */
                }
                wrap.style.zIndex = String(cwSpawnRoundIndex);
                let settled = false;
                function markImgSettled() {
                    if (settled) return;
                    settled = true;
                    wrap.classList.add('cw-media-settled');
                    if (cwPlayAllActive) runCwPlayAllSectionCompletionWatch();
                }

                function sanitizeCwImgSrc(u) {
                    const s = String(u || '').trim();
                    if (!s) return '';
                    if (/^javascript:/i.test(s)) return '';
                    return s;
                }

                const rawSrc = sanitizeCwImgSrc(String(entry.src || '').trim());
                playStack.appendChild(wrap);
                if (!rawSrc) {
                    markImgSettled();
                    return;
                }

                const img = document.createElement('img');
                img.className = 'cw-media-img';
                img.alt = '';
                img.loading = entry.fast ? 'eager' : 'lazy';
                img.decoding = entry.fast ? 'async' : 'sync';
                let imgLifecycleDone = false;
                function onImgLoadOk() {
                    if (imgLifecycleDone) return;
                    imgLifecycleDone = true;
                    if (entry.fast) {
                        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                            buryOtherFastPastInstant();
                            wrap.classList.add('cw-media-fast-on');
                        } else {
                            crossfadeFastScreenshots();
                        }
                        setTimeout(markImgSettled, 1650);
                        return;
                    }
                    requestAnimationFrame(() => {
                        wrap.classList.add('cw-media-show');
                        let done = false;
                        const finish = () => {
                            if (done) return;
                            done = true;
                            markImgSettled();
                        };
                        const onAnim = (ev) => {
                            if (ev.target !== wrap) return;
                            if (!ev.animationName || ev.animationName.indexOf('cw-portal-in') === -1)
                                return;
                            wrap.removeEventListener('animationend', onAnim);
                            finish();
                        };
                        wrap.addEventListener('animationend', onAnim);
                        setTimeout(finish, 4000);
                    });
                }
                img.addEventListener('load', onImgLoadOk);
                img.addEventListener('error', () => {
                    if (imgLifecycleDone) return;
                    imgLifecycleDone = true;
                    if (entry.fast) buryOtherFastPastInstant();
                    wrap.innerHTML = '';
                    wrap.classList.add('cw-media-fallback-visible');
                    if (rawSrc) {
                        const a = document.createElement('a');
                        a.className = 'cw-media-fallback-link';
                        a.href = rawSrc;
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                        a.textContent = 'Bild konnte nicht geladen werden · Link öffnen';
                        wrap.appendChild(a);
                    }
                    markImgSettled();
                });
                wrap.appendChild(img);
                img.src = rawSrc;
                /* From cache / already decoded: load may not fire reliably in some engines —
                   without markImgSettled play-all can stall after the last screenshot (heart3d). */
                Promise.resolve().then(() => {
                    if (!imgLifecycleDone && img.complete && img.naturalWidth > 0) {
                        onImgLoadOk();
                    }
                });
                setTimeout(() => {
                    if (!settled) {
                        if (entry.fast) buryOtherFastPastInstant();
                        markImgSettled();
                    }
                }, 12000);
                return;
            }

            if (entry.kind === 'media-video') {
                const wrap = document.createElement('div');
                wrap.className = 'cw-media-wrap';
                wrap.style.zIndex = String(cwSpawnRoundIndex);
                const rawSrc = String(entry.src || '').trim();
                let settled = false;
                function markMediaSettled() {
                    if (settled) return;
                    settled = true;
                    wrap.classList.add('cw-media-settled');
                    if (cwPlayAllActive) runCwPlayAllSectionCompletionWatch();
                }

                function sanitizeCwVideoUrl(u) {
                    const s = String(u || '').trim();
                    if (!s) return '';
                    if (/^javascript:/i.test(s)) return '';
                    return s;
                }

                function normalizeCoverrFetchedHtml(html) {
                    return String(html || '').replace(/\\\//g, '/');
                }

                function extractCoverrHeroMp4(html) {
                    const h = normalizeCoverrFetchedHtml(html);
                    const heroChunk = h.split(/\bRelated Free\b|\bMore Free\b|\bExplore iStock\b/i)[0];
                    const resolutions = ['1080p', '720p', '480p', '360p'];
                    for (let ri = 0; ri < resolutions.length; ri++) {
                        const res = resolutions[ri];
                        const re = new RegExp(
                            `https://cdn\\.coverr\\.co/videos/[^"'\\s<>]+/${res}\\.mp4`,
                            'i'
                        );
                        const m = heroChunk.match(re);
                        if (m) return m[0];
                    }
                    const fb = h.match(
                        /https:\/\/cdn\.coverr\.co\/videos\/[^"'\\\s<>]+\/1080p\.mp4/i
                    );
                    return fb ? fb[0] : null;
                }

                function fetchCoverrPageHtml(pageUrl) {
                    const direct = () =>
                        fetch(pageUrl, { credentials: 'omit', mode: 'cors' }).then((r) =>
                            r.ok ? r.text() : Promise.reject()
                        );
                    const viaProxy = () =>
                        fetch(
                            'https://api.allorigins.win/raw?url=' + encodeURIComponent(pageUrl),
                            { credentials: 'omit', mode: 'cors' }
                        ).then((r) => (r.ok ? r.text() : Promise.reject()));
                    return direct().catch(() => viaProxy());
                }

                function attachCoverrFallbackExternal(pageUrl) {
