                    wrap.innerHTML = '';
                    wrap.classList.add('cw-media-fallback-visible');
                    const p = document.createElement('p');
                    p.className = 'cw-coverr-fallback-msg';
                    p.textContent =
                        'Nur die Videodatei — keine eingebettete Coverr-Webseite. Tipp: Intro über http://localhost öffnen (nicht file://) oder MP4 nach resources/ legen.';
                    const a = document.createElement('a');
                    a.className = 'cw-media-fallback-link';
                    a.href = pageUrl;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.textContent = 'Clip auf Coverr öffnen';
                    wrap.appendChild(p);
                    wrap.appendChild(a);
                    markMediaSettled();
                }

                function attachDirectVideo(url) {
                    wrap.innerHTML = '';
                    const v = document.createElement('video');
                    v.className = 'cw-media-video';
                    v.setAttribute('playsinline', '');
                    v.controls = true;
                    v.muted = true;
                    v.loop = true;
                    v.autoplay = true;
                    v.preload = 'metadata';
                    let revealOnce = false;
                    function revealAndSettle() {
                        if (revealOnce) return;
                        revealOnce = true;
                        requestAnimationFrame(() => {
                            wrap.classList.add('cw-media-show');
                            let done = false;
                            const finish = () => {
                                if (done) return;
                                done = true;
                                markMediaSettled();
                            };
                            const onAnim = (ev) => {
                                if (ev.target !== wrap) return;
                                if (!ev.animationName || ev.animationName.indexOf('cw-portal-in') === -1)
                                    return;
                                wrap.removeEventListener('animationend', onAnim);
                                finish();
                            };
                            wrap.addEventListener('animationend', onAnim);
                            setTimeout(finish, 4000);
                        });
                    }
                    v.addEventListener('error', () => {
                        wrap.innerHTML = '';
                        wrap.classList.add('cw-media-fallback-visible');
                        const a = document.createElement('a');
                        a.className = 'cw-media-fallback-link';
                        a.href = rawSrc;
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                        a.textContent = 'Video-Link öffnen';
                        wrap.appendChild(a);
                        markMediaSettled();
                    });
                    v.addEventListener('loadeddata', revealAndSettle);
                    wrap.appendChild(v);
                    v.src = url;
                    if (v.readyState >= 2) revealAndSettle();
                    setTimeout(() => {
                        if (!settled) markMediaSettled();
                    }, 14000);
                }

                const srcSafe = sanitizeCwVideoUrl(rawSrc);
                const isCoverrPage =
                    /^https?:\/\/(?:www\.)?coverr\.co\/videos\//i.test(srcSafe);

                playStack.appendChild(wrap);

                if (!srcSafe) {
                    attachDirectVideo('resources/galay20.mp4');
                    return;
                }

                if (isCoverrPage) {
                    fetchCoverrPageHtml(srcSafe)
                        .then((html) => {
                            const mp4 = extractCoverrHeroMp4(html);
                            wrap.innerHTML = '';
                            if (mp4) attachDirectVideo(mp4);
                            else attachCoverrFallbackExternal(srcSafe);
                        })
                        .catch(() => {
                            wrap.innerHTML = '';
                            attachCoverrFallbackExternal(srcSafe);
                        });
                    return;
                }

                attachDirectVideo(srcSafe);
                return;
            }

            if (entry.kind === 'emoji') {
                const glyph = String(entry.text || '').trim();
                if (!glyph) return;
                const fontPt = entry.fontSizePt;
                const el = document.createElement('button');
                el.type = 'button';
                el.className = 'falling-word cw-emoji';
                el.textContent = glyph;
                el.style.zIndex = String(cwSpawnRoundIndex);
                if (fontPt != null && Number.isFinite(fontPt))
                    el.style.setProperty('font-size', fontPt + 'pt', 'important');

                playStack.appendChild(el);

                el.addEventListener('animationend', (ev) => {
                    if (!ev.animationName || ev.animationName.indexOf('cinematic-fade-in-cw-emoji') === -1) return;
                    if (!cwRunning || cwPaused || el.classList.contains('caught')) return;
                    el.classList.add('cw-settled');
                });

                function onCatchEmoji(e) {
                    e.preventDefault();
                    if (!cwRunning || el.classList.contains('caught')) return;
                    el.classList.add('caught');
                    setTimeout(() => el.remove(), 380);
                }
                el.addEventListener('click', onCatchEmoji);
                el.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    onCatchEmoji(e);
                }, { passive: false });
                return;
            }

            const label = entry.text;
            const fontPt = entry.fontSizePt;

            const el = document.createElement('button');
            el.type = 'button';
            const labNorm = String(label || '').trim();
            const domainHost = labNorm.match(/^docalvers\.([a-z]{2})$/i);

            if (domainHost) {
                const tld = domainHost[1].toLowerCase();
                el.className = 'falling-word cw-domain-host' + (entry.purplePulse ? ' cw-purple-pulse' : '');
                [['docalvers', 'cw-domain-prefix'], ['.', 'cw-domain-dot'], [tld, 'cw-domain-tld']].forEach(([txt, cls]) => {
                    const span = document.createElement('span');
                    span.className = 'cw-domain-inner ' + cls;
                    span.textContent = txt;
                    el.appendChild(span);
                });
            } else {
                let domainExtra = '';
                if (/^docalvers\.?$/i.test(labNorm)) domainExtra = ' cw-domain-prefix';
                else if (/^de$/i.test(labNorm)) domainExtra = ' cw-domain-tld';
                el.className = 'falling-word' + (entry.purplePulse ? ' cw-purple-pulse' : '') + domainExtra;
                const splitFlag = cwSplitTrailingRlFlag(labNorm);
                if (splitFlag) {
                    el.classList.add('cw-lang-with-flag');
                    const spanText = document.createElement('span');
                    spanText.className = 'cw-lang-label-text';
                    spanText.textContent = splitFlag.base;
                    const spanFlag = document.createElement('span');
                    spanFlag.className = 'cw-lang-label-flag';
                    spanFlag.textContent = splitFlag.flag;
                    el.appendChild(spanText);
                    el.appendChild(spanFlag);
                } else {
                    el.textContent = label;
                }
            }
            el.style.zIndex = String(cwSpawnRoundIndex);
            if (fontPt != null && Number.isFinite(fontPt)) el.style.setProperty('font-size', fontPt + 'pt', 'important');

            playStack.appendChild(el);

            el.addEventListener('animationend', (ev) => {
                if (!ev.animationName || ev.animationName.indexOf('cinematic-fade-in') === -1) return;
                if (!cwRunning || cwPaused || el.classList.contains('caught')) return;
                el.classList.add('cw-settled');
                el.querySelectorAll('.cw-domain-inner').forEach((s) => s.classList.add('cw-settled'));
                el.querySelectorAll('.cw-lang-label-text, .cw-lang-label-flag').forEach((s) => s.classList.add('cw-settled'));
            });

            function onCatch(e) {
                e.preventDefault();
                if (!cwRunning || el.classList.contains('caught')) return;
                el.classList.add('caught');
                setTimeout(() => el.remove(), 380);
            }
            el.addEventListener('click', onCatch);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); onCatch(e); }, { passive: false });
        }

        function scheduleCwSpawn() {
            if (!cwRunning || cwPaused) return;
            if (cwSpawnRoundIndex >= cwSequence.length) {
                handleCwSectionSpawnExhausted();
                return;
            }
            
            let delay = cwSpawnMs;
            if (cwSpawnRoundIndex > 0) {
                const prevEntry = cwSequence[cwSpawnRoundIndex - 1];
                if (prevEntry && prevEntry.fast) {
                    delay = cwFastSpawnMs; // Slower spawn for screenshots, adjustable
                } else if (prevEntry && prevEntry.kind === 'pause') {
                    delay = prevEntry.ms; // Custom pause duration
                }
            }
            
            cwSpawnTimer = setTimeout(() => {
                if (!cwRunning || cwPaused) return;
                spawnCwWord();
                scheduleCwSpawn();
            }, delay);
        }

        function syncCwStackVerticalAlign() {
            if (cwRunning && Array.isArray(cwSequence)) precomputeCwStackFitFromSequence(cwSequence);
        }

        function stopCatchingWords() {
            clearCwPlayAllTimer();
            cwRunning = false;
            cwPaused = false;
            cwSpawnRoundIndex = 0;
            if (cwSpawnTimer) clearTimeout(cwSpawnTimer);
            cwSpawnTimer = null;
            const stack = document.getElementById('cw-stack');
            cwActiveSfxSet.forEach((snd) => {
                try {
                    snd.pause();
                    snd.removeAttribute('src');
                    snd.load();
                } catch (err) {
                    /* ignore */
                }
            });
            cwActiveSfxSet.clear();
            if (stack) {
                stack.innerHTML = '';
                stack.classList.remove('cw-stack-fullscreen-mode');
                stack.classList.remove('cw-stack-align-left');
                stack.style.removeProperty('--cw-fit-scale');
                stack.style.removeProperty('--cw-stack-pad-top');
            }
        }

        function startCatchingWords() {
            if (cwRunning) return;
            cwRunning = true;
            cwPaused = false;
            
            const iconPause = document.getElementById('icon-pause');
            const iconPlay = document.getElementById('icon-play');
            if (iconPause && iconPlay) {
                iconPause.style.display = 'block';
                iconPlay.style.display = 'none';
            }
            
            cwSpawnRoundIndex = 0;
            const stack = document.getElementById('cw-stack');
            if (stack) {
                stack.innerHTML = '';
                stack.style.removeProperty('--cw-fit-scale');
                stack.style.removeProperty('--cw-stack-pad-top');
            }
            precomputeCwStackFitFromSequence(cwSequence);

            spawnCwWord();
            scheduleCwSpawn();
            syncIntroSectionNav();
        }

        function normalizeCwLine(raw) {
            let line = String(raw || '').replace(/^\uFEFF/, '').trim();
            if (line.length && line.charCodeAt(0) === 0xff03) line = '#' + line.slice(1);
            return line;
        }

         /**
         * Sections (←/→): new section at each # line (# alone, # comment, or # 60pt on one line).
         * Size: «# 60pt» or its own line «60pt» / «200pt» (applies to following words until the next size line).
         * Count: «#numberlabs» — expands to LABS_DATA.length (intro loads js/labs-config.js); fallback 38 if missing.
         * Lines starting with «//»: comment (ignore).
         * Video: «%video URL» — also «%videohttps://…» without space. A lone line with only a Coverr or .mp4/.webm URL counts as video (paste without %video).
         * Coverr page: extract MP4 from page (hero before “Related”), HTML5 video only — no Coverr UI in iframe.
         * No URL: «%video» → resources/galay20.mp4
         * Navigation: «%button» → button to index.html; «%button index» / «%button orbitals.html»; optional label:
         * «%button orbitals.html Orbitals». A single word that is not a target (e.g. «%button GREAT») links to index as plain text only.
         * Sound: «%sound path» — WAV/MP3/OGG/M4A (e.g. resources/kids.wav); a lone audio URL/path line counts too.
         * Image: «%picture path» or «%picturehttps://…» — local path (e.g. resources/kids.webp) or URL; WebP/JPEG/PNG/GIF/SVG.
         * Emoji: «%emoji 😎» or «%emoji😎» — behaves like a keyword (colored emoji).
         * S (and default on load): play all sections from #1 in order — advance only after all words finished flying (or caught) and %button animations done; short pause; last section stops. ←/→ / drop cancel.
         */
        function isCwNavTargetToken(t) {
            const s = String(t || '').trim();
            if (!s) return false;
            if (/^https?:\/\//i.test(s)) return true;
            if (/[/\\]/.test(s)) return true;
            if (/\.html?$/i.test(s)) return true;
            if (/^index$/i.test(s)) return true;
            return false;
        }

        function sanitizeCwNavHref(raw) {
            const t = String(raw || '').trim();
            if (!t) return 'index.html';
            if (/^[a-z][a-z0-9+.-]*:/i.test(t) && !/^https?:\/\//i.test(t)) return 'index.html';
            if (/^https?:\/\//i.test(t)) return t;
            if (/^index$/i.test(t)) return 'index.html';
            if (/\.html?$/i.test(t)) return t;
            if (/[/\\]/.test(t)) return t;
            return t + '.html';
        }

        function defaultCwNavLabel(href) {
            const h = String(href || '').toLowerCase().split(/[?#]/)[0];
            if (h === 'index.html' || h.endsWith('/index.html')) return 'ZUM INDEX';
            return 'WEITER';
        }

        /** Coverr page or direct media file — not rendered as body text */
        function isCwStandaloneVideoLine(line) {
            const s = String(line || '').trim();
            if (!s || /\s/.test(s)) return false;
            if (/^https?:\/\/(?:www\.)?coverr\.co\/videos\/./i.test(s)) return true;
            if (/^https?:\/\/.+\.(?:mp4|webm|ogg)(\?[^#]*)?(?:#.*)?$/i.test(s)) return true;
            if (/^[a-z0-9_./-]+\.(?:mp4|webm|ogg)(\?[^#]*)?(?:#.*)?$/i.test(s)) return true;
            return false;
        }

        /** Single-line image URL or relative path (.webp, .png …) */
        function isCwStandaloneImageLine(line) {
            const s = String(line || '').trim();
            if (!s || /\s/.test(s)) return false;
            if (/^https?:\/\/.+\.(?:webp|png|jpe?g|gif|svg)(\?[^#]*)?(?:#.*)?$/i.test(s)) return true;
            if (/^[a-z0-9_./-]+\.(?:webp|png|jpe?g|gif|svg)(\?[^#]*)?(?:#.*)?$/i.test(s)) return true;
            return false;
        }

        /** Single-line audio URL or relative path (.wav, .mp3 …) */
        function isCwStandaloneSfxLine(line) {
            const s = String(line || '').trim();
            if (!s || /\s/.test(s)) return false;
            if (/^https?:\/\/.+\.(?:wav|mp3|m4a|aac|opus)(\?[^#]*)?(?:#.*)?$/i.test(s)) return true;
            if (/^[a-z0-9_./-]+\.(?:wav|mp3|m4a|aac|opus)(\?[^#]*)?(?:#.*)?$/i.test(s)) return true;
            return false;
        }

        /** Lab count for intro dramaturgy — line «#numberlabs» (after optional # 200pt …). */
        function getCwIntroNumberlabsCount() {
            if (typeof LABS_DATA !== 'undefined' && Array.isArray(LABS_DATA)) return LABS_DATA.length;
            return 38;
        }

        function parseCwSections(text) {
            const locText = (typeof window.__CURRENT_LOC !== 'undefined') ? window.__CURRENT_LOC : "40.000+";
            text = String(text || '').replace(/%loc/gi, locText);
            const lines = String(text || '').replace(/^\uFEFF/, '').split(/\r\n|\n|\r/);
            const hashWithPt = /^\s*#\s*(\d+(?:\.\d+)?)\s*pt\b/i;
            const standalonePt = /^\s*(\d+(?:\.\d+)?)\s*pt\s*$/i;
            const sections = [];
            let current = [];
            let currentPt = null;

            function flush() {
                if (current.length > 0) {
                    sections.push(current);
                    current = [];
                }
            }

            for (const raw of lines) {
                const line = normalizeCwLine(raw);
                if (!line) continue;
                if (line.startsWith('//')) continue;

                if (line.startsWith('#')) {
                    const mHash = line.match(hashWithPt);
                    if (mHash) {
                        flush();
                        const v = parseFloat(mHash[1]);
                        currentPt = Number.isFinite(v) ? v : null;
                        continue;
                    }
                    if (/^\s*#\s*numberlabs\s*$/i.test(line)) {
                        current.push({
                            text: String(getCwIntroNumberlabsCount()),
                            fontSizePt: currentPt,
                        });
                        continue;
                    }
                    flush();
                    currentPt = null;
                    continue;
                }

                const mPt = line.match(standalonePt);
                if (mPt) {
                    const v = parseFloat(mPt[1]);
                    currentPt = Number.isFinite(v) ? v : null;
                    continue;
                }

                if (/^%video(https?:\/\/)/i.test(line)) {
                    current.push({
                        kind: 'media-video',
                        src: line.replace(/^%video/i, '').trim(),
                    });
                    continue;
                }
                if (/^%video\b/i.test(line)) {
                    const rest = line.replace(/^%video\s*/i, '').trim();
                    current.push({
                        kind: 'media-video',
                        src: rest,
                    });
                    continue;
                }

                if (/^%picture(https?:\/\/)/i.test(line)) {
                    current.push({
                        kind: 'media-image',
                        src: line.replace(/^%picture/i, '').trim(),
                    });
                    continue;
                }
                if (/^%picture\b/i.test(line)) {
                    const rest = line.replace(/^%picture\s*/i, '').trim();
                    current.push({ kind: 'media-image', src: rest });
                    continue;
                }

                if (/^%sound(https?:\/\/)/i.test(line)) {
                    current.push({
                        kind: 'sfx',
                        src: line.replace(/^%sound/i, '').trim(),
                    });
                    continue;
                }
                if (/^%sound\b/i.test(line)) {
                    const rest = line.replace(/^%sound\s*/i, '').trim();
                    current.push({ kind: 'sfx', src: rest });
                    continue;
                }

                if (isCwStandaloneVideoLine(line)) {
                    current.push({ kind: 'media-video', src: line.trim() });
                    continue;
                }

                if (isCwStandaloneImageLine(line)) {
                    current.push({ kind: 'media-image', src: line.trim() });
                    continue;
                }

                if (isCwStandaloneSfxLine(line)) {
                    current.push({ kind: 'sfx', src: line.trim() });
                    continue;
                }

                if (/^%screenshots/i.test(line)) {
                    // Inject all screenshots in rapid succession
                    let screenshots = ["transformationen.png", "beweisinwinkellsumme.png", "dividieren.png", "fermatpunkt.png", "coolsquares.png", "potenzlabor.png", "winkelpuzzle.png", "gleichungssysteme.png", "logikspiel2.png", "lissajous.png", "gleichschenkligesDreieck.png", "pythagoras.png", "uhrzeitwinkel.png", "winkellabor.png", "butterfly.png", "orbitals.png", "winkelsumme.png", "cmaes.png", "ausgleichsgerade.png", "parabellabor.png", "fibonacci.png", "subtraktion.png", "coordinatensystemtester.png", "multiplikation.png", "litchi3d.png", "cmaes_java.png", "differentiallabor.png", "triangulierer.png", "binomischeslabor.png", "steigung.png", "pythagorasbeweis.png", "mandelbrot_deep.png", "integralreaktor.png", "winkelsumme3d.png", "addition.png", "eulergerade.png", "galtonboard.png", "fourier.png"];
                    
                    // Shuffle array
                    for (let i = screenshots.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [screenshots[i], screenshots[j]] = [screenshots[j], screenshots[i]];
                    }
                    
                    // Always put heart3d.png last for debugging/consistency
                    screenshots.push("heart3d.png");
                    
                    screenshots.forEach(file => {
                        current.push({ kind: 'media-image', src: 'resources/screenshots/' + file, fast: true });
                    });
                    continue;
                }

                if (/^%emoji/i.test(line)) {
                    const rest = line.replace(/^%emoji/i, '').trim();
                    if (rest)
                        current.push({
                            kind: 'emoji',
                            text: rest,
                            fontSizePt: currentPt,
                        });
                    continue;
                }

                if (/^%button\b/i.test(line)) {
                    const rest = line.replace(/^%button\s*/i, '').trim();
                    if (!rest) {
                        current.push({ kind: 'nav', href: 'index.html', label: 'ZUM INDEX' });
                        continue;
                    }
                    const parts = rest.split(/\s+/).filter(Boolean);
                    const first = parts[0];
                    let href;
                    let label;
                    if (parts.length === 1 && !isCwNavTargetToken(first)) {
                        href = 'index.html';
                        label = first;
                    } else {
                        href = sanitizeCwNavHref(first);
                        label = parts.length > 1 ? parts.slice(1).join(' ') : defaultCwNavLabel(href);
                    }
                    current.push({ kind: 'nav', href, label });
                    continue;
                }

                if (/^%stop\b/i.test(line)) {
                    current.push({ kind: 'stop-play-all' });
                    continue;
                }

                const purpleLine =
                    line.match(/^%purplepulsating\s*(.*)$/i) || line.match(/^%purplepulsation\s*(.*)$/i);
                if (purpleLine) {
                    const rest = String(purpleLine[1] || '').trim();
                    if (rest) {
                        current.push({ text: rest, fontSizePt: currentPt, purplePulse: true });
                    }
                    continue;
                }

                const pauseMatch = line.match(/^%pause\s+(\d+)/i);
                if (pauseMatch) {
                    const ms = parseInt(pauseMatch[1], 10);
                    if (!isNaN(ms) && ms > 0) {
                        current.push({ kind: 'pause', ms: ms });
                    }
                    continue;
                }

                if (/^%cwstack\b/i.test(line)) {
                    const rest = line.replace(/^%cwstack\s*/i, '').trim().toLowerCase();
                    const align = rest === 'left' ? 'left' : 'center';
                    current.push({ kind: 'stack-layout', align });
                    continue;
                }

                current.push({ text: line, fontSizePt: currentPt });
            }
            flush();
            return sections.filter((s) => s.length > 0);
        }

        function applyCwSequenceFromText(text) {
            const sections = parseCwSections(text);
            if (!sections.length) return false;
            cwSections = sections;
            beginCwPlayAllSections();
            return true;
        }

        function loadIntroDramaturgie() {
            var lang =
                typeof window.resolveIntroDramaturgieLang === 'function'
                    ? window.resolveIntroDramaturgieLang()
                    : 'de';
            window.__INTRO_DRAMATURGIE_LANG = lang;
            var bundleUrl = 'intro-dramaturgy/intro_' + lang + '.js?v=13';

            function applyLoaded() {
                var inline =
                    typeof window.__INTRO_DRAMATURGIE_TXT === 'string'
                        ? window.__INTRO_DRAMATURGIE_TXT
                        : '';
                if (inline.trim() && applyCwSequenceFromText(inline)) return Promise.resolve();

                return fetch('resources/dramaturgie.txt', { cache: 'no-store' })
                    .then(function (r) {
                        return r.ok ? r.text() : Promise.reject();
                    })
                    .then(function (text) {
                        if (!applyCwSequenceFromText(text)) beginCwPlayAllSections();
                    })
                    .catch(function () {
                        beginCwPlayAllSections();
                    });
            }

            function loadViaScriptTag() {
                return new Promise(function (resolve, reject) {
                    var s = document.createElement('script');
                    s.src = bundleUrl;
                    s.async = false;
                    s.onload = function () {
                        resolve();
                    };
                    s.onerror = function () {
                        reject(new Error('dramaturgie script'));
                    };
                    document.head.appendChild(s);
                });
            }

            try {
                delete window.__INTRO_DRAMATURGIE_TXT;
            } catch (e) {}

            return fetch(bundleUrl, { cache: 'no-store' })
                .then(function (res) {
                    if (!res.ok) throw new Error('dramaturgie fetch');
                    return res.text();
                })
                .then(function (code) {
                    (0, eval)(code);
                })
                .catch(function () {
                    return loadViaScriptTag();
                })
                .then(function () {
                    return applyLoaded();
                })
                .catch(function () {
                    beginCwPlayAllSections();
                });
        }

        function readDroppedFiles(files, cb) {
            const list = Array.from(files || []);
            if (!list.length) {
                cb('');
                return;
            }
            const textLike = list.filter((f) => {
                const ct = (f.type || '').toLowerCase();
                return ct.startsWith('text/') || /\.(txt|csv|md|text)$/i.test(f.name || '');
            });
            const todo = (textLike.length ? textLike : list).slice(0, 16);
            let pending = todo.length;
            let merged = '';
            if (!pending) {
                cb('');
                return;
            }
            todo.forEach((file) => {
                const r = new FileReader();
                r.onload = () => {
                    const chunk = typeof r.result === 'string' ? r.result : '';
                    merged = merged ? merged + '\n' + chunk : chunk;
                    pending -= 1;
                    if (pending === 0) cb(merged);
                };
                r.onerror = () => {
                    pending -= 1;
                    if (pending === 0) cb(merged);
                };
                r.readAsText(file, 'UTF-8');
            });
        }

        const cwPanelEl = document.getElementById('catching-words-panel');
        if (cwPanelEl) {
            cwPanelEl.addEventListener('dragenter', (e) => {
                if (!document.body.classList.contains('mode-catching-words')) return;
                e.preventDefault();
                if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
                cwPanelEl.classList.add('cw-drag-over');
            });
            cwPanelEl.addEventListener('dragover', (e) => {
                if (!document.body.classList.contains('mode-catching-words')) return;
                e.preventDefault();
                if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
            });
            cwPanelEl.addEventListener('dragleave', (e) => {
                if (!cwPanelEl.contains(e.relatedTarget)) cwPanelEl.classList.remove('cw-drag-over');
            });
            cwPanelEl.addEventListener('drop', (e) => {
                e.preventDefault();
                cwPanelEl.classList.remove('cw-drag-over');
                if (!document.body.classList.contains('mode-catching-words')) return;
                const dt = e.dataTransfer;
                if (!dt) return;
                if (dt.files && dt.files.length) {
                    readDroppedFiles(dt.files, (text) => {
                        if (text) applyCwSequenceFromText(text);
                    });
                    return;
                }
                const plain = dt.getData('text/plain');
                if (plain) applyCwSequenceFromText(plain);
            });
        }

        (function initCwStackAutoFit() {
            if (!document.getElementById('cw-stack')) return;
            window.addEventListener('resize', () => scheduleCwStackFit(), { passive: true });
        })();

        document.addEventListener(
            'keydown',
            (e) => {
                if (!isCwTypingTarget(e.target)) {
                    const noChord = !e.metaKey && !e.ctrlKey && !e.altKey && !e.shiftKey;
                    if (noChord && (e.key === 'h' || e.key === 'H')) {
                        e.preventDefault();
                        nudgeBgVideoBrightness(true);
                        return;
                    }
                    if (noChord && (e.key === 'd' || e.key === 'D')) {
                        e.preventDefault();
                        nudgeBgVideoBrightness(false);
                        return;
                    }
                    if (noChord && e.key === ' ') {
                        e.preventDefault();
                        const overlay = document.getElementById('intro-start-overlay');
                        if (overlay && overlay.parentNode) {
                            overlay.click();
                            return;
                        }
                        toggleCatchingWordsPause();
                        return;
                    }
                }
                if (document.body.classList.contains('mode-catching-words') && !isCwTypingTarget(e.target)) {
                    const goRight = e.code === 'ArrowRight' || e.key === 'ArrowRight';
                    const goLeft = e.code === 'ArrowLeft' || e.key === 'ArrowLeft';
                    if (goRight || goLeft) {
                        e.preventDefault();
                        stepCwSection(goRight ? 1 : -1);
                        return;
                    }
                    const goUp = e.code === 'ArrowUp' || e.key === 'ArrowUp';
                    const goDown = e.code === 'ArrowDown' || e.key === 'ArrowDown';
                    if (goUp || goDown) {
                        e.preventDefault();
                        nudgeCwMotion(goUp, e.shiftKey);
                        return;
                    }
                    if (
                        (e.key === 'd' || e.key === 'D') &&
                        e.metaKey &&
                        !e.ctrlKey &&
                        !e.altKey &&
                        !e.shiftKey
                    ) {
                        e.preventDefault();
                        toggleCwDebugHud();
                        return;
                    }
                    const cwNoMod = !e.metaKey && !e.ctrlKey && !e.altKey && !e.shiftKey;
                    if (cwNoMod && (e.key === 's' || e.key === 'S')) {
                        e.preventDefault();
                        beginCwPlayAllSections();
                        return;
                    }
                    if (cwNoMod && (e.key === 'm' || e.key === 'M')) {
                        e.preventDefault();
                        toggleIntroAmbientMuted();
                        return;
                    }
                }
                if (e.key.toLowerCase() === 'f') toggleFullscreen();
                if (e.code === 'Space' || e.key === ' ') {
                    const overlay = document.getElementById('intro-start-overlay');
                    if (overlay && overlay.parentNode) {
                        e.preventDefault();
                        overlay.click();
                        return;
                    }
                    if (document.body.classList.contains('mode-catching-words')) {
                        e.preventDefault();
                        toggleCatchingWordsPause();
                        return;
                    }
                    return;
                }
            },
            { capture: true }
        );

        syncCwMotionVars();
        syncBgVideoBrightness();
        
        const startOverlay = document.getElementById('intro-start-overlay');
        if (startOverlay) {
            startOverlay.addEventListener('click', () => {
                startOverlay.style.opacity = '0';
                setTimeout(() => startOverlay.remove(), 500);

                syncBgAudio();
                if (!introAmbMuted) {
                    unlockIntroAmbientAudio();
                }
                loadIntroDramaturgie().catch(function () {
                    beginCwPlayAllSections();
                });
            });
        }
    </script>
