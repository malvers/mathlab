<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | <script>document.write(CyberI18n.get('arithmetic.add.title'))</script></title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="resources/favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <link rel="stylesheet" href="js/cyber-lab-overrides.css">
    <link rel="stylesheet" href="js/branding.styles.extracted.css">
    <style>
        /* AUTHORITY LAYOUT INJECTION (Fixes Git Corruption) */
        :root {
            --branding-blue: #00d2ff;
            --neon-blue: #00d2ff;
            /* Debug: nur Body-HG rot — Canvas-HG wieder blau (#canvas-container) */
            --deep-bg: #229018;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--deep-bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Nur template-spezifisch — Shell (#body, #side-panel) kommt aus cyber-lab-overrides / cyber-layout
           (kein zweites semi-transparentes Panel hier; sonst Farbmischung mit Body-HG). */

        #sidebar-header {
            width: 100%;
            min-height: 80px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }

        #main-content {
            flex-grow: 1;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at 10% 20%, rgba(0, 210, 255, 0.05) 0%, transparent 40%);
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at 50% 50%, rgba(5, 25, 55, 1) 0%, rgba(2, 10, 25, 1) 100%);
        }

        #math-coach-box {
            position: absolute;
            width: 380px;
            background: rgba(10, 20, 40, 0.4);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            color: white;
            font-family: 'Orbitron', sans-serif;
            pointer-events: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
            z-index: 10;
        }

        #math-coach-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .coach-title {
            font-size: 0.7rem;
            color: #00d2ff;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .coach-title::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00d2ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00d2ff;
        }

        .cyber-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            /* Größere Zellen: weniger „Mini-Raster“, wenn die Hauptfläche breit ist */
            background-size: min(120px, 11vw) min(120px, 11vw);
            pointer-events: none;
        }

        .coach-math-highlight {
            color: #ffde00;
            font-weight: bold;
        }

        .cyber-label {
            font-family: 'Orbitron' !important;
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .stats-card {
            padding: 8px 12px !important;
            min-height: 50px !important;
        }

        .stats-val {
            font-size: 1.1rem;
        }

        /* Spinner (Pfeile) ausblenden */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        .cyber-select {
            background-image: none !important;
        }
    </style>
</head>

<body>
    <!-- Mini Rail -->
    <nav id="mini-rail">
        <div class="nav-btn" onclick="toggleSidebar()" title="Toggle Menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
    </nav>

    <aside id="side-panel">
        <header id="sidebar-header" style="min-height: 80px;"></header>
        <div id="ui-container"></div>
    </aside>

    <main id="main-content">
        <div id="canvas-container">
            <div class="cyber-grid"></div>
            <div id="math-coach-box">
                <div class="coach-title"><script>document.write(CyberI18n.get('ui.description'))</script></div>
                <div id="coach-content" class="coach-message">...</div>
            </div>
            <canvas id="canvas"></canvas>
        </div>
    </main>

    <script src="js/cyber-left-chrome.js"></script>
    <script src="js/branding/briefings.js"></script>
    <script src="js/branding/overlays.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script>
        function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
            if (window.CyberLeftChrome && typeof CyberLeftChrome.publishResolvedScale === 'function') {
                CyberLeftChrome.publishResolvedScale();
            }
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
                if (typeof init === 'function') init();
                if (window.CyberLeftChrome && typeof CyberLeftChrome.publishResolvedScale === 'function') {
                    CyberLeftChrome.publishResolvedScale();
                }
            }, 400);
        }
        // 1. Branding & UI Init
        const BRAND_BLUE = "#00d2ff";

        CyberBranding.init({
            useExternalStyles: true,
            title: CyberI18n.get('ui.coach_title'),
            subtitle: "Template" // Replace with i18n key or string
        });
        CyberUI.init();

        if (window.CyberLeftChrome && typeof CyberLeftChrome.configure === 'function') {
            CyberLeftChrome.configure({ viewportOnlyZoom: true });
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        // State
        let currentStep = -1;
        let stepSequence = [];

        function setupUI() {
            CyberUI.createCard('ui-container', "Template Settings", `
                <!-- Add your UI controls here -->
                <button class="cyber-btn" onclick="resetSteps()" style="width:100%; margin-top:20px; border-color:var(--neon-blue);">${CyberI18n.get('ui.reset')}</button>
            `, BRAND_BLUE);

            CyberUI.createCard('ui-container', CyberI18n.get('ui.step'), `
                <div class="stats-grid">
                    <div class="stats-card" onclick="nextStep()" style="cursor:pointer; text-align:center;">
                        <span class="stats-label">${CyberI18n.get('ui.next')}</span>
                        <span class="stats-val" style="font-size:1.4rem;">◀</span>
                    </div>
                    <div class="stats-card" onclick="prevStep()" style="cursor:pointer; text-align:center;">
                        <span class="stats-label">${CyberI18n.get('ui.prev')}</span>
                        <span class="stats-val" style="font-size:1.4rem;">▶</span>
                    </div>
                </div>
                <div id="step-info" style="margin-top:15px; font-family:'Orbitron'; font-size:0.7rem; color:rgba(255,255,255,0.7); min-height:80px; border-left:2px solid var(--neon-blue); padding-left:12px; display:none;">
                </div>
            `, '#ff9d00');
        }

        function buildStepSequence() {
            stepSequence = [];
            // Build your step sequence here
        }

        function resetSteps() {
            currentStep = -1;
            buildStepSequence();
            draw();
        }

        function nextStep() {
            if (currentStep < stepSequence.length - 1) {
                currentStep++;
                draw();
            }
        }

        function prevStep() {
            if (currentStep > -1) {
                currentStep--;
                draw();
            }
        }

        function init() {
            const dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            buildStepSequence();
            draw();
        }

        function draw() {
            const rect = container.getBoundingClientRect();
            const width = rect.width;
            const height = rect.height;
            ctx.clearRect(0, 0, width, height);

            // Draw your content here

            updateMessages();
        }

        function updateMessages() {
            const coach = document.getElementById('coach-content');
            if (currentStep === -1) {
                coach.innerHTML = "Ready...";
                return;
            }
            // Update coach messages based on currentStep
        }

        window.onresize = init;
        setupUI();
        document.fonts.ready.then(init);
    </script>
</body>

</html>
