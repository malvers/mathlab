<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | Template sandbox · layout-lock</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="resources/favicon.png">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <link rel="stylesheet" href="js/cyber-lab-overrides.css">
    <link rel="stylesheet" href="js/branding.styles.extracted.css">

    <!-- Nach den verlinkten Stylesheets (Cascade-Priorität über gleiche Spezifität). -->
    <style id="template-copy-styles-tail">
        :root {
            --side-width: 350px;
            --branding-blue: #00d2ff;
            --neon-blue: #00d2ff;
            --deep-bg: #050b18;
            --sandbox-nav-band-top: 14px;
        }

        html body.template-copy-sandbox {
            margin: 0 !important;
            padding: 0 !important;
            background: var(--deep-bg) !important;
            color: white !important;
            font-family: 'Outfit', sans-serif !important;
            min-height: 100vh !important;
            width: 100vw !important;
            height: 100vh !important;
            overflow: hidden !important;
            display: grid !important;
            grid-template-columns: 66px 350px minmax(0, 1fr) !important;
            grid-template-rows: minmax(0, 100vh) !important;
            align-items: stretch !important;
            align-content: stretch !important;
        }

        html body.template-copy-sandbox:has(#side-panel.collapsed) {
            grid-template-columns: 66px 0 minmax(0, 1fr) !important;
        }

        html body.template-copy-sandbox #mini-rail {
            grid-column: 1 / 2 !important;
            grid-row: 1 !important;
            justify-self: stretch !important;
            width: 66px !important;
            min-width: 66px !important;
            max-width: 66px !important;
            box-sizing: border-box !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            gap: 4px !important;
        }

        html body.template-copy-sandbox #mini-rail .nav-btn {
            margin-bottom: 0 !important;
        }

        html body.template-copy-sandbox #side-panel {
            grid-column: 2 / 3 !important;
            grid-row: 1 !important;
            justify-self: stretch !important;
            width: 100% !important;
            min-width: 0 !important;
            max-width: none !important;
            height: 100vh !important;
            box-sizing: border-box !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 0 !important;
            row-gap: 0 !important;
            column-gap: 0 !important;
            padding: var(--sandbox-nav-band-top) 7px 7px !important;
            margin-left: -1px !important;
            z-index: 1500 !important;
        }

        html body.template-copy-sandbox #sidebar-header {
            width: 100% !important;
            min-height: 0 !important;
            margin-bottom: 0 !important;
            display: flex !important;
            flex-direction: column !important;
            flex-shrink: 0 !important;
        }

        html body.template-copy-sandbox #side-panel .cyber-nav {
            margin: 0 0 4px 0 !important;
        }

        html body.template-copy-sandbox #ui-container {
            flex: 1 1 auto !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 0 !important;
            row-gap: 0 !important;
            padding: 0 !important;
            margin: 0 !important;
            min-height: 0 !important;
        }

        html body.template-copy-sandbox #main-content {
            grid-column: 3 / 4 !important;
            grid-row: 1 !important;
            flex: none !important;
            min-width: 0 !important;
            width: auto !important;
            height: 100vh !important;
            max-height: 100vh !important;
            position: relative !important;
            overflow: hidden !important;
            background: radial-gradient(circle at 10% 20%, rgba(0, 210, 255, 0.05) 0%, transparent 40%) !important;
        }

        html body.template-copy-sandbox #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at 50% 50%, rgba(5, 25, 55, 1) 0%, rgba(2, 10, 25, 1) 100%);
        }

        #math-coach-box {
            position: absolute;
            width: 380px;
            background: rgba(10, 20, 40, 0.4);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            color: white;
            font-family: 'Orbitron', sans-serif;
            pointer-events: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
            z-index: 10;
        }

        #math-coach-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .coach-title {
            font-size: 0.7rem;
            color: #00d2ff;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .coach-title::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00d2ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00d2ff;
        }

        .cyber-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .coach-math-highlight {
            color: #ffde00;
            font-weight: bold;
        }

        .cyber-label {
            font-family: 'Orbitron' !important;
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .stats-card {
            padding: 8px 12px !important;
            min-height: 50px !important;
        }

        .stats-val {
            font-size: 1.1rem;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        .cyber-select {
            background-image: none !important;
        }
    </style>
</head>

<body class="template-copy-sandbox">
    <!-- Mini Rail -->
    <nav id="mini-rail">
        <div class="nav-btn" id="template-rail-toggle" onclick="toggleSidebar()" title="">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
    </nav>

    <aside id="side-panel">
        <header id="sidebar-header"></header>
        <div id="ui-container"></div>
    </aside>

    <main id="main-content">
        <div id="canvas-container">
            <div class="cyber-grid"></div>
            <div id="math-coach-box">
                <div class="coach-title"><span id="template-coach-heading"></span></div>
                <div id="coach-content" class="coach-message">...</div>
            </div>
            <canvas id="canvas"></canvas>
        </div>
    </main>

    <script src="js/cyber-left-chrome.js"></script>
    <script src="js/branding/briefings.js"></script>
    <script src="js/branding/overlays.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script>
        function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
            if (window.CyberLeftChrome && typeof CyberLeftChrome.publishResolvedScale === 'function') {
                CyberLeftChrome.publishResolvedScale();
            }

            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
                if (typeof init === 'function') init();
            }, 400);
        }
        const BRAND_BLUE = "#00d2ff";

        (function syncTemplateChrome() {
            const labTitle = CyberI18n.get('ui.template_lab_title');
            if (labTitle && labTitle !== 'ui.template_lab_title') {
                document.title = 'docalvers | ' + labTitle + ' · sandbox';
            }
            const rail = document.getElementById('template-rail-toggle');
            const tm = CyberI18n.get('ui.toggle_menu');
            if (rail && tm && tm !== 'ui.toggle_menu') rail.setAttribute('title', tm);
            const coachH = document.getElementById('template-coach-heading');
            const desc = CyberI18n.get('ui.description');
            if (coachH && desc && desc !== 'ui.description') coachH.textContent = desc;
        })();

        CyberBranding.init({
            useExternalStyles: true,
            title: CyberI18n.get('ui.coach_title'),
            subtitle: CyberI18n.get('ui.template_brand_subtitle')
        });
        CyberUI.init();

        if (window.CyberLeftChrome && typeof CyberLeftChrome.configure === 'function') {
            CyberLeftChrome.configure({ viewportOnlyZoom: true });
        }

        /** Letztes Stylesheet am Ende von body — nach CyberUI.injectStyles (#cyber-ui-dynamic-styles). */
        function enforceTemplateCopyShell() {
            const ID = 'template-copy-shell-js-lock';
            document.getElementById(ID)?.remove();
            const lock = document.createElement('style');
            lock.id = ID;
            lock.textContent = [
                'html body.template-copy-sandbox,html body.template-copy-sandbox *{box-sizing:border-box!important;}',
                'html body.template-copy-sandbox{margin:0!important;padding:0!important;display:grid!important;',
                'grid-template-columns:66px 350px minmax(0,1fr)!important;',
                'grid-template-rows:minmax(0,100vh)!important;width:100vw!important;height:100vh!important;',
                'overflow:hidden!important;background:#050b18!important;color:#fff!important;}',
                'html body.template-copy-sandbox:has(#side-panel.collapsed){',
                'grid-template-columns:66px 0 minmax(0,1fr)!important;}',
                'html body.template-copy-sandbox #mini-rail{grid-column:1/2!important;grid-row:1!important;',
                'width:66px!important;min-width:66px!important;max-width:66px!important;box-sizing:border-box!important;',
                'justify-self:stretch!important;display:flex!important;flex-direction:column!important;',
                'align-items:center!important;gap:4px!important;}',
                'html body.template-copy-sandbox #mini-rail .nav-btn{margin-bottom:0!important;}',
                'html body.template-copy-sandbox #side-panel{grid-column:2/3!important;grid-row:1!important;',
                'justify-self:stretch!important;display:flex!important;flex-direction:column!important;',
                'gap:0!important;row-gap:0!important;width:100%!important;min-width:0!important;max-width:none!important;',
                'height:100vh!important;box-sizing:border-box!important;padding:14px 7px 7px!important;',
                'margin-left:-1px!important;}',
                'html body.template-copy-sandbox #sidebar-header{min-height:0!important;margin-bottom:0!important;}',
                'html body.template-copy-sandbox #side-panel .cyber-nav{margin:0 0 4px 0!important;}',
                'html body.template-copy-sandbox #ui-container{flex:1 1 auto!important;display:flex!important;',
                'flex-direction:column!important;gap:0!important;min-height:0!important;padding:0!important;}',
                'html body.template-copy-sandbox #main-content{grid-column:3/4!important;grid-row:1!important;',
                'flex:none!important;min-width:0!important;width:auto!important;height:100vh!important;',
                'max-height:100vh!important;overflow:hidden!important;position:relative!important;}',
            ].join('');
            document.body.appendChild(lock);
        }
        enforceTemplateCopyShell();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        let currentStep = -1;
        let stepSequence = [];

        function setupUI() {
            CyberUI.createCard('ui-container', CyberI18n.get('ui.template_settings_card'), `
                <button class="cyber-btn" onclick="resetSteps()" style="width:100%; margin-top:20px; border-color:var(--neon-blue);">${CyberI18n.get('ui.reset')}</button>
            `, BRAND_BLUE);

            CyberUI.createCard('ui-container', CyberI18n.get('ui.step'), `
                <div class="stats-grid">
                    <div class="stats-card" onclick="prevStep()" style="cursor:pointer; text-align:center;">
                        <span class="stats-label">${CyberI18n.get('ui.prev')}</span>
                        <span class="stats-val" style="font-size:1.4rem;">◀</span>
                    </div>
                    <div class="stats-card" onclick="nextStep()" style="cursor:pointer; text-align:center;">
                        <span class="stats-label">${CyberI18n.get('ui.next')}</span>
                        <span class="stats-val" style="font-size:1.4rem;">▶</span>
                    </div>
                </div>
                <div id="step-info" style="margin-top:15px; font-family:'Orbitron'; font-size:0.7rem; color:rgba(255,255,255,0.7); min-height:80px; border-left:2px solid var(--neon-blue); padding-left:12px; display:none;">
                </div>
            `, '#ff9d00');
        }

        function buildStepSequence() {
            stepSequence = [];
        }

        function resetSteps() {
            currentStep = -1;
            buildStepSequence();
            draw();
        }

        function nextStep() {
            if (currentStep < stepSequence.length - 1) {
                currentStep++;
                draw();
            }
        }

        function prevStep() {
            if (currentStep > -1) {
                currentStep--;
                draw();
            }
        }

        function init() {
            const dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            buildStepSequence();
            draw();
        }

        function draw() {
            const rect = container.getBoundingClientRect();
            const width = rect.width;
            const height = rect.height;
            ctx.clearRect(0, 0, width, height);

            updateMessages();
        }

        function updateMessages() {
            const coach = document.getElementById('coach-content');
            if (currentStep === -1) {
                const idle = CyberI18n.get('ui.template_coach_ready');
                coach.textContent = idle !== 'ui.template_coach_ready' ? idle : '…';
                return;
            }
        }

        window.onresize = init;
        window.addEventListener('keydown', (e) => {
            if (e.target.matches('input, select, textarea') || e.target.isContentEditable) return;
            if (e.key === 'ArrowLeft') prevStep();
            if (e.key === 'ArrowRight') nextStep();
        });

        setupUI();
        enforceTemplateCopyShell();
        document.fonts.ready.then(init);
    </script>
</body>

</html>
