<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>docalvers | Winkel-Uhr Labor</title>
    <!-- Fonts & Tools -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <link rel="icon" type="image/png" href="resources/favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <link rel="stylesheet" href="js/cyber-lab-overrides.css">
    <link rel="stylesheet" href="js/branding.styles.extracted.css">
    <style>
        /* Flex: großer Hauptblock (Volle Höhe bis Digitalezeit) + Uhr+ Pills darin vertikal mittig • Zeit unten */
        #main-content {
            /* Schmal genug für „β = 360°“, gleich für α */
            --uhr-angle-pill-w: clamp(88px, 17vmin, 100px);
            /* Digitalezeit: feste Breite • kleinere Pill nur über Padding/Radius • Schrift wie bisher */
            --uhr-time-pill-w: 138px;

            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            position: relative;
            min-height: 0;
            height: 100%;
            max-height: 100%;
            padding: clamp(6px, 2vmin, 14px);
            padding-left: max(clamp(6px, 2vmin, 14px), env(safe-area-inset-left, 0px));
            padding-right: max(clamp(6px, 2vmin, 14px), env(safe-area-inset-right, 0px));
            padding-top: max(clamp(6px, 2vmin, 14px), env(safe-area-inset-top, 0px));
            padding-bottom: max(clamp(6px, 2vmin, 14px), env(safe-area-inset-bottom, 0px));
            box-sizing: border-box;
            gap: clamp(4px, 1.2vmin, 12px);
        }

        .uhr-stage {
            flex: 1 1 auto;
            height: 100%;
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
            grid-template-rows: minmax(0, 1fr);
            align-items: center;
            gap: clamp(6px, 2vmin, 14px);
            width: 100%;
            box-sizing: border-box;
        }

        #floating-tag, #floating-tag-beta {
            position: relative;
            z-index: 20;
            pointer-events: none;
            flex-shrink: 0;
            width: min(var(--uhr-angle-pill-w), 100%);
            min-width: 0;
            max-width: min(var(--uhr-angle-pill-w), 100%);
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(20px);
            padding: clamp(4px, 1vmin, 7px) clamp(5px, 1.2vmin, 8px);
            border-radius: clamp(8px, 2vw, 12px);
            font-size: clamp(0.6rem, 0.32rem + 2.2vmin, 1.22rem);
            font-family: 'Orbitron', sans-serif;
            box-sizing: border-box;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #floating-tag {
            justify-self: end;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.15);
        }

        #floating-tag-beta {
            justify-self: start;
            color: #ff8800;
            border: 1px solid #ff8800;
            text-shadow: 0 0 10px #ff8800;
            box-shadow: 0 0 20px rgba(255, 136, 0, 0.15);
        }

        .uhr-clock-slot {
            grid-column: 2;
            justify-self: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            min-width: 0;
            width: auto;
            transform: translateY(5vh);
        }

        svg#clock {
            width: min(100% - 8px, min(550px, 85vmin, 85dvh));
            max-width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            flex-shrink: 0;
            touch-action: none;
            filter: drop-shadow(0 0 50px rgba(0, 210, 255, 0.15));
        }

        #slider-mount .val-display {
            display: none !important;
        }

        .clock-face { fill: rgba(10, 15, 30, 0.6); stroke: rgba(255, 255, 255, 0.1); stroke-width: 1.5; }
        #hour-hand { stroke: var(--neon-blue); stroke-width: 8; stroke-linecap: round; filter: drop-shadow(0 0 15px var(--neon-blue)); }
        #minute-hand { stroke: var(--neon-purple); stroke-width: 5; stroke-linecap: round; filter: drop-shadow(0 0 15px var(--neon-purple)); }
        .angle-arc { fill: rgba(0, 210, 255, 0.15); stroke: var(--neon-blue); stroke-width: 3; }

        /* Digitalezeit: eigene Zeile unten — Y-Mitte des Uhr+Pill-Blocks liegt in .uhr-stage */
        #floating-time {
            flex: 0 0 auto;
            align-self: center;
            position: relative;
            bottom: auto;
            left: auto;
            transform: none;
            background: transparent;
            border: none;
            padding: clamp(4px, 1vmin, 6px) clamp(8px, 2vmin, 12px);
            border-radius: 0;
            font-size: clamp(1rem, 4.2vmin, 1.8rem);
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
            box-shadow: none;
            z-index: 10;
            pointer-events: none;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            width: min(var(--uhr-time-pill-w), 100%);
            min-width: 0;
            max-width: min(var(--uhr-time-pill-w), 100%);
            box-sizing: border-box;
        }

        #floating-time .uhr-time-h {
            color: var(--neon-blue);
            text-shadow: 0 0 14px rgba(0, 210, 255, 0.45);
        }

        #floating-time .uhr-time-sep {
            color: rgba(255, 255, 255, 0.45);
            text-shadow: none;
        }

        #floating-time .uhr-time-m {
            color: var(--neon-purple);
            text-shadow: 0 0 14px rgba(157, 80, 187, 0.45);
        }

        .val-display { display: none !important; }

        .angle-arc-beta { fill: rgba(255, 136, 0, 0.1); stroke: #ff8800; stroke-width: 2; }

        @media (max-height: 480px) and (orientation: landscape) {
            #main-content {
                --uhr-angle-pill-w: clamp(80px, 15vmin, 94px);
                --uhr-time-pill-w: 128px;
                gap: clamp(2px, 0.8vmin, 8px);
            }

            svg#clock {
                width: min(100% - 8px, min(400px, 72vmin));
            }

            #floating-tag, #floating-tag-beta {
                font-size: clamp(0.54rem, 0.26rem + 2vmin, 0.92rem);
                padding: clamp(3px, 1vmin, 7px) clamp(5px, 1.4vmin, 8px);
            }

            .uhr-stage {
                gap: clamp(4px, 1.5vmin, 10px);
            }

            #floating-time {
                padding: clamp(3px, 0.8vmin, 5px) clamp(6px, 1.6vmin, 10px);
            }
        }

        @media (max-width: 520px) {
            #hour-hand { stroke-width: 6; }
            #minute-hand { stroke-width: 4; }
            .angle-arc { stroke-width: 2.25; }
            .angle-arc-beta { stroke-width: 1.5; }
            .clock-face { stroke-width: 1.25; }
        }

        @media (max-width: 360px) {
            #main-content {
                --uhr-angle-pill-w: clamp(76px, 26vw, 90px);
                --uhr-time-pill-w: 118px;
            }

            #floating-tag, #floating-tag-beta {
                font-size: clamp(0.56rem, 0.28rem + 2.1vmin, 1rem);
            }

            .uhr-stage {
                gap: clamp(4px, 1.5vmin, 8px);
            }
        }

        /* Sidebar: Instrument-Card + Stats + Slider (scoped — nur Winkel-Uhr) */
        body.page-uhrzeit-winkel #sidebar-header {
            min-height: clamp(52px, 14vmin, 80px);
            margin-bottom: clamp(4px, 1.5vw, 8px);
        }

        body.page-uhrzeit-winkel #side-panel .instrument-card {
            padding: clamp(8px, 2.2vw, 14px) clamp(10px, 2.8vw, 16px);
            border-radius: clamp(12px, 2.8vw, 18px);
            gap: clamp(3px, 1vw, 6px);
            margin-bottom: clamp(4px, 1.2vw, 8px);
        }

        body.page-uhrzeit-winkel #side-panel .instrument-title {
            font-size: clamp(0.56rem, 1.4vw + 0.32rem, 0.72rem);
            letter-spacing: clamp(0.06em, 0.35vw, 2px);
        }

        body.page-uhrzeit-winkel #side-panel .stats-grid {
            gap: clamp(6px, 2vw, 12px);
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 132px), 1fr));
        }

        body.page-uhrzeit-winkel #side-panel .stats-card {
            padding: clamp(8px, 2vw, 12px);
            border-radius: clamp(10px, 2vw, 14px);
        }

        body.page-uhrzeit-winkel #side-panel .stats-label {
            font-size: clamp(0.48rem, 1.1vw + 0.26rem, 0.58rem);
            margin-bottom: clamp(3px, 1vw, 5px);
        }

        body.page-uhrzeit-winkel #side-panel .stats-val {
            font-size: clamp(0.78rem, 2vw + 0.38rem, 1.05rem);
        }

        body.page-uhrzeit-winkel #side-panel .cyber-slider {
            min-height: clamp(22px, 5.5vw, 30px);
            margin: clamp(4px, 1.2vw, 8px) 0;
        }

        body.page-uhrzeit-winkel #side-panel .cyber-slider::-webkit-slider-thumb {
            width: clamp(14px, 3.8vw, 18px);
            height: clamp(14px, 3.8vw, 18px);
            margin-top: -5px;
        }

        body.page-uhrzeit-winkel #side-panel .cyber-slider::-moz-range-thumb {
            width: clamp(14px, 3.8vw, 18px);
            height: clamp(14px, 3.8vw, 18px);
        }

        @media (max-width: 520px) {
            body.page-uhrzeit-winkel #side-panel #ui-container,
            body.page-uhrzeit-winkel #side-panel #data-container {
                font-size: clamp(0.72rem, 2.5vw, 0.88rem);
            }
        }
    </style>
</head>
<body class="page-uhrzeit-winkel">
    <!-- Mini Rail -->
    <nav id="mini-rail">
        <div class="nav-btn" onclick="toggleSidebar()" title="Menü umschalten">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
    </nav>

    <aside id="side-panel">
        <header id="sidebar-header"></header>
        <div id="ui-container"></div>
        <div id="data-container"></div>
    </aside>

    <main id="main-content">
        <div class="uhr-stage">
            <div id="floating-tag">α = 0.0°</div>
            <div class="uhr-clock-slot">
        <svg id="clock" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="95" class="clock-face" />
            <g id="ticks"></g>
            <path id="angle-arc-beta" class="angle-arc-beta" d="" />
            <path id="angle-arc" class="angle-arc" d="" />
            <line id="hour-hand" x1="100" y1="100" x2="100" y2="60" />
            <line id="minute-hand" x1="100" y1="100" x2="100" y2="45" />
            <circle cx="100" cy="100" r="4" fill="white" />
            
            <!-- Interactive Handles (Tips) -->
            <circle id="minute-handle" cx="100" cy="45" r="15" fill="transparent" style="cursor: grab;" />
            <circle id="hour-handle" cx="100" cy="62" r="15" fill="transparent" style="cursor: grab;" />
        </svg>
            </div>
            <div id="floating-tag-beta">β = 360.0°</div>
        </div>
        <div id="floating-time"><span class="uhr-time-h">12</span><span class="uhr-time-sep">:</span><span class="uhr-time-m">00</span></div>
    </main>

        <script src="js/cyber-left-chrome.js"></script>
<script src="js/branding/briefings.js?v=539"></script>
    <script src="js/branding/overlays.js?v=539"></script>
    <script src="js/i18n.js"></script>
    <script src="js/branding.js?v=539"></script>
    <script src="js/ui.js?v=539"></script>
    <script>
        function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
            if (window.CyberLeftChrome && typeof CyberLeftChrome.publishResolvedScale === 'function') {
                CyberLeftChrome.publishResolvedScale();
            }

            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
            }, 400);
        }
        /**
         * CHRONOMETRIC ANALYSIS LAB - ULTRA v5.3.8
         */
        window.addEventListener('load', () => {
            // 1. Branding & Briefing
            CyberBranding.init({
                useExternalStyles: true,
                title: CyberI18n.get('ui.coach_title'),
                subtitle: CyberI18n.get('clock.title')
            });

            CyberUI.init();

        if (window.CyberLeftChrome && typeof CyberLeftChrome.configure === 'function') {
            CyberLeftChrome.configure({ viewportOnlyZoom: true });
        }

            // 2. SVG State
            const hourHand = document.getElementById('hour-hand');
            const minuteHand = document.getElementById('minute-hand');
            const hourHandle = document.getElementById('hour-handle');
            const minuteHandle = document.getElementById('minute-handle');
            const clock = document.getElementById('clock');
            const ticksContainer = document.getElementById('ticks');

            let totalMinutes = 0;
            let activeDrag = null; // 'hour' or 'minute'

            function createTicks() {
                for (let i = 0; i < 60; i++) {
                    if (i % 5 === 0) {
                        const angle = (i * 6) * (Math.PI / 180);
                        const x1 = 100 + 85 * Math.sin(angle);
                        const y1 = 100 - 85 * Math.cos(angle);
                        const x2 = 100 + 92 * Math.sin(angle);
                        const y2 = 100 - 92 * Math.cos(angle);
                        const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        tick.setAttribute("x1", x1);
                        tick.setAttribute("y1", y1);
                        tick.setAttribute("x2", x2);
                        tick.setAttribute("y2", y2);
                        tick.setAttribute("stroke", "rgba(255,255,255,0.4)");
                        tick.setAttribute("stroke-width", "1.5");
                        ticksContainer.appendChild(tick);
                    }
                }
            }

            // 3. Update Engine
            let requestID = null;
            function updateClock(mins, skipSlider = false) {
                // totalMinutes stays float for sub-minute precision smoothness
                totalMinutes = (mins + 720) % 720;
                
                if (requestID) cancelAnimationFrame(requestID);
                requestID = requestAnimationFrame(() => {
                    // Internal high-precision angles
                    const minuteAngle = (totalMinutes % 60) * 6;
                    const hourAngle = (totalMinutes % 720) * 0.5;

                    // 1. Smooth Visual Rotation (Floating Point)
                    minuteHand.setAttribute("transform", `rotate(${minuteAngle}, 100, 100)`);
                    hourHand.setAttribute("transform", `rotate(${hourAngle}, 100, 100)`);
                    minuteHandle.setAttribute("transform", `rotate(${minuteAngle}, 100, 100)`);
                    hourHandle.setAttribute("transform", `rotate(${hourAngle}, 100, 100)`);

                    // 2. Rounded Data for HUD (User-friendly)
                    const displayMins = Math.round(totalMinutes);
                    const hours = Math.floor(displayMins / 60) % 12;
                    const minsOnClock = displayMins % 60;
                    const hourDisplay = hours === 0 ? 12 : hours;
                    const hStr = hourDisplay.toString().padStart(2, '0');
                    const mStr = minsOnClock.toString().padStart(2, '0');
                    document.getElementById('floating-time').innerHTML =
                        `<span class="uhr-time-h">${hStr}</span><span class="uhr-time-sep">:</span><span class="uhr-time-m">${mStr}</span>`;

                    // 3. Silent Slider Sync (Floored for slider increments)
                    if (!skipSlider) {
                        const slider = document.querySelector('#slider-mount input');
                        if (slider) {
                            slider.value = displayMins;
                        }
                    }

                    // 4. UI Stats Sync (Rounded)
                    CyberUI.updateStatsGrid('data-container', [
                        { label: CyberI18n.get('clock.angle_alpha'), value: diff + '°', color: 'var(--neon-blue)' },
                        { label: CyberI18n.get('clock.angle_beta'), value: beta + '°', color: '#ff8800' }
                    ]);

                    // 5. High-Precision SVG Arcs
                    const r = 25;
                    const startA = (hourAngle - 90) * (Math.PI / 180);
                    const endA = (minuteAngle - 90) * (Math.PI / 180);
                    const x1 = 100 + r * Math.cos(startA);
                    const y1 = 100 + r * Math.sin(startA);
                    const x2 = 100 + r * Math.cos(endA);
                    const y2 = 100 + r * Math.sin(endA);
                    const clockWise = (minuteAngle - hourAngle + 360) % 360 < 180 ? 1 : 0;
                    
                    if (diff === 0) {
                        document.getElementById('angle-arc').setAttribute("d", "");
                        const d_beta_full = `M 100 ${100-r} A ${r} ${r} 0 1 1 100 ${100+r} A ${r} ${r} 0 1 1 100 ${100-r} Z`;
                        document.getElementById('angle-arc-beta').setAttribute("d", d_beta_full);
                    } else {
                        document.getElementById('angle-arc').setAttribute("d", `M ${x1} ${y1} A ${r} ${r} 0 0 ${clockWise} ${x2} ${y2} L 100 100 Z`);
                        document.getElementById('angle-arc-beta').setAttribute("d", `M ${x1} ${y1} A ${r} ${r} 0 1 ${1 - clockWise} ${x2} ${y2} L 100 100 Z`);
                    }
                });
            }

            // 4. Interaction Logic
            function getMouseAngle(e) {
                const pt = clock.createSVGPoint();
                if (e.touches && e.touches.length > 0) {
                    pt.x = e.touches[0].clientX;
                    pt.y = e.touches[0].clientY;
                } else {
                    pt.x = e.clientX;
                    pt.y = e.clientY;
                }
                const svgP = pt.matrixTransform(clock.getScreenCTM().inverse());
                const dx = svgP.x - 100;
                const dy = svgP.y - 100;
                let angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
                if (angle < 0) angle += 360;
                return angle;
            }

            const startDrag = (type) => (e) => {
                activeDrag = type;
                document.body.style.cursor = 'grabbing';
                e.preventDefault();
            };

            const doDrag = (e) => {
                if (!activeDrag) return;
                const angle = getMouseAngle(e);
                
                if (activeDrag === 'minute') {
                    // Continuous minute mapping from angle
                    const m = angle / 6;
                    const h = Math.floor(totalMinutes / 60);
                    updateClock(h * 60 + m);
                } else {
                    // Continuous total time mapping from hour angle (360 deg = 720 mins)
                    const totalMins = angle * 2;
                    updateClock(totalMins);
                }
            };

            const endDrag = () => {
                activeDrag = null;
                document.body.style.cursor = 'default';
            };

            minuteHandle.addEventListener('mousedown', startDrag('minute'));
            hourHandle.addEventListener('mousedown', startDrag('hour'));
            minuteHandle.addEventListener('touchstart', startDrag('minute'), { passive: false });
            hourHandle.addEventListener('touchstart', startDrag('hour'), { passive: false });

            window.addEventListener('mousemove', doDrag);
            window.addEventListener('touchmove', doDrag, { passive: false });
            window.addEventListener('mouseup', endDrag);
            window.addEventListener('touchend', endDrag);

            // 5. UI Layout Deployment
            CyberUI.createCard('ui-container', CyberI18n.get('clock.time_control'), '<div id="slider-mount"></div>', 'var(--neon-blue)');
            CyberUI.createStatsGrid('data-container', [
                { label: CyberI18n.get('clock.angle_alpha'), value: '0°', color: 'var(--neon-blue)' },
                { label: CyberI18n.get('clock.angle_beta'), value: '360°', color: '#ff8800' }
            ]);

            CyberUI.createSlider('slider-mount', '', 0, 719, 0, 1, (val) => {
                updateClock(parseFloat(val), true);
            }, 'var(--neon-blue)');

            createTicks();
            updateClock(0);
        });
    </script>
</body>
