<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Winkelsumme-Labor | Doc Alvers Mathe-Labor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="resources/favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <link rel="stylesheet" href="js/cyber-lab-overrides.css">
    <link rel="stylesheet" href="js/branding.styles.extracted.css">
    <style>
        /* Shell wie template.html — keine Seiten-spezifischen Grid-/Overlay-Overrides */

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #sidebar-header {
            width: 100%;
            min-height: 80px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }

        #main-content {
            flex-grow: 1;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at 10% 20%, rgba(0, 210, 255, 0.05) 0%, transparent 40%);
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at 50% 50%, rgba(5, 25, 55, 1) 0%, rgba(2, 10, 25, 1) 100%);
        }

        #canvas-container canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        .cyber-grid {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: min(120px, 11vw) min(120px, 11vw);
            pointer-events: none;
            z-index: 0;
        }

        #math-log {
            margin-top: 10px;
            max-height: 220px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .log-entry {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
        }

        .corner-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <nav id="mini-rail">
        <div class="nav-btn" onclick="toggleSidebar()" title="Menü umschalten">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
    </nav>

    <aside id="side-panel">
        <header id="sidebar-header" style="min-height: 80px;"></header>
        <div id="ui-container"></div>
    </aside>

    <main id="main-content">
        <div id="canvas-container">
            <div class="cyber-grid" aria-hidden="true"></div>
            <canvas id="canvas"></canvas>
        </div>
    </main>

    <script src="js/cyber-left-chrome.js"></script>
    <script src="js/branding/briefings.js"></script>
    <script src="js/branding/overlays.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script>
        function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
            if (window.CyberLeftChrome && typeof CyberLeftChrome.publishResolvedScale === 'function') {
                CyberLeftChrome.publishResolvedScale();
            }
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
                if (typeof init === 'function') init();
                if (window.CyberLeftChrome && typeof CyberLeftChrome.publishResolvedScale === 'function') {
                    CyberLeftChrome.publishResolvedScale();
                }
            }, 400);
        }

        CyberBranding.init({
            useExternalStyles: true,
            title: CyberI18n.get('ui.coach_title'),
            subtitle: CyberI18n.get('ui.angle_sum')
        });
        CyberUI.init();

        if (window.CyberLeftChrome && typeof CyberLeftChrome.configure === 'function') {
            CyberLeftChrome.configure({ viewportOnlyZoom: true });
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        const neonColors = ['#00d2ff', '#4ade80', '#ffde00', '#f472b6', '#9d50bb', '#00ffa2', '#ff8800'];

        let width = 0;
        let height = 0;
        let points = [];
        let nEcken = 3;
        let dragIdx = -1;
        const BOGEN_RAD = 50;

        function setupUI() {
            CyberUI.createCard(
                'ui-container',
                CyberI18n.get('polygon.vertices'),
                `
                <div class="corner-grid" id="btn-container"></div>
                <button class="cyber-btn" onclick="resetLab()" style="width:100%; border-color:var(--neon-blue); color:var(--neon-blue);">${CyberI18n.get('ui.reset')}</button>
            `,
                'var(--neon-blue)'
            );

            CyberUI.createCard(
                'ui-container',
                CyberI18n.get('geometry.angle_analysis'),
                `
                <div class="stat-card" style="text-align:center;">
                    <span class="stats-label">${CyberI18n.get('polygon.sum_interior')}</span>
                    <div id="sum-val" class="stats-val" style="font-size:2.4rem !important; text-shadow:0 0 20px rgba(255,255,255,0.3);">0°</div>
                </div>
                <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:15px; margin-top: 10px;">
                    <span class="stats-label">${CyberI18n.get('polygon.angle_protocol')}</span>
                    <div id="math-log"></div>
                </div>
            `,
                'var(--neon-purple)'
            );

            updateButtons();
        }

        function updateButtons() {
            const btnContainer = document.getElementById('btn-container');
            if (!btnContainer) return;
            btnContainer.innerHTML = '';
            for (let i = 3; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'cyber-btn' + (i === nEcken ? ' active' : '');
                btn.innerText = CyberI18n.get('polygon.vertex_short', { n: i });
                btn.onclick = () => {
                    nEcken = i;
                    updateButtons();
                    initPolygon(i);
                };
                btnContainer.appendChild(btn);
            }
        }

        function init() {
            const dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            width = rect.width;
            height = rect.height;

            canvas.width = Math.max(1, Math.floor(width * dpr));
            canvas.height = Math.max(1, Math.floor(height * dpr));
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            initPolygon(nEcken);
        }

        function resetLab() {
            initPolygon(nEcken);
        }

        function initPolygon(n) {
            points = [];
            const cx = width / 2;
            const cy = height * 0.42;
            const radius = Math.min(width, height) * 0.22;
            for (let i = 0; i < n; i++) {
                const a = (2 * Math.PI * i) / n - Math.PI / 2;
                points.push({ x: cx + radius * Math.cos(a), y: cy + radius * Math.sin(a) });
            }
            draw();
        }

        function draw() {
            ctx.setTransform(window.devicePixelRatio || 1, 0, 0, window.devicePixelRatio || 1, 0, 0);
            ctx.clearRect(0, 0, width, height);

            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            const gridStep = Math.max(40, Math.min(50, Math.min(width, height) / 14));
            for (let x = 0; x < width; x += gridStep) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += gridStep) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }

            const n = points.length;
            let logHtml = '';
            let totalDeg = 0;
            const winkelWerte = [];

            let area = 0;
            for (let i = 0; i < n; i++)
                area += points[i].x * points[(i + 1) % n].y - points[(i + 1) % n].x * points[i].y;
            const isCW = area < 0;

            for (let i = 0; i < n; i++) {
                const P = points[i];
                const prev = points[(i + n - 1) % n];
                const next = points[(i + 1) % n];
                const a1 = Math.atan2(prev.y - P.y, prev.x - P.x);
                const a2 = Math.atan2(next.y - P.y, next.x - P.x);
                let diff = a2 - a1;
                if (isCW) {
                    while (diff < 0) diff += Math.PI * 2;
                } else {
                    while (diff > 0) diff -= Math.PI * 2;
                }

                const deg = Math.abs(diff) * (180 / Math.PI);
                winkelWerte.push(Math.abs(diff));
                totalDeg += deg;

                const color = neonColors[i % neonColors.length];
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = color;
                ctx.fillStyle = color + '33';
                ctx.beginPath();
                ctx.moveTo(P.x, P.y);
                ctx.arc(P.x, P.y, BOGEN_RAD, a1, a1 + diff, !isCW);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();

                logHtml += `<div class="log-entry"><span style="color:${color}">${CyberI18n.get('polygon.angle_label', { n: i + 1 })}</span><span>${deg.toFixed(1)}°</span></div>`;
            }

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < n; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.closePath();
            ctx.stroke();

            const gY = height * 0.82;
            const gX = width / 2;
            const lineLen = Math.min(260, width * 0.38);
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(gX - lineLen, gY);
            ctx.lineTo(gX + lineLen, gY);
            ctx.stroke();

            const sumAngles = winkelWerte.reduce((s, w) => s + w, 0);
            if (sumAngles > 1e-6) {
                const scale = Math.PI / sumAngles;
                const proofR = Math.min(BOGEN_RAD * 1.6, lineLen * 0.82);
                let theta = Math.PI;
                winkelWerte.forEach((w, i) => {
                    const sweep = w * scale;
                    const color = neonColors[i % neonColors.length];
                    ctx.save();
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = color;
                    ctx.fillStyle = color + '60';
                    ctx.beginPath();
                    ctx.moveTo(gX, gY);
                    ctx.arc(gX, gY, proofR, theta, theta + sweep, false);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                    ctx.restore();
                    theta += sweep;
                });
            }

            points.forEach((p, idx) => {
                const color = neonColors[idx % neonColors.length];
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = color;
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
            });

            const sumValEl = document.getElementById('sum-val');
            const mathLogEl = document.getElementById('math-log');
            if (sumValEl) sumValEl.innerText = Math.round(totalDeg) + '°';
            if (mathLogEl) mathLogEl.innerHTML = logHtml;
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.onpointerdown = (e) => {
            const pos = getPos(e);
            dragIdx = points.findIndex((p) => Math.hypot(p.x - pos.x, p.y - pos.y) < 30);
            if (dragIdx !== -1) canvas.setPointerCapture(e.pointerId);
        };

        canvas.onpointermove = (e) => {
            if (dragIdx === -1) return;
            const pos = getPos(e);

            const margin = 30;
            let nx = Math.max(margin, Math.min(width - margin, pos.x));
            let ny = Math.max(margin, Math.min(height - margin, pos.y));

            const minDist = 35;
            for (let i = 0; i < points.length; i++) {
                if (i === dragIdx) continue;
                if (Math.hypot(points[i].x - nx, points[i].y - ny) < minDist) return;
            }

            const nv = points.length;
            const testPoints = [...points];
            testPoints[dragIdx] = { x: nx, y: ny };

            const intersects = (p1, p2, p3, p4) => {
                const det = (p2.x - p1.x) * (p4.y - p3.y) - (p2.y - p1.y) * (p4.x - p3.x);
                if (det === 0) return false;
                const lambda = ((p4.y - p3.y) * (p4.x - p1.x) + (p3.x - p4.x) * (p4.y - p1.y)) / det;
                const gamma = ((p1.y - p2.y) * (p4.x - p1.x) + (p2.x - p1.x) * (p4.y - p1.y)) / det;
                return 0.01 < lambda && lambda < 0.99 && 0.01 < gamma && gamma < 0.99;
            };

            let hasIntersection = false;
            for (let i = 0; i < nv; i++) {
                for (let j = i + 2; j < nv; j++) {
                    if (i === 0 && j === nv - 1) continue;
                    if (
                        intersects(testPoints[i], testPoints[(i + 1) % nv], testPoints[j], testPoints[(j + 1) % nv])
                    ) {
                        hasIntersection = true;
                        break;
                    }
                }
                if (hasIntersection) break;
            }

            if (!hasIntersection) {
                points[dragIdx] = { x: nx, y: ny };
                draw();
            }
        };

        canvas.onpointerup = (e) => {
            dragIdx = -1;
            try {
                canvas.releasePointerCapture(e.pointerId);
            } catch (_) {}
        };

        window.onresize = init;
        setupUI();
        document.fonts.ready.then(init);
    </script>
</body>

</html>
