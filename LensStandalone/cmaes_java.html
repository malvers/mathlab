<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPTI-LENS Standalone | Premium Evolution Lab</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <style>
        .controls-hint {
            margin-top: 20px !important;
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between !important;
            gap: 10px !important;
            padding: 15px 0 0 0 !important;
            border-top: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .hint {
            font-size: 8px !important;
            flex-direction: column !important;
            align-items: center !important;
            text-align: center !important;
            flex: 1 !important;
        }

        .hint span {
            color: #ffcc00 !important;
            display: block !important;
            width: auto !important;
        }
    </style>
</head>

<body>
    <div id="app-container">
        <!-- Main Canvas Area -->
        <main id="viewport">
            <canvas id="lensCanvas"></canvas>

            <!-- Floating HUD -->
            <div id="hud-top">
                <div class="brand">
                    <span class="logo">OPTI-LENS</span>
                    <span class="version">v1.0.0</span>
                </div>
                <div class="mission-status">
                    <span id="status-text">SYSTEM READY</span>
                    <div class="pulse-dot"></div>
                </div>
            </div>

            <!-- Telemetry Sidebar -->
            <aside id="telemetry">
                <div class="glass-card">
                    <h3>EVOLUTION DATA</h3>
                    <div class="data-grid">
                        <div class="data-item">
                            <label>GENERATION</label>
                            <span id="val-gen" class="neon-text">0</span>
                        </div>
                        <div class="data-item">
                            <label>FITNESS</label>
                            <span id="val-fit" class="neon-text">0.000000</span>
                        </div>
                        <div class="data-item">
                            <label>PENALTY</label>
                            <span id="val-penalty" class="neon-text">0.000</span>
                        </div>
                        <div class="data-item">
                            <label>CALLS</label>
                            <span id="val-calls" class="neon-text">0</span>
                        </div>
                    </div>
                </div>

                <div class="glass-card">
                    <h3>SYSTEM CONFIG</h3>
                    <div class="config-list">
                        <div class="config-item">
                            <label>REFRACTION (n)</label>
                            <span id="val-n">1.60</span>
                        </div>
                        <div class="config-item">
                            <label>DIMENSION</label>
                            <span id="val-dim">46</span>
                        </div>
                        <div class="config-item">
                            <label>SIGMA</label>
                            <span id="val-sigma">0.1</span>
                        </div>
                    </div>
                </div>

                <div class="glass-card">
                    <h3>CONTROL FLAGS</h3>
                    <div class="config-list">
                        <label class="check-item">
                            <input type="checkbox" id="check-front">
                            <span>OPTIMIZE FRONT</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" id="check-back" checked>
                            <span>OPTIMIZE BACK</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" id="check-symmetry" checked>
                            <span>SYMMETRY MODE</span>
                        </label>
                    </div>
                </div>

                <!-- Control Quick Actions -->
                <div class="controls-hint">
                    <div class="hint"><span>SPACE</span> PLAY/PAUSE</div>
                    <div class="hint"><span>ESC</span> RESET</div>
                    <div class="hint"><span>R</span> RAYS ON/OFF</div>
                    <div class="hint"><span>1-4</span> MODES</div>
                </div>
            </aside>

            <!-- Bottom Control Bar -->
            <footer id="control-bar">
                <button id="btn-play" class="action-btn primary">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z" />
                    </svg>
                    START
                </button>
                <button id="btn-reset" class="action-btn">RESET</button>
                <div class="divider"></div>
                <div class="slider-group">
                    <label>REFRACTION</label>
                    <input type="range" id="slider-n" min="1.05" max="2.0" step="0.01" value="1.60">
                </div>
                <div class="slider-group">
                    <label>SIGMA</label>
                    <input type="range" id="slider-sigma" min="0.01" max="0.5" step="0.01" value="0.1">
                </div>
            </footer>
        </main>
    </div>

    <!-- Logic Layer -->
    <script src="cmaes_java.js"></script>
</body>

</html>
