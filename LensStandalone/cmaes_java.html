<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Linsenoptimierung | Premium Evolution Lab</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=22">
    <style>
        .controls-hint {
            margin-top: 20px !important;
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between !important;
            gap: 10px !important;
            padding: 15px 0 0 0 !important;
            border-top: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

        .hint {
            font-size: 8px !important;
            flex-direction: column !important;
            align-items: center !important;
            text-align: center !important;
            flex: 1 !important;
        }

        .hint span {
            color: #ffcc00 !important;
            display: block !important;
            width: auto !important;
        }
    </style>
</head>

<body>
    <div id="app-container">
        <!-- Main Canvas Area -->
        <main id="viewport">
            <canvas id="lensCanvas"></canvas>

            <!-- Running Indicator (top-left) -->
            <div id="running-indicator" class="hidden">
                <span class="running-dot"></span>
                <span class="running-text">RUNNING</span>
            </div>

            <!-- Branding Header (top-right) -->
            <div class="canvas-branding">
                <h1>DOC ALVERS MATHE-LABOR</h1>
                <div class="canvas-subtitle">Optimierung einer Linse mit Covarianz Matrix Adaptions Evolutionsstrategie</div>
            </div>

            <!-- Telemetry Sidebar -->
            <aside id="telemetry">
                <div class="glass-card">
                    <h3>EVOLUTION DATA</h3>
                    <div class="data-grid">
                        <div class="data-item">
                            <label>GENERATION</label>
                            <span id="val-gen" class="neon-text">0</span>
                        </div>
                        <div class="data-item">
                            <label>FITNESS</label>
                            <span id="val-fit" class="neon-text">0.000000</span>
                        </div>
                        <div class="data-item">
                            <label>PENALTY</label>
                            <span id="val-penalty" class="neon-text">0.000</span>
                        </div>
                        <div class="data-item">
                            <label>CALLS</label>
                            <span id="val-calls" class="neon-text">0</span>
                        </div>
                    </div>
                </div>

                <div class="glass-card">
                    <h3>SYSTEM CONFIG</h3>
                    <div class="config-list">
                        <div class="config-item">
                            <label>REFRACTION (n)</label>
                            <span id="val-n">1.60</span>
                        </div>
                        <div class="config-item">
                            <label>DIMENSION</label>
                            <span id="val-dim">13</span>
                        </div>
                        <div class="config-item">
                            <label>SIGMA</label>
                            <span id="val-sigma">0.1</span>
                        </div>
                    </div>
                </div>

                <div class="glass-card">
                    <h3>CONTROL FLAGS</h3>
                    <div class="config-list check-grid">
                        <label class="check-item">
                            <input type="checkbox" id="check-front">
                            <span>OPTIMIZE FRONT</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" id="check-back" checked>
                            <span>OPTIMIZE BACK</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" id="check-symmetry" checked>
                            <span>SYMMETRY MODE</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" id="check-points" checked>
                            <span>SHOW POINTS</span>
                        </label>
                        <label class="check-item">
                            <input type="checkbox" id="check-oscillate">
                            <span>FOCUS OSCILLATE</span>
                        </label>
                    </div>
                </div>

            </aside>

            <!-- Bottom Control Bar -->
            <footer id="control-bar">
                <div class="btn-group">
                    <button id="btn-play" class="action-btn primary">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                        START
                    </button>
                    <button id="btn-reset" class="action-btn">RESET</button>
                    <button id="btn-reset-view" class="action-btn">RESET VIEW</button>
                </div>
                <div class="slider-group">
                    <label>REFRACTION</label>
                    <input type="range" id="slider-n" min="1.05" max="2.0" step="0.01" value="1.60">
                </div>
                <div class="slider-group">
                    <label>SIGMA</label>
                    <input type="range" id="slider-sigma" min="0.01" max="0.5" step="0.01" value="0.1">
                </div>
            </footer>
        </main>
    </div>

    <!-- Logic Layer -->
    <script src="../js/ui.js?v=4"></script>
    <script>
        CyberUI.init();
    </script>
    <script src="cmaes_java.js?v=18"></script>
</body>

</html>
