<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPTI-LENS Standalone | Premium Evolution Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- Main Canvas Area -->
        <main id="viewport">
            <canvas id="lensCanvas"></canvas>
            
            <!-- Floating HUD -->
            <div id="hud-top">
                <div class="brand">
                    <span class="logo">OPTI-LENS</span>
                    <span class="version">v1.0.0</span>
                </div>
                <div class="mission-status">
                    <span id="status-text">SYSTEM READY</span>
                    <div class="pulse-dot"></div>
                </div>
            </div>

            <!-- Telemetry Sidebar -->
            <aside id="telemetry">
                <div class="glass-card">
                    <h3>EVOLUTION DATA</h3>
                    <div class="data-grid">
                        <div class="data-item">
                            <label>GENERATION</label>
                            <span id="val-gen" class="neon-text">0</span>
                        </div>
                        <div class="data-item">
                            <label>FITNESS</label>
                            <span id="val-fit" class="neon-text">0.000000</span>
                        </div>
                        <div class="data-item">
                            <label>PENALTY</label>
                            <span id="val-penalty" class="neon-text">0.000</span>
                        </div>
                        <div class="data-item">
                            <label>CALLS</label>
                            <span id="val-calls" class="neon-text">0</span>
                        </div>
                    </div>
                </div>

                <div class="glass-card">
                    <h3>SYSTEM CONFIG</h3>
                    <div class="config-list">
                        <div class="config-item">
                            <label>REFRACTION (n)</label>
                            <span id="val-n">1.60</span>
                        </div>
                        <div class="config-item">
                            <label>DIMENSION</label>
                            <span id="val-dim">20</span>
                        </div>
                        <div class="config-item">
                            <label>OPTIMODE</label>
                            <span id="val-mode">BACK</span>
                        </div>
                        <div class="config-item">
                            <label>SIGMA</label>
                            <span id="val-sigma">0.1</span>
                        </div>
                    </div>
                </div>

                <!-- Control Quick Actions -->
                <div class="controls-hint">
                    <div class="hint"><span>SPACE</span> PLAY/PAUSE</div>
                    <div class="hint"><span>R</span> RESET</div>
                    <div class="hint"><span>M</span> MOVE FOCUS</div>
                    <div class="hint"><span>1-3</span> MODES</div>
                </div>
            </aside>

            <!-- Bottom Control Bar -->
            <footer id="control-bar">
                <button id="btn-play" class="action-btn primary">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    START
                </button>
                <button id="btn-reset" class="action-btn">RESET</button>
                <div class="divider"></div>
                <div class="slider-group">
                    <label>REFRACTION</label>
                    <input type="range" id="slider-n" min="1.1" max="2.0" step="0.01" value="1.60">
                </div>
                <div class="slider-group">
                    <label>SIGMA</label>
                    <input type="range" id="slider-sigma" min="0.01" max="0.5" step="0.01" value="0.1">
                </div>
            </footer>
        </main>
    </div>

    <!-- Logic Layer -->
    <script src="cmaes_java.js"></script>
</body>
</html>
