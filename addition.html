<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schriftliche Addition | docalvers</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <style>
        body {
            font-family: 'Orbitron', sans-serif !important;
        }

        #canvas-container {
            position: relative;
            background: radial-gradient(circle at 50% 50%, rgba(5, 25, 55, 1) 0%, rgba(2, 10, 25, 1) 100%);
            overflow: hidden;
        }

        .cyber-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        #math-coach-box {
            position: absolute;
            width: 380px;
            background: rgba(10, 20, 40, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 210, 255, 0.05);
            color: white;
            font-family: 'Orbitron', sans-serif;
            pointer-events: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        #math-coach-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .coach-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: #00d2ff;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .coach-title::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00d2ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00d2ff;
        }

        .coach-message {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        .coach-math-highlight {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: #ffde00;
        }

        .stats-card {
            padding: 8px 12px !important;
            min-height: 50px !important;
        }

        .stats-val {
            font-size: 1.1rem !important;
        }

        .cyber-label {
            font-family: 'Orbitron', sans-serif !important;
            font-size: 0.65rem !important;
            letter-spacing: 1px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <aside id="side-panel">
        <header id="sidebar-header" style="min-height: 80px;"></header>
        <div id="ui-container"></div>
        <div
            style="padding: 20px; text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.2); font-family: 'Orbitron';">
            &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull;
        </div>
    </aside>

    <main id="main-content">
        <div id="canvas-container">
            <div class="cyber-grid"></div>
            <div id="math-coach-box">
                <div class="coach-title">BESCHREIBUNG DER SCHRITTE</div>
                <div id="coach-content" class="coach-message">Initialisiere Analyse...</div>
            </div>
            <canvas id="canvas"></canvas>
        </div>
    </main>

    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // 1. Branding & UI Init
        const BRAND_BLUE = "#00d2ff";
        const DIGIT_COLORS = ["#FFC107", "#9d00ff", "#00ff00", "#4CAF50", "#F44336"];

        CyberBranding.init({
            title: "Doc Alvers Mathe-Labor",
            subtitle: "SCHRIFTLICHE ADDITION"
        });
        CyberUI.init();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        // State (Default 7-digit numbers)
        let summand1 = 4567890;
        let summand2 = 1234567;
        let currentStep = -1;
        let stepSequence = [];

        function setupUI() {
            CyberUI.createCard('ui-container', 'ADDITION', `
                <div class="cyber-control-group">
                    <label class="cyber-label">SUMMAND 1</label>
                    <input type="number" id="s1-input" class="cyber-select" value="${summand1}" onchange="updateSummands()">
                </div>
                <div class="cyber-control-group" style="margin-top:25px;">
                    <label class="cyber-label">SUMMAND 2</label>
                    <input type="number" id="s2-input" class="cyber-select" value="${summand2}" onchange="updateSummands()">
                </div>
                <button class="cyber-btn" onclick="resetSteps()" style="width:100%; margin-top:20px; border-color:var(--neon-blue);">LABOR RESET</button>
            `, BRAND_BLUE);

            CyberUI.createCard('ui-container', 'STEUERUNG', `
                <div class="stats-grid">
                    <div class="stats-card" onclick="nextStep()" style="cursor:pointer; text-align:center;">
                        <span class="stats-label">WEITER</span>
                        <span class="stats-val" style="font-size:1.4rem;">◀</span>
                    </div>
                    <div class="stats-card" onclick="prevStep()" style="cursor:pointer; text-align:center;">
                        <span class="stats-label">ZURÜCK</span>
                        <span class="stats-val" style="font-size:1.4rem;">▶</span>
                    </div>
                </div>
                <div id="step-info" style="margin-top:15px; font-family:'Orbitron'; font-size:0.7rem; color:rgba(255,255,255,0.7); min-height:80px; border-left:2px solid var(--neon-blue); padding-left:12px; display:none;">
                </div>
            `, '#ff9d00');
        }

        function buildStepSequence() {
            stepSequence = [];
            const s1Str = String(summand1);
            const s2Str = String(summand2);
            const maxLen = Math.max(s1Str.length, s2Str.length);

            let carry = 0;
            for (let i = 0; i < maxLen; i++) {
                // Focus column
                stepSequence.push({ type: 'focus', col: i });

                // Calculate
                const d1 = parseInt(s1Str[s1Str.length - 1 - i] || 0);
                const d2 = parseInt(s2Str[s2Str.length - 1 - i] || 0);
                const sum = d1 + d2 + carry;

                stepSequence.push({
                    type: 'calculate',
                    col: i,
                    d1, d2,
                    oldCarry: carry,
                    sum: sum,
                    newCarry: Math.floor(sum / 10),
                    digit: sum % 10
                });

                carry = Math.floor(sum / 10);
            }

            if (carry > 0) {
                stepSequence.push({
                    type: 'final-carry',
                    col: maxLen,
                    carry: carry
                });
            }

            stepSequence.push({ type: 'complete' });
        }

        function updateSummands() {
            summand1 = parseInt(document.getElementById('s1-input').value) || 0;
            summand2 = parseInt(document.getElementById('s2-input').value) || 0;
            resetSteps();
        }

        function resetSteps() {
            currentStep = -1;
            buildStepSequence();
            draw();
        }

        function nextStep() {
            if (currentStep < stepSequence.length - 1) {
                currentStep++;
                draw();
            }
        }

        function prevStep() {
            if (currentStep > -1) {
                currentStep--;
                draw();
            }
        }

        function init() {
            const dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            buildStepSequence();
            draw();
        }

        function draw() {
            const rect = container.getBoundingClientRect();
            const width = rect.width;
            const height = rect.height;
            ctx.clearRect(0, 0, width, height);

            const s1Str = String(summand1);
            const s2Str = String(summand2);
            // Ensure we have enough space for the summands, the potential carry, AND the '+' sign
            const maxCols = Math.max(s1Str.length, s2Str.length) + 2;

            // Dynamic Font Sizing
            const fontSize = Math.min(width * 0.08, height * 0.12);
            ctx.font = `bold ${fontSize}px Orbitron`;
            ctx.textBaseline = 'middle';
            const charWidth = fontSize * 0.85; // Slightly wider for Orbitron grid
            const rowHeight = fontSize * 1.5;

            // Positioning & Ensemble Alignment
            const coachBox = document.getElementById('math-coach-box');
            const coachWidth = 380;
            const gap = 80;
            const calcWidth = maxCols * charWidth;
            const ensembleWidth = calcWidth + gap + coachWidth;
            const ensembleStartX = (width - ensembleWidth) / 2;

            // startX is the center of the rightmost column
            const startX = ensembleStartX + (maxCols - 1.5) * charWidth;
            const startY = height / 2 - rowHeight;

            if (coachBox) {
                coachBox.style.left = `${ensembleStartX + calcWidth + gap}px`;
                coachBox.style.top = `${height / 2 - 100}px`;
                coachBox.classList.add('visible');
            }

            const step = currentStep >= 0 ? stepSequence[currentStep] : null;

            // 1. Draw Summands (Center Aligned in Columns)
            ctx.textAlign = 'center';

            // Row 1
            for (let i = 0; i < s1Str.length; i++) {
                const isFocused = step && step.col === i && step.type !== 'complete';
                ctx.fillStyle = isFocused ? '#ffde00' : BRAND_BLUE;
                if (isFocused) { ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = '#ffde00'; }
                ctx.fillText(s1Str[s1Str.length - 1 - i], startX - i * charWidth, startY);
                if (isFocused) ctx.restore();
            }

            // Row 2 (with +)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.font = `${fontSize}px Orbitron`; // Non-bold for '+'
            // The '+' sign is now safely shifted to the left of any potential carry
            const plusCol = maxCols - 1;
            ctx.fillText('+', startX - (plusCol - 0.5) * charWidth, startY + rowHeight);

            ctx.font = `bold ${fontSize}px Orbitron`; // Reset to bold for digits
            for (let i = 0; i < s2Str.length; i++) {
                const isFocused = step && step.col === i && step.type !== 'complete';
                ctx.fillStyle = isFocused ? '#ffde00' : BRAND_BLUE;
                if (isFocused) { ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = '#ffde00'; }
                ctx.fillText(s2Str[s2Str.length - 1 - i], startX - i * charWidth, startY + rowHeight);
                if (isFocused) ctx.restore();
            }

            // Separator
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(startX - (plusCol + 0.2) * charWidth, startY + rowHeight * 1.6);
            ctx.lineTo(startX + charWidth * 0.6, startY + rowHeight * 1.6);
            ctx.stroke();

            // 3. Draw Carries & Result
            for (let i = 0; i <= currentStep; i++) {
                const s = stepSequence[i];
                if (s.type === 'calculate') {
                    // Carry for NEXT column (placed just above separator)
                    if (s.newCarry > 0) {
                        ctx.save();
                        ctx.font = `bold ${fontSize * 0.35}px Orbitron`;

                        // Pedagogy: Only the single most recent "action" carry stays gold
                        const isCurrent = (i === currentStep);

                        ctx.fillStyle = isCurrent ? '#ffde00' : 'rgba(150, 150, 150, 0.4)';
                        if (isCurrent) {
                            ctx.shadowBlur = 15; ctx.shadowColor = '#ffde00';
                        }
                        ctx.fillText(s.newCarry, startX - (s.col + 1) * charWidth, startY + rowHeight * 1.45);
                        ctx.restore();
                    }
                    // Result digit
                    ctx.font = `bold ${fontSize}px Orbitron`;
                    ctx.fillStyle = 'white';
                    ctx.fillText(s.digit, startX - s.col * charWidth, startY + rowHeight * 2.2);
                }
                if (s.type === 'final-carry') {
                    const isCurrent = (i === currentStep);
                    ctx.font = `bold ${fontSize}px Orbitron`;
                    ctx.fillStyle = isCurrent ? '#ffde00' : 'white';
                    if (isCurrent) { ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = '#ffde00'; }
                    ctx.fillText(s.carry, startX - s.col * charWidth, startY + rowHeight * 2.2);
                    if (isCurrent) ctx.restore();
                }
            }

            updateMessages();
        }

        function updateMessages() {
            const coach = document.getElementById('coach-content');
            if (currentStep === -1) {
                coach.innerHTML = "Bereit für die Addition von <span class='coach-math-highlight'>" + summand1 + "</span> und <span class='coach-math-highlight'>" + summand2 + "</span>. Wir rechnen von rechts nach links.";
                return;
            }

            const step = stepSequence[currentStep];
            if (step.type === 'focus') {
                const unit = step.col === 0 ? "Einerstelle" : (step.col === 1 ? "Zehnerstelle" : (step.col === 2 ? "Hunderterstelle" : "nächste Stelle"));
                coach.innerHTML = `Wir betrachten die <span class='coach-math-highlight'>${unit}</span>.`;
            } else if (step.type === 'calculate') {
                coach.innerHTML = `Wir addieren <b style="color:#ffde00">${step.d1}</b> + <b style="color:#ffde00">${step.d2}</b> ${step.oldCarry > 0 ? '+ <b style="color:#ffde00">' + step.oldCarry + '</b> (Übertrag)' : ''} = <span class='coach-math-highlight'>${step.sum}</span>.<br><br>Wir notieren <span class='coach-math-highlight'>${step.digit}</span> ${step.newCarry > 0 ? 'und übertragen <b style="color:#ffde00">' + step.newCarry + '</b> in die nächste Spalte' : ''}.`;
            } else if (step.type === 'final-carry') {
                coach.innerHTML = `Der letzte Übertrag von <span class='coach-math-highlight'>${step.carry}</span> wird als eigene Ziffer vorne notiert.`;
            } else if (step.type === 'complete') {
                coach.innerHTML = "<b>Berechnung abgeschlossen!</b> Alle Spalten wurden addiert. Das finale Ergebnis ist <span class='coach-math-highlight'>" + (summand1 + summand2) + "</span>.";
            }
        }

        window.onresize = init;

        // Keyboard Navigation Support (Swapped for Right-to-Left Flow)
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') nextStep();
            if (e.key === 'ArrowRight') prevStep();
        });

        setupUI();
        document.fonts.ready.then(init);
    </script>
</body>

</html>
