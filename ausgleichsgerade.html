<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | Statistik-Labor</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff0055;
            --neon-purple: #9d50bb;
            --neon-orange: #ff8800;
            --bg-dark: #050b18;
            --glass: rgba(15, 23, 42, 0.4);
            --glass-bright: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #0a1329 0%, #050b18 100%);
            color: white;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
        }

        #side-panel {
            width: 380px;
            min-width: 380px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
            box-sizing: border-box;
            box-shadow: 15px 0 45px rgba(0, 0, 0, 0.6);
            overflow-y: auto;
        }

        header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin: 0;
            letter-spacing: 1.5px;
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px var(--neon-blue));
            text-transform: uppercase;
        }

        .stat-card {
            background: var(--glass-bright);
            padding: 12px 20px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .stat-card:hover { border-color: rgba(0, 210, 255, 0.3); background: rgba(255, 255, 255, 0.08); }
        .stat-label {
            font-family: 'Orbitron';
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
        }
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }
        .stat-value.highlight-pink { color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink); }
        .stat-value.highlight-blue { color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }
        .stat-value.highlight-purple { color: var(--neon-purple); text-shadow: 0 0 15px var(--neon-purple); }

        .m-n-grid { display: flex; flex-direction: column; gap: 12px; }

        .control-group { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }

        button {
            padding: 15px 20px;
            font-size: 0.85rem;
            font-family: 'Orbitron', sans-serif;
            background: var(--glass);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            width: 100%;
        }
        button:hover {
            background: rgba(0, 210, 255, 0.15);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            transform: translateY(-2px);
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        canvas { display: block; }

        .dashboard-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            transition: all 0.3s ease;
            letter-spacing: 1.5px;
            backdrop-filter: blur(5px);
            width: 100%;
            box-sizing: border-box;
        }
        .dashboard-btn:hover {
            color: white;
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            transform: translateX(5px);
        }

        footer {
            margin-top: auto;
            padding-top: 30px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            letter-spacing: 1px;
        }

        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; }
            #side-panel { width: 100%; min-width: 100%; order: 2; }
            #canvas-container { height: 60vh; min-height: 400px; order: 1; }
        }
    </style>
</head>

<body>
    <div id="side-panel">
        <div class="stat-card">
            <span class="stat-label">Korrelation (r)</span>
            <div id="r-display" class="stat-value highlight-purple">+0.00</div>
        </div>

        <div class="m-n-grid">
            <div class="stat-card">
                <span class="stat-label">m (Steigung)</span>
                <div id="m-val" class="stat-value highlight-blue">0.00</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">n (y-Abschnitt)</span>
                <div id="n-val" class="stat-value highlight-blue">0.00</div>
            </div>
        </div>

        <div class="stat-card">
            <span class="stat-label">Standardabweichung (SD)</span>
            <div id="sd-val" class="stat-value">0.0000</div>
        </div>

        <div class="control-group">
            <button onclick="generateChaos()">Zufall</button>
            <button onclick="shiftResiduals(0.9)">Punkte näher ran</button>
            <button onclick="shiftResiduals(1.1)">Punkte weiter weg</button>
            <button onclick="clearPoints()">Reset Labor</button>
        </div>

        <footer>
            &copy; 2026 DR. MICHAEL R. ALVERS &bull; <a href="impressum.html" style="color: inherit;">IMPRESSUM</a>
        </footer>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cyber-canvas.js"></script>
    <script>
        /**
         * CYBER-REGRESSION LABORATORY - ULTRA v5.3.8
         * Full Engine Integration with Real-Time Analytics.
         */
        window.addEventListener('load', () => {
            // 1. Initialize Branding
            CyberBranding.init("LINEARE REGRESSION");

            // 2. Initialize UI Engine
            CyberUI.init();

            // 3. Initialize CyberCanvas
            CyberCanvasInstance.init('canvas', {
                minY: -7,
                maxY: 7
            }, {
                showLabels: true,
                showTelemetry: false,
                maxRangeY: 100,
                allowPan: false
            });

            // 4. State Management
            let points = [];
            let selectedPoint = null;
            let showSD = true;

            // 5. Context Menu
            CyberCanvasInstance.onContextMenu = (e) => {
                CyberUI.showContextMenu(e.clientX, e.clientY, [
                    {
                        label: 'Ansicht zurücksetzen',
                        onclick: () => {
                            CyberCanvasInstance.resetView(-7, 7);
                            update();
                        }
                    },
                    { divider: true },
                    {
                        label: 'Achsen an',
                        checked: CyberCanvasInstance.showAxes,
                        onchange: (val) => {
                            CyberCanvasInstance.showAxes = val;
                            update();
                        }
                    },
                    {
                        label: 'Achsenbeschriftung',
                        checked: CyberCanvasInstance.showLabels,
                        onchange: (val) => {
                            CyberCanvasInstance.showLabels = val;
                            update();
                        }
                    },
                    {
                        label: 'Koordinaten',
                        checked: CyberCanvasInstance.showTelemetry,
                        onchange: (val) => {
                            CyberCanvasInstance.showTelemetry = val;
                        }
                    }
                ]);
            };

            // 6. Bind Redraw/Update
            CyberCanvasInstance.onResize = () => update();

            // 7. Input Handling
            function getCoords(e) {
                const canvas = document.getElementById('canvas');
                const rect = canvas.getBoundingClientRect();
                return {
                    x: CyberCanvasInstance.unmapX(e.clientX - rect.left),
                    y: CyberCanvasInstance.unmapY(e.clientY - rect.top)
                };
            }

            const canvas = document.getElementById('canvas');
            canvas.addEventListener('mousedown', startAction);
            window.addEventListener('mousemove', moveAction);
            window.addEventListener('mouseup', endAction);

            canvas.addEventListener('touchstart', (e) => { startAction(e.touches[0]); e.preventDefault(); }, { passive: false });
            window.addEventListener('touchmove', (e) => { moveAction(e.touches[0]); e.preventDefault(); }, { passive: false });
            window.addEventListener('touchend', endAction);

            // 8. Global Methods
            window.generateChaos = () => {
                points = [];
                const rangeX = CyberCanvasInstance.view.maxX - CyberCanvasInstance.view.minX;
                const baseM = (Math.random() - 0.5) * 1.5;
                const baseN = (Math.random() - 0.5) * 1.5; // Achsenabschnitt nahe 0
                for (let i = 0; i < 20; i++) {
                    const x = CyberCanvasInstance.view.minX + 2 + Math.random() * (rangeX - 4);
                    const y = baseM * x + baseN + (normalRandom() * 1.2);
                    points.push({ x, y: y }); // Erlaube auch negative y für echte Nullpunkt-Läufe
                }
                update();
            };

            window.clearPoints = () => { points = []; update(); };
            
            window.shiftResiduals = (factor) => {
                if (points.length < 2) return;
                const stats = calculateStats();
                points.forEach(p => {
                    const yPred = stats.m * p.x + stats.n;
                    const residual = p.y - yPred;
                    p.y = yPred + (residual * factor);
                });
                update();
            };

            // 9. Core Logic
            function startAction(e) {
                const { x, y } = getCoords(e);
                selectedPoint = null;
                for (let p of points) {
                    const dist = Math.sqrt((p.x - x) ** 2 + (p.y - y) ** 2);
                    const hitRadius = (CyberCanvasInstance.view.maxX - CyberCanvasInstance.view.minX) / 35;
                    if (dist < hitRadius) { selectedPoint = p; break; }
                }
                if (!selectedPoint) { selectedPoint = { x, y }; points.push(selectedPoint); }
                update();
            }

            function moveAction(e) {
                if (selectedPoint) {
                    const { x, y } = getCoords(e);
                    selectedPoint.x = x;
                    selectedPoint.y = y;
                    update();
                }
            }

            function endAction() { selectedPoint = null; }

            function normalRandom() {
                let u = 0, v = 0;
                while (u === 0) u = Math.random();
                while (v === 0) v = Math.random();
                return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
            }

            // 10. Analytics & Rendering
            function update() {
                const stats = calculateStats();
                draw(stats);
                document.getElementById('r-display').innerText = (stats.r >= 0 ? "+" : "") + stats.r.toFixed(2);
                document.getElementById('m-val').innerText = stats.m.toFixed(2);
                document.getElementById('n-val').innerText = stats.n.toFixed(2);
                document.getElementById('sd-val').innerText = stats.sd.toFixed(2);
            }

            function calculateStats() {
                const n = points.length;
                if (n < 2) return { r: 0, m: 0, n: 0, sd: 0 };
                let sX = 0, sY = 0, sXY = 0, sX2 = 0, sY2 = 0;
                for (let p of points) {
                    sX += p.x; sY += p.y; sXY += p.x * p.y;
                    sX2 += p.x * p.x; sY2 += p.y * p.y;
                }
                const numR = n * sXY - sX * sY;
                const denR = Math.sqrt((n * sX2 - sX * sX) * (n * sY2 - sY * sY));
                const r = denR !== 0 ? numR / denR : 0;
                const denM = (n * sX2 - sX * sX);
                const m = denM !== 0 ? numR / denM : 0;
                const n_val = (sY / n) - m * (sX / n);
                let sumSqRes = 0;
                for (let p of points) sumSqRes += Math.pow(p.y - (m * p.x + n_val), 2);
                const sd = n > 2 ? Math.sqrt(sumSqRes / (n - 2)) : 0;
                return { r, m, n: n_val, sd };
            }

            function draw(stats) {
                const ctx = CyberCanvasInstance.ctx;
                CyberCanvasInstance.drawGrid({ vignette: true, glow: true, mainColor: 'rgba(0, 210, 255, 0.4)' });

                if (points.length >= 3 && stats.sd > 0 && showSD) {
                    const minX = CyberCanvasInstance.view.minX - 5;
                    const maxX = CyberCanvasInstance.view.maxX + 5;
                    ctx.fillStyle = "rgba(0, 210, 255, 0.1)";
                    ctx.beginPath();
                    ctx.moveTo(CyberCanvasInstance.mapX(minX), CyberCanvasInstance.mapY(stats.m * minX + stats.n + stats.sd));
                    ctx.lineTo(CyberCanvasInstance.mapX(maxX), CyberCanvasInstance.mapY(stats.m * maxX + stats.n + stats.sd));
                    ctx.lineTo(CyberCanvasInstance.mapX(maxX), CyberCanvasInstance.mapY(stats.m * maxX + stats.n - stats.sd));
                    ctx.lineTo(CyberCanvasInstance.mapX(minX), CyberCanvasInstance.mapY(stats.m * minX + stats.n - stats.sd));
                    ctx.fill();
                }

                if (points.length >= 2) {
                    const minX = CyberCanvasInstance.view.minX - 5;
                    const maxX = CyberCanvasInstance.view.maxX + 5;
                    ctx.strokeStyle = "#ff0055";
                    ctx.lineWidth = 4;
                    ctx.shadowColor = "#ff0055";
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.moveTo(CyberCanvasInstance.mapX(minX), CyberCanvasInstance.mapY(stats.m * minX + stats.n));
                    ctx.lineTo(CyberCanvasInstance.mapX(maxX), CyberCanvasInstance.mapY(stats.m * maxX + stats.n));
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                points.forEach(p => {
                    const px = CyberCanvasInstance.mapX(p.x);
                    const py = CyberCanvasInstance.mapY(p.y);
                    ctx.fillStyle = (p === selectedPoint) ? "#fff" : "#9d50bb";
                    ctx.shadowColor = (p === selectedPoint) ? "#fff" : "#9d50bb";
                    ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.arc(px, py, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });
            }

            window.addEventListener('keydown', (e) => {
                if (e.key === "ArrowUp") shiftResiduals(0.9);
                if (e.key === "ArrowDown") shiftResiduals(1.1);
            });

            generateChaos();
        });
    </script>
</body>
</html>
