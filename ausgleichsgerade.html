<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | Statistik-Labor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff0055;
            --neon-purple: #9d50bb;
            --neon-orange: #ff8800;
            --bg-dark: #050b18;
            --glass: rgba(15, 23, 42, 0.4);
            --glass-bright: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #0a1329 0%, #050b18 100%);
            color: white;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
        }

        #side-panel {
            width: 380px;
            min-width: 380px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
            box-sizing: border-box;
            box-shadow: 15px 0 45px rgba(0, 0, 0, 0.6);
            overflow-y: auto;
        }

        #sidebar-header {
            min-height: 60px;
            display: flex;
            align-items: center;
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
        }

        /* --- TELEMETRY HUD BOX --- */
        .cyber-telemetry-pane {
            position: absolute;
            top: 100px;
            right: 20px;
            z-index: 50;
            pointer-events: none;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .telemetry-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 210, 255, 0.4);
            border-radius: 12px;
            padding: 12px 18px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 210, 255, 0.1);
            min-width: 140px;
        }

        .telemetry-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 4px;
        }

        .telemetry-row:last-child {
            margin-bottom: 0;
        }

        .telemetry-row .label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            color: rgba(0, 210, 255, 0.6);
            letter-spacing: 1px;
        }

        .telemetry-row .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: white;
            font-variant-numeric: tabular-nums;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin: 0;
            letter-spacing: 1.5px;
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px var(--neon-blue));
            text-transform: uppercase;
        }

        .stat-card {
            background: var(--glass-bright);
            padding: 12px 20px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(0, 210, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .stat-label {
            font-family: 'Orbitron';
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .stat-value.highlight-pink {
            color: var(--neon-pink);
            text-shadow: 0 0 15px var(--neon-pink);
        }

        .stat-value.highlight-blue {
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .stat-value.highlight-purple {
            color: var(--neon-purple);
            text-shadow: 0 0 15px var(--neon-purple);
        }

        .m-n-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            padding: 15px 20px;
            font-size: 0.85rem;
            font-family: 'Orbitron', sans-serif;
            background: var(--glass);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            width: 100%;
        }

        button:hover {
            background: rgba(0, 210, 255, 0.15);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            transform: translateY(-2px);
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        footer {
            margin-top: auto;
            padding-top: 30px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            letter-spacing: 1px;
        }

        @media (max-width: 900px) {
            body {
                flex-direction: column;
                overflow-y: auto;
            }

            .admin-info {
                display: none !important;
                margin-top: 20px;
                padding: 15px;
                background: rgba(0, 210, 255, 0.05);
                border-left: 3px solid var(--neon-blue);
                border-radius: 4px;
                text-align: left;
            }

            #side-panel {
                width: 100%;
                min-width: 100%;
                order: 2;
            }

            #canvas-container {
                height: 60vh;
                min-height: 400px;
                order: 1;
            }
        }
    </style>
</head>

<body>
    <div id="side-panel">
        <header id="sidebar-header"></header>
        <div class="stat-card">
            <span class="stat-label">Korrelation (r)</span>
            <div id="r-display" class="stat-value highlight-purple">+0.00</div>
        </div>

        <div class="m-n-grid">
            <div class="stat-card">
                <span class="stat-label">m (Steigung)</span>
                <div id="m-val" class="stat-value highlight-blue">0.00</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">n (y-Abschnitt)</span>
                <div id="n-val" class="stat-value highlight-blue">0.00</div>
            </div>
        </div>

        <div class="stat-card">
            <span class="stat-label">Standardabweichung (SD)</span>
            <div id="sd-val" class="stat-value">0.0000</div>
        </div>

        <div class="control-group">
            <button onclick="generateChaos()">Zufall</button>
            <button onclick="shiftResiduals(0.9)">Punkte näher ran</button>
            <button onclick="shiftResiduals(1.1)">Punkte weiter weg</button>
            <button onclick="clearPoints()">Reset Labor</button>
        </div>

        <footer>
            &copy; 2026 DR. MICHAEL R. ALVERS &bull; <a href="impressum.html" style="color: inherit;">IMPRESSUM</a>
        </footer>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cyber-canvas.js"></script>
    <script>
        /**
         * CYBER-REGRESSION LABORATORY - ULTRA v5.3.8
         * Full Engine Integration with Real-Time Analytics.
         */
        window.addEventListener('load', () => {
            // --- CORE ENGINE ---
            let cc = null;
            let points = [];
            let selectedPoint = null;
            let showSD = true;

            function startLabor() {
                try {
                    if (typeof CyberCanvas === 'undefined') return;

                    // Initialize UI Engine
                    if (typeof CyberUI !== 'undefined') CyberUI.init();

                    cc = new CyberCanvas();
                    const canvasEl = document.getElementById('canvas');
                    if (!canvasEl) return;

                    // Branding
                    if (typeof CyberBranding !== 'undefined') {
                        CyberBranding.init({
                            title: "Doc Alvers Mathe-Labor",
                            subtitle: "LINEARE REGRESSION",
                            briefing: `
                                <h3 style="color:var(--neon-blue); font-family:Orbitron; margin-bottom:10px;">MISSION: STATISTIK-LABOR</h3>
                                Willkommen in der Analyseeinheit für Lineare Regression. Analysiere den Zusammenhang zwischen Datenpunkten durch Setzen und Verschieben im Koordinatensystem.
                                
                                <div class="admin-info">
                                    <h4 style="color:var(--neon-blue); font-family:Orbitron; font-size:0.8rem; margin:0 0 5px 0;">TECHNISCHE KONTROLLE (ADMIN ONLY)</h4>
                                    <ul style="margin:0; padding-left:18px; font-size:0.85rem; opacity:0.9;">
                                        <li><b>Kontextmenü:</b> Rechtsklick für Gitter, Achsen und Telemetrie.</li>
                                        <li><b>Tastatur:</b> Pfeiltasten (Oben/Unten) zum Skalieren der Residuen.</li>
                                        <li><b>Manipulation:</b> Sidebar-Buttons für Chaos-Generierung und Residuen-Shift nutzen.</li>
                                    </ul>
                                </div>
                            `
                        });
                    }

                    cc.init('canvas', { minY: -7, maxY: 7 }, { showTelemetry: false, showLabels: true, allowPan: false });
                    cc.onResize = () => update();

                    // --- FULL VIEWPORT LOCK (Zoom & Pan) ---
                    cc.canvas.addEventListener('wheel', e => e.preventDefault(), { passive: false });
                    cc.canvas.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

                    // --- INTERACTION SETUP ---
                    cc.onContextMenu = (e) => {
                        if (typeof CyberUI === 'undefined') return;
                        CyberUI.showContextMenu(e.clientX, e.clientY, [
                            {
                                label: 'Labor zurücksetzen',
                                onclick: () => { points = []; update(); }
                            },
                            {
                                label: 'Zufalls-Daten',
                                onclick: () => generateChaos()
                            },
                            { divider: true },
                            {
                                label: 'Gitter anzeigen',
                                checked: cc.showGrid,
                                onchange: (val) => { cc.showGrid = val; update(); }
                            },
                            {
                                label: 'Achsen anzeigen',
                                checked: cc.showAxes,
                                onchange: (val) => { cc.showAxes = val; update(); }
                            },
                            {
                                label: 'Achsenbeschriftung',
                                checked: cc.showLabels,
                                onchange: (val) => { cc.showLabels = val; update(); }
                            },
                            {
                                label: 'Koordinaten',
                                checked: cc.showTelemetry,
                                onchange: (val) => {
                                    cc.showTelemetry = val;
                                    if (val && !cc.telePane) cc.injectTelemetryPane();
                                }
                            }
                        ]);
                    };

                    cc.canvas.addEventListener('mousedown', startAction);
                    window.addEventListener('mousemove', moveAction);
                    window.addEventListener('mouseup', endAction);

                    cc.canvas.addEventListener('touchstart', (e) => { startAction(e.touches[0]); e.preventDefault(); }, { passive: false });
                    window.addEventListener('touchmove', (e) => { moveAction(e.touches[0]); e.preventDefault(); }, { passive: false });
                    window.addEventListener('touchend', endAction);

                    // --- KEYBOARD SHORTCUTS ---
                    window.addEventListener('keydown', (e) => {
                        if (e.key === "ArrowUp") shiftResiduals(0.9);
                        if (e.key === "ArrowDown") shiftResiduals(1.1);
                    });

                    // Initial Data
                    generateChaos();
                } catch (e) {
                    console.error("Cyber-Labor Initialization Failed:", e);
                }
            }

            // --- INPUT HANDLING ---
            function getCoords(e) {
                const rect = cc.canvas.getBoundingClientRect();
                return {
                    x: cc.unmapX(e.clientX - rect.left),
                    y: cc.unmapY(e.clientY - rect.top)
                };
            }

            function startAction(e) {
                const { x, y } = getCoords(e);
                selectedPoint = null;
                for (let p of points) {
                    const dist = Math.sqrt((p.x - x) ** 2 + (p.y - y) ** 2);
                    const hitRadius = (cc.view.maxX - cc.view.minX) / 35;
                    if (dist < hitRadius) { selectedPoint = p; break; }
                }
                if (!selectedPoint) { selectedPoint = { x, y }; points.push(selectedPoint); }
                update();
            }

            function moveAction(e) {
                if (selectedPoint) {
                    const { x, y } = getCoords(e);
                    selectedPoint.x = x;
                    selectedPoint.y = y;
                    update();
                }
            }

            function endAction() { selectedPoint = null; }

            // --- GLOBAL METHODS ---
            window.generateChaos = () => {
                points = [];
                const rangeX = cc.view.maxX - cc.view.minX;
                const baseM = (Math.random() - 0.5) * 1.5;
                const baseN = (Math.random() - 0.5) * 1.5;
                for (let i = 0; i < 20; i++) {
                    const x = cc.view.minX + 2 + Math.random() * (rangeX - 4);
                    const y = baseM * x + baseN + (normalRandom() * 1.2);
                    points.push({ x, y: y });
                }
                update();
            };

            window.clearPoints = () => { points = []; update(); };

            window.shiftResiduals = (factor) => {
                if (points.length < 2) return;
                const stats = calculateStats();
                points.forEach(p => {
                    const yPred = stats.m * p.x + stats.n;
                    const residual = p.y - yPred;
                    p.y = yPred + (residual * factor);
                });
                update();
            };

            function normalRandom() {
                let u = 0, v = 0;
                while (u === 0) u = Math.random();
                while (v === 0) v = Math.random();
                return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
            }

            // --- ANALYTICS & RENDERING ---
            function update() {
                const stats = calculateStats();
                draw(stats);
                document.getElementById('r-display').innerText = (stats.r >= 0 ? "+" : "") + stats.r.toFixed(2);
                document.getElementById('m-val').innerText = stats.m.toFixed(2);
                document.getElementById('n-val').innerText = stats.n.toFixed(2);
                document.getElementById('sd-val').innerText = stats.sd.toFixed(2);
            }

            function calculateStats() {
                const n = points.length;
                if (n < 2) return { r: 0, m: 0, n: 0, sd: 0 };
                let sX = 0, sY = 0, sXY = 0, sX2 = 0, sY2 = 0;
                for (let p of points) {
                    sX += p.x; sY += p.y; sXY += p.x * p.y;
                    sX2 += p.x * p.x; sY2 += p.y * p.y;
                }
                const numR = n * sXY - sX * sY;
                const denR = Math.sqrt((n * sX2 - sX * sX) * (n * sY2 - sY * sY));
                const r = denR !== 0 ? numR / denR : 0;
                const denM = (n * sX2 - sX * sX);
                const m = denM !== 0 ? numR / denM : 0;
                const n_val = (sY / n) - m * (sX / n);
                let sumSqRes = 0;
                for (let p of points) sumSqRes += Math.pow(p.y - (m * p.x + n_val), 2);
                const sd = n > 2 ? Math.sqrt(sumSqRes / (n - 2)) : 0;
                return { r, m, n: n_val, sd };
            }

            function draw(stats) {
                cc.drawGrid({ vignette: true, glow: true, mainColor: 'rgba(0, 210, 255, 0.4)' });
                const ctx = cc.ctx;

                if (points.length >= 3 && stats.sd > 0 && showSD) {
                    const minX = cc.view.minX - 5;
                    const maxX = cc.view.maxX + 5;
                    ctx.fillStyle = "rgba(0, 210, 255, 0.1)";
                    ctx.beginPath();
                    ctx.moveTo(cc.mapX(minX), cc.mapY(stats.m * minX + stats.n + stats.sd));
                    ctx.lineTo(cc.mapX(maxX), cc.mapY(stats.m * maxX + stats.n + stats.sd));
                    ctx.lineTo(cc.mapX(maxX), cc.mapY(stats.m * maxX + stats.n - stats.sd));
                    ctx.lineTo(cc.mapX(minX), cc.mapY(stats.m * minX + stats.n - stats.sd));
                    ctx.fill();
                }

                if (points.length >= 2) {
                    const minX = cc.view.minX - 5;
                    const maxX = cc.view.maxX + 5;
                    ctx.strokeStyle = "#ff0055";
                    ctx.lineWidth = 4;
                    ctx.shadowColor = "#ff0055";
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.moveTo(cc.mapX(minX), cc.mapY(stats.m * minX + stats.n));
                    ctx.lineTo(cc.mapX(maxX), cc.mapY(stats.m * maxX + stats.n));
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                points.forEach(p => {
                    const px = cc.mapX(p.x);
                    const py = cc.mapY(p.y);
                    ctx.fillStyle = (p === selectedPoint) ? "#fff" : "#9d50bb";
                    ctx.shadowColor = (p === selectedPoint) ? "#fff" : "#9d50bb";
                    ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.arc(px, py, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });
            }

            // --- START ---
            startLabor();
        });
    </script>
</body>

</html>
