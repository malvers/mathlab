<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | Statistik-Labor</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&family=Inter:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff0055;
            --neon-purple: #9d50bb;
            --neon-orange: #ff8800;
            --bg-dark: #050b18;
            --glass: rgba(15, 23, 42, 0.4);
            --glass-bright: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #0a1329 0%, #050b18 100%);
            color: white;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
        }

        /* --- BACKGROUND IMMERSION (REMOVED) --- */

        /* --- SIDE PANEL --- */
        #side-panel {
            width: 380px;
            min-width: 380px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
            box-sizing: border-box;
            box-shadow: 15px 0 45px rgba(0, 0, 0, 0.6);
            overflow-y: auto;
        }

        header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin: 0;
            letter-spacing: 1.5px;
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px var(--neon-blue));
            text-transform: uppercase;
        }

        /* --- CANVAS HEADER (NEW) --- */

        /* --- STAT CARDS --- */
        .stat-card {
            background: var(--glass-bright);
            padding: 12px 20px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            border-color: rgba(0, 210, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }
        .stat-label {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
        }
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }
        .stat-value.highlight-pink { color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink); }
        .stat-value.highlight-blue { color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }
        .stat-value.highlight-purple { color: var(--neon-purple); text-shadow: 0 0 15px var(--neon-purple); }

        .m-n-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* --- CONTROLS --- */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            padding: 15px 20px;
            font-size: 0.85rem;
            font-family: 'Orbitron', sans-serif;
            background: var(--glass);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            width: 100%;
        }
        button:hover {
            background: rgba(0, 210, 255, 0.15);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            transform: translateY(-2px);
        }
        button.primary { background: var(--neon-blue); color: #000; font-weight: bold; border-color: white; }
        button.secondary { border-color: var(--neon-pink); color: var(--neon-pink); }
        button.secondary:hover { background: rgba(0, 210, 255, 0.15); border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); }

        /* --- CANVAS AREA --- */
        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        canvas { display: block; cursor: crosshair; }

        /* --- SOUND TOGGLE --- */
        .sound-toggle {
            display: none;
        }

        /* --- HELP OVERLAY (REMOVED) --- */

        .dashboard-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            transition: all 0.3s ease;
            letter-spacing: 1.5px;
            backdrop-filter: blur(5px);
            width: 100%;
            box-sizing: border-box;
        }

        .dashboard-btn:hover {
            color: white;
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            transform: translateX(5px);
        }

        .dashboard-btn svg {
            width: 16px;
            height: 16px;
            stroke-width: 2.5;
        }

        footer {
            margin-top: auto;
            padding-top: 30px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            letter-spacing: 1px;
        }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; }
            #side-panel { width: 100%; min-width: 100%; order: 2; border-right: none; border-top: 1px solid rgba(255, 255, 255, 0.1); }
            #canvas-container { height: 60vh; min-height: 400px; order: 1; }
        }
    </style>
</head>

<body>
    <!-- Background Video Removed -->
    
    <div id="side-panel">
        <header style="border: none; padding-bottom: 5px;">
            <a href="index.html" class="dashboard-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>DASHBOARD</span>
            </a>
        </header>

        <div class="stat-card">
            <span class="stat-label">Korrelation (r)</span>
            <div id="r-display" class="stat-value highlight-purple">+0.00</div>
        </div>

        <div class="m-n-grid">
            <div class="stat-card">
                <span class="stat-label">m (Steigung)</span>
                <div id="m-val" class="stat-value highlight-blue">0.00</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">n (y-Abschn.)</span>
                <div id="n-val" class="stat-value highlight-blue">0.00</div>
            </div>
        </div>

        <div class="stat-card">
            <span class="stat-label">Standardabweichung (SD)</span>
            <div id="sd-val" class="stat-value">0.0000</div>
        </div>

        <div class="control-group">
            <button onclick="generateChaos()">Zufall</button>
            <button onclick="shiftResiduals(0.9)">Punkte näher ran</button>
            <button onclick="shiftResiduals(1.1)">Punkte weiter weg</button>
            <button onclick="clearPoints()">Reset Labor</button>
        </div>

        <footer>
            &copy; 2026 DR. MICHAEL R. ALVERS &bull; <a href="impressum.html" style="color: inherit;">IMPRESSUM</a>
        </footer>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <!-- Overlays Removed (Clean UI) -->

    <script src="branding.js"></script>
    <script>
        // Initialize Branding
        CyberBranding.init({
            title: "Doc Alvers Mathe-Labor",
            subtitle: "Statistik-Labor"
        });

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        let points = [];
        let selectedPoint = null;
        let showSD = true;

        const OFF_X = 80;
        const OFF_Y = 100;
        const SCALE = 45;

        function init() {
            resize();
            generateChaos();
            window.addEventListener('resize', resize);

            canvas.addEventListener('mousedown', startAction);
            window.addEventListener('mousemove', moveAction);
            window.addEventListener('mouseup', endAction);

            canvas.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                startAction(touch);
                e.preventDefault();
            }, { passive: false });

            window.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                moveAction(touch);
                e.preventDefault();
            }, { passive: false });

            window.addEventListener('touchend', endAction);
            
            // Keyboard Listeners
            window.addEventListener('keydown', (e) => {
                if (e.key === "ArrowUp") {
                    shiftResiduals(0.9);
                    e.preventDefault();
                } else if (e.key === "ArrowDown") {
                    shiftResiduals(1.1);
                    e.preventDefault();
                }
            });
        }

        function toggleHelp() {
            // Removed for minimalism
        }

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);
            draw();
        }

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left - OFF_X) / SCALE;
            const y = (rect.height - OFF_Y - (e.clientY - rect.top)) / SCALE;
            return { x, y };
        }

        function startAction(e) {
            const { x, y } = getCoords(e);
            selectedPoint = null;

            for (let p of points) {
                const dist = Math.sqrt((p.x - x) ** 2 + (p.y - y) ** 2);
                if (dist < 0.6) {
                    selectedPoint = p;
                    break;
                }
            }

            if (!selectedPoint) {
                selectedPoint = { x, y };
                points.push(selectedPoint);
            }
            update();
        }

        function moveAction(e) {
            if (selectedPoint) {
                const { x, y } = getCoords(e);
                selectedPoint.x = x;
                selectedPoint.y = y;
                update();
            }
        }

        function endAction() { selectedPoint = null; }
        function clearPoints() { points = []; update(); }

        function shiftResiduals(factor) {
            // Logic preserved but UI removed
            if (points.length < 2) return;
            const stats = calculateStats();
            points.forEach(p => {
                const yPred = stats.m * p.x + stats.n;
                const residual = p.y - yPred;
                p.y = yPred + (residual * factor);
            });
            update();
        }

        function generateChaos() {
            points = [];
            const rect = container.getBoundingClientRect();
            const count = 20;
            const baseM = (Math.random() - 0.5) * 1.5;
            const baseN = 4 + Math.random() * 4;
            for (let i = 0; i < count; i++) {
                const x = Math.random() * (rect.width / SCALE - 3);
                const y = baseM * x + baseN + (normalRandom() * 1.5);
                points.push({ x, y: Math.max(0, y) });
            }
            update();
        }

        function normalRandom() {
            let u = 0, v = 0;
            while (u === 0) u = Math.random();
            while (v === 0) v = Math.random();
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        }

        function toggleSD() { showSD = !showSD; draw(); }

        function update() {
            const stats = calculateStats();
            draw(stats);
            
            document.getElementById('r-display').innerText = (stats.r >= 0 ? "+" : "") + stats.r.toFixed(2);
            document.getElementById('m-val').innerText = stats.m.toFixed(2);
            document.getElementById('n-val').innerText = stats.n.toFixed(2);
            document.getElementById('sd-val').innerText = stats.sd.toFixed(2);
        }

        function calculateStats() {
            const n = points.length;
            if (n < 2) return { r: 0, m: 0, n: 0, sd: 0 };
            let sX = 0, sY = 0, sXY = 0, sX2 = 0, sY2 = 0;
            for (let p of points) {
                sX += p.x; sY += p.y; sXY += p.x * p.y;
                sX2 += p.x * p.x; sY2 += p.y * p.y;
            }
            const numR = n * sXY - sX * sY;
            const denR = Math.sqrt((n * sX2 - sX * sX) * (n * sY2 - sY * sY));
            const r = denR !== 0 ? numR / denR : 0;
            const denM = (n * sX2 - sX * sX);
            const m = denM !== 0 ? numR / denM : 0;
            const n_val = (sY / n) - m * (sX / n);
            let sumSqRes = 0;
            for (let p of points) sumSqRes += Math.pow(p.y - (m * p.x + n_val), 2);
            const sd = n > 2 ? Math.sqrt(sumSqRes / (n - 2)) : 0;
            return { r, m, n: n_val, sd };
        }

        function draw(stats = calculateStats()) {
            const rect = container.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);
            const w = rect.width, h = rect.height;

            // Grid
            ctx.strokeStyle = "rgba(0, 210, 255, 0.1)";
            ctx.lineWidth = 1;
            for (let x = 0; x < w; x += SCALE) {
                ctx.beginPath(); ctx.moveTo(OFF_X + x, 0); ctx.lineTo(OFF_X + x, h - OFF_Y); ctx.stroke();
            }
            for (let y = 0; y < h; y += SCALE) {
                ctx.beginPath(); ctx.moveTo(OFF_X, h - OFF_Y - y); ctx.lineTo(w, h - OFF_Y - y); ctx.stroke();
            }

            // Axes
            ctx.strokeStyle = "rgba(0, 210, 255, 0.5)";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(OFF_X, h - OFF_Y); ctx.lineTo(w - 20, h - OFF_Y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(OFF_X, h - OFF_Y); ctx.lineTo(OFF_X, 20); ctx.stroke();

            // SD Shadow (Light Blue Overlay)
            if (showSD && points.length >= 3 && stats.sd > 0) {
                const xMax = (w - OFF_X) / SCALE;
                ctx.fillStyle = "rgba(0, 210, 255, 0.15)";
                ctx.beginPath();
                ctx.moveTo(OFF_X, h - OFF_Y - (stats.m * 0 + stats.n + stats.sd) * SCALE);
                ctx.lineTo(OFF_X + xMax * SCALE, h - OFF_Y - (stats.m * xMax + stats.n + stats.sd) * SCALE);
                ctx.lineTo(OFF_X + xMax * SCALE, h - OFF_Y - (stats.m * xMax + stats.n - stats.sd) * SCALE);
                ctx.lineTo(OFF_X, h - OFF_Y - (stats.m * 0 + stats.n - stats.sd) * SCALE);
                ctx.closePath();
                ctx.fill();
            }

            // Regression Line
            if (points.length >= 2) {
                const xMax = (w - OFF_X) / SCALE;
                ctx.strokeStyle = "#ff0055";
                ctx.lineWidth = 4;
                ctx.shadowColor = "#ff0055";
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.moveTo(OFF_X, h - OFF_Y - (stats.n) * SCALE);
                ctx.lineTo(OFF_X + xMax * SCALE, h - OFF_Y - (stats.m * xMax + stats.n) * SCALE);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Scatter Points
            points.forEach(p => {
                const px = OFF_X + p.x * SCALE;
                const py = h - OFF_Y - p.y * SCALE;
                ctx.fillStyle = (p === selectedPoint) ? "#fff" : "#9d50bb";
                ctx.shadowColor = (p === selectedPoint) ? "#fff" : "#9d50bb";
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(px, py, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        init();
    </script>
</body>
</html>
