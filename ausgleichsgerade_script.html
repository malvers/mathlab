<script src="js/branding/briefings.js"></script>
    <script src="js/branding/overlays.js"></script>
    <script src="js/branding.js"></script>
<script src="js/ui.js"></script>
<script src="js/cyber-canvas.js"></script>
<script>
    /**
     * CYBER-REGRESSION LABORATORY - ULTRA v5.3.8
     * Full Engine Integration with Real-Time Analytics.
     */
    window.addEventListener('load', () => {
        // 1. Initialize Branding
        CyberBranding.init({
            useExternalStyles: true,
            subtitle: "LINEARE REGRESSION"
        });

        // 2. Initialize UI Engine
        CyberUI.init();

        // 3. Initialize CyberCanvas
        CyberCanvasInstance.init('canvas', {
            minY: -2,
            maxY: 12
        });

        // 4. State Management
        let points = [];
        let selectedPoint = null;
        let showSD = true;

        // 5. Context Menu
        CyberCanvasInstance.onContextMenu = (e) => {
            CyberUI.showContextMenu(e.clientX, e.clientY, [
                {
                    label: 'Ansicht zurücksetzen',
                    onclick: () => {
                        CyberCanvasInstance.resetView(-2, 12);
                        update();
                    }
                },
                {
                    label: 'Labor zurücksetzen',
                    onclick: () => { points = []; update(); }
                },
                {
                    label: 'Zufalls-Daten',
                    onclick: () => generateChaos()
                },
                {
                    divider: true
                },
                {
                    label: 'Achsenbeschriftung',
                    checked: CyberCanvasInstance.showLabels,
                    onchange: (val) => {
                        CyberCanvasInstance.showLabels = val;
                        update();
                    }
                }
            ]);
        };

        // 6. Bind Redraw/Update
        CyberCanvasInstance.onResize = () => update();

        // 7. Input Handling
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: CyberCanvasInstance.unmapX(e.clientX - rect.left),
                y: CyberCanvasInstance.unmapY(e.clientY - rect.top)
            };
        }

        canvas.addEventListener('mousedown', startAction);
        window.addEventListener('mousemove', moveAction);
        window.addEventListener('mouseup', endAction);

        canvas.addEventListener('touchstart', (e) => {
            startAction(e.touches[0]);
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            moveAction(e.touches[0]);
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchend', endAction);

        // 8. Global Methods (for Sidebar)
        window.generateChaos = () => {
            points = [];
            const rangeX = CyberCanvasInstance.view.maxX - CyberCanvasInstance.view.minX;
            const baseM = (Math.random() - 0.5) * 1.5;
            const baseN = 4 + Math.random() * 2;
            for (let i = 0; i < 20; i++) {
                const x = CyberCanvasInstance.view.minX + 2 + Math.random() * (rangeX - 4);
                const y = baseM * x + baseN + (normalRandom() * 1.2);
                points.push({ x, y: Math.max(0, y) });
            }
            update();
        };

        window.clearPoints = () => { points = []; update(); };

        window.shiftResiduals = (factor) => {
            if (points.length < 2) return;
            const stats = calculateStats();
            points.forEach(p => {
                const yPred = stats.m * p.x + stats.n;
                const residual = p.y - yPred;
                p.y = yPred + (residual * factor);
            });
            update();
        };

        // 9. Interaction Logic
        function startAction(e) {
            const { x, y } = getCoords(e);
            selectedPoint = null;

            for (let p of points) {
                const dist = Math.sqrt((p.x - x) ** 2 + (p.y - y) ** 2);
                const hitRadius = (CyberCanvasInstance.view.maxX - CyberCanvasInstance.view.minX) / 35;
                if (dist < hitRadius) {
                    selectedPoint = p;
                    break;
                }
            }

            if (!selectedPoint) {
                selectedPoint = { x, y };
                points.push(selectedPoint);
            }
            update();
        }

        function moveAction(e) {
            if (selectedPoint) {
                const { x, y } = getCoords(e);
                selectedPoint.x = x;
                selectedPoint.y = y;
                update();
            }
        }

        function endAction() { selectedPoint = null; }

        function normalRandom() {
            let u = 0, v = 0;
            while (u === 0) u = Math.random();
            while (v === 0) v = Math.random();
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        }

        // 10. Analytics & Rendering
        function update() {
            const stats = calculateStats();
            draw(stats);

            document.getElementById('r-display').innerText = (stats.r >= 0 ? "+" : "") + stats.r.toFixed(2);
            document.getElementById('m-val').innerText = stats.m.toFixed(2);
            document.getElementById('n-val').innerText = stats.n.toFixed(2);
            document.getElementById('sd-val').innerText = stats.sd.toFixed(2);
        }

        function calculateStats() {
            const n = points.length;
            if (n < 2) return { r: 0, m: 0, n: 0, sd: 0 };
            let sX = 0, sY = 0, sXY = 0, sX2 = 0, sY2 = 0;
            for (let p of points) {
                sX += p.x; sY += p.y; sXY += p.x * p.y;
                sX2 += p.x * p.x; sY2 += p.y * p.y;
            }
            const numR = n * sXY - sX * sY;
            const denR = Math.sqrt((n * sX2 - sX * sX) * (n * sY2 - sY * sY));
            const r = denR !== 0 ? numR / denR : 0;
            const denM = (n * sX2 - sX * sX);
            const m = denM !== 0 ? numR / denM : 0;
            const n_val = (sY / n) - m * (sX / n);
            let sumSqRes = 0;
            for (let p of points) sumSqRes += Math.pow(p.y - (m * p.x + n_val), 2);
            const sd = n > 2 ? Math.sqrt(sumSqRes / (n - 2)) : 0;
            return { r, m, n: n_val, sd };
        }

        function draw(stats) {
            const ctx = CyberCanvasInstance.ctx;
            CyberCanvasInstance.drawGrid({
                vignette: true,
                glow: true,
                mainColor: 'rgba(0, 210, 255, 0.4)'
            });

            if (points.length >= 3 && stats.sd > 0 && showSD) {
                const minX = CyberCanvasInstance.view.minX - 5;
                const maxX = CyberCanvasInstance.view.maxX + 5;
                ctx.fillStyle = "rgba(0, 210, 255, 0.1)";
                ctx.beginPath();
                ctx.moveTo(CyberCanvasInstance.mapX(minX), CyberCanvasInstance.mapY(stats.m * minX + stats.n + stats.sd));
                ctx.lineTo(CyberCanvasInstance.mapX(maxX), CyberCanvasInstance.mapY(stats.m * maxX + stats.n + stats.sd));
                ctx.lineTo(CyberCanvasInstance.mapX(maxX), CyberCanvasInstance.mapY(stats.m * maxX + stats.n - stats.sd));
                ctx.lineTo(CyberCanvasInstance.mapX(minX), CyberCanvasInstance.mapY(stats.m * minX + stats.n - stats.sd));
                ctx.fill();
            }

            if (points.length >= 2) {
                const minX = CyberCanvasInstance.view.minX - 5;
                const maxX = CyberCanvasInstance.view.maxX + 5;
                ctx.strokeStyle = "#ff0055";
                ctx.lineWidth = 4;
                ctx.shadowColor = "#ff0055";
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.moveTo(CyberCanvasInstance.mapX(minX), CyberCanvasInstance.mapY(stats.m * minX + stats.n));
                ctx.lineTo(CyberCanvasInstance.mapX(maxX), CyberCanvasInstance.mapY(stats.m * maxX + stats.n));
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            points.forEach(p => {
                const px = CyberCanvasInstance.mapX(p.x);
                const py = CyberCanvasInstance.mapY(p.y);
                ctx.fillStyle = (p === selectedPoint) ? "#fff" : "#9d50bb";
                ctx.shadowColor = (p === selectedPoint) ? "#fff" : "#9d50bb";
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(px, py, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        // Keyboard Shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowUp") shiftResiduals(0.9);
            if (e.key === "ArrowDown") shiftResiduals(1.1);
        });

        // Init
        generateChaos();
    });
</script>
