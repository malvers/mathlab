<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1. Binomische Formel | haptisch | docalvers</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        /* Beweis-spezifische Anpassungen */
        #geometry-wrapper {
            position: relative;
            pointer-events: none;
        }

        #binomCanvas {
            pointer-events: auto;
            cursor: grab;
        }

        #label-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        .math-label {
            position: absolute;
            transform: translate(-50%, -50%);
            color: white;
            white-space: nowrap;
            font-size: 1.4rem;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .side-label {
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .area-label {
            font-size: 1.4rem;
            font-weight: bold;
        }

        #formula-glow-v3 {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 15px 45px;
            width: fit-content;
            max-width: 90%;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .katex-display {
            margin: 0 !important;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .math-glow {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            font-size: 1.1em;
        }
        
        .area-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .stat-val {
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>

<body>
    <aside id="side-panel">
        <div id="sidebar-header" style="min-height: 60px;"></div>
        <div id="parameters-container"></div>
        <div style="margin-top: auto; padding-top: 15px; text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.2); font-family: 'Orbitron';">
            &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull;
        </div>
    </aside>

    <main id="main-content">
        <div id="canvas-container">
            <div id="geometry-wrapper">
                <canvas id="binomCanvas"></canvas>
                <div id="label-overlay">
                    <div id="lbl-p2" class="math-label area-label"></div>
                    <div id="lbl-pq1" class="math-label area-label"></div>
                    <div id="lbl-pq2" class="math-label area-label"></div>
                    <div id="lbl-q2" class="math-label area-label"></div>
                    <div id="lbl-p-top" class="math-label side-label"></div>
                    <div id="lbl-q-top" class="math-label side-label"></div>
                    <div id="lbl-p-left" class="math-label side-label"></div>
                    <div id="lbl-q-left" class="math-label side-label"></div>
                </div>
            </div>
        </div>
        <div id="formula-glow-v3"></div>
    </main>

    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script>
        let pSlider, board;
        const canvas = document.getElementById('binomCanvas');
        const ctx = canvas.getContext('2d');

        const S = 10.0; // Fixed total side length
        let p = 7.0;
        let q = S - p;

        let isDragging = false;
        let offsetX = 0, offsetY = 0, totalSize;

        window.addEventListener('load', () => {
            // 1. Initialize Branding
            CyberBranding.init({
                title: "Doc Alvers Mathe-Labor",
                subtitle: "Beweis 1. Binomische Formel"
            });

            // 2. Build Sidebar via CyberUI
            CyberUI.init();
            
            CyberUI.createCard('parameters-container', 'AUFTEILUNG', `
                <div class="area-item" style="color:var(--neon-gold);">
                    <span style="font-family:Orbitron; font-size:0.8rem;">P-WERT</span>
                    <span id="val-p" class="stat-val">7.00</span>
                </div>
                <input type="range" id="p-slider" min="0.5" max="9.5" step="0.01" value="7" style="accent-color:var(--neon-gold); width:100%;">
                <p style="font-size: 0.65rem; color: rgba(255,255,255,0.4); text-align: center; margin-top: 10px; font-family:Outfit;">Tipp: Ziehe den Mittelpunkt im Quadrat!</p>
            `);

            CyberUI.createCard('parameters-container', 'ANALYTIK', `
                <div class="area-list">
                    <div class="area-item" style="color:var(--neon-gold);">
                        <span id="lbl-side-p2"></span>
                        <span id="stat-p2-lt" class="stat-val"></span>
                    </div>
                    <div class="area-item" style="color:var(--neon-green);">
                        <span id="lbl-side-2pq"></span>
                        <span id="stat-2pq-lt" class="stat-val"></span>
                    </div>
                    <div class="area-item" style="color:var(--neon-cyan);">
                        <span id="lbl-side-q2"></span>
                        <span id="stat-q2-lt" class="stat-val"></span>
                    </div>
                    <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin: 12px 0;">
                    <div class="area-item" style="color:white; font-size:1.1rem;">
                        <span style="font-family:Orbitron; font-size:0.8rem;">GESAMT</span>
                        <span id="stat-total" class="stat-val">100.00</span>
                    </div>
                </div>
            `);

            // Grab references after injection
            pSlider = document.getElementById('p-slider');
            board = document.getElementById('formula-glow-v3');

            pSlider.addEventListener('input', (e) => { 
                p = parseFloat(e.target.value); 
                updateUI(); 
                draw(); 
            });

            updateUI();
            resize();
        });

        function updateUI() {
            q = S - p;

            if (window.katex) {
                // Main Formula at the bottom
                const latex = `\\color{white}{(}\\color{#ffcc00}{p}+\\color{#00f2ff}{q}\\color{white}{)}^2 = \\color{#ffcc00}{p^2} + \\color{white}{2}\\color{#ffcc00}{p}\\color{#00f2ff}{q} + \\color{#00f2ff}{q^2}`;
                katex.render(latex, board, { displayMode: true, throwOnError: false });

                // Analytics Section Symbols in LaTeX
                katex.render('\\color{#ffcc00}{p^2}', document.getElementById('lbl-side-p2'), { throwOnError: false });
                katex.render('\\color{white}{2}\\color{#ffcc00}{p}\\color{#00f2ff}{q}', document.getElementById('lbl-side-2pq'), { throwOnError: false });
                katex.render('\\color{#00f2ff}{q^2}', document.getElementById('lbl-side-q2'), { throwOnError: false });

                katex.render((p * p).toFixed(2), document.getElementById('stat-p2-lt'), { throwOnError: false });
                katex.render((2 * p * q).toFixed(2), document.getElementById('stat-2pq-lt'), { throwOnError: false });
                katex.render((q * q).toFixed(2), document.getElementById('stat-q2-lt'), { throwOnError: false });

                document.getElementById('val-p').innerText = p.toFixed(2);
            }
        }

        function resize() {
            const container = document.getElementById('canvas-container');
            const wrapper = document.getElementById('geometry-wrapper');
            if (!container || !wrapper) return;

            const dpr = window.devicePixelRatio || 1;
            totalSize = Math.min(container.clientWidth, container.clientHeight) * 0.7;

            canvas.width = totalSize * dpr;
            canvas.height = totalSize * dpr;
            canvas.style.width = totalSize + "px";
            canvas.style.height = totalSize + "px";
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            wrapper.style.width = totalSize + "px";
            wrapper.style.height = totalSize + "px";
            board.style.fontSize = (totalSize * 0.08) + "px";

            draw();
        }

        function updateLabels(px, qx) {
            if (!window.katex) return;

            const labels = {
                'lbl-p2': { x: px / 2, y: px / 2, tex: '\\color{#ffcc00}{p^2}' },
                'lbl-pq1': { x: px + qx / 2, y: px / 2, tex: '\\color{#ffcc00}{p}\\color{#00f2ff}{q}' },
                'lbl-pq2': { x: px / 2, y: px + qx / 2, tex: '\\color{#ffcc00}{p}\\color{#00f2ff}{q}' },
                'lbl-q2': { x: px + qx / 2, y: px + qx / 2, tex: '\\color{#00f2ff}{q^2}' },
                'lbl-p-top': { x: px / 2, y: -28, tex: '\\color{#ffcc00}{p}' },
                'lbl-q-top': { x: px + qx / 2, y: -28, tex: '\\color{#00f2ff}{q}' },
                'lbl-p-left': { x: -28, y: px / 2, tex: '\\color{#ffcc00}{p}' },
                'lbl-q-left': { x: -28, y: px + qx / 2, tex: '\\color{#00f2ff}{q}' }
            };

            for (const [id, cfg] of Object.entries(labels)) {
                const el = document.getElementById(id);
                if (!el) continue;
                el.style.left = cfg.x + 'px';
                el.style.top = cfg.y + 'px';

                if (!el.dataset.rendered || (isDragging && id.includes('lbl-'))) {
                    katex.render(cfg.tex, el, { throwOnError: false });
                    el.dataset.rendered = "true";
                }
            }
        }

        function draw() {
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            ctx.clearRect(0, 0, w, h);

            const scaleFactor = totalSize / S;
            const px = p * scaleFactor;
            const qx = q * scaleFactor;

            ctx.strokeStyle = "rgba(255,255,255,0.1)";
            ctx.lineWidth = 1;
            ctx.strokeRect(offsetX, offsetY, totalSize, totalSize);

            drawRect(offsetX, offsetY, px, px, 'rgba(255, 204, 0, 0.6)');      // p^2
            drawRect(offsetX + px, offsetY, qx, px, 'rgba(57, 255, 20, 0.6)');    // pq1
            drawRect(offsetX, offsetY + px, px, qx, 'rgba(57, 255, 20, 0.6)');    // pq2
            drawRect(offsetX + px, offsetY + px, qx, qx, 'rgba(0, 242, 255, 0.6)');     // q^2

            drawAnnotations(offsetX, offsetY, px, qx);
            drawHandle(offsetX + px, offsetY + px, isDragging);
            updateLabels(px, qx);
        }

        function drawRect(x, y, w, h, color) {
            ctx.save();
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            ctx.fillStyle = color;
            ctx.strokeStyle = "rgba(255,255,255,0.5)";
            ctx.lineWidth = 2;
            ctx.fillRect(x, y, w, h);
            ctx.strokeRect(x, y, w, h);
            ctx.restore();
        }

        function drawHandle(x, y, active) {
            ctx.save();
            ctx.shadowBlur = active ? 30 : 20;
            ctx.shadowColor = active ? "#00d2ff" : "white";
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(x, y, active ? 8 : 6, 0, Math.PI * 2);
            ctx.fill();
            
            if (active) {
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, Math.PI * 2);
                ctx.strokeStyle = "rgba(255,255,255,0.3)";
                ctx.stroke();
            }

            ctx.strokeStyle = active ? "#00d2ff" : "white";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x - 15, y); ctx.lineTo(x + 15, y);
            ctx.moveTo(x, y - 15); ctx.lineTo(x, y + 15);
            ctx.stroke();
            ctx.restore();
        }

        function drawAnnotations(x, y, px, qx) {
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.lineWidth = 1;
            drawL(x, y - 10, px);
            drawL(x + px, y - 10, qx);
            drawLv(x - 10, y, px);
            drawLv(x - 10, y + px, qx);
        }

        function drawL(x, y, len) {
            if (len < 5) return;
            ctx.beginPath();
            ctx.moveTo(x + 2, y); ctx.lineTo(x + len - 2, y);
            ctx.stroke();
        }
        function drawLv(x, y, len) {
            if (len < 5) return;
            ctx.beginPath();
            ctx.moveTo(x, y + 2); ctx.lineTo(x, y + len - 2);
            ctx.stroke();
        }

        function handleMove(mx, my) {
            const unit = totalSize / S;
            const targetP = (mx - offsetX) / unit;
            if (targetP >= 0.1 && targetP <= 9.9) {
                p = targetP;
                if (pSlider) pSlider.value = p;
                updateUI();
                draw();
            }
        }

        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            isDragging = true;
            canvas.setPointerCapture(e.pointerId);
            canvas.style.cursor = "grabbing";
            if (window.navigator.vibrate) window.navigator.vibrate(10);
            handleMove(mx, my);
        });

        window.addEventListener('pointerup', (e) => {
            isDragging = false;
            canvas.style.cursor = "crosshair";
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDragging) {
                const rect = canvas.getBoundingClientRect();
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                const unit = totalSize / S;
                const hx = offsetX + p * unit;
                const hy = offsetY + p * unit;
                const dist = Math.sqrt((mx - hx) ** 2 + (my - hy) ** 2);
                canvas.style.cursor = dist < 25 ? "grab" : "crosshair";
                return;
            }
            e.preventDefault(); 
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            handleMove(mx, my);
        });

        window.addEventListener('resize', resize);
    </script>
</body>
</html>
</body>
