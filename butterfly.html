<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Butterfly Curve | docalvers</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-pink: #f472b6;
            --neon-green: #4ade80;
            --neon-amber: #fbbf24;
            --bg-dark: #050b18;
            --glass: rgba(15, 23, 42, 0.75);
            --glass-bright: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #0a1329 0%, #050b18 100%);
            color: white;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
        }

        /* --- SIDEBAR --- */
        #side-panel {
            width: 380px;
            min-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            box-sizing: border-box;
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        .dashboard-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .dashboard-btn:hover {
            color: white;
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            transform: translateX(5px);
        }

        /* --- STATS & CONTROLS --- */
        .stats-card {
            background: var(--glass-bright);
            padding: 15px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stats-title {
            font-family: 'Orbitron';
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Orbitron';
        }
        .val-display { color: var(--neon-blue); font-weight: bold; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--neon-blue);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 5px;
        }
        button {
            background: var(--glass-bright);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        button:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue); }
        button.secondary { opacity: 0.6; }

        #equation-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: transparent; /* Box removed */
            backdrop-filter: none;
            padding: 12px 35px;
            width: fit-content;
            max-width: 85%;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            transition: all 0.5s ease;
        }
        .katex-display { margin: 0 !important; font-size: 1.2rem !important; font-weight: bold; letter-spacing: 1px; }

        /* --- MAIN VIEWPORT --- */
        #canvas-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 40px; /* Restored padding to prevent overflow */
        }
        canvas { display: block; }


        .footer-credit {
            margin-top: auto;
            font-family: 'Orbitron';
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <aside id="side-panel">
        <a href="index.html" class="dashboard-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            DASHBOARD
        </a>

        <section class="stats-card">
            <span class="stats-title">Animation</span>
            <div class="control-group">
                <div class="control-header">Speed <span class="val-display" id="val-speed">3.5</span></div>
                <input type="range" id="speed" min="0.5" max="15" step="0.5" value="3.5">
            </div>
            <div class="control-group">
                <div class="control-header">Color Hue <span class="val-display" id="val-color">180</span></div>
                <input type="range" id="color" min="0" max="360" step="1" value="180">
            </div>
            <div class="btn-group">
                <button id="btn-toggle">PAUSE</button>
                <button id="btn-reset" class="secondary">RESET</button>
            </div>
        </section>

        <section class="stats-card">
            <span class="stats-title">Parameter-Optimierung</span>
            
            <div class="control-group">
                <div class="control-header" style="color:var(--neon-pink);">Exp Amp <span id="val-eA" class="val-display" style="color:var(--neon-pink);">1.0</span></div>
                <input type="range" id="p-eA" min="0" max="4" step="0.1" value="1" style="accent-color:var(--neon-pink);">
            </div>

            <div class="control-group">
                <div class="control-header" style="color:var(--neon-green);">Cos Amp <span id="val-cA" class="val-display" style="color:var(--neon-green);">2.0</span></div>
                <input type="range" id="p-cA" min="0" max="6" step="0.1" value="2" style="accent-color:var(--neon-green);">
            </div>

            <div class="control-group">
                <div class="control-header" style="color:var(--neon-green);">Cos Freq <span id="val-cF" class="val-display" style="color:var(--neon-green);">4</span></div>
                <input type="range" id="p-cF" min="1" max="12" step="1" value="4" style="accent-color:var(--neon-green);">
            </div>

            <div class="control-group">
                <div class="control-header" style="color:var(--neon-amber);">Sin Amp <span id="val-sA" class="val-display" style="color:var(--neon-amber);">1.0</span></div>
                <input type="range" id="p-sA" min="0" max="4" step="0.1" value="1" style="accent-color:var(--neon-amber);">
            </div>

            <div class="control-group">
                <div class="control-header" style="color:var(--neon-amber);">Sin Div <span id="val-sP" class="val-display" style="color:var(--neon-amber);">24</span></div>
                <input type="range" id="p-sP" min="1" max="48" step="1" value="24" style="accent-color:var(--neon-amber);">
            </div>
        </section>

        <footer class="footer-credit">Doc Alvers Mathe-Labor</footer>
    </aside>

    <main id="canvas-container">

        <div id="equation-panel"></div>

        <canvas id="canvas"></canvas>
    </main>

    <script src="js/branding.js"></script>
    <script>
        // Initialize Branding
        CyberBranding.init({
            title: "Doc Alvers Mathe-Labor",
            subtitle: "Schmetterlings-Labor"
        });

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const sidePanel = document.getElementById('side-panel');
        
        let width, height, cx, cy;
        let expAmp = 1, cosAmp = 2, cosFreq = 4, sinAmp = 1, sinPeriod = 24;
        
        const ui = {
            speed: { el: document.getElementById('speed'), val: document.getElementById('val-speed') },
            color: { el: document.getElementById('color'), val: document.getElementById('val-color') },
            eA: { el: document.getElementById('p-eA'), val: document.getElementById('val-eA') },
            cA: { el: document.getElementById('p-cA'), val: document.getElementById('val-cA') },
            cF: { el: document.getElementById('p-cF'), val: document.getElementById('val-cF') },
            sA: { el: document.getElementById('p-sA'), val: document.getElementById('val-sA') },
            sP: { el: document.getElementById('p-sP'), val: document.getElementById('val-sP') },
            toggleBtn: document.getElementById('btn-toggle'),
            resetBtn: document.getElementById('btn-reset'),
        };

        function getScale() {
            const maxR = expAmp * Math.E + cosAmp + sinAmp;
            const minDim = Math.min(width, height);
            return (minDim / 2) / (maxR * 1.8); /* Corrected factor to 1.8 for balanced size */
        }

        function resize() {
            const container = document.getElementById('canvas-container');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            width = container.clientWidth;
            height = container.clientHeight;

            // Match formula panel width and scale down font
            const formulaPanel = document.getElementById('equation-panel');
            const visualWidth = Math.min(width, height) * 0.7;
            formulaPanel.style.width = Math.min(visualWidth, width * 0.6) + "px";
            formulaPanel.style.fontSize = "1.0rem"; // Increased by 10%

            cx = width / 2;
            cy = height / 2;
        }
        
        window.addEventListener('resize', resize);
        window.addEventListener('load', resize);
        
        let currentTheta = 0;
        let isPlaying = true;
        
        function updateParams() {
            expAmp = parseFloat(ui.eA.el.value);
            cosAmp = parseFloat(ui.cA.el.value);
            cosFreq = parseFloat(ui.cF.el.value);
            sinAmp = parseFloat(ui.sA.el.value);
            sinPeriod = parseFloat(ui.sP.el.value);
            
            ui.eA.val.innerText = expAmp.toFixed(1);
            ui.cA.val.innerText = cosAmp.toFixed(1);
            ui.cF.val.innerText = cosFreq;
            ui.sA.val.innerText = sinAmp.toFixed(1);
            ui.sP.val.innerText = sinPeriod;

            ui.speed.val.innerText = parseFloat(ui.speed.el.value).toFixed(1);
            ui.color.val.innerText = ui.color.el.value;

            // Render Polished LaTeX Equation
            function render() {
                if (window.katex) {
                    const latex = `r = \\color{#f472b6}{${expAmp === 1 ? '' : expAmp.toFixed(1)} e^{ \\sin(\\theta) }} - \\color{#4ade80}{${cosAmp.toFixed(1)} \\cos(${cosFreq}\\theta)} + \\color{#fbbf24}{${sinAmp === 1 ? '' : sinAmp.toFixed(1)} \\sin^5\\left(\\frac{2\\theta - \\pi}{${sinPeriod}}\\right)}`;
                    katex.render(latex, document.getElementById('equation-panel'), {
                        throwOnError: false,
                        displayMode: true
                    });
                } else {
                    setTimeout(render, 100);
                }
            }
            render();
        }

        [ui.speed.el, ui.color.el, ui.eA.el, ui.cA.el, ui.cF.el, ui.sA.el, ui.sP.el].forEach(el => {
            el.addEventListener('input', updateParams);
        });

        ui.toggleBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            ui.toggleBtn.textContent = isPlaying ? "PAUSE" : "PLAY";
        });
        
        ui.resetBtn.addEventListener('click', () => {
            currentTheta = 0;
        });

        function getButterflyXY(theta, currentScale) {
            const sinT = Math.sin(theta);
            const cos4T = Math.cos(cosFreq * theta);
            const term3 = Math.pow(Math.sin((2 * theta - Math.PI) / sinPeriod), 5);
            const r = expAmp * Math.exp(sinT) - cosAmp * cos4T + sinAmp * term3;
            return { 
                x: cx - (r * Math.cos(theta)) * currentScale, 
                y: cy - (r * Math.sin(theta)) * currentScale 
            };
        }

        let lastTime = performance.now();
        function draw() {
            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;
            
            const speedMult = parseFloat(ui.speed.el.value);
            const hueBase = parseInt(ui.color.el.value);
            const dynamicScale = getScale();

            if (isPlaying) currentTheta += speedMult * dt;

            // Transluscent clear for trail effect? No, user wants clean evolution.
            ctx.clearRect(0, 0, width, height);
            
            if (currentTheta > 0) {
                ctx.lineWidth = 1.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                const step = 0.02; 
                const maxExpectedTheta = sinPeriod * Math.PI; 
                const endT = Math.min(currentTheta, maxExpectedTheta);
                const dynamicHue = (hueBase + currentTheta * 8) % 360;
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${dynamicHue}, 100%, 50%)`;
                ctx.strokeStyle = `hsl(${dynamicHue}, 100%, 75%)`;

                ctx.beginPath();
                let first = true;
                for (let t = 0; t <= endT; t += step) {
                    const pt = getButterflyXY(t, dynamicScale);
                    if (first) { ctx.moveTo(pt.x, pt.y); first = false; }
                    else ctx.lineTo(pt.x, pt.y);
                }
                ctx.stroke();
            }
            
            requestAnimationFrame(draw);
        }
        
        updateParams();
        requestAnimationFrame(draw);
    </script>
</body>
</html>
