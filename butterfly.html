<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Butterfly Curve | docalvers</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-pink: #f472b6;
            --neon-green: #4ade80;
            --neon-amber: #fbbf24;
            --bg-dark: #050b18;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-bright: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: #050b18;
            color: white;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
        }

        #side-panel {
            width: 380px;
            min-width: 380px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
            box-sizing: border-box;
            box-shadow: 15px 0 45px rgba(0, 0, 0, 0.6);
            overflow-y: auto;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s;
        }
        .stat-card:hover { border-color: rgba(0, 210, 255, 0.3); background: rgba(255, 255, 255, 0.08); }

        .stat-label {
            font-family: 'Orbitron';
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 5px;
        }
        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Orbitron';
        }
        .val-display { color: var(--neon-blue); font-weight: bold; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--neon-blue);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 5px;
        }
        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        button:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 20px var(--neon-blue); }
        button.secondary { opacity: 0.6; }

        #main-viewport {
            flex-grow: 1;
            position: relative;
            background: #050b18;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        #equation-panel {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            pointer-events: none;
            text-align: center;
            width: fit-content;
            background: rgba(15, 23, 42, 0.1);
            backdrop-filter: blur(5px);
            padding: 10px 30px;
            border-radius: 15px;
            border: 1px solid rgba(210, 210, 210, 0.1);
        }
        .katex-display { margin: 0 !important; color: white; text-shadow: none; }
    </style>
</head>
<body>
    <div id="side-panel">
        <section class="stat-card">
            <span class="stat-label">Modul-Animation</span>
            <div class="control-group">
                <div class="control-header">Speed <span class="val-display" id="val-speed">3.5</span></div>
                <input type="range" id="speed" min="0.5" max="15" step="0.5" value="3.5">
            </div>
            <div class="control-group">
                <div class="control-header">Color Hue <span class="val-display" id="val-color">180</span></div>
                <input type="range" id="color" min="0" max="360" step="1" value="180">
            </div>
            <div class="btn-group">
                <button id="btn-toggle">PAUSE</button>
                <button id="btn-reset" class="secondary">RESET</button>
            </div>
        </section>

        <section class="stat-card">
            <span class="stat-label">Parameter-Optimierung</span>
            
            <div class="control-group">
                <div class="control-header" style="color:var(--neon-pink);">Exp Amp <span id="val-eA" class="val-display" style="color:var(--neon-pink);">1.0</span></div>
                <input type="range" id="p-eA" min="0" max="4" step="0.1" value="1" style="accent-color:var(--neon-pink);">
            </div>

            <div class="control-group">
                <div class="control-header" style="color:var(--neon-green);">Cos Amp <span id="val-cA" class="val-display" style="color:var(--neon-green);">2.0</span></div>
                <input type="range" id="p-cA" min="0" max="6" step="0.1" value="2" style="accent-color:var(--neon-green);">
            </div>

            <div class="control-group">
                <div class="control-header" style="color:var(--neon-green);">Cos Freq <span id="val-cF" class="val-display" style="color:var(--neon-green);">4</span></div>
                <input type="range" id="p-cF" min="1" max="12" step="1" value="4" style="accent-color:var(--neon-green);">
            </div>

            <div class="control-group">
                <div class="control-header" style="color:var(--neon-amber);">Sin Amp <span id="val-sA" class="val-display" style="color:var(--neon-amber);">1.0</span></div>
                <input type="range" id="p-sA" min="0" max="4" step="0.1" value="1" style="accent-color:var(--neon-amber);">
            </div>

            <div class="control-group">
                <div class="control-header" style="color:var(--neon-amber);">Sin Div <span id="val-sP" class="val-display" style="color:var(--neon-amber);">24</span></div>
                <input type="range" id="p-sP" min="1" max="48" step="1" value="24" style="accent-color:var(--neon-amber);">
            </div>
        </section>
    </div>

    <main id="main-viewport">
        <canvas id="canvas"></canvas>
        <div id="equation-panel"></div>
    </main>

    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cyber-canvas.js"></script>
    <script>
        /**
         * BUTTERFLY CURVE LABORATORY - ULTRA v5.3.8
         * High-Precision Polar Equation Rendering.
         */
        window.addEventListener('load', () => {
            // 1. Initialize Branding
            CyberBranding.init("SCHMETTERLINGS-LABOR");

            // 2. Initialize UI Engine
            CyberUI.init();

            // 3. Initialize CyberCanvas (Locked Viewport)
            CyberCanvasInstance.init('canvas', {
                minY: -7,
                maxY: 7
            }, {
                showLabels: true,
                showTelemetry: false,
                allowPan: false,
                maxRangeY: 50
            });

            // 4. State Management
            let currentTheta = 0;
            let isPlaying = true;
            let lastUpdate = performance.now();

            const params = {
                expAmp: 1,
                cosAmp: 2,
                cosFreq: 4,
                sinAmp: 1,
                sinPeriod: 24,
                speed: 3.5,
                hue: 180
            };

            // 5. Context Menu
            CyberCanvasInstance.onContextMenu = (e) => {
                CyberUI.showContextMenu(e.clientX, e.clientY, [
                    {
                        label: 'Animation Reset',
                        onclick: () => { currentTheta = 0; }
                    },
                    {
                        label: 'Ansicht zurücksetzen',
                        onclick: () => {
                            CyberCanvasInstance.resetView(-7, 7);
                        }
                    },
                    { divider: true },
                    {
                        label: 'Gitter anzeigen',
                        checked: CyberCanvasInstance.showGrid,
                        onchange: (val) => {
                            CyberCanvasInstance.showGrid = val;
                        }
                    },
                    {
                        label: 'Achsen anzeigen',
                        checked: CyberCanvasInstance.showAxes,
                        onchange: (val) => {
                            CyberCanvasInstance.showAxes = val;
                        }
                    },
                    {
                        label: 'Achsenbeschriftung',
                        checked: CyberCanvasInstance.showLabels,
                        onchange: (val) => {
                            CyberCanvasInstance.showLabels = val;
                        }
                    }
                ]);
            };

            // 6. UI Binding
            const ui = {
                eA: document.getElementById('p-eA'),
                cA: document.getElementById('p-cA'),
                cF: document.getElementById('p-cF'),
                sA: document.getElementById('p-sA'),
                sP: document.getElementById('p-sP'),
                speed: document.getElementById('speed'),
                color: document.getElementById('color'),
                toggleBtn: document.getElementById('btn-toggle'),
                resetBtn: document.getElementById('btn-reset'),
                displays: {
                    eA: document.getElementById('val-eA'),
                    cA: document.getElementById('val-cA'),
                    cF: document.getElementById('val-cF'),
                    sA: document.getElementById('val-sA'),
                    sP: document.getElementById('val-sP'),
                    speed: document.getElementById('val-speed'),
                    color: document.getElementById('val-color')
                }
            };

            function updateUIValues() {
                params.expAmp = parseFloat(ui.eA.value);
                params.cosAmp = parseFloat(ui.cA.value);
                params.cosFreq = parseFloat(ui.cF.value);
                params.sinAmp = parseFloat(ui.sA.value);
                params.sinPeriod = parseFloat(ui.sP.value);
                params.speed = parseFloat(ui.speed.value);
                params.hue = parseInt(ui.color.value);

                ui.displays.eA.innerText = params.expAmp.toFixed(1);
                ui.displays.cA.innerText = params.cosAmp.toFixed(1);
                ui.displays.cF.innerText = params.cosFreq;
                ui.displays.sA.innerText = params.sinAmp.toFixed(1);
                ui.displays.sP.innerText = params.sinPeriod;
                ui.displays.speed.innerText = params.speed.toFixed(1);
                ui.displays.color.innerText = params.hue;

                renderLaTeX();
            }

            function renderLaTeX() {
                if (window.katex) {
                    const latex = `r = \\color{#f472b6}{${params.expAmp.toFixed(1)} e^{ \\sin(\\theta) }} - \\color{#4ade80}{${params.cosAmp.toFixed(1)} \\cos(${params.cosFreq}\\theta)} + \\color{#fbbf24}{${params.sinAmp.toFixed(1)} \\sin^5\\left(\\frac{2\\theta - \\pi}{${params.sinPeriod}}\\right)}`;
                    katex.render(latex, document.getElementById('equation-panel'), {
                        throwOnError: false,
                        displayMode: true
                    });
                }
            }

            [ui.eA, ui.cA, ui.cF, ui.sA, ui.sP, ui.speed, ui.color].forEach(el => {
                el.addEventListener('input', updateUIValues);
            });

            ui.toggleBtn.addEventListener('click', () => {
                isPlaying = !isPlaying;
                ui.toggleBtn.textContent = isPlaying ? "PAUSE" : "PLAY";
            });

            ui.resetBtn.addEventListener('click', () => {
                currentTheta = 0;
            });

            // 7. Math & Rendering
            function getButterflyXY(theta) {
                const sinT = Math.sin(theta);
                const cos4T = Math.cos(params.cosFreq * theta);
                const term3 = Math.pow(Math.sin((2 * theta - Math.PI) / params.sinPeriod), 5);
                const r = params.expAmp * Math.exp(sinT) - params.cosAmp * cos4T + params.sinAmp * term3;
                return { 
                    x: r * Math.cos(theta), 
                    y: r * Math.sin(theta)
                };
            }

            // High Precision Render Loop
            function mainLoop() {
                const now = performance.now();
                const dt = (now - lastUpdate) / 1000;
                lastUpdate = now;

                if (isPlaying) currentTheta += params.speed * dt;

                // CyberCanvas Handling
                CyberCanvasInstance.drawGrid({
                    vignette: true,
                    glow: true,
                    mainColor: 'rgba(0, 210, 255, 0.4)'
                });

                const ctx = CyberCanvasInstance.ctx;
                
                if (currentTheta > 0) {
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    
                    const step = 0.02; 
                    const maxTheta = params.sinPeriod * Math.PI; 
                    const endT = Math.min(currentTheta, maxTheta);
                    const currentHue = (params.hue + currentTheta * 8) % 360;
                    
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = `hsl(${currentHue}, 100%, 50%)`;
                    ctx.strokeStyle = `hsl(${currentHue}, 100%, 70%)`;

                    ctx.beginPath();
                    let first = true;
                    for (let t = 0; t <= endT; t += step) {
                        const pt = getButterflyXY(t);
                        const px = CyberCanvasInstance.mapX(pt.x);
                        const py = CyberCanvasInstance.mapY(pt.y);
                        if (first) { ctx.moveTo(px, py); first = false; }
                        else ctx.lineTo(px, py);
                    }
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                requestAnimationFrame(mainLoop);
            }

            // Init
            updateUIValues();
            mainLoop();
        });
    </script>
</body>
</html>
