<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | Cool Squares - The Proof</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <link rel="stylesheet" href="js/cyber-lab-overrides.css">
    <style>
        #main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #geometry-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas#squareCanvas {
            max-width: 95%;
            max-height: 95%;
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.1));
        }
    </style>
</head>
<body>
    <nav id="mini-rail">
        <div class="nav-btn" onclick="toggleSidebar()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
    </nav>

    <aside id="side-panel">
        <header id="sidebar-header" style="min-height: 80px;"></header>
        <div id="ui-container"></div>
        <div id="data-container"></div>
    </aside>

    <main id="main-content">
        <div id="geometry-container">
            <canvas id="squareCanvas"></canvas>
        </div>
    </main>

    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('side-panel').classList.toggle('collapsed');
            setTimeout(() => window.dispatchEvent(new Event('resize')), 400);
        }

        window.addEventListener('load', () => {
            CyberBranding.init({
                title: "Doc Alvers Mathe-Labor",
                subtitle: "DER ULTIMATIVE QUADRAT-BEWEIS"
            });

            CyberBranding.setBriefing(`
                <h3 style="color:var(--neon-blue); font-family:Orbitron; margin-bottom:10px;">MISSION: DER BEWEIS</h3>
                Die Variable <b>x</b> kürzt sich mathematisch heraus.
            `);

            CyberUI.init();

            const canvas = document.getElementById('squareCanvas');
            const ctx = canvas.getContext('2d');
            
            let a = 2;
            const x = 5; 

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const y = 4 * a;        
                const s1 = x + a;       
                const s2 = x + 2 * a;   
                const s3 = x + 3 * a;   
                const s4 = x + 4 * a;   

                const totalW = s4 + y;
                const totalH = s4 + a + s2; 

                const padding = 120;
                const scale = Math.min((canvas.width - padding) / totalW, (canvas.height - padding) / totalH);
                
                const offsetX = (canvas.width - totalW * scale) / 2;
                const offsetY = (canvas.height - totalH * scale) / 2;
                const spineX = offsetX + s4 * scale;

                const squares = [
                    { id: 'S4', w: s4, h: s4, x: 0, y: 0, color: "rgba(0, 210, 255, 0.15)", stroke: "rgba(0, 210, 255, 0.4)" }, 
                    { id: 'G',  w: y,  h: y,  x: s4, y: 0, color: "rgba(163, 190, 100, 0.8)", stroke: "#a3be64", area: (y*y).toFixed(0), txt: "white" }, 
                    { id: 'O',  w: a,  h: a,  x: s4 - a, y: s4, color: "rgba(255, 204, 0, 0.9)", stroke: "#ffcc00", area: (a*a).toFixed(0), txt: "black" }, 
                    { id: 'S1', w: s1, h: s1, x: s4, y: y, color: "rgba(0, 210, 255, 0.15)", stroke: "rgba(0, 210, 255, 0.4)" }, 
                    { id: 'S3', w: s3, h: s3, x: s4 - a - s3, y: s4, color: "rgba(0, 210, 255, 0.15)", stroke: "rgba(0, 210, 255, 0.4)" }, 
                    { id: 'S2', w: s2, h: s2, x: s4 - a, y: s4 + a, color: "rgba(0, 210, 255, 0.15)", stroke: "rgba(0, 210, 255, 0.4)" } 
                ];

                squares.forEach(s => {
                    const rx = offsetX + s.x * scale;
                    const ry = offsetY + s.y * scale;
                    const rw = s.w * scale;
                    const rh = s.h * scale;

                    ctx.fillStyle = s.color;
                    ctx.fillRect(rx, ry, rw, rh);
                    ctx.strokeStyle = s.stroke || "rgba(255,255,255,0.2)";
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(rx, ry, rw, rh);

                    if (s.area !== undefined) {
                        ctx.fillStyle = s.txt;
                        ctx.font = `700 12pt Orbitron`;
                        ctx.textAlign = "center";
                        ctx.fillText(s.area, rx + rw/2, ry + rh/2 + 6);
                    }
                });

                const spineY_green_bottom = y * scale;
                const spineY_orange_top = s4 * scale;
                
                ctx.beginPath();
                ctx.strokeStyle = "#9d50bb"; 
                ctx.lineWidth = 4;
                ctx.moveTo(spineX, offsetY + spineY_green_bottom);
                ctx.lineTo(spineX, offsetY + spineY_orange_top);
                ctx.stroke();

                ctx.font = `600 12pt Orbitron`;
                ctx.fillStyle = "#9d50bb";
                ctx.textAlign = "left";
                ctx.fillText(`x`, spineX + 15, offsetY + (spineY_green_bottom + spineY_orange_top)/2 + 6);

                ctx.beginPath();
                ctx.strokeStyle = "#ff8c00";
                ctx.moveTo(spineX, offsetY + spineY_orange_top);
                ctx.lineTo(spineX, offsetY + spineY_orange_top + a * scale);
                ctx.stroke();
                
                ctx.fillStyle = "#ff8c00";
                ctx.fillText(`a = ${a}`, spineX + 15, offsetY + spineY_orange_top + (a/2) * scale + 6);

                ctx.fillStyle = "white";
                ctx.textAlign = "right";
                ctx.fillText(`y = ${y}`, spineX - 15, offsetY + (y/2) * scale + 6);
            }

            function update() {
                draw();
                CyberUI.updateStatsGrid('data-container', [
                    { label: 'Input a', value: a, color: '#ffcc00' },
                    { label: 'Lücke x', value: x, color: '#9d50bb' },
                    { label: 'Ergebnis y', value: 4*a, color: '#a3be64' },
                    { label: 'Fläche Grün', value: 16*a*a, color: 'white' }
                ]);
            }

            window.addEventListener('resize', () => {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
                draw();
            });
            window.dispatchEvent(new Event('resize'));

            CyberUI.createCard('ui-container', 'PROPORTIONEN', '<div id="sliders"></div>', 'var(--neon-blue)');
            CyberUI.createSlider('sliders', 'Zentral-Seite a', 1, 40, 2, 1, (val) => { 
                a = parseInt(val); 
                update(); 
            }, '#ffcc00');
            update();
        });
    </script>
</body>
</html>
