<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | Cool Squares Labor</title>
    <!-- Fonts & Tools -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <link rel="stylesheet" href="js/cyber-lab-overrides.css">
    <style>
        #main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #geometry-container {
            width: 95%;
            height: 85vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas#squareCanvas {
            max-width: 100%;
            max-height: 100%;
            filter: drop-shadow(0 0 30px rgba(0, 0, 0, 0.5));
        }

        /* Floating HUD Tags */
        #tag-container {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 20;
            pointer-events: none;
        }

        .floating-tag {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Orbitron';
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
            border: 1px solid rgba(0, 210, 255, 0.5);
            color: var(--neon-blue);
            transition: all 0.3s ease;
        }

        .tag-y { border-color: #a3be64; color: #a3be64; }
        .tag-x { border-color: #ff3344; color: #ff3344; }
        .tag-a { border-color: #ffcc00; color: #ffcc00; }
    </style>
</head>
<body>
    <!-- Mini Rail -->
    <nav id="mini-rail">
        <div class="nav-btn" onclick="toggleSidebar()" title="Menü umschalten">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
    </nav>

    <aside id="side-panel">
        <header id="sidebar-header" style="min-height: 80px;"></header>
        <div id="ui-container"></div>
        <div id="data-container"></div>
    </aside>

    <main id="main-content">
        <div id="tag-container">
            <div class="floating-tag tag-y" id="hud-y">y = 24</div>
            <div class="floating-tag tag-x" id="hud-x">x = 5</div>
            <div class="floating-tag tag-a" id="hud-a">a = 6</div>
        </div>
        
        <div id="geometry-container">
            <canvas id="squareCanvas"></canvas>
        </div>
    </main>

    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script>
        function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
            }, 400);
        }

        window.addEventListener('load', () => {
            CyberBranding.init({
                title: "Doc Alvers Mathe-Labor",
                subtitle: "GEOMETRISCHE QUADRAT-ANALYSE"
            });

            CyberBranding.setBriefing(`
                <h3 style="color:var(--neon-blue); font-family:Orbitron; margin-bottom:10px;">MISSION: PROPORTION</h3>
                Untersuchen Sie, wie sich die Flächen verändern, wenn die Kernvariablen angepasst werden.
                
                <div class="admin-info">
                    <h4 style="color:var(--neon-blue); font-family:Orbitron; font-size:0.8rem; margin:0 0 5px 0;">VARIABLE KOMPONENTEN</h4>
                    <ul style="margin:0; padding-left:18px; font-size:0.85rem; opacity:0.9;">
                        <li><b>y:</b> Höhe/Breite des grünen Quadrats.</li>
                        <li><b>x:</b> Die rote Lücke zwischen den Blöcken.</li>
                        <li><b>a:</b> Höhe/Breite des orangen Quadrats.</li>
                    </ul>
                </div>
            `);

            CyberUI.init();

            const canvas = document.getElementById('squareCanvas');
            const ctx = canvas.getContext('2d');
            
            // Initial State matching the screenshot
            let y = 24;
            let x = 5;
            let a = 6;
            let wL = 35; // Default left width

            function updateGeometry() {
                // Keep the layout visually balanced but respect variables
                wL = Math.max(a + 10, y + x); 
                draw();
                updateHUD();
                updateStats();
            }

            function updateHUD() {
                document.getElementById('hud-y').innerText = `y = ${y}`;
                document.getElementById('hud-x').innerText = `x = ${x}`;
                document.getElementById('hud-a').innerText = `a = ${a}`;
            }

            function updateStats() {
                const areaGreen = y * y;
                const areaOrange = a * a;
                const areaBlueTopLeft = wL * (y + x);
                const areaBlueBottomLeft = (wL - a) * a;
                const areaBlueRight = y * (x + a);
                const totalArea = (wL + y) * (y + x + a);

                CyberUI.updateStatsGrid('data-container', [
                    { label: 'Fläche Grün', value: areaGreen, color: '#a3be64' },
                    { label: 'Fläche Orange', value: areaOrange, color: '#ffcc00' },
                    { label: 'Fläche Blau (TL)', value: areaBlueTopLeft.toFixed(0), color: 'var(--neon-blue)' },
                    { label: 'Fläche Blau (BL)', value: areaBlueBottomLeft.toFixed(0), color: 'var(--neon-blue)' },
                    { label: 'Fläche Blau (R)', value: areaBlueRight.toFixed(0), color: 'var(--neon-blue)' },
                    { label: 'Gesamtfläche', value: totalArea.toFixed(0), color: 'white' }
                ]);
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const totalH = y + x + a;
                const totalW = wL + y;
                
                const padding = 60;
                const availableW = canvas.width - padding * 2;
                const availableH = canvas.height - padding * 2;
                const scale = Math.min(availableW / totalW, availableH / totalH);
                
                const drawW = totalW * scale;
                const drawH = totalH * scale;
                const startX = (canvas.width - drawW) / 2;
                const startY = (canvas.height - drawH) / 2;
                const spineX = startX + wL * scale;

                ctx.lineJoin = "round";

                // 1. Blue Rect: Top-Left
                ctx.fillStyle = "rgba(0, 210, 255, 0.15)";
                ctx.strokeStyle = "rgba(0, 210, 255, 0.4)";
                ctx.lineWidth = 2;
                ctx.fillRect(startX, startY, wL * scale, (y + x) * scale);
                ctx.strokeRect(startX, startY, wL * scale, (y + x) * scale);
                
                // 2. Blue Rect: Bottom-Left (left of orange)
                ctx.fillRect(startX, startY + (y + x) * scale, (wL - a) * scale, a * scale);
                ctx.strokeRect(startX, startY + (y + x) * scale, (wL - a) * scale, a * scale);

                // 3. Blue Rect: Right (below green)
                ctx.fillRect(spineX, startY + y * scale, y * scale, (x + a) * scale);
                ctx.strokeRect(spineX, startY + y * scale, y * scale, (x + a) * scale);

                // 4. Green Square (Top-Right)
                ctx.fillStyle = "rgba(163, 190, 100, 0.7)";
                ctx.strokeStyle = "#a3be64";
                ctx.fillRect(spineX, startY, y * scale, y * scale);
                ctx.strokeRect(spineX, startY, y * scale, y * scale);
                
                // Label for Green
                ctx.fillStyle = "white";
                ctx.font = `${Math.max(12, 18 * scale / 10)}px Orbitron`;
                ctx.textAlign = "center";
                ctx.fillText(y * y, spineX + (y * scale) / 2, startY + (y * scale) / 2 + 7);
                
                // Label "y = ..."
                ctx.fillStyle = "#a3be64";
                ctx.font = `${Math.max(10, 14 * scale / 10)}px Outfit`;
                ctx.textAlign = "right";
                ctx.fillText(`y = ${y}`, spineX - 15, startY + (y * scale) / 2 + 5);

                // 5. Orange Square (Bottom-Near-Left)
                ctx.fillStyle = "rgba(255, 204, 0, 0.7)";
                ctx.strokeStyle = "#ffcc00";
                const orangeX = spineX - a * scale;
                const orangeY = startY + (y + x) * scale;
                ctx.fillRect(orangeX, orangeY, a * scale, a * scale);
                ctx.strokeRect(orangeX, orangeY, a * scale, a * scale);
                
                // Label for Orange
                ctx.fillStyle = "black";
                ctx.font = `${Math.max(12, 18 * scale / 10)}px Orbitron`;
                ctx.fillText(a * a, orangeX + (a * scale) / 2, orangeY + (a * scale) / 2 + 7);

                // Label "a = ..."
                ctx.fillStyle = "#ffcc00";
                ctx.textAlign = "left";
                ctx.fillText(`a = ${a}`, spineX + 15, orangeY + (a * scale) / 2 + 5);

                // 6. Red Spine Segment (x)
                ctx.beginPath();
                ctx.strokeStyle = "#ff3344";
                ctx.lineWidth = 4;
                ctx.moveTo(spineX, startY + y * scale);
                ctx.lineTo(spineX, startY + (y + x) * scale);
                ctx.stroke();
                
                // Label "x = ..."
                ctx.fillStyle = "#ff3344";
                ctx.textAlign = "left";
                ctx.fillText(`x = ${x}`, spineX + 15, startY + (y + x / 2) * scale + 5);
            }

            function resize() {
                const rect = canvas.parentElement.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;
                draw();
            }
            window.addEventListener('resize', resize);
            resize();

            // UI Components
            CyberUI.createCard('ui-container', 'PARAMETER-CONTROL', '<div id="sliders"></div>', 'var(--neon-blue)');
            
            CyberUI.createSlider('sliders', 'Höhe Grün (y)', 10, 100, 24, 1, (val) => {
                y = parseInt(val);
                updateGeometry();
            }, '#a3be64');

            CyberUI.createSlider('sliders', 'Lücke (x)', 0, 50, 5, 1, (val) => {
                x = parseInt(val);
                updateGeometry();
            }, '#ff3344');

            CyberUI.createSlider('sliders', 'Höhe Orange (a)', 5, 100, 6, 1, (val) => {
                a = parseInt(val);
                updateGeometry();
            }, '#ffcc00');

            updateGeometry();
        });
    </script>
</body>
</html>
