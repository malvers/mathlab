<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Differential-Labor | docalvers</title>
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <style>
        /* Lab-specific tuning for ULTRA v5.3.8 aesthetic */
        #main-canvas {
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
            display: block;
        }

        .slider-box {
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .slider-box:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .val-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue);
            margin-bottom: 10px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 5px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .checkbox-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .checkbox-item label {
            margin-bottom: 0;
            font-size: 0.7rem;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            color: white;
            opacity: 0.7;
            cursor: pointer;
        }

        /* Value Colors & Glows */
        .color-purple {
            color: var(--neon-purple) !important;
            text-shadow: 0 0 15px var(--neon-purple);
        }

        .color-green {
            color: var(--neon-green) !important;
            text-shadow: 0 0 15px var(--neon-green);
        }

        .color-orange {
            color: var(--neon-orange) !important;
            text-shadow: 0 0 15px var(--neon-orange);
        }
    </style>
</head>

<body>

    <aside id="side-panel">
        <div id="sidebar-header" style="min-height: 60px;"></div>
        <div id="parameters-container"></div>

        <div
            style="margin-top: auto; padding-top: 20px; text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.2); font-family: 'Orbitron';">
            &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull;
        </div>
    </aside>

    <div id="main-content">
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/cyber-canvas.js"></script>
    <script src="js/branding.js"></script>
    <script src="js/math-library.js"></script>
    <script src="js/formula.js"></script>
    <script src="js/ui.js"></script>

    <script>
        window.addEventListener('load', () => {
            // Module Engine Initialization
            CyberBranding.init({
                title: "Doc Alvers Mathe-Labor",
                subtitle: "DIFFERENTIALRECHNUNG"
            });

            CyberUI.init();


            // Math Logic
            let currentFunc = MathLibrary.get('kubisch');
            let x0 = 1.0;
            let showDerivative = false;
            let showSecondDeriv = false;

            // UI Setup
            CyberUI.createCard('parameters-container', 'Funktions-Konfigurator', `
                <div id="function-selector-container"></div>

                <div class="slider-box">
                    <label>Punkt-Position (x₀)</label>
                    <div class="val-display" id="val-x0">1.00</div>
                    <input type="range" id="slider-x0" min="-5" max="5" step="0.01" value="1.00">
                </div>
                
                <div class="slider-box">
                    <label>1. Ableitung f'(x₀)</label>
                    <div class="val-display color-purple" id="val-m">0.00</div>
                </div>

                <div class="slider-box">
                    <label>2. Ableitung f''(x₀)</label>
                    <div class="val-display color-green" id="val-ddm">0.00</div>
                </div>

                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="check-deriv">
                        <label for="check-deriv" class="color-orange">1. Ableitung zeigen</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="check-deriv2">
                        <label for="check-deriv2" class="color-green">2. Ableitung zeigen</label>
                    </div>
                </div>
            </div>
        `, 'var(--neon-blue)');

            // Initialize Dropdown
            CyberUI.createDropdown('function-selector-container', MathLibrary.getAll(), (id) => {
                currentFunc = MathLibrary.get(id);
                draw();
            }, currentFunc.id);

            // Force KaTeX render on initial trigger once katex is ready
            setTimeout(() => {
                if (window.katex) {
                    document.querySelectorAll('.math-part[data-tex]').forEach(mp => {
                        if (mp.dataset.tex) katex.render(mp.dataset.tex, mp, { throwOnError: false });
                    });
                }
            }, 300);

            CyberBranding.setBriefing(`
            <b>Differential-Labor</b> – Ableitung & Tangente<br><br>
            Dieses Labor visualisiert die Ableitung einer Funktion und die zugehörige Tangente.<br><br>
            <b>So funktioniert es:</b><br>
            • Wähle eine Funktion aus dem Dropdown<br>
            • Verschiebe den Punkt x₀ mit dem Schieberegler oder per Klick auf den Canvas<br>
            • Die lila Tangente zeigt die lokale Steigung f'(x₀)<br>
            • Aktiviere die Checkboxen, um f'(x) und f''(x) einzublenden
        `);

            CyberFormula.init({ anchorId: 'canvas-container' });

            // Initialize CyberCanvas
            CyberCanvasInstance.init('main-canvas', {
                minX: -8,
                maxX: 8,
                minY: -6,
                maxY: 6
            });

            function resize() {
                CyberCanvasInstance.resize();
                draw();
            }

            // Bind resize event
            CyberCanvasInstance.onResize = () => draw();

            // State management
            function getNeonColor(name) {
                return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#ffffff';
            }

            function drawGraph(f, color, thickness = 3, shadow = true) {
                const ctx = CyberCanvasInstance.ctx;
                ctx.strokeStyle = color;
                ctx.lineWidth = thickness;

                if (shadow) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = color;
                }

                ctx.beginPath();
                const width = CyberCanvasInstance.width;
                const dpr = window.devicePixelRatio || 1;

                for (let px = 0; px <= width; px++) {
                    const x = CyberCanvasInstance.unmapX(px);
                    const y = f(x);
                    const py = CyberCanvasInstance.mapY(y);

                    if (px === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            function drawTangent() {
                const ctx = CyberCanvasInstance.ctx;
                const y0 = currentFunc.f(x0);
                const m = currentFunc.df(x0);

                const L = 5.0;
                const halfL = L / 2;
                const angle = Math.atan(m);
                const dx = Math.cos(angle) * halfL;
                const dy = Math.sin(angle) * halfL;

                ctx.strokeStyle = getNeonColor('--neon-purple');
                ctx.lineWidth = 4;

                const p1x = CyberCanvasInstance.mapX(x0 - dx);
                const p1y = CyberCanvasInstance.mapY(y0 - dy);
                const p2x = CyberCanvasInstance.mapX(x0 + dx);
                const p2y = CyberCanvasInstance.mapY(y0 + dy);

                ctx.shadowBlur = 15;
                ctx.shadowColor = getNeonColor('--neon-purple');
                ctx.beginPath();
                ctx.moveTo(p1x, p1y);
                ctx.lineTo(p2x, p2y);
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Draw point
                const p0x = CyberCanvasInstance.mapX(x0);
                const p0y = CyberCanvasInstance.mapY(y0);
                ctx.fillStyle = "white";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "white";
                ctx.beginPath();
                ctx.arc(p0x, p0y, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            function draw() {
                CyberCanvasInstance.drawGrid({
                    vignette: true,
                    glow: true
                });

                if (showDerivative) {
                    drawGraph(currentFunc.df, getNeonColor('--neon-orange'), 2, false);
                }

                if (showSecondDeriv) {
                    drawGraph(currentFunc.ddf, getNeonColor('--neon-green'), 2, false);
                }

                drawGraph(currentFunc.f, getNeonColor('--neon-blue'), 3, false);
                drawTangent();

                updateFormula();
                document.getElementById('val-x0').innerText = x0.toFixed(2);
                document.getElementById('val-m').innerText = currentFunc.df(x0).toFixed(2);
                document.getElementById('val-ddm').innerText = currentFunc.ddf(x0).toFixed(2);
            }

            function updateFormula() {
                CyberFormula.set(currentFunc.tex);
            }

            // Interaction
            document.getElementById('slider-x0').addEventListener('input', (e) => {
                x0 = parseFloat(e.target.value);
                draw();
            });

            document.getElementById('check-deriv').addEventListener('change', (e) => {
                showDerivative = e.target.checked;
                draw();
            });

            document.getElementById('check-deriv2').addEventListener('change', (e) => {
                showSecondDeriv = e.target.checked;
                draw();
            });

            window.addEventListener('resize', resize);
            resize(); // Direct call - we are already inside the load event

            // Custom interaction on canvas
            let isDragging = false;
            CyberCanvasInstance.canvas.addEventListener('mousedown', (e) => { isDragging = true; handleInteraction(e); });
            window.addEventListener('mousemove', (e) => { if (isDragging) handleInteraction(e); });
            window.addEventListener('mouseup', () => { isDragging = false; });

            function handleInteraction(e) {
                const rect = CyberCanvasInstance.canvas.getBoundingClientRect();
                const posX = e.clientX - rect.left;
                const mathX = CyberCanvasInstance.unmapX(posX);
                x0 = Math.max(-5, Math.min(5, mathX));
                document.getElementById('slider-x0').value = x0;
                draw();
            }

        }); // End DOMContentLoaded
    </script>
</body>

</html>
