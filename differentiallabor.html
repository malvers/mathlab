<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Differential-Labor | docalvers</title>
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
</head>

<body>

    <aside id="side-panel">
        <div id="sidebar-header" style="min-height: 80px;"></div>
        <div id="parameters-container"></div>

        <div
            style="margin-top: auto; padding-top: 20px; text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.2); font-family: 'Orbitron';">
            &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull;
        </div>
    </aside>

    <div id="main-content">
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/cyber-canvas.js"></script>
    <script src="js/branding.js"></script>
    <script src="js/math-library.js"></script>
    <script src="js/formula.js"></script>
    <script src="js/ui.js"></script>

    <script>
        window.addEventListener('load', () => {
            // Module Engine Initialization
            CyberBranding.init({
                title: "Doc Alvers Mathe-Labor",
                subtitle: "DIFFERENTIALRECHNUNG"
            });

            CyberBranding.setBriefing(`
                <h3 style="color:var(--neon-blue); font-family:Orbitron; margin-bottom:10px;">MISSION: DIFFERENTIALRECHNUNG</h3>
                Dieses Labor visualisiert die Ableitung einer Funktion und die zugehörige Tangente.
                
                <div class="admin-info">
                    <h4 style="color:var(--neon-blue); font-family:Orbitron; font-size:0.8rem; margin:0 0 5px 0;">STEUERUNG</h4>
                    <ul style="margin:0; padding-left:18px; font-size:0.85rem; opacity:0.9;">
                        <li><b>Funktion:</b> Wähle den Typ aus dem Dropdown.</li>
                        <li><b>Position (x₀):</b> Verschiebe den Punkt per Slider oder Canvas-Klick.</li>
                        <li><b>Tangente:</b> Visualisiert die lokale Steigung f'(x₀).</li>
                        <li><b>Ableitungen:</b> Schalte f'(x) und f''(x) Graphen ein/aus.</li>
                    </ul>
                </div>
            `);

            CyberUI.init();


            // Math Logic
            let currentFunc = MathLibrary.get('kubisch');
            let x0 = 1.0;
            let showDerivative = false;
            let showSecondDeriv = false;

            // UI Setup
            // x0 State
            const updateX0 = (val) => {
                x0 = val;
                draw();
                // If the slider update comes from canvas, we might need to sync the slider UI
                const slider = document.querySelector('.cyber-slider[id^="slider-"]');
                if (slider && parseFloat(slider.value) !== x0) slider.value = x0;
            };

            // UI Setup
            CyberUI.createCard('parameters-container', 'FUNKTIONALITÄT', `
                <div id="function-selector-container"></div>
                <div id="x0-slider-container"></div>
            `, 'var(--neon-blue)');

            CyberUI.createSlider('x0-slider-container', 'Punkt-Position (x₀)', -5, 5, x0, 0.01, updateX0, 'var(--neon-blue)');

            CyberUI.createCard('parameters-container', 'VISUALISIERUNG', `
                <div id="view-opts" style="display:flex; flex-direction:column; gap:6px;"></div>
            `, 'var(--neon-orange)');

            CyberUI.createCheckbox('view-opts', "1. Ableitung f'(x)", showDerivative, (v) => { showDerivative = v; draw(); }, 'var(--neon-orange)');
            CyberUI.createCheckbox('view-opts', "2. Ableitung f''(x)", showDerivative, (v) => { showSecondDeriv = v; draw(); }, 'var(--neon-green)');

            const statsHTML = `
                <div class="stats-grid">
                    <div class="stats-card" style="border-left: 3px solid var(--neon-purple); padding-bottom:10px;">
                        <span class="stats-label">Steigung f'(x₀)</span>
                        <span id="val-m" class="stats-val" style="color:var(--neon-purple);">0.00</span>
                    </div>
                    <div class="stats-card" style="border-left: 3px solid var(--neon-green); padding-bottom:10px;">
                        <span class="stats-label">Krümmung f''(x₀)</span>
                        <span id="val-ddm" class="stats-val" style="color:var(--neon-green);">0.00</span>
                    </div>
                </div>
            `;
            CyberUI.createCard('parameters-container', 'ANALYSE', statsHTML, 'var(--neon-yellow)');

            // Initialize Dropdown
            CyberUI.createDropdown('function-selector-container', MathLibrary.getAll(), (id) => {
                currentFunc = MathLibrary.get(id);
                draw();
            }, currentFunc.id);

            // Force KaTeX render on initial trigger once katex is ready
            setTimeout(() => {
                if (window.katex) {
                    document.querySelectorAll('.math-part[data-tex]').forEach(mp => {
                        if (mp.dataset.tex) katex.render(mp.dataset.tex, mp, { throwOnError: false });
                    });
                }
            }, 300);

            CyberBranding.setBriefing(`
            <b>Differential-Labor</b> – Ableitung & Tangente<br><br>
            Dieses Labor visualisiert die Ableitung einer Funktion und die zugehörige Tangente.<br><br>
            <b>So funktioniert es:</b><br>
            • Wähle eine Funktion aus dem Dropdown<br>
            • Verschiebe den Punkt x₀ mit dem Schieberegler oder per Klick auf den Canvas<br>
            • Die lila Tangente zeigt die lokale Steigung f'(x₀)<br>
            • Aktiviere die Checkboxen, um f'(x) und f''(x) einzublenden
        `);

            CyberFormula.init({ anchorId: 'canvas-container' });

            // Initialize CyberCanvas
            CyberCanvasInstance.init('main-canvas', {
                minX: -8,
                maxX: 8,
                minY: -6,
                maxY: 6
            });

            function resize() {
                CyberCanvasInstance.resize();
                draw();
            }

            // Bind resize event
            CyberCanvasInstance.onResize = () => draw();

            // State management
            function getNeonColor(name) {
                return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#ffffff';
            }

            function drawGraph(f, color, thickness = 3, shadow = true) {
                const ctx = CyberCanvasInstance.ctx;
                ctx.strokeStyle = color;
                ctx.lineWidth = thickness;

                if (shadow) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = color;
                }

                ctx.beginPath();
                const width = CyberCanvasInstance.width;
                const dpr = window.devicePixelRatio || 1;

                for (let px = 0; px <= width; px++) {
                    const x = CyberCanvasInstance.unmapX(px);
                    const y = f(x);
                    const py = CyberCanvasInstance.mapY(y);

                    if (px === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            function drawTangent() {
                const ctx = CyberCanvasInstance.ctx;
                const y0 = currentFunc.f(x0);
                const m = currentFunc.df(x0);

                const L = 5.0;
                const halfL = L / 2;
                const angle = Math.atan(m);
                const dx = Math.cos(angle) * halfL;
                const dy = Math.sin(angle) * halfL;

                ctx.strokeStyle = getNeonColor('--neon-purple');
                ctx.lineWidth = 4;

                const p1x = CyberCanvasInstance.mapX(x0 - dx);
                const p1y = CyberCanvasInstance.mapY(y0 - dy);
                const p2x = CyberCanvasInstance.mapX(x0 + dx);
                const p2y = CyberCanvasInstance.mapY(y0 + dy);

                ctx.shadowBlur = 15;
                ctx.shadowColor = getNeonColor('--neon-purple');
                ctx.beginPath();
                ctx.moveTo(p1x, p1y);
                ctx.lineTo(p2x, p2y);
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Draw point
                const p0x = CyberCanvasInstance.mapX(x0);
                const p0y = CyberCanvasInstance.mapY(y0);
                ctx.fillStyle = "white";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "white";
                ctx.beginPath();
                ctx.arc(p0x, p0y, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            function draw() {
                CyberCanvasInstance.drawGrid({
                    vignette: true,
                    glow: true
                });

                if (showDerivative) {
                    drawGraph(currentFunc.df, getNeonColor('--neon-orange'), 2, false);
                }

                if (showSecondDeriv) {
                    drawGraph(currentFunc.ddf, getNeonColor('--neon-green'), 2, false);
                }

                drawGraph(currentFunc.f, getNeonColor('--neon-blue'), 3, false);
                drawTangent();

                // Update analysis values
                const m = currentFunc.df(x0);
                const ddm = currentFunc.ddf(x0);
                document.getElementById('val-m').innerText = m.toFixed(2);
                document.getElementById('val-ddm').innerText = ddm.toFixed(2);

                if (window.CyberFormula) CyberFormula.set(currentFunc.tex);
            }

            window.addEventListener('resize', resize);
            resize(); 

            // Custom interaction on canvas
            let isDragging = false;
            CyberCanvasInstance.canvas.addEventListener('mousedown', (e) => { isDragging = true; handleInteraction(e); });
            window.addEventListener('mousemove', (e) => { if (isDragging) handleInteraction(e); });
            window.addEventListener('mouseup', () => { isDragging = false; });

            function handleInteraction(e) {
                const rect = CyberCanvasInstance.canvas.getBoundingClientRect();
                const posX = e.clientX - rect.left;
                const mathX = CyberCanvasInstance.unmapX(posX);
                updateX0(Math.max(-5, Math.min(5, mathX)));
            }

            // 5. Context Menu (Standard)
            CyberCanvasInstance.onContextMenu = (e) => {
                const cc = CyberCanvasInstance;
                CyberUI.showContextMenu(e.clientX, e.clientY, [
                    { label: 'Punkt Reset (x₀)', onclick: () => updateX0(1.0) },
                    { label: 'Ansicht Reset', onclick: () => cc.resetView(-8, 8) },
                    { divider: true },
                    { label: 'Gitter anzeigen', checked: cc.showGrid, onchange: (v) => cc.showGrid = v },
                    { label: 'Achsen anzeigen', checked: cc.showAxes, onchange: (v) => cc.showAxes = v },
                    { label: 'Achsenbeschriftung', checked: cc.showLabels, onchange: (v) => cc.showLabels = v },
                    { label: 'Koordinaten', checked: cc.showTelemetry, onchange: (v) => { cc.showTelemetry = v; cc.updateTelemetryDOM(); } }
                ]);
            };

        }); // End DOMContentLoaded
    </script>
</body>

</html>
