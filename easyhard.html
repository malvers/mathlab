<!DOCTYPE html>

<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Langley Neustart | Winkel ADB & ACB Final</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
        margin: 0; background: #0b1120; color: white;
        display: flex; height: 100vh; font-family: 'Inter', sans-serif;
        overflow: hidden;
    }
    #info-panel {
        width: 360px; padding: 30px; border-right: 1px solid #334155;
        background: #111827; box-sizing: border-box; display: flex;
        flex-direction: column; gap: 15px; z-index: 10;
    }
    #canvas-container { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; }
    h2 { font-family: 'Orbitron'; color: #00f2ff; font-size: 1.1rem; margin: 0 0 10px 0; letter-spacing: 1px; }
    .calc-box { background: #1e293b; padding: 12px; border-radius: 8px; border-left: 4px solid #334155; }
    .calc-line { margin: 5px 0; font-size: 0.9rem; line-height: 1.4; }
    .math { font-weight: bold; font-family: 'Orbitron'; font-size: 0.85rem; }
    .result { color: #39FF14; }
    canvas { display: block; }
  </style>
</head>
<body>

<div id="info-panel">
  <h2>WINKEL ANALYSE</h2>

  <div class="calc-box" style="border-left-color: #ff9800;">
    <div class="calc-line">∠ADB = <span class="math result">40°</span></div>
  </div>

  <div class="calc-box" style="border-left-color: #00f2ff;">
    <div class="calc-line">∠ACB = <span class="math result">30°</span></div>
  </div>

  <div class="calc-box" style="border-left-color: #ffffff;">
    <div class="calc-line">Diagonalen-Schnitt: <span class="math">F</span></div>
    <div class="calc-line">Symmetrie-Schnitt: <span class="math">P</span></div>
  </div>
</div>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<script>
  const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');

  function getPoint(baseA, baseB, angleDegA, angleDegB) {
      const a = angleDegA * Math.PI / 180;
      const b = angleDegB * Math.PI / 180;
      const baseWidth = baseB.x - baseA.x;
      const h = baseWidth * (Math.tan(a) * Math.tan(b)) / (Math.tan(a) + Math.tan(b));
      const dx = h / Math.tan(a);
      return { x: baseA.x + dx, y: baseA.y - h };
  }

  function getIntersection(p1, p2, p3, p4) {
      const x1 = p1.x, y1 = p1.y, x2 = p2.x, y2 = p2.y;
      const x3 = p3.x, y3 = p3.y, x4 = p4.x, y4 = p4.y;
      const denom = (y4 - y3) * (x2 - x1) - (x4 - x3) * (y2 - y1);
      const ua = ((x4 - x3) * (y1 - y3) - (y4 - y3) * (x1 - x3)) / denom;
      return { x: x1 + ua * (x2 - x1), y: y1 + ua * (y2 - y1) };
  }

  function drawArcA(p, startDeg, endDeg, radius, label, color) {
      const startRad = -startDeg * Math.PI / 180;
      const endRad = -endDeg * Math.PI / 180;
      ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2;
      ctx.arc(p.x, p.y, radius, startRad, endRad, true);
      ctx.stroke();
      const midRad = (startRad + endRad) / 2;
      ctx.fillStyle = color; ctx.font = "bold 13px Orbitron"; ctx.textAlign = "center";
      ctx.fillText(label, p.x + Math.cos(midRad) * (radius + 12), p.y + Math.sin(midRad) * (radius + 12));
  }

  function drawArcB(p, startDeg, endDeg, radius, label, color) {
      const startRad = Math.PI + (startDeg * Math.PI / 180);
      const endRad = Math.PI + (endDeg * Math.PI / 180);
      ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2;
      ctx.arc(p.x, p.y, radius, startRad, endRad, false);
      ctx.stroke();
      const midRad = (startRad + endRad) / 2;
      ctx.fillStyle = color; ctx.font = "bold 13px Orbitron"; ctx.textAlign = "center";
      ctx.fillText(label, p.x + Math.cos(midRad) * (radius + 12), p.y + Math.sin(midRad) * (radius + 12));
  }

  function draw() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
      canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const w = rect.width, h = rect.height;
      ctx.clearRect(0, 0, w, h);

      const colorC = "#00f2ff", colorD = "#ff9800", colorBasis = "#39FF14", colorZiel = "#ef4444", colorWhite = "#ffffff";

      const baseWidth = 280;
      const A = { x: w/2 - baseWidth/2, y: h * 0.95 };
      const B = { x: w/2 + baseWidth/2, y: h * 0.95 };

      const D = getPoint(A, B, 80, 60);
      const C = getPoint(A, B, 70, 80);
      const E = getPoint(A, B, 80, 80);
      const M = { x: (A.x + B.x) / 2, y: A.y };

      const P = getIntersection(E, M, B, D);
      const F = getIntersection(A, C, B, D);

      ctx.lineCap = "round"; ctx.lineJoin = "round";

      // Basis
      ctx.lineWidth = 5; ctx.strokeStyle = colorBasis;
      ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.stroke();

      // Schenkel AE und BE
      ctx.lineWidth = 2; ctx.strokeStyle = colorD;
      ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(E.x, E.y); ctx.stroke();
      ctx.lineWidth = 2; ctx.strokeStyle = colorC;
      ctx.beginPath(); ctx.moveTo(B.x, B.y); ctx.lineTo(E.x, E.y); ctx.stroke();

      // Symmetrieachse E-P
      ctx.lineWidth = 1.5; ctx.strokeStyle = "rgba(255,255,255,0.6)";
      ctx.beginPath(); ctx.moveTo(E.x, E.y); ctx.lineTo(P.x, P.y); ctx.stroke();

      // Diagonale AC (Cyan)
      ctx.lineWidth = 1.8; ctx.strokeStyle = colorC;
      ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(C.x, C.y); ctx.stroke();

      // Diagonale BD (Weiß)
      ctx.lineWidth = 1.8; ctx.strokeStyle = colorWhite;
      ctx.beginPath(); ctx.moveTo(B.x, B.y); ctx.lineTo(D.x, D.y); ctx.stroke();

      // Ziel-Linie CD
      ctx.lineWidth = 4; ctx.strokeStyle = colorZiel;
      ctx.beginPath(); ctx.moveTo(C.x, C.y); ctx.lineTo(D.x, D.y); ctx.stroke();

      // Bögen unten
      drawArcA(A, 0, 80, 25, "80°", colorD);
      drawArcA(A, 0, 70, 50, "70°", colorC);
      drawArcA(A, 70, 80, 80, "10°", colorWhite);
      drawArcB(B, 0, 60, 25, "60°", colorD);
      drawArcB(B, 0, 80, 50, "80°", colorC);
      drawArcB(B, 60, 80, 80, "20°", colorWhite);

      // --- Winkel ADB (40°) bei D ---
      const angDA = Math.atan2(A.y - D.y, A.x - D.x);
      const angDB = Math.atan2(B.y - D.y, B.x - D.x);
      ctx.beginPath();
      ctx.strokeStyle = colorWhite;
      ctx.lineWidth = 1.5;
      ctx.arc(D.x, D.y, 40, angDA, angDB, true);
      ctx.stroke();
      const midADB = (angDA + angDB) / 2;
      ctx.fillStyle = colorWhite;
      ctx.font = "bold 12px Orbitron";
      ctx.textAlign = "center";
      ctx.fillText("40°", D.x + Math.cos(midADB) * 55, D.y + Math.sin(midADB) * 55);

      // --- KORREKTUR: Winkel ACB (30°) bei C ---
      const angCA = Math.atan2(A.y - C.y, A.x - C.x);
      const angCB = Math.atan2(B.y - C.y, B.x - C.x);
      ctx.beginPath();
      ctx.strokeStyle = colorWhite;
      ctx.lineWidth = 1.5;
      // Mit "true" zeichnen, damit der Bogen im Inneren landet
      ctx.arc(C.x, C.y, 40, angCA, angCB, true);
      ctx.stroke();
      const midACB = (angCA + angCB) / 2;
      ctx.fillStyle = colorWhite;
      ctx.font = "bold 12px Orbitron";
      ctx.textAlign = "center";
      ctx.fillText("30°", C.x + Math.cos(midACB) * 55, C.y + Math.sin(midACB) * 55);

      // Labels
      ctx.fillStyle = "white"; ctx.font = "bold 18px Orbitron"; ctx.textAlign = "center";
      ctx.fillText("A", A.x - 20, A.y + 10);
      ctx.fillText("B", B.x + 20, B.y + 10);
      ctx.fillText("D", D.x - 15, D.y);
      ctx.fillText("C", C.x + 15, C.y);
      ctx.fillText("E", E.x, E.y - 15);

      ctx.fillText("P", P.x + 15, P.y + 10);
      ctx.fillText("F", F.x - 25, F.y - 5);
  }

  window.addEventListener('resize', draw);
  draw();
</script>
</body>
</html>
