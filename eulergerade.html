<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | Euler, Fermat & Seitenhalbierende</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-pink: #f472b6;
            --neon-green: #4ade80;
            --neon-yellow: #fbbf24;
            --bg-dark: #050b18;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-bright: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: #050b18;
            color: white;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
        }

        #side-panel {
            width: 380px;
            min-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
            box-sizing: border-box;
            box-shadow: 15px 0 45px rgba(0, 0, 0, 0.6);
            overflow-y: auto;
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: #050b18;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stats-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .stats-label {
            font-family: 'Orbitron';
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 5px;
        }

        .stats-val {
            font-family: 'Orbitron';
            font-size: 1rem;
            color: var(--neon-blue);
            font-weight: bold;
        }
    </style>
</head>

<body>


    <aside id="side-panel">
        <header id="sidebar-header"></header>
        <div id="ui-container"></div>
        <div id="stats-container"></div>
        
        <div style="margin-top: auto; padding: 10px; text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.2); font-family: 'Orbitron';">
            &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull;
        </div>
    </aside>

    <div id="canvas-container">
        <canvas id="main-canvas"></canvas>
    </div>

    <script src="js/cyber-canvas.js"></script>
    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script>
        /**
         * EULER LINE LABORATORY - ULTRA v5.3.8
         * High-Precision Geometric Proof Engine.
         */
        window.addEventListener('load', () => {
            // 1. Initialize Branding
            CyberBranding.init({
                title: "Doc Alvers Mathe-Labor",
                subtitle: "Eulergerade &bull; Feuerbachkreis &bull; Fermatpunkt",
                briefing: `
                    <h3 style="color:var(--neon-blue); font-family:Orbitron; margin-bottom:10px;">MISSION: EULER-ANALYSE</h3>
                    Erforsche die verborgene Symmetrie des Dreiecks. Überprüfe die Euler-Gerade – eine Linie, auf der Schwerpunkt, Umkreismittelpunkt und Höhenschnittpunkt perfekt kollinierezieren.
                    
                    <div class="admin-info">
                        <h4 style="color:var(--neon-blue); font-family:Orbitron; font-size:0.8rem; margin:0 0 5px 0;">TECHNISCHE KONTROLLE (ADMIN ONLY)</h4>
                        <ul style="margin:0; padding-left:18px; font-size:0.85rem; opacity:0.9;">
                            <li><b>H-S-U Ratio:</b> Das Verhältnis HS/SU ist mathematisch exakt 2.0.</li>
                            <li><b>Feuerbach:</b> Der 9-Punkte-Kreis halbiert den Umkreis-Radius.</li>
                            <li><b>Fermat:</b> Der Punkt minimiert die Summe der Abstände zu A, B und C.</li>
                        </ul>
                    </div>
                `
            });

            // 2. Initialize UI Engine
            CyberUI.init();

            // Helper to resolve CSS variables for Canvas
            const getCSSVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

            // 3. Setup UI Components
            const state = {
                cbEuler: false,
                cbFeuerbach: false,
                cbUmkreis: false,
                cbInkreis: false,
                hH: false,
                hS: false,
                hI: false,
                cbFermat: false
            };

            CyberUI.createCard('ui-container', 'KONSTRUKTION', `
                <div id="base-opts" class="cyber-control-group"></div>
            `, 'var(--neon-blue)');

            CyberUI.createCheckbox('base-opts', 'Eulergerade', state.cbEuler, (v) => state.cbEuler = v, '#ffffff');
            CyberUI.createCheckbox('base-opts', 'Feuerbach-Kreis', state.cbFeuerbach, (v) => state.cbFeuerbach = v, getCSSVar('--neon-blue'));
            CyberUI.createCheckbox('base-opts', 'Umkreis', state.cbUmkreis, (v) => state.cbUmkreis = v, getCSSVar('--neon-green'));
            CyberUI.createCheckbox('base-opts', 'Inkreis', state.cbInkreis, (v) => state.cbInkreis = v, getCSSVar('--neon-yellow'));

            CyberUI.createCard('ui-container', 'HILFSLINIEN', `
                <div id="detail-opts" class="cyber-control-group"></div>
            `, 'var(--neon-purple)');

            CyberUI.createCheckbox('detail-opts', 'Höhen (H)', state.hH, (v) => state.hH = v, getCSSVar('--neon-pink'));
            CyberUI.createCheckbox('detail-opts', 'Seitenhalb. (S)', state.hS, (v) => state.hS = v, getCSSVar('--neon-purple'));
            CyberUI.createCheckbox('detail-opts', 'Winkelhalb. (I)', state.hI, (v) => state.hI = v, getCSSVar('--neon-yellow'));
            CyberUI.createCheckbox('detail-opts', 'Fermat / Napoleon', state.cbFermat, (v) => state.cbFermat = v, '#ffa500');

            const statsHTML = `
                <div class="stats-grid">
                    <div class="stats-card" style="border-left: 3px solid var(--neon-pink);">
                        <span class="stats-label">Ratio HS / SU</span>
                        <span id="txt-ratio" class="stats-val" style="color:var(--neon-pink);">0.00</span>
                    </div>
                    <div class="stats-card" style="border-left: 3px solid var(--neon-yellow);">
                        <span class="stats-label">Inkreis-R</span>
                        <span id="txt-rIn" class="stats-val" style="color:var(--neon-yellow);">0 px</span>
                    </div>
                </div>
            `;
            CyberUI.createCard('stats-container', 'ANALYSE', statsHTML, 'var(--neon-yellow)');

            // 4. Initialize CyberCanvas
            CyberCanvasInstance.init('main-canvas', {
                minY: -10,
                maxY: 10
            }, {
                showLabels: true,
                showTelemetry: false
            });

            // Geometry Points
            let points = [
                { x: -5, y: -4 }, // A
                { x:  5, y: -4 }, // B
                { x:  0, y:  5 }  // C
            ];
            let dragIdx = -1;


            // Math Tools
            const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
            const mid = (p1, p2) => ({ x: (p1.x + p2.x) / 2, y: (p1.y + p2.y) / 2 });
            const getS = (A, B, C) => ({ x: (A.x + B.x + C.x) / 3, y: (A.y + B.y + C.y) / 3 });

            function getU(A, B, C) {
                const x1 = A.x, y1 = A.y, x2 = B.x, y2 = B.y, x3 = C.x, y3 = C.y;
                const d = 2 * (x1 * (y2 - y3) + x2 * (y3 - y1) + x3 * (y1 - y2));
                if (Math.abs(d) < 0.001) return { x: (x1+x2+x3)/3, y:(y1+y2+y3)/3 };
                return {
                    x: ((x1 * x1 + y1 * y1) * (y2 - y3) + (x2 * x2 + y2 * y2) * (y3 - y1) + (x3 * x3 + y3 * y3) * (y1 - y2)) / d,
                    y: ((x1 * x1 + y1 * y1) * (x3 - x2) + (x2 * x2 + y2 * y2) * (x1 - x3) + (x3 * x3 + y3 * y3) * (x2 - x1)) / d
                };
            }

            function getI(A, B, C) {
                const a = dist(B, C), b = dist(A, C), c = dist(A, B);
                const p = a + b + c;
                if (p < 0.01) return A;
                return { x: (a * A.x + b * B.x + c * C.x) / p, y: (a * A.y + b * B.y + c * C.y) / p };
            }

            function getFoot(P, A, B) {
                const dx = B.x - A.x, dy = B.y - A.y;
                const m = dx * dx + dy * dy;
                if (m < 0.001) return A;
                const t = ((P.x - A.x) * dx + (P.y - A.y) * dy) / m;
                return { x: A.x + t * dx, y: A.y + t * dy };
            }

            function getEqui(p1, p2, ref) {
                const dx = p2.x - p1.x, dy = p2.y - p1.y;
                const h = Math.sqrt(3) / 2;
                const r1 = { x: p1.x + 0.5 * dx - h * dy, y: p1.y + 0.5 * dy + h * dx };
                const r2 = { x: p1.x + 0.5 * dx + h * dy, y: p1.y + 0.5 * dy - h * dx };
                return dist(r1, ref) > dist(r2, ref) ? r1 : r2;
            }

            function getLineIntersect(p1, p2, p3, p4) {
                const x1 = p1.x, y1 = p1.y, x2 = p2.x, y2 = p2.y;
                const x3 = p3.x, y3 = p3.y, x4 = p4.x, y4 = p4.y;
                const denom = (y4 - y3) * (x2 - x1) - (x4 - x3) * (y2 - y1);
                if (Math.abs(denom) < 0.0001) return p1;
                const ua = ((x4 - x3) * (y1 - y3) - (y4 - y3) * (x1 - x3)) / denom;
                return { x: x1 + ua * (x2 - x1), y: y1 + ua * (y2 - y1) };
            }

            function drawPt(pt, label, color) {
                const ctx = CyberCanvasInstance.ctx;
                const px = CyberCanvasInstance.mapX(pt.x);
                const py = CyberCanvasInstance.mapY(pt.y);
                ctx.shadowBlur = 15; ctx.shadowColor = color;
                ctx.fillStyle = color; ctx.beginPath(); ctx.arc(px, py, 7, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = "white"; ctx.font = "bold 13px Orbitron"; ctx.textAlign = "center";
                ctx.fillText(label, px, py - 18);
            }

            // Interaction
            CyberCanvasInstance.onMouseDown = (pos) => {
                dragIdx = points.findIndex(p => dist(p, pos) < 0.8);
                if (dragIdx !== -1) {
                    // Disable panning to allow precise point dragging
                    CyberCanvasInstance.allowPan = false;
                    CyberCanvasInstance.isDragging = false; 
                }
            };
            CyberCanvasInstance.onMouseMove = (pos) => {
                if (dragIdx !== -1) {
                    points[dragIdx] = pos;
                    CyberCanvasInstance.needsRedraw = true;
                }
            };
            CyberCanvasInstance.onMouseUp = () => {
                dragIdx = -1;
                CyberCanvasInstance.allowPan = true;
            };

            // Context Menu
            CyberCanvasInstance.onContextMenu = (e) => {
                CyberUI.showContextMenu(e.clientX, e.clientY, [
                    { label: 'Lab Reset', onclick: () => { 
                        points = [{ x: -5, y: -4 }, { x: 5, y: -4 }, { x: 0, y: 5 }];
                    }},
                    { label: 'Ansicht Reset', onclick: () => CyberCanvasInstance.resetView(-10, 10) }
                ]);
            };

            // Main Loop
            function mainLoop() {
                CyberCanvasInstance.drawGrid({ vignette: true, glow: true });
                const ctx = CyberCanvasInstance.ctx;
                const [A, B, C] = points;

                // Calcs
                const S = getS(A, B, C), U = getU(A, B, C), I = getI(A, B, C);
                const H = { x: 3 * S.x - 2 * U.x, y: 3 * S.y - 2 * U.y }, F = mid(H, U);
                const rUm = dist(U, A), rIn = dist(I, getFoot(I, A, B));

                // Drawing Layers
                if (state.cbFermat) {
                    const pAB = getEqui(A, B, C), pBC = getEqui(B, C, A), pCA = getEqui(C, A, B);
                    
                    // Fermat Triangles
                    ctx.fillStyle = "rgba(255, 165, 0, 0.12)";
                    ctx.strokeStyle = "rgba(255, 165, 0, 0.3)";
                    ctx.lineWidth = 1;
                    [[A, B, pAB], [B, C, pBC], [C, A, pCA]].forEach(t => {
                        ctx.beginPath(); 
                        ctx.moveTo(CyberCanvasInstance.mapX(t[0].x), CyberCanvasInstance.mapY(t[0].y));
                        ctx.lineTo(CyberCanvasInstance.mapX(t[1].x), CyberCanvasInstance.mapY(t[1].y));
                        ctx.lineTo(CyberCanvasInstance.mapX(t[2].x), CyberCanvasInstance.mapY(t[2].y));
                        ctx.closePath(); 
                        ctx.fill(); ctx.stroke();
                    });

                    // Fermat Lines
                    ctx.setLineDash([3, 3]);
                    ctx.strokeStyle = "rgba(255, 165, 0, 0.5)";
                    [[A, pBC], [B, pCA], [C, pAB]].forEach(l => {
                        ctx.beginPath();
                        ctx.moveTo(CyberCanvasInstance.mapX(l[0].x), CyberCanvasInstance.mapY(l[0].y));
                        ctx.lineTo(CyberCanvasInstance.mapX(l[1].x), CyberCanvasInstance.mapY(l[1].y));
                        ctx.stroke();
                    });
                    ctx.setLineDash([]);

                    // Fermat Point
                    const Fp = getLineIntersect(A, pBC, B, pCA);
                    drawPt(Fp, "Fp", "#ffa500");
                }

                if (state.cbEuler) {
                    ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3;
                    const dx = U.x - H.x, dy = U.y - H.y, d = dist(U, H);
                    ctx.beginPath();
                    if (d < 0.1) {
                         ctx.moveTo(CyberCanvasInstance.mapX(S.x), 0);
                         ctx.lineTo(CyberCanvasInstance.mapX(S.x), CyberCanvasInstance.height);
                    } else {
                        const len = 50;
                        ctx.moveTo(CyberCanvasInstance.mapX(H.x - (dx/d)*len), CyberCanvasInstance.mapY(H.y - (dy/d)*len));
                        ctx.lineTo(CyberCanvasInstance.mapX(U.x + (dx/d)*len), CyberCanvasInstance.mapY(U.y + (dy/d)*len));
                    }
                    ctx.stroke();
                }

                // Help Lines
                ctx.setLineDash([5, 5]); ctx.lineWidth = 1.5;
                if (state.hH) {
                    ctx.strokeStyle = getCSSVar("--neon-pink") + "88"; // Semi-transparent
                    [[A, getFoot(A, B, C)], [B, getFoot(B, A, C)], [C, getFoot(C, A, B)]].forEach(l => {
                        ctx.beginPath(); 
                        ctx.moveTo(CyberCanvasInstance.mapX(l[0].x), CyberCanvasInstance.mapY(l[0].y));
                        ctx.lineTo(CyberCanvasInstance.mapX(l[1].x), CyberCanvasInstance.mapY(l[1].y));
                        ctx.stroke();
                    });
                }
                if (state.hS) {
                    ctx.strokeStyle = getCSSVar("--neon-purple") + "88"; 
                    [[A, mid(B, C)], [B, mid(A, C)], [C, mid(A, B)]].forEach(l => {
                        ctx.beginPath();
                        ctx.moveTo(CyberCanvasInstance.mapX(l[0].x), CyberCanvasInstance.mapY(l[0].y));
                        ctx.lineTo(CyberCanvasInstance.mapX(l[1].x), CyberCanvasInstance.mapY(l[1].y));
                        ctx.stroke();
                    });
                }
                if (state.hI) {
                    ctx.strokeStyle = getCSSVar("--neon-yellow") + "88";
                    const a = dist(B, C), b = dist(A, C), c = dist(A, B);
                    const dA = { x: (b * B.x + c * C.x) / (b + c), y: (b * B.y + c * C.y) / (b + c) };
                    const dB = { x: (a * A.x + c * C.x) / (a + c), y: (a * A.y + c * C.y) / (a + c) };
                    const dC = { x: (a * A.x + b * B.x) / (a + b), y: (a * A.y + b * B.y) / (a + b) };
                    [[A, dA], [B, dB], [C, dC]].forEach(l => {
                        ctx.beginPath();
                        ctx.moveTo(CyberCanvasInstance.mapX(l[0].x), CyberCanvasInstance.mapY(l[0].y));
                        ctx.lineTo(CyberCanvasInstance.mapX(l[1].x), CyberCanvasInstance.mapY(l[1].y));
                        ctx.stroke();
                    });
                }
                ctx.setLineDash([]);

                // Circles
                const pxScale = CyberCanvasInstance.width / (CyberCanvasInstance.view.maxX - CyberCanvasInstance.view.minX);

                if (state.cbUmkreis) {
                    ctx.strokeStyle = "rgba(74, 222, 128, 0.7)"; ctx.lineWidth = 2.5;
                    ctx.beginPath(); ctx.arc(CyberCanvasInstance.mapX(U.x), CyberCanvasInstance.mapY(U.y), rUm * pxScale, 0, Math.PI*2); ctx.stroke();
                }
                if (state.cbInkreis) {
                    ctx.strokeStyle = "rgba(251, 191, 36, 0.7)"; ctx.lineWidth = 2.5;
                    ctx.beginPath(); ctx.arc(CyberCanvasInstance.mapX(I.x), CyberCanvasInstance.mapY(I.y), rIn * pxScale, 0, Math.PI*2); ctx.stroke();
                }
                if (state.cbFeuerbach) {
                    ctx.strokeStyle = "rgba(0, 210, 255, 0.7)"; ctx.lineWidth = 2.5;
                    ctx.beginPath(); ctx.arc(CyberCanvasInstance.mapX(F.x), CyberCanvasInstance.mapY(F.y), (rUm/2) * pxScale, 0, Math.PI*2); ctx.stroke();
                    drawPt(F, "F", getCSSVar("--neon-blue"));
                }

                // Triangle
                ctx.strokeStyle = getCSSVar("--neon-blue"); ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(CyberCanvasInstance.mapX(A.x), CyberCanvasInstance.mapY(A.y));
                ctx.lineTo(CyberCanvasInstance.mapX(B.x), CyberCanvasInstance.mapY(B.y));
                ctx.lineTo(CyberCanvasInstance.mapX(C.x), CyberCanvasInstance.mapY(C.y));
                ctx.closePath(); ctx.stroke();

                // Points
                points.forEach((p, i) => drawPt(p, String.fromCharCode(65+i), getCSSVar("--neon-blue")));
                
                if (state.hH) {
                    drawPt(H, "H", getCSSVar("--neon-pink"));
                }
                if (state.hS) {
                    drawPt(S, "S", getCSSVar("--neon-purple"));
                }
                if (state.cbUmkreis) {
                    drawPt(U, "U", getCSSVar("--neon-green"));
                }
                if (state.cbInkreis || state.hI) {
                    drawPt(I, "I", getCSSVar("--neon-yellow"));
                }
                const ratio = dist(H, S) / dist(S, U);
                document.getElementById('txt-ratio').innerText = isFinite(ratio) ? ratio.toFixed(2) : "---";
                document.getElementById('txt-rIn').innerText = rIn.toFixed(2) + " u";

                requestAnimationFrame(mainLoop);
            }
            mainLoop();
        });
    </script>
</body>

</html>
