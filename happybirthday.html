<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday | Doc Alvers Mathe-Labor</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --c1: #00d2ff;
            --c2: #ff3ed1;
            --c3: #ffcc00;
            --c4: #9d50bb;
            --c5: #00ff95;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #02060f;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            user-select: none;
            cursor: crosshair;
        }

        /* --- Cosmic background --- */
        #stars,
        #fx,
        #confetti {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        #stars { z-index: 0; }
        #fx { z-index: 2; pointer-events: none; }
        #confetti { z-index: 5; pointer-events: none; }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(157, 80, 187, 0.25), transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 210, 255, 0.22), transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 62, 209, 0.12), transparent 60%),
                radial-gradient(circle at 50% 50%, rgba(5, 25, 55, 1) 0%, rgba(2, 6, 15, 1) 100%);
            z-index: 1;
        }

        /* --- Stage --- */
        #stage {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 30px;
            text-align: center;
        }

        /* --- Title --- */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: clamp(40px, 9vw, 130px);
            letter-spacing: clamp(4px, 1vw, 14px);
            line-height: 1;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(110deg, var(--c1) 0%, #ffffff 30%, var(--c2) 55%, var(--c3) 80%, var(--c1) 100%);
            background-size: 280% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            filter: drop-shadow(0 0 18px rgba(0, 210, 255, 0.5)) drop-shadow(0 0 40px rgba(255, 62, 209, 0.35));
            animation: shimmer 5s linear infinite;
        }

        h1 .word {
            display: inline-block;
            white-space: nowrap;
        }

        h1 .ch {
            display: inline-block;
            transform: translateY(60px) scale(.6);
            opacity: 0;
            background: linear-gradient(110deg, var(--c1) 0%, #ffffff 30%, var(--c2) 55%, var(--c3) 80%, var(--c1) 100%);
            background-size: 280% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            animation: drop 0.7s cubic-bezier(.2, 1.4, .3, 1) forwards, shimmer 5s linear infinite;
        }

        h1 .word + .word { margin-left: 0.5em; }

        @keyframes shimmer {
            from { background-position: 0% 0%; }
            to   { background-position: 280% 0%; }
        }

        @keyframes drop {
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .name-line {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(18px, 2.6vw, 36px);
            letter-spacing: 4px;
            color: var(--c3);
            text-shadow: 0 0 14px rgba(255, 204, 0, 0.7);
            opacity: 0;
            animation: fadeUp 1s ease 1.4s forwards;
            text-transform: uppercase;
        }

        .tag-line {
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            font-size: clamp(13px, 1.5vw, 18px);
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            opacity: 0;
            animation: fadeUp 1s ease 1.8s forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* --- Cake --- */
        .cake-wrap {
            opacity: 0;
            animation: fadeUp 1s ease 2.2s forwards;
        }

        .cake {
            position: relative;
            width: clamp(180px, 24vw, 260px);
            height: clamp(140px, 18vw, 200px);
            margin: 0 auto;
        }

        .plate {
            position: absolute;
            bottom: -10px;
            left: -10%;
            width: 120%;
            height: 16px;
            background: linear-gradient(180deg, #2a3552, #131a2c);
            border-radius: 50%;
            box-shadow: 0 14px 35px rgba(0, 0, 0, 0.6), inset 0 2px 0 rgba(255, 255, 255, 0.08);
        }

        .layer {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 8px;
            box-shadow: inset 0 -8px 0 rgba(0, 0, 0, 0.25), 0 0 25px rgba(255, 62, 209, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .layer.bottom {
            bottom: 0;
            width: 100%;
            height: 45%;
            background: linear-gradient(180deg, #ff6fb3, #d44090);
        }

        .layer.middle {
            bottom: 45%;
            width: 78%;
            height: 28%;
            background: linear-gradient(180deg, #ffd1f0, #ff8dc7);
        }

        .layer.top {
            bottom: 73%;
            width: 56%;
            height: 22%;
            background: linear-gradient(180deg, #fff6c2, #ffd76a);
            box-shadow: inset 0 -6px 0 rgba(0, 0, 0, 0.18), 0 0 25px rgba(255, 204, 0, 0.35);
        }

        .drip {
            position: absolute;
            top: 100%;
            width: 16%;
            height: 18px;
            background: inherit;
            border-radius: 0 0 8px 8px;
        }

        .drip.d1 { left: 8%; }
        .drip.d2 { left: 32%; height: 26px; }
        .drip.d3 { left: 56%; height: 14px; }
        .drip.d4 { left: 78%; height: 22px; }

        /* Candles */
        .candles {
            position: absolute;
            bottom: 95%;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .candle {
            position: relative;
            width: 8px;
            height: 36px;
            background: linear-gradient(180deg, #fff, #ff5a8a 30%, #cf2a6c);
            border-radius: 2px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
        }

        .candle::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 4px;
            background: #333;
        }

        .flame {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 18px;
            background: radial-gradient(circle at 50% 70%, #fff7c0 0%, #ffd24a 30%, #ff7a00 60%, transparent 80%);
            border-radius: 50% 50% 35% 35% / 60% 60% 40% 40%;
            filter: blur(0.4px) drop-shadow(0 0 14px #ffaa00) drop-shadow(0 0 28px rgba(255, 100, 0, 0.6));
            transform-origin: 50% 100%;
            animation: flicker 1.4s ease-in-out infinite;
        }

        .candle:nth-child(2) .flame { animation-delay: -0.3s; animation-duration: 1.1s; }
        .candle:nth-child(3) .flame { animation-delay: -0.7s; animation-duration: 1.6s; }
        .candle:nth-child(4) .flame { animation-delay: -1.1s; animation-duration: 1.3s; }
        .candle:nth-child(5) .flame { animation-delay: -0.5s; animation-duration: 1.5s; }

        @keyframes flicker {
            0%, 100% { transform: translateX(-50%) scale(1, 1) rotate(-2deg); opacity: 1; }
            25%      { transform: translateX(-50%) scale(0.95, 1.1) rotate(2deg); opacity: 0.95; }
            50%      { transform: translateX(-50%) scale(1.05, 0.9) rotate(-3deg); opacity: 0.9; }
            75%      { transform: translateX(-50%) scale(0.9, 1.05) rotate(3deg); opacity: 0.95; }
        }

        /* --- Wish button --- */
        .wish-btn {
            margin-top: 10px;
            background: transparent;
            border: 1.5px solid var(--c1);
            color: var(--c1);
            padding: 14px 32px;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.25s ease;
            opacity: 0;
            animation: fadeUp 1s ease 2.6s forwards;
            backdrop-filter: blur(6px);
        }

        .wish-btn:hover {
            background: rgba(0, 210, 255, 0.12);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.5);
            color: #fff;
            transform: translateY(-2px);
        }

        .wish-btn:active {
            transform: translateY(0);
        }

        /* --- Footer hint --- */
        .hint {
            position: fixed;
            bottom: 18px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 11px;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.35);
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            z-index: 4;
            opacity: 0;
            animation: fadeUp 1s ease 3s forwards;
        }

        .hint kbd {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: inherit;
            color: var(--c1);
            margin: 0 2px;
        }

        @media (max-width: 600px) {
            .hint { display: none; }
        }
    </style>
</head>

<body>
    <canvas id="stars"></canvas>
    <canvas id="fx"></canvas>
    <canvas id="confetti"></canvas>

    <div id="stage">
        <h1 id="title"></h1>
        <div class="name-line" id="nameLine"></div>
        <div class="tag-line">Doc Alvers Mathe-Labor &middot; Cyber Edition</div>

        <div class="cake-wrap">
            <div class="cake">
                <div class="candles">
                    <div class="candle"><div class="flame"></div></div>
                    <div class="candle"><div class="flame"></div></div>
                    <div class="candle"><div class="flame"></div></div>
                    <div class="candle"><div class="flame"></div></div>
                    <div class="candle"><div class="flame"></div></div>
                </div>
                <div class="layer top"></div>
                <div class="layer middle">
                    <div class="drip d1"></div>
                    <div class="drip d3"></div>
                </div>
                <div class="layer bottom">
                    <div class="drip d2"></div>
                    <div class="drip d4"></div>
                </div>
                <div class="plate"></div>
            </div>
        </div>

        <button class="wish-btn" id="wishBtn">Wünsch dir was</button>
    </div>

    <div class="hint">Klick irgendwo &middot; <kbd>SPACE</kbd> Feuerwerk &middot; <kbd>?name=DEINNAME</kbd></div>

    <script src="js/ui.js?v=4"></script>
    <script>
        CyberUI.init();
        // -------------------------------------------------------------
        // 0. Personalisation: ?name=Anna
        // -------------------------------------------------------------
        const name = (new URLSearchParams(location.search).get('name') || 'Ulf').trim();
        const titleEl = document.getElementById('title');
        const words = name ? ['Happy', 'Birthday', name + '!'] : ['Happy', 'Birthday'];
        let charIdx = 0;
        words.forEach((w) => {
            const wordSpan = document.createElement('span');
            wordSpan.className = 'word';
            [...w].forEach((ch) => {
                const s = document.createElement('span');
                s.className = 'ch';
                s.textContent = ch;
                s.style.animationDelay = `${charIdx * 0.06}s`;
                wordSpan.appendChild(s);
                charIdx++;
            });
            titleEl.appendChild(wordSpan);
        });
        document.getElementById('nameLine').textContent = name ? '✨ Alles Liebe ✨' : '✨ Wir feiern dich ✨';

        // -------------------------------------------------------------
        // 1. Star field (parallax twinkle)
        // -------------------------------------------------------------
        const starsCanvas = document.getElementById('stars');
        const sctx = starsCanvas.getContext('2d');
        let stars = [];
        function resize(canvas) {
            canvas.width = innerWidth * devicePixelRatio;
            canvas.height = innerHeight * devicePixelRatio;
            canvas.style.width = innerWidth + 'px';
            canvas.style.height = innerHeight + 'px';
        }
        function initStars() {
            resize(starsCanvas);
            sctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
            stars = Array.from({ length: 220 }, () => ({
                x: Math.random() * innerWidth,
                y: Math.random() * innerHeight,
                r: Math.random() * 1.6 + 0.2,
                a: Math.random(),
                s: Math.random() * 0.012 + 0.003,
                hue: Math.random() < 0.85 ? null : (Math.random() * 360)
            }));
        }
        function drawStars() {
            sctx.clearRect(0, 0, innerWidth, innerHeight);
            for (const st of stars) {
                st.a += st.s;
                const alpha = 0.4 + 0.6 * Math.abs(Math.sin(st.a));
                sctx.globalAlpha = alpha;
                sctx.fillStyle = st.hue == null
                    ? '#ffffff'
                    : `hsl(${st.hue}, 100%, 75%)`;
                sctx.beginPath();
                sctx.arc(st.x, st.y, st.r, 0, Math.PI * 2);
                sctx.fill();
            }
            sctx.globalAlpha = 1;
        }

        // -------------------------------------------------------------
        // 2. Fireworks
        // -------------------------------------------------------------
        const fxCanvas = document.getElementById('fx');
        const fctx = fxCanvas.getContext('2d');
        let particles = [];

        function initFx() {
            resize(fxCanvas);
            fctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        }

        function burst(x, y, opts = {}) {
            const count = opts.count || 90 + Math.floor(Math.random() * 60);
            const baseHue = opts.hue != null ? opts.hue : Math.random() * 360;
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count + Math.random() * 0.05;
                const speed = 2 + Math.random() * 5;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 90 + Math.random() * 40,
                    age: 0,
                    hue: baseHue + (Math.random() * 40 - 20),
                    size: 2 + Math.random() * 1.5,
                    g: 0.04 + Math.random() * 0.02
                });
            }
        }

        function rocket(toX, toY, opts) {
            const fromX = toX + (Math.random() * 200 - 100);
            const fromY = innerHeight + 20;
            const dx = toX - fromX, dy = toY - fromY;
            const steps = 22;
            const trail = [];
            for (let i = 0; i <= steps; i++) {
                trail.push({ x: fromX + dx * (i / steps), y: fromY + dy * (i / steps) });
            }
            let i = 0;
            const hue = Math.random() * 360;
            const launch = setInterval(() => {
                if (i >= trail.length) {
                    clearInterval(launch);
                    burst(toX, toY, { hue, ...opts });
                    return;
                }
                const p = trail[i++];
                particles.push({
                    x: p.x, y: p.y,
                    vx: 0, vy: 0,
                    life: 24, age: 0,
                    hue, size: 1.6, g: 0
                });
            }, 14);
        }

        function drawFx() {
            // Fading trail effect
            fctx.fillStyle = 'rgba(2, 6, 15, 0.18)';
            fctx.fillRect(0, 0, innerWidth, innerHeight);
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.age++;
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.g;
                p.vx *= 0.992; p.vy *= 0.992;
                const t = 1 - p.age / p.life;
                if (t <= 0) { particles.splice(i, 1); continue; }
                fctx.globalAlpha = Math.max(0, t);
                fctx.fillStyle = `hsl(${p.hue}, 100%, ${50 + 40 * t}%)`;
                fctx.shadowBlur = 14;
                fctx.shadowColor = fctx.fillStyle;
                fctx.beginPath();
                fctx.arc(p.x, p.y, p.size * (0.4 + 0.6 * t), 0, Math.PI * 2);
                fctx.fill();
            }
            fctx.shadowBlur = 0;
            fctx.globalAlpha = 1;
        }

        // -------------------------------------------------------------
        // 3. Confetti (paper rectangles fluttering down)
        // -------------------------------------------------------------
        const confCanvas = document.getElementById('confetti');
        const cctx = confCanvas.getContext('2d');
        let confetti = [];

        function initConfetti() {
            resize(confCanvas);
            cctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        }

        function spawnConfetti(x, y, n = 80) {
            const colors = ['#00d2ff', '#ff3ed1', '#ffcc00', '#9d50bb', '#00ff95', '#ffffff'];
            for (let i = 0; i < n; i++) {
                confetti.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 7,
                    vy: -3 - Math.random() * 8,
                    g: 0.18 + Math.random() * 0.08,
                    rot: Math.random() * Math.PI * 2,
                    vr: (Math.random() - 0.5) * 0.4,
                    w: 6 + Math.random() * 6,
                    h: 8 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    age: 0,
                    life: 240 + Math.random() * 120
                });
            }
        }

        function drawConfetti() {
            cctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = confetti.length - 1; i >= 0; i--) {
                const c = confetti[i];
                c.age++;
                c.vy += c.g;
                c.vx *= 0.995;
                c.x += c.vx + Math.sin(c.age * 0.05) * 0.6;
                c.y += c.vy;
                c.rot += c.vr;
                if (c.age > c.life || c.y > innerHeight + 40) {
                    confetti.splice(i, 1); continue;
                }
                cctx.save();
                cctx.translate(c.x, c.y);
                cctx.rotate(c.rot);
                cctx.fillStyle = c.color;
                cctx.globalAlpha = Math.max(0, 1 - c.age / c.life);
                cctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
                cctx.restore();
            }
            cctx.globalAlpha = 1;
        }

        // -------------------------------------------------------------
        // 4. Loop & events
        // -------------------------------------------------------------
        function loop() {
            drawStars();
            drawFx();
            drawConfetti();
            requestAnimationFrame(loop);
        }

        function autoFireworks() {
            const x = innerWidth * (0.15 + Math.random() * 0.7);
            const y = innerHeight * (0.18 + Math.random() * 0.35);
            rocket(x, y);
            setTimeout(autoFireworks, 1200 + Math.random() * 1800);
        }

        function bigFinale() {
            const N = 6;
            for (let i = 0; i < N; i++) {
                setTimeout(() => {
                    const x = innerWidth * (0.15 + Math.random() * 0.7);
                    const y = innerHeight * (0.2 + Math.random() * 0.3);
                    rocket(x, y, { count: 160 });
                }, i * 220);
            }
            spawnConfetti(innerWidth / 2, innerHeight * 0.45, 200);
        }

        addEventListener('click', (e) => {
            // Don't intercept the wish button (handled separately)
            if (e.target.closest('.wish-btn')) return;
            rocket(e.clientX, e.clientY);
            spawnConfetti(e.clientX, e.clientY, 24);
        });

        addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); bigFinale(); }
        });

        document.getElementById('wishBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            bigFinale();
            const subject = encodeURIComponent(`Mein Geburtstagswunsch${name ? ' von ' + name : ''}`);
            const body = encodeURIComponent(
                `Lieber Michael,\n\nmein Wunsch zum Geburtstag ist:\n\n\n\nLiebe Grüße${name ? ',\n' + name : ''}`
            );
            setTimeout(() => {
                window.location.href = `mailto:info@docalvers.de?subject=${subject}&body=${body}`;
            }, 600);
        });

        addEventListener('resize', () => {
            initStars(); initFx(); initConfetti();
        });

        // Boot
        initStars(); initFx(); initConfetti();
        loop();
        // First celebratory burst after the title settles
        setTimeout(() => {
            spawnConfetti(innerWidth / 2, innerHeight * 0.4, 140);
            rocket(innerWidth * 0.35, innerHeight * 0.3);
            rocket(innerWidth * 0.65, innerHeight * 0.3);
        }, 1600);
        setTimeout(autoFireworks, 3500);
    </script>
</body>

</html>
