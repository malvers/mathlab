<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>docalvers | Mathe-Labor</title>
    <style>
        :root { --primary: #0064FA; --secondary: #B40000; }
        body { margin: 0; font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; }
        header { background: #333; color: white; width: 100%; padding: 30px 0; text-align: center; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 900px; width: 90%; padding: 40px 0; }
        .card { background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; text-decoration: none; color: inherit; transition: 0.3s; text-align: center; border: 1px solid #ddd; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .card h3 { margin: 15px 0; color: #333; }
        .card-icon { font-size: 50px; padding: 20px; background: #fafafa; }
        .btn { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: var(--primary); color: white; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
<header>
    <h1>Doc Alvers Mathe-Labor</h1>
    <p>Interaktive Tools für den Unterricht</p>
</header>
<div class="container">

        <div class="card-icon"></div>
        <h3>Steigungs-Labor</h3>
        <div class="btn">Starten</div>
    </a>
    <a href="ausgleichsgerade.html" class="card">

    <a href="pythagoras.html" class="card">

    </a>
</div>
