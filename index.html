<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematik interaktiv by Dr. Michael R. Alvers</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-bg: #050b18;
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--space-bg);
            background-image:
                linear-gradient(rgba(5, 11, 24, 0.6), rgba(5, 11, 24, 0.7)),
                url('https://images.unsplash.com/photo-1464802686167-b939a6910659?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 20px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 400px 400px, 250px 250px;
            background-position: 0 0, 40px 60px;
            animation: starsMove 150s linear infinite;
            z-index: -1;
            opacity: 0.5;
        }

        @keyframes starsMove {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        header {
            padding: 30px 0; /* Header kompakter */
            text-align: center;
            background: transparent;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .header-content {
            width: 60%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem; /* Leicht verkleinert */
            margin: 0;
            letter-spacing: 4px;
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--neon-blue));
            text-transform: uppercase;
        }

        .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 8px;
            color: var(--neon-blue);
            font-size: 0.7rem;
            opacity: 0.9;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); /* Kacheln schmaler */
            gap: 25px;
            max-width: 900px; /* Container schmaler (ca. 80%) */
            width: 80%;
            padding: 20px 0 60px 0; /* Weniger Padding oben -> rückt höher */
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none;
            color: white;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px; /* Kompakteres Padding in der Kachel */
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.25);
        }

        .card-icon {
            font-size: 45px; /* Icons kleiner */
            margin-bottom: 12px;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }

        .card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem; /* Schrift kleiner */
            letter-spacing: 1px;
            margin: 10px 0;
        }

        .btn {
            margin: 15px 0 10px 0;
            padding: 8px 18px; /* Button schmaler */
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            background: transparent;
        }

        .card:hover .btn {
            background: white;
            color: black;
            font-weight: bold;
            box-shadow: 0 0 8px white;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            opacity: 0.5;
            text-align: center;
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <h1>Doc Alvers Mathe-Labor</h1>
        <div class="subtitle">INTERAKTIVE MATHEMATIK</div>
    </div>
</header>

<div class="container">
    <a href="steigung.html" class="card">
        <div class="card-icon">🚀</div>
        <h3>Steigungs-Labor</h3>
        <div class="btn">Mission Start</div>
    </a>
    <a href="ausgleichsgerade.html" class="card">
        <div class="card-icon">🛰️</div>
        <h3>Ausgleichsgerade</h3>
        <div class="btn">Mission Start</div>
    </a>
    <a href="pythagoras.html" class="card">
        <div class="card-icon">🛸</div>
        <h3>Pythagoras</h3>
        <div class="btn">Mission Start</div>
    </a>
    <a href="eulergerade.html" class="card">
        <div class="card-icon">🪐</div>
        <h3>Die Euler-Gerade</h3>
        <div class="btn">Mission Start</div>
    </a>
    <a href="winkelsumme.html" class="card">
        <div class="card-icon">📐</div>
        <h3>Polygon-Labor</h3>
        <div class="btn">Mission Start</div>
    </a>
    <a href="beweisinwinkellsumme.html" class="card">
        <div class="card-icon">📐</div>
        <h3>Polygon-Labor</h3>
        <div class="btn">Mission Start</div>
    </a>
</div>

<style>
    /* Ergänzung für den Footer-Link */
    footer a {
        color: inherit;
        text-decoration: none;
        margin-left: 15px;
        transition: 0.3s;
    }
    footer a:hover {
        color: var(--neon-blue);
    }
</style>

<footer>
    &bull; &copy; 2026 DR. MICHAEL R. ALVERS
    <a href="impressum.html">            IMPRESSUM</a>
</footer>
</body>
</html>
