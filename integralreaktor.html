<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Labor | Integral-Reaktor</title>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <!-- Branding & UI Engines -->
    <script src="js/branding.js"></script>
    <script src="js/math-library.js"></script>
    <script src="js/ui.js"></script>
    <link rel="stylesheet" href="js/cyber-layout.css">
    <style>
        /* Essential structure only; all branding/padding comes from cyber-layout.css */
        #reactor-canvas { width: 100%; height: 100%; background: transparent; }
        .dashboard-grid { display: flex; flex-direction: column; gap: 10px; }
        .dashboard-stat { padding-bottom: 5px; }
        .dashboard-stat:last-child { border-bottom: none; }
        #formula-display { font-size: 2.2rem; min-height: 55px; display: flex; align-items: center; }
        #integral-value, #error-display { font-size: 1.25rem; }
        #error-display { color: #ffcc00; }
        .mode-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .mode-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.65rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .mode-btn.active {
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--neon-blue);
            color: white;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
        }
    </style>
</head>

<body>
    <aside id="side-panel">
        <div id="sidebar-header" style="min-height: 60px;"></div>
        
        <div id="briefing-container"></div>

        <div class="instrument-card">
            <div class="dashboard-grid">
                <div class="dashboard-stat">
                    <div class="stat-meta">AKTIVE INTEGRAL-FORMEL</div>
                    <div id="formula-display">Warte auf Daten...</div>
                </div>
                <div class="dashboard-stat">
                    <div class="stat-meta">FLÄCHE UNTER DER KURVE</div>
                    <div id="integral-value" class="cyber-number" style="color: var(--neon-blue);">0.000</div>
                </div>
                <div class="dashboard-stat">
                    <div class="stat-meta">FEHLER</div>
                    <div id="error-display" class="cyber-number">0.0%</div>
                </div>
            </div>
        </div>

        <div id="parameters-container">
            <!-- Cards will be injected here via JS -->
        </div>

        <div style="margin-top: auto; padding-top: 15px; text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.2); font-family: 'Orbitron';">
            &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull;
        </div>
    </aside>

    <div id="workspace">
        <canvas id="reactor-canvas"></canvas>
    </div>

    <!-- Logic -->
    <script src="js/integral-engine.js"></script>
    <script>
        window.addEventListener('load', () => {
            // 1. Initialize Branding
            CyberBranding.init({
                title: "INTEGRAL-REAKTOR",
                subtitle: "DOC ALVERS MATHE-LABOR"
            });

            // 2. Initialize UI Components
            CyberUI.init();

            // 3. Create Parameter Controls
            CyberUI.createCard('parameters-container', '', `
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div id="func-select-container" style="margin-bottom: 5px; padding-bottom: 5px;"></div>
                    
                    <div>
                        <div class="label-row">
                            <span id="label-param-a">Grenze a</span>
                            <span id="val-a" class="cyber-number" style="font-size: 0.8rem; color: var(--neon-blue);">-2.0</span>
                        </div>
                        <input type="range" id="param-a" min="-5" max="5" step="0.1" value="-2" oninput="updateEngine()">
                    </div>

                    <div>
                        <div class="label-row">
                            <span id="label-param-b">Grenze b</span>
                            <span id="val-b" class="cyber-number" style="font-size: 0.8rem; color: var(--neon-blue);">2.0</span>
                        </div>
                        <input type="range" id="param-b" min="-5" max="5" step="0.1" value="2" oninput="updateEngine()">
                    </div>

                    <div>
                        <div class="label-row">
                            <span id="label-param-n">Präzision n</span>
                            <span id="val-n" class="cyber-number" style="font-size: 0.8rem; color: var(--neon-blue);">10</span>
                        </div>
                        <input type="range" id="param-n" min="4" max="100" step="1" value="10" oninput="updateEngine()">
                    </div>

                    <div>
                        <div class="mode-selector">
                            <button class="mode-btn active" onclick="setMode('exact')">ANALYTISCH</button>
                            <button class="mode-btn" onclick="setMode('balken')">BALKEN</button>
                        </div>
                    </div>
                </div>
            `, 'var(--neon-blue)', { collapsible: false });

            // 4. Create Mission Briefing
            CyberUI.injectBriefing('briefing-container', `
                <b>System-Status</b>: Reaktor online. Alle Parameter wurden in das zentrale Side-Panel fusioniert.
                Ändern Sie die Grenzen, um den Energiefluss (Fläche) in Echtzeit zu beobachten.
            `);

            // 5. Initialize Engine
            initEngine();

            CyberUI.createDropdown('func-select-container', MathLibrary.getAll(), (id) => {
                state.func = id;
                updateEngine();
            }, 'parabel');

            setTimeout(() => {
                updateEngine();
                CyberBranding.renderMath("label-param-a", "a");
                CyberBranding.renderMath("label-param-b", "b");
                CyberBranding.renderMath("label-param-n", "n");
            }, 100);
        });
    </script>
</body>
</html>
