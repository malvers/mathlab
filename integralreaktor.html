<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Labor | Integral-Reaktor</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;500&display=swap" rel="stylesheet">
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <!-- Branding Engine -->
    <script src="js/branding.js"></script>
    <script src="js/math-library.js"></script>
    <script src="js/ui.js"></script>
    <style>
        :root {
            --space-bg: #050b18;
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --glass: rgba(15, 23, 42, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--space-bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 320px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: visible; /* Allow dropdowns to pop out */
        }

        #sidebar-header {
            margin-bottom: 30px;
        }

        .control-group {
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        label {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-bottom: 12px;
            color: var(--neon-blue);
            text-transform: uppercase;
        }

        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            outline: none;
        }

        input[type="range"] {
            width: 95%;
            margin: 10px auto;
            display: block;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            height: 4px;
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--neon-blue);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-blue);
            border: 2px solid #fff;
        }

        .value-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            text-align: right;
            margin-top: 5px;
            color: white;
        }

        /* --- REACTOR CHAMBER --- */
        .reactor-chamber {
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        canvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        /* --- RADIATION DASHBOARD --- */
        .dashboard {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            backdrop-filter: blur(15px);
            border-bottom: 4px solid var(--neon-blue);
        }

        .stat-box {
            text-align: center;
        }

        .stat-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-bottom: 5px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--neon-blue);
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        }

        .integral-formula {
            font-size: 1.1rem;
            color: white;
        }

        /* --- MODE TOGGLES --- */
        .mode-toggles {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .mode-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            padding: 8px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            background: rgba(0, 210, 255, 0.2);
            border-color: var(--neon-blue);
            color: white;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        @media screen and (max-width: 900px) {
            .sidebar { width: 0; padding: 0; overflow: hidden; display: none; }
            .dashboard { bottom: 10px; left: 10px; right: 10px; flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <aside class="sidebar" style="overflow-y: visible;">
        <div id="sidebar-header"></div>

        <div id="function-config-container" style="position: relative; z-index: 150000;">
            <!-- LaTeX Dropdown and function params will be injected here -->
        </div>

        <div class="control-group">

        <div class="control-group">
            <label>Integrations-Grenzen</label>
            <div style="margin-bottom: 15px;">
                <span class="stat-label">a (Untergrenze)</span>
                <input type="range" id="param-a" min="-5" max="5" step="0.1" value="-2" oninput="updateEngine()">
                <div id="val-a" class="value-display">-2.0</div>
            </div>
            <div>
                <span class="stat-label">b (Obergrenze)</span>
                <input type="range" id="param-b" min="-5" max="5" step="0.1" value="2" oninput="updateEngine()">
                <div id="val-b" class="value-display">2.0</div>
            </div>
        </div>

        <div class="control-group">
            <label>Reaktor-Präzision (n)</label>
            <input type="range" id="param-n" min="1" max="100" step="1" value="10" oninput="updateEngine()">
            <div id="val-n" class="value-display">10</div>
        </div>

        <div class="control-group">
            <label>Visualisierungs-Modus</label>
            <div class="mode-toggles">
                <button class="mode-btn active" onclick="setMode('exact')">EXAKT</button>
                <button class="mode-btn" onclick="setMode('left')">LINKS</button>
                <button class="mode-btn" onclick="setMode('right')">RECHTS</button>
                <button class="mode-btn" onclick="setMode('trapez')">TRAPEZ</button>
            </div>
        </div>
    </aside>

    <main class="reactor-chamber">
        <canvas id="reactor-canvas"></canvas>
        
        <div class="dashboard">
            <div class="stat-box">
                <div class="stat-label">INTEGRAL-FORMEL</div>
                <div class="stat-value integral-formula" id="formula-display">∫ f(x) dx</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">ENERGIE-ZUSTAND</div>
                <div class="stat-value" id="integral-value">0.000</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">FEHLER-MARGIN</div>
                <div id="error-display" class="stat-value" style="font-size: 1rem; color: #ff0055;">0.0%</div>
            </div>
        </div>
    </main>

    <!-- Engine -->
    <script src="js/integral-engine.js"></script>
    <script>
        // Globaler Start
        window.addEventListener('load', () => {
            CyberBranding.init({
                title: "INTEGRAL-REAKTOR",
                subtitle: "DOC ALVERS MATHE-LABOR | ENERGIE DER FLÄCHE"
            });
            
            // Initialize UI Components
            CyberUI.init();
            
            CyberUI.createCard('function-config-container', 'Fokus-Funktion', `
                <div class="control-group" style="background:transparent; border:none; padding:0;">
                    <label>Mathematisches Modell</label>
                    <div id="latex-dropdown-container"></div>
                </div>
            `, 'var(--neon-blue)');

            initEngine();

            // Initialize Dropdown with MathLibrary
            CyberUI.createDropdown('latex-dropdown-container', MathLibrary.getAll(), (id) => {
                state.func = id;
                updateEngine();
            }, 'parabel'); // Default to a standard parabola
        });
    </script>
</body>
</html>
