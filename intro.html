<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Intro | docalvers ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
        }

        body {
            margin: 0;
            padding: 0;
            background: #050b18;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        /* The Galaxy Backdrop */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            pointer-events: none;
        }

        /* Intro Animation Container */
        .intro-container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            letter-spacing: 20px;
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.7));
            text-transform: uppercase;
            font-weight: 700;
            
            /* Initial State */
            opacity: 0;
            transform: scale(0.01);
            animation: cinematic-fade-in 6s cubic-bezier(0.1, 0.7, 0.3, 1) forwards;
        }

        .subtitle {
            font-size: 1.5rem;
            letter-spacing: 12px;
            color: var(--neon-blue);
            margin-top: 30px;
            opacity: 0;
            transform: translateY(30px);
            animation: subtitle-fade 4s ease-out 4.5s forwards;
            text-transform: uppercase;
        }

        @keyframes cinematic-fade-in {
            0% {
                opacity: 0;
                transform: scale(0.05);
                letter-spacing: 80px;
            }
            40% {
                opacity: 0.6;
            }
            100% {
                opacity: 1;
                transform: scale(1.8);
                letter-spacing: 12px;
            }
        }

        @keyframes subtitle-fade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 0.7; transform: translateY(0); }
        }

        /* Subtle Glow pulsing in background */
        .glow-sphere {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            animation: pulse-glow 8s infinite alternate;
        }

        @keyframes pulse-glow {
            from { transform: scale(1) opacity(0.3); }
            to { transform: scale(1.2) opacity(0.6); }
        }
    </style>
</head>
<body>
    
    <video id="bg-video" autoplay loop muted playsinline>
        <source src="galay20.mp4" type="video/mp4">
    </video>

    <div class="glow-sphere"></div>

    <div class="intro-container">
        <h1 style="margin-bottom: 40px;">DOC ALVERS</h1>
        <h1 style="animation-delay: 0.5s;">MATHE-LABOR</h1>
    </div>

    <script>
        // Set playback rate to very slow for cinemantic effect
        window.addEventListener('load', () => {
            const video = document.getElementById('bg-video');
            if (video) video.playbackRate = 0.5;
        });
    </script>
</body>
</html>
