<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Intro | docalvers ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
        }

        body {
            margin: 0;
            padding: 0;
            background: #050b18;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        /* The Galaxy Backdrop */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            pointer-events: none;
        }

        /* Intro Animation Container */
        .intro-container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            letter-spacing: 20px;
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.7));
            text-transform: uppercase;
            font-weight: 700;
            
            /* Initial State */
            opacity: 0;
            transform: scale(0.01);
            animation: cinematic-fade-in 6s cubic-bezier(0.1, 0.7, 0.3, 1) forwards;
        }

        .coming-soon {
            font-size: 3.5rem;
            letter-spacing: 12px;
            color: #fff; /* Strahlendes Weiß für maximale Sichtbarkeit */
            margin-top: 40px;
            opacity: 0;
            animation: subtitle-fade 4s ease-out 1.5s forwards;
            text-transform: uppercase;
            font-weight: 400;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        @keyframes cinematic-fade-in {
            0% {
                opacity: 0;
                transform: scale(0.05);
                letter-spacing: 80px;
            }
            40% {
                opacity: 0.6;
            }
            100% {
                opacity: 1;
                transform: scale(1.8);
                letter-spacing: 12px;
            }
        }

        @keyframes subtitle-fade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 0.7; transform: translateY(0); }
        }

        /* Subtle Glow pulsing in background */
        .glow-sphere {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            animation: pulse-glow 8s infinite alternate;
        }

        @keyframes pulse-glow {
            from { transform: scale(1) opacity(0.3); }
            to { transform: scale(1.2) opacity(0.6); }
        }

        /* Fullscreen Toggle Button */
        .fs-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
            opacity: 0.3;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            outline: none;
        }
        .fs-toggle:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            transform: scale(1.1);
        }
        .fs-toggle svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
    </style>
</head>
<body>
    
    <video id="bg-video" autoplay loop muted playsinline>
        <source src="galay20.mp4" type="video/mp4">
    </video>

    <div class="glow-sphere"></div>

    <button class="fs-toggle" id="fs-btn" onclick="toggleFullscreen()" title="Vollbildmodus (F)">
        <svg viewBox="0 0 24 24">
            <path d="M15 3h6v6M9 21H3v-6M21 9V3h-6M3 15v6h6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <div class="intro-container">
        <h1 style="margin-bottom: 40px;">DOC ALVERS</h1>
        <h1 style="animation-delay: 0.5s;">MATHE-LABOR</h1>
        <div class="coming-soon">COMING SOON</div>
    </div>

    <script>
        // Set playback rate to very slow for cinematic effect
        window.addEventListener('load', () => {
            const video = document.getElementById('bg-video');
            if (video) video.playbackRate = 0.5;
        });

        function toggleFullscreen() {
            const doc = window.document;
            const docEl = doc.documentElement;

            console.log("⚛️ CYBER-OS: Fullscreen Request detected.");

            // Comprehensive state check
            const isFullScreen = doc.fullscreenElement || doc.mozFullScreenElement || doc.webkitFullscreenElement || doc.msFullscreenElement || doc.webkitIsFullScreen;

            if (!isFullScreen) {
                // ENTER
                if (docEl.requestFullscreen) {
                    docEl.requestFullscreen();
                } else if (docEl.mozRequestFullScreen) {
                    docEl.mozRequestFullScreen();
                } else if (docEl.webkitRequestFullscreen) {
                    docEl.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT);
                } else if (docEl.msRequestFullscreen) {
                    docEl.msRequestFullscreen();
                }
            } else {
                // EXIT
                if (doc.exitFullscreen) {
                    doc.exitFullscreen();
                } else if (doc.mozCancelFullScreen) {
                    doc.mozCancelFullScreen();
                } else if (doc.webkitExitFullscreen) {
                    doc.webkitExitFullscreen();
                } else if (doc.msExitFullscreen) {
                    doc.msExitFullscreen();
                }
            }
        }

        // Shortcut Key Listener
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') {
                toggleFullscreen();
            }
        });
    </script>
</body>
</html>
