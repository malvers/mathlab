<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catching Words | docalvers ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
        }

        body {
            margin: 0;
            padding: 0;
            background: #050b18;
            overflow: visible;
            height: 100vh;
            width: 100vw;
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            pointer-events: none;
            filter: brightness(0.62);
        }

        /* Catching Words: End-Größe scale 0.9 */
        @keyframes cinematic-fade-in-cw {
            0% {
                opacity: 0;
                transform: scale(0.05);
                letter-spacing: 80px;
            }
            40% {
                opacity: 0.6;
            }
            99.5% {
                opacity: 1;
                transform: scale(0.9);
                letter-spacing: 12px;
            }
            100% {
                opacity: 1;
                transform: scale(0.9);
                letter-spacing: 12px;
            }
        }

        .glow-sphere {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            animation: pulse-glow 8s infinite alternate;
        }

        @keyframes pulse-glow {
            from { transform: scale(1); opacity: 0.3; }
            to { transform: scale(1.2); opacity: 0.6; }
        }

        .fs-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 2500;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
            opacity: 0.3;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            outline: none;
        }
        .fs-toggle:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            transform: scale(1.1);
        }
        .fs-toggle svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        #catching-words-panel {
            display: block;
            position: fixed;
            inset: 0;
            z-index: 100;
            overflow: visible;
            --cw-anim-sec: 8;
        }
        #catching-words-panel .cw-play {
            position: absolute;
            inset: 0;
            padding: 28px 0 88px;
            box-sizing: border-box;
            cursor: crosshair;
            overflow: visible;
        }
        #catching-words-panel.cw-drag-over {
            box-shadow: inset 0 0 0 3px rgba(0, 210, 255, 0.45);
            background: rgba(0, 210, 255, 0.04);
        }
        /* Mehrzeilig: oben verankert (kein Aufwärts-Sprung). Ein Schlagwort: vertikal zentriert. */
        #catching-words-panel .cw-stack {
            position: absolute;
            left: 0;
            right: 0;
            top: clamp(96px, 14vh, 180px);
            transform: none;
            display: flex;
            flex-direction: column;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            max-width: none;
            box-sizing: border-box;
            gap: 24px;
            padding: 0 6px;
            isolation: isolate;
            overflow: visible;
        }
        #catching-words-panel .cw-stack.cw-stack-centered {
            top: 50%;
            transform: translateY(-50%);
            justify-content: center;
        }
        /* Schlagwort: Orbitron-Gradient, Endgröße scale 0.9 */
        #catching-words-panel .falling-word {
            position: relative;
            left: auto;
            top: auto;
            flex: 0 0 auto;
            align-self: center;
            width: auto;
            max-width: none;
            min-width: max-content;
            overflow: visible;
            margin: 0;
            padding: 0;
            border: none;
            border-radius: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            line-height: 1.12;
            text-align: center;
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.7));
            user-select: none;
            touch-action: manipulation;
            white-space: nowrap;
            cursor: pointer;
            transform-origin: center center;
            opacity: 0;
            transform: scale(0.05);
            letter-spacing: 80px;
            animation-name: cinematic-fade-in-cw;
            animation-duration: calc(var(--cw-anim-sec) * 1s);
            animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
            animation-iteration-count: 1;
            animation-fill-mode: forwards;
        }
        #catching-words-panel .falling-word.cw-settled {
            animation: none;
            transition: none;
            opacity: 1;
            transform: scale(0.9);
            letter-spacing: 12px;
        }
        #catching-words-panel .falling-word.caught {
            animation: cw-caught 0.38s ease-out forwards;
        }
        @keyframes cw-caught {
            to {
                opacity: 0;
                filter: drop-shadow(0 0 50px rgba(255, 255, 255, 0.9));
                transform: scale(1.05);
            }
        }
        @keyframes cw-portal-in {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.94);
                filter: blur(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }
        #catching-words-panel a.cw-portal-btn {
            position: relative;
            flex: 0 0 auto;
            align-self: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: rgba(240, 252, 255, 0.98);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.28em;
            text-indent: 0.28em;
            text-transform: uppercase;
            padding: 1rem 2.4rem;
            border: 2px solid rgba(0, 210, 255, 0.9);
            border-radius: 6px;
            background: linear-gradient(145deg, rgba(0, 210, 255, 0.14), rgba(168, 85, 247, 0.1));
            box-shadow:
                0 0 32px rgba(0, 210, 255, 0.4),
                0 0 64px rgba(168, 85, 247, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.12);
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
            white-space: nowrap;
            opacity: 0;
            transform: translateY(18px) scale(0.94);
            animation: cw-portal-in calc(var(--cw-anim-sec) * 0.42s) cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition:
                border-color 0.25s ease,
                box-shadow 0.25s ease,
                color 0.2s ease,
                transform 0.2s ease;
        }
        #catching-words-panel a.cw-portal-btn:hover {
            color: #fff;
            border-color: rgba(200, 120, 255, 0.95);
            transform: translateY(-2px) scale(1.02);
            box-shadow:
                0 0 40px rgba(168, 85, 247, 0.5),
                0 0 80px rgba(0, 210, 255, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .cw-debug-hud {
            position: fixed;
            left: 12px;
            bottom: 56px;
            z-index: 10001;
            font-family: ui-monospace, 'Cascadia Code', Menlo, monospace;
            font-size: 11px;
            line-height: 1.45;
            color: rgba(185, 235, 255, 0.95);
            background: rgba(5, 15, 30, 0.9);
            border: 1px solid rgba(0, 210, 255, 0.4);
            border-radius: 8px;
            padding: 8px 11px;
            pointer-events: none;
            white-space: pre-line;
            display: none;
        }
        .cw-debug-hud.visible {
            display: block;
        }
    </style>
</head>
<body class="mode-catching-words">

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="resources/galay20.mp4" type="video/mp4">
    </video>

    <div class="glow-sphere"></div>

    <button class="fs-toggle" id="fs-btn" onclick="toggleFullscreen()" title="Vollbildmodus (F)">
        <svg viewBox="0 0 24 24">
            <path d="M15 3h6v6M9 21H3v-6M21 9V3h-6M3 15v6h6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <div id="catching-words-panel" aria-hidden="false">
        <div class="cw-play" id="cw-play">
            <div class="cw-stack" id="cw-stack"></div>
        </div>
    </div>

    <script src="js/ui.js?v=4"></script>
    <script>
        try {
            CyberUI.init();
        } catch (err) {
            console.warn('CyberUI.init', err);
        }

        const DEV_MODE = true;
        if (DEV_MODE) {
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    window.location.reload(true);
                }
            });
        }

        window.addEventListener('load', () => {
            const video = document.getElementById('bg-video');
            if (video) video.playbackRate = 0.5;
        });

        function toggleFullscreen() {
            const doc = window.document;
            const docEl = doc.documentElement;
            const isFullScreen = doc.fullscreenElement || doc.mozFullScreenElement || doc.webkitFullscreenElement || doc.msFullscreenElement || doc.webkitIsFullScreen;

            if (!isFullScreen) {
                if (docEl.requestFullscreen) docEl.requestFullscreen();
                else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT);
            } else {
                if (doc.exitFullscreen) doc.exitFullscreen();
                else if (doc.webkitExitFullscreen) doc.webkitExitFullscreen();
            }
        }

        function isCwTypingTarget(target) {
            if (!target || !target.tagName) return false;
            const tag = target.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return true;
            if (target.isContentEditable) return true;
            return false;
        }

        const BG_VIDEO_BRIGHTNESS_DEFAULT = 0.62;
        const BG_VIDEO_BRIGHTNESS_STEP = 0.06;
        const BG_VIDEO_BRIGHTNESS_MIN = 0.15;
        const BG_VIDEO_BRIGHTNESS_MAX = 1.0;
        let bgVideoBrightness = BG_VIDEO_BRIGHTNESS_DEFAULT;

        function syncBgVideoBrightness() {
            const video = document.getElementById('bg-video');
            if (video) video.style.filter = 'brightness(' + bgVideoBrightness + ')';
        }

        function nudgeBgVideoBrightness(brighter) {
            const d = brighter ? BG_VIDEO_BRIGHTNESS_STEP : -BG_VIDEO_BRIGHTNESS_STEP;
            bgVideoBrightness = Math.round(
                Math.max(BG_VIDEO_BRIGHTNESS_MIN, Math.min(BG_VIDEO_BRIGHTNESS_MAX, bgVideoBrightness + d)) * 100
            ) / 100;
            syncBgVideoBrightness();
            saveIntroPersistedPrefs();
        }

        /* keydown: unten registriert (nach allen CW-Helfern), damit Pfeile zuverlässig greifen */

        /* —— Catching Words: Reihenfolge per .txt/.md (Zeile = Eintrag) oder Drop von Text —— */
        const CW_SEQUENCE_DEFAULT = Object.freeze([
            '1. Zeile',
            '2. Zeile',
            '3. Zeile',
            '4. Zeile',
            '5. Zeile',
        ]);
        /** Jede Zeile mit # beginnt eine neue Section; folgende Wörter gehören dazu (inkl. # 20pt …). ←/→ wechseln die Section. */
        let cwSections = [CW_SEQUENCE_DEFAULT.map((text) => ({ text, fontSizePt: null }))];
        let cwSectionIndex = 0;
        let cwSequence = cwSections[0];
        let cwAnimSec = 8;
        let cwSpawnMs = 700;
        let cwSpawnTimer = null;
        let cwRunning = false;
        let cwSpawnRoundIndex = 0;
        let cwPaused = false;
        let cwDebugHudVisible = false;
        let cwPlayAllActive = false;
        let cwPlayAllTimer = null;
        let cwPlayAllCompletionRaf = null;
        const CW_PLAY_ALL_GAP_MS = 320;

        function clearCwPlayAllTimer() {
            if (cwPlayAllTimer) {
                clearTimeout(cwPlayAllTimer);
                cwPlayAllTimer = null;
            }
            if (cwPlayAllCompletionRaf != null) {
                cancelAnimationFrame(cwPlayAllCompletionRaf);
                cwPlayAllCompletionRaf = null;
            }
        }

        function isCwPlayAllSectionVisuallyComplete() {
            const stack = document.getElementById('cw-stack');
            if (!stack) return true;
            const words = stack.querySelectorAll('.falling-word');
            for (let i = 0; i < words.length; i++) {
                const el = words[i];
                if (!el.classList.contains('cw-settled') && !el.classList.contains('caught')) return false;
            }
            const portals = stack.querySelectorAll('.cw-portal-btn');
            for (let j = 0; j < portals.length; j++) {
                if (!portals[j].classList.contains('cw-portal-settled')) return false;
            }
            return true;
        }

        function runCwPlayAllSectionCompletionWatch() {
            const tick = () => {
                cwPlayAllCompletionRaf = null;
                if (!cwPlayAllActive || !cwRunning) return;
                if (cwSpawnRoundIndex < cwSequence.length) {
                    cwPlayAllCompletionRaf = requestAnimationFrame(tick);
                    return;
                }
                if (cwPaused) {
                    cwPlayAllCompletionRaf = requestAnimationFrame(tick);
                    return;
                }
                if (!isCwPlayAllSectionVisuallyComplete()) {
                    cwPlayAllCompletionRaf = requestAnimationFrame(tick);
                    return;
                }
                tryAdvanceCwPlayAllAfterCurrentSectionSpawnDone();
            };
            if (cwPlayAllCompletionRaf != null) {
                cancelAnimationFrame(cwPlayAllCompletionRaf);
                cwPlayAllCompletionRaf = null;
            }
            cwPlayAllCompletionRaf = requestAnimationFrame(tick);
        }

        const INTRO_PREFS_KEY = 'docalvers.intro.prefs';
        const INTRO_PREFS_VERSION = 1;

        function loadIntroPersistedPrefs() {
            try {
                const raw = localStorage.getItem(INTRO_PREFS_KEY);
                if (!raw) return;
                const s = JSON.parse(raw);
                if (!s || typeof s !== 'object' || s.v !== INTRO_PREFS_VERSION) return;
                if (typeof s.bgBrightness === 'number' && Number.isFinite(s.bgBrightness)) {
                    bgVideoBrightness = Math.max(
                        BG_VIDEO_BRIGHTNESS_MIN,
                        Math.min(BG_VIDEO_BRIGHTNESS_MAX, Math.round(s.bgBrightness * 100) / 100)
                    );
                }
                if (typeof s.cwAnimSec === 'number' && Number.isFinite(s.cwAnimSec)) {
                    cwAnimSec = Math.round(Math.max(4, Math.min(18, s.cwAnimSec)) * 10) / 10;
                }
                if (typeof s.cwSpawnMs === 'number' && Number.isFinite(s.cwSpawnMs)) {
                    cwSpawnMs = Math.round(Math.max(400, Math.min(2000, s.cwSpawnMs)));
                }
            } catch (err) {
                /* file:// oder private mode */
            }
        }

        function saveIntroPersistedPrefs() {
            try {
                localStorage.setItem(
                    INTRO_PREFS_KEY,
                    JSON.stringify({
                        v: INTRO_PREFS_VERSION,
                        bgBrightness: bgVideoBrightness,
                        cwAnimSec,
                        cwSpawnMs,
                    })
                );
            } catch (err) {
                /* quota / private mode */
            }
        }

        loadIntroPersistedPrefs();

        function syncCwMotionVars() {
            const panel = document.getElementById('catching-words-panel');
            if (panel) panel.style.setProperty('--cw-anim-sec', String(cwAnimSec));
            const hud = document.getElementById('cw-debug-hud');
            if (hud && hud.classList.contains('visible')) {
                hud.textContent = [
                    'Flug (Keyframe): ' + cwAnimSec.toFixed(1) + ' s',
                    'Spawn-Takt:      ' + cwSpawnMs + ' ms',
                    '↑ schneller · ↓ langsamer  (±0,1 s · ±10 ms)',
                    'h · d  Video heller / dunkler',
                    '%stop in .txt beendet S‑Play-all',
                    'S  Play-all: Wechsel wenn Section fertig animiert',
                    '⌘D  Debug ein/aus',
                ].join('\n');
            }
        }

        function nudgeCwMotion(isUpFaster) {
            const dir = isUpFaster ? 1 : -1;
            cwAnimSec = Math.round(Math.max(4, Math.min(18, cwAnimSec - dir * 0.1)) * 10) / 10;
            cwSpawnMs = Math.round(Math.max(400, Math.min(2000, cwSpawnMs - dir * 10)));
            syncCwMotionVars();
            saveIntroPersistedPrefs();
        }

        function toggleCwDebugHud() {
            if (!document.body.classList.contains('mode-catching-words')) return;
            cwDebugHudVisible = !cwDebugHudVisible;
            let hud = document.getElementById('cw-debug-hud');
            if (!hud) {
                hud = document.createElement('div');
                hud.id = 'cw-debug-hud';
                hud.className = 'cw-debug-hud';
                hud.setAttribute('aria-live', 'polite');
                document.body.appendChild(hud);
            }
            hud.classList.toggle('visible', cwDebugHudVisible);
            syncCwMotionVars();
        }

        function handleCwSectionSpawnExhausted() {
            if (cwSpawnTimer) {
                clearTimeout(cwSpawnTimer);
                cwSpawnTimer = null;
            }
            if (!cwRunning) return;
            if (cwPlayAllActive) runCwPlayAllSectionCompletionWatch();
        }

        function stopCwPlayAllFromScript() {
            cwPlayAllActive = false;
            clearCwPlayAllTimer();
        }

        function beginCwPlayAllSections() {
            if (!document.body.classList.contains('mode-catching-words')) return;
            if (!cwSections.length) return;
            clearCwPlayAllTimer();
            cwPlayAllActive = true;
            cwSectionIndex = 0;
            cwSequence = cwSections[0] || [];
            syncCwStackVerticalAlign();
            stopCatchingWords();
            startCatchingWords();
        }

        function tryAdvanceCwPlayAllAfterCurrentSectionSpawnDone() {
            if (!cwPlayAllActive) return;
            clearCwPlayAllTimer();
            if (cwSectionIndex < cwSections.length - 1) {
                const stack = document.getElementById('cw-stack');
                if (stack) stack.innerHTML = '';
                cwPlayAllTimer = setTimeout(() => {
                    cwPlayAllTimer = null;
                    if (!cwPlayAllActive || !document.body.classList.contains('mode-catching-words')) return;
                    cwSectionIndex += 1;
                    cwSequence = cwSections[cwSectionIndex] || [];
                    syncCwStackVerticalAlign();
                    stopCatchingWords();
                    startCatchingWords();
                }, CW_PLAY_ALL_GAP_MS);
            } else {
                cwPlayAllActive = false;
                stopCatchingWords();
            }
        }

        function stepCwSection(delta) {
            if (!document.body.classList.contains('mode-catching-words')) return;
            cwPlayAllActive = false;
            clearCwPlayAllTimer();
            if (cwSections.length === 0) return;
            if (cwSections.length === 1) {
                cwSectionIndex = 0;
                cwSequence = cwSections[0] || [];
                stopCatchingWords();
                startCatchingWords();
                return;
            }
            const next = Math.max(0, Math.min(cwSections.length - 1, cwSectionIndex + delta));
            if (next === cwSectionIndex) return;
            cwSectionIndex = next;
            cwSequence = cwSections[cwSectionIndex];
            stopCatchingWords();
            startCatchingWords();
        }

        function toggleCatchingWordsPause() {
            if (!document.body.classList.contains('mode-catching-words')) return;
            const stack = document.getElementById('cw-stack');
            if (!stack) return;
            cwPaused = !cwPaused;
            if (cwPaused) {
                if (cwSpawnTimer) {
                    clearTimeout(cwSpawnTimer);
                    cwSpawnTimer = null;
                }
                stack.querySelectorAll('.falling-word, .cw-portal-btn').forEach((el) => {
                    el.style.animationPlayState = 'paused';
                });
            } else {
                stack.querySelectorAll('.falling-word, .cw-portal-btn').forEach((el) => {
                    if (!el.classList.contains('caught')) el.style.animationPlayState = 'running';
                });
                scheduleCwSpawn();
            }
        }

        function spawnCwWord() {
            const playStack = document.getElementById('cw-stack');
            if (!playStack) return;
            if (cwSpawnRoundIndex >= cwSequence.length) {
                handleCwSectionSpawnExhausted();
                return;
            }
            if (!cwRunning || cwPaused) return;

            const entry = cwSequence[cwSpawnRoundIndex];
            cwSpawnRoundIndex += 1;

            if (entry.kind === 'stop-play-all') {
                stopCwPlayAllFromScript();
                return;
            }

            if (entry.kind === 'nav') {
                const a = document.createElement('a');
                a.className = 'cw-portal-btn';
                a.href = entry.href;
                if (/^https?:\/\//i.test(entry.href)) {
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                }
                a.textContent = entry.label;
                a.style.zIndex = String(cwSpawnRoundIndex);
                a.addEventListener('animationend', (ev) => {
                    if (!ev.animationName || ev.animationName.indexOf('cw-portal-in') === -1) return;
                    a.classList.add('cw-portal-settled');
                });
                playStack.appendChild(a);
                return;
            }

            const label = entry.text;
            const fontPt = entry.fontSizePt;

            const el = document.createElement('button');
            el.type = 'button';
            el.className = 'falling-word';
            el.textContent = label;
            el.style.zIndex = String(cwSpawnRoundIndex);
            if (fontPt != null && Number.isFinite(fontPt)) el.style.setProperty('font-size', fontPt + 'pt', 'important');

            playStack.appendChild(el);

            el.addEventListener('animationend', (ev) => {
                if (!ev.animationName || ev.animationName.indexOf('cinematic-fade-in') === -1) return;
                if (!cwRunning || cwPaused || el.classList.contains('caught')) return;
                el.classList.add('cw-settled');
            });

            function onCatch(e) {
                e.preventDefault();
                if (!cwRunning || el.classList.contains('caught')) return;
                el.classList.add('caught');
                setTimeout(() => el.remove(), 380);
            }
            el.addEventListener('click', onCatch);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); onCatch(e); }, { passive: false });
        }

        function scheduleCwSpawn() {
            if (!cwRunning || cwPaused) return;
            if (cwSpawnRoundIndex >= cwSequence.length) {
                handleCwSectionSpawnExhausted();
                return;
            }
            cwSpawnTimer = setTimeout(() => {
                if (!cwRunning || cwPaused) return;
                spawnCwWord();
                scheduleCwSpawn();
            }, cwSpawnMs);
        }

        function syncCwStackVerticalAlign() {
            const stack = document.getElementById('cw-stack');
            if (!stack) return;
            stack.classList.toggle('cw-stack-centered', Array.isArray(cwSequence) && cwSequence.length <= 1);
        }

        function stopCatchingWords() {
            clearCwPlayAllTimer();
            cwRunning = false;
            cwPaused = false;
            cwSpawnRoundIndex = 0;
            if (cwSpawnTimer) clearTimeout(cwSpawnTimer);
            cwSpawnTimer = null;
            const stack = document.getElementById('cw-stack');
            if (stack) stack.innerHTML = '';
        }

        function startCatchingWords() {
            if (cwRunning) return;
            cwRunning = true;
            cwPaused = false;
            cwSpawnRoundIndex = 0;
            const stack = document.getElementById('cw-stack');
            if (stack) stack.innerHTML = '';
            syncCwStackVerticalAlign();

            spawnCwWord();
            scheduleCwSpawn();
        }

        function normalizeCwLine(raw) {
            let line = String(raw || '').replace(/^\uFEFF/, '').trim();
            if (line.length && line.charCodeAt(0) === 0xff03) line = '#' + line.slice(1);
            return line;
        }

         /**
         * Sections (←/→): neuer Abschnitt bei jeder #‑Zeile (# allein, # Kommentar oder # 60pt in einer Zeile).
         * Größe: «# 60pt» oder eigene Zeile nur «60pt» / «200pt» (gilt für folgende Wörter bis zur nächsten Größenzeile).
         * Zeilen, die mit «//» beginnen: Kommentar (ignorieren).
         * Navigation: «%button» → Button nach index.html; «%button index» / «%button orbitals.html»; optional Beschriftung:
         * «%button orbitals.html Orbitale». Ein einzelnes Wort, das kein Ziel ist (z. B. «%button TOLL»), wird nur als Text auf index verlinkt.
         * «%stop» beendet den S‑Play-all-Lauf (keine automatischen Abschnittswechsel mehr), die laufende Section spielt normal weiter.
         * S: alle Abschnitte von #1 an nacheinander — Wechsel erst, wenn alle Wörter eingeflogen sind (oder erwischt) und %button-Animationen fertig sind; kurze Pause; letzter Abschnitt Stopp. ←/→ / Drop brechen ab.
         */
        function isCwNavTargetToken(t) {
            const s = String(t || '').trim();
            if (!s) return false;
            if (/^https?:\/\//i.test(s)) return true;
            if (/[/\\]/.test(s)) return true;
            if (/\.html?$/i.test(s)) return true;
            if (/^index$/i.test(s)) return true;
            return false;
        }

        function sanitizeCwNavHref(raw) {
            const t = String(raw || '').trim();
            if (!t) return 'index.html';
            if (/^[a-z][a-z0-9+.-]*:/i.test(t) && !/^https?:\/\//i.test(t)) return 'index.html';
            if (/^https?:\/\//i.test(t)) return t;
            if (/^index$/i.test(t)) return 'index.html';
            if (/\.html?$/i.test(t)) return t;
            if (/[/\\]/.test(t)) return t;
            return t + '.html';
        }

        function defaultCwNavLabel(href) {
            const h = String(href || '').toLowerCase().split(/[?#]/)[0];
            if (h === 'index.html' || h.endsWith('/index.html')) return 'ZUM INDEX';
            return 'WEITER';
        }

        function parseCwSections(text) {
            const lines = String(text || '').replace(/^\uFEFF/, '').split(/\r\n|\n|\r/);
            const hashWithPt = /^\s*#\s*(\d+(?:\.\d+)?)\s*pt\b/i;
            const standalonePt = /^\s*(\d+(?:\.\d+)?)\s*pt\s*$/i;
            const sections = [];
            let current = [];
            let currentPt = null;

            function flush() {
                if (current.length > 0) {
                    sections.push(current);
                    current = [];
                }
            }

            for (const raw of lines) {
                const line = normalizeCwLine(raw);
                if (!line) continue;
                if (line.startsWith('//')) continue;

                if (line.startsWith('#')) {
                    const mHash = line.match(hashWithPt);
                    if (mHash) {
                        flush();
                        const v = parseFloat(mHash[1]);
                        currentPt = Number.isFinite(v) ? v : null;
                        continue;
                    }
                    flush();
                    currentPt = null;
                    continue;
                }

                const mPt = line.match(standalonePt);
                if (mPt) {
                    const v = parseFloat(mPt[1]);
                    currentPt = Number.isFinite(v) ? v : null;
                    continue;
                }

                if (/^%button\b/i.test(line)) {
                    const rest = line.replace(/^%button\s*/i, '').trim();
                    if (!rest) {
                        current.push({ kind: 'nav', href: 'index.html', label: 'ZUM INDEX' });
                        continue;
                    }
                    const parts = rest.split(/\s+/).filter(Boolean);
                    const first = parts[0];
                    let href;
                    let label;
                    if (parts.length === 1 && !isCwNavTargetToken(first)) {
                        href = 'index.html';
                        label = first;
                    } else {
                        href = sanitizeCwNavHref(first);
                        label = parts.length > 1 ? parts.slice(1).join(' ') : defaultCwNavLabel(href);
                    }
                    current.push({ kind: 'nav', href, label });
                    continue;
                }

                if (/^%stop\b/i.test(line)) {
                    current.push({ kind: 'stop-play-all' });
                    continue;
                }

                current.push({ text: line, fontSizePt: currentPt });
            }
            flush();
            return sections.filter((s) => s.length > 0);
        }

        function applyCwSequenceFromText(text) {
            const sections = parseCwSections(text);
            if (!sections.length) return;
            cwPlayAllActive = false;
            clearCwPlayAllTimer();
            stopCatchingWords();
            cwSections = sections;
            cwSectionIndex = 0;
            cwSequence = cwSections[0];
            startCatchingWords();
        }

        function readDroppedFiles(files, cb) {
            const list = Array.from(files || []);
            if (!list.length) {
                cb('');
                return;
            }
            const textLike = list.filter((f) => {
                const ct = (f.type || '').toLowerCase();
                return ct.startsWith('text/') || /\.(txt|csv|md|text)$/i.test(f.name || '');
            });
            const todo = (textLike.length ? textLike : list).slice(0, 16);
            let pending = todo.length;
            let merged = '';
            if (!pending) {
                cb('');
                return;
            }
            todo.forEach((file) => {
                const r = new FileReader();
                r.onload = () => {
                    const chunk = typeof r.result === 'string' ? r.result : '';
                    merged = merged ? merged + '\n' + chunk : chunk;
                    pending -= 1;
                    if (pending === 0) cb(merged);
                };
                r.onerror = () => {
                    pending -= 1;
                    if (pending === 0) cb(merged);
                };
                r.readAsText(file, 'UTF-8');
            });
        }

        const cwPanelEl = document.getElementById('catching-words-panel');
        if (cwPanelEl) {
            cwPanelEl.addEventListener('dragenter', (e) => {
                if (!document.body.classList.contains('mode-catching-words')) return;
                e.preventDefault();
                if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
                cwPanelEl.classList.add('cw-drag-over');
            });
            cwPanelEl.addEventListener('dragover', (e) => {
                if (!document.body.classList.contains('mode-catching-words')) return;
                e.preventDefault();
                if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
            });
            cwPanelEl.addEventListener('dragleave', (e) => {
                if (!cwPanelEl.contains(e.relatedTarget)) cwPanelEl.classList.remove('cw-drag-over');
            });
            cwPanelEl.addEventListener('drop', (e) => {
                e.preventDefault();
                cwPanelEl.classList.remove('cw-drag-over');
                if (!document.body.classList.contains('mode-catching-words')) return;
                const dt = e.dataTransfer;
                if (!dt) return;
                if (dt.files && dt.files.length) {
                    readDroppedFiles(dt.files, (text) => {
                        if (text) applyCwSequenceFromText(text);
                    });
                    return;
                }
                const plain = dt.getData('text/plain');
                if (plain) applyCwSequenceFromText(plain);
            });
        }

        document.addEventListener(
            'keydown',
            (e) => {
                if (!isCwTypingTarget(e.target)) {
                    const noChord = !e.metaKey && !e.ctrlKey && !e.altKey && !e.shiftKey;
                    if (noChord && (e.key === 'h' || e.key === 'H')) {
                        e.preventDefault();
                        nudgeBgVideoBrightness(true);
                        return;
                    }
                    if (noChord && (e.key === 'd' || e.key === 'D')) {
                        e.preventDefault();
                        nudgeBgVideoBrightness(false);
                        return;
                    }
                }
                if (document.body.classList.contains('mode-catching-words') && !isCwTypingTarget(e.target)) {
                    const goRight = e.code === 'ArrowRight' || e.key === 'ArrowRight';
                    const goLeft = e.code === 'ArrowLeft' || e.key === 'ArrowLeft';
                    if (goRight || goLeft) {
                        e.preventDefault();
                        stepCwSection(goRight ? 1 : -1);
                        return;
                    }
                    const goUp = e.code === 'ArrowUp' || e.key === 'ArrowUp';
                    const goDown = e.code === 'ArrowDown' || e.key === 'ArrowDown';
                    if (goUp || goDown) {
                        e.preventDefault();
                        nudgeCwMotion(goUp);
                        return;
                    }
                    if (
                        (e.key === 'd' || e.key === 'D') &&
                        e.metaKey &&
                        !e.ctrlKey &&
                        !e.altKey &&
                        !e.shiftKey
                    ) {
                        e.preventDefault();
                        toggleCwDebugHud();
                        return;
                    }
                    const cwNoMod = !e.metaKey && !e.ctrlKey && !e.altKey && !e.shiftKey;
                    if (cwNoMod && (e.key === 's' || e.key === 'S')) {
                        e.preventDefault();
                        beginCwPlayAllSections();
                        return;
                    }
                }
                if (e.key.toLowerCase() === 'f') toggleFullscreen();
                if (e.code === 'Space' || e.key === ' ') {
                    if (document.body.classList.contains('mode-catching-words')) {
                        e.preventDefault();
                        toggleCatchingWordsPause();
                        return;
                    }
                    return;
                }
            },
            { capture: true }
        );

        syncCwMotionVars();
        syncBgVideoBrightness();
        startCatchingWords();
    </script>
</body>
</html>
