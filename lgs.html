<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>docalvers | Safari-Rätsel</title>
    <style>
        :root { --primary: #FF9900; --secondary: #336600; --accent: #CC0000; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #fdf5e6; }
        canvas { display: block; cursor: move; }
        #ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); text-align: center; min-width: 420px;
            border: 2px solid var(--primary);
        }
        .stats { display: flex; justify-content: space-around; margin-top: 15px; font-size: 1.2rem; }
        .stat-item { padding: 10px; border-radius: 10px; background: #fff; min-width: 140px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        #success-msg {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--secondary); color: white; padding: 40px; border-radius: 30px;
            font-size: 2rem; font-weight: bold; text-align: center; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        button { margin-top: 10px; padding: 8px 20px; cursor: pointer; border: none; border-radius: 8px; background: #444; color: white; font-weight: bold; }
        button:hover { background: #000; }
    </style>
</head>
<body>

<div id="ui">
    <h2 style="margin:0; color: var(--secondary);">🦁 docalvers Safari-Check</h2>
    <p style="margin:5px 0; color: #444;">Im Camp sind: <b>20 Köpfe & 64 Beine</b></p>

    <div class="stats">
        <div class="stat-item" style="border-bottom: 5px solid var(--primary);">
            👤+🦁 Köpfe: <b id="heads">0</b>
        </div>
        <div class="stat-item" style="border-bottom: 5px solid var(--accent);">
            👣 Beine: <b id="legs">0</b>
        </div>
    </div>
    <p id="feedback" style="margin-top:10px; font-weight:bold; color: var(--secondary);"></p>
    <button onclick="location.href='index.html'">Zurück zum Labor</button>
</div>

<div id="success-msg">
    🦁 GEBRÜLL! 🦁<br>
    <span style="font-size: 1.4rem; font-weight: normal;">Rätsel gelöst: 12 Löwen & 8 Ranger!</span><br>
    <button onclick="location.reload()" style="background: white; color: var(--secondary); margin-top: 25px;">Nochmal spielen</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Ziel: 12 Löwen (4 Beine), 8 Ranger (2 Beine)
    // Köpfe: 12+8=20 | Beine: 12*4 + 8*2 = 48+16 = 64
    let nHead = 15, nLeg = 40;
    const targetHead = 20, targetLeg = 64;
    let scale = 25, drag = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        scale = Math.min(canvas.width, canvas.height) / 40;
        draw();
    }

    window.addEventListener('resize', resize);
    window.addEventListener('load', resize);

    canvas.addEventListener('mousedown', e => {
        const mx = (e.clientX - canvas.width/2)/scale;
        const my = (canvas.height/2 - e.clientY)/scale;
        if(Math.abs(my - (-mx + nHead)) < 1.5) drag = 1;
        else if(Math.abs(my - (-0.5*mx + nLeg/4)) < 1.5) drag = 2;
    });

    window.addEventListener('mousemove', e => {
        if(!drag) return;
        const mx = (e.clientX - canvas.width/2)/scale;
        const my = (canvas.height/2 - e.clientY)/scale;
        if(drag === 1) nHead = Math.round(my + mx);
        if(drag === 2) nLeg = Math.round((my + 0.5*mx)*4);
        draw();
    });

    window.addEventListener('mouseup', () => drag = 0);

    function draw() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        const cx = canvas.width/2, cy = canvas.height/2;

        // Sandiges Gitter
        ctx.strokeStyle = "#e5dcc5"; ctx.lineWidth = 1;
        for(let i=-50; i<=50; i+=5) {
            ctx.beginPath(); ctx.moveTo(0, cy - i*scale); ctx.lineTo(canvas.width, cy - i*scale); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + i*scale, 0); ctx.lineTo(cx + i*scale, canvas.height); ctx.stroke();
        }

        // Achsen (Safari-Stil)
        ctx.strokeStyle = "#5d4037"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();

        // Linien
        ctx.setLineDash([]);
        // Köpfe (Blau-Orange)
        ctx.strokeStyle = "#FF9900"; ctx.lineWidth = 6;
        ctx.beginPath(); ctx.moveTo(cx - 5*scale, cy - (5+nHead)*scale); ctx.lineTo(cx + 35*scale, cy - (-35+nHead)*scale); ctx.stroke();

        // Beine (Rot)
        ctx.strokeStyle = "#CC0000"; ctx.lineWidth = 6;
        ctx.beginPath(); ctx.moveTo(cx - 5*scale, cy - (2.5+nLeg/4)*scale); ctx.lineTo(cx + 35*scale, cy - (-17.5+nLeg/4)*scale); ctx.stroke();

        document.getElementById('heads').innerText = nHead;
        document.getElementById('legs').innerText = nLeg;

        // Feedback-Berechnung
        const loewen = (nLeg - 2 * nHead) / 2;
        const ranger = nHead - loewen;

        if(nHead === targetHead && nLeg === targetLeg) {
            document.getElementById('success-msg').style.display = 'block';
            ctx.fillStyle = "gold"; ctx.beginPath(); ctx.arc(cx + 12*scale, cy - 8*scale, 12, 0, Math.PI*2); ctx.fill();
        } else {
            if(Number.isInteger(loewen) && loewen >= 0 && ranger >= 0) {
                document.getElementById('feedback').innerText = `Das wären ${loewen} 🦁 und ${ranger} 👤`;
            } else {
                document.getElementById('feedback').innerText = "Kombination biologisch unmöglich! 😉";
            }
        }
    }
</script>
</body>
</html>
