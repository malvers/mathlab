<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | Lissajous</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="resources/favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <link rel="stylesheet" href="js/cyber-lab-overrides.css">
    <link rel="stylesheet" href="js/branding.styles.extracted.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
    <style>
        html { font-size: 100%; background-color: var(--space-bg, #050b18); }
        body { margin: 0; overflow: hidden; min-height: 100vh; }
        #main-content {
            flex: 1 1 0%;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at 50% 45%, rgba(0, 210, 255, 0.06) 0%, transparent 55%), var(--space-bg, #050b18);
        }
        #canvas-container {
            flex: 1 1 0%;
            width: 100%;
            min-height: 0;
            position: relative;
        }
        #canvas-container canvas { display: block; cursor: crosshair; }

        /* Formelbox: Rand immer blau · Hauptformeln orange · Parameter cyan */
        .lissajous-overlay-formula {
            position: absolute;
            left: 14px;
            top: 14px;
            max-width: min(94vw, 620px);
            pointer-events: none;
            z-index: 6;
        }
        .lissajous-formula-box {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0;
            padding: 0.28rem 1.05rem 0.4rem;
            box-sizing: border-box;
            background: rgba(8, 15, 32, 0.88);
            border-radius: 12px;
            border: 1px solid rgba(100, 190, 255, 0.5);
            box-shadow: 0 0 22px rgba(80, 170, 255, 0.2);
        }
        .lissajous-formula-params {
            width: 100%;
            margin: 0;
            padding: 0.18rem 0 0;
            border-top: 1px solid rgba(100, 190, 255, 0.28);
        }
        /* KaTeX display: weniger Luft oben/unten */
        #canvas-container .lissajous-formula-box .katex-display {
            margin: 0 !important;
        }
        #canvas-container #lissajous-formula-tex .katex {
            font-size: 1.08em !important;
            color: #ffb070 !important;
            text-shadow: 0 0 14px rgba(255, 157, 80, 0.28);
            line-height: 1.12 !important;
        }
        #canvas-container #lissajous-formula-params .katex {
            font-size: 0.92em !important;
            color: #9ae8ff !important;
            letter-spacing: 0.03em;
            line-height: 1.15 !important;
        }
        #ui-container { overflow-y: auto; max-height: calc(100vh - 90px); }

        /* Slider kompakt (Y): margin ui.js 8→2; range-Padding 10→4 (cyber-layout) */
        #ui-container .instrument-card .card-content {
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }
        #ui-container .instrument-title {
            margin-bottom: 0 !important;
            padding-bottom: 1px !important;
            font-size: 0.78rem !important;
        }
        #ui-container .cyber-control-group {
            margin-bottom: 0 !important;
            gap: 0 !important;
        }
        #ui-container .cyber-control-group .control-header {
            margin-bottom: 0 !important;
            line-height: 1.05 !important;
        }
        #ui-container .cyber-label {
            font-size: 0.78rem !important;
        }
        #ui-container .val-display {
            font-size: 0.78rem !important;
        }
        #ui-container .cyber-slider {
            margin-top: 0 !important;
            margin-bottom: 2px !important; /* ui.js: 8px → 2px = −6 px unter dem Track */
        }
        /* CyberUI injectStyles lädt nach diesem Block — Padding + gezieltes Überschneiden wirkt sicher sichtbar */
        #ui-container input[type="range"].cyber-slider {
            padding-top: 2px !important;
            padding-bottom: 2px !important;
        }
        #ui-container [id^='grp-'] .cyber-control-group + .cyber-control-group {
            margin-top: -6px !important;
        }
        #ui-container .card-content > #grp-amp + #grp-freq,
        #ui-container .card-content > #grp-freq + #grp-phase,
        #ui-container .card-content > #grp-phase + #grp-span,
        #ui-container .card-content > #grp-span + #grp-color,
        #ui-container .card-content > #grp-color + #grp-actions {
            margin-top: -6px !important;
        }
        #ui-container #grp-actions {
            margin-top: 12px !important;
            display: flex !important;
            gap: 8px !important;
            flex-wrap: wrap !important;
        }
        #ui-container #btn-reset-view,
        #ui-container #btn-animate {
            flex: 1;
            min-width: 120px;
            padding: 9px 12px !important;
            font-family: Orbitron, sans-serif;
            font-size: 0.8rem;
            border-radius: 10px;
            cursor: pointer;
            background: rgba(18, 28, 48, 0.85);
        }
        #ui-container #btn-animate {
            border: 1px solid rgba(255, 154, 92, 0.5) !important;
            color: #ffe8d8;
        }
        #ui-container #btn-animate.is-active {
            border-color: rgba(255, 170, 90, 0.95) !important;
            box-shadow: 0 0 14px rgba(255, 130, 60, 0.35);
            color: #fff5e8;
        }
        #ui-container #btn-animate:hover {
            border-color: rgba(255, 190, 120, 0.85) !important;
        }
        #ui-container #btn-reset-view {
            border: 1px solid rgba(100, 190, 255, 0.55) !important;
            color: #d6f2ff;
        }
        #ui-container #btn-reset-view:hover {
            border-color: rgba(130, 210, 255, 0.85) !important;
            box-shadow: 0 0 12px rgba(80, 170, 255, 0.25);
        }
    </style>
</head>
<body>
    <nav id="mini-rail">
        <div class="nav-btn" onclick="toggleSidebar()" title="Menü umschalten">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
    </nav>

    <aside id="side-panel">
        <header id="sidebar-header" style="min-height: 80px;"></header>
        <div id="ui-container"></div>
    </aside>

    <main id="main-content">
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
            <div class="lissajous-overlay-formula" aria-live="polite">
                <div class="lissajous-formula-box">
                    <div id="lissajous-formula-tex"></div>
                    <div id="lissajous-formula-params" class="lissajous-formula-params"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/cyber-canvas.js"></script>
    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
    <script>
        function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
            setTimeout(() => window.dispatchEvent(new Event('resize')), 400);
        }

        function gcd(a, b) {
            a = Math.abs(Math.round(a)); b = Math.abs(Math.round(b));
            if (!b) return a || 1;
            return gcd(b, a % b);
        }
        function lcm(a, b) {
            return Math.abs(a * b) / gcd(a, b);
        }
        /** Eine geschlossene Bahn für ganzzahlige Kreisfrequenzen ωx, ωy */
        function closurePeriodT(wx, wy) {
            wx = Math.max(1, Math.round(Math.abs(wx)));
            wy = Math.max(1, Math.round(Math.abs(wy)));
            const g = gcd(wx, wy);
            const px = wx / g;
            const py = wy / g;
            return (2 * Math.PI * lcm(px, py)) / (px * py);
        }

        const state = {
            A: 2,
            B: 2,
            wx: 3,
            wy: 4,
            deltaDeg: 0,
            cycles: 1,
            animate: false,
            curveHue: 28
        };

        let animRaf = null;
        /** Anteil [0,1] des Pfads sichtbar; bei RESET 0 = keine Kurve */
        let traceProgress = 1;
        let lastTraceTs = 0;
        /** Dauer eines vollen Durchlaufs t=0…span (ms); danach bleibt die Kurve voll sichtbar */
        const TRACE_LOOP_MS = 3600;

        /** Phase δ nur aus dem Slider — keine Zeitabhängigkeit, sonst dreht sich die ganze Figur in der Ebene */
        function phaseRad() {
            return (state.deltaDeg * Math.PI) / 180;
        }

        function tickAnim() {
            if (!state.animate) return;
            const now = performance.now();
            const dt = Math.min(120, now - lastTraceTs);
            lastTraceTs = now;
            traceProgress += dt / TRACE_LOOP_MS;
            if (traceProgress >= 1) {
                traceProgress = 1;
                draw();
                animRaf = null;
                return;
            }
            draw();
            animRaf = requestAnimationFrame(tickAnim);
        }

        function stopAnim() {
            if (animRaf) cancelAnimationFrame(animRaf);
            animRaf = null;
        }

        function startAnimLoop() {
            stopAnim();
            if (!state.animate) return;
            traceProgress = 0;
            lastTraceTs = performance.now();
            animRaf = requestAnimationFrame(tickAnim);
        }

        function syncAnimateButton() {
            const b = document.getElementById('btn-animate');
            if (!b) return;
            b.textContent = state.animate ? 'STOPP' : 'ANIMIEREN';
            b.classList.toggle('is-active', state.animate);
        }

        /** Nach RESET ohne Animation: Slider wieder volle Kurve */
        function touchParameterWhileIdle() {
            if (!state.animate) traceProgress = 1;
        }

        function applyResetCurveAndView() {
            CyberCanvasInstance.resetView(-3.2, 3.2);
            state.animate = false;
            stopAnim();
            traceProgress = 0;
            draw();
            syncAnimateButton();
        }

        function draw() {
            const CC = CyberCanvasInstance;
            CC.drawGrid({ vignette: true, glow: true });
            const ctx = CC.ctx;

            const wx = state.wx;
            const wy = state.wy;
            const T0 = closurePeriodT(wx, wy);
            const span = T0 * Math.max(0.25, state.cycles);
            const steps = Math.min(16000, Math.max(400, Math.ceil(span * 120)));

            const delta = phaseRad();

            const endFrac = traceProgress;
            const maxIndex = Math.min(steps, Math.max(0, Math.round(endFrac * steps)));

            ctx.strokeStyle = `hsla(${state.curveHue}, 95%, 58%, 0.92)`;
            ctx.lineWidth = 2;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.shadowBlur = 14;
            ctx.shadowColor = `hsla(${state.curveHue}, 100%, 45%, 0.55)`;

            ctx.beginPath();
            for (let i = 0; i <= maxIndex; i++) {
                const t = (i / steps) * span;
                const x = state.A * Math.sin(wx * t + delta);
                const y = state.B * Math.sin(wy * t);
                const sx = CC.mapX(x);
                const sy = CC.mapY(y);
                if (i === 0) ctx.moveTo(sx, sy);
                else ctx.lineTo(sx, sy);
            }
            if (maxIndex >= 1) ctx.stroke();
            ctx.shadowBlur = 0;

            updateFormulaStrip(wx, wy, delta);
        }

        function updateFormulaStrip(wx, wy, delta) {
            const elTex = document.getElementById('lissajous-formula-tex');
            const elPar = document.getElementById('lissajous-formula-params');
            if (!elTex || !elPar) return;

            const deg = ((delta * 180) / Math.PI % 360 + 360) % 360;
            const T0 = closurePeriodT(wx, wy);

            /* Kein [t] nach aligned — sonst kann KaTeX „[t]“ als Text ausgeben, wenn kein Leerzeichen folgt */
            const texMain =
                '\\begin{aligned}' +
                'x(t) &= A\\sin(\\omega_{x} t+\\delta)\\\\' +
                'y(t) &= B\\sin(\\omega_{y} t)' +
                '\\end{aligned}';

            const AD = state.A.toFixed(2).replace('.', '{,}');
            const BD = state.B.toFixed(2).replace('.', '{,}');
            const T0s = T0.toFixed(3).replace('.', '{,}');
            /* Zeile 1: drei Parameter (A, B, ωₓ) · Zeile 2: ωᵧ, δ, T₀ */
            const texParams =
                '\\begin{aligned}' +
                '&A=' + AD + ',\\quad B=' + BD + ',\\quad \\omega_{x}=' + wx + '\\\\' +
                '&\\omega_{y}=' + wy + ',\\quad \\delta \\approx ' + deg.toFixed(0) + '^{\\circ},\\quad T_{0} \\approx ' + T0s +
                '\\end{aligned}';

            if (window.katex) {
                try {
                    katex.render(texMain, elTex, { throwOnError: false, displayMode: true });
                    katex.render(texParams, elPar, { throwOnError: false, displayMode: true });
                } catch (e) {
                    elTex.textContent = 'x(t)=A·sin(ωₓt+δ), y(t)=B·sin(ωᵧt)';
                    elPar.innerHTML =
                        `A=${state.A.toFixed(2)}, B=${state.B.toFixed(2)}, ωₓ=${wx}<br>` +
                        `ωᵧ=${wy}, δ≈${deg.toFixed(0)}°, T₀≈${T0.toFixed(3)}`;
                }
            } else {
                elTex.textContent = 'x(t)=A·sin(ωₓt+δ), y(t)=B·sin(ωᵧt)';
                elPar.innerHTML =
                    `A=${state.A.toFixed(2)}, B=${state.B.toFixed(2)}, ωₓ=${wx}<br>` +
                    `ωᵧ=${wy}, δ≈${deg.toFixed(0)}°, T₀≈${T0.toFixed(3)}`;
            }
        }

        window.addEventListener('load', () => {
            CyberBranding.init({
                useExternalStyles: true,
                title: 'Doc Alvers Mathe-Labor',
                subtitle: 'LISSAJOUS · PARAMETRISCHE KURVEN'
            });
            CyberBranding.setBriefing(`
                <div style="font-size:0.88rem;line-height:1.45;color:rgba(255,255,255,0.85);">
                    <h3 style="color:#ff9a5c;font-family:Orbitron,sans-serif;margin:0 0 10px 0;font-size:0.95rem;">LISSAJOUS-FIGUREN</h3>
                    Überlagerung zweier harmonischer Schwingungen senkrecht zueinander:
                    <strong style="font-family:Orbitron,sans-serif;color:#7fdcff;">x=A sin(ω<sub>x</sub>t+δ)</strong>,
                    <strong style="font-family:Orbitron,sans-serif;color:#ff9a5c;">y=B sin(ω<sub>y</sub>t)</strong>.
                    Verhältnis <strong>ω<sub>x</sub>:ω<sub>y</sub></strong> und Phase <strong>δ</strong> bestimmen die Form.
                    <div class="admin-info" style="margin-top:12px;">
                        <h4 style="color:#00d2ff;font-family:Orbitron,sans-serif;font-size:0.78rem;margin:0 0 6px 0;">BEDIENTEIL</h4>
                        <ul style="margin:0;padding-left:18px;font-size:0.82rem;opacity:0.92;">
                            <li><b>Pfad-Umfang:</b> Vielfaches einer geschlossenen Periode <code>T₀</code> (bei ganzzahligen ω).</li>
                            <li><b>Pan / Zoom:</b> Maus ziehen · Mausrad · Shift+Rad zoomt zur Bildmitte.</li>
                            <li><b>Animation:</b> ANIMIEREN zeichnet die Kurve einmal entlang <code>t</code>; danach bleibt sie stehen. Erneut ANIMIEREN startet von vorn.</li>
                        </ul>
                    </div>
                </div>
            `);
            CyberUI.init();

            CyberUI.createCard('ui-container', 'PARAMETER', `
                <div id="grp-amp"></div>
                <div id="grp-freq"></div>
                <div id="grp-phase"></div>
                <div id="grp-span"></div>
                <div id="grp-color"></div>
                <div id="grp-actions">
                    <button type="button" id="btn-animate" title="Phase δ(t) und Pfad — ein/aus">ANIMIEREN</button>
                    <button type="button" id="btn-reset-view" title="Ansicht und Zoom zurücksetzen">RESET</button>
                </div>
            `, '#00d2ff');

            CyberUI.createSlider('grp-amp', 'Amplitude A', 0.4, 2.6, state.A, 0.05, (v) => {
                state.A = v;
                touchParameterWhileIdle();
                draw();
            }, '#ff9a5c');
            CyberUI.createSlider('grp-amp', 'Amplitude B', 0.4, 2.6, state.B, 0.05, (v) => {
                state.B = v;
                touchParameterWhileIdle();
                draw();
            }, '#7fdcff');

            CyberUI.createSlider('grp-freq', 'ωₓ (Kreisfrequenz)', 1, 16, state.wx, 1, (v) => {
                state.wx = Math.round(v);
                touchParameterWhileIdle();
                draw();
            }, '#ff9a5c');
            CyberUI.createSlider('grp-freq', 'ωᵧ (Kreisfrequenz)', 1, 16, state.wy, 1, (v) => {
                state.wy = Math.round(v);
                touchParameterWhileIdle();
                draw();
            }, '#7fdcff');

            CyberUI.createSlider('grp-phase', 'Phase δ (Grad)', 0, 359, state.deltaDeg, 1, (v) => {
                state.deltaDeg = Math.round(v);
                touchParameterWhileIdle();
                draw();
            }, '#00d2ff');

            CyberUI.createSlider('grp-span', 'Pfad-Umfang (× Perioden)', 0.25, 6, state.cycles, 0.05, (v) => {
                state.cycles = v;
                touchParameterWhileIdle();
                draw();
            }, '#00d2ff');

            CyberUI.createSlider('grp-color', 'Kurvenfarbe (Hue)', 0, 330, state.curveHue, 1, (v) => {
                state.curveHue = Math.round(v);
                touchParameterWhileIdle();
                draw();
            }, '#ffb070');

            document.getElementById('btn-animate').addEventListener('click', () => {
                state.animate = !state.animate;
                if (state.animate) startAnimLoop();
                else {
                    stopAnim();
                    traceProgress = 1;
                    draw();
                }
                syncAnimateButton();
            });

            document.getElementById('btn-reset-view').addEventListener('click', () => applyResetCurveAndView());

            syncAnimateButton();

            CyberCanvasInstance.init('main-canvas', {
                minY: -3.2,
                maxY: 3.2
            }, {
                showLabels: true,
                showTelemetry: false,
                showGrid: true
            });
            CyberCanvasInstance.resetView(-3.2, 3.2);
            CyberCanvasInstance.onResize = () => draw();

            CyberCanvasInstance.onContextMenu = (e) => {
                CyberUI.showContextMenu(e.clientX, e.clientY, [
                    {
                        label: 'RESET',
                        onclick: () => applyResetCurveAndView()
                    },
                    { divider: true },
                    {
                        label: 'Achsen',
                        checked: CyberCanvasInstance.showAxes,
                        onchange: (v) => { CyberCanvasInstance.showAxes = v; draw(); }
                    },
                    {
                        label: 'Gitternetz',
                        checked: CyberCanvasInstance.showGrid,
                        onchange: (v) => { CyberCanvasInstance.showGrid = v; draw(); }
                    },
                    {
                        label: 'Achsenbeschriftung',
                        checked: CyberCanvasInstance.showLabels,
                        onchange: (v) => { CyberCanvasInstance.showLabels = v; draw(); }
                    }
                ]);
            };

            draw();
        });
    </script>
</body>
</html>
