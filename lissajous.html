<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | Lissajous</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="resources/favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <link rel="stylesheet" href="js/cyber-lab-overrides.css">
    <link rel="stylesheet" href="js/branding.styles.extracted.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
    <style>
        html { font-size: 100%; background-color: var(--space-bg, #050b18); }
        body { margin: 0; overflow: hidden; min-height: 100vh; }
        #main-content {
            flex: 1 1 0%;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            background: radial-gradient(circle at 50% 45%, rgba(0, 210, 255, 0.06) 0%, transparent 55%), var(--space-bg, #050b18);
        }
        #canvas-container {
            flex: 1 1 0%;
            width: 100%;
            min-height: 0;
            position: relative;
        }
        #canvas-container canvas { display: block; cursor: crosshair; }
        #canvas-container.canvas-mode-pendulum canvas {
            cursor: grab;
        }
        #canvas-container.canvas-mode-pendulum canvas:active {
            cursor: grabbing;
        }

        #grp-view.lissajous-view-row {
            display: flex !important;
            gap: 8px !important;
            flex-wrap: wrap !important;
            margin-bottom: 6px !important;
        }
        #grp-view .lissajous-view-btn {
            flex: 1;
            min-width: 118px;
            padding: 8px 10px !important;
            font-family: Orbitron, sans-serif;
            font-size: 0.72rem;
            border-radius: 10px;
            cursor: pointer;
            background: rgba(18, 28, 48, 0.85);
            border: 1px solid rgba(100, 190, 255, 0.35) !important;
            color: #c8e8ff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #grp-view .lissajous-view-btn:hover {
            border-color: rgba(130, 210, 255, 0.55) !important;
        }
        #grp-view .lissajous-view-btn.is-active {
            border-color: rgba(0, 210, 255, 0.85) !important;
            box-shadow: 0 0 12px rgba(0, 210, 255, 0.25);
            color: #e8fbff;
        }

        /* Formelbox: Rand immer blau · Hauptformeln orange · Parameter cyan */
        .lissajous-overlay-formula {
            position: absolute;
            left: 14px;
            top: var(--cyber-nav-band-top, 14px);
            max-width: min(94vw, 620px);
            pointer-events: none;
            z-index: 6;
        }
        .lissajous-formula-box {
            display: inline-flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0;
            padding: 0.28rem 1.05rem 0.4rem;
            box-sizing: border-box;
            background: rgba(8, 15, 32, 0.88);
            border-radius: 12px;
            border: 1px solid rgba(100, 190, 255, 0.5);
            box-shadow: 0 0 22px rgba(80, 170, 255, 0.2);
        }
        .lissajous-formula-params {
            width: 100%;
            margin: 0;
            padding: 0.18rem 0 0;
            border-top: 1px solid rgba(100, 190, 255, 0.28);
            box-sizing: border-box;
        }
        /* KaTeX display: weniger Luft oben/unten */
        #canvas-container .lissajous-formula-box .katex-display {
            margin: 0 !important;
        }
        #canvas-container #lissajous-formula-tex .katex {
            font-size: 1.08em !important;
            color: #ffb070 !important;
            text-shadow: 0 0 14px rgba(255, 157, 80, 0.28);
            line-height: 1.12 !important;
        }
        #canvas-container #lissajous-formula-params .katex {
            font-size: 0.92em !important;
            color: #9ae8ff !important;
            letter-spacing: 0.03em;
            line-height: 1.15 !important;
        }
        #ui-container { overflow-y: auto; max-height: calc(100vh - 90px); }

        /* Slider kompakt (Y): margin ui.js 8→2; range-Padding 10→4 (cyber-layout) */
        #ui-container .instrument-card .card-content {
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }
        #ui-container .instrument-title {
            margin-bottom: 0 !important;
            padding-bottom: 1px !important;
            font-size: 0.78rem !important;
        }
        #ui-container .cyber-control-group {
            margin-bottom: 0 !important;
            gap: 0 !important;
        }
        #ui-container .cyber-control-group .control-header {
            margin-bottom: 0 !important;
            line-height: 1.05 !important;
        }
        #ui-container .cyber-label {
            font-size: 0.78rem !important;
        }
        #ui-container .val-display {
            font-size: 0.78rem !important;
        }
        #ui-container .cyber-slider {
            margin-top: 0 !important;
            margin-bottom: 2px !important; /* ui.js: 8px → 2px = −6 px unter dem Track */
        }
        /* CyberUI injectStyles lädt nach diesem Block — Padding + gezieltes Überschneiden wirkt sicher sichtbar */
        #ui-container input[type="range"].cyber-slider {
            padding-top: 2px !important;
            padding-bottom: 2px !important;
        }
        #ui-container [id^='grp-'] .cyber-control-group + .cyber-control-group {
            margin-top: -6px !important;
        }
        #ui-container .card-content > #grp-amp + #grp-freq,
        #ui-container .card-content > #grp-freq + #grp-phase,
        #ui-container .card-content > #grp-phase + #grp-span,
        #ui-container .card-content > #grp-span + #grp-color,
        #ui-container .card-content > #grp-color + #grp-actions {
            margin-top: -6px !important;
        }
        #ui-container #grp-actions {
            margin-top: 12px !important;
            display: flex !important;
            gap: 8px !important;
            flex-wrap: wrap !important;
        }
        #ui-container #btn-reset-view,
        #ui-container #btn-animate {
            flex: 1;
            min-width: 120px;
            padding: 9px 12px !important;
            font-family: Orbitron, sans-serif;
            font-size: 0.8rem;
            border-radius: 10px;
            cursor: pointer;
            background: rgba(18, 28, 48, 0.85);
        }
        #ui-container #btn-animate {
            border: 1px solid rgba(255, 215, 0, 0.55) !important;
            color: #fff8e4;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.12);
        }
        #ui-container #btn-animate.is-active {
            border-color: rgba(255, 224, 80, 0.95) !important;
            box-shadow: 0 0 16px rgba(255, 215, 0, 0.4);
            color: #fffef6;
        }
        #ui-container #btn-animate:hover {
            border-color: rgba(255, 230, 120, 0.95) !important;
            box-shadow: 0 0 14px rgba(255, 215, 0, 0.28);
        }
        #ui-container #btn-reset-view {
            border: 1px solid rgba(100, 190, 255, 0.55) !important;
            color: #d6f2ff;
        }
        #ui-container #btn-reset-view:hover {
            border-color: rgba(130, 210, 255, 0.85) !important;
            box-shadow: 0 0 12px rgba(80, 170, 255, 0.25);
        }
    </style>
</head>
<body>
    <nav id="mini-rail">
        <div class="nav-btn" onclick="toggleSidebar()" title="Menü umschalten">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
    </nav>

    <aside id="side-panel">
        <header id="sidebar-header" style="min-height: 80px;"></header>
        <div id="ui-container"></div>
    </aside>

    <main id="main-content">
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
            <div class="lissajous-overlay-formula" aria-live="polite">
                <div class="lissajous-formula-box">
                    <div id="lissajous-formula-tex"></div>
                    <div id="lissajous-formula-params" class="lissajous-formula-params"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/cyber-canvas.js"></script>
    <script src="js/branding/briefings.js?v=539"></script>
    <script src="js/branding/overlays.js?v=539"></script>
    <script src="js/i18n.js"></script>
    <script src="js/branding.js?v=539"></script>
    <script src="js/ui.js?v=539"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
    <script>
        function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
            setTimeout(() => window.dispatchEvent(new Event('resize')), 400);
        }

        function gcd(a, b) {
            a = Math.abs(Math.round(a)); b = Math.abs(Math.round(b));
            if (!b) return a || 1;
            return gcd(b, a % b);
        }
        function lcm(a, b) {
            return Math.abs(a * b) / gcd(a, b);
        }
        /** Eine geschlossene Bahn für ganzzahlige Kreisfrequenzen ωx, ωy */
        function closurePeriodT(wx, wy) {
            wx = Math.max(1, Math.round(Math.abs(wx)));
            wy = Math.max(1, Math.round(Math.abs(wy)));
            const g = gcd(wx, wy);
            const px = wx / g;
            const py = wy / g;
            return (2 * Math.PI * lcm(px, py)) / (px * py);
        }

        const state = {
            A: 2,
            B: 2,
            wx: 3,
            wy: 4,
            deltaDeg: 0,
            cycles: 1,
            animate: false,
            curveHue: 28,
            /** Standard: 3D-Pendel-Ansicht · Umschalten zu 2D Kurve möglich */
            viewMode: 'pendulum3d',
            camYaw: 0.58,
            camPitch: 0.42,
            draggingCam: false,
            lastCamDrag: { x: 0, y: 0 }
        };

        let animRaf = null;
        /** Anteil [0,1] des Pfads sichtbar; bei RESET 0 = keine Kurve */
        let traceProgress = 1;
        let lastTraceTs = 0;
        /** Dauer eines Umlaufs t=0…span im Animationszyklus (ms); läuft endlos weiter bis STOPP */
        const TRACE_LOOP_MS = 3600;

        /** Phase δ nur aus dem Slider — keine Zeitabhängigkeit, sonst dreht sich die ganze Figur in der Ebene */
        function phaseRad() {
            return (state.deltaDeg * Math.PI) / 180;
        }

        function tickAnim() {
            if (!state.animate) return;
            const now = performance.now();
            const dt = Math.min(120, now - lastTraceTs);
            lastTraceTs = now;
            traceProgress += dt / TRACE_LOOP_MS;
            while (traceProgress >= 1) traceProgress -= 1;
            draw();
            animRaf = requestAnimationFrame(tickAnim);
        }

        function stopAnim() {
            if (animRaf) cancelAnimationFrame(animRaf);
            animRaf = null;
        }

        function startAnimLoop() {
            stopAnim();
            if (!state.animate) return;
            traceProgress = 0;
            lastTraceTs = performance.now();
            animRaf = requestAnimationFrame(tickAnim);
        }

        function syncAnimateButton() {
            const b = document.getElementById('btn-animate');
            if (!b) return;
            b.textContent = state.animate ? CyberI18n.get('lissajous.stop') : CyberI18n.get('lissajous.simulation');
            b.classList.toggle('is-active', state.animate);
        }

        /** Nach RESET ohne Animation: Slider wieder volle Kurve */
        function touchParameterWhileIdle() {
            if (!state.animate) traceProgress = 1;
        }

        function applyResetCurveAndView() {
            CyberCanvasInstance.resetView(-3.2, 3.2);
            state.camYaw = 0.58;
            state.camPitch = 0.42;
            state.animate = false;
            stopAnim();
            traceProgress = 0;
            draw();
            syncAnimateButton();
        }

        /** Welt x rechts, y nach oben, z zur Tiefe — Bildschirm nach Rotation */
        function rotateCam(px, py, pz) {
            const yaw = state.camYaw;
            const pit = state.camPitch;
            const cy = Math.cos(yaw);
            const sy = Math.sin(yaw);
            const cp = Math.cos(pit);
            const sp = Math.sin(pit);
            let x = px;
            let y = py;
            let z = pz;
            const x1 = cy * x + sy * z;
            const z1 = -sy * x + cy * z;
            const y1 = y;
            const y2 = cp * y1 - sp * z1;
            const z2 = sp * y1 + cp * z1;
            return { x: x1, y: y2, z: z2 };
        }

        /** Zentralprojektion: Kamera im Ursprung blickt in +z-Richtung der gedrehten Szene; depth = camDist − rz */
        function projectPerspective(rx, ry, rz, cx, cy, focalLength, camDist) {
            const depth = camDist - rz;
            if (depth <= 0.085) return null;
            const inv = focalLength / depth;
            return { sx: cx + rx * inv, sy: cy - ry * inv, depth };
        }

        function applyCanvasModeUi() {
            const wrap = document.getElementById('canvas-container');
            const curveBtn = document.getElementById('btn-view-curve');
            const pendBtn = document.getElementById('btn-view-pendulum');
            if (wrap) {
                wrap.classList.toggle('canvas-mode-pendulum', state.viewMode === 'pendulum3d');
            }
            if (curveBtn) curveBtn.classList.toggle('is-active', state.viewMode === 'curve2d');
            if (pendBtn) pendBtn.classList.toggle('is-active', state.viewMode === 'pendulum3d');
            if (CyberCanvasInstance.canvas) {
                CyberCanvasInstance.canvas.style.cursor =
                    state.viewMode === 'pendulum3d' ? 'grab' : 'crosshair';
            }
            if (typeof CyberCanvasInstance.allowPan === 'boolean') {
                CyberCanvasInstance.allowPan = state.viewMode === 'curve2d';
                CyberCanvasInstance.allowZoom = state.viewMode === 'curve2d';
            }
        }

        function setViewMode(mode) {
            if (mode !== 'curve2d' && mode !== 'pendulum3d') return;
            state.viewMode = mode;
            state.draggingCam = false;
            applyCanvasModeUi();
            draw();
        }

        function drawCurve2d(CC) {
            CC.drawGrid({ vignette: true, glow: true });
            const ctx = CC.ctx;

            const wx = state.wx;
            const wy = state.wy;
            const T0 = closurePeriodT(wx, wy);
            const span = T0 * Math.max(0.25, state.cycles);
            const steps = Math.min(16000, Math.max(400, Math.ceil(span * 120)));

            const delta = phaseRad();

            const endFrac = traceProgress;
            const maxIndex = Math.min(steps, Math.max(0, Math.round(endFrac * steps)));

            ctx.strokeStyle = `hsla(${state.curveHue}, 95%, 58%, 0.92)`;
            ctx.lineWidth = 2;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.shadowBlur = 14;
            ctx.shadowColor = `hsla(${state.curveHue}, 100%, 45%, 0.55)`;

            ctx.beginPath();
            for (let i = 0; i <= maxIndex; i++) {
                const t = (i / steps) * span;
                const x = state.A * Math.sin(wx * t + delta);
                const y = state.B * Math.sin(wy * t);
                const sx = CC.mapX(x);
                const sy = CC.mapY(y);
                if (i === 0) ctx.moveTo(sx, sy);
                else ctx.lineTo(sx, sy);
            }
            if (maxIndex >= 1) ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawPendulum3d(CC) {
            const ctx = CC.ctx;
            const w = CC.width;
            const h = CC.height;
            const dpr = CC.dpr || 1;

            ctx.save();
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, w, h);

            const gr = ctx.createRadialGradient(w * 0.5, h * 0.42, 0, w * 0.5, h * 0.45, Math.max(w, h) * 0.65);
            gr.addColorStop(0, 'rgba(12, 28, 48, 0.85)');
            gr.addColorStop(1, 'rgba(5, 10, 20, 1)');
            ctx.fillStyle = gr;
            ctx.fillRect(0, 0, w, h);

            const wx = state.wx;
            const wy = state.wy;
            const delta = phaseRad();
            const T0 = closurePeriodT(wx, wy);
            const span = T0 * Math.max(0.25, state.cycles);
            const steps = Math.min(9000, Math.max(320, Math.ceil(span * 90)));
            const endFrac = traceProgress;
            const maxIndex = Math.min(steps, Math.max(0, Math.round(endFrac * steps)));

            const cx = w * 0.5;
            const cy = h * 0.46;
            const extent = Math.max(state.A, state.B, 1);
            /** Brennweite · höher = größere Bildwirkung; camDist näher = Zoom (bei weiter rz noch Clip-Schutz) */
            const focal = Math.min(w, h) * 0.82;
            const camDist = 8.2 + extent * 0.28;

            /** Aufhängung über der xz-Ebene; Kugel in der Ebene y=0 — Analog zur Überlagerung */
            const PY = 3.65;

            function toScreen(px0, py0, pz0) {
                const r = rotateCam(px0, py0, pz0);
                return projectPerspective(r.x, r.y, r.z, cx, cy, focal, camDist);
            }

            ctx.strokeStyle = 'rgba(100, 190, 255, 0.22)';
            ctx.lineWidth = 1;
            const gridR = Math.ceil(extent + 1);
            for (let g = -gridR; g <= gridR; g++) {
                let p1 = toScreen(g, 0, -gridR);
                let p2 = toScreen(g, 0, gridR);
                if (p1 && p2) {
                    ctx.beginPath();
                    ctx.moveTo(p1.sx, p1.sy);
                    ctx.lineTo(p2.sx, p2.sy);
                    ctx.stroke();
                }
                p1 = toScreen(-gridR, 0, g);
                p2 = toScreen(gridR, 0, g);
                if (p1 && p2) {
                    ctx.beginPath();
                    ctx.moveTo(p1.sx, p1.sy);
                    ctx.lineTo(p2.sx, p2.sy);
                    ctx.stroke();
                }
            }

            ctx.strokeStyle = `hsla(${state.curveHue}, 75%, 52%, 0.55)`;
            ctx.lineWidth = 2;
            ctx.shadowBlur = 8;
            ctx.shadowColor = `hsla(${state.curveHue}, 90%, 45%, 0.35)`;
            ctx.beginPath();
            let pen = false;
            for (let i = 0; i <= maxIndex; i++) {
                const t = (i / steps) * span;
                const xm = state.A * Math.sin(wx * t + delta);
                const zm = state.B * Math.sin(wy * t);
                const p = toScreen(xm, 0, zm);
                if (!p) {
                    pen = false;
                    continue;
                }
                if (!pen) {
                    ctx.moveTo(p.sx, p.sy);
                    pen = true;
                } else ctx.lineTo(p.sx, p.sy);
            }
            if (maxIndex >= 1 && pen) ctx.stroke();
            ctx.shadowBlur = 0;

            const tBob = (maxIndex / Math.max(1, steps)) * span;
            const bx = state.A * Math.sin(wx * tBob + delta);
            const bz = state.B * Math.sin(wy * tBob);
            const bob = toScreen(bx, 0, bz);
            const pivot = toScreen(0, PY, 0);

            ctx.strokeStyle = 'rgba(220, 235, 255, 0.75)';
            ctx.lineWidth = 2;
            if (pivot && bob) {
                ctx.beginPath();
                ctx.moveTo(pivot.sx, pivot.sy);
                ctx.lineTo(bob.sx, bob.sy);
                ctx.stroke();
            }

            ctx.strokeStyle = 'rgba(100, 190, 255, 0.65)';
            ctx.fillStyle = 'rgba(100, 190, 255, 0.95)';
            ctx.lineWidth = 2;
            if (pivot) {
                const rpiv = Math.max(4, Math.min(10, (focal / pivot.depth) * 0.09));
                ctx.beginPath();
                ctx.arc(pivot.sx, pivot.sy, rpiv, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }

            if (bob) {
                const rbob = Math.max(7, Math.min(20, (focal / bob.depth) * 0.16));
                const rg = ctx.createRadialGradient(bob.sx - rbob * 0.25, bob.sy - rbob * 0.25, 1, bob.sx, bob.sy, rbob * 1.15);
                rg.addColorStop(0, `hsla(${state.curveHue}, 95%, 62%, 1)`);
                rg.addColorStop(1, `hsla(${state.curveHue}, 85%, 40%, 0.85)`);
                ctx.fillStyle = rg;
                ctx.beginPath();
                ctx.arc(bob.sx, bob.sy, rbob, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            ctx.restore();
        }

        function draw() {
            const CC = CyberCanvasInstance;
            if (state.viewMode === 'curve2d') {
                drawCurve2d(CC);
            } else {
                drawPendulum3d(CC);
            }
            updateFormulaStrip(state.wx, state.wy, phaseRad());
        }

        function updateFormulaStrip(wx, wy, delta) {
            const elTex = document.getElementById('lissajous-formula-tex');
            const elPar = document.getElementById('lissajous-formula-params');
            if (!elTex || !elPar) return;

            const deg = ((delta * 180) / Math.PI % 360 + 360) % 360;
            const T0 = closurePeriodT(wx, wy);

            /* Kein [t] nach aligned — sonst kann KaTeX „[t]“ als Text ausgeben, wenn kein Leerzeichen folgt */
            const texMain =
                '\\begin{aligned}' +
                'x(t) &= A\\sin(\\omega_{x} t+\\delta)\\\\' +
                'y(t) &= B\\sin(\\omega_{y} t)' +
                '\\end{aligned}';

            const AD = state.A.toFixed(2).replace('.', '{,}');
            const BD = state.B.toFixed(2).replace('.', '{,}');
            const T0s = T0.toFixed(3).replace('.', '{,}');
            /* Zeile 1: drei Parameter (A, B, ωₓ) · Zeile 2: ωᵧ, δ, T₀ */
            const texParams =
                '\\begin{aligned}' +
                '&A=' + AD + ',\\quad B=' + BD + ',\\quad \\omega_{x}=' + wx + '\\\\' +
                '&\\omega_{y}=' + wy + ',\\quad \\delta \\approx ' + deg.toFixed(0) + '^{\\circ},\\quad T_{0} \\approx ' + T0s +
                '\\end{aligned}';

            if (window.katex) {
                try {
                    katex.render(texMain, elTex, { throwOnError: false, displayMode: true });
                    katex.render(texParams, elPar, { throwOnError: false, displayMode: true });
                } catch (e) {
                    elTex.textContent = 'x(t)=A·sin(ωₓt+δ), y(t)=B·sin(ωᵧt)';
                    elPar.innerHTML =
                        `A=${state.A.toFixed(2)}, B=${state.B.toFixed(2)}, ωₓ=${wx}<br>` +
                        `ωᵧ=${wy}, δ≈${deg.toFixed(0)}°, T₀≈${T0.toFixed(3)}`;
                }
            } else {
                elTex.textContent = 'x(t)=A·sin(ωₓt+δ), y(t)=B·sin(ωᵧt)';
                elPar.innerHTML =
                    `A=${state.A.toFixed(2)}, B=${state.B.toFixed(2)}, ωₓ=${wx}<br>` +
                    `ωᵧ=${wy}, δ≈${deg.toFixed(0)}°, T₀≈${T0.toFixed(3)}`;
            }
        }

        window.addEventListener('load', () => {
            CyberBranding.init({
                useExternalStyles: true,
                title: CyberI18n.get('ui.coach_title'),
                subtitle: CyberI18n.get('lissajous.title')
            });
            CyberUI.init();

            CyberUI.createCard('ui-container', CyberI18n.get('lissajous.parameters'), `
                <div id="grp-view" class="lissajous-view-row" role="group" aria-label="Ansicht">
                    <button type="button" id="btn-view-curve" class="lissajous-view-btn">${CyberI18n.get('lissajous.view_2d')}</button>
                    <button type="button" id="btn-view-pendulum" class="lissajous-view-btn is-active">${CyberI18n.get('lissajous.view_3d')}</button>
                </div>
                <div id="grp-amp"></div>
                <div id="grp-freq"></div>
                <div id="grp-phase"></div>
                <div id="grp-span"></div>
                <div id="grp-color"></div>
                <div id="grp-actions">
                    <button type="button" id="btn-animate">${CyberI18n.get('lissajous.simulation')}</button>
                    <button type="button" id="btn-reset-view">${CyberI18n.get('lissajous.reset')}</button>
                </div>
            `, '#00d2ff');

            CyberUI.createSlider('grp-amp', CyberI18n.get('lissajous.amp_a'), 0.4, 2.6, state.A, 0.05, (v) => {
                state.A = v;
                touchParameterWhileIdle();
                draw();
            }, '#ff9a5c');
            CyberUI.createSlider('grp-amp', CyberI18n.get('lissajous.amp_b'), 0.4, 2.6, state.B, 0.05, (v) => {
                state.B = v;
                touchParameterWhileIdle();
                draw();
            }, '#7fdcff');

            CyberUI.createSlider('grp-freq', CyberI18n.get('lissajous.freq_x'), 1, 16, state.wx, 1, (v) => {
                state.wx = Math.round(v);
                touchParameterWhileIdle();
                draw();
            }, '#ff9a5c');
            CyberUI.createSlider('grp-freq', CyberI18n.get('lissajous.freq_y'), 1, 16, state.wy, 1, (v) => {
                state.wy = Math.round(v);
                touchParameterWhileIdle();
                draw();
            }, '#7fdcff');

            CyberUI.createSlider('grp-phase', CyberI18n.get('lissajous.phase'), 0, 359, state.deltaDeg, 1, (v) => {
                state.deltaDeg = Math.round(v);
                touchParameterWhileIdle();
                draw();
            }, '#00d2ff');

            CyberUI.createSlider('grp-span', CyberI18n.get('lissajous.path_span'), 0.25, 6, state.cycles, 0.05, (v) => {
                state.cycles = v;
                touchParameterWhileIdle();
                draw();
            }, '#00d2ff');

            CyberUI.createSlider('grp-color', CyberI18n.get('lissajous.curve_color'), 0, 330, state.curveHue, 1, (v) => {
                state.curveHue = Math.round(v);
                touchParameterWhileIdle();
                draw();
            }, '#ffb070');

            document.getElementById('btn-animate').addEventListener('click', () => {
                state.animate = !state.animate;
                if (state.animate) startAnimLoop();
                else {
                    stopAnim();
                    traceProgress = 1;
                    draw();
                }
                syncAnimateButton();
            });

            document.getElementById('btn-reset-view').addEventListener('click', () => applyResetCurveAndView());

            document.getElementById('btn-view-curve').addEventListener('click', () => setViewMode('curve2d'));
            document.getElementById('btn-view-pendulum').addEventListener('click', () => setViewMode('pendulum3d'));

            syncAnimateButton();

            CyberCanvasInstance.init('main-canvas', {
                minY: -3.2,
                maxY: 3.2
            }, {
                showLabels: true,
                showTelemetry: false,
                showGrid: true
            });
            CyberCanvasInstance.resetView(-3.2, 3.2);
            CyberCanvasInstance.onResize = () => draw();

            (function bindPendulumOrbit() {
                const c = CyberCanvasInstance.canvas;
                function orbitMove(clientX, clientY) {
                    const dx = clientX - state.lastCamDrag.x;
                    const dy = clientY - state.lastCamDrag.y;
                    state.camYaw += dx * 0.007;
                    state.camPitch = Math.max(-1.18, Math.min(1.18, state.camPitch + dy * 0.007));
                    state.lastCamDrag = { x: clientX, y: clientY };
                    draw();
                }
                function orbitUp() {
                    state.draggingCam = false;
                    window.removeEventListener('mousemove', orbitWinMove);
                    window.removeEventListener('mouseup', orbitUp);
                    window.removeEventListener('touchmove', orbitTouchMove);
                    window.removeEventListener('touchend', orbitTouchEnd);
                }
                function orbitWinMove(e) {
                    if (!state.draggingCam) return;
                    orbitMove(e.clientX, e.clientY);
                }
                function orbitTouchMove(e) {
                    if (!state.draggingCam || e.touches.length !== 1) return;
                    e.preventDefault();
                    orbitMove(e.touches[0].clientX, e.touches[0].clientY);
                }
                function orbitTouchEnd(e) {
                    if (e.touches.length === 0) orbitUp();
                }
                c.addEventListener('mousedown', (e) => {
                    if (state.viewMode !== 'pendulum3d') return;
                    state.draggingCam = true;
                    state.lastCamDrag = { x: e.clientX, y: e.clientY };
                    window.addEventListener('mousemove', orbitWinMove);
                    window.addEventListener('mouseup', orbitUp);
                });
                c.addEventListener(
                    'touchstart',
                    (e) => {
                        if (state.viewMode !== 'pendulum3d' || e.touches.length !== 1) return;
                        state.draggingCam = true;
                        state.lastCamDrag = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                        window.addEventListener('touchmove', orbitTouchMove, { passive: false });
                        window.addEventListener('touchend', orbitTouchEnd);
                    },
                    { passive: true }
                );
            })();

            applyCanvasModeUi();

            CyberCanvasInstance.onContextMenu = (e) => {
                CyberUI.showContextMenu(e.clientX, e.clientY, [
                    {
                        label: CyberI18n.get('lissajous.reset'),
                        onclick: () => applyResetCurveAndView()
                    },
                    { divider: true },
                    {
                        label: CyberI18n.get('angle3d.axes'),
                        checked: CyberCanvasInstance.showAxes,
                        onchange: (v) => { CyberCanvasInstance.showAxes = v; draw(); }
                    },
                    {
                        label: CyberI18n.get('angle3d.grid'),
                        checked: CyberCanvasInstance.showGrid,
                        onchange: (v) => { CyberCanvasInstance.showGrid = v; draw(); }
                    },
                    {
                        label: CyberI18n.get('angle3d.labels'),
                        checked: CyberCanvasInstance.showLabels,
                        onchange: (v) => { CyberCanvasInstance.showLabels = v; draw(); }
                    }
                ]);
            };

            draw();
        });
    </script>
</body>
</html>
