<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Labor | 3D Litchi Labor</title>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --space-bg: #050b18;
            --neon-pink: #ff0055;
            --neon-red: #ff3333;
            --neon-orange: #ff8800;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --sidebar-width: 380px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--space-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #side-panel {
            width: var(--sidebar-width);
            height: 100%;
            background: rgba(10, 15, 30, 0.95);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px;
            z-index: 100;
            overflow-y: auto;
            backdrop-filter: blur(20px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidebar-header { margin-bottom: 30px; }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .slider-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        .val-display {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-pink);
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-red);
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* --- WORKSPACE --- */
        #workspace {
            flex-grow: 1;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at center, #0a1226 0%, #050b18 100%);
        }

        #canvas-container {
            width: 100%;
            height: 100%;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; }
            #side-panel { width: 100%; height: auto; padding: 20px; border-right: none; border-bottom: 1px solid var(--border); }
            #workspace { height: 60vh; width: 100%; flex-grow: 0; min-height: 400px; }
        }
    </style>
</head>

<body>
    <aside id="side-panel">
        <div id="sidebar-header"></div>
        <div id="ui-container"></div>

        <div style="font-family:'Orbitron'; font-size:0.55rem; color:rgba(255,255,255,0.2); text-align:center; padding-top:10px; opacity:0.6; margin-top:auto;">
            &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull; AI CO-PILOT: GEMINI
        </div>
    </aside>

    <div id="workspace">
        <div id="canvas-container"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="js/branding.js"></script>
    <script src="js/formula.js"></script>
    <script src="js/ui.js"></script>

    <script>
        // Init Branding
        CyberBranding.init({
            title: "Doc Alvers Mathe-Labor",
            subtitle: "3D LITCHI | PROZEDURALE GEOMETRIE"
        });

        // Init Formula Engine
        CyberFormula.init({ anchorId: 'workspace' });

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
        camera.position.set(0, 0, 4.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.2;

        // --- SHADER LOGIC ---
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform mat4 cameraWorldMatrix;
            uniform mat4 cameraProjectionMatrixInverse;
            uniform float u_Reife;
            uniform float u_Bumps;
            uniform float u_Shape;
            varying vec2 vUv;

            float litchiSDF(vec3 p) {
                // Base Ellipsoid
                vec3 q = p / vec3(1.0, u_Shape, 1.0);
                float d = length(q) - 1.0;
                
                // Procedural Spikes (Sine-based)
                float spikes = abs(sin(18.0 * p.x) * sin(18.0 * p.y) * sin(18.0 * p.z));
                return d - spikes * u_Bumps;
            }

            vec3 calcNormal(vec3 p) {
                vec2 e = vec2(0.001, 0.0);
                return normalize(vec3(
                    litchiSDF(p + e.xyy) - litchiSDF(p - e.xyy),
                    litchiSDF(p + e.yxy) - litchiSDF(p - e.yxy),
                    litchiSDF(p + e.yyx) - litchiSDF(p - e.yyx)
                ));
            }

            vec2 sphIntersect(vec3 ro, vec3 rd, float r) {
                float b = dot(ro, rd);
                float c = dot(ro, ro) - r*r;
                float h = b*b - c;
                if(h < 0.0) return vec2(-1.0);
                h = sqrt(h);
                return vec2(-b - h, -b + h);
            }

            void main() {
                vec2 ndc = vUv * 2.0 - 1.0;
                vec4 clipPos = vec4(ndc, 1.0, 1.0);
                vec4 viewPos = cameraProjectionMatrixInverse * clipPos;
                viewPos /= viewPos.w;
                
                vec3 ro = (cameraWorldMatrix * vec4(0.0, 0.0, 0.0, 1.0)).xyz;
                vec3 rd = normalize((cameraWorldMatrix * vec4(viewPos.xyz, 0.0)).xyz);
                
                vec2 bound = sphIntersect(ro, rd, 2.0);
                if (bound.y < 0.0) { discard; }
                
                float t = max(bound.x, 0.0);
                float tMax = bound.y;
                float stepSize = 0.015;
                bool hit = false;
                vec3 p;
                float prevF = litchiSDF(ro + rd * t);

                for (int i = 0; i < 200; i++) {
                    t += stepSize;
                    if (t > tMax) break;
                    
                    p = ro + rd * t;
                    float f = litchiSDF(p);
                    
                    if (f <= 0.0 && prevF > 0.0) {
                        float tLow = t - stepSize;
                        float tHigh = t;
                        for (int j = 0; j < 8; j++) {
                            float tMid = (tLow + tHigh) * 0.5;
                            if (litchiSDF(ro + rd * tMid) <= 0.0) tHigh = tMid;
                            else tLow = tMid;
                        }
                        t = (tLow + tHigh) * 0.5;
                        p = ro + rd * t;
                        hit = true;
                        break;
                    }
                    prevF = f;
                }
                
                if (!hit) { discard; }
                
                vec3 n = calcNormal(p);
                
                // Color Logic
                vec3 colRed = vec3(0.8, 0.05, 0.1);
                vec3 colPink = vec3(1.0, 0.1, 0.4);
                vec3 baseColor = mix(colRed, colPink, (p.y + 1.2) * 0.4) * u_Reife;
                
                vec3 lightDir = normalize(vec3(1.5, 2.5, 2.0));
                float diff = max(dot(n, lightDir), 0.15);
                float spec = pow(max(dot(reflect(-lightDir, n), -rd), 0.0), 24.0) * 0.4;
                float fresnel = pow(1.0 - max(dot(n, -rd), 0.0), 3.0) * 0.3;
                
                vec3 finalColor = baseColor * diff + spec + fresnel * vec3(1.0, 0.6, 0.6);
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        const raymarchMaterial = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            transparent: true,
            uniforms: {
                u_Reife: { value: 1.0 },
                u_Bumps: { value: 0.05 },
                u_Shape: { value: 1.2 },
                cameraWorldMatrix: { value: new THREE.Matrix4() },
                cameraProjectionMatrixInverse: { value: new THREE.Matrix4() }
            }
        });

        const quad = new THREE.Mesh(new THREE.PlaneBufferGeometry(2, 2), raymarchMaterial);
        quad.frustumCulled = false;
        scene.add(quad);

        function updateEquation() {
            const reife = raymarchMaterial.uniforms.u_Reife.value.toFixed(2);
            const bumps = raymarchMaterial.uniforms.u_Bumps.value.toFixed(3);
            const shape = raymarchMaterial.uniforms.u_Shape.value.toFixed(2);
            
            const tex = `d(p) = \\sqrt{x^2 + (y/{\\color{#ff3333}${shape}})^2 + z^2} - 1.0 - ({\\color{#ff8800}${bumps}} \\cdot \\text{spikes})`;
            CyberFormula.set(tex);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            raymarchMaterial.uniforms.cameraWorldMatrix.value.copy(camera.matrixWorld);
            raymarchMaterial.uniforms.cameraProjectionMatrixInverse.value.copy(camera.projectionMatrixInverse);
            renderer.render(scene, camera);
        }
        
        animate();
        CyberFormula.init({ anchorId: 'workspace' });
        setTimeout(updateEquation, 100);

        // UI Setup
        CyberUI.injectBriefing('ui-container', 
            'Willkommen im prozeduralen Biometrie-Labor. Untersuchen Sie die prozedurale Struktur der <b>Litchi-Gleichung</b>. SDF-Manipulation ermöglicht die Simulation von organischen Oberflächen in Echtzeit. 🛰️🛡️', 
            'var(--neon-red)');

        CyberUI.createCard('ui-container', 'Litchi Parameter', `
            <div class="control-group">
                <div class="slider-box">
                    <div class="label-row">
                        <span>Frucht-Reife (Farbe)</span>
                        <span class="val-display" id="val-reife">1.00</span>
                    </div>
                    <input type="range" id="slider-reife" min="0.5" max="2.0" step="0.01" value="1.00">
                </div>
                
                <div class="slider-box">
                    <div class="label-row">
                        <span>Stachel-Intensität</span>
                        <span class="val-display" id="val-bumps">0.05</span>
                    </div>
                    <input type="range" id="slider-bumps" min="0.0" max="0.15" step="0.001" value="0.05">
                </div>

                <div class="slider-box">
                    <div class="label-row">
                        <span>Form-Faktor (Y)</span>
                        <span class="val-display" id="val-shape">1.20</span>
                    </div>
                    <input type="range" id="slider-shape" min="0.8" max="1.8" step="0.01" value="1.20">
                </div>
            </div>
        `, 'var(--neon-red)');

        // Event Listeners for dynamic inputs
        setTimeout(() => {
            document.getElementById('slider-reife').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                raymarchMaterial.uniforms.u_Reife.value = val;
                document.getElementById('val-reife').innerText = val.toFixed(2);
                updateEquation();
            });

            document.getElementById('slider-bumps').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                raymarchMaterial.uniforms.u_Bumps.value = val;
                document.getElementById('val-bumps').innerText = val.toFixed(3);
                updateEquation();
            });

            document.getElementById('slider-shape').addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                raymarchMaterial.uniforms.u_Shape.value = val;
                document.getElementById('val-shape').innerText = val.toFixed(2);
                updateEquation();
            });
        }, 200);

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
