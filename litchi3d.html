<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | 3D Litchi-Labor</title>
    <script src="js/i18n.js"></script>
    <!-- KaTeX CSS & JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <link rel="icon" type="image/png" href="resources/favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <link rel="stylesheet" href="js/cyber-lab-overrides.css">
    <link rel="stylesheet" href="js/branding.styles.extracted.css">
</head>

<body>
    <!-- Mini Rail -->
    <nav id="mini-rail">
        <div class="nav-btn" onclick="toggleSidebar()" title="Menü umschalten">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
    </nav>

    <aside id="side-panel">
        <header id="sidebar-header" style="min-height: 80px;"></header>
        <div id="ui-container"></div>
    </aside>

    <main id="main-content">
        <div id="canvas-container" style="width:100%; height:100%;"></div>
    </main>

    <!-- Three.js & OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="js/branding/briefings.js?v=539"></script>
    <script src="js/branding/overlays.js?v=539"></script>
    <script src="js/branding.js?v=539"></script>
    <script src="js/formula.js"></script>
    <script src="js/ui.js?v=539"></script>

    <script>
        function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
            }, 400);
        }
        /**
         * 3D LITCHI LABORATORY - ULTRA v5.3.8
         * Procedural Biomimetic Shader Lab.
         */
        window.addEventListener('load', () => {
            // 1. Branding & Mission
            CyberBranding.init({
                useExternalStyles: true,
                title: CyberI18n.get('ui.coach_title'),
                subtitle: CyberI18n.get('litchi3d.title')
            });

            CyberUI.init();

            // 2. Three.js Engine Setup
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 0, 4.5);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 1.2;
            controls.minDistance = 2.5;
            controls.maxDistance = 10.0;

            // 3. Procedural Shader logic
            const vertexShader = `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform mat4 cameraWorldMatrix;
                uniform mat4 cameraProjectionMatrixInverse;
                uniform float u_Reife;
                uniform float u_Bumps;
                uniform float u_Shape;
                uniform float u_time;
                varying vec2 vUv;

                mat2 rot(float a) {
                    float s = sin(a), c = cos(a);
                    return mat2(c, -s, s, c);
                }

                float litchiSDF(vec3 p) {
                    float spikes = abs(sin(18.0 * p.x) * sin(18.0 * p.y) * sin(18.0 * p.z));
                    vec3 p1 = p;
                    p1.xz *= rot(u_time * 0.8);
                    p1.x -= 0.8;
                    p1.y /= u_Shape;
                    float d1 = length(p1) - 0.7;
                    vec3 p2 = p;
                    p2.xz *= rot(u_time * 0.8 + 3.1415);
                    p2.x -= 0.8;
                    p2.y /= u_Shape;
                    float d2 = length(p2) - 0.7;
                    float d = min(d1, d2);
                    return d - spikes * u_Bumps;
                }

                vec3 calcNormal(vec3 p) {
                    vec2 e = vec2(0.001, 0.0);
                    return normalize(vec3(
                        litchiSDF(p + e.xyy) - litchiSDF(p - e.xyy),
                        litchiSDF(p + e.yxy) - litchiSDF(p - e.yxy),
                        litchiSDF(p + e.yyx) - litchiSDF(p - e.yyx)
                    ));
                }

                vec2 sphIntersect(vec3 ro, vec3 rd, float r) {
                    float b = dot(ro, rd);
                    float c = dot(ro, ro) - r*r;
                    float h = b*b - c;
                    if(h < 0.0) return vec2(-1.0);
                    h = sqrt(h);
                    return vec2(-b - h, -b + h);
                }

                void main() {
                    vec2 ndc = vUv * 2.0 - 1.0;
                    vec4 clipPos = vec4(ndc, 1.0, 1.0);
                    vec4 viewPos = cameraProjectionMatrixInverse * clipPos;
                    viewPos /= viewPos.w;
                    vec3 ro = (cameraWorldMatrix * vec4(0.0, 0.0, 0.0, 1.0)).xyz;
                    vec3 rd = normalize((cameraWorldMatrix * vec4(viewPos.xyz, 0.0)).xyz);
                    
                    vec2 bound = sphIntersect(ro, rd, 2.0);
                    if (bound.y < 0.0) { discard; }
                    
                    float t = max(bound.x, 0.0);
                    float tMax = bound.y;
                    float stepSize = 0.015;
                    bool hit = false;
                    vec3 p;
                    float prevF = litchiSDF(ro + rd * t);

                    for (int i = 0; i < 200; i++) {
                        t += stepSize;
                        if (t > tMax) break;
                        p = ro + rd * t;
                        float f = litchiSDF(p);
                        if (f <= 0.0 && prevF > 0.0) {
                            float tLow = t - stepSize;
                            float tHigh = t;
                            for (int j = 0; j < 8; j++) {
                                float tMid = (tLow + tHigh) * 0.5;
                                if (litchiSDF(ro + rd * tMid) <= 0.0) tHigh = tMid;
                                else tLow = tMid;
                            }
                            t = (tLow + tHigh) * 0.5;
                            p = ro + rd * t;
                            hit = true;
                            break;
                        }
                        prevF = f;
                    }
                    if (!hit) { discard; }
                    vec3 n = calcNormal(p);
                    vec3 colRed = vec3(0.8, 0.05, 0.1);
                    vec3 colPink = vec3(1.0, 0.1, 0.4);
                    vec3 baseColor = mix(colRed, colPink, (p.y + 1.2) * 0.4) * u_Reife;
                    vec3 lightDir = normalize(vec3(1.5, 2.5, 2.0));
                    float diff = max(dot(n, lightDir), 0.15);
                    float spec = pow(max(dot(reflect(-lightDir, n), -rd), 0.0), 24.0) * 0.4;
                    float fresnel = pow(1.0 - max(dot(n, -rd), 0.0), 3.0) * 0.3;
                    vec3 finalColor = baseColor * diff + spec + fresnel * vec3(1.0, 0.6, 0.6);
                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `;

            const raymarchMaterial = new THREE.ShaderMaterial({
                vertexShader,
                fragmentShader,
                transparent: true,
                uniforms: {
                    u_Reife: { value: 1.0 },
                    u_Bumps: { value: 0.05 },
                    u_Shape: { value: 1.2 },
                    u_time: { value: 0.0 },
                    cameraWorldMatrix: { value: new THREE.Matrix4() },
                    cameraProjectionMatrixInverse: { value: new THREE.Matrix4() }
                }
            });

            const quad = new THREE.Mesh(new THREE.PlaneBufferGeometry(2, 2), raymarchMaterial);
            quad.frustumCulled = false;
            scene.add(quad);

            // 4. Update Logic
            function updateEquation() {
                const reife = raymarchMaterial.uniforms.u_Reife.value.toFixed(2);
                const bumps = raymarchMaterial.uniforms.u_Bumps.value.toFixed(3);
                const shape = raymarchMaterial.uniforms.u_Shape.value.toFixed(2);
                const tex = `d(p) = \\sqrt{x^2 + (y/{\\color{#ff3333}${shape}})^2 + z^2} - 1.0 - ({\\color{#ff8800}${bumps}} \\cdot \\text{spikes})`;
                CyberFormula.set(tex);
            }

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                raymarchMaterial.uniforms.u_time.value = performance.now() / 1000;
                raymarchMaterial.uniforms.cameraWorldMatrix.value.copy(camera.matrixWorld);
                raymarchMaterial.uniforms.cameraProjectionMatrixInverse.value.copy(camera.projectionMatrixInverse);
                renderer.render(scene, camera);
            }
            animate();

            // 5. UI Standardization
            CyberUI.createCard('ui-container', CyberI18n.get('heart3d.sdf_control'), '<div id="s-reife"></div><div id="s-bumps"></div><div id="s-shape"></div>', 'var(--neon-red)');

            CyberUI.createSlider('s-reife', CyberI18n.get('litchi3d.ripeness'), 0.5, 2.0, 1.0, 0.01, (v) => {
                raymarchMaterial.uniforms.u_Reife.value = v;
                updateEquation();
            }, 'var(--neon-pink)');

            CyberUI.createSlider('s-bumps', CyberI18n.get('litchi3d.bumps'), 0.0, 0.15, 0.05, 0.001, (v) => {
                raymarchMaterial.uniforms.u_Bumps.value = v;
                updateEquation();
            }, 'var(--neon-orange)');

            CyberUI.createSlider('s-shape', CyberI18n.get('litchi3d.shape'), 0.8, 1.8, 1.2, 0.01, (v) => {
                raymarchMaterial.uniforms.u_Shape.value = v;
                updateEquation();
            }, 'var(--neon-red)');

            CyberFormula.init({ anchorId: 'main-content' });
            setTimeout(updateEquation, 100);

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });

        });
    </script>
</body>

</html>
