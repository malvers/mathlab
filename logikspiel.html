<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logik-Architekt | ULTRA v5.3.8</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <style>
        :root {
            --cell-bg: rgba(15, 23, 42, 0.6);
            --cell-border: rgba(0, 210, 255, 0.2);
            --neon-blue: #00d2ff;
            --neon-green: #adff2f;
            --neon-red: #ff4d4d;
            --cell-size: 130px;
            --board-gap: 15px;
        }

        #main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.05) 0%, transparent 70%);
            padding: 40px;
            box-sizing: border-box;
            min-height: 100vh;
            width: 100%;
        }

        #game-board {
            margin: auto;
            position: relative;
            padding: 20px; 
            background: none; 
            border: none;
            backdrop-filter: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: board-in 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            width: fit-content;
            height: fit-content;
        }

        @keyframes board-in {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .grid-container {
            display: inline-grid;
            gap: var(--board-gap);
            position: relative;
            margin: 0;
            padding: 0;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background: var(--cell-bg);
            border: 2px solid var(--cell-border);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            position: relative;
        }

        .cell:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            transform: scale(1.05);
        }

        .cell.active {
            border-color: var(--neon-blue);
            background: rgba(0, 210, 255, 0.1);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* Sum Indicators */
        .sum-target {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            width: 80px; 
            height: var(--cell-size);
        }

        .grid-container .sum-target[id^="col-sum"] {
            width: var(--cell-size);
            height: 80px;
        }

        .sum-target.solved {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 1200px) {
            :root { --cell-size: 100px; --board-gap: 10px; }
            .cell { font-size: 2.8rem; }
            .sum-target { font-size: 1.5rem; width: 60px; height: 100px; }
            .grid-container .sum-target[id^="col-sum"] { width: 100px; height: 60px; }
        }

        .win-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; border-radius: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
        }

        .win-overlay.active { opacity: 1; pointer-events: auto; }

        .cell.hinted {
            color: #ffcc00; text-shadow: 0 0 15px #ffcc00;
            border-color: #ffcc00; background: rgba(255, 204, 0, 0.1);
        }

        #hint-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 11, 24, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 150; border-radius: 20px;
            opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 204, 0, 0.3);
        }

        #hint-overlay.active { opacity: 1; pointer-events: auto; }

        .hint-input {
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--neon-blue);
            color: white; padding: 15px; font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem; text-align: center; width: 120px; border-radius: 10px;
            margin: 20px 0; outline: none;
        }

        #game-stats {
            display: flex; flex-direction: column; gap: 15px; margin-top: 15px;
        }
    </style>
</head>

<body>
    <aside id="side-panel">
        <div id="sidebar-header"></div>
        <div id="game-stats"></div>
        <div style="margin-top: auto; padding-top: 20px; text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.2); font-family: 'Orbitron';">
            &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull;
        </div>
    </aside>

    <main id="main-content">
        <div id="game-board">
            <div class="grid-container" id="grid">
                <!-- Cells and Sums will be generated here -->
            </div>

            <div class="win-overlay" id="win-screen">
                <h2 style="font-family: Orbitron; color: var(--neon-green); letter-spacing: 5px;">PROTOCOL STABILIZED</h2>
                <p style="font-family: Outfit; font-weight: 300;">Mathematischer Kern erfolgreich synchronisiert.</p>
                <button class="cyber-btn" onclick="nextLevel()" style="max-width: 280px; border-color: var(--neon-green); box-shadow: 0 0 15px var(--neon-green);">NÄCHSTES LEVEL</button>
            </div>

            <div id="hint-overlay">
                <h3 style="font-family: Orbitron; color: #ffcc00; letter-spacing: 3px;">HILFE-PROTOKOLL</h3>
                <p style="font-family: Outfit; color: rgba(255,255,255,0.7); margin-bottom: 5px;">Löse die Aufgabe für einen Hinweis:</p>
                <div id="hint-task" style="font-family: Orbitron; font-size: 2rem; color: white;">12 + 5 = ?</div>
                <input type="number" id="hint-input" class="hint-input">
                <div style="display: flex; gap: 15px; width: 80%;">
                    <button class="cyber-btn" style="border-color: #ffcc00; color: #ffcc00" onclick="checkHintAnswer()">BESTÄTIGEN</button>
                    <button class="cyber-btn" onclick="closeHint()">ABBRECHEN</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/guard.js"></script>
    <script>
        let gridSize = 3;
        let grid = [];
        let solvedGrid = [];
        let hintedCells = [];
        let targetRowSums = [];
        let targetColSums = [];
        let currentLevel = 1;
        let moves = 0;
        let startTime = Date.now();
        let currentHintAnswer = null;

        window.addEventListener('load', () => {
            CyberBranding.init({
                title: "Doc Alvers Mathe-Spiel",
                subtitle: "Logik-Architekt",
                briefing: `
                    <b style="color:var(--branding-blue); font-size:1.1rem; letter-spacing:2px;">MISSION: LOGIK-ARCHITEKT</b><br><br>
                    Willkommen im Cyber-Labor. Deine Aufgabe ist es, den mathematischen Kern zu stabilisieren.<br><br>
                    • <b>Ziel:</b> Ändere die Zahlen im Gitter so, dass ihre Summen exakt mit den Zielwerten am Ende jeder Reihe und Spalte übereinstimmen.<br><br>
                    • <b>Steuerung:</b> Ein Klick auf eine Zelle erhöht ihren Wert (0-9). Danach beginnt der Zyklus erneut.<br><br>
                    • <b>Hinweise:</b> Löse eine Rechenaufgabe, um eine Ziffer dauerhaft zu fixieren (goldener Glow).<br><br>
                    • <b>Perfektion:</b> Minimiere Züge und Zeit für den Highscore!
                `
            });
            CyberUI.init();
            CyberGuard.init(1024); // Start modular Resolution Guard
            setupStats();
            initGame();

            document.getElementById('hint-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkHintAnswer();
            });
        });

        function setupStats() {
            CyberUI.createStatsGrid('game-stats', [
                { label: 'LEVEL', value: '01', color: 'var(--neon-blue)' },
                { label: 'ZÜGE', value: '0', color: 'white' },
                { label: 'ZEIT', value: '00:00', color: 'white' }
            ]);

            CyberUI.createStepper('game-stats', 'TRAINING: LEVEL', 1, 20, currentLevel, (val) => {
                changeLevel(val);
            }, 'var(--neon-green)');

            CyberUI.createCard('game-stats', 'STEUERUNG', `
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <button class="cyber-btn" onclick="resetPuzzle()">PROTOKOLL NEUSTART</button>
                    <button class="cyber-btn" style="border-color: #fbff00; color: #fbff00; box-shadow: 0 0 15px rgba(251, 255, 0, 0.2);" onclick="requestHint()">HILFE ANFORDERN</button>
                </div>
            `, 'var(--neon-orange)');

            setInterval(updateTime, 1000);
        }

        function updateTime() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const s = (elapsed % 60).toString().padStart(2, '0');
            const el = document.querySelector('#stats-card-game-stats-2 .stats-val');
            if (el) el.textContent = `${m}:${s}`;
        }

        function initGame() {
            gridSize = currentLevel > 5 ? 4 : 3;
            generatePuzzle();
            renderGrid();
            updateValidation();

            const levelEl = document.querySelector('#stats-card-game-stats-0 .stats-val');
            if (levelEl) levelEl.textContent = currentLevel.toString().padStart(2, '0');
            
            document.getElementById('win-screen').classList.remove('active');
            document.getElementById('hint-overlay').classList.remove('active');
        }

        function generatePuzzle() {
            grid = Array(gridSize).fill(0).map(() => Array(gridSize).fill(0));
            solvedGrid = Array(gridSize).fill(0).map(() => Array(gridSize).fill(0));
            hintedCells = Array(gridSize).fill(0).map(() => Array(gridSize).fill(false));
            targetRowSums = Array(gridSize).fill(0);
            targetColSums = Array(gridSize).fill(0);

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const val = Math.floor(Math.random() * 10);
                    solvedGrid[r][c] = val;
                    targetRowSums[r] += val;
                    targetColSums[c] += val;
                }
            }
        }

        function renderGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = '';

            container.style.gridTemplateColumns = `repeat(${gridSize}, var(--cell-size)) 80px`;
            container.style.gridTemplateRows = `repeat(${gridSize}, var(--cell-size)) 80px`;

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (hintedCells[r][c]) cell.classList.add('hinted');
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    cell.textContent = grid[r][c];
                    cell.onclick = () => handleCellClick(r, c, cell);
                    container.appendChild(cell);
                }

                const rSum = document.createElement('div');
                rSum.className = 'sum-target';
                rSum.id = `row-sum-${r}`;
                rSum.textContent = targetRowSums[r];
                container.appendChild(rSum);
            }

            for (let c = 0; c < gridSize; c++) {
                const cSum = document.createElement('div');
                cSum.className = 'sum-target';
                cSum.id = `col-sum-${c}`;
                cSum.textContent = targetColSums[c];
                container.appendChild(cSum);
            }

            const corner = document.createElement('div');
            corner.style.width = '80px';
            corner.style.height = '80px';
            container.appendChild(corner);
        }

        function handleCellClick(r, c, el) {
            if (hintedCells[r][c]) return;
            grid[r][c] = (grid[r][c] + 1) % 10;
            el.textContent = grid[r][c];
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 200);
            moves++;
            const movesEl = document.querySelector('#stats-card-game-stats-1 .stats-val');
            if (movesEl) movesEl.textContent = moves;
            updateValidation();
            checkWin();
        }

        function updateValidation() {
            let allGood = true;
            for (let r = 0; r < gridSize; r++) {
                const currentSum = grid[r].reduce((a, b) => a + b, 0);
                const el = document.getElementById(`row-sum-${r}`);
                if (el) {
                    if (currentSum === targetRowSums[r]) el.classList.add('solved');
                    else { el.classList.remove('solved'); allGood = false; }
                }
            }
            for (let c = 0; c < gridSize; c++) {
                let currentSum = 0;
                for (let r = 0; r < gridSize; r++) currentSum += grid[r][c];
                const el = document.getElementById(`col-sum-${c}`);
                if (el) {
                    if (currentSum === targetColSums[c]) el.classList.add('solved');
                    else { el.classList.remove('solved'); allGood = false; }
                }
            }
            return allGood;
        }

        function checkWin() {
            if (updateValidation()) {
                setTimeout(() => {
                    document.getElementById('win-screen').classList.add('active');
                }, 400);
            }
        }

        function requestHint() {
            let a, b, task;
            const diff = Math.min(10, currentLevel);
            if (Math.random() > 0.5) {
                a = Math.floor(Math.random() * (10 + diff)) + 5;
                b = Math.floor(Math.random() * (10 + diff)) + 5;
                currentHintAnswer = a + b;
                task = `${a} + ${b} = ?`;
            } else {
                a = Math.floor(Math.random() * (20 + diff)) + 10;
                b = Math.floor(Math.random() * 10) + 2;
                currentHintAnswer = a - b;
                task = `${a} - ${b} = ?`;
            }
            document.getElementById('hint-task').textContent = task;
            document.getElementById('hint-input').value = '';
            document.getElementById('hint-overlay').classList.add('active');
            setTimeout(() => document.getElementById('hint-input').focus(), 100);
        }

        function checkHintAnswer() {
            const input = document.getElementById('hint-input').value;
            if (parseInt(input) === currentHintAnswer) {
                closeHint();
                revealHint();
            } else {
                document.getElementById('hint-input').style.borderColor = 'var(--neon-red)';
                setTimeout(() => { document.getElementById('hint-input').style.borderColor = 'var(--neon-blue)'; }, 500);
            }
        }

        function revealHint() {
            let candidates = [];
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (!hintedCells[r][c] && grid[r][c] !== solvedGrid[r][c]) candidates.push({r, c});
                }
            }
            if (candidates.length === 0) {
                for (let r = 0; r < gridSize; r++) {
                    for (let c = 0; c < gridSize; c++) if (!hintedCells[r][c]) candidates.push({r, c});
                }
            }
            if (candidates.length > 0) {
                const target = candidates[Math.floor(Math.random() * candidates.length)];
                grid[target.r][target.c] = solvedGrid[target.r][target.c];
                hintedCells[target.r][target.c] = true;
                renderGrid();
                updateValidation();
                checkWin();
            }
        }

        function closeHint() { document.getElementById('hint-overlay').classList.remove('active'); }

        function changeLevel(val) {
            currentLevel = parseInt(val);
            moves = 0;
            startTime = Date.now();
            const movesEl = document.querySelector('#stats-card-game-stats-1 .stats-val');
            if (movesEl) movesEl.textContent = "0";
            initGame();
        }

        function resetPuzzle() {
            moves = 0;
            startTime = Date.now();
            const movesEl = document.querySelector('#stats-card-game-stats-1 .stats-val');
            if (movesEl) movesEl.textContent = "0";
            initGame();
        }

        function nextLevel() {
            currentLevel++;
            moves = 0;
            startTime = Date.now();
            initGame();
        }
    </script>
</body>

</html>
