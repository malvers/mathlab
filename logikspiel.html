<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zahlen-Puzzle | ULTRA v5.3.8</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <link rel="stylesheet" href="js/cyber-lab-overrides.css">
    <style>
        :root {
            --cell-bg: rgba(15, 23, 42, 0.6);
            --cell-border: rgba(0, 210, 255, 0.2);
            --neon-blue: #00d2ff;
            --neon-green: #adff2f;
            --neon-red: #ff4d4d;
            --cell-size: 130px;
            --board-gap: 15px;
        }

        #main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.05) 0%, transparent 70%);
            padding: 20px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        #game-board {
            position: relative;
            padding: 40px;
            background: transparent;
            border: none;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: board-in 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 100%;
            overflow-x: auto;
        }

        @keyframes board-in {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .grid-container {
            display: grid;
            gap: var(--board-gap);
            position: relative;
            margin: 0 auto;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background: var(--cell-bg);
            border: 2px solid var(--cell-border);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            position: relative;
        }

        .cell:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            transform: scale(1.05);
        }

        .cell.active {
            border-color: var(--neon-blue);
            background: rgba(0, 210, 255, 0.1);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .cell.fixed {
            color: rgba(255, 255, 255, 0.4);
            cursor: default;
            border-style: dashed;
        }

        /* Sum Indicators */
        .sum-target {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            width: var(--cell-size);
            height: var(--cell-size);
            transition: all 0.4s ease;
        }

        .sum-target.solved {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        /* Layout Grid Helpers - NOW PART OF GRID FLOW */
        .row-sums,
        .col-sums {
            display: contents;
            /* Let children participate in main grid */
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 1200px) {
            :root {
                --cell-size: 100px;
                --board-gap: 10px;
            }

            .cell {
                font-size: 2.8rem;
            }

            .sum-target {
                font-size: 1.5rem;
            }

            #game-board {
                padding: 25px;
            }
        }

        @media (max-width: 1024px) {
            #side-panel {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1000;
            }

            /* Could add a toggle button here, but for now we prioritize space */
            #main-content {
                padding: 10px;
            }
        }

        @media (max-width: 768px) {
            :root {
                --cell-size: 80px;
                --board-gap: 8px;
            }

            .cell {
                font-size: 2.2rem;
            }

            .sum-target {
                font-size: 1.2rem;
            }

            #game-board {
                padding: 15px;
                border-radius: 10px;
            }
        }

        #game-nav {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .win-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .win-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-next {
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .btn-next:hover {
            transform: scale(1.1);
        }

        .cell.hinted {
            color: #ffcc00;
            text-shadow: 0 0 15px #ffcc00;
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.1);
        }

        #hint-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 11, 24, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 150;
            border-radius: 20px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 204, 0, 0.3);
        }

        #hint-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .hint-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--neon-blue);
            color: white;
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            text-align: center;
            width: 120px;
            border-radius: 10px;
            margin: 20px 0;
            appearance: textfield;
        }

        .cyber-label {
            font-family: 'Orbitron', sans-serif !important;
            font-size: 0.7rem !important;
            letter-spacing: 2px !important;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 8px;
            color: var(--neon-blue);
        }

        .hint-input::-webkit-outer-spin-button,
        .hint-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        #game-stats {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <!-- Mini Rail -->
    <nav id="mini-rail">
        <div class="nav-btn" onclick="toggleSidebar()" title="Menü umschalten">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
    </nav>

    <aside id="side-panel">
        <div id="sidebar-header"></div>
        <div id="game-stats"></div>
    </aside>

    <main id="main-content">
        <div id="game-board">
            <div class="grid-container" id="grid">
                <!-- Cells and Sums will be generated here -->
            </div>

            <div class="win-overlay" id="win-screen">
                <div style="
                    background: rgba(10, 30, 15, 0.95);
                    border: 2px solid var(--neon-green);
                    border-radius: 16px;
                    padding: 40px 60px;
                    text-align: center;
                    box-shadow: 0 0 40px rgba(173, 255, 47, 0.3);
                ">
                    <div style="
                        font-family: 'Orbitron', sans-serif;
                        font-size: 2rem;
                        color: var(--neon-green);
                        letter-spacing: 4px;
                        text-shadow: 0 0 15px var(--neon-green);
                    ">PUZZLE GELÖST!</div>
                    <button class="btn-next" onclick="nextLevel()" style="margin-top: 30px;">NÄCHSTES LEVEL</button>
                </div>
            </div>

            <div id="hint-overlay">
                <h3 style="font-family: Orbitron; color: #ffcc00; letter-spacing: 3px;">HILFE-PROTOKOLL</h3>
                <p style="font-family: Outfit; color: rgba(255,255,255,0.7); margin-bottom: 5px;">Löse die Aufgabe für
                    einen Hinweis:</p>
                <div id="hint-task" style="font-family: Orbitron; font-size: 2rem; color: white;">12 + 5 = ?</div>
                <input type="number" id="hint-input" class="hint-input">
                <div style="display: flex; gap: 10px;">
                    <button class="btn" style="border-color: #ffcc00; color: #ffcc00"
                        onclick="checkHintAnswer()">BESTÄTIGEN</button>
                    <button class="btn" onclick="closeHint()">ABBRECHEN</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/guard.js"></script>
    <script>
        function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
            }, 400);
        }
        let gridSize = 3;
        let grid = [];
        let solvedGrid = []; // Reference solution
        let hintedCells = []; // Track cells revealed by hints
        let targetRowSums = [];
        let targetColSums = [];
        let currentLevel = 1;
        let moves = 0;
        let startTime = Date.now();
        let currentHintAnswer = null;

        window.addEventListener('load', () => {
            CyberBranding.init({
                title: "Doc Alvers Mathe-Spiel",
                subtitle: "Zahlen-Puzzle",
                briefing: `
                    <b style="color:var(--branding-blue); font-size:1.1rem; letter-spacing:2px;">MISSION: ZAHLEN-PUZZLE</b><br><br>
                    Willkommen im Cyber-Labor. Deine Aufgabe ist es, den mathematischen Kern zu stabilisieren.<br><br>
                    • <b>Ziel:</b> Ändere die Zahlen im Gitter so, dass ihre Summen exakt mit den Zielwerten am Ende jeder Reihe und Spalte übereinstimmen.<br><br>
                    • <b>Steuerung:</b> Ein Klick auf eine Zelle erhöht ihren Wert (0-9). Danach beginnt der Zyklus erneut.<br><br>
                    • <b>Hinweise:</b> Löse eine Rechenaufgabe, um eine Ziffer dauerhaft zu fixieren (goldener Glow).<br><br>
                    • <b>Perfektion:</b> Minimiere Züge und Zeit für den Highscore!
                `
            });
            CyberUI.init();
            setupStats();
            initGame();

            // Handle hint input 'Enter' key
            document.getElementById('hint-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkHintAnswer();
            });
        });

        function setupStats() {
            CyberUI.createCard('game-stats', 'MISSION STATUS', `
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 0.9rem; opacity: 0.6; font-family:Orbitron;">LEVEL</span>
                        <span id="stat-level" style="font-family: Orbitron; font-size: 1.6rem; font-weight: bold; color: var(--neon-blue);">01</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 0.9rem; opacity: 0.6; font-family:Orbitron;">ZÜGE</span>
                        <span id="stat-moves" style="font-family: Orbitron; font-size: 1.6rem; font-weight: bold;">0</span>
                    </div>
                     <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 0.9rem; opacity: 0.6; font-family:Orbitron;">ZEIT</span>
                        <span id="stat-time" style="font-family: Orbitron; font-size: 1.6rem; font-weight: bold;">00:00</span>
                    </div>
                </div>
            `, 'var(--neon-blue)');

            CyberUI.createCard('game-stats', '', `
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <label class="cyber-label" style="font-family: 'Orbitron', sans-serif !important; letter-spacing: 2px;">LEVEL-AUSWAHL</label>
                    <select class="cyber-select" onchange="changeLevel(this.value)" style="width: 100%; font-family: 'Orbitron', sans-serif !important;">
                        ${Array.from({ length: 10 }, (_, i) => `
                            <option value="${i + 1}" ${currentLevel === i + 1 ? 'selected' : ''} style="font-family: 'Orbitron', sans-serif;">
                                LEVEL ${(i + 1).toString().padStart(2, '0')}
                            </option>
                        `).join('')}
                    </select>
                </div>
            `, 'var(--neon-green)');

            CyberUI.createCard('game-stats', 'STEUERUNG', `
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <button class="cyber-btn" style="width:100%; border-color: var(--neon-orange); color: var(--neon-orange);" onclick="resetPuzzle()">PROTOKOLL NEUSTART</button>
                    <button class="cyber-btn" style="width:100%; border-color: #ffde00; color: #ffde00;" onclick="requestHint()">HILFE ANFORDERN</button>
                </div>
            `, 'var(--neon-orange)');

            setInterval(updateTime, 1000);
        }

        function updateTime() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const s = (elapsed % 60).toString().padStart(2, '0');
            const el = document.getElementById('stat-time');
            if (el) el.textContent = `${m}:${s}`;
        }

        function initGame() {
            // Difficulty Stretching: 1-3 (3x3), 4-7 (4x4), 8-10 (5x5)
            if (currentLevel <= 3) gridSize = 3;
            else if (currentLevel <= 7) gridSize = 4;
            else gridSize = 5;

            const container = document.getElementById('grid');
            container.style.gridTemplateColumns = `repeat(${gridSize}, var(--cell-size)) auto`;

            generatePuzzle();
            renderGrid();
            updateValidation();

            document.getElementById('stat-level').textContent = currentLevel.toString().padStart(2, '0');
            document.getElementById('win-screen').classList.remove('active');
            document.getElementById('hint-overlay').classList.remove('active');

            // checkWin(); // DEBUG: Win-Dialog sofort zeigen falls gelöst
        }

        function generatePuzzle() {
            grid = Array(gridSize).fill(0).map(() => Array(gridSize).fill(0));
            solvedGrid = Array(gridSize).fill(0).map(() => Array(gridSize).fill(0));
            hintedCells = Array(gridSize).fill(0).map(() => Array(gridSize).fill(false));
            targetRowSums = Array(gridSize).fill(0);
            targetColSums = Array(gridSize).fill(0);

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const val = Math.floor(Math.random() * 10);
                    solvedGrid[r][c] = val;
                    targetRowSums[r] += val;
                    targetColSums[c] += val;
                }
            }

            // DEBUG: Start mit gelöstem Grid
            // grid = solvedGrid.map(row => [...row]);
        }

        function renderGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = '';

            container.style.gridTemplateColumns = `repeat(${gridSize}, var(--cell-size)) auto`;

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (hintedCells[r][c]) cell.classList.add('hinted');
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    cell.textContent = grid[r][c];
                    cell.onclick = () => handleCellClick(r, c, cell);
                    container.appendChild(cell);
                }

                const rSum = document.createElement('div');
                rSum.className = 'sum-target';
                rSum.id = `row-sum-${r}`;
                rSum.textContent = targetRowSums[r];
                container.appendChild(rSum);
            }

            for (let c = 0; c < gridSize; c++) {
                const cSum = document.createElement('div');
                cSum.className = 'sum-target';
                cSum.id = `col-sum-${c}`;
                cSum.textContent = targetColSums[c];
                container.appendChild(cSum);
            }

            const corner = document.createElement('div');
            container.appendChild(corner);
        }

        function handleCellClick(r, c, el) {
            if (hintedCells[r][c]) return; // Hinted cells are fixed

            grid[r][c] = (grid[r][c] + 1) % 10;
            el.textContent = grid[r][c];
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 200);

            moves++;
            document.getElementById('stat-moves').textContent = moves;

            updateValidation();
            checkWin();
        }

        function updateValidation() {
            let allGood = true;

            for (let r = 0; r < gridSize; r++) {
                const currentSum = grid[r].reduce((a, b) => a + b, 0);
                const el = document.getElementById(`row-sum-${r}`);
                if (currentSum === targetRowSums[r]) {
                    el.classList.add('solved');
                } else {
                    el.classList.remove('solved');
                    allGood = false;
                }
            }

            for (let c = 0; c < gridSize; c++) {
                let currentSum = 0;
                for (let r = 0; r < gridSize; r++) currentSum += grid[r][c];
                const el = document.getElementById(`col-sum-${c}`);
                if (currentSum === targetColSums[c]) {
                    el.classList.add('solved');
                } else {
                    el.classList.remove('solved');
                    allGood = false;
                }
            }

            return allGood;
        }

        function checkWin() {
            if (updateValidation()) {
                setTimeout(() => {
                    document.getElementById('win-screen').classList.add('active');
                    if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
                }, 400);
            }
        }

        function requestHint() {
            let a, b, op, task;
            const diff = Math.min(10, currentLevel);

            if (Math.random() > 0.5) {
                a = Math.floor(Math.random() * (10 + diff)) + 5;
                b = Math.floor(Math.random() * (10 + diff)) + 5;
                currentHintAnswer = a + b;
                task = `${a} + ${b} = ?`;
            } else {
                a = Math.floor(Math.random() * (20 + diff)) + 10;
                b = Math.floor(Math.random() * 10) + 2;
                currentHintAnswer = a - b;
                task = `${a} - ${b} = ?`;
            }

            document.getElementById('hint-task').textContent = task;
            document.getElementById('hint-input').value = '';
            document.getElementById('hint-overlay').classList.add('active');
            setTimeout(() => document.getElementById('hint-input').focus(), 100);
        }

        function checkHintAnswer() {
            const input = document.getElementById('hint-input').value;
            if (parseInt(input) === currentHintAnswer) {
                closeHint();
                revealHint();
            } else {
                document.getElementById('hint-input').style.borderColor = 'var(--neon-red)';
                setTimeout(() => {
                    document.getElementById('hint-input').style.borderColor = 'var(--neon-blue)';
                }, 500);
            }
        }

        function revealHint() {
            let candidates = [];
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (!hintedCells[r][c] && grid[r][c] !== solvedGrid[r][c]) {
                        candidates.push({ r, c });
                    }
                }
            }

            if (candidates.length === 0) {
                for (let r = 0; r < gridSize; r++) {
                    for (let c = 0; c < gridSize; c++) {
                        if (!hintedCells[r][c]) candidates.push({ r, c });
                    }
                }
            }

            if (candidates.length > 0) {
                const target = candidates[Math.floor(Math.random() * candidates.length)];
                grid[target.r][target.c] = solvedGrid[target.r][target.c];
                hintedCells[target.r][target.c] = true;

                renderGrid();
                updateValidation();
                checkWin();
            }
        }

        function closeHint() {
            document.getElementById('hint-overlay').classList.remove('active');
        }

        function changeLevel(val) {
            currentLevel = parseInt(val);
            moves = 0;
            startTime = Date.now();
            document.getElementById('stat-moves').textContent = "0";
            initGame();
        }

        function resetPuzzle() {
            moves = 0;
            startTime = Date.now();
            document.getElementById('stat-moves').textContent = "0";
            initGame();
        }

        function nextLevel() {
            currentLevel++;
            moves = 0;
            startTime = Date.now();
            document.getElementById('stat-moves').textContent = "0";
            initGame();
        }

        // --- GLOBAL INITIALIZATION ---
        CyberGuard.init(1024);
    </script>
</body>

</html>
