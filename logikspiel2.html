<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Faktor-Stabilisator | ULTRA v5.4.0</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <style>
        :root {
            --cell-bg: rgba(15, 23, 42, 0.6);
            --cell-border: rgba(0, 210, 255, 0.2);
            --neon-blue: #00d2ff;
            --neon-green: #adff2f;
            --neon-red: #ff4d4d;
            --cell-size: 130px;
            --board-gap: 15px;
        }

        #main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.05) 0%, transparent 70%);
            padding: 20px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        #game-board {
            position: relative;
            padding: 40px;
            background: transparent;
            border: none;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: board-in 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 100%;
            overflow-x: auto;
        }

        @keyframes board-in {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .grid-container {
            display: grid;
            gap: var(--board-gap);
            position: relative;
            margin: 0 auto;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background: var(--cell-bg);
            border: 2px solid var(--cell-border);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
            position: relative;
        }

        .cell:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            transform: scale(1.05);
        }

        .cell.active {
            border-color: var(--neon-blue);
            background: rgba(0, 210, 255, 0.1);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .cell.fixed {
            color: rgba(255, 255, 255, 0.4);
            cursor: default;
            border-style: dashed;
        }

        .sum-target {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            width: var(--cell-size);
            height: var(--cell-size);
            transition: all 0.4s ease;
        }

        .sum-target.solved {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        .row-sums,
        .col-sums {
            display: contents;
        }

        /* --- RESPONSIVE ADJUSTMENTS (Original übernommen) --- */
        @media (max-width: 1200px) {
            :root {
                --cell-size: 100px;
                --board-gap: 10px;
            }

            .cell {
                font-size: 2.8rem;
            }

            .sum-target {
                font-size: 1.5rem;
            }

            #game-board {
                padding: 25px;
            }
        }

        @media (max-width: 1024px) {
            #side-panel {
                transform: translateX(-100%);
                position: fixed;
                z-index: 1000;
            }

            #main-content {
                padding: 10px;
            }
        }

        @media (max-width: 768px) {
            :root {
                --cell-size: 80px;
                --board-gap: 8px;
            }

            .cell {
                font-size: 2.2rem;
            }

            .sum-target {
                font-size: 1.2rem;
            }

            #game-board {
                padding: 15px;
                border-radius: 10px;
            }
        }

        #game-nav {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .win-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .win-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-next {
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .btn-next:hover {
            transform: scale(1.1);
        }

        .cell.hinted {
            color: #ffcc00;
            text-shadow: 0 0 15px #ffcc00;
            border-color: #ffcc00;
            background: rgba(255, 204, 0, 0.1);
        }

        #hint-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 11, 24, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 150;
            border-radius: 20px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 204, 0, 0.3);
        }

        #hint-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .hint-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--neon-blue);
            color: white;
            padding: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            text-align: center;
            width: 120px;
            border-radius: 10px;
            margin: 20px 0;
            appearance: textfield;
        }

        .cyber-label {
            font-family: 'Orbitron', sans-serif !important;
            font-size: 0.7rem !important;
            letter-spacing: 2px !important;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 8px;
            color: var(--neon-blue);
        }

        #game-stats {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <aside id="side-panel">
        <div id="sidebar-header"></div>
        <div id="game-stats"></div>
        <div
            style="margin-top: auto; padding-top: 20px; text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.2); font-family: 'Orbitron';">
            &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull;
        </div>
    </aside>

    <main id="main-content">
        <div id="game-board">
            <div class="grid-container" id="grid">
            </div>

            <div class="win-overlay" id="win-screen">
                <div
                    style="background: rgba(10, 30, 15, 0.95); border: 2px solid var(--neon-green); border-radius: 16px; padding: 40px 60px; text-align: center; box-shadow: 0 0 40px rgba(173, 255, 47, 0.3);">
                    <div
                        style="font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--neon-green); letter-spacing: 4px; text-shadow: 0 0 15px var(--neon-green);">
                        KERN STABILISIERT!</div>
                    <button class="btn-next" onclick="nextLevel()" style="margin-top: 30px;">NÄCHSTES LEVEL</button>
                </div>
            </div>

            <div id="hint-overlay">
                <h3 style="font-family: Orbitron; color: #ffcc00; letter-spacing: 3px;">HILFE-PROTOKOLL</h3>
                <p style="font-family: Outfit; color: rgba(255,255,255,0.7); margin-bottom: 5px;">Löse die Aufgabe für
                    einen Hinweis:</p>
                <div id="hint-task" style="font-family: Orbitron; font-size: 2rem; color: white;"></div>
                <input type="number" id="hint-input" class="hint-input">
                <div style="display: flex; gap: 10px;">
                    <button class="btn" style="border-color: #ffcc00; color: #ffcc00"
                        onclick="checkHintAnswer()">BESTÄTIGEN</button>
                    <button class="btn" onclick="closeHint()">ABBRECHEN</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/guard.js"></script>
    <script>
        // --- DIE LOGIK DES FAKTOR-STABILISATORS ---
        let gridSize = 3;
        let grid = [];
        let solvedGrid = [];
        let hintedCells = [];
        let targetRowProds = [];
        let targetColProds = [];
        let currentLevel = 1;
        let moves = 0;
        let startTime = Date.now();
        let currentHintAnswer = null;

        window.addEventListener('load', () => {
            CyberBranding.init({
                title: "Doc Alvers Mathe-Labor",
                subtitle: "Faktor-Stabilisator",
                briefing: `
                    <b style="color:var(--branding-blue); font-size:1.1rem; letter-spacing:2px;">MISSION: MULTIPLIKATION</b><br><br>
                    Stabilisiere den Kern durch korrekte Faktoren.<br><br>
                    • <b>Ziel:</b> Erreiche durch Multiplikation der Gitterzahlen die Zielwerte (×) am Rand.<br><br>
                    • <b>Steuerung:</b> Ein Klick erhöht den Wert (1-9).<br><br>
                    • <b>Hinweise:</b> Löse das Protokoll für eine Fixierung.
                `
            });
            CyberUI.init();
            setupStats();
            initGame();

            document.getElementById('hint-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkHintAnswer();
            });
        });

        function setupStats() {
            CyberUI.createCard('game-stats', 'MISSION STATUS', `
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 0.9rem; opacity: 0.6; font-family:Orbitron;">LEVEL</span>
                        <span id="stat-level" style="font-family: Orbitron; font-size: 1.6rem; font-weight: bold; color: var(--neon-blue);">01</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 0.9rem; opacity: 0.6; font-family:Orbitron;">ZÜGE</span>
                        <span id="stat-moves" style="font-family: Orbitron; font-size: 1.6rem; font-weight: bold;">0</span>
                    </div>
                     <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 0.9rem; opacity: 0.6; font-family:Orbitron;">ZEIT</span>
                        <span id="stat-time" style="font-family: Orbitron; font-size: 1.6rem; font-weight: bold;">00:00</span>
                    </div>
                </div>
            `, 'var(--neon-blue)');

            CyberUI.createCard('game-stats', '', `
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <label class="cyber-label">LEVEL-AUSWAHL</label>
                    <select class="cyber-select" onchange="changeLevel(this.value)" style="width: 100%;">
                        ${Array.from({ length: 10 }, (_, i) => `
                            <option value="${i + 1}" ${currentLevel === i + 1 ? 'selected' : ''}>LEVEL ${(i + 1).toString().padStart(2, '0')}</option>
                        `).join('')}
                    </select>
                </div>
            `, 'var(--neon-green)');

            CyberUI.createCard('game-stats', 'STEUERUNG', `
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <button class="cyber-btn" style="width:100%; border-color: var(--neon-orange); color: var(--neon-orange);" onclick="resetPuzzle()">NEUSTART</button>
                    <button class="cyber-btn" style="width:100%; border-color: #ffde00; color: #ffde00;" onclick="requestHint()">HILFE</button>
                </div>
            `, 'var(--neon-orange)');

            setInterval(updateTime, 1000);
        }

        function updateTime() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const s = (elapsed % 60).toString().padStart(2, '0');
            const el = document.getElementById('stat-time');
            if (el) el.textContent = `${m}:${s}`;
        }

        function initGame() {
            gridSize = currentLevel <= 3 ? 3 : (currentLevel <= 7 ? 4 : 5);
            generatePuzzle();
            renderGrid();
            updateValidation();
            document.getElementById('stat-level').textContent = currentLevel.toString().padStart(2, '0');
            document.getElementById('win-screen').classList.remove('active');
            document.getElementById('hint-overlay').classList.remove('active');
        }

        function generatePuzzle() {
            grid = Array(gridSize).fill(1).map(() => Array(gridSize).fill(1));
            solvedGrid = Array(gridSize).fill(1).map(() => Array(gridSize).fill(1));
            hintedCells = Array(gridSize).fill(false).map(() => Array(gridSize).fill(false));
            targetRowProds = Array(gridSize).fill(1);
            targetColProds = Array(gridSize).fill(1);

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const val = Math.floor(Math.random() * 5) + 1;
                    solvedGrid[r][c] = val;
                    targetRowProds[r] *= val;
                    targetColProds[c] *= val;
                }
            }
        }

        function renderGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            container.style.gridTemplateColumns = `repeat(${gridSize}, var(--cell-size)) auto`;

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (hintedCells[r][c] ? ' hinted' : '');
                    cell.textContent = grid[r][c];
                    cell.onclick = () => handleCellClick(r, c, cell);
                    container.appendChild(cell);
                }
                const rT = document.createElement('div');
                rT.className = 'sum-target';
                rT.id = `row-prod-${r}`;
                rT.textContent = '×' + targetRowProds[r];
                container.appendChild(rT);
            }

            for (let c = 0; c < gridSize; c++) {
                const cT = document.createElement('div');
                cT.className = 'sum-target';
                cT.id = `col-prod-${c}`;
                cT.textContent = '×' + targetColProds[c];
                container.appendChild(cT);
            }
            container.appendChild(document.createElement('div'));
        }

        function handleCellClick(r, c, el) {
            if (hintedCells[r][c]) return;
            grid[r][c] = grid[r][c] >= 9 ? 1 : grid[r][c] + 1;
            el.textContent = grid[r][c];
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 200);
            moves++;
            document.getElementById('stat-moves').textContent = moves;
            if (updateValidation()) checkWin();
        }

        function updateValidation() {
            let allGood = true;
            for (let r = 0; r < gridSize; r++) {
                const p = grid[r].reduce((a, b) => a * b, 1);
                const el = document.getElementById(`row-prod-${r}`);
                if (p === targetRowProds[r]) el.classList.add('solved');
                else { el.classList.remove('solved'); allGood = false; }
            }
            for (let c = 0; c < gridSize; c++) {
                let p = 1;
                for (let r = 0; r < gridSize; r++) p *= grid[r][c];
                const el = document.getElementById(`col-prod-${c}`);
                if (p === targetColProds[c]) el.classList.add('solved');
                else { el.classList.remove('solved'); allGood = false; }
            }
            return allGood;
        }

        function checkWin() {
            setTimeout(() => document.getElementById('win-screen').classList.add('active'), 400);
        }

        function requestHint() {
            const a = Math.floor(Math.random() * 15) + 5;
            const b = Math.floor(Math.random() * 10);
            currentHintAnswer = a + b;
            document.getElementById('hint-task').textContent = `${a} + ${b} = ?`;
            document.getElementById('hint-input').value = '';
            document.getElementById('hint-overlay').classList.add('active');
        }

        function checkHintAnswer() {
            if (parseInt(document.getElementById('hint-input').value) === currentHintAnswer) {
                closeHint();
                revealHint();
            }
        }

        function revealHint() {
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (!hintedCells[r][c] && grid[r][c] !== solvedGrid[r][c]) {
                        grid[r][c] = solvedGrid[r][c];
                        hintedCells[r][c] = true;
                        renderGrid(); updateValidation(); return;
                    }
                }
            }
        }

        function closeHint() { document.getElementById('hint-overlay').classList.remove('active'); }
        function changeLevel(val) { currentLevel = parseInt(val); resetPuzzle(); }
        function resetPuzzle() { moves = 0; startTime = Date.now(); initGame(); }
        function nextLevel() { currentLevel++; resetPuzzle(); }

        CyberGuard.init(1024);
    </script>
</body>

</html>
