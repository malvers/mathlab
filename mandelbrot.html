<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="forloop.mandelbrot.panel" content="554">
    <title>Fraktale · Mandelbrot & Julia | Doc Alvers</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <link rel="stylesheet" href="js/cyber-lab-overrides.css">
    <link rel="stylesheet" href="js/branding.styles.extracted.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
    <style>
        #main-content {
            background: #000;
            /* Flex: volle Restbreite wie multiplikation.html — verhindert sichtbaren Streifen rechts */
            flex: 1 1 0% !important;
            min-width: 0 !important;
            min-height: 0 !important;
        }

        /* Sidebar: global 350px + 10px nur in diesem Labor */
        #side-panel:not(.collapsed) {
            width: 360px !important;
            min-width: 360px !important;
        }

        /* Wie multiplikation.html, Farben/Glas */
        #side-panel {
            background: rgba(10, 20, 36, 0.75);
            border: none;
            border-right: 1px solid rgba(0, 210, 255, 0.28);
            backdrop-filter: blur(28px);
            align-items: stretch !important;
        }

        #side-panel #ui-container {
            width: 100% !important;
            max-width: none !important;
            align-self: stretch !important;
        }

        #side-panel .instrument-card {
            background: rgba(255, 255, 255, 0.055);
            border-color: rgba(0, 210, 255, 0.32);
            box-shadow: 0 0 18px rgba(0, 180, 220, 0.07);
            width: 100% !important;
            max-width: none !important;
            box-sizing: border-box !important;
            margin-bottom: 12px;
        }

        #side-panel .instrument-card:last-child {
            margin-bottom: 6px;
        }

        #side-panel .instrument-title {
            color: rgba(0, 210, 255, 0.92) !important;
            text-shadow: 0 0 12px rgba(0, 210, 255, 0.35) !important;
        }

        /* Zahlen nur in der Sidebar — kein Canvas-HUD */
        /* Obere Icon-Zeile: kein eigenes Kleiner-Ziehen — Größe kommt aus cyber-lab-overrides.css (52×52). */
        #sidebar-header .cyber-nav {
            margin: 0 0 6px 0 !important;
            gap: 6px !important;
        }

        /* Sidebar: zentrales Layout (cyber-lab-overrides + gleichmäßige Karten) */
        #ui-container {
            min-height: 0;
        }

        /* Zwei-Wege-Zeilen wie lissajous.html (#grp-view · lissajous-view-btn), kein Pill-Rieselformat */
        #side-panel .fraktal-seg-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 0;
            width: 100%;
            box-sizing: border-box;
        }

        #side-panel .fraktal-seg-btn {
            flex: 1;
            min-width: 118px;
            box-sizing: border-box;
            margin: 0;
            padding: 8px 10px;
            font-family: Orbitron, sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1.2;
            border-radius: 10px;
            cursor: pointer;
            outline: none;
            background: rgba(16, 30, 52, 0.9);
            border: 1px solid rgba(90, 200, 230, 0.38);
            color: #d4eefc;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        #side-panel .fraktal-seg-btn:hover:not(:disabled) {
            border-color: rgba(120, 220, 255, 0.55);
            background: rgba(20, 38, 62, 0.95);
        }

        #side-panel .fraktal-seg-btn.is-active {
            border-color: rgba(0, 210, 255, 0.9);
            box-shadow: 0 0 16px rgba(0, 210, 255, 0.3);
            color: #f0fdff;
            background: rgba(0, 210, 255, 0.14);
        }

        #side-panel .fraktal-seg-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        #side-panel .stats-grid.fraktal-readouts {
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        #side-panel .fraktal-readouts .stats-card {
            min-width: 0;
        }

        #side-panel .fraktal-readouts .stats-val {
            font-size: 0.72rem;
            line-height: 1.25;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        /* FRAKTAL-PARAMETER: buttons-ultra setzt .cyber-control-group margin-top:15px — hier stark straffen */
        #side-panel .instrument-card:has(#jx-mount) #jx-mount > .cyber-control-group:first-child {
            margin-top: 0 !important;
        }

        #side-panel .instrument-card:has(#jx-mount) .cyber-control-group {
            margin-top: 2px !important;
            margin-bottom: 0 !important;
        }

        #side-panel .instrument-card:has(#jx-mount) .control-header {
            margin-bottom: 1px !important;
            line-height: 1.15 !important;
        }

        #side-panel .instrument-card:has(#jx-mount) .cyber-slider {
            margin-top: 2px !important;
            margin-bottom: 2px !important;
        }

        /* Box 1 (KaTeX |z²|/N): links; Box 2 (stabiles c): Plot-Mitte — gemeinsame Zeile, volle Breite */
        .mb-fractal-formula-overlay {
            position: absolute;
            left: 0;
            right: 0;
            width: 100%;
            max-width: none;
            transform: none;
            top: var(--cyber-nav-band-top, 14px);
            z-index: 6;
            pointer-events: none;
            box-sizing: border-box;
        }

        .mb-fractal-formula-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: stretch;
            width: 100%;
            min-height: 52px;
            gap: 10px;
            box-sizing: border-box;
        }

        /* Gleiche Zeilenhöhe (stretch); KaTeX-Box links in linker Spalte */
        .mb-fractal-formula-row > .mb-fractal-formula-box:not(.mb-fractal-stable-panel) {
            grid-column: 1;
            justify-self: start;
            align-self: stretch;
            margin-left: clamp(12px, 2.5vw, 28px);
            display: flex;
            align-items: center;
        }

        /* Stabiles c: mittige Spalte (zentriert im Plot) */
        .mb-fractal-formula-row > #mb-fractal-stable-panel.mb-fractal-stable-panel {
            grid-column: 2;
            justify-self: center;
            align-self: stretch;
            transform: none;
            display: flex;
            align-items: center;
        }

        /* display:flex oben gewinnt sonst gegen [hidden] → leere Box mit Rand blieb sichtbar */
        .mb-fractal-formula-row > #mb-fractal-stable-panel.mb-fractal-stable-panel[hidden] {
            display: none !important;
        }

        .mb-fractal-stable-panel .mb-fractal-stable-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            width: 100%;
            min-width: 124px;
            text-align: center;
            box-sizing: border-box;
        }

        .mb-fractal-formula-row #mb-fractal-stable-panel .mb-fractal-stable-inner {
            height: 100%;
            min-height: 0;
        }

        /* Overrides globales cyber-lab-overrides.css (justify-content:flex-start !important) */
        .mb-fractal-stable-panel #mb-fractal-stable-widget.cyber-number-widget {
            justify-content: center !important;
            width: fit-content !important;
            max-width: 100%;
            margin-left: auto !important;
            margin-right: auto !important;
            align-items: center !important;
            flex-wrap: wrap !important;
        }

        /* cyber-lab-overrides: Ziffern sonst cyan !important — festes Gold nur fürs obere Panel */
        .mb-fractal-stable-panel #mb-fractal-stable-widget .cyber-digit-box {
            color: #f2bb44 !important;
            text-shadow: 0 0 12px rgba(242, 187, 68, 0.48) !important;
        }

        #mb-fractal-stable-widget {
            align-self: center;
        }

        .mb-fractal-stable-label {
            font-family: Orbitron, sans-serif;
            font-size: 0.52rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(0, 210, 255, 0.94);
            text-shadow: 0 0 12px rgba(0, 210, 255, 0.38);
            line-height: 1.2;
            max-width: 11rem;
        }

        .mb-fractal-stable-note {
            font-family: Orbitron, system-ui, sans-serif;
            font-size: 0.47rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            line-height: 1.35;
            color: rgba(186, 214, 235, 0.92);
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.22);
            max-width: min(17rem, 86vw);
            margin-top: 2px;
            white-space: pre-line;
        }
        /* KaTeX: gut lesbar; min. wie Button-Höhe, Kasten wächst mit Formel */
        .mb-fractal-formula-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            min-height: 52px;
            height: auto;
            padding: 10px 18px;
            background: rgba(6, 14, 28, 0.9);
            border-radius: 12px;
            border: 0.5px solid rgba(242, 187, 68, 0.48);
            box-shadow:
                0 0 16px rgba(242, 187, 68, 0.14),
                0 0 22px rgba(0, 210, 255, 0.08);
        }

        #canvas-container .mb-fractal-formula-box .katex-display {
            margin: 0 !important;
        }

        /* Orbit |z²|/N: kompakter Kasten; N fest bei ~54 % Breite (nah an |z²|, weniger „Leerraum“) */
        #mb-fractal-formula-panel.mb-fractal-formula-panel--orbit-metrics {
            box-sizing: border-box;
            width: clamp(260px, 32vw, 340px);
            min-width: clamp(260px, 32vw, 340px);
            max-width: clamp(260px, 32vw, 340px);
            min-height: 52px;
            padding: 8px 12px;
            flex-shrink: 0;
            justify-content: flex-start;
            align-items: center;
            contain: layout style;
        }

        /* FRACTAL: kompakte Box um die Hauptzeile (kein extraleerer Platz wie bei Orbit-|z²|/N-Kachel) */
        #mb-fractal-formula-panel.mb-fractal-formula-panel--fractal-banner {
            box-sizing: border-box;
            width: fit-content;
            max-width: min(560px, 92vw);
            min-width: 0;
            min-height: 52px;
            padding: 8px 14px;
            flex-shrink: 0;
            justify-content: flex-start;
            align-items: center;
            contain: layout style;
        }

        #mb-fractal-formula-panel.mb-fractal-formula-panel--orbit-metrics #mb-fractal-formula-tex,
        #mb-fractal-formula-panel.mb-fractal-formula-panel--fractal-banner #mb-fractal-formula-tex {
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            min-height: 2.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Orbit/Scan: |z²| links; N bei fester Horizontalposition (~Mitte zweiter Teil der Box) */
        #mb-fractal-formula-panel.mb-fractal-formula-panel--orbit-metrics
            #mb-fractal-formula-tex.mb-fractal-mz-split {
            position: relative;
            justify-content: flex-start;
            text-align: left;
        }

        #mb-fractal-formula-tex.mb-fractal-mz-split .mb-fractal-mz-z2 {
            display: inline-block;
            vertical-align: middle;
            text-align: left;
            flex-shrink: 0;
        }

        #mb-fractal-formula-tex.mb-fractal-mz-split .mb-fractal-mz-n {
            position: absolute;
            left: 54%;
            top: 50%;
            transform: translateY(-50%);
            white-space: nowrap;
            display: inline-block;
            vertical-align: middle;
        }

        /* FRACTAL-Hauptzeile linksbündig, Breite folgt KaTeX */
        #mb-fractal-formula-panel.mb-fractal-formula-panel--fractal-banner #mb-fractal-formula-tex:not(.mb-fractal-mz-split) {
            justify-content: flex-start;
            text-align: left;
            width: auto;
            min-width: 0;
        }

        #canvas-container #mb-fractal-formula-panel.mb-fractal-formula-panel--orbit-metrics .katex-display,
        #canvas-container #mb-fractal-formula-panel.mb-fractal-formula-panel--fractal-banner .katex-display {
            margin-left: auto !important;
            margin-right: auto !important;
        }

        #canvas-container
            #mb-fractal-formula-panel.mb-fractal-formula-panel--fractal-banner
            #mb-fractal-formula-tex:not(.mb-fractal-mz-split)
            .katex-display {
            margin-left: 0 !important;
            margin-right: auto !important;
        }

        #canvas-container #mb-fractal-formula-tex .katex {
            font-size: 1.38rem !important;
            color: #f2bb44 !important;
            text-shadow:
                0 0 14px rgba(242, 187, 68, 0.42),
                0 0 26px rgba(255, 228, 170, 0.18);
            line-height: 1.2 !important;
        }

        /* Haupt-WebGL: bei Orbit-Ansicht ausblenden (CyberCanvas liegt obenauf) */
        #canvas-container #canvas.mb-fractal-view-hidden {
            visibility: hidden;
            pointer-events: none;
        }

        .orbit-view-wrap {
            position: absolute;
            inset: 0;
            z-index: 4;
            background: #050b18;
        }

        .orbit-view-wrap[hidden] {
            display: none !important;
        }

        #orbit-canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        .orbit-hud {
            position: absolute;
            left: 14px;
            bottom: 14px;
            max-width: min(92vw, 520px);
            padding: 8px 12px;
            box-sizing: border-box;
            font-family: Outfit, system-ui, sans-serif;
            font-size: 0.78rem;
            line-height: 1.32;
            color: rgba(220, 235, 250, 0.92);
            background: rgba(6, 14, 28, 0.88);
            border-radius: 10px;
            border: 1px solid rgba(0, 210, 255, 0.28);
            pointer-events: none;
            z-index: 5;
            white-space: pre-line;
        }

        .orbit-hud.orbit-hud-hidden {
            display: none;
        }

        .orbit-hud-stable {
            margin-top: 0.35em;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .orbit-hud-stable--zero {
            color: #e53935;
            text-shadow: 0 0 10px rgba(229, 57, 53, 0.42);
        }

        .orbit-hud-stable--hits {
            color: #f2bb44;
            text-shadow: 0 0 10px rgba(242, 187, 68, 0.42);
        }

        /* Lag-Hinweis nur im Orbit-HUD (nicht in der Sidebar) */
        .orbit-hud-lag {
            font-size: 0.72em;
            font-weight: 500;
            color: rgba(160, 175, 198, 0.92);
            letter-spacing: 0.03em;
        }

        .orbit-hud-lag--warn {
            color: #ffb74d;
            text-shadow: 0 0 8px rgba(255, 183, 77, 0.38);
        }

        /* CyberBranding legt .canvas-branding mit pointer-events:auto über den Plot — Maus erreichte den Canvas nicht. */
        #main-content .canvas-branding {
            pointer-events: none !important;
        }
    </style>
</head>

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 position;
        void main() { gl_Position = vec4(position, 0.0, 1.0); }
    </script>
    <script id="fs" type="x-shader/x-fragment">
        precision highp float;
        uniform vec2 u_res;
        uniform vec2 u_center;
        uniform float u_zoom;
        uniform int u_max_iter;
        uniform vec2 u_julia_c;
        uniform float u_time;
        uniform int u_julia;
        void main() {
            vec3 color = vec3(0.0);
            vec2 uv = (gl_FragCoord.xy - 0.5 * u_res) / min(u_res.x, u_res.y);
            float zm = min(max(u_zoom, 1e-8), 200000.0);
            float sc = 3.0 / zm;
            vec2 z, c;
            if (u_julia == 1) {
                z = u_center + uv * sc;
                c = u_julia_c;
            } else {
                z = vec2(0.0);
                c = u_center + uv * sc;
            }
            int iter = 0;
            bool escaped = false;
            for (int k = 0; k < 768; k++) {
                if (k >= u_max_iter) break;
                if (dot(z, z) > 4.0) { escaped = true; iter = k; break; }
                z = vec2(z.x * z.x - z.y * z.y, 2.0 * z.x * z.y) + c;
            }
            if (escaped) {
                float sn = float(iter) - log2(max(1.0, log2(length(z))));
                /* Langsame Farbmodulation: weniger Shimmer/Flicker beim Zoomen als mit starkem u_time-Koeffizienten */
                float r = 0.5 + 0.5 * cos(3.0 + sn * 0.15 + u_time * 0.12);
                float g = 0.5 + 0.5 * cos(2.0 + sn * 0.15 + u_time * 0.12);
                float b = 0.5 + 0.5 * cos(1.0 + sn * 0.15 + u_time * 0.12);
                color = vec3(r, g, b);
            }
            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <script>

        window.toggleSidebar = function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
            setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 400);
        };

        /** Formelzeile wird in DOMContentLoaded via syncMbFractalFormulaOverlay() gesetzt (kennt mainPlane / Orbit-Budget). */

        /**
         * Panel-Look erzwingen:
         * - Inline !important am #side-panel schlägt jedes Stylesheet.
         * - <style> ans Ende von document.body (nach cyber-ui-dynamic im <head>).
         * - Nach Frames/Timeouts erneut (falls Module später noch Styles nachladen).
         */

        function injectFractalPanelAuthority() {
            const panel = document.getElementById('side-panel');
            if (panel) {
                panel.style.setProperty('background', 'rgba(10, 20, 36, 0.75)', 'important');
                panel.style.setProperty('border', 'none', 'important');
                panel.style.setProperty('border-right', '1px solid rgba(0, 210, 255, 0.28)', 'important');
                panel.style.setProperty('backdrop-filter', 'blur(28px)', 'important');
            }

            const id = FRACTAL_PANEL_STYLE_ID;
            let el = document.getElementById(id);
            if (!el) {
                el = document.createElement('style');
                el.id = id;
            }
            el.textContent = `

    width: 360px !important;
    min-width: 360px !important;
}
#side-panel {
    align-items: stretch !important;
    background: rgba(10, 20, 36, 0.75) !important;

}

    width: 100% !important;
    max-width: none !important;
    align-self: stretch !important;
}

    border-color: rgba(0, 210, 255, 0.32) !important;
    box-shadow: 0 0 18px rgba(0, 180, 220, 0.07) !important;
}
#side-panel .instrument-title {
    color: rgba(0, 210, 255, 0.92) !important;
    text-shadow: 0 0 12px rgba(0, 210, 255, 0.35) !important;
}
#side-panel .fraktal-seg-row {
    display: flex !important;
    gap: 8px !important;
    flex-wrap: wrap !important;
    margin: 0 !important;

}

    background: rgba(16, 30, 52, 0.9) !important;

            let smoothEffectiveMaxIter = DEF_MAX_ITER;
            /** Gesamte Simulation + GPU-Zyklus bei dieser Rate (vorher implizit ~Display-Hz). */
            const TARGET_RENDER_FPS = 30;
            const RENDER_FRAME_MS = 1000 / TARGET_RENDER_FPS;
            /** Flight-/Tau-/Zeitschritt relativ zur früheren ~60Hz-Schleife ausgleichen. */
            const TICK_VS_LEGACY_60HZ = 60 / TARGET_RENDER_FPS;
            let lastRenderFrameTs = 0;

            /** Zwei-Finger-Zoom (Touch): Ankerpunkt unter Mittelfinger-Mitte */
            let pinchStartDist = 0;
            let pinchStartZoom = 1;
            let pinchAnchor = null;

            function easeOutCubic(t) {
                const u = 1 - t;
                return 1 - u * u * u;
            }

            function easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : 1 - (-2 * t + 2) ** 3 / 2;
            }

            function lerp(a, b, t) {
                return a + (b - a) * t;
            }

            /** Punkt in ℂ unter Canvas-Pixel — konsistent mit Shader (uv·sc, sc = 3/zoom). */
            function focalPlaneUnderCanvasPixel(mx, my, cw, ch, zoomVal, cx, cy) {
                const s = Math.min(cw, ch);
                if (s <= 0 || !Number.isFinite(zoomVal) || zoomVal <= 0) return { fX: cx, fY: cy };
                const k = 3 / (s * zoomVal);
                return {
                    fX: cx + (mx - cw / 2) * k,
                    fY: cy - (my - ch / 2) * k,
                };
            }

            /**
             * Orbit-CyberCanvas an WebGL-Fragment-Shader angleichen:
             * uv = (FragCoord − ½res) / min(res), z/c = center + uv·(3/zoom).
             * @param {boolean} [force] — true: Kontextmenü-Reset; sonst nur bei geändertem Ausschnitt.
             */
            function syncOrbitCyberCanvasViewFromFractal(force) {
                const cc = CyberCanvasInstance;
                if (!cc?.isInitialized) return;
                const w = Math.max(1, canvas.clientWidth || canvas.width || 1);
                const h = Math.max(1, canvas.clientHeight || canvas.height || 1);
                const zm = clampZoom(zoom);
                const key = [w, h, centerX, centerY, zm].join('|');
                if (!force && key === orbitFractalViewportSyncKey) return;
                orbitFractalViewportSyncKey = key;
                const sc = 3 / zm;
                const minS = Math.min(w, h);
                const uvXMin = (0.5 - 0.5 * w) / minS;
                const uvXMax = (w - 0.5 - 0.5 * w) / minS;
                const uvYMin = (0.5 - 0.5 * h) / minS;
                const uvYMax = (h - 0.5 - 0.5 * h) / minS;
                cc.view.minX = centerX + uvXMin * sc;
                cc.view.maxX = centerX + uvXMax * sc;
                cc.view.minY = centerY + uvYMin * sc;
                cc.view.maxY = centerY + uvYMax * sc;
                cc.needsRedraw = true;
            }

            /** Neues Center nach Zoom, sodass (fX,fY) unter demselben Pixel bleibt (Pointer-Zoom). */
            function centerKeepingFocalPlane(mx, my, cw, ch, zoomNew, fX, fY) {
                const s = Math.min(cw, ch);
                const k = 3 / (s * zoomNew);
                return {
                    cx: fX - (mx - cw / 2) * k,
                    cy: fY + (my - ch / 2) * k,
                };
            }

            function clampZoom(z) {
                if (!Number.isFinite(z)) return 1;
                const zc = Number(z);
                return zc <= 1 ? 1 : (zc >= ZOOM_MAX ? ZOOM_MAX : zc);
            }

            let fractalPersistTimer = null;
            function persistMandelbrotFractalState() {
                try {
                    localStorage.setItem(LS_MB_MODE, mode === 'MANDELBROT' ? 'MANDELBROT' : 'JULIA');
                    localStorage.setItem(LS_MB_CENTER_X, String(centerX));
                    localStorage.setItem(LS_MB_CENTER_Y, String(centerY));
                    localStorage.setItem(LS_MB_ZOOM, String(clampZoom(zoom)));
                    localStorage.setItem(LS_MB_JULIA_X, String(juliaX));
                    localStorage.setItem(LS_MB_JULIA_Y, String(juliaY));
                    localStorage.setItem(
                        LS_MB_MAX_ITER,
                        String(Math.max(32, Math.min(256, Math.round(maxIter))))
                    );
                } catch (e) {
                    /* ignore */
                }
            }

            function schedulePersistMandelbrotFractalState() {
                if (fractalPersistTimer) clearTimeout(fractalPersistTimer);
                fractalPersistTimer = setTimeout(() => {
                    fractalPersistTimer = null;
                    persistMandelbrotFractalState();
                }, 350);
            }

            /** Mandelbrot: WebGL-Mitte = REAL/IMAG-Schieber; Julia: Schieber = fixes c (Shader unabhängig). */
            function syncMbFractalCenterFromJuliaSliders() {
                if (mode !== 'MANDELBROT') return;
                centerX = juliaX;
                centerY = juliaY;
            }

            function syncMbJuliaSlidersFromFractalCenter() {
                if (mode !== 'MANDELBROT') return;
                const nx = Math.round(centerX * 1000);
                const ny = Math.round(centerY * 1000);
                if (Math.round(juliaX * 1000) === nx && Math.round(juliaY * 1000) === ny) return;
                juliaX = nx / 1000;
                juliaY = ny / 1000;
                updateSliderMountVisual('jx-mount', nx);

            function stopFlightUi() {

            function stopOrbitRedrawLoop() {
                if (orbitRedrawTimer != null) {
                    clearInterval(orbitRedrawTimer);
                    orbitRedrawTimer = null;
                }
            }

            /** Unter 60 s als „12.34 s“, ab 60 s als „1:30.45“ (z. B. ~90 s). */
            function formatOrbitHudDuration(seconds) {
                const x = Math.max(0, seconds);
                if (x < 60) return `${x.toFixed(2)} s`;
                const mi = Math.floor(x / 60);
                const sec = x - mi * 60;
                const secStr = sec.toFixed(2);
                const padded = sec < 10 ? `0${secStr}` : secStr;
                return `${mi}:${padded}`;
            }

            function orbitHudCancelSwRaf() {
                if (orbitHudSwRafId != null) {
                    cancelAnimationFrame(orbitHudSwRafId);
                    orbitHudSwRafId = null;
                }
            }

            function orbitHudResetStopwatchState() {
                orbitHudCancelSwRaf();

                orbitHudSwLatchMs = null;
                if (orbitHudVisible && mainPlane === 'ORBIT') syncOrbitHud();
            }

            function persistOrbitHudVisible() {
                try {
                    localStorage.setItem(LS_MB_ORBIT_HUD_VISIBLE, orbitHudVisible ? '1' : '0');

            function applyOrbitHudVisibility() {

            function toggleOrbitHudVisible() {

                orbitHudVisible = !orbitHudVisible;
                persistOrbitHudVisible();
                applyOrbitHudVisibility();
                if (orbitHudVisible) syncOrbitHud();
                if (orbitScanActive && orbitHudSwLatchMs == null) orbitHudScheduleSwRaf();
            }

            function orbitHudScheduleSwRaf() {
                orbitHudCancelSwRaf();
                if (!orbitScanActive || orbitHudSwLatchMs != null) return;
                function tick() {
                    if (!orbitScanActive || orbitHudSwLatchMs != null) {
                        orbitHudSwRafId = null;
                        return;
                    }
                    if (orbitHudVisible) syncOrbitHud();
                    orbitHudSwRafId = requestAnimationFrame(tick);
                }
                orbitHudSwRafId = requestAnimationFrame(tick);
            }

            function orbitHudOnScanStarted() {
                orbitHudSwLatchMs = null;
                orbitHudSwStart = performance.now();
                if (orbitHudVisible) syncOrbitHud();
                orbitHudScheduleSwRaf();
            }

            function orbitHudOnScanStopped() {
                if (orbitHudSwStart != null && orbitHudSwLatchMs == null) {
                    orbitHudSwLatchMs = performance.now() - orbitHudSwStart;
                }
                orbitHudCancelSwRaf();
                if (orbitHudVisible) syncOrbitHud();
            }

            function teardownOrbitCyberCanvas() {
                stopOrbitRedrawLoop();
                stopOrbitScanAnim();
                orbitScanActive = false;
                orbitHudResetStopwatchState();
                orbitScanStableHits.length = 0;
                orbitScanStableKeys.clear();
                orbitCanvasDrag = null;
                orbitLastActualLegs = -1;
                orbitLastLegBudget = -1;
                orbitLastLegEndR2 = -1;
                orbitHudFrameMsSmooth = 0;
                if (typeof CyberCanvasInstance !== 'undefined' && CyberCanvasInstance.isInitialized) {
                    CyberCanvasInstance.cleanup();
                }
            }

            function startOrbitRedrawLoop() {
                stopOrbitRedrawLoop();
                orbitRedrawTimer = setInterval(() => {
                    if (mainPlane === 'ORBIT' && typeof CyberCanvasInstance !== 'undefined' && CyberCanvasInstance.isInitialized) {
                        CyberCanvasInstance.needsRedraw = true;
                    }
                }, 160);
            }

            function orbitHudEscapeHtml(s) {
                return String(s)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }

            function syncOrbitHud() {
                const el = document.getElementById('orbit-hud');
                if (!el || !orbitHudVisible || mainPlane !== 'ORBIT') return;
                let swLine = CyberI18n.get('fractal.orbit_hud_stopwatch_idle');
                if (orbitHudSwLatchMs != null) {
                    swLine = CyberI18n.get('fractal.orbit_hud_stopwatch_latched', {
                        t: formatOrbitHudDuration(orbitHudSwLatchMs / 1000),
                    });
                } else if (orbitScanActive && orbitHudSwStart != null) {
                    swLine = CyberI18n.get('fractal.orbit_hud_stopwatch_running', {
                        t: formatOrbitHudDuration((performance.now() - orbitHudSwStart) / 1000),
                    });
                }
                const hudHead = `${swLine}\n${CyberI18n.get('fractal.orbit_hud_toggle')}\n`;
                const hint = mode === 'MANDELBROT' ? CyberI18n.get('fractal.orbit_help_mb') : CyberI18n.get('fractal.orbit_help_jl');
                let detail;
                if (mode === 'MANDELBROT') {
                    detail = `c = ${centerX.toFixed(5)} ${centerY >= 0 ? '+' : ''} ${centerY.toFixed(5)}i · z₀ = 0`;
                } else {
                    detail = `c = ${juliaX.toFixed(5)} ${juliaY >= 0 ? '+' : ''} ${juliaY.toFixed(5)}i · z₀ = ${centerX.toFixed(5)} ${centerY >= 0 ? '+' : ''} ${centerY.toFixed(5)}i`;
                }
                let hudBase = `${hudHead}${hint}\n${detail}\n${CyberI18n.get('fractal.orbit_drag_hint')}\n${CyberI18n.get('fractal.orbit_legs_arrows', { n: orbitLegCount })}\n${CyberI18n.get('fractal.orbit_scan_hint')}`;
                if (
                    orbitLastLegBudget > 0 &&
                    orbitLastActualLegs >= 0 &&
                    orbitLastActualLegs < orbitLastLegBudget
                ) {
                    hudBase += `\n${CyberI18n.get('fractal.orbit_legs_escape_trunc', {
                        shown: orbitLastActualLegs,
                        budget: orbitLastLegBudget,
                    })}`;
                }
                if (orbitScanActive) hudBase += `\n${CyberI18n.get('fractal.orbit_scan_running')}`;
                const bodyHtml = hudBase.split('\n').map((ln) => orbitHudEscapeHtml(ln)).join('<br>');
                const lagWarnMs = 48;
                let lagHtml = '';
                if (orbitHudFrameMsSmooth >= 0.5) {
                    const lagCls =
                        orbitHudFrameMsSmooth >= lagWarnMs ? 'orbit-hud-lag orbit-hud-lag--warn' : 'orbit-hud-lag';
                    lagHtml = `<br><span class="${lagCls}">${orbitHudFrameMsSmooth.toFixed(0)} ms · Bild</span>`;
                }
                if (orbitScanActive) {
                    const nHits = orbitScanStableHits.length;
                    const stableCls = nHits === 0 ? 'orbit-hud-stable--zero' : 'orbit-hud-stable--hits';
                    const lab = CyberI18n.get('fractal.orbit_stable_points_label');
                    el.innerHTML =
                        bodyHtml +
                        lagHtml +
                        `<br><span class="orbit-hud-stable ${stableCls}">${orbitHudEscapeHtml(lab)}: ${nHits}</span>`;
                } else {
                    el.innerHTML = bodyHtml + lagHtml;
                }
            }

            function syncMbOrbitStableCountPanel() {
                const panel = document.getElementById('mb-fractal-stable-panel');
                const labelEl = document.getElementById('mb-fractal-stable-label');
                const widgetMount = document.getElementById('mb-fractal-stable-widget');
                const noteEl = document.getElementById('mb-fractal-stable-note');
                if (!panel || !widgetMount) return;
                if (mainPlane !== 'ORBIT' || !orbitScanActive) {
                    panel.hidden = true;
                    if (noteEl) {
                        noteEl.textContent = '';
                        noteEl.hidden = true;
                    }
                    return;
                }
                panel.hidden = false;
                const n = orbitScanStableHits.length;
                const digitStyle = {
                    fontSize: '1.22rem',
                    digitWidth: '17px',
                    digitHeight: '30px',
                    separatorWidth: '8px',
                };
                if (typeof CyberUI !== 'undefined' && typeof CyberUI.updateNumberWidget === 'function') {
                    CyberUI.updateNumberWidget('mb-fractal-stable-widget', n, 0, 1, digitStyle);
                } else {
                    widgetMount.textContent = String(n);
                    widgetMount.style.color = '';
                    widgetMount.style.textShadow = '';
                }
                if (labelEl) labelEl.textContent = CyberI18n.get('fractal.orbit_stable_points_label');
                if (noteEl) {
                    noteEl.textContent = '';
                    noteEl.hidden = true;
                }
            }

            function drawOrbitPlane() {
                const cc = CyberCanvasInstance;
                if (!cc.isInitialized || mainPlane !== 'ORBIT') return;
                const orbitDrawT0 = performance.now();
                syncOrbitCyberCanvasViewFromFractal(false);
                cc.drawGrid({
                    vignette: false,
                    mainColor: 'rgba(0, 210, 255, 0.42)',
                    gridColor: 'rgba(255, 255, 255, 0.095)',
                });
                const ctx = cc.ctx;

                function strokeCircleRadius(R, strokeStyle, dashed) {
                    const ox = cc.mapX(0);
                    const oy = cc.mapY(0);
                    const pxPerUnit = cc.width / (cc.view.maxX - cc.view.minX);
                    const rad = R * pxPerUnit;
                    if (rad <= 0.5) return;
                    ctx.save();
                    ctx.strokeStyle = strokeStyle;
                    ctx.lineWidth = 0.85;
                    ctx.setLineDash(dashed ? [7, 5] : []);
                    ctx.beginPath();
                    ctx.arc(ox, oy, rad, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }

                strokeCircleRadius(1, 'rgba(255,255,255,0.38)', true);
                strokeCircleRadius(2, 'rgba(0, 210, 255, 0.42)', true);

                let z0x;
                let z0y;
                let cr;
                let ci;
                if (mode === 'MANDELBROT') {
                    z0x = 0;
                    z0y = 0;
                    cr = centerX;
                    ci = centerY;
                } else {
                    z0x = centerX;
                    z0y = centerY;
                    cr = juliaX;
                    ci = juliaY;
                }

                const pts = [];
                let zx = z0x;
                let zy = z0y;
                /** ↑/↓ in Orbit-Ansicht steuern orbitLegCount (Schenkel / Segmente). */
                const legsBudget = clampOrbitLegCount(orbitLegCount);
                pts.push({ x: zx, y: zy });
                for (let seg = 0; seg < legsBudget; seg++) {
                    if (zx * zx + zy * zy > 4) break;
                    const nx = zx * zx - zy * zy + cr;
                    const ny = 2 * zx * zy + ci;
                    zx = nx;
                    zy = ny;
                    pts.push({ x: zx, y: zy });
                }

                orbitLastLegBudget = legsBudget;
                orbitLastActualLegs = Math.max(0, pts.length - 1);

                /** Escape wie Shader: |z|² > 4 → instabil (rot); bis Ende im Scheibe gelb wie stabiles HUD-Gold. */
                const lp = pts[pts.length - 1];
                const r2Last = lp.x * lp.x + lp.y * lp.y;
                orbitLastLegEndR2 = r2Last;
                const orbitStablePath = r2Last <= 4 + 1e-10;
                const orbitStroke = orbitStablePath
                    ? 'rgba(242, 187, 68, 0.94)'
                    : 'rgba(229, 57, 53, 0.94)';
                const orbitDotFill = orbitStablePath
                    ? 'rgba(242, 187, 68, 0.88)'
                    : 'rgba(229, 57, 53, 0.88)';

                const nSeg = pts.length - 1;
                const legsHiddenForScan = orbitScanActive && orbitHideLegsWhileScanning;
                /** Schenkel — beim Scan optional aus (Schalter Kontextmenü). */
                if (!legsHiddenForScan) {
                    for (let i = 0; i < nSeg; i++) {
                        const t = nSeg <= 1 ? 1 : i / (nSeg - 1);
                        ctx.strokeStyle = orbitStroke;
                        ctx.lineWidth = Math.max(1.2, 0.65 + t * 1.45);
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        ctx.beginPath();
                        ctx.moveTo(cc.mapX(pts[i].x), cc.mapY(pts[i].y));
                        ctx.lineTo(cc.mapX(pts[i + 1].x), cc.mapY(pts[i + 1].y));
                        ctx.stroke();
                    }
                }

                const ni = Math.max(1, pts.length - 1);
                const epsNear = 1e-10;
                if (orbitShowConnectorLines && !legsHiddenForScan) {
                    ctx.fillStyle = orbitDotFill;
                    pts.forEach((p, i) => {
                        if (i === 0) return;
                        const dc = (p.x - cr) * (p.x - cr) + (p.y - ci) * (p.y - ci);
                        if (dc < epsNear) return;
                        const px = cc.mapX(p.x);
                        const py = cc.mapY(p.y);
                        const tr = ni <= 0 ? 1 : i / ni;
                        const r = 1.35 + tr * 1.55;
                        ctx.beginPath();
                        ctx.arc(px, py, r, 0, Math.PI * 2);
                        ctx.fill();
                    });
                }

                function drawHandle(mx, my, isDraggable) {
                    const px = cc.mapX(mx);
                    const py = cc.mapY(my);
                    ctx.save();
                    ctx.fillStyle = isDraggable ? '#e53935' : 'rgba(160, 175, 198, 0.72)';
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.88)';
                    ctx.lineWidth = 1.2;
                    ctx.beginPath();
                    ctx.arc(px, py, isDraggable ? 6.5 : 4.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.restore();
                }

                if (!orbitScanActive) {
                    drawHandle(cr, ci, true);
                }
                if (mode === 'JULIA') {
                    drawHandle(z0x, z0y, true);
                } else {
                    drawHandle(0, 0, false);
                }

                ctx.font = 'bold 12px Orbitron,sans-serif';
                ctx.textAlign = 'left';
                ctx.fillStyle = 'rgba(255,255,255,0.92)';
                if (!orbitScanActive) {
                    ctx.fillText('c', cc.mapX(cr) + 9, cc.mapY(ci) - 7);
                }
                if (mode === 'JULIA') {
                    ctx.fillText('z₀', cc.mapX(z0x) + 9, cc.mapY(z0y) + 17);
                } else {
                    ctx.fillText('z₀', cc.mapX(0) + 9, cc.mapY(0) + 17);
                }

                if (orbitScanActive) {
                    const scanIters = Math.min(8192, fractalShaderTargetMaxIter());
                    const stepsPf = 132;
                    for (let s = 0; s < stepsPf && orbitScanActive && orbitScanIy < orbitScanRows; ) {
                        const { sx, sy } = orbitScanPixelToComplex(cc);
                        orbitScanProbeCx = sx;
                        orbitScanProbeCy = sy;
                        let hudMagR2 = sx * sx + sy * sy;
                        let probe;
                        if (mode === 'MANDELBROT') {
                            if (orbitMbScanCheapExterior(sx, sy)) {
                                probe = { stable: false };
                            } else {
                                probe = orbitProbeStableWithFinalR2(sx, sy, 0, 0, scanIters);
                                if (probe.stable) hudMagR2 = probe.finalR2;
                                else hudMagR2 = probe.escapeR2 ?? hudMagR2;
                            }
                        } else {
                            const jq = orbitJuliaQuickExteriorResult(juliaX, juliaY, sx, sy);
                            if (jq.escaped) {
                                probe = { stable: false };
                                hudMagR2 = jq.escapeR2 ?? hudMagR2;
                            } else {
                                probe = orbitProbeStableWithFinalR2(juliaX, juliaY, sx, sy, scanIters);
                                if (probe.stable) hudMagR2 = probe.finalR2;
                                else hudMagR2 = probe.escapeR2 ?? hudMagR2;
                            }
                        }
                        orbitScanHudMagR2 = hudMagR2;
                        const cellKey = orbitScanIx + ',' + orbitScanIy;
                        if (probe.stable && !orbitScanStableKeys.has(cellKey)) {
                            orbitScanStableKeys.add(cellKey);
                            orbitScanStableHits.push({ x: sx, y: sy, finalR2: probe.finalR2 });
                        }
                        orbitScanVisitSerial++;
                        orbitScanAdvanceTopDown();
                        s++;

                        while (
                            mode === 'MANDELBROT' &&
                            s < stepsPf &&
                            orbitScanActive &&
                            orbitScanIy < orbitScanRows
                        ) {
                            const p = orbitScanPixelToComplex(cc);
                            const cheapDead = orbitMbScanCheapExterior(p.sx, p.sy);
                            if (!cheapDead) break;
                            orbitScanProbeCx = p.sx;
                            orbitScanProbeCy = p.sy;
                            orbitScanHudMagR2 = p.sx * p.sx + p.sy * p.sy;
                            orbitScanVisitSerial++;
                            orbitScanAdvanceTopDown();
                            s++;
                        }
                    }
                }

                drawOrbitScanStableHits(cc, ctx);

                if (orbitScanActive) {
                    const px = cc.mapX(orbitScanProbeCx);
                    const py = cc.mapY(orbitScanProbeCy);
                    ctx.save();
                    ctx.fillStyle = '#e53935';
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.88)';
                    ctx.lineWidth = 1.2;
                    ctx.beginPath();
                    ctx.arc(px, py, 6.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.restore();
                }

                syncOrbitHud();
                syncMbOrbitStableCountPanel();
                syncMbFractalFormulaOverlay();
                const orbitDrawDt = performance.now() - orbitDrawT0;
                orbitHudFrameMsSmooth =
                    orbitHudFrameMsSmooth > 0
                        ? orbitHudFrameMsSmooth * 0.82 + orbitDrawDt * 0.18
                        : orbitDrawDt;
            }

            function setupOrbitCyberCanvas() {
                teardownOrbitCyberCanvas();
                orbitFractalViewportSyncKey = '';
                CyberCanvasInstance.init('orbit-canvas', {}, {
                    showTelemetry: false,
                    showAxes: true,
                    showLabels: true,
                    showGrid: true,
                });
                CyberCanvasInstance.onResize = drawOrbitPlane;

                function orbitPickDragTarget(mx, my) {
                    let cr;
                    let ci;
                    let z0x_;
                    let z0y_;
                    if (mode === 'MANDELBROT') {
                        z0x_ = 0;
                        z0y_ = 0;
                        cr = centerX;
                        ci = centerY;
                    } else {
                        z0x_ = centerX;
                        z0y_ = centerY;
                        cr = juliaX;
                        ci = juliaY;
                    }
                    const pxPerUnit = CyberCanvasInstance.width / (CyberCanvasInstance.view.maxX - CyberCanvasInstance.view.minX);
                    const tol = 14 / pxPerUnit;
                    const dc = Math.hypot(mx - cr, my - ci);
                    const dz = Math.hypot(mx - z0x_, my - z0y_);
                    if (mode === 'MANDELBROT') {
                        if (orbitScanActive) return null;
                        return dc < tol ? 'c' : null;
                    }
                    if (orbitScanActive) {
                        return dz < tol ? 'z0' : null;
                    }
                    if (dc < tol && dz < tol) return dc <= dz ? 'c' : 'z0';
                    if (dc < tol) return 'c';
                    if (dz < tol) return 'z0';
                    return null;
                }

                CyberCanvasInstance.onMouseDown = (pos) => {
                    orbitCanvasDrag = orbitPickDragTarget(pos.x, pos.y);
                    if (orbitCanvasDrag) CyberCanvasInstance.allowPan = false;
                };
                CyberCanvasInstance.onMouseMove = (pos) => {
                    if (!orbitCanvasDrag) return;
                    if (orbitCanvasDrag === 'c') {
                        if (mode === 'MANDELBROT') {
                            centerX = pos.x;
                            centerY = pos.y;
                            juliaX = centerX;
                            juliaY = centerY;
                            updateSliderMountVisual('jx-mount', Math.round(juliaX * 1000));
                            updateSliderMountVisual('jy-mount', Math.round(juliaY * 1000));
                        } else {
                            juliaX = pos.x;
                            juliaY = pos.y;
                            updateSliderMountVisual('jx-mount', Math.round(juliaX * 1000));
                            updateSliderMountVisual('jy-mount', Math.round(juliaY * 1000));
                        }
                    } else {
                        centerX = pos.x;
                        centerY = pos.y;
                    }
                    CyberCanvasInstance.needsRedraw = true;
                };
                CyberCanvasInstance.onMouseUp = () => {
                    if (!orbitCanvasDrag) return;
                    const was = orbitCanvasDrag;
                    orbitCanvasDrag = null;
                    CyberCanvasInstance.allowPan = true;
                    if (was === 'c') {

                            juliaX = centerX;
                            juliaY = centerY;
                            updateSliderMountVisual('jx-mount', Math.round(juliaX * 1000));
                            updateSliderMountVisual('jy-mount', Math.round(juliaY * 1000));
                        } else {
                            updateSliderMountVisual('jx-mount', Math.round(juliaX * 1000));
                            updateSliderMountVisual('jy-mount', Math.round(juliaY * 1000));
                        }
                    }
                    schedulePersistMandelbrotFractalState();
                };

                CyberCanvasInstance.onContextMenu = (e) => {
                    CyberUI.showContextMenu(e.clientX, e.clientY, [
                        {
                            label: CyberI18n.get('fractal.reset'),

                                orbitScanClearAndRestartGrid(CyberCanvasInstance);
                            },
                        },
                        { divider: true },
                        {
                            label: CyberI18n.get('ui.show_axes'),
                            checked: CyberCanvasInstance.showAxes,
                            onchange: (v) => {

                            },
                        },
                        {
                            label: CyberI18n.get('ui.show_labels'),
                            checked: CyberCanvasInstance.showLabels,

                        },
                        {
                            label: CyberI18n.get('fractal.orbit_grid'),
                            checked: CyberCanvasInstance.showGrid,
                            onchange: (v) => {
                                CyberCanvasInstance.showGrid = v;

                        },
                        {
                            label: CyberI18n.get('fractal.orbit_connector_lines'),

                                orbitShowConnectorLines = !!v;
