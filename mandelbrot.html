        .orbit-view-wrap {

    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 position;
        void main() { gl_Position = vec4(position, 0.0, 1.0); }
    </script>
    <script id="fs" type="x-shader/x-fragment">
        precision highp float;
        uniform vec2 u_res;
        uniform vec2 u_center;
        uniform float u_zoom;
        uniform int u_max_iter;
        uniform vec2 u_julia_c;
        uniform float u_time;
        uniform int u_julia;
        void main() {
            vec3 color = vec3(0.0);
            vec2 uv = (gl_FragCoord.xy - 0.5 * u_res) / min(u_res.x, u_res.y);
            float zm = min(max(u_zoom, 1e-8), 200000.0);
            float sc = 3.0 / zm;
            vec2 z, c;
            if (u_julia == 1) {
                z = u_center + uv * sc;
                c = u_julia_c;
            } else {
                z = vec2(0.0);
                c = u_center + uv * sc;
            }
            int iter = 0;
            bool escaped = false;
            for (int k = 0; k < 768; k++) {
                if (k >= u_max_iter) break;
                if (dot(z, z) > 4.0) { escaped = true; iter = k; break; }
                z = vec2(z.x * z.x - z.y * z.y, 2.0 * z.x * z.y) + c;
            }
            if (escaped) {
                float sn = float(iter) - log2(max(1.0, log2(length(z))));
                /* Langsame Farbmodulation: weniger Shimmer/Flicker beim Zoomen als mit starkem u_time-Koeffizienten */
                float r = 0.5 + 0.5 * cos(3.0 + sn * 0.15 + u_time * 0.12);
                float g = 0.5 + 0.5 * cos(2.0 + sn * 0.15 + u_time * 0.12);
                float b = 0.5 + 0.5 * cos(1.0 + sn * 0.15 + u_time * 0.12);
                color = vec3(r, g, b);
            }
            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <script>
(function () {
        'use strict';

        window.toggleSidebar = function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
            setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 400);
        };

        /** Mandelbrot/Julia: komplexe Iteration (gleiche Logik wie im Fragment-Shader). */
        function renderMbFractalFormula() {
            const el = document.getElementById('mb-fractal-formula-tex');
            if (!el) return;
            const tex = 'z_{n+1} = z_n^{2} + c\\quad z_n,\\, c \\in \\mathbb{C}';
            if (typeof katex !== 'undefined') {
                katex.render(tex, el, { throwOnError: false, displayMode: true });
            } else {
                el.textContent = 'z_{n+1} = z_n² + c  z_n, c ∈ ℂ';
                el.style.cssText = 'font-family:Orbitron,sans-serif;font-size:1.28rem;line-height:1.2;color:#f2bb44;text-align:center;text-shadow:0 0 12px rgba(242,187,68,0.4);';
            }
        }

        /**
         * Panel-Look erzwingen:
         * - Inline !important am #side-panel schlägt jedes Stylesheet.
         * - <style> ans Ende von document.body (nach cyber-ui-dynamic im <head>).
         * - Nach Frames/Timeouts erneut (falls Module später noch Styles nachladen).
         */
        const FRACTAL_PANEL_STYLE_ID = 'mandelbrot-html-panel-authority';

        function injectFractalPanelAuthority() {
            const panel = document.getElementById('side-panel');
            if (panel) {
                panel.style.setProperty('background', 'rgba(10, 20, 36, 0.75)', 'important');
                panel.style.setProperty('border', 'none', 'important');
                panel.style.setProperty('border-right', '1px solid rgba(0, 210, 255, 0.28)', 'important');
                panel.style.setProperty('backdrop-filter', 'blur(28px)', 'important');
            }

            const id = FRACTAL_PANEL_STYLE_ID;
            let el = document.getElementById(id);
            if (!el) {
                el = document.createElement('style');
                el.id = id;
            }
            el.textContent = `
#side-panel:not(.collapsed) {
    width: 360px !important;
    min-width: 360px !important;
}
#side-panel {
    align-items: stretch !important;
    background: rgba(10, 20, 36, 0.75) !important;
    border: none !important;
    border-right: 1px solid rgba(0, 210, 255, 0.28) !important;
    backdrop-filter: blur(28px) !important;
}
#side-panel #ui-container {
    width: 100% !important;
    max-width: none !important;
    align-self: stretch !important;
}
#side-panel .instrument-card {
    width: 100% !important;
    max-width: none !important;
    box-sizing: border-box !important;
    background: rgba(255, 255, 255, 0.055) !important;
    border-color: rgba(0, 210, 255, 0.32) !important;
    box-shadow: 0 0 18px rgba(0, 180, 220, 0.07) !important;
}
#side-panel .instrument-title {
    color: rgba(0, 210, 255, 0.92) !important;
    text-shadow: 0 0 12px rgba(0, 210, 255, 0.35) !important;
}
#side-panel .fraktal-seg-row {
    display: flex !important;
    gap: 8px !important;
    flex-wrap: wrap !important;
    margin: 0 !important;
    width: 100% !important;
    box-sizing: border-box !important;
}
#side-panel .fraktal-seg-btn {
    flex: 1 1 0 !important;
    min-width: 118px !important;
    box-sizing: border-box !important;
    margin: 0 !important;
    padding: 8px 10px !important;
    min-height: 0 !important;
    font-family: Orbitron, sans-serif !important;
    font-size: 0.72rem !important;
    font-weight: 600 !important;
    letter-spacing: 0.08em !important;
    text-transform: uppercase !important;
    line-height: 1.2 !important;
    border-radius: 10px !important;
    cursor: pointer !important;
    outline: none !important;
    background: rgba(16, 30, 52, 0.9) !important;
    border: 1px solid rgba(90, 200, 230, 0.38) !important;
    color: #d4eefc !important;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s !important;
}
#side-panel .fraktal-seg-btn:hover:not(:disabled) {
    border-color: rgba(120, 220, 255, 0.55) !important;
    background: rgba(20, 38, 62, 0.95) !important;
}
#side-panel .fraktal-seg-btn.is-active {
    border-color: rgba(0, 210, 255, 0.9) !important;
    box-shadow: 0 0 16px rgba(0, 210, 255, 0.3) !important;
    color: #f0fdff !important;
    background: rgba(0, 210, 255, 0.14) !important;
}
#side-panel .fraktal-seg-btn:disabled {
    opacity: 0.55 !important;
    cursor: not-allowed !important;
}
#side-panel .stats-grid.fraktal-readouts {
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) !important;
    gap: 8px !important;
    margin-top: 12px !important;
}
#side-panel .fraktal-readouts .stats-card {
    min-width: 0 !important;
    min-height: 0 !important;
    padding: 12px !important;
    align-items: stretch !important;
}
#side-panel .fraktal-readouts .stats-card:last-child:nth-child(3) {

}
#side-panel .fraktal-readouts .stats-label {
    font-size: 0.55rem !important;

            `.trim();
            document.body.appendChild(el);
        }

        function scheduleFractalPanelAuthority() {
            injectFractalPanelAuthority();
            requestAnimationFrame(() => {
                injectFractalPanelAuthority();
                queueMicrotask(injectFractalPanelAuthority);
            });
            setTimeout(injectFractalPanelAuthority, 50);
            setTimeout(injectFractalPanelAuthority, 250);
        }

        window.addEventListener('load', () => {
            if (window.__forloopMandelbrotHtmlInit) return;
            window.__forloopMandelbrotHtmlInit = true;
            try {
                CyberBranding.init({ useExternalStyles: true, title: CyberI18n.get('ui.coach_title'), subtitle: CyberI18n.get('fractal.title') });
            } catch (e) {
                console.warn('CyberBranding.init', e);
            }
            try {
                CyberUI.init();
            } catch (e) {
                console.warn('CyberUI.init', e);
            }
            scheduleFractalPanelAuthority();
            renderMbFractalFormula();
            const canvas = document.getElementById('canvas'), gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });
            /** Standard: Orbit-Ebene (CyberCanvas); FRACTAL = WebGL-Ansicht */
            let mainPlane = 'ORBIT';
            let orbitRedrawTimer = null;
            let fractalRenderPaused = true;
            /** Orbit-Ebene: 'c' | 'z0' | null — Punkt ziehen vs. Pan */
            let orbitCanvasDrag = null;
            const ORBIT_DRAW_STEPS_MIN = 1;
            const ORBIT_DRAW_STEPS_MAX = 56;
            /** Anzahl gezeichneter Orbit-Schritte (↑/↓ nur in Orbit-Ansicht) */
            let orbitDrawStepsCap = 22;
            /** Verbindungslinien zwischen Orbit-Punkten */
            let orbitShowConnectorLines = true;

            /** Orbit-Ansicht Leertaste: Raster über sichtbare Ebene; orange = Orbit bleibt begrenzt */
            let orbitScanActive = false;
            let orbitScanCols = 32;
            let orbitScanRows = 32;
            let orbitScanIx = 0;
            let orbitScanIy = 0;
            let orbitScanProbeCx = 0;
            let orbitScanProbeCy = 0;
            /** Laufende Scan-Zelle entlang Pfad — alle N Schritte Overlay-Bitmap neu */
            let orbitScanVisitSerial = 0;
            const orbitScanStableHits = [];
            const orbitScanStableKeys = new Set();
            /** Eigenes RAF während Scan — CyberCanvas setzt nach Render immer needsRedraw=false */
            let orbitScanAnimRaf = null;
            /** Bitmap nur alle N Raster-Schritte neu aus Hits zeichnen (alle Hits bleiben erhalten) */
            let orbitScanHitsCanvas = null;
            let orbitScanHitsCtx = null;
            /** Oberes und unteres Viertel der Orbit-Ansicht wird nicht abgetastet */
            const ORBIT_SCAN_Y_MARGIN_FRAC = 0.25;
            /** Overlay-Bitmap neu rendern alle N Scan-Schritte */
            const ORBIT_SCAN_OVERLAY_REBUILD_EVERY_STEPS = 4;

            const LS_MB_MAIN_PLANE = 'forloop.mandelbrot.mainPlane';
            const LS_MB_ORBIT_STEPS = 'forloop.mandelbrot.orbitDrawStepsCap';
            const LS_MB_ORBIT_LINES = 'forloop.mandelbrot.orbitShowConnectorLines';

            function persistMandelbrotMainPlane() {
                try {
                    localStorage.setItem(LS_MB_MAIN_PLANE, mainPlane);
                } catch (e) {
                    /* ignore */
                }
            }

            function persistMandelbrotOrbitSteps() {
                try {
                    localStorage.setItem(LS_MB_ORBIT_STEPS, String(orbitDrawStepsCap));
                } catch (e) {
                    /* ignore */
                }
            }

            function persistMandelbrotOrbitConnectorLines() {
                try {
                    localStorage.setItem(LS_MB_ORBIT_LINES, orbitShowConnectorLines ? '1' : '0');
                } catch (e) {
                    /* ignore */
                }
            }

            /** Liest gespeicherte Orbit-Schritte; Rückgabe: gespeicherte Ansicht oder null */
            function loadMandelbrotPersist() {
                try {
                    const steps = localStorage.getItem(LS_MB_ORBIT_STEPS);
                    if (steps != null) {
                        const n = parseInt(steps, 10);
                        if (Number.isFinite(n)) {
                            orbitDrawStepsCap = Math.max(
                                ORBIT_DRAW_STEPS_MIN,
                                Math.min(ORBIT_DRAW_STEPS_MAX, n)
                            );
                        }
                    }
                    const plane = localStorage.getItem(LS_MB_MAIN_PLANE);
                    const lines = localStorage.getItem(LS_MB_ORBIT_LINES);
                    if (lines === '0') orbitShowConnectorLines = false;
                    else if (lines === '1') orbitShowConnectorLines = true;
                    return plane === 'FRACTAL' || plane === 'ORBIT' ? plane : null;
                } catch (e) {
                    return null;
                }
            }

            if (!gl) return;

            function orbitProbeBounded(cr, ci, z0x, z0y, maxSteps) {
                let zx = z0x;
                let zy = z0y;
                for (let i = 0; i < maxSteps; i++) {
                    if (zx * zx + zy * zy > 4) return false;
                    const nx = zx * zx - zy * zy + cr;
                    const ny = 2 * zx * zy + ci;
                    zx = nx;
                    zy = ny;
                }
                return zx * zx + zy * zy <= 4;
            }

            function orbitScanRebuildGrid(cc) {
                const cellPx = 1;
                orbitScanCols = Math.min(560, Math.max(32, Math.floor(cc.width / cellPx)));
                const fullRows = Math.min(560, Math.max(32, Math.floor(cc.height / cellPx)));
                const chop = Math.floor(fullRows * ORBIT_SCAN_Y_MARGIN_FRAC);
                orbitScanRows = Math.max(4, fullRows - 2 * chop);
                orbitScanIx = 0;
                orbitScanIy = 0;
                orbitScanStableHits.length = 0;
                orbitScanStableKeys.clear();
                orbitScanVisitSerial = 0;
                orbitScanProbeCx = cc.view.minX;
                const vy = cc.view.maxY - cc.view.minY;
                orbitScanProbeCy = cc.view.maxY - ORBIT_SCAN_Y_MARGIN_FRAC * vy;
                rebuildOrbitScanStableHitsLayer(cc);
            }

            function ensureOrbitScanHitsLayer(cc) {
                if (
                    !orbitScanHitsCanvas ||
                    orbitScanHitsCanvas.width !== cc.width ||
                    orbitScanHitsCanvas.height !== cc.height
                ) {
                    orbitScanHitsCanvas = document.createElement('canvas');

                    orbitScanHitsCanvas.height = cc.height;

            function drawOrbitPlane() {

            function zoomDepthLogUnit(z) {
                if (!Number.isFinite(z) || z <= 1) return 0;
                return Math.min(1, Math.log(z) / Math.log(ZOOM_MAX));
            }

            /**
             * Rad: Dämpfung ~ u³ in Log-Tiefe u → hoher Zoom (200k→10k) spürbar langsamer,
             * unten am Limit noch ~4,5 % der Basis-Schrittweite.
             */
            function deepZoomWheelDamp(zoomBefore) {
                const u = zoomDepthLogUnit(zoomBefore);
                if (u <= 0) return 1;
                const MIN_DAMP = 0.045;
                return 1 - (1 - MIN_DAMP) * u * u * u;
            }

            /** Kurze Resets bei Maus-Zoom (wenig Log-Spanne), lange ab Flight-Zeiler (bis ZOOM_MAX). */
            function computeResetDurationMs(fromZ, toZ) {
                const lnFrom = Math.log(Math.max(1, fromZ));
                const lnTo = Math.log(Math.max(1, toZ));
                const span = Math.max(0, lnFrom - lnTo);
                const ref = Math.log(ZOOM_MAX);
                const t = ref > 0 ? Math.min(1, span / ref) : 0;
                return Math.round(RESET_ANIM_MS_MIN + (RESET_ANIM_MS_MAX - RESET_ANIM_MS_MIN) * t);
            }

            function abortResetAnim() {
                if (!resetAnim) return;
                resetAnim = null;
                const br = document.getElementById('btn-reset');
                if (br) br.disabled = false;
            }

            function updateSliderMountVisual(mountId, numericValue) {
                const inp = document.querySelector('#' + mountId + ' input.cyber-slider');
                if (!inp) return;
                const str = String(Math.round(numericValue));
                inp.value = str;
                const disp = document.querySelector('#' + mountId + ' .val-display');
                if (disp) disp.textContent = str;
            }

            function onFlightMouseSync(e) {
                if (!isFlight) return;
                const p = canvasPixelFromClient(e.clientX, e.clientY);
                flightMouseCanvasX = p.mx;
                flightMouseCanvasY = p.my;
            }

            function tickResetAnim() {
                if (!resetAnim) return;
                const dur = resetAnim.durationMs;
                const rawT = Math.min(1, (performance.now() - resetAnim.t0) / dur);
                const f = resetAnim.from;
                const to = resetAnim.to;
                /** Zoom: ease-out. Bei starkem seitlichen Versatz Pan zeitlich entkoppeln (ease-in-out),
                 * sonst wirken Center und Log-Zoom gekoppelt wie ein Wisch durch irrelevante Regionen. */
                const ez = easeOutCubic(rawT);
                const sCan = Math.min(canvas.width, canvas.height);
                const z0 = Math.max(1e-300, f.zoom);
                const z1 = Math.max(1e-300, to.zoom);
                const zMid = Math.sqrt(z0 * z1);
                const cell = 3 / (zMid * Math.max(1, sCan));
                const nd = Math.hypot(canvas.width, canvas.height) / (2 * Math.max(1, sCan));
                const viewDiagC = cell * nd;
                const dc = Math.hypot(to.cx - f.cx, to.cy - f.cy);
                const tinyPan = dc < viewDiagC * 0.065;
                const ep = tinyPan ? ez : easeInOutCubic(rawT);
                centerX = lerp(f.cx, to.cx, ep);
                centerY = lerp(f.cy, to.cy, ep);
                if (f.zoom > 0 && to.zoom > 0 && Number.isFinite(f.zoom) && Number.isFinite(to.zoom)) {
                    zoom = Math.exp(lerp(Math.log(f.zoom), Math.log(to.zoom), ez));
                } else {
                    zoom = lerp(f.zoom, to.zoom, ez);
                }
                zoom = clampZoom(zoom);
                juliaX = lerp(f.jx, to.jx, ep);
                juliaY = lerp(f.jy, to.jy, ep);
                maxIter = Math.max(32, Math.min(256, Math.round(lerp(f.mi, to.mi, ep))));
                updateSliderMountVisual('jx-mount', juliaX * 1000);
                updateSliderMountVisual('jy-mount', juliaY * 1000);
                updateSliderMountVisual('iter-mount', maxIter);

                if (rawT >= 1) {
                    centerX = to.cx; centerY = to.cy; zoom = to.zoom;
                    juliaX = to.jx; juliaY = to.jy; maxIter = to.mi;
                    const clearFlight = resetAnim.clearFlightSnapshotOnDone;
                    resetAnim = null;
                    const br = document.getElementById('btn-reset');
                    if (br) br.disabled = false;
                    if (clearFlight) flightSnapshot = null;
                    setRangeInMount('jx-mount', Math.round(to.jx * 1000));
                    setRangeInMount('jy-mount', Math.round(to.jy * 1000));
                    setRangeInMount('iter-mount', to.mi);
                }
            }

            function setRangeInMount(mountId, value) {
                const inp = document.querySelector('#' + mountId + ' input.cyber-slider');
                if (!inp) return;
                inp.value = String(value);
                inp.dispatchEvent(new Event('input', { bubbles: true }));
            }

            function formatZoomFactor(z) {
                if (!Number.isFinite(z) || z <= 0) return '1,000';
                return z.toLocaleString('de-DE', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
            }

            function syncFraktalReadouts() {
                const d = document.getElementById('readout-detail');
                const zEl = document.getElementById('readout-zoom');
                const p = document.getElementById('readout-prec');
                if (d) {
                    d.textContent =
                        lastEffectiveMaxIter > maxIter
                            ? `${maxIter}→${lastEffectiveMaxIter}`
                            : String(maxIter);
                }
                if (zEl) zEl.textContent = formatZoomFactor(zoom);
                if (p) p.textContent = GPU_MATH_LABEL;
            }

            function resetView() {
                isFlight = false;
                time = 0;
                if (mode === 'JULIA') {
                    document.getElementById('btn-mode-j').classList.add('is-active');
                    document.getElementById('btn-mode-m').classList.remove('is-active');
                } else {
                    document.getElementById('btn-mode-m').classList.add('is-active');
                    document.getElementById('btn-mode-j').classList.remove('is-active');
                }
                const bf = document.querySelector('#side-panel #btn-flight');
                if (bf) {
                    bf.innerText = CyberI18n.get('fractal.flight_start');
                    bf.classList.remove('is-active');
                }
                zoom = clampZoom(zoom);
                let to;
                let clearFlightSnapshotOnDone = false;
                if (flightSnapshot !== null) {
                    to = {
                        cx: flightSnapshot.cx,
                        cy: flightSnapshot.cy,
                        zoom: flightSnapshot.zoom,
                        jx: flightSnapshot.jx,
                        jy: flightSnapshot.jy,
                        mi: flightSnapshot.mi
                    };
                    clearFlightSnapshotOnDone = true;
                } else {
                    to = (mode === 'JULIA')
                        ? { cx: DEF_JL_CENTER_X, cy: DEF_JL_CENTER_Y, zoom: DEF_JL_ZOOM, jx: DEF_JULIA_X, jy: DEF_JULIA_Y, mi: DEF_MAX_ITER }
                        : { cx: DEF_MB_CENTER_X, cy: DEF_MB_CENTER_Y, zoom: DEF_MB_ZOOM, jx: DEF_JULIA_X, jy: DEF_JULIA_Y, mi: DEF_MAX_ITER };
                }
                const from = { cx: centerX, cy: centerY, zoom, jx: juliaX, jy: juliaY, mi: maxIter };
                resetAnim = {
                    t0: performance.now(),
                    from,
                    to,
                    durationMs: computeResetDurationMs(from.zoom, to.zoom),
                    clearFlightSnapshotOnDone
                };
                const br = document.getElementById('btn-reset');
                if (br) br.disabled = true;
            }

            const arrowPngSaver = ForloopCanvasPng.createSequentialCanvasPngSaver(canvas, {
                stem: 'mandelbrot-zoom-step',
            });

            function drawFractalOnly() {
                gl.viewport(0, 0, canvas.width, canvas.height);
                gl.bindFramebuffer(gl.FRAMEBUFFER, null);
                gl.useProgram(prg);
                gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
                gl.enableVertexAttribArray(pos);
                gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
                gl.uniform2f(uRes, canvas.width, canvas.height);
                gl.uniform2f(uCenter, centerX, centerY);
                gl.uniform1f(uZoom, zoom);
                gl.uniform1i(uMaxIter, lastEffectiveMaxIter);
                gl.uniform2f(uJuliaC, juliaX, juliaY);
                gl.uniform1f(uTime, time);
                gl.uniform1i(uJulia, mode === 'JULIA' ? 1 : 0);
                gl.drawArrays(gl.TRIANGLES, 0, 6);
            }

            async function captureScreenshotAfterArrowZoom() {
                await arrowPngSaver.captureNext();
            }

            /**
             * Ein Zoom-Schritt wie Auto-Flight: gleiche rel = 0.005·TICK·head, head = 1 − zoomDepthLogUnit.
             * zoomIn false → exakt invers zum selben rel (ein Flug-Tick zurück).
             */
            function stepZoomFlightLike(mx, my, cw, ch, zoomIn) {
                const zb = clampZoom(zoom);
                if (cw <= 0 || ch <= 0 || !Number.isFinite(zb) || zb <= 0) return;
                const u = zoomDepthLogUnit(zb);
                const head = 1 - u;
                const rel = 0.005 * TICK_VS_LEGACY_60HZ * head;
                const { fX, fY } = focalPlaneUnderCanvasPixel(mx, my, cw, ch, zb, centerX, centerY);
                let next = zoomIn ? zb * (1 + rel) : zb / (1 + rel);
                if (zoomIn && next >= ZOOM_MAX) next = ZOOM_MAX;
                zoom = clampZoom(next);
                const nc = centerKeepingFocalPlane(mx, my, cw, ch, zoom, fX, fY);
                centerX = nc.cx;
                centerY = nc.cy;
            }

            function render(now) {
                requestAnimationFrame(render);
                if (fractalRenderPaused) return;
                const ts = typeof now === 'number' ? now : performance.now();

                if (lastRenderFrameTs !== 0 && ts - lastRenderFrameTs < RENDER_FRAME_MS) return;
                lastRenderFrameTs = ts;

                const w = canvas.clientWidth, h = canvas.clientHeight;
                if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; gl.viewport(0, 0, w, h); }
                zoom = clampZoom(zoom);
                if (resetAnim) tickResetAnim();
                else if (isFlight) {
                    /* Auto-Zoom wie Rad-Zoom: gleicher Weltpunkt unter dem Cursor bleibt stabil (flightMouse = Pointer). */
                    const cw = canvas.width;
                    const ch = canvas.height;
                    const s = Math.min(cw, ch);
                    const mx = flightMouseCanvasX != null ? flightMouseCanvasX : cw / 2;
                    const my = flightMouseCanvasY != null ? flightMouseCanvasY : ch / 2;

                    if (zoom >= ZOOM_MAX) {
                        zoom = ZOOM_MAX;
                        stopFlightUi();
                    } else if (s > 0 && Number.isFinite(zoom) && zoom > 0) {
                        stepZoomFlightLike(mx, my, cw, ch, true);
                        if (zoom >= ZOOM_MAX) stopFlightUi();
                    }
                    zoom = clampZoom(zoom);
                }
                zoom = clampZoom(zoom);
                if (isFlight && zoom >= ZOOM_MAX) stopFlightUi();

                zoom = clampZoom(zoom);
                const depthU = zoomDepthLogUnit(zoom);
                const boostF = (512 - maxIter) * 0.9 * depthU;
                const targetIter = Math.min(512, Math.max(32, maxIter + boostF));
                const tau = 0.14 * TICK_VS_LEGACY_60HZ;
                smoothEffectiveMaxIter += (targetIter - smoothEffectiveMaxIter) * tau;
                smoothEffectiveMaxIter = Math.min(512, Math.max(32, smoothEffectiveMaxIter));
                lastEffectiveMaxIter = Math.round(smoothEffectiveMaxIter);

                time += 0.004 * TICK_VS_LEGACY_60HZ;

                drawFractalOnly();
                syncFraktalReadouts();
            }

            CyberUI.createCard('ui-container', CyberI18n.get('fractal.mode'), `
                <div class="fraktal-seg-row">
                    <button type="button" id="btn-mode-m" class="fraktal-seg-btn">${CyberI18n.get('fractal.mandelbrot')}</button>
                    <button type="button" id="btn-mode-j" class="fraktal-seg-btn">${CyberI18n.get('fractal.julia')}</button>
                </div>
                <div style="margin:14px 0 6px;font-size:0.65rem;letter-spacing:0.14em;color:rgba(180,210,235,0.82);">${CyberI18n.get('fractal.display')}</div>
                <div class="fraktal-seg-row">
                    <button type="button" id="btn-plane-fractal" class="fraktal-seg-btn">${CyberI18n.get('fractal.plane_fractal')}</button>
                    <button type="button" id="btn-plane-orbit" class="fraktal-seg-btn is-active">${CyberI18n.get('fractal.plane_orbit')}</button>
                </div>
            `, 'var(--neon-blue)');

            CyberUI.createCard('ui-container', CyberI18n.get('fractal.params'), `
                <div id="jx-mount"></div>
                <div id="jy-mount" style="margin-top:2px;"></div>
                <div id="iter-mount" style="margin-top:2px;"></div>
                <div id="fraktal-readouts-mount" class="stats-grid fraktal-readouts">
                    <div class="stats-card">
                        <span class="stats-label">${CyberI18n.get('fractal.detail')}</span>
                        <span id="readout-detail" class="stats-val">256</span>
                    </div>
                    <div class="stats-card">
                        <span class="stats-label">${CyberI18n.get('fractal.zoom')}</span>
                        <span id="readout-zoom" class="stats-val">1,000</span>
                    </div>
                    <div class="stats-card">
                        <span class="stats-label">${CyberI18n.get('fractal.arithmetic')}</span>
                        <span id="readout-prec" class="stats-val">Float32 / Pixel</span>
                    </div>
                </div>
            `, 'var(--neon-blue)');

            CyberUI.createSlider('jx-mount', CyberI18n.get('fractal.real'), -2000, 2000, -800, 1, (v) => {
                abortResetAnim();
                juliaX = v / 1000;
            }, 'var(--neon-blue)');

            CyberUI.createSlider('jy-mount', CyberI18n.get('fractal.imaginary'), -2000, 2000, 156, 1, (v) => {
                abortResetAnim();
                juliaY = v / 1000;
            }, 'var(--neon-blue)');

            CyberUI.createSlider('iter-mount', CyberI18n.get('fractal.iterations'), 32, 256, 256, 1, (v) => {
                abortResetAnim();
                maxIter = parseInt(v, 10);
                const u = zoomDepthLogUnit(zoom);
                smoothEffectiveMaxIter = Math.min(512, Math.max(32, maxIter + (512 - maxIter) * 0.9 * u));
            }, 'var(--neon-blue)');

            CyberUI.createCard('ui-container', CyberI18n.get('fractal.navigation'), `
                <div class="fraktal-seg-row">
                    <button type="button" id="btn-flight" class="fraktal-seg-btn">${CyberI18n.get('fractal.flight_start')}</button>
                    <button type="button" id="btn-reset" class="fraktal-seg-btn">${CyberI18n.get('fractal.reset')}</button>
                </div>
                <div class="fraktal-seg-row" style="margin-top:8px;">
                    <button type="button" id="btn-screenshot-folder" class="fraktal-seg-btn">PNG-Ordner (z. B. Desktop)</button>
                </div>
            `, 'var(--neon-blue)');

            document.getElementById('btn-mode-m').onclick = () => {
                mode = 'MANDELBROT';
                document.getElementById('btn-mode-m').classList.add('is-active');
                document.getElementById('btn-mode-j').classList.remove('is-active');
            };
            document.getElementById('btn-mode-j').onclick = () => {
                mode = 'JULIA';
                document.getElementById('btn-mode-j').classList.add('is-active');
                document.getElementById('btn-mode-m').classList.remove('is-active');
            };
            if (mode === 'JULIA') {
                document.getElementById('btn-mode-j').classList.add('is-active');
                document.getElementById('btn-mode-m').classList.remove('is-active');
            } else {
                document.getElementById('btn-mode-m').classList.add('is-active');
                document.getElementById('btn-mode-j').classList.remove('is-active');
            }

            document.getElementById('btn-plane-fractal').onclick = () => setMainPlane('FRACTAL');
            document.getElementById('btn-plane-orbit').onclick = () => setMainPlane('ORBIT');

            const btnFlightEl = document.querySelector('#side-panel #btn-flight');
            if (btnFlightEl) {
                btnFlightEl.onclick = () => {
                    if (mainPlane !== 'FRACTAL') return;
                    isFlight = !isFlight;
                    btnFlightEl.innerText = isFlight ? CyberI18n.get('fractal.flight_stop') : CyberI18n.get('fractal.flight_start');
                    btnFlightEl.classList.toggle('is-active', isFlight);
                    if (isFlight) {
                        flightSnapshot = {
                            cx: centerX, cy: centerY, zoom: clampZoom(zoom),
                            jx: juliaX, jy: juliaY, mi: maxIter
                        };
                        const w = canvas.width, h = canvas.height;
                        flightMouseCanvasX = w > 0 ? w / 2 : null;
                        flightMouseCanvasY = h > 0 ? h / 2 : null;
                        isDrag = false;
                    }
                };
            }

            const btnScreenshotFolder = document.getElementById('btn-screenshot-folder');
            if (btnScreenshotFolder) {
                if (typeof window.showDirectoryPicker !== 'function') {
                    btnScreenshotFolder.disabled = true;
                    btnScreenshotFolder.title =
                        'Chrome/Edge über http://localhost: ohne Ordnerpicker nur Browser-Download → meist Ordner „Downloads“.';
                } else {
                    btnScreenshotFolder.title =
                        'Ordner wählen (Dialog startet am Desktop). Ohne Auswahl landen ↑/↓-PNG im Download-Ordner.';
                    btnScreenshotFolder.addEventListener('click', async () => {
                        try {
                            await arrowPngSaver.pickWritableFolder();
                            btnScreenshotFolder.textContent = 'PNG-Ordner ✓ (Desktop o.ä.)';
                            btnScreenshotFolder.classList.add('is-active');
                        } catch (e) {
                            if (e.name !== 'AbortError') console.warn('Ordnerwahl', e);
                        }
                    });
                }
            }
            window.addEventListener('keydown', (e) => {
                const t = e.target;
                const inField = t && t.closest && t.closest('input, textarea, select, [contenteditable="true"]');

                if (e.code === 'ArrowUp' || e.code === 'ArrowDown') {
                    if (inField) return;
                    if (mainPlane === 'ORBIT') {
                        e.preventDefault();
                        const step = e.shiftKey ? 4 : 2;
                        orbitDrawStepsCap += e.code === 'ArrowUp' ? step : -step;
                        orbitDrawStepsCap = Math.max(
                            ORBIT_DRAW_STEPS_MIN,
                            Math.min(ORBIT_DRAW_STEPS_MAX, orbitDrawStepsCap)
                        );
                        persistMandelbrotOrbitSteps();
                        if (typeof CyberCanvasInstance !== 'undefined' && CyberCanvasInstance.isInitialized) {
                            CyberCanvasInstance.needsRedraw = true;
                        }
                        return;
                    }
                    if (mainPlane !== 'FRACTAL') return;
                    e.preventDefault();
                    applyKeyedZoom(e.code === 'ArrowUp');
                    return;
                }

                if (e.code !== 'Space' && e.key !== ' ') return;
                if (inField) return;
                if (mainPlane === 'ORBIT') {
                    if (e.repeat) return;
                    e.preventDefault();
                    toggleOrbitScan();
                    return;
                }
                if (mainPlane !== 'FRACTAL') return;
                if (t && t.closest && t.closest('button')) return;
                e.preventDefault();
                btnFlightEl?.click();
            });
            window.addEventListener('mousemove', onFlightMouseSync, { passive: true });
            window.addEventListener('pointermove', onFlightMouseSync, { passive: true });
            canvas.addEventListener('mousemove', (e) => {
                const p = canvasPixelFromClient(e.clientX, e.clientY);
                flightMouseCanvasX = p.mx;
                flightMouseCanvasY = p.my;
            });
            document.getElementById('btn-reset').onclick = () => resetView();
            let isDrag = false;
            let dragLastCanvas = null;
            canvas.onmousedown = (e) => {
                abortResetAnim();
                if (isFlight) return;
                isDrag = true;
                dragLastCanvas = canvasPixelFromClient(e.clientX, e.clientY);
            };
            window.onmousemove = (e) => {
                if (isFlight) return;
                if (!isDrag || !dragLastCanvas) return;
                const cur = canvasPixelFromClient(e.clientX, e.clientY);
                const dx = cur.mx - dragLastCanvas.mx;
                const dy = cur.my - dragLastCanvas.my;
                dragLastCanvas = cur;
                const s = Math.min(canvas.width, canvas.height);
                centerX -= (dx / s / zoom) * 3;
                centerY += (dy / s / zoom) * 3;
            };
            window.onmouseup = () => {
                isDrag = false;
                dragLastCanvas = null;
            };

            /** Pfeil hoch/runter: Zoom wie Rad (deltaY), Punkt unter Cursor/Mitte bleibt stabil. */
            function applyKeyedZoom(zoomIn) {
                abortResetAnim();
                const w = canvas.width;
                const h = canvas.height;
                if (w <= 0 || h <= 0) return;
                let mx = flightMouseCanvasX != null ? flightMouseCanvasX : w / 2;
                let my = flightMouseCanvasY != null ? flightMouseCanvasY : h / 2;
                if (isFlight) {
                    flightMouseCanvasX = mx;
                    flightMouseCanvasY = my;
                }
                stepZoomFlightLike(mx, my, w, h, zoomIn);

                /* Ein Bild mit neuem Zoom — gleicher Pixelinhalt wie nächster Frame */
                drawFractalOnly();
                void captureScreenshotAfterArrowZoom();
            }

            /**
             * Rad / Trackpad: zoom proportional zu deltaY (sanfter als fester Faktor pro Event).
             * ctrlKey ≈ Pinch-Zoom unter macOS; deltaMode berücksichtigt Zeilen-/Seiten-Raster.
             */
            canvas.addEventListener(
                'wheel',
                (e) => {
                    e.preventDefault();
                    abortResetAnim();
                    const w = canvas.width;
                    const h = canvas.height;
                    const { mx, my } = canvasPixelFromClient(e.clientX, e.clientY);
                    if (isFlight) {
                        flightMouseCanvasX = mx;
                        flightMouseCanvasY = my;
                    }
                    const { fX, fY } = focalPlaneUnderCanvasPixel(mx, my, w, h, zoom, centerX, centerY);

                    let dz = -e.deltaY;
                    if (e.deltaMode === 1) dz *= 16;
                    else if (e.deltaMode === 2) dz *= Math.max(320, Math.min(w, h)) / 12;

                    let sensitivity = e.shiftKey ? 0.00032 : 0.00105;
                    if (e.ctrlKey) sensitivity *= 1.45;

                    const damp = deepZoomWheelDamp(zoom);
                    let factor = Math.exp(dz * sensitivity * damp);

                    const cap = e.shiftKey ? 1.018 : e.ctrlKey ? 1.11 : 1.092;
                    factor = Math.max(1 / cap, Math.min(cap, factor));

                    zoom *= factor;
                    zoom = clampZoom(zoom);
                    const nc = centerKeepingFocalPlane(mx, my, w, h, zoom, fX, fY);
                    centerX = nc.cx;
                    centerY = nc.cy;
                },
                { passive: false }
            );

            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length !== 2) return;
                abortResetAnim();
                const a = e.touches[0];
                const b = e.touches[1];
                pinchStartDist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
                if (pinchStartDist < 8) return;
                pinchStartZoom = zoom;
                const cx = (a.clientX + b.clientX) / 2;
                const cy = (a.clientY + b.clientY) / 2;
                const w = canvas.width;
                const h = canvas.height;
                const { mx, my } = canvasPixelFromClient(cx, cy);
                pinchAnchor = {
                    mx,
                    my,
                    ...focalPlaneUnderCanvasPixel(mx, my, w, h, zoom, centerX, centerY),
                };
            }, { passive: true });

            canvas.addEventListener(
                'touchmove',
                (e) => {
                    if (e.touches.length !== 2 || !pinchAnchor || pinchStartDist < 8) return;
                    e.preventDefault();
                    const a = e.touches[0];
                    const b = e.touches[1];
                    const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
                    let ratio = d / pinchStartDist;
                    ratio = Math.max(0.25, Math.min(4, ratio));
                    zoom = clampZoom(pinchStartZoom * ratio);
                    const { mx, my, fX, fY } = pinchAnchor;
                    const w = canvas.width;
                    const h = canvas.height;
                    const nc = centerKeepingFocalPlane(mx, my, w, h, zoom, fX, fY);
                    centerX = nc.cx;
                    centerY = nc.cy;
                },
                { passive: false }
            );

            canvas.addEventListener('touchend', () => {
                pinchAnchor = null;
                pinchStartDist = 0;
            });
            const startPlane = loadMandelbrotPersist();
            setMainPlane(startPlane === 'FRACTAL' ? 'FRACTAL' : 'ORBIT');
            render();
        });
})();
    </script>
</body>

</html>
