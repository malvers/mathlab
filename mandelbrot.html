                                drawOrbitPlane();
                            },
                        },
                        {
                            label: CyberI18n.get('fractal.orbit_hide_legs_while_scan'),
                            checked: orbitHideLegsWhileScanning,
                            onchange: (v) => {
                                orbitHideLegsWhileScanning = !!v;
                                persistMandelbrotOrbitHideLegsWhileScan();
                                CyberCanvasInstance.needsRedraw = true;
                                drawOrbitPlane();
                            },
                        },
                    ]);
                };
                CyberCanvasInstance.needsRedraw = true;
                startOrbitRedrawLoop();
                applyOrbitHudVisibility();
                syncOrbitHud();
            }

            function setMainPlane(next) {
                if (next !== 'FRACTAL' && next !== 'ORBIT') return;
                mainPlane = next;
                const ow = document.getElementById('orbit-view-wrap');
                const bf = document.getElementById('btn-plane-fractal');
                const bo = document.getElementById('btn-plane-orbit');
                if (next === 'FRACTAL') {
                    fractalRenderPaused = false;
                    teardownOrbitCyberCanvas();
                    canvas.classList.remove('mb-fractal-view-hidden');
                    if (ow) {
                        ow.hidden = true;
                        ow.setAttribute('aria-hidden', 'true');
                    }
                    if (bf) bf.classList.add('is-active');
                    if (bo) bo.classList.remove('is-active');
                    window.dispatchEvent(new Event('resize'));
                } else {
                    fractalRenderPaused = true;
                    if (isFlight) stopFlightUi();
                    canvas.classList.add('mb-fractal-view-hidden');
                    if (ow) {
                        ow.hidden = false;
                        ow.setAttribute('aria-hidden', 'false');
                    }
                    if (bf) bf.classList.remove('is-active');
                    if (bo) bo.classList.add('is-active');
                    setupOrbitCyberCanvas();
                }
                persistMandelbrotMainPlane();
                syncMbOrbitStableCountPanel();
                syncMbFractalFormulaOverlay();
            }

            /** 0 bei zoom≈1, 1 bei ZOOM_MAX — Tiefenmaß in Log-Skala */
            function zoomDepthLogUnit(z) {
                if (!Number.isFinite(z) || z <= 1) return 0;
                return Math.min(1, Math.log(z) / Math.log(ZOOM_MAX));
            }

            /**
             * Iterations-Ziel wie im Fraktal-Shader (targetIter vor Glättung): maxIter + Zoom-Boost.
             * Bei ORBIT läuft render() nicht — smoothEffectiveMaxIter wäre eingefroren; Scan/Cheap-Probes nutzen stattdessen diesen Wert.
             */
            function fractalShaderTargetMaxIter() {
                const depthU = zoomDepthLogUnit(zoom);
                const boostF = (512 - maxIter) * 0.9 * depthU;
                return Math.min(512, Math.max(32, Math.round(maxIter + boostF)));
            }

            /**
             * Rad: Dämpfung ~ u³ in Log-Tiefe u → hoher Zoom (200k→10k) spürbar langsamer,
             * unten am Limit noch ~4,5 % der Basis-Schrittweite.
             */
            function deepZoomWheelDamp(zoomBefore) {
                const u = zoomDepthLogUnit(zoomBefore);
                if (u <= 0) return 1;
                const MIN_DAMP = 0.045;
                return 1 - (1 - MIN_DAMP) * u * u * u;
            }

            /** Kurze Resets bei Maus-Zoom (wenig Log-Spanne), lange ab Flight-Zeiler (bis ZOOM_MAX). */
            function computeResetDurationMs(fromZ, toZ) {
                const lnFrom = Math.log(Math.max(1, fromZ));
                const lnTo = Math.log(Math.max(1, toZ));
                const span = Math.max(0, lnFrom - lnTo);
                const ref = Math.log(ZOOM_MAX);
                const t = ref > 0 ? Math.min(1, span / ref) : 0;
                return Math.round(RESET_ANIM_MS_MIN + (RESET_ANIM_MS_MAX - RESET_ANIM_MS_MIN) * t);
            }

            function abortResetAnim() {
                if (!resetAnim) return;
                resetAnim = null;
                const br = document.getElementById('btn-reset');
                if (br) br.disabled = false;
            }

            function updateSliderMountVisual(mountId, numericValue) {
                const inp = document.querySelector('#' + mountId + ' input.cyber-slider');
                if (!inp) return;
                const str = String(Math.round(numericValue));
                inp.value = str;
                const disp = document.querySelector('#' + mountId + ' .val-display');
                if (disp) disp.textContent = str;
            }

            function onFlightMouseSync(e) {
                if (!isFlight) return;
                const p = canvasPixelFromClient(e.clientX, e.clientY);
                flightMouseCanvasX = p.mx;
                flightMouseCanvasY = p.my;
            }

            function tickResetAnim() {
                if (!resetAnim) return;
                const dur = resetAnim.durationMs;
                const rawT = Math.min(1, (performance.now() - resetAnim.t0) / dur);
                const f = resetAnim.from;
                const to = resetAnim.to;
                /** Zoom: ease-out. Bei starkem seitlichen Versatz Pan zeitlich entkoppeln (ease-in-out),
                 * sonst wirken Center und Log-Zoom gekoppelt wie ein Wisch durch irrelevante Regionen. */
                const ez = easeOutCubic(rawT);
                const sCan = Math.min(canvas.width, canvas.height);
                const z0 = Math.max(1e-300, f.zoom);
                const z1 = Math.max(1e-300, to.zoom);
                const zMid = Math.sqrt(z0 * z1);
                const cell = 3 / (zMid * Math.max(1, sCan));
                const nd = Math.hypot(canvas.width, canvas.height) / (2 * Math.max(1, sCan));
                const viewDiagC = cell * nd;
                const dc = Math.hypot(to.cx - f.cx, to.cy - f.cy);
                const tinyPan = dc < viewDiagC * 0.065;
                const ep = tinyPan ? ez : easeInOutCubic(rawT);
                centerX = lerp(f.cx, to.cx, ep);
                centerY = lerp(f.cy, to.cy, ep);
                if (f.zoom > 0 && to.zoom > 0 && Number.isFinite(f.zoom) && Number.isFinite(to.zoom)) {
                    zoom = Math.exp(lerp(Math.log(f.zoom), Math.log(to.zoom), ez));
                } else {
                    zoom = lerp(f.zoom, to.zoom, ez);
                }
                zoom = clampZoom(zoom);
                if (mode === 'MANDELBROT') {
                    juliaX = centerX;
                    juliaY = centerY;
                } else {
                    juliaX = lerp(f.jx, to.jx, ep);
                    juliaY = lerp(f.jy, to.jy, ep);
                }
                maxIter = Math.max(32, Math.min(256, Math.round(lerp(f.mi, to.mi, ep))));
                updateSliderMountVisual('jx-mount', juliaX * 1000);
                updateSliderMountVisual('jy-mount', juliaY * 1000);
                updateSliderMountVisual('iter-mount', maxIter);

                if (rawT >= 1) {
                    centerX = to.cx; centerY = to.cy; zoom = to.zoom;
                    juliaX = to.jx; juliaY = to.jy; maxIter = to.mi;
                    const clearFlight = resetAnim.clearFlightSnapshotOnDone;
                    resetAnim = null;
                    const br = document.getElementById('btn-reset');
                    if (br) br.disabled = false;
                    if (clearFlight) flightSnapshot = null;
                    setRangeInMount('jx-mount', Math.round(to.jx * 1000));
                    setRangeInMount('jy-mount', Math.round(to.jy * 1000));
                    setRangeInMount('iter-mount', to.mi);
                    const uDone = zoomDepthLogUnit(zoom);
                    smoothEffectiveMaxIter = Math.min(
                        512,
                        Math.max(32, maxIter + (512 - maxIter) * 0.9 * uDone)
                    );
                    lastEffectiveMaxIter = Math.round(smoothEffectiveMaxIter);
                    persistMandelbrotFractalState();
                }
            }

            function setRangeInMount(mountId, value) {
                const inp = document.querySelector('#' + mountId + ' input.cyber-slider');
                if (!inp) return;
                inp.value = String(value);
                inp.dispatchEvent(new Event('input', { bubbles: true }));
            }

            function formatZoomFactor(z) {
                if (!Number.isFinite(z) || z <= 0) return '1,000';
                return z.toLocaleString('de-DE', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
            }

            function syncFraktalReadouts() {
                const d = document.getElementById('readout-detail');
                const zEl = document.getElementById('readout-zoom');
                if (d) {
                    d.textContent =
                        lastEffectiveMaxIter > maxIter
                            ? `${maxIter}→${lastEffectiveMaxIter}`
                            : String(maxIter);
                }
                if (zEl) zEl.textContent = formatZoomFactor(zoom);
            }

            function syncModeButtonsFromState() {
                const bm = document.getElementById('btn-mode-m');
                const bj = document.getElementById('btn-mode-j');
                if (!bm || !bj) return;
                const julia = mode === 'JULIA';
                bj.classList.toggle('is-active', julia);
                bm.classList.toggle('is-active', !julia);
            }

            function resetView() {
                isFlight = false;
                time = 0;
                syncModeButtonsFromState();
                const bf = document.querySelector('#side-panel #btn-flight');
                if (bf) {
                    bf.innerText = CyberI18n.get('fractal.flight_start');
                    bf.classList.remove('is-active');
                }
                zoom = clampZoom(zoom);
                let to;
                let clearFlightSnapshotOnDone = false;
                if (flightSnapshot !== null) {
                    to = {
                        cx: flightSnapshot.cx,
                        cy: flightSnapshot.cy,
                        zoom: flightSnapshot.zoom,
                        jx: mode === 'MANDELBROT' ? flightSnapshot.cx : flightSnapshot.jx,
                        jy: mode === 'MANDELBROT' ? flightSnapshot.cy : flightSnapshot.jy,
                        mi: flightSnapshot.mi,
                    };
                    clearFlightSnapshotOnDone = true;
                } else {
                    to = (mode === 'JULIA')
                        ? { cx: DEF_JL_CENTER_X, cy: DEF_JL_CENTER_Y, zoom: DEF_JL_ZOOM, jx: DEF_JULIA_X, jy: DEF_JULIA_Y, mi: DEF_MAX_ITER }
                        : {
                              cx: DEF_MB_CENTER_X,
                              cy: DEF_MB_CENTER_Y,
                              zoom: DEF_MB_ZOOM,
                              jx: DEF_MB_CENTER_X,
                              jy: DEF_MB_CENTER_Y,
                              mi: DEF_MAX_ITER,
                          };
                }
                if (mode === 'MANDELBROT') syncMbJuliaSlidersFromFractalCenter();
                const from = { cx: centerX, cy: centerY, zoom, jx: juliaX, jy: juliaY, mi: maxIter };
                resetAnim = {
                    t0: performance.now(),
                    from,
                    to,
                    durationMs: computeResetDurationMs(from.zoom, to.zoom),
                    clearFlightSnapshotOnDone
                };
                const br = document.getElementById('btn-reset');
                if (br) br.disabled = true;
                if (typeof CyberCanvasInstance !== 'undefined' && CyberCanvasInstance.isInitialized) {
                    orbitScanClearAndRestartGrid(CyberCanvasInstance);
                }
            }

            function drawFractalOnly() {
                gl.viewport(0, 0, canvas.width, canvas.height);
                gl.bindFramebuffer(gl.FRAMEBUFFER, null);
                gl.useProgram(prg);
                gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
                gl.enableVertexAttribArray(pos);
                gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
                gl.uniform2f(uRes, canvas.width, canvas.height);
                gl.uniform2f(uCenter, centerX, centerY);
                gl.uniform1f(uZoom, zoom);
                gl.uniform1i(uMaxIter, lastEffectiveMaxIter);
                gl.uniform2f(uJuliaC, juliaX, juliaY);
                gl.uniform1f(uTime, time);
                gl.uniform1i(uJulia, mode === 'JULIA' ? 1 : 0);
                gl.drawArrays(gl.TRIANGLES, 0, 6);
            }

            /**
             * Ein Zoom-Schritt wie Auto-Flight: gleiche rel = 0.005·TICK·head, head = 1 − zoomDepthLogUnit.
             * zoomIn false → exakt invers zum selben rel (ein Flug-Tick zurück).
             */
            function stepZoomFlightLike(mx, my, cw, ch, zoomIn) {
                const zb = clampZoom(zoom);
                if (cw <= 0 || ch <= 0 || !Number.isFinite(zb) || zb <= 0) return;
                const u = zoomDepthLogUnit(zb);
                const head = 1 - u;
                const rel = 0.005 * TICK_VS_LEGACY_60HZ * head;
                const { fX, fY } = focalPlaneUnderCanvasPixel(mx, my, cw, ch, zb, centerX, centerY);
                let next = zoomIn ? zb * (1 + rel) : zb / (1 + rel);
                if (zoomIn && next >= ZOOM_MAX) next = ZOOM_MAX;
                zoom = clampZoom(next);
                const nc = centerKeepingFocalPlane(mx, my, cw, ch, zoom, fX, fY);
                centerX = nc.cx;
                centerY = nc.cy;
            }

            function render(now) {
                requestAnimationFrame(render);
                if (fractalRenderPaused) return;
                const ts = typeof now === 'number' ? now : performance.now();

                if (lastRenderFrameTs !== 0 && ts - lastRenderFrameTs < RENDER_FRAME_MS) return;
                lastRenderFrameTs = ts;

                const w = canvas.clientWidth, h = canvas.clientHeight;
                if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; gl.viewport(0, 0, w, h); }
                zoom = clampZoom(zoom);
                if (resetAnim) tickResetAnim();
                else if (isFlight) {
                    /* Auto-Zoom wie Rad-Zoom: gleicher Weltpunkt unter dem Cursor bleibt stabil (flightMouse = Pointer). */
                    const cw = canvas.width;
                    const ch = canvas.height;
                    const s = Math.min(cw, ch);
                    const mx = flightMouseCanvasX != null ? flightMouseCanvasX : cw / 2;
                    const my = flightMouseCanvasY != null ? flightMouseCanvasY : ch / 2;

                    if (zoom >= ZOOM_MAX) {
                        zoom = ZOOM_MAX;
                        stopFlightUi();
                    } else if (s > 0 && Number.isFinite(zoom) && zoom > 0) {
                        stepZoomFlightLike(mx, my, cw, ch, true);
                        if (zoom >= ZOOM_MAX) stopFlightUi();
                    }
                    zoom = clampZoom(zoom);
                }
                zoom = clampZoom(zoom);
                if (isFlight && zoom >= ZOOM_MAX) stopFlightUi();

                zoom = clampZoom(zoom);
                const depthU = zoomDepthLogUnit(zoom);
                const boostF = (512 - maxIter) * 0.9 * depthU;
                const targetIter = Math.min(512, Math.max(32, maxIter + boostF));
                const tau = 0.14 * TICK_VS_LEGACY_60HZ;
                smoothEffectiveMaxIter += (targetIter - smoothEffectiveMaxIter) * tau;
                smoothEffectiveMaxIter = Math.min(512, Math.max(32, smoothEffectiveMaxIter));
                lastEffectiveMaxIter = Math.round(smoothEffectiveMaxIter);

                time += 0.004 * TICK_VS_LEGACY_60HZ;

                if (mode === 'MANDELBROT' && isFlight) syncMbJuliaSlidersFromFractalCenter();

                drawFractalOnly();
                syncFraktalReadouts();
                if (isFlight) schedulePersistMandelbrotFractalState();
            }

            CyberUI.createCard('ui-container', CyberI18n.get('fractal.mode'), `
                <div class="fraktal-seg-row">
                    <button type="button" id="btn-mode-m" class="fraktal-seg-btn">${CyberI18n.get('fractal.mandelbrot')}</button>
                    <button type="button" id="btn-mode-j" class="fraktal-seg-btn">${CyberI18n.get('fractal.julia')}</button>
                </div>
                <div style="margin:14px 0 6px;font-size:0.65rem;letter-spacing:0.14em;color:rgba(180,210,235,0.82);">${CyberI18n.get('fractal.display')}</div>
                <div class="fraktal-seg-row">
                    <button type="button" id="btn-plane-fractal" class="fraktal-seg-btn">${CyberI18n.get('fractal.plane_fractal')}</button>
                    <button type="button" id="btn-plane-orbit" class="fraktal-seg-btn is-active">${CyberI18n.get('fractal.plane_orbit')}</button>
                </div>
            `, 'var(--neon-blue)');

            CyberUI.createCard('ui-container', CyberI18n.get('fractal.params'), `
                <div id="jx-mount"></div>
                <div id="jy-mount" style="margin-top:2px;"></div>
                <div id="iter-mount" style="margin-top:2px;"></div>
                <div id="fraktal-readouts-mount" class="stats-grid fraktal-readouts">
                    <div class="stats-card">
                        <span class="stats-label">${CyberI18n.get('fractal.detail')}</span>
                        <span id="readout-detail" class="stats-val">256</span>
                    </div>
                    <div class="stats-card">
                        <span class="stats-label">${CyberI18n.get('fractal.zoom')}</span>
                        <span id="readout-zoom" class="stats-val">1,000</span>
                    </div>
                </div>
            `, 'var(--neon-blue)');

            CyberUI.createSlider('jx-mount', CyberI18n.get('fractal.real'), -2000, 2000, -800, 1, (v) => {
                abortResetAnim();
                juliaX = v / 1000;
                syncMbFractalCenterFromJuliaSliders();
                persistMandelbrotFractalState();
            }, 'var(--neon-blue)');

            CyberUI.createSlider('jy-mount', CyberI18n.get('fractal.imaginary'), -2000, 2000, 156, 1, (v) => {
                abortResetAnim();
                juliaY = v / 1000;
                syncMbFractalCenterFromJuliaSliders();
                persistMandelbrotFractalState();
            }, 'var(--neon-blue)');

            CyberUI.createSlider('iter-mount', CyberI18n.get('fractal.iterations'), 32, 256, 256, 1, (v) => {
                abortResetAnim();
                maxIter = parseInt(v, 10);
                const u = zoomDepthLogUnit(zoom);
                smoothEffectiveMaxIter = Math.min(512, Math.max(32, maxIter + (512 - maxIter) * 0.9 * u));
                persistMandelbrotFractalState();
            }, 'var(--neon-blue)');

            CyberUI.createCard('ui-container', CyberI18n.get('fractal.navigation'), `
                <div class="fraktal-seg-row">
                    <button type="button" id="btn-flight" class="fraktal-seg-btn">${CyberI18n.get('fractal.flight_start')}</button>
                    <button type="button" id="btn-reset" class="fraktal-seg-btn">${CyberI18n.get('fractal.reset')}</button>
                </div>
            `, 'var(--neon-blue)');

            document.getElementById('btn-mode-m').onclick = () => {
                mode = 'MANDELBROT';
                syncMbFractalCenterFromJuliaSliders();
                syncModeButtonsFromState();
                persistMandelbrotFractalState();
            };
            document.getElementById('btn-mode-j').onclick = () => {
                mode = 'JULIA';
                syncModeButtonsFromState();
                persistMandelbrotFractalState();
            };
            syncModeButtonsFromState();

            document.getElementById('btn-plane-fractal').onclick = () => setMainPlane('FRACTAL');
            document.getElementById('btn-plane-orbit').onclick = () => setMainPlane('ORBIT');

            const btnFlightEl = document.querySelector('#side-panel #btn-flight');
            if (btnFlightEl) {
                btnFlightEl.onclick = () => {
                    if (mainPlane !== 'FRACTAL') return;
                    isFlight = !isFlight;
                    btnFlightEl.innerText = isFlight ? CyberI18n.get('fractal.flight_stop') : CyberI18n.get('fractal.flight_start');
                    btnFlightEl.classList.toggle('is-active', isFlight);
                    if (isFlight) {
                        flightSnapshot = {
                            cx: centerX,
                            cy: centerY,
                            zoom: clampZoom(zoom),
                            jx: mode === 'MANDELBROT' ? centerX : juliaX,
                            jy: mode === 'MANDELBROT' ? centerY : juliaY,
                            mi: maxIter,
                        };
                        const w = canvas.width, h = canvas.height;
                        flightMouseCanvasX = w > 0 ? w / 2 : null;
                        flightMouseCanvasY = h > 0 ? h / 2 : null;
                        isDrag = false;
                    } else {
                        persistMandelbrotFractalState();
                    }
                };
            }

            /** true nur bei echten Text-/Zahl-Eingaben — nicht bei range-Slidern (↑/↓ sonst vom Browser „geschluckt“). */
            function keyboardTypingCapturesArrows(target) {
                if (!target || !target.closest) return false;
                if (target.closest('textarea, select, [contenteditable="true"]')) return true;
                const inp = target.closest('input');
                if (!inp) return false;
                const typ = String(inp.type || 'text').toLowerCase();
                return typ !== 'range';
            }

            /** capture: true → preventDefault vor natives Range-/Browser-Verhalten der Pfeiltasten. */
            window.addEventListener(
                'keydown',
                (e) => {
                    const t = e.target;
                    const inField = t && t.closest && t.closest('input, textarea, select, [contenteditable="true"]');

                    if (
                        !keyboardTypingCapturesArrows(t) &&
                        mainPlane === 'ORBIT' &&
                        (e.key === 'd' || e.key === 'D') &&
                        (e.metaKey || e.ctrlKey) &&
                        !e.altKey &&
                        !e.shiftKey
                    ) {
                        e.preventDefault();
                        toggleOrbitHudVisible();
                        return;
                    }

                    const arrowUp = e.code === 'ArrowUp' || e.key === 'ArrowUp';
                    const arrowDown = e.code === 'ArrowDown' || e.key === 'ArrowDown';
                    if (arrowUp || arrowDown) {
                        if (keyboardTypingCapturesArrows(t)) return;
                        if (mainPlane === 'ORBIT') {
                            e.preventDefault();
                            const step = e.shiftKey ? 4 : 2;
                            orbitLegCount += arrowUp ? step : -step;
                            orbitLegCount = clampOrbitLegCount(orbitLegCount);
                            persistMandelbrotOrbitLeg();
                            if (typeof CyberCanvasInstance !== 'undefined' && CyberCanvasInstance.isInitialized) {
                                CyberCanvasInstance.needsRedraw = true;
                            }
                            return;
                        }
                        if (mainPlane !== 'FRACTAL') return;
                        e.preventDefault();
                        applyKeyedZoom(arrowUp);
                        return;
                    }

                    if (e.code !== 'Space' && e.key !== ' ') return;
                    if (inField) return;
                    if (mainPlane === 'ORBIT') {
                        if (e.repeat) return;
                        e.preventDefault();
                        toggleOrbitScan();
                        return;
                    }
                    if (mainPlane !== 'FRACTAL') return;
                    if (t && t.closest && t.closest('button')) return;
                    e.preventDefault();
                    btnFlightEl?.click();
                },
                true
            );
            window.addEventListener('mousemove', onFlightMouseSync, { passive: true });
            window.addEventListener('pointermove', onFlightMouseSync, { passive: true });
            canvas.addEventListener('mousemove', (e) => {
                const p = canvasPixelFromClient(e.clientX, e.clientY);
                flightMouseCanvasX = p.mx;
                flightMouseCanvasY = p.my;
            });
            document.getElementById('btn-reset').onclick = () => resetView();
            let isDrag = false;
            let dragLastCanvas = null;
            canvas.onmousedown = (e) => {
                abortResetAnim();
                if (isFlight) return;
                isDrag = true;
                dragLastCanvas = canvasPixelFromClient(e.clientX, e.clientY);
            };
            window.onmousemove = (e) => {
                if (isFlight) return;
                if (!isDrag || !dragLastCanvas) return;
                const cur = canvasPixelFromClient(e.clientX, e.clientY);
                const dx = cur.mx - dragLastCanvas.mx;
                const dy = cur.my - dragLastCanvas.my;
                dragLastCanvas = cur;
                const s = Math.min(canvas.width, canvas.height);
                centerX -= (dx / s / zoom) * 3;
                centerY += (dy / s / zoom) * 3;
            };
            window.onmouseup = () => {
                if (isDrag) {
                    syncMbJuliaSlidersFromFractalCenter();
                    schedulePersistMandelbrotFractalState();
                }
                isDrag = false;
                dragLastCanvas = null;
            };

            /** Gleiche Logik wie render(): Backing-Store aus Layout — sonst ↑/↓ zoomen nicht, wenn noch kein Frame lief (z. B. nur Orbit). */
            function ensureMbFractalGlBufferSized() {
                const w = canvas.clientWidth, h = canvas.clientHeight;
                if (w <= 0 || h <= 0) return false;
                if (canvas.width !== w || canvas.height !== h) {
                    canvas.width = w;
                    canvas.height = h;
                    gl.viewport(0, 0, w, h);
                }
                return true;
            }

            /** Pfeil hoch/runter: Zoom wie Rad (deltaY), Punkt unter Cursor/Mitte bleibt stabil. */
            function applyKeyedZoom(zoomIn) {
                abortResetAnim();
                if (!ensureMbFractalGlBufferSized()) return;
                const w = canvas.width;
                const h = canvas.height;
                if (w <= 0 || h <= 0) return;
                let mx = flightMouseCanvasX != null ? flightMouseCanvasX : w / 2;
                let my = flightMouseCanvasY != null ? flightMouseCanvasY : h / 2;
                if (isFlight) {
                    flightMouseCanvasX = mx;
                    flightMouseCanvasY = my;
                }
                stepZoomFlightLike(mx, my, w, h, zoomIn);
                syncMbJuliaSlidersFromFractalCenter();

                drawFractalOnly();
                schedulePersistMandelbrotFractalState();
            }

            /**
             * Rad / Trackpad: zoom proportional zu deltaY (sanfter als fester Faktor pro Event).
             * ctrlKey ≈ Pinch-Zoom unter macOS; deltaMode berücksichtigt Zeilen-/Seiten-Raster.
             */
            canvas.addEventListener(
                'wheel',
                (e) => {
                    e.preventDefault();
                    abortResetAnim();
                    const w = canvas.width;
                    const h = canvas.height;
                    const { mx, my } = canvasPixelFromClient(e.clientX, e.clientY);
                    if (isFlight) {
                        flightMouseCanvasX = mx;
                        flightMouseCanvasY = my;
                    }
                    const { fX, fY } = focalPlaneUnderCanvasPixel(mx, my, w, h, zoom, centerX, centerY);

                    let dz = -e.deltaY;
                    if (e.deltaMode === 1) dz *= 16;
                    else if (e.deltaMode === 2) dz *= Math.max(320, Math.min(w, h)) / 12;

                    let sensitivity = e.shiftKey ? 0.00032 : 0.00105;
                    if (e.ctrlKey) sensitivity *= 1.45;

                    const damp = deepZoomWheelDamp(zoom);
                    let factor = Math.exp(dz * sensitivity * damp);

                    const cap = e.shiftKey ? 1.018 : e.ctrlKey ? 1.11 : 1.092;
                    factor = Math.max(1 / cap, Math.min(cap, factor));

                    zoom *= factor;
                    zoom = clampZoom(zoom);
                    const nc = centerKeepingFocalPlane(mx, my, w, h, zoom, fX, fY);
                    centerX = nc.cx;
                    centerY = nc.cy;
                    syncMbJuliaSlidersFromFractalCenter();
                    schedulePersistMandelbrotFractalState();
                },
                { passive: false }
            );

            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length !== 2) return;
                abortResetAnim();
                const a = e.touches[0];
                const b = e.touches[1];
                pinchStartDist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
                if (pinchStartDist < 8) return;
                pinchStartZoom = zoom;
                const cx = (a.clientX + b.clientX) / 2;
                const cy = (a.clientY + b.clientY) / 2;
                const w = canvas.width;
                const h = canvas.height;
                const { mx, my } = canvasPixelFromClient(cx, cy);
                pinchAnchor = {
                    mx,
                    my,
                    ...focalPlaneUnderCanvasPixel(mx, my, w, h, zoom, centerX, centerY),
                };
            }, { passive: true });

            canvas.addEventListener(
                'touchmove',
                (e) => {
                    if (e.touches.length !== 2 || !pinchAnchor || pinchStartDist < 8) return;
                    e.preventDefault();
                    const a = e.touches[0];
                    const b = e.touches[1];
                    const d = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
                    let ratio = d / pinchStartDist;
                    ratio = Math.max(0.25, Math.min(4, ratio));
                    zoom = clampZoom(pinchStartZoom * ratio);
                    const { mx, my, fX, fY } = pinchAnchor;
                    const w = canvas.width;
                    const h = canvas.height;
                    const nc = centerKeepingFocalPlane(mx, my, w, h, zoom, fX, fY);
                    centerX = nc.cx;
                    centerY = nc.cy;
                },
                { passive: false }
            );

            canvas.addEventListener('touchend', () => {
                const hadPinch = pinchAnchor != null && pinchStartDist >= 8;
                pinchAnchor = null;
                pinchStartDist = 0;
                if (hadPinch) {
                    syncMbJuliaSlidersFromFractalCenter();
                    schedulePersistMandelbrotFractalState();
                }
            });

            function loadMandelbrotFractalPersist() {
                try {
                    const m = localStorage.getItem(LS_MB_MODE);
                    if (m === 'MANDELBROT' || m === 'JULIA') mode = m;

                    const rf = (key, fb) => {
                        const s = localStorage.getItem(key);
                        if (s == null || s === '') return fb;
                        const x = parseFloat(s);
                        return Number.isFinite(x) ? x : fb;
                    };
                    const ri = (key, fb, lo, hi) => {
                        const s = localStorage.getItem(key);
                        if (s == null || s === '') return fb;
                        const n = parseInt(s, 10);
                        if (!Number.isFinite(n)) return fb;
                        return Math.max(lo, Math.min(hi, n));
                    };

                    centerX = rf(LS_MB_CENTER_X, centerX);
                    centerY = rf(LS_MB_CENTER_Y, centerY);
                    zoom = clampZoom(rf(LS_MB_ZOOM, zoom));
                    const jx = rf(LS_MB_JULIA_X, juliaX);
                    const jy = rf(LS_MB_JULIA_Y, juliaY);
                    juliaX = Math.max(-2, Math.min(2, jx));
                    juliaY = Math.max(-2, Math.min(2, jy));
                    maxIter = ri(LS_MB_MAX_ITER, maxIter, 32, 256);

                    const u = zoomDepthLogUnit(zoom);
                    smoothEffectiveMaxIter = Math.min(
                        512,
                        Math.max(32, maxIter + (512 - maxIter) * 0.9 * u)
                    );
                    lastEffectiveMaxIter = Math.round(smoothEffectiveMaxIter);

                    syncModeButtonsFromState();
                    updateSliderMountVisual('jx-mount', Math.round(juliaX * 1000));
                    updateSliderMountVisual('jy-mount', Math.round(juliaY * 1000));
                    updateSliderMountVisual('iter-mount', maxIter);
                    if (mode === 'MANDELBROT') syncMbFractalCenterFromJuliaSliders();
                    syncFraktalReadouts();
                } catch (e) {
                    /* ignore */
                }
            }

            window.addEventListener('beforeunload', () => {
                persistMandelbrotFractalState();
            });

            const startPlane = loadMandelbrotPersist();
            loadMandelbrotFractalPersist();
            setMainPlane(startPlane === 'FRACTAL' ? 'FRACTAL' : 'ORBIT');
            render();
        });
})();
    </script>
</body>

</html>
