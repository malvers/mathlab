<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cyber-Meerschweinchen | ULTRA 3D</title>
    <style>
        body { margin: 0; background: #050b18; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #info {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #00d2ff; font-family: sans-serif; letter-spacing: 2px;
            pointer-events: none; text-shadow: 0 0 10px #00d2ff;
        }
    </style>
</head>
<body>
    <div id="info">ULTRA CYBER-MEERSCHWEINCHEN 🐹 v1.0</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x050b18);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00d2ff, 1);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // --- PROCEDURAL FUR TEXTURE ---
        function createFurTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            // Base color
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, 0, 512, 512);

            // Add Fur Patches
            const colors = ['#FFFFFF', '#D2B48C', '#5D3A1A'];
            for (let i = 0; i < 50; i++) {
                ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                ctx.beginPath();
                const x = Math.random() * 512;
                const y = Math.random() * 512;
                const r = 40 + Math.random() * 80;
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }

            // Add Grain/Fuzziness
            for (let i = 0; i < 5000; i++) {
                const x = Math.random() * 512;
                const y = Math.random() * 512;
                const gray = Math.random() * 50;
                ctx.fillStyle = `rgba(${gray},${gray},${gray}, 0.1)`;
                ctx.fillRect(x, y, 2, 2);
            }

            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        const furTexture = createFurTexture();

        // --- GUINEA PIG GROUP ---
        const pig = new THREE.Group();

        // 1. Body (Potato shape)
        const bodyGeo = new THREE.SphereGeometry(1, 48, 36);
        bodyGeo.scale(1.2, 0.8, 0.8);
        const bodyMat = new THREE.MeshStandardMaterial({ 
            map: furTexture,
            roughness: 0.8,
            metalness: 0.1
        });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        pig.add(body);

        // 2. Head (Smaller end)
        const headGeo = new THREE.SphereGeometry(0.75, 48, 36);
        headGeo.scale(1, 0.9, 0.9);
        const head = new THREE.Mesh(headGeo, bodyMat);
        head.position.set(0.8, 0.1, 0);
        pig.add(head);

        // 3. Nose
        const noseGeo = new THREE.SphereGeometry(0.12, 16, 16);
        const noseMat = new THREE.MeshPhongMaterial({ color: 0xFFB6C1 }); // Pink
        const nose = new THREE.Mesh(noseGeo, noseMat);
        nose.position.set(1.4, 0.05, 0);
        pig.add(nose);

        // 4. Eyes (Shiny & Alive)
        function createEye() {
            const eyeGroup = new THREE.Group();
            const eyeGeo = new THREE.SphereGeometry(0.1, 32, 32);
            const eyeMat = new THREE.MeshPhongMaterial({ color: 0x000000, shininess: 100 });
            const eyeball = new THREE.Mesh(eyeGeo, eyeMat);
            eyeGroup.add(eyeball);

            // Highlight
            const highGeo = new THREE.SphereGeometry(0.03, 16, 16);
            const highMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
            const highlight = new THREE.Mesh(highGeo, highMat);
            highlight.position.set(0.06, 0.04, 0.05);
            eyeGroup.add(highlight);
            
            return eyeGroup;
        }

        const eyeL = createEye();
        eyeL.position.set(1.2, 0.35, 0.3);
        eyeL.rotation.y = 0.5;
        pig.add(eyeL);

        const eyeR = createEye();
        eyeR.position.set(1.2, 0.35, -0.3);
        eyeR.rotation.y = -0.5;
        pig.add(eyeR);

        const colorEar = 0xD2B48C; // Tan

        // 5. Ears
        const earGeo = new THREE.SphereGeometry(0.2, 16, 16);
        earGeo.scale(0.5, 1, 1);
        const earMat = new THREE.MeshPhongMaterial({ color: colorEar });
        const earL = new THREE.Mesh(earGeo, earMat);
        earL.position.set(0.8, 0.6, 0.4);
        earL.rotation.z = -0.3;
        pig.add(earL);
        const earR = new THREE.Mesh(earGeo, earMat);
        earR.position.set(0.8, 0.6, -0.4);
        earR.rotation.z = -0.3;
        pig.add(earR);

        // 6. Feet
        const footGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const footMat = new THREE.MeshPhongMaterial({ color: colorEar });
        const foot1 = new THREE.Mesh(footGeo, footMat);
        foot1.position.set(0.6, -0.5, 0.4);
        pig.add(foot1);
        const foot2 = new THREE.Mesh(footGeo, footMat);
        foot2.position.set(0.6, -0.5, -0.4);
        pig.add(foot2);
        const foot3 = new THREE.Mesh(footGeo, footMat);
        foot3.position.set(-0.6, -0.5, 0.4);
        pig.add(foot3);
        const foot4 = new THREE.Mesh(footGeo, footMat);
        foot4.position.set(-0.6, -0.5, -0.4);
        pig.add(foot4);

        scene.add(pig);

        camera.position.z = 5;
        camera.position.y = 1;
        camera.lookAt(0,0,0);

        // --- ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            
            // Gentle wobble
            pig.rotation.y += 0.01;
            pig.position.y = Math.sin(Date.now() * 0.005) * 0.1;
            
            // Nose twitch
            nose.scale.set(
                1 + Math.sin(Date.now() * 0.02) * 0.1,
                1 + Math.sin(Date.now() * 0.02) * 0.1,
                1 + Math.sin(Date.now() * 0.02) * 0.1
            );

            renderer.render(scene, camera);
        }
        animate();

        // Responsive
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
