<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>docalvers | Pythagoras-Labor</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; }
        canvas { background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 10px; cursor: crosshair; margin-top: 20px; }
        #ui { padding: 20px; text-align: center; background: white; width: 100%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .info { font-size: 1.8rem; margin: 15px; color: #2d3436; font-weight: bold; }
        .formula-box { background: #f8f9fa; padding: 15px; border-radius: 10px; display: inline-block; border: 1px solid #ddd; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #6c5ce7; color: white; font-weight: bold; }
    </style>
</head>
<body>
<div id="ui">
    <h2>📐 Satz des Pythagoras</h2>
    <div class="formula-box">
        <div id="formula" class="info">a² + b² = c²</div>
    </div>
    <br><br>
    <button onclick="location.href='index.html'">Zurück zum Labor</button>
</div>
<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let a = 120, b = 160;
    let draggingA = false, draggingB = false;

    function draw() {
        canvas.width = 800; canvas.height = 800;
        const ox = 300, oy = 500;
        ctx.clearRect(0,0,canvas.width, canvas.height);

        let valA = Math.round(a/10);
        let valB = Math.round(b/10);
        let valC2 = (valA * valA) + (valB * valB);
        let distC = Math.sqrt(a*a + b*b);
        let angle = Math.atan2(a, b);

        // 1. Katheten-Quadrate (a² und b²)
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = "#d63031"; ctx.fillRect(ox - a, oy - a, a, a);
        ctx.fillStyle = "#0984e3"; ctx.fillRect(ox, oy, b, b);

        // 2. Hypotenusen-Quadrat (c²) - Jetzt bombenfest an der Linie
        ctx.fillStyle = "#6c5ce7";
        ctx.save();
        ctx.translate(ox, oy - a); // Start am oberen Punkt der Hypotenuse
        ctx.rotate(-angle);
        ctx.fillRect(0, -distC, distC, distC);
        ctx.restore();
        ctx.globalAlpha = 1.0;

        // 3. Das Dreieck
        ctx.beginPath();
        ctx.moveTo(ox, oy); ctx.lineTo(ox + b, oy); ctx.lineTo(ox, oy - a); ctx.closePath();
        ctx.fillStyle = "#dfe6e9"; ctx.fill();
        ctx.strokeStyle = "#2d3436"; ctx.lineWidth = 2; ctx.stroke();

        // 4. Beschriftung a und b
        ctx.fillStyle = "#2d3436"; ctx.font = "bold 18px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(`a = ${valA}`, ox - 40, oy - a/2);
        ctx.fillText(`b = ${valB}`, ox + b/2, oy + 25);

        // 5. Die Beschriftung für c - Immer im Zentrum des Quadrats
        let labelC = Number.isInteger(Math.sqrt(valC2)) ? `c = ${Math.sqrt(valC2)}` : `c ≈ ${Math.sqrt(valC2).toFixed(2)}`;

        ctx.save();
        // Mittelpunkt der Hypotenuse
        let mx = ox + b/2;
        let my = oy - a/2;
        // Verschiebe den Text in das Zentrum des Quadrats (halbe Diagonale nach außen)
        let textX = mx + Math.sin(angle) * (distC / 2);
        let textY = my - Math.cos(angle) * (distC / 2);

        ctx.translate(textX, textY);
        // Text-Rotation: Immer lesbar halten
        let textRot = -angle;
        if (textRot < -Math.PI/2 || textRot > Math.PI/2) textRot += Math.PI;
        ctx.rotate(textRot);

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(labelC, 0, 0);
        ctx.restore();

        // Formel oben aktualisieren
        document.getElementById('formula').innerHTML =
            `${valA}² + ${valB}² = c² <br>` +
            `<span style="color:#d63031">${valA*valA}</span> + <span style="color:#0984e3">${valB*valB}</span> = <span style="color:#6c5ce7">${valC2}</span>`;

        // Ziehpunkte
        ctx.fillStyle = "#0984e3"; ctx.beginPath(); ctx.arc(ox + b, oy, 12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#d63031"; ctx.beginPath(); ctx.arc(ox, oy - a, 12, 0, Math.PI*2); ctx.fill();
    }

    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        if (Math.hypot(mx - (300 + b), my - 500) < 30) draggingB = true;
        if (Math.hypot(mx - 300, my - (500 - a)) < 30) draggingA = true;
    };
    window.onmousemove = (e) => {
        const rect = canvas.getBoundingClientRect();
        if (draggingA) a = Math.max(20, Math.min(350, 500 - (e.clientY - rect.top)));
        if (draggingB) b = Math.max(20, Math.min(450, (e.clientX - rect.left) - 300));
        if (draggingA || draggingB) draw();
    };
    window.onmouseup = () => { draggingA = draggingB = false; };
    draw();
</script>
</body>
</html>
