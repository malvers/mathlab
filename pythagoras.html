<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | Der allgemeine Pythagoras</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-pink: #ff0055;
            --neon-green: #39FF14;
            --neon-orange: #ff8800;
            --bg-dark: #050b18;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-bright: rgba(255, 255, 255, 0.05);

            --kathete-a: var(--neon-blue);
            --kathete-b: var(--neon-green);
            --hypotenuse: var(--neon-orange);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #0a1329 0%, #050b18 100%);
            color: white;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
        }

        #side-panel {
            width: 380px;
            min-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
            box-sizing: border-box;
            box-shadow: 15px 0 45px rgba(0, 0, 0, 0.6);
            overflow-y: auto;
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: crosshair;
            touch-action: none;
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }


        /* --- INSTRUMENT CARDS --- */
        .instrument-card {
            background: var(--glass-bright);
            padding: 15px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .instrument-title {
            font-family: 'Orbitron';
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
            margin-bottom: 5px;
        }

        select {
            padding: 12px;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            cursor: pointer;
            width: 100%;
            outline: none;
        }

        .stats-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stats-label {
            font-family: 'Orbitron';
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-val {
            font-family: 'Orbitron';
            font-size: 1.15rem;
            font-weight: bold;
        }

        .val-a {
            color: var(--kathete-a);
            text-shadow: 0 0 10px var(--kathete-a);
        }

        .val-b {
            color: var(--kathete-b);
            text-shadow: 0 0 10px var(--kathete-b);
        }

        .val-c {
            color: var(--hypotenuse);
            text-shadow: 0 0 12px var(--hypotenuse);
        }

        button {
            padding: 15px 20px;
            font-size: 0.85rem;
            font-family: 'Orbitron', sans-serif;
            background: var(--glass-bright);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            width: 100%;
        }

        button:hover {
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        .footer-credit {
            margin-top: auto;
            padding-top: 15px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

    <div id="side-panel">
        <!-- Sidebar Navigation (Home/Back) Injected here by branding.js -->
        <div id="sidebar-header" style="min-height: 60px;"></div>

        <div class="instrument-card">
            <div class="instrument-title">Konstruktions-Modus</div>
            <select id="mode" onchange="draw()">
                <option value="quadrat">Quadrate</option>
                <option value="halbkreis">Halbkreise</option>
                <option value="dreieck">Gleichseitige Dreiecke</option>
                <option value="stern">Crazy Star 🌟</option>
                <option value="pacman">Pac-Man Mode 🕹️</option>
            </select>
        </div>

        <div class="instrument-card">
            <div class="instrument-title">Satz des Pythagoras</div>
            <div class="stats-card">
                <span class="stats-label">Flächen-Summe [A₁+A₂]</span>
                <span id="result-text" class="stats-val">0.00</span>
            </div>
            <div class="stats-card">
                <span class="stats-label">Große Fläche [A₃]</span>
                <span id="check-text" class="stats-val">0.00</span>
            </div>
        </div>

        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
            <button id="btn-reset" onclick="resetLab()">LABOR RESET</button>
            <footer class="footer-credit">
                &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull;
                <br>
                <a href="impressum.html"
                    style="color:rgba(255,255,255,0.2); font-size: 0.5rem; text-decoration: none;">IMPRESSUM</a>
            </footer>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script src="branding.js"></script>
    <script>
        // Initialize Branding
        CyberBranding.init({
            title: "Doc Alvers Mathe-Labor",
            subtitle: "Der allgemeine Pythagoras"
        });
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const modeSelect = document.getElementById('mode');

        let a_px = 120, b_px = 160;
        let draggingA = false, draggingB = false;
        let ox = 0, oy = 0;

        // Cyber-Labor Farbschema (Maximale Vibrancy)
        const neonPink = "#ff0055";
        const neonGreen = "#39FF14";
        const neonOrange = "#ff8800";
        const neonBlue = "#00d2ff";

        function drawShape(pStart, pEnd, type, color) {
            ctx.fillStyle = color;
            ctx.beginPath();

            let dx = pEnd.x - pStart.x;
            let dy = pEnd.y - pStart.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            let nx = -dy / dist;
            let ny = dx / dist;

            if (type === 'quadrat') {
                ctx.moveTo(pStart.x, pStart.y);
                ctx.lineTo(pEnd.x, pEnd.y);
                ctx.lineTo(pEnd.x + nx * dist, pEnd.y + ny * dist);
                ctx.lineTo(pStart.x + nx * dist, pStart.y + ny * dist);
            } else if (type === 'halbkreis') {
                let centerX = (pStart.x + pEnd.x) / 2;
                let centerY = (pStart.y + pEnd.y) / 2;
                let angle = Math.atan2(dy, dx);
                ctx.moveTo(pStart.x, pStart.y);
                ctx.lineTo(pEnd.x, pEnd.y);
                ctx.arc(centerX, centerY, dist / 2, angle, angle + Math.PI, false);
            } else if (type === 'dreieck') {
                let h = (dist * Math.sqrt(3)) / 2;
                ctx.moveTo(pStart.x, pStart.y);
                ctx.lineTo(pEnd.x, pEnd.y);
                ctx.lineTo((pStart.x + pEnd.x) / 2 + nx * h, (pStart.y + pEnd.y) / 2 + ny * h);
            } else if (type === 'stern') {
                let steps = 10;
                ctx.moveTo(pStart.x, pStart.y);
                for (let i = 1; i < steps; i++) {
                    let t = i / steps;
                    let currX = pStart.x + t * dx;
                    let currY = pStart.y + t * dy;
                    let h = (i % 2 === 0) ? (dist * 0.2) : (dist * 0.7);
                    if (i === 5) h *= 1.2;
                    ctx.lineTo(currX + nx * h, currY + ny * h);
                }
                ctx.lineTo(pEnd.x, pEnd.y);
            } else if (type === 'pacman') {
                let centerX = (pStart.x + pEnd.x) / 2;
                let centerY = (pStart.y + pEnd.y) / 2;
                let angle = Math.atan2(dy, dx);
                ctx.moveTo(pStart.x, pStart.y);
                ctx.lineTo(pEnd.x, pEnd.y);
                ctx.arc(centerX + nx * dist * 0.1, centerY + ny * dist * 0.1, dist / 2, angle + 0.3, angle + Math.PI - 0.3, false);
                ctx.lineTo(centerX + nx * dist * 0.1, centerY + ny * dist * 0.1);
            }
            ctx.closePath();
            ctx.fill();
        }

        function draw() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, rect.width, rect.height);

            ox = rect.width * 0.35;
            oy = rect.height * 0.60;

            const A = { x: ox, y: oy - a_px };
            const B = { x: ox + b_px, y: oy };
            const C = { x: ox, y: oy };

            ctx.globalAlpha = 0.85;

            ctx.shadowBlur = 30; ctx.shadowColor = neonBlue;
            drawShape(A, C, modeSelect.value, neonBlue);

            ctx.shadowBlur = 30; ctx.shadowColor = neonGreen;
            drawShape(C, B, modeSelect.value, neonGreen);

            ctx.shadowBlur = 30; ctx.shadowColor = neonOrange;
            drawShape(B, A, modeSelect.value, neonOrange);

            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1.0;

            // Dreieck Mitte
            ctx.beginPath();
            ctx.moveTo(C.x, C.y); ctx.lineTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.closePath();
            ctx.fillStyle = "white"; ctx.fill();
            ctx.strokeStyle = "#2d3436"; ctx.lineWidth = 1.5; ctx.stroke();

            // Rechter Winkel (Klassische Ecke)
            ctx.strokeStyle = "rgba(15, 23, 42, 0.4)"; ctx.lineWidth = 1.5;
            ctx.strokeRect(ox, oy - 15, 15, 15);

            // Mathematik (Skalierung auf cm)
            let cmFactor = 40;
            let valA = a_px / cmFactor, valB = b_px / cmFactor;

            let factor = 1;
            if (modeSelect.value === 'halbkreis') factor = Math.PI / 8;
            if (modeSelect.value === 'dreieck') factor = Math.sqrt(3) / 4;
            if (modeSelect.value === 'stern') factor = 0.45;
            if (modeSelect.value === 'pacman') factor = 0.34;

            let areaA = factor * Math.pow(valA, 2);
            let areaB = factor * Math.pow(valB, 2);
            let areaSum = areaA + areaB;

            document.getElementById('result-text').innerHTML =
                `<span class="val-a">${areaA.toFixed(2)}</span> + <span class="val-b">${areaB.toFixed(2)}</span> = <span class="val-c">${areaSum.toFixed(2)}</span>`;

            document.getElementById('check-text').innerHTML =
                `<span class="val-c">A₃ = ${areaSum.toFixed(2)}</span>`;

            // Kantenbeschriftungen am Canvas (Zentrales Dreieck) - TOP LAYER
            ctx.font = "bold 15px Orbitron";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.shadowBlur = 10; ctx.shadowColor = "white";
            ctx.fillStyle = "white";

            // Kathete A (Links)
            ctx.fillText(valA.toFixed(2), ox - 35, oy - a_px / 2);

            // Kathete B (Unten)
            ctx.fillText(valB.toFixed(2), ox + b_px / 2, oy + 30);

            // Hypotenuse C (Schräg)
            let mX = ox + b_px / 2, mY = oy - a_px / 2;
            ctx.fillText(Math.hypot(valA, valB).toFixed(2), mX + 25, mY - 25);
            ctx.shadowBlur = 0;

            // Anfasser (Punkte)
            ctx.shadowBlur = 15; ctx.shadowColor = neonGreen;
            ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.arc(B.x, B.y, 7, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 15; ctx.shadowColor = neonBlue;
            ctx.beginPath(); ctx.arc(A.x, A.y, 7, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
        }

        function resetLab() {
            a_px = 120; b_px = 160; draw();
        }

        // --- TOUCH & MOUSE ENGINE ---
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrag(e) {
            const pos = getPos(e);
            if (Math.hypot(pos.x - (ox + b_px), pos.y - oy) < 40) draggingB = true;
            if (Math.hypot(pos.x - ox, pos.y - (oy - a_px)) < 40) draggingA = true;
            if (draggingA || draggingB) e.preventDefault();
        }

        function moveDrag(e) {
            if (!draggingA && !draggingB) return;
            const pos = getPos(e);
            const rect = canvas.getBoundingClientRect();

            if (draggingA) a_px = Math.max(40, Math.min(rect.height * 0.5, oy - pos.y));
            if (draggingB) b_px = Math.max(40, Math.min(rect.width * 0.5, pos.x - ox));

            draw();
            e.preventDefault();
        }

        function stopDrag() { draggingA = draggingB = false; }

        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', moveDrag);
        window.addEventListener('mouseup', stopDrag);

        canvas.addEventListener('touchstart', startDrag, { passive: false });
        window.addEventListener('touchmove', moveDrag, { passive: false });
        window.addEventListener('touchend', stopDrag);

        window.addEventListener('resize', draw);

        setTimeout(draw, 50);
    </script>
</body>

</html>
