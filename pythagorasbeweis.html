<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | Pythagoras Pure Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --labor-red: rgb(198, 33, 40);
            --labor-blue-dark: rgb(0, 0, 60);
            --labor-blue-light: rgba(100, 150, 255, 0.4);
        }
        body {
            margin: 0; font-family: 'Inter', sans-serif; background: #fff;
            display: flex; height: 100vh; overflow: hidden; touch-action: none;
        }

        #side-panel {
            width: 420px; min-width: 420px;
            border-right: 2px solid #ddd;
            padding: 10px 25px;
            background: #fdfdfd;
            display: flex; flex-direction: column; gap: 8px;
            overflow: hidden; z-index: 10;
        }

        h2 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; margin: 0; color: var(--labor-red); border-bottom: 3px solid var(--labor-red); padding-bottom: 5px; }

        .math-table { font-family: 'Courier New', monospace; font-size: 1.05rem; width: 100%; border-collapse: collapse; }
        .math-table td { padding: 3px 0; border-bottom: 1px solid #eee; }
        .math-table .val { text-align: right; font-weight: bold; color: var(--labor-blue-dark); }

        .sum-section { border-top: 3px solid #333; margin-top: 5px; padding-top: 8px; }
        .sum-row { font-weight: bold; font-size: 1.2rem; display: flex; justify-content: space-between; }
        .target-row { font-weight: bold; font-size: 1.2rem; display: flex; justify-content: space-between; color: #444; margin-top: 2px; }

        .proof-text {
            margin-top: 8px; color: #2e7d32; font-size: 0.9rem; font-weight: bold;
            text-align: center; display: none; line-height: 1.2;
        }

        canvas { flex-grow: 1; cursor: grab; background: #fff; }

        .rot-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-ui {
            padding: 12px 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
            background: #f0f0f0; border: 2px solid #bbb; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.2s; user-select: none; font-family: 'Inter';
        }
        .btn-ui span { font-size: 0.75rem; font-family: 'Orbitron'; margin-top: 2px; color: #666; }
        .btn-ui:active { background: #ccc; transform: scale(0.95); }
        .btn-ui.active { background: #e3f2fd; border-color: #2196f3; }

        .btn-reset { margin-top: auto; margin-bottom: 10px; padding: 10px; background: #333; color: white; border: none; border-radius: 8px; font-family: 'Orbitron'; font-size: 0.9rem; cursor: pointer; }
    </style>
</head>
<body>

<div id="side-panel">
    <a href="index.html" style="text-decoration: none; font-size: 0.8rem; color: #888; font-weight: bold;">&larr; ZENTRALE</a>
    <h2>PYTHAGORAS LABOR</h2>

    <div id="tri-gedoens-ui">
        <table class="math-table" id="tri-table"></table>

        <div class="sum-section">
            <div class="sum-row"><span>Summe (8):</span> <span id="val-sum8">0.00</span></div>
            <div class="target-row"><span>Fläche ABCD:</span> <span id="val-target-abcd">260000.00</span></div>
            <div id="proof-msg" class="proof-text">
                Bewiesen: die Summe der Teildreiecke ist gleich der Fläche ABCD
            </div>
        </div>
    </div>

    <div style="margin-top: 5px;">
        <div style="font-weight: bold; font-size: 0.85rem; color: #666; margin-bottom: 5px;">STEUERUNG:</div>
        <div class="rot-controls">
            <div class="btn-ui" onclick="rotateFixed(-10)">⟲ LEFT<span>-10°</span></div>
            <div class="btn-ui" onclick="rotateFixed(10)">↻ RIGHT<span>+10°</span></div>
            <div id="toggle-btn" class="btn-ui active" onclick="toggleGedoens()" style="grid-column: span 2;">
                DREIECKSGEDÖNS<span>AN / AUS</span>
            </div>
        </div>
    </div>

    <button class="btn-reset" onclick="resetLab()">SYSTEM RESET</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const aLen = 100.0, sWidth = 600.0;
    let ox = 0, oy = 0, A, B, C, D, b_point, triangles = [], selectedTri = null;
    let dragging = false, lastMouse = {x: 0, y: 0};
    let gedoensVisible = true;

    class Triangle {
        constructor(x1, y1, x2, y2, x3, y3) {
            this.pts = [{x: x1, y: y1}, {x: x2, y: y2}, {x: x3, y: y3}];
        }
        getCenter() {
            return { x: (this.pts[0].x + this.pts[1].x + this.pts[2].x)/3, y: (this.pts[0].y + this.pts[1].y + this.pts[2].y)/3 };
        }
        translate(dx, dy) { this.pts.forEach(p => { p.x += dx; p.y += dy; }); }
        rotate(deg) {
            const rad = deg * Math.PI / 180, cos = Math.cos(rad), sin = Math.sin(rad), c = this.getCenter();
            this.pts.forEach(p => {
                const dx = p.x - c.x, dy = p.y - c.y;
                p.x = c.x + dx * cos - dy * sin; p.y = c.y + dx * sin + dy * cos;
            });
        }
        contains(x, y) {
            const [p0, p1, p2] = this.pts;
            const area = 0.5 * (-p1.y * p2.x + p0.y * (-p1.x + p2.x) + p0.x * (p1.y - p2.y) + p1.x * p2.y);
            const s = 1/(2*area) * (p0.y * p2.x - p0.x * p2.y + (p2.y - p0.y) * x + (p0.x - p2.x) * y);
            const t = 1/(2*area) * (p0.x * p1.y - p0.y * p1.x + (p0.y - p1.y) * x + (p1.x - p0.x) * y);
            return s >= 0 && t >= 0 && (s + t) <= 1;
        }
        getArea() {
            const [p1, p2, p3] = this.pts;
            return Math.abs((p1.x*(p2.y-p3.y) + p2.x*(p3.y-p1.y) + p3.x*(p1.y-p2.y))/2.0);
        }
    }

    function toggleGedoens() {
        gedoensVisible = !gedoensVisible;
        const ui = document.getElementById('tri-gedoens-ui');
        const btn = document.getElementById('toggle-btn');
        ui.style.visibility = gedoensVisible ? 'visible' : 'hidden';
        btn.classList.toggle('active');
        draw();
    }

    function resetLab() {
        const w = canvas.width / window.devicePixelRatio;
        const h = canvas.height / window.devicePixelRatio;
        ox = 60; oy = (h - sWidth) / 2;

        A = { x: ox + sWidth, y: oy + aLen }; B = { x: ox + sWidth - aLen, y: oy + sWidth };
        C = { x: ox, y: oy + sWidth - aLen }; D = { x: ox + aLen, y: oy };
        b_point = { x: ox + sWidth, y: oy };

        triangles = [
            new Triangle(ox+aLen, oy, ox+sWidth, oy, ox+sWidth, oy+aLen),
            new Triangle(ox+sWidth, oy+aLen, ox+sWidth, oy+sWidth, ox+sWidth-aLen, oy+sWidth),
            new Triangle(ox+sWidth-aLen, oy+sWidth, ox, oy+sWidth, ox, oy+sWidth-aLen),
            new Triangle(ox, oy+sWidth-aLen, ox, oy, ox+aLen, oy)
        ];
        selectedTri = null; draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const t0 = triangles[0];
        const subs = [
            new Triangle(C.x, C.y, t0.pts[0].x, t0.pts[0].y, D.x, D.y),
            new Triangle(D.x, D.y, t0.pts[0].x, t0.pts[0].y, A.x, A.y),
            new Triangle(t0.pts[0].x, t0.pts[0].y, A.x, A.y, t0.pts[1].x, t0.pts[1].y),
            new Triangle(A.x, A.y, t0.pts[1].x, t0.pts[1].y, B.x, B.y),
            new Triangle(t0.pts[1].x, t0.pts[1].y, B.x, B.y, t0.pts[2].x, t0.pts[2].y),
            new Triangle(B.x, B.y, C.x, C.y, t0.pts[2].x, t0.pts[2].y),
            new Triangle(C.x, C.y, t0.pts[2].x, t0.pts[2].y, t0.pts[0].x, t0.pts[0].y),
            new Triangle(D.x, D.y, A.x, A.y, b_point.x, b_point.y)
        ];

        ctx.fillStyle = 'blue'; ctx.fillRect(ox, oy, sWidth, sWidth);

        if (gedoensVisible) {
            subs.forEach(sub => {
                ctx.fillStyle = 'rgba(100, 150, 255, 0.4)'; ctx.beginPath();
                ctx.moveTo(sub.pts[0].x, sub.pts[0].y); ctx.lineTo(sub.pts[1].x, sub.pts[1].y); ctx.lineTo(sub.pts[2].x, sub.pts[2].y);
                ctx.closePath(); ctx.fill(); ctx.strokeStyle = 'rgb(0,0,60)'; ctx.lineWidth = 1; ctx.stroke();
            });
        }

        triangles.forEach(tri => {
            ctx.fillStyle = (tri === selectedTri) ? 'orange' : 'rgb(198, 33, 40)';
            ctx.beginPath(); ctx.moveTo(tri.pts[0].x, tri.pts[0].y);
            ctx.lineTo(tri.pts[1].x, tri.pts[1].y); ctx.lineTo(tri.pts[2].x, tri.pts[2].y);
            ctx.closePath(); ctx.fill();

            if (tri === selectedTri && gedoensVisible) {
                ctx.fillStyle = "black"; ctx.font = "bold 16px Arial";
                ctx.fillText("1", tri.pts[0].x - 12, tri.pts[0].y - 8);
                ctx.fillText("2", tri.pts[1].x + 8, tri.pts[1].y - 8);
                ctx.fillText("3", tri.pts[2].x + 8, tri.pts[2].y + 16);
            }
        });

        ctx.fillStyle = "black"; ctx.font = "bold 20px Arial";
        [{p:A,t:"A"},{p:B,t:"B"},{p:C,t:"C"},{p:D,t:"D"}].forEach(l => ctx.fillText(l.t, l.p.x+10, l.p.y+10));

        let sum8 = 0, html = "", labels = ["C1D", "D1A", "1A2", "A2B", "2B3", "BC3", "C31", "DAb"];
        subs.forEach((s, i) => {
            const a = s.getArea();
            sum8 += a;
            html += `<tr><td>${labels[i]}</td><td class="val">${a.toFixed(2)}</td></tr>`;
        });
        document.getElementById('tri-table').innerHTML = html;
        document.getElementById('val-sum8').innerText = sum8.toFixed(2);

        const targetArea = 260000.00;
        if(Math.abs(sum8 - targetArea) < 1.0) document.getElementById('proof-msg').style.display = 'block';
        else document.getElementById('proof-msg').style.display = 'none';
    }

    function rotateFixed(deg) {
        if(!selectedTri) return;
        selectedTri.rotate(deg);
        draw();
    }

    canvas.onpointerdown = e => {
        const r = canvas.getBoundingClientRect(), x = (e.clientX - r.left), y = (e.clientY - r.top);
        selectedTri = triangles.find(t => t.contains(x, y)) || null;
        if(selectedTri) { dragging = true; lastMouse = {x, y}; }
        draw();
    };
    window.onpointermove = e => {
        if(!dragging || !selectedTri) return;
        const r = canvas.getBoundingClientRect(), x = (e.clientX - r.left), y = (e.clientY - r.top);
        selectedTri.translate(x - lastMouse.x, y - lastMouse.y); lastMouse = {x, y}; draw();
    };
    window.onpointerup = () => dragging = false;

    function init() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = canvas.clientWidth * dpr; canvas.height = canvas.clientHeight * dpr;
        ctx.scale(dpr, dpr); resetLab();
    }
    window.onresize = init; init();
</script>
</body>
</html>
