<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pythagoras | Das finale Labor</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
    :root {
        --neon-blue: #00d2ff;
        --neon-purple: #9d50bb;
        --neon-pink: #ff0055;
        --neon-green: #39FF14;
        --neon-orange: #ff8800;
        --bg-dark: #050b18;
        --glass: rgba(15, 23, 42, 0.7);
        --glass-bright: rgba(255, 255, 255, 0.05);
    }

    body {
        margin: 0;
        font-family: 'Outfit', sans-serif;
        background: radial-gradient(circle at center, #0a1329 0%, #050b18 100%);
        color: white;
        display: flex;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        touch-action: none;
    }

    #side-panel {
        width: 380px;
        min-width: 380px;
        background: var(--glass);
        backdrop-filter: blur(25px);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 10;
        box-sizing: border-box;
        box-shadow: 15px 0 45px rgba(0, 0, 0, 0.6);
        overflow-y: auto;
    }

    #canvas-container {
        flex-grow: 1;
        position: relative;
        background: transparent;
        overflow: hidden;
    }

    canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
        cursor: crosshair;
    }

    /* --- DASHBOARD BUTTON --- */
    .dashboard-btn {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        padding: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        transition: all 0.3s ease;
        letter-spacing: 1.5px;
        backdrop-filter: blur(5px);
        width: 100%;
        box-sizing: border-box;
    }
    .dashboard-btn:hover {
        color: white;
        background: rgba(0, 210, 255, 0.1);
        border-color: var(--neon-blue);
        box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        transform: translateX(5px);
    }
    .dashboard-btn svg { width: 16px; height: 16px; stroke-width: 2.5; }


    .instrument-card {
        background: var(--glass-bright);
        padding: 15px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .instrument-title {
        font-family: 'Orbitron';
        font-size: 0.65rem;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 2px;
        text-transform: uppercase;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding-bottom: 8px;
        margin-bottom: 5px;
    }

    .stats-card {
        background: rgba(255, 255, 255, 0.03);
        padding: 12px 15px;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        border-left: 3px solid var(--neon-orange);
    }
    .stats-label { font-family: 'Orbitron'; font-size: 0.6rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }
    .stats-val { font-family: 'Orbitron'; font-size: 1.15rem; font-weight: bold; }

    #math-log {
        max-height: 250px;
        overflow-y: auto;
        font-family: 'Orbitron';
        font-size: 0.8rem;
        padding-right: 8px;
    }
    #math-log::-webkit-scrollbar { width: 4px; }
    #math-log::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 10px; }
    #math-log::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
    #math-log::-webkit-scrollbar-thumb:hover { background: var(--neon-blue); }
    .log-entry {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding: 8px 0;
        color: rgba(255, 255, 255, 0.7);
    }
    .log-entry span:first-child { color: var(--neon-blue); font-weight: bold; }

    button {
        padding: 15px 20px;
        font-size: 0.8rem;
        font-family: 'Orbitron', sans-serif;
        background: var(--glass-bright);
        color: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s;
        text-transform: uppercase;
        letter-spacing: 1.5px;
    }
    button:hover { background: rgba(0, 210, 255, 0.1); border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }
    
    #btn-toggle-tria.off { opacity: 0.5; border-style: dashed; }

    .footer-credit {
        margin-top: auto;
        padding-top: 15px;
        text-align: center;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.55rem;
        color: rgba(255,255,255,0.3);
        letter-spacing: 1px;
    }
    </style>
    <script src="https://unpkg.com/earcut@2.2.4/dist/earcut.min.js"></script>
</head>
<body>

<div id="side-panel">
  <header style="border: none; padding-bottom: 5px;">
    <a href="index.html" class="dashboard-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      <span>DASHBOARD</span>
    </a>
  </header>

  <div class="instrument-card">
    <div class="instrument-title">Labor-Status</div>
    <div class="stats-card">
        <span class="stats-label">Zielfläche [ABCD]</span>
        <span id="target-area" class="stats-val" style="color: var(--neon-orange);">0,00 cm²</span>
    </div>
    <div class="stats-card" style="border-left-color: var(--neon-purple);">
        <span class="stats-label">Summe Dreiecke</span>
        <span id="blue-sum" class="stats-val" style="color: var(--neon-purple);">0,00 cm²</span>
    </div>
  </div>

  <div class="instrument-card">
    <div class="instrument-title">Protokoll [cm²]</div>
    <div id="math-log"></div>
  </div>

  <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
    <button id="btn-reset" onclick="resetLab()">BEWEIS RESET</button>
    <button id="btn-toggle-tria" onclick="toggleTria()">TRIANGULIERUNG AN</button>
    <footer class="footer-credit">
        &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull;
        <br>
        <a href="impressum.html" style="color:rgba(255,255,255,0.2); font-size: 0.5rem; text-decoration: none;">IMPRESSUM</a>
    </footer>
  </div>
</div>

<div id="canvas-container">
    <canvas id="canvas"></canvas>
</div>

<script src="js/branding.js"></script>
<script>
    // Initialize Branding
    CyberBranding.init({
        title: "Doc Alvers Mathe-Labor",
        subtitle: "Pythagoras-Beweis"
    });

    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvas-container');
    const units = 7;

    // Cyber Color Palette (Hardcoded für Canvas-Stabilität)
    const neonPurple = "#9d50bb";
    const neonBlue   = "#00d2ff";
    const neonPink   = "#ff0055";
    const neonOrange = "#ff8800";
    const neonGreen  = "#39FF14";

    let sWidth, pxToCmFactor, aPx;
    let ox, oy, triangles = [], anchors = [], selectedTri = null;
    let dragging = false, rotating = false, lastMouse = {x:0, y:0}, anyCollision = false;

    const showCornerDots = true;
    let showTria = true;

    function toggleTria() {
        showTria = !showTria;
        const btn = document.getElementById('btn-toggle-tria');
        if (showTria) {
            btn.innerText = "TRIANGULIERUNG AN";
            btn.classList.remove('off');
        } else {
            btn.innerText = "TRIANGULIERUNG AUS";
            btn.classList.add('off');
        }
        draw();
    }

    function resetLab() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = wrapper.clientWidth * dpr;
        canvas.height = wrapper.clientHeight * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const canvasW = wrapper.clientWidth;
        const canvasH = wrapper.clientHeight;

        sWidth = Math.min(600, canvasW * 0.8, canvasH * 0.8);
        pxToCmFactor = units / sWidth;

        ox = (canvasW - sWidth) / 2;
        oy = (canvasH - sWidth) / 2;

        aPx = sWidth * (3 / 7);

        anchors = [{id:'D',x:ox+aPx,y:oy},{id:'A',x:ox+sWidth,y:oy+aPx},{id:'B',x:ox+sWidth-aPx,y:oy+sWidth},{id:'C',x:ox,y:oy+sWidth-aPx}];

        triangles = [
            { pts: [{x:ox+aPx, y:oy}, {x:ox, y:oy}, {x:ox, y:oy+sWidth-aPx}], color: neonBlue },
            { pts: [{x:ox+sWidth, y:oy+aPx}, {x:ox+sWidth, y:oy}, {x:ox+aPx, y:oy}], color: neonGreen },
            { pts: [{x:ox+sWidth-aPx, y:oy+sWidth}, {x:ox+sWidth, y:oy+sWidth}, {x:ox+sWidth, y:oy+aPx}], color: neonOrange },
            { pts: [{x:ox, y:oy+sWidth-aPx}, {x:ox, y:oy+sWidth}, {x:ox+sWidth-aPx, y:oy+sWidth}], color: neonPurple }
        ];
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let yellowTotal = 0, logHtml = "";

        let isOutOfBounds = false;
        for (let t of triangles) {
            for (let p of t.pts) {
                if (p.x < ox - 1.0 || p.x > ox + sWidth + 1.0 || p.y < oy - 1.0 || p.y > oy + sWidth + 1.0) {
                    isOutOfBounds = true; break;
                }
            }
            if (isOutOfBounds) break;
        }

        if (showTria && !anyCollision && !isOutOfBounds) {
            let vertices = [];
            let holeIndices = [];

            vertices.push(ox, oy, ox+sWidth, oy, ox+sWidth, oy+sWidth, ox, oy+sWidth);

            triangles.forEach(t => {
                holeIndices.push(vertices.length / 2);

                const cx = (t.pts[0].x + t.pts[1].x + t.pts[2].x) / 3;
                const cy = (t.pts[0].y + t.pts[1].y + t.pts[2].y) / 3;

                const f = 0.9999;

                vertices.push(cx + (t.pts[0].x - cx) * f, cy + (t.pts[0].y - cy) * f);
                vertices.push(cx + (t.pts[1].x - cx) * f, cy + (t.pts[1].y - cy) * f);
                vertices.push(cx + (t.pts[2].x - cx) * f, cy + (t.pts[2].y - cy) * f);
            });

            const mesh = earcut(vertices, holeIndices);
            let triCount = 1;

            for (let i = 0; i < mesh.length; i += 3) {
                const i1 = mesh[i] * 2, i2 = mesh[i+1] * 2, i3 = mesh[i+2] * 2;
                const p1 = {x: vertices[i1], y: vertices[i1+1]};
                const p2 = {x: vertices[i2], y: vertices[i2+1]};
                const p3 = {x: vertices[i3], y: vertices[i3+1]};

                ctx.shadowBlur = 0;
                ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
                ctx.strokeStyle = "rgba(255, 255, 255, 0.4)"; ctx.lineWidth = 0.8;
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.closePath();
                ctx.fill(); ctx.stroke();

                const areaPx = Math.abs(p1.x*(p2.y - p3.y) + p2.x*(p3.y - p1.y) + p3.x*(p1.y - p2.y)) / 2;
                const areaCm = areaPx * (pxToCmFactor**2);

                if (areaCm > 0.01) {
                    yellowTotal += areaCm;
                    const midX = (p1.x + p2.x + p3.x) / 3, midY = (p1.y + p2.y + p3.y) / 3;

                    // IDs für Triangulierung am Canvas (Zahlen wieder weiß)
                    ctx.font = "bold 11px Orbitron";
                    ctx.shadowBlur = 4; ctx.shadowColor = "black";
                    ctx.fillStyle = "white"; 
                    ctx.fillText(triCount.toString().padStart(2,'0'), midX, midY);
                    ctx.shadowBlur = 0;

                    logHtml += `<div class="log-entry"><span>${triCount.toString().padStart(2,'0')}</span><span>${areaCm.toFixed(2)}</span></div>`;
                    triCount++;
                }
            }
        } else if (!showTria) {
            logHtml = `<div style="color: #64748b; font-size: 0.8rem; text-align: center; margin-top: 20px;">TRIANGULIERUNG DEAKTIVIERT</div>`;
        } else if (isOutOfBounds) {
            logHtml = `<div style="color: var(--labor-red); font-size: 0.8rem; text-align: center; margin-top: 20px;">DREIECK AUßERHALB DES RAHMENS</div>`;
        } else if (anyCollision) {
            logHtml = `<div style="color: var(--labor-red); font-size: 0.8rem; text-align: center; margin-top: 20px;">KOLLISION ERKANNT</div>`;
        }

        const sumElement = document.getElementById('blue-sum');
        sumElement.innerText = yellowTotal.toFixed(2).replace('.',',') + " cm²";
        sumElement.style.color = showTria ? "yellow" : "#64748b";

        document.getElementById('math-log').innerHTML = logHtml;

        triangles.forEach((t) => {
            ctx.beginPath(); ctx.moveTo(t.pts[0].x, t.pts[0].y); ctx.lineTo(t.pts[1].x, t.pts[1].y); ctx.lineTo(t.pts[2].x, t.pts[2].y); ctx.closePath();
            
            ctx.shadowBlur = 12; 
            ctx.shadowColor = t.collision ? "red" : (t === selectedTri ? "white" : t.color);
            ctx.fillStyle = t.collision ? "rgba(255,0,0,0.6)" : (t === selectedTri ? "rgba(255,255,255,0.9)" : t.color + "E6");
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.lineWidth = 0.5; ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
            ctx.stroke();

            if (showCornerDots) {
                t.pts.forEach((p) => {
                    ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
                    ctx.fillStyle = "#1e293b"; ctx.fill();
                    ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 1; ctx.stroke();
                });
            }

            // RECHTER WINKEL (KLASSISCHE ECKE)
            const p0 = t.pts[0], p1 = t.pts[1], p2 = t.pts[2];
            const size = 12;
            const d1x = (p0.x - p1.x) / Math.hypot(p0.x - p1.x, p0.y - p1.y);
            const d1y = (p0.y - p1.y) / Math.hypot(p0.x - p1.x, p0.y - p1.y);
            const d2x = (p2.x - p1.x) / Math.hypot(p2.x - p1.x, p2.y - p1.y);
            const d2y = (p2.y - p1.y) / Math.hypot(p2.x - p1.x, p2.y - p1.y);

            ctx.shadowBlur = 0;
            ctx.lineWidth = 0.5; ctx.strokeStyle = "white";
            ctx.beginPath();
            ctx.moveTo(p1.x + d1x * size, p1.y + d1y * size);
            ctx.lineTo(p1.x + d1x * size + d2x * size, p1.y + d1y * size + d2y * size);
            ctx.lineTo(p1.x + d2x * size, p1.y + d2y * size);
            ctx.stroke();
        });

        // TRIANGLE IDs - TOP LAYER
        ctx.font = "bold 22px Orbitron";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.shadowBlur = 0;
        ctx.fillStyle = "white";

        triangles.forEach((t) => {
            // IDs removed as per user request
        });

        ctx.shadowBlur = 20; ctx.shadowColor = "white";
        ctx.strokeStyle = "white"; ctx.lineWidth = 1.5; ctx.strokeRect(ox, oy, sWidth, sWidth);
        ctx.shadowBlur = 0;
        anchors.forEach(a => {
            ctx.fillStyle = "rgba(30, 41, 59, 0.4)"; ctx.beginPath(); ctx.arc(a.x, a.y, 5, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.2)"; ctx.lineWidth = 1; ctx.stroke();
        });

        const tArea = Math.pow(Math.hypot(anchors[0].x - anchors[1].x, anchors[0].y - anchors[1].y), 2) * (pxToCmFactor**2);
        document.getElementById('target-area').innerText = tArea.toFixed(2).replace('.',',') + " cm²";
    }

    function checkCollisions() {
        anyCollision = false; triangles.forEach(t => t.collision = false);
        for (let i=0; i<triangles.length; i++) {
            for (let j=i+1; j<triangles.length; j++) {
                if (triIntersect(triangles[i].pts, triangles[j].pts)) {
                    triangles[i].collision = true; triangles[j].collision = true; anyCollision = true;
                }
            }
        }
    }
    function triIntersect(t1, t2) { return checkSAT(t1, t2) && checkSAT(t2, t1); }
    function checkSAT(t1, t2) {
        for (let i=0; i<3; i++) {
            const p1=t1[i], p2=t1[(i+1)%3], n={x:p2.y-p1.y, y:p1.x-p2.x};
            let min1=Infinity, max1=-Infinity, min2=Infinity, max2=-Infinity;
            t1.forEach(p=>{const pr=p.x*n.x+p.y*n.y; min1=Math.min(min1,pr); max1=Math.max(max1,pr);});
            t2.forEach(p=>{const pr=p.x*n.x+p.y*n.y; min2=Math.min(min2,pr); max2=Math.max(max2,pr);});
            if (max1 < min2+0.1 || max2 < min1+0.1) return false;
        }
        return true;
    }

    canvas.onpointerdown = e => {
        const r = canvas.getBoundingClientRect(), x = (e.clientX-r.left), y = (e.clientY-r.top);
        let found = false; rotating = false; dragging = false;

        for (let t of triangles) {
            for (let p of t.pts) {
                if (Math.hypot(p.x-x, p.y-y) < 15) { selectedTri = t; rotating = true; found = true; break; }
            }
            if (found) break;
        }

        if (!found) {
            for (let t of triangles) {
                const p = t.pts;
                const area = 0.5 *(-p[1].y*p[2].x + p[0].y*(-p[1].x + p[2].x) + p[0].x*(p[1].y - p[2].y) + p[1].x*p[2].y);
                const s = 1/(2*area)*(p[0].y*p[2].x - p[0].x*p[2].y + (p[2].y - p[0].y)*x + (p[0].x - p[2].x)*y);
                const t_ = 1/(2*area)*(p[0].x*p[1].y - p[0].y*p[1].x + (p[0].y - p[1].y)*x + (p[1].x - p[0].x)*y);
                if (s >= 0 && t_ >= 0 && (s + t_) <= 1) { selectedTri = t; dragging = true; found = true; break; }
            }
        }
        if (!found) selectedTri = null;
        lastMouse = {x, y}; draw();
    };

    canvas.onpointermove = e => {
        if(!selectedTri) return;
        const r = canvas.getBoundingClientRect(), x = (e.clientX-r.left), y = (e.clientY-r.top);
        const cX = (selectedTri.pts[0].x+selectedTri.pts[1].x+selectedTri.pts[2].x)/3, cY = (selectedTri.pts[0].y+selectedTri.pts[1].y+selectedTri.pts[2].y)/3;

        if (dragging) {
            const dx = x - lastMouse.x, dy = y - lastMouse.y;
            selectedTri.pts.forEach(p => { p.x += dx; p.y += dy; });
        }
        else if (rotating) {
            const angle = Math.atan2(y - cY, x - cX) - Math.atan2(lastMouse.y - cY, lastMouse.x - cX);
            selectedTri.pts.forEach(p => {
                const dx = p.x - cX, dy = p.y - cY;
                p.x = cX + dx * Math.cos(angle) - dy * Math.sin(angle);
                p.y = cY + dx * Math.sin(angle) + dy * Math.cos(angle);
            });
        }
        checkCollisions(); lastMouse = {x, y}; draw();
    };

    window.onpointerup = () => {
        if (selectedTri) {
            const cX = (selectedTri.pts[0].x+selectedTri.pts[1].x+selectedTri.pts[2].x)/3;
            const cY = (selectedTri.pts[0].y+selectedTri.pts[1].y+selectedTri.pts[2].y)/3;

            if (rotating) {
                let edgeAngle = Math.atan2(selectedTri.pts[1].y - selectedTri.pts[0].y, selectedTri.pts[1].x - selectedTri.pts[0].x);
                let snapAngle = Math.round(edgeAngle / (Math.PI/2)) * (Math.PI/2);

                if (Math.abs(edgeAngle - snapAngle) < 0.1) {
                    let correction = snapAngle - edgeAngle;
                    selectedTri.pts.forEach(p => {
                        const dx = p.x - cX, dy = p.y - cY;
                        p.x = cX + dx * Math.cos(correction) - dy * Math.sin(correction);
                        p.y = cY + dx * Math.sin(correction) + dy * Math.cos(correction);
                    });
                }
            }
            else if (dragging) {
                let snapDist = 10;
                let snapOffset = {x: 0, y: 0};
                let snapped = false;

                let targets = [ {x: ox, y: oy}, {x: ox+sWidth, y: oy}, {x: ox, y: oy+sWidth}, {x: ox+sWidth, y: oy+sWidth} ];
                triangles.forEach(t => { if (t !== selectedTri) targets.push(...t.pts); });

                for (let p of selectedTri.pts) {
                    for (let tp of targets) {
                        if (Math.hypot(p.x - tp.x, p.y - tp.y) < snapDist) {
                            snapOffset.x = tp.x - p.x; snapOffset.y = tp.y - p.y;
                            snapped = true; break;
                        }
                    }
                    if (snapped) break;
                }

                if (!snapped) {
                    for (let p of selectedTri.pts) {
                        if (Math.abs(p.x - ox) < snapDist) { snapOffset.x = ox - p.x; snapped = true; }
                        else if (Math.abs(p.x - (ox+sWidth)) < snapDist) { snapOffset.x = (ox+sWidth) - p.x; snapped = true; }
                        if (Math.abs(p.y - oy) < snapDist) { snapOffset.y = oy - p.y; snapped = true; }
                        else if (Math.abs(p.y - (oy+sWidth)) < snapDist) { snapOffset.y = (oy+sWidth) - p.y; snapped = true; }
                        if(snapped) break;
                    }
                }
                if (snapped) {
                    selectedTri.pts.forEach(p => { p.x += snapOffset.x; p.y += snapOffset.y; });
                }
            }
        }

        dragging = rotating = false;
        checkCollisions(); draw();
    };

    window.onresize = resetLab; resetLab();
</script>
</body>
</html>
