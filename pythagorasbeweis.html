<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pythagoras | Schritt 8: Yellow Mesh Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --labor-red: rgb(198, 33, 40);
            --bg: #0f172a; --panel: #111827; --card: #1e293b;
            --accent-orange: #ff9800;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; touch-action: none; }
        #side-panel {
            width: 380px; min-width: 380px; border-right: 1px solid #334155;
            padding: 20px 25px; display: flex; flex-direction: column; gap: 12px;
            background: var(--panel); z-index: 10;
        }
        h2 { font-family: 'Orbitron'; font-size: 1.1rem; margin: 0; color: var(--labor-red); border-bottom: 3px solid var(--labor-red); padding-bottom: 5px; }
        .stats-card { background: var(--card); padding: 12px; border-radius: 10px; border: 1px solid #334155; }
        .val { font-family: 'Orbitron'; font-size: 1.4rem; font-weight: bold; display: block; margin-top: 5px; }
        .label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; font-weight: 600; }
        #math-log { flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; font-family: 'Orbitron'; font-size: 0.8rem; }
        .log-entry { display: flex; justify-content: space-between; border-bottom: 1px solid #1e293b; padding: 4px 0; }
        canvas { flex-grow: 1; cursor: crosshair; }
        button { padding: 10px; background: #333; color: white; border: none; border-radius: 8px; font-family: 'Orbitron'; cursor: pointer; }
    </style>
</head>
<body>

<div id="side-panel">
    <h2>PYTHAGORAS LABOR</h2>
    <div class="stats-card"><span class="label">ZIELFLÄCHE (ABCD)</span><span id="target-area" class="val" style="color: #ff9800;">0,00 cm²</span></div>
    <div class="stats-card"><span class="label">SUMME GELB (TRIA)</span><span id="blue-sum" class="val" style="color: yellow;">0,00 cm²</span></div>
    <div class="label">Addition der Flächen</div>
    <div id="math-log"></div>
    <button onclick="resetLab()">RESET POSITION</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const sWidth = 600, units = 10;
    const pxToCmFactor = units / sWidth;
    let ox, oy, triangles = [], anchors = [], selectedTri = null;
    let dragging = false, rotating = false, lastMouse = {x:0, y:0}, anyCollision = false;

    // Robuste Delaunay Engine
    function triangulate(points) {
        if (points.length < 3) return [];
        const big = 20000;
        const bigTri = [[-big, -big], [big, -big], [0, big]];
        let triangles = [{p: bigTri}];
        points.forEach(pt => {
            let edges = [];
            triangles = triangles.filter(tri => {
                const c = getCircumcenter(tri.p);
                if (Math.hypot(c.x - pt[0], c.y - pt[1]) < c.r - 0.001) {
                    edges.push([tri.p[0], tri.p[1]], [tri.p[1], tri.p[2]], [tri.p[2], tri.p[0]]);
                    return false;
                }
                return true;
            });
            const uniqueEdges = [];
            for (let i = 0; i < edges.length; i++) {
                let isDup = false;
                for (let j = 0; j < edges.length; j++) {
                    if (i === j) continue;
                    if ((distP(edges[i][0], edges[j][0]) < 0.1 && distP(edges[i][1], edges[j][1]) < 0.1) ||
                        (distP(edges[i][0], edges[j][1]) < 0.1 && distP(edges[i][1], edges[j][0]) < 0.1)) {
                        isDup = true; break;
                    }
                }
                if (!isDup) uniqueEdges.push(edges[i]);
            }
            uniqueEdges.forEach(e => triangles.push({p: [e[0], e[1], pt]}));
        });
        return triangles.filter(t => !t.p.some(p => bigTri.includes(p)));
    }

    const distP = (p1, p2) => Math.hypot(p1[0] - p2[0], p1[1] - p2[1]);
    function getCircumcenter(p) {
        const [p1, p2, p3] = p;
        const x1 = p1[0], y1 = p1[1], x2 = p2[0], y2 = p2[1], x3 = p3[0], y3 = p3[1];
        const D = 2 * (x1 * (y2 - y3) + x2 * (y3 - y1) + x3 * (y1 - y2));
        const ux = ((x1**2+y1**2)*(y2-y3)+(x2**2+y2**2)*(y3-y1)+(x3**2+y3**2)*(y1-y2))/D;
        const uy = ((x1**2+y1**2)*(x3-x2)+(x2**2+y2**2)*(x1-x3)+(x3**2+y3**2)*(x2-x1))/D;
        return {x: ux, y: uy, r: Math.hypot(x1 - ux, y1 - uy)};
    }

    function resetLab() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = canvas.clientWidth * dpr; canvas.height = canvas.clientHeight * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ox = 60; oy = (canvas.height/dpr - sWidth) / 2;
        const a = 150;
        anchors = [{id:'D',x:ox+a,y:oy},{id:'A',x:ox+sWidth,y:oy+a},{id:'B',x:ox+sWidth-a,y:oy+sWidth},{id:'C',x:ox,y:oy+sWidth-a}];
        triangles = [
            { pts: [{x:ox+a, y:oy}, {x:ox, y:oy}, {x:ox, y:oy+sWidth-a}] },
            { pts: [{x:ox+sWidth, y:oy+a}, {x:ox+sWidth, y:oy}, {x:ox+a, y:oy}] },
            { pts: [{x:ox+sWidth-a, y:oy+sWidth}, {x:ox+sWidth, y:oy+sWidth}, {x:ox+sWidth, y:oy+a}] },
            { pts: [{x:ox, y:oy+sWidth-a}, {x:ox, y:oy+sWidth}, {x:ox+sWidth-a, y:oy+sWidth}] }
        ];
        draw();
    }

    // Präziser Check: Liegt der Punkt INSIDE eines roten Dreiecks?
    function isStrictlyInside(p, p1, p2, p3) {
        const area = 0.5 *(-p2.y*p3.x + p1.y*(-p2.x + p3.x) + p1.x*(p2.y - p3.y) + p2.x*p3.y);
        const s = 1/(2*area)*(p1.y*p3.x - p1.x*p3.y + (p3.y - p1.y)*p.x + (p1.x - p3.x)*p.y);
        const t = 1/(2*area)*(p1.x*p2.y - p1.y*p2.x + (p1.y - p2.y)*p.x + (p2.x - p1.x)*p.y);
        // Wir nutzen einen negativen Puffer (0.005), damit Randfälle NICHT als "Inside" zählen
        return s > 0.005 && t > 0.005 && (s + t) < 0.995;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let yellowTotal = 0, logHtml = "";

        if (!anyCollision) {
            let pts = [[ox, oy], [ox+sWidth, oy], [ox+sWidth, oy+sWidth], [ox, oy+sWidth]];
            anchors.forEach(a => pts.push([a.x, a.y]));
            triangles.forEach(t => t.pts.forEach(p => pts.push([p.x, p.y])));
            const mesh = triangulate(pts);
            let triCount = 1;

            mesh.forEach(tri => {
                const mid = { x: (tri.p[0][0]+tri.p[1][0]+tri.p[2][0])/3, y: (tri.p[0][1]+tri.p[1][1]+tri.p[2][1])/3 };

                // Prüfen, ob Schwerpunkt in IRGENDEINEM roten Dreieck liegt (mit Puffer!)
                let insideRed = triangles.some(rt => isStrictlyInside(mid, rt.pts[0], rt.pts[1], rt.pts[2]));

                // Liegt der Schwerpunkt im Hauptrahmen?
                let inFrame = mid.x >= ox && mid.x <= ox+sWidth && mid.y >= oy && mid.y <= oy+sWidth;

                if (!insideRed && inFrame) {
                    ctx.strokeStyle = "yellow"; ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(tri.p[0][0], tri.p[0][1]); ctx.lineTo(tri.p[1][0], tri.p[1][1]); ctx.lineTo(tri.p[2][0], tri.p[2][1]); ctx.closePath();
                    ctx.stroke();

                    const areaCm = (Math.abs(tri.p[0][0]*(tri.p[1][1]-tri.p[2][1]) + tri.p[1][0]*(tri.p[2][1]-tri.p[0][1]) + tri.p[2][0]*(tri.p[0][1]-tri.p[1][1])) / 2) * (pxToCmFactor**2);
                    if(areaCm > 0.01) {
                        yellowTotal += areaCm;
                        ctx.fillStyle = "yellow"; ctx.font = "bold 10px Orbitron"; ctx.textAlign = "center";
                        ctx.fillText(triCount.toString().padStart(2,'0'), mid.x, mid.y+4);
                        logHtml += `<div class="log-entry"><span>Δ ${triCount.toString().padStart(2,'0')}</span><span>${areaCm.toFixed(2)} cm²</span></div>`;
                        triCount++;
                    }
                }
            });
        }
        document.getElementById('blue-sum').innerText = yellowTotal.toFixed(2).replace('.',',') + " cm²";
        document.getElementById('math-log').innerHTML = logHtml;

        // Rote Dreiecke
        triangles.forEach((t, triIdx) => {
            ctx.beginPath(); ctx.moveTo(t.pts[0].x, t.pts[0].y); ctx.lineTo(t.pts[1].x, t.pts[1].y); ctx.lineTo(t.pts[2].x, t.pts[2].y); ctx.closePath();
            ctx.fillStyle = t.collision ? "rgba(255,0,0,0.4)" : (t === selectedTri ? "rgba(255,152,0,0.5)" : "rgba(198,33,40,0.5)");
            ctx.fill();
            const lbls = ["c","a","b"], subs = ["₁","₂","₃","₄"];
            t.pts.forEach((p, i) => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 9, 0, Math.PI*2); ctx.fillStyle = "#666"; ctx.fill();
                ctx.fillStyle = "white"; ctx.font = "bold 10px Inter"; ctx.textAlign = "center"; ctx.fillText(lbls[i]+subs[triIdx], p.x, p.y+4);
            });
        });

        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 2; ctx.strokeRect(ox, oy, sWidth, sWidth);
        anchors.forEach(a => {
            ctx.fillStyle = "rgb(100,0,0)"; ctx.beginPath(); ctx.arc(a.x, a.y, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white"; ctx.font = "bold 18px Orbitron"; ctx.textAlign = "center";
            ctx.fillText(a.id, a.x + (a.id === 'A' || a.id === 'B' ? 25 : -25), a.id === 'C' || a.id === 'B' ? a.y + 30 : a.y - 15);
        });
        const tArea = Math.pow(Math.hypot(anchors[0].x - anchors[1].x, anchors[0].y - anchors[1].y), 2) * (pxToCmFactor**2);
        document.getElementById('target-area').innerText = tArea.toFixed(2).replace('.',',') + " cm²";
    }

    // Interaktion & SAT-Collision
    function checkCollisions() {
        anyCollision = false; triangles.forEach(t => t.collision = false);
        for (let i=0; i<triangles.length; i++) {
            for (let j=i+1; j<triangles.length; j++) {
                if (triIntersect(triangles[i].pts, triangles[j].pts)) {
                    triangles[i].collision = true; triangles[j].collision = true; anyCollision = true;
                }
            }
        }
    }
    function triIntersect(t1, t2) { return checkSAT(t1, t2) && checkSAT(t2, t1); }
    function checkSAT(t1, t2) {
        for (let i=0; i<3; i++) {
            const p1=t1[i], p2=t1[(i+1)%3], n={x:p2.y-p1.y, y:p1.x-p2.x};
            let min1=Infinity, max1=-Infinity, min2=Infinity, max2=-Infinity;
            t1.forEach(p=>{const pr=p.x*n.x+p.y*n.y; min1=Math.min(min1,pr); max1=Math.max(max1,pr);});
            t2.forEach(p=>{const pr=p.x*n.x+p.y*n.y; min2=Math.min(min2,pr); max2=Math.max(max2,pr);});
            if (max1 < min2+0.1 || max2 < min1+0.1) return false;
        }
        return true;
    }

    canvas.onpointerdown = e => {
        const r = canvas.getBoundingClientRect(), x = (e.clientX-r.left), y = (e.clientY-r.top);
        let found = false; rotating = false; dragging = false;
        for (let t of triangles) { for (let p of t.pts) { if (Math.hypot(p.x-x, p.y-y) < 15) { selectedTri = t; rotating = true; found = true; break; } } if (found) break; }
        // Fallback: Check if point is inside a triangle
        if (!found) { for (let t of triangles) {
            const p = t.pts;
            const area = 0.5 *(-p[1].y*p[2].x + p[0].y*(-p[1].x + p[2].x) + p[0].x*(p[1].y - p[2].y) + p[1].x*p[2].y);
            const s = 1/(2*area)*(p[0].y*p[2].x - p[0].x*p[2].y + (p[2].y - p[0].y)*x + (p[0].x - p[2].x)*y);
            const t_ = 1/(2*area)*(p[0].x*p[1].y - p[0].y*p[1].x + (p[0].y - p[1].y)*x + (p[1].x - p[0].x)*y);
            if (s >= 0 && t_ >= 0 && (s + t_) <= 1) { selectedTri = t; dragging = true; found = true; break; }
        }}
        if (!found) selectedTri = null;
        lastMouse = {x, y}; draw();
    };
    window.onpointermove = e => {
        if(!selectedTri) return;
        const r = canvas.getBoundingClientRect(), x = (e.clientX-r.left), y = (e.clientY-r.top);
        const cX = (selectedTri.pts[0].x+selectedTri.pts[1].x+selectedTri.pts[2].x)/3, cY = (selectedTri.pts[0].y+selectedTri.pts[1].y+selectedTri.pts[2].y)/3;
        if (dragging) { const dx = x - lastMouse.x, dy = y - lastMouse.y; selectedTri.pts.forEach(p => { p.x += dx; p.y += dy; }); }
        else if (rotating) {
            const angle = Math.atan2(y - cY, x - cX) - Math.atan2(lastMouse.y - cY, lastMouse.x - cX);
            selectedTri.pts.forEach(p => { const dx = p.x - cX, dy = p.y - cY; p.x = cX + dx * Math.cos(angle) - dy * Math.sin(angle); p.y = cY + dx * Math.sin(angle) + dy * Math.cos(angle); });
        }
        checkCollisions(); lastMouse = {x, y}; draw();
    };
    window.onpointerup = () => { dragging = rotating = false; draw(); };
    window.onresize = resetLab; resetLab();
</script>
</body>
</html>
