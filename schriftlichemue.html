<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schriftliche Multiplikation | docalvers</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <style>
        #canvas-container {
            position: relative;
            background: radial-gradient(circle at 50% 50%, rgba(5, 25, 55, 1) 0%, rgba(2, 10, 25, 1) 100%);
            overflow: hidden;
        }

        .cyber-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 210, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        #math-coach-box {
            position: absolute;
            width: 380px;
            background: rgba(10, 20, 40, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 210, 255, 0.05);
            color: white;
            font-family: 'Outfit', sans-serif;
            pointer-events: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        #math-coach-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .coach-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: #00d2ff;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .coach-title::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00d2ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00d2ff;
        }

        .coach-message {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        .coach-math-highlight {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: #ffde00;
        }
    </style>
</head>

<body>

    <aside id="side-panel">
        <header id="sidebar-header" style="min-height: 80px;"></header>
        <div id="ui-container"></div>
        <div
            style="padding: 20px; text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.2); font-family: 'Orbitron';">
            &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull;
        </div>
    </aside>

    <main id="main-content">
        <div id="canvas-container">
            <div class="cyber-grid"></div>
            <div id="math-coach-box">
                <div class="coach-title">MATH COACH ANALYSIS</div>
                <div id="coach-content" class="coach-message">Initialisiere Analyse...</div>
            </div>
            <canvas id="canvas"></canvas>
        </div>
    </main>

    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // 1. Branding & UI Init
        CyberBranding.init({
            title: "Doc Alvers Mathe-Labor",
            subtitle: "SCHRIFTLICHE MULTIPLIKATION"
        });
        CyberUI.init();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        // Colors from requirement image
        // Colors: 7 -> Gold/Yellow, 8 -> Purple, 9 -> Cyan
        const DIGIT_COLORS = ["#FFC107", "#9d00ff", "#00d2ff", "#4CAF50", "#F44336"];
        const BRAND_BLUE = "#00d2ff";

        let factor1 = 456;
        let factor2 = 789;
        let fineMode = true;
        let currentStep = -1;
        let persistedCaries = {};

        let width, height, dpr;
        let stepSequence = []; // Linearized steps for fine mode or row mode

        function setupUI() {
            CyberUI.createCard('ui-container', 'MULTIPLIKATION', `
                <div class="cyber-control-group">
                    <label class="cyber-label">FAKTOR 1 (Multiplikand)</label>
                    <input type="number" id="f1-input" class="cyber-select" value="${factor1}" onchange="updateFactors()">
                </div>
                <div class="cyber-control-group" style="margin-top:15px;">
                    <label class="cyber-label">FAKTOR 2 (Multiplikator)</label>
                    <input type="number" id="f2-input" class="cyber-select" value="${factor2}" onchange="updateFactors()">
                </div>
                <div style="margin-top:20px;" id="mode-toggle-container"></div>
                <button class="cyber-btn" onclick="resetSteps()" style="width:100%; margin-top:20px; border-color:var(--neon-blue);">LABOR RESET</button>
            `, BRAND_BLUE);

            CyberUI.createCheckbox('mode-toggle-container', 'DETAIL-MODUS (Fein-Analyse)', fineMode, (val) => {
                fineMode = val;
                resetSteps();
            }, '#ffde00');

            CyberUI.createCard('ui-container', 'STEUERUNG', `
                <div class="stats-grid">
                    <div class="stats-card" onclick="nextStep()" style="cursor:pointer; text-align:center;">
                        <span class="stats-label">WEITER</span>
                        <span class="stats-val" style="font-size:1.4rem;">◀</span>
                    </div>
                    <div class="stats-card" onclick="prevStep()" style="cursor:pointer; text-align:center;">
                        <span class="stats-label">ZURÜCK</span>
                        <span class="stats-val" style="font-size:1.4rem;">▶</span>
                    </div>
                </div>
                <div id="step-info" style="margin-top:15px; font-family:'Outfit'; font-size:0.8rem; color:rgba(255,255,255,0.7); min-height:80px; border-left:2px solid var(--neon-blue); padding-left:12px; display:none; align-items:center;">
                    Wähle Ziffern und klicke auf WEITER um die Rechnung zu starten.
                </div>
            `, '#ff9d00');
        }

        function buildStepSequence() {
            stepSequence = [];
            const f1Str = String(factor1);
            const f2Str = String(factor2);

            if (!fineMode) {
                // Row Mode: one step per multiplier digit
                for (let i = 0; i < f2Str.length; i++) {
                    stepSequence.push({ type: 'row', rowIndex: i });
                }
            } else {
                // Fine Mode: digit by digit multiplications
                for (let i = 0; i < f2Str.length; i++) {
                    const m = parseInt(f2Str[i]);
                    let carry = 0;
                    // Digits of factor1 from right to left
                    for (let j = f1Str.length - 1; j >= 0; j--) {
                        // Calculate carry from previous step for this specific loop
                        // Note: j-index is right to left
                        let prevCarry = 0;
                        if (j < f1Str.length - 1) {
                            let tempCarry = 0;
                            for (let k = f1Str.length - 1; k > j; k--) {
                                tempCarry = Math.floor((parseInt(f1Str[k]) * m + tempCarry) / 10);
                            }
                            prevCarry = tempCarry;

                            // PERSISTENCE: Store carry for standing history
                            if (prevCarry > 0) {
                                if (!persistedCaries[i]) persistedCaries[i] = {};
                                persistedCaries[i][j] = prevCarry;
                            }
                        }

                        // Phase 1: Initiation (Carry + Plus)
                        if (prevCarry > 0) {
                            stepSequence.push({
                                type: 'digit-init',
                                rowIndex: i,
                                f1Idx: j,
                                mIdx: i,
                                carryValue: prevCarry
                            });

                            // Phase 2: Show raw product
                            stepSequence.push({
                                type: 'digit-multiply',
                                rowIndex: i,
                                f1Idx: j,
                                mIdx: i,
                                carryValue: prevCarry
                            });
                        }

                        // Phase 3: Final result with carry added
                        stepSequence.push({
                            type: 'digit-final',
                            rowIndex: i,
                            f1Idx: j,
                            mIdx: i,
                            carryValue: prevCarry
                        });
                    }
                    stepSequence.push({ type: 'row-complete', rowIndex: i });
                }
            }
            stepSequence.push({ type: 'final' });
        }

        function updateFactors() {
            factor1 = parseInt(document.getElementById('f1-input').value) || 0;
            factor2 = parseInt(document.getElementById('f2-input').value) || 0;
            resetSteps();
        }

        function resetSteps() {
            currentStep = -1;
            persistedCaries = {};
            buildStepSequence();
            draw();
        }

        function nextStep() {
            if (currentStep < stepSequence.length - 1) {
                currentStep++;
                draw();
            }
        }

        function prevStep() {
            if (currentStep > -1) {
                currentStep--;
                draw();
            }
        }

        function init() {
            dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            width = rect.width; height = rect.height;
            canvas.width = width * dpr; canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            buildStepSequence();
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            const f1Str = String(factor1);
            const f2Str = String(factor2);
            const resStr = String(factor1 * factor2);

            // 1. Calculate Font Size
            // Horizontal footprint: Factor1 + Factor2 + symbols or Result
            const maxCharsContent = Math.max(f1Str.length + f2Str.length + 3, resStr.length + 2);
            // Vertical footprint: header + partials + footer lines
            const totalLines = f2Str.length + 4;

            // Hard constraints with safety margins (15% padding)
            const fontSizeWidth = (width * 0.85) / (maxCharsContent * 0.75);
            const fontSizeHeight = (height * 0.75) / (totalLines * 1.6);

            const fontSize = Math.min(fontSizeWidth, fontSizeHeight);
            ctx.font = `bold ${fontSize}px Orbitron`;
            ctx.textBaseline = 'middle';

            const charWidth = fontSize * 0.75;
            const rowHeight = fontSize * 1.6;

            // 2. Center vertically
            const totalCalcHeight = totalLines * rowHeight;
            const startY = (height - totalCalcHeight) / 2 + rowHeight * 0.5;

            // 3. Center horizontally (AS ENSEMBLE)
            const coachBox = document.getElementById('math-coach-box');
            const coachWidth = 380;
            const gap = 80;
            const totalCalcWidth = maxCharsContent * charWidth;
            
            // Total ensemble is Calculation + Gap + Coach Box
            const ensembleTotalWidth = totalCalcWidth + gap + coachWidth;
            const ensembleStartX = (width - ensembleTotalWidth) / 2;
            
            const startX = ensembleStartX + (f1Str.length + 0.5) * charWidth;

            // Position the Coach Box DOM element
            if (coachBox) {
                coachBox.style.left = `${ensembleStartX + totalCalcWidth + gap}px`;
                coachBox.style.top = `${startY + rowHeight * 0.7}px`; // Align with separator line
                coachBox.classList.add('visible');
            }

            const step = currentStep >= 0 ? stepSequence[currentStep] : null;

            // 1. Render Factors - Slot-Centered for perfect kerning
            ctx.textAlign = 'center';
            for (let j = 0; j < f1Str.length; j++) {
                const isActive = step && (step.type === 'digit-multiply' || step.type === 'digit-final') && step.f1Idx === j;
                ctx.fillStyle = isActive ? DIGIT_COLORS[step.mIdx % DIGIT_COLORS.length] : BRAND_BLUE;

                // Column center calculation
                const colCenter = startX - (f1Str.length - 1 - j) * charWidth - charWidth / 2;

                if (isActive) {
                    ctx.save();
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = ctx.fillStyle;
                }
                ctx.fillText(f1Str[j], colCenter, startY);
                if (isActive) ctx.restore();
            }

            ctx.fillStyle = 'white';
            ctx.fillText('·', startX + charWidth * 0.7, startY);

            for (let i = 0; i < f2Str.length; i++) {
                const isProcessed = step && (step.type === 'final' || step.rowIndex >= i);
                const isActive = step && (step.type === 'digit-multiply' || step.type === 'digit-final') && step.mIdx === i;

                ctx.fillStyle = isProcessed ? DIGIT_COLORS[i % DIGIT_COLORS.length] : 'rgba(255,255,255,0.2)';

                // Multiplier column center calculation
                const colCenter = startX + charWidth * 1.4 + (i + 0.5) * charWidth;

                if (isActive) {
                    ctx.save();
                    ctx.shadowBlur = 20; ctx.shadowColor = ctx.fillStyle;
                }
                ctx.fillText(f2Str[i], colCenter, startY);
                if (isActive) ctx.restore();
            }

            // Separator Line
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(startX - f1Str.length * charWidth, startY + rowHeight * 0.7);
            ctx.lineTo(startX + (f2Str.length + 1.5) * charWidth, startY + rowHeight * 0.7);
            ctx.stroke();

            // 2. Partial Results Calculation & Carry Logic
            let partialY = startY + rowHeight * 1.6;
            const alignX = startX + (f2Str.length + 1.4) * charWidth;

            for (let i = 0; i < f2Str.length; i++) {
                const rowFinished = step && (step.type === 'final' || step.rowIndex > i || (step.rowIndex === i && (step.type === 'row-complete' || (!fineMode && step.type === 'row'))));
                if (currentStep === -1 || (step.type !== 'final' && step.rowIndex < i)) break;

                const mDigit = parseInt(f2Str[i]);
                const zeros = f2Str.length - 1 - i;
                // Keep the row color consistent with its multiplier digit at all times
                const rowColor = DIGIT_COLORS[i % DIGIT_COLORS.length];

                // --- PERSISTENT CARRY RENDERING (GLOBAL FOR ALL ROWS) ---
                if (persistedCaries[i]) {
                    for (let cIdx in persistedCaries[i]) {
                        const cJ = parseInt(cIdx);
                        const cValue = persistedCaries[i][cIdx];
                        
                        // Only show if we have reached this digit in the calculation
                        const hasBeenReached = (step.type === 'final') || (step.rowIndex > i) || (step.rowIndex === i && (step.type === 'row-complete' || step.f1Idx <= cJ));
                        if (!hasBeenReached) continue;

                        const isCurrentActive = (step.rowIndex === i && step.f1Idx === cJ);
                        const miniFontSize = fontSize * 0.3;
                        const fixedCarryY = partialY - rowHeight * 0.55;

                        // Geometric center calculation for the carry position
                        ctx.save();
                        ctx.font = `bold ${fontSize}px Orbitron`;
                        const fDigitInner = parseInt(f1Str[cJ]);
                        const rawProdInner = fDigitInner * mDigit;
                        const rawDigitInner = cJ === 0 ? rawProdInner : rawProdInner % 10;
                        const digitOffsetStr = (cJ === 0 ? String(rawProdInner) : String(rawDigitInner)) + "0".repeat(f1Str.length - 1 - cJ);
                        const offsetWidth = ctx.measureText(digitOffsetStr).width;
                        const dWidth = ctx.measureText(cJ === 0 ? String(rawProdInner) : String(rawDigitInner)).width;
                        const rowRightEdge = alignX - zeros * charWidth;
                        const targetCenterX = rowRightEdge - (offsetWidth - dWidth / 2);

                        if (isCurrentActive && (step.type === 'digit-init' || step.type === 'digit-multiply')) {
                            ctx.font = `bold ${miniFontSize}px Orbitron`;
                            ctx.fillStyle = rowColor;
                            ctx.shadowBlur = 10; ctx.shadowColor = rowColor;
                        } else {
                            ctx.font = `${miniFontSize}px Orbitron`;
                            ctx.fillStyle = 'rgba(150,150,150,0.4)';
                        }

                        ctx.textAlign = 'center';
                        ctx.fillText(String(cValue), targetCenterX, fixedCarryY);

                        if (isCurrentActive && step.type === 'digit-multiply') {
                            ctx.fillText('+', targetCenterX, partialY - rowHeight * 0.42);
                        }
                        ctx.restore();
                    }
                }
                // --- END PERSISTENT CARRY LOGIC ---

                if (!fineMode || rowFinished) {
                    // Standard Row Rendering (Finished rows or active row in non-fine mode)
                    if (rowFinished || (!fineMode && step.rowIndex === i)) {
                        ctx.save();
                        ctx.font = `bold ${fontSize}px Orbitron`;
                        ctx.textAlign = 'right';
                        ctx.fillStyle = rowColor;
                        ctx.fillText(String(factor1 * mDigit), alignX - zeros * charWidth, partialY);
                        ctx.restore();
                    }
                } else if (fineMode && step.rowIndex === i) {
                    // Fine Mode: Digit by digit construction
                    let rowValStr = "";
                    let carry = 0;
                    for (let j = f1Str.length - 1; j >= 0; j--) {
                        if (j < step.f1Idx) break;

                        const fDigit = parseInt(f1Str[j]);
                        const prod = fDigit * mDigit + carry;
                        const digitToWrite = prod % 10;
                        const nextCarry = Math.floor(prod / 10);

                        const isCurrentDigitActive = (j === step.f1Idx);
                        if (isCurrentDigitActive) {
                            if (step.type === 'digit-init') {
                                // Phase 1: Only carry above
                            } else if (step.type === 'digit-multiply') {
                                // Phase 2: Raw product in row
                                const rawProd = fDigit * mDigit;
                                const rawDigit = j === 0 ? rawProd : rawProd % 10;
                                rowValStr = String(rawDigit) + rowValStr;
                            } else {
                                // Phase 3: Final merged result
                                const charToAppend = (j === 0) ? String(prod) : String(digitToWrite);
                                rowValStr = charToAppend + rowValStr;
                            }
                        } else if (j > step.f1Idx) {
                            const charToAppend = (j === 0) ? String(prod) : String(digitToWrite);
                            rowValStr = charToAppend + rowValStr;
                        }
                        carry = nextCarry;
                    }

                    // FINAL RENDER FOR THE ACTIVE ROW
                    ctx.save();
                    ctx.font = `bold ${fontSize}px Orbitron`;
                    ctx.textAlign = 'right';
                    ctx.fillStyle = rowColor;
                    ctx.fillText(rowValStr, alignX - zeros * charWidth, partialY);
                    ctx.restore();
                }

                if (i > 0) {
                    ctx.save();
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'alphabetic'; // Manual control
                    ctx.font = `${fontSize * 0.6}px Orbitron`;

                    // 3. Render '+' with a 'Visual Gravity' correction
                    // We use middle baseline and a lower offset to match perceived symmetry
                    ctx.textBaseline = 'middle';
                    const visualCenterY = partialY - (fontSize * 0.10);
                    ctx.fillText('+', startX - f1Str.length * charWidth, visualCenterY);
                    ctx.restore();
                }
                partialY += rowHeight;
            }

            // 3. Final Result
            if (step && step.type === 'final') {
                ctx.strokeStyle = BRAND_BLUE;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(startX - f1Str.length * charWidth, partialY - rowHeight * 0.5);
                ctx.lineTo(startX + (f2Str.length + 1.5) * charWidth, partialY - rowHeight * 0.5);
                ctx.stroke();

                const finalResult = factor1 * factor2;
                ctx.fillStyle = 'white';
                ctx.textAlign = 'right';
                ctx.fillText(String(finalResult), alignX, partialY + fontSize * 0.2);

                // Double line
                ctx.beginPath();
                ctx.lineWidth = 2;
                ctx.moveTo(startX - f1Str.length * charWidth, partialY + fontSize * 0.84);
                ctx.lineTo(startX + (f2Str.length + 1.5) * charWidth, partialY + fontSize * 0.84);
                ctx.moveTo(startX - f1Str.length * charWidth, partialY + fontSize * 1.05);
                ctx.lineTo(startX + (f2Str.length + 1.5) * charWidth, partialY + fontSize * 1.05);
                ctx.stroke();
            }

            updateStepInfo();
        }

        function updateStepInfo() {
            const info = document.getElementById('step-info');
            const coachContent = document.getElementById('coach-content');
            if (!coachContent) return;

            let message = "";

            if (currentStep === -1) {
                message = `Willkommen im Multiplikations-Labor. Wir berechnen <span class="coach-math-highlight">${factor1} &times; ${factor2}</span>. Klicke auf WEITER, um den ersten Schritt zu starten.`;
            } else {
                const step = stepSequence[currentStep];
                const f1Str = String(factor1);
                const f2Str = String(factor2);

                const color = step.rowIndex !== undefined ? DIGIT_COLORS[step.rowIndex % DIGIT_COLORS.length] : BRAND_BLUE;

                if (step.type === 'row' || step.type === 'row-complete') {
                    const digit = f2Str[step.rowIndex];
                    message = `Die Multiplikation mit der Ziffer <b style="color:${color}">${digit}</b> ist abgeschlossen. Alle Teilergebnisse dieser Zeile wurden berechnet.`;
                } else if (step.type === 'digit-multiply') {
                    const mDigit = parseInt(f2Str[step.mIdx]);
                    const fDigit = parseInt(f1Str[step.f1Idx]);
                    const prod = fDigit * mDigit;
                    message = `Wir multiplizieren <b style="color:${color}">${mDigit}</b> mit <b style="color:${color}">${fDigit}</b>. Das ergibt <span class="coach-math-highlight">${prod}</span>. Der Übertrag von <b style="color:${BRAND_BLUE}">${step.carryValue}</b> wird im nächsten Schritt addiert.`;
                } else if (step.type === 'digit-final') {
                    const mDigit = parseInt(f2Str[step.mIdx]);
                    const fDigit = parseInt(f1Str[step.f1Idx]);
                    const prod = fDigit * mDigit;
                    const final = prod + step.carryValue;
                    message = `Jetzt addieren wir den Übertrag: <span class="coach-math-highlight">${prod} + ${step.carryValue} = ${final}</span>. Die Ziffer <b style="color:${color}">${final % 10}</b> wird notiert, der Rest wird als neuer Übertrag mitgenommen.`;
                } else if (step.type === 'final') {
                    message = `<b>Berechnung abgeschlossen!</b> Wir haben alle Teilprodukte addiert. Das finale Ergebnis ist <span class="coach-math-highlight">${factor1 * factor2}</span>.`;
                }
            }

            coachContent.innerHTML = message;
            if (info) info.innerHTML = message; // Keep sidebar in sync just in case
        }

        window.onresize = init;

        // Keyboard Navigation Support
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') nextStep();
            if (e.key === 'ArrowRight') prevStep();
        });

        setupUI();

        // Ensure fonts are loaded before initial draw to prevent "ugly" fallback font
        document.fonts.ready.then(() => {
            setTimeout(init, 100); // Small safety buffer for canvas engine
        });

    </script>
</body>

</html>
