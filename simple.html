<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Splitter - Percentage Based</title>
  <style>
    body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        font-family: sans-serif;
        overflow: hidden;
    }

    #top-panel {
        background-color: #1e293b;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Starts at exactly 50% */
        height: 50%;
        /* Let's use percentages for the limits too */
        min-height: 50%;
    }

    #splitter {
        background-color: #334155;
        height: 10px;
        cursor: row-resize;
        flex-shrink: 0;
        transition: background-color 0.2s;
    }

    #splitter:hover, #splitter.active {
        background-color: #00f2ff;
    }

    #bottom-panel {
        background-color: #0f172a;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1 1 0%;
        min-height: 10%;
    }
  </style>
</head>
<body>

<div id="top-panel">
  Top Component (50%)
</div>

<div id="splitter"></div>

<div id="bottom-panel">
  Bottom Component
</div>

<script>
  const splitter = document.getElementById('splitter');
  const topPanel = document.getElementById('top-panel');
  let isSplitting = false;

  splitter.addEventListener('pointerdown', (e) => {
      isSplitting = true;
      splitter.classList.add('active');
      document.body.style.userSelect = 'none';
  });

  document.addEventListener('pointermove', (e) => {
      if (!isSplitting) return;

      // 1. Calculate the mouse position as a percentage of the total window height
      let newPercentage = (e.clientY / window.innerHeight) * 100;

      // 2. Clamp it between 10% and 90% so neither panel gets completely crushed
      newPercentage = Math.max(10, Math.min(newPercentage, 90));

      // 3. Apply the new height as a percentage (%) instead of pixels (px)
      topPanel.style.height = `${newPercentage}%`;
  });

  document.addEventListener('pointerup', () => {
      if (isSplitting) {
          isSplitting = false;
          splitter.classList.remove('active');
          document.body.style.userSelect = '';
      }
  });
</script>
</body>
</html>
