<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Steigungs-Labor | docalvers</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-pink: #ff0055;
            --neon-green: #39FF14;
            --neon-orange: #ff8800;
            --bg-dark: #050b18;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-bright: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #0a1329 0%, #050b18 100%);
            color: white;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
        }

        #side-panel {
            width: 380px;
            min-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
            box-sizing: border-box;
            box-shadow: 15px 0 45px rgba(0, 0, 0, 0.6);
            overflow-y: auto;
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- DASHBOARD BUTTON --- */
        .dashboard-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            transition: all 0.3s ease;
            letter-spacing: 1.5px;
            backdrop-filter: blur(5px);
            width: 100%;
            box-sizing: border-box;
        }
        .dashboard-btn:hover {
            color: white;
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            transform: translateX(5px);
        }
        .dashboard-btn svg { width: 16px; height: 16px; stroke-width: 2.5; }


        .equation-box {
            background: var(--glass-bright);
            padding: 18px 20px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 5px;
            font-size: 1.4rem;
        }

        .equation-label {
            font-family: 'Orbitron';
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
        }

        .stats-card {
            background: var(--glass-bright);
            padding: 12px 20px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stats-title {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
            margin-bottom: 5px;
            display: block;
        }

        .val-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: white;
            letter-spacing: 1px;
        }

        #latex-m { color: var(--neon-purple); text-shadow: 0 0 15px var(--neon-purple); }
        #latex-n { color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink); }
        #latex-x0 { color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }

        .control-group { display: flex; flex-direction: column; gap: 12px; }

        .slider-box {
            background: rgba(255, 255, 255, 0.02);
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .slider-box label { font-family: 'Orbitron'; font-size: 0.65rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 1px; }
        input[type=range] { width: 100%; accent-color: var(--neon-blue); cursor: pointer; margin-top: 8px; }

        button {
            padding: 15px 20px;
            font-size: 0.85rem;
            font-family: 'Orbitron', sans-serif;
            background: var(--glass-bright);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            width: 100%;
        }
        button:hover { background: rgba(0, 210, 255, 0.1); border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            #side-panel { width: 100%; min-width: 100%; height: auto; border-right: none; border-top: 1px solid rgba(0, 210, 255, 0.3); order: 2; padding: 20px; }
            #canvas-container { width: 100%; height: 60vh; min-height: 400px; order: 1; }
        }
    </style>
</head>
<body>

    <div id="side-panel">
        <header style="border: none; padding-bottom: 5px;">
            <a href="index.html" class="dashboard-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>DASHBOARD</span>
            </a>
        </header>
        
        <div class="equation-box">
            <span class="equation-label">Funktionsgleichung</span>
            <div id="eq-main"></div>
        </div>

        <div class="stats-card">
            <span class="stats-title">m (Steigung)</span>
            <div id="latex-m" class="val-display"></div>
        </div>

        <div class="stats-card">
            <span class="stats-title">n (y-Abschnitt)</span>
            <div id="latex-n" class="val-display"></div>
        </div>

        <div class="stats-card">
            <span class="stats-title">x₀ (Nullstelle)</span>
            <div id="latex-x0" class="val-display"></div>
        </div>

        <div class="control-group">
            <div class="slider-box">
                <label>Steigung m</label>
                <input type="range" id="m-slider" min="-5" max="5" step="0.05" value="1">
            </div>
            <div class="slider-box">
                <label>Steigungsdreieck Position (x)</label>
                <input type="range" id="x-slider" min="-10" max="10" step="0.5" value="1">
            </div>
            <div class="slider-box">
                <label>Steigungsdreieck Breite (Δx)</label>
                <input type="range" id="size-slider" min="0.5" max="10" step="0.5" value="2">
            </div>
            <button onclick="resetView()">Labor Reset</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script src="js/branding.js"></script>
    <script>
        // Initialize Branding
        CyberBranding.init({
            title: "Doc Alvers Mathe-Labor",
            subtitle: "Steigungs-Labor"
        });

        // --- Helper: LabUtils (Self-Contained) ---
        const LabUtils = {
            varColor: function(name) {
                return getComputedStyle(document.documentElement).getPropertyValue(name.replace('var(', '').replace(')', '')).trim();
            },
            setupCanvas: function(canvas, container) {
                const dpr = window.devicePixelRatio || 1;
                const rect = container.getBoundingClientRect();
                const width = rect.width;
                const height = rect.height;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
                const ctx = canvas.getContext('2d');
                ctx.scale(dpr, dpr);
                return { ctx, width, height, centerX: width / 2, centerY: height / 2, scale: (width < 600 ? 30 : 50) };
            },
            drawHandle: function(ctx, p, color, label) {
                ctx.shadowBlur = 10; ctx.shadowColor = color;
                ctx.beginPath();
                ctx.arc(p.px, p.py, 6, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.shadowBlur = 0;
                if (label) {
                    ctx.font = "bold 11px Orbitron";
                    ctx.fillStyle = "white";
                    ctx.textAlign = "center";
                    ctx.fillText(label, p.px, p.py - 20);
                }
            }
        };

        const canvas = document.getElementById('canvas');
        const container = document.getElementById('canvas-container');
        let ctx, width, height, scale, centerX, centerY;
        let m = 1.0, n = 2.0;
        let triX = 1.0, triSize = 2.0;
        let dragMode = 0; // 1: n, 2: m

        function init() {
            const layout = LabUtils.setupCanvas(canvas, container);
            ctx = layout.ctx;
            width = layout.width;
            height = layout.height;
            centerX = layout.centerX;
            centerY = layout.centerY;
            scale = layout.scale;
            draw();
        }

        function toScreen(x, y) {
            return { px: centerX + x * scale, py: centerY - y * scale };
        }

        function toMath(px, py) {
            return { x: (px - centerX) / scale, y: (centerY - py) / scale };
        }

        function resetView() {
            m = 1.0; n = 2.0; triX = 1.0; triSize = 2.0;
            syncSliders();
            draw();
        }

        function syncSliders() {
            document.getElementById('m-slider').value = m;
            document.getElementById('x-slider').value = triX;
            document.getElementById('size-slider').value = triSize;
        }

        function drawGrid() {
            ctx.strokeStyle = "rgba(255,255,255,0.05)";
            ctx.lineWidth = 1;
            const xRange = Math.ceil(centerX / scale);
            const yRange = Math.ceil(centerY / scale);

            for (let x = -xRange; x <= xRange; x++) {
                const p = toScreen(x, 0);
                ctx.beginPath(); ctx.moveTo(p.px, 0); ctx.lineTo(p.px, height); ctx.stroke();
                if (x !== 0) {
                    ctx.fillStyle = "rgba(255,255,255,0.3)";
                    ctx.font = "10px Orbitron";
                    ctx.textAlign = "center";
                    ctx.fillText(x, p.px, centerY + 15);
                }
            }
            for (let y = -yRange; y <= yRange; y++) {
                const p = toScreen(0, y);
                ctx.beginPath(); ctx.moveTo(0, p.py); ctx.lineTo(width, p.py); ctx.stroke();
                if (y !== 0) {
                    ctx.fillStyle = "rgba(255,255,255,0.3)";
                    ctx.font = "10px Orbitron";
                    ctx.textAlign = "right";
                    ctx.fillText(y, centerX - 10, p.py + 4);
                }
            }

            ctx.strokeStyle = "rgba(255,255,255,0.4)";
            ctx.lineWidth = 2;
            const origin = toScreen(0, 0);
            ctx.beginPath(); ctx.moveTo(0, origin.py); ctx.lineTo(width - 10, origin.py); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(width-10, origin.py-5); ctx.lineTo(width, origin.py); ctx.lineTo(width-10, origin.py+5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(origin.px, 10); ctx.lineTo(origin.px, height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(origin.px-5, 10); ctx.lineTo(origin.px, 0); ctx.lineTo(origin.px+5, 10); ctx.stroke();
        }

        function drawLine() {
            const xL = -centerX / scale, xR = centerX / scale;
            const pL = toScreen(xL, m * xL + n);
            const pR = toScreen(xR, m * xR + n);
            
            ctx.strokeStyle = LabUtils.varColor('--neon-blue');
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = LabUtils.varColor('--neon-blue');
            ctx.beginPath(); ctx.moveTo(pL.px, pL.py); ctx.lineTo(pR.px, pR.py); ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawTriangle() {
            const pA = toScreen(triX, m * triX + n);
            const pB = toScreen(triX + triSize, m * triX + n);
            const pC = toScreen(triX + triSize, m * (triX + triSize) + n);

            ctx.fillStyle = "rgba(157, 80, 187, 0.2)";
            ctx.beginPath(); ctx.moveTo(pA.px, pA.py); ctx.lineTo(pB.px, pB.py); ctx.lineTo(pC.px, pC.py); ctx.closePath(); ctx.fill();

            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = LabUtils.varColor('--neon-purple');
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(pA.px, pA.py); ctx.lineTo(pB.px, pB.py); ctx.lineTo(pC.px, pC.py); ctx.stroke();
            ctx.setLineDash([]);

            ctx.font = "bold 13px Orbitron";
            ctx.fillStyle = LabUtils.varColor('--neon-purple');
            ctx.textAlign = "center";
            ctx.fillText(`Δx = ${triSize.toFixed(1)}`, pA.px + (pB.px - pA.px)/2, pA.py + 20);
            ctx.textAlign = "left";
            ctx.fillText(`Δy = ${(m * triSize).toFixed(2)}`, pC.px + 10, pA.py + (pC.py - pA.py)/2);
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            drawGrid();
            drawLine();
            drawTriangle();
            
            const nHandle = toScreen(0, n);
            LabUtils.drawHandle(ctx, nHandle, LabUtils.varColor('--neon-pink'), `n = ${n.toFixed(2)}`);
            
            const mHandle = toScreen(5.0, m * 5.0 + n);
            LabUtils.drawHandle(ctx, mHandle, LabUtils.varColor('--neon-purple'), "m");

            const x0 = Math.abs(m) > 0.001 ? -n/m : null;
            if (x0 !== null) {
                const x0Handle = toScreen(x0, 0);
                LabUtils.drawHandle(ctx, x0Handle, LabUtils.varColor('--neon-green'), `x₀ = ${x0.toFixed(2)}`);
            }
            updateUI();
        }

        function updateUI() {
            if (typeof katex !== 'undefined') {
                const x0 = Math.abs(m) > 0.001 ? -n/m : null;
                katex.render(`\\textcolor{#9d50bb}{m = ${m.toFixed(2)}}`, document.getElementById('latex-m'));
                katex.render(`\\textcolor{#ff0055}{n = ${n.toFixed(2)}}`, document.getElementById('latex-n'));
                katex.render(`\\textcolor{#39FF14}{x_0 = ${x0 !== null ? x0.toFixed(2) : "---"}}`, document.getElementById('latex-x0'));
                
                const nSign = n >= 0 ? "+" : "-";
                const nVal = Math.abs(n).toFixed(2);
                const eqLatex = `f(x) = \\textcolor{#9d50bb}{${m.toFixed(2)}} \\cdot x ${nSign} \\textcolor{#ff0055}{${nVal}}`;
                katex.render(eqLatex, document.getElementById('eq-main'));
            }
        }

        canvas.onpointerdown = e => {
            const rect = canvas.getBoundingClientRect();
            const px = e.clientX - rect.left;
            const py = e.clientY - rect.top;
            const math = toMath(px, py);
            const mH = toScreen(5.0, m * 5.0 + n);
            if (Math.hypot(mH.px - px, mH.py - py) < 30) { dragMode = 2; return; }
            const lineY = m * math.x + n;
            if (Math.abs(math.y - lineY) < 0.8) { dragMode = 1; return; }
        };

        window.onpointermove = e => {
            if (!dragMode) return;
            const rect = canvas.getBoundingClientRect();
            const math = toMath(e.clientX - rect.left, e.clientY - rect.top);
            if (dragMode === 1) { n = math.y - m * math.x; }
            else if (dragMode === 2) { m = (math.y - n) / 5.0; document.getElementById('m-slider').value = m; }
            draw();
        };

        window.onpointerup = () => dragMode = 0;
        document.getElementById('m-slider').oninput = e => { m = parseFloat(e.target.value); draw(); };
        document.getElementById('x-slider').oninput = e => { triX = parseFloat(e.target.value); draw(); };
        document.getElementById('size-slider').oninput = e => { triSize = parseFloat(e.target.value); draw(); };
        window.onresize = init;
        document.fonts.ready.then(init);
    </script>
</body>
</html>
