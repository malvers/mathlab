<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Steigungs-Labor | docalvers</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-pink: #ff0055;
            --neon-green: #39FF14;
            --neon-orange: #ff8800;
            --bg-dark: #050b18;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-bright: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #0a1329 0%, #050b18 100%);
            color: white;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
        }

        #side-panel {
            width: 380px;
            min-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
            box-sizing: border-box;
            box-shadow: 15px 0 45px rgba(0, 0, 0, 0.6);
            overflow-y: auto;
            transition: all 0.4s ease;
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .dashboard-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            transition: all 0.3s ease;
            letter-spacing: 1.5px;
            backdrop-filter: blur(5px);
            width: 100%;
            box-sizing: border-box;
        }
        .dashboard-btn:hover {
            color: white;
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }
        .dashboard-btn svg { width: 16px; height: 16px; stroke-width: 2.5; }

        .equation-box {
            background: var(--glass-bright);
            padding: 20px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 5px;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .equation-label {
            font-family: 'Orbitron';
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
        }

        .stats-card {
            background: var(--glass-bright);
            padding: 15px 20px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 5px;
            transition: all 0.3s ease;
            min-height: 52px;
        }

        .stats-title {
            font-family: 'Orbitron';
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
            margin-bottom: 5px;
            display: block;
        }

        .val-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: white;
            letter-spacing: 1px;
        }

        #latex-m { color: var(--neon-purple); text-shadow: 0 0 15px var(--neon-purple); }
        #latex-n { color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink); }
        #latex-x0 { color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }

        .control-group { display: flex; flex-direction: column; gap: 12px; }

        .slider-box {
            background: rgba(255, 255, 255, 0.02);
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .slider-box label { font-family: 'Orbitron'; font-size: 0.65rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 1px; }
        input[type=range] { width: 100%; accent-color: var(--neon-blue); cursor: pointer; margin-top: 8px; }

        button {
            padding: 15px 20px;
            font-size: 0.85rem;
            font-family: 'Orbitron', sans-serif;
            background: var(--glass-bright);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            width: 100%;
        }
        button:hover { background: rgba(0, 210, 255, 0.1); border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }

        #sidebar-header {
            min-height: 60px;
            display: flex;
            align-items: center;
            width: 100%;
        }

        /* --- TELEMETRY HUD BOX --- */
        .cyber-telemetry-pane {
            position: absolute;
            top: 100px;
            right: 20px;
            z-index: 50;
            pointer-events: none;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }
        
        .telemetry-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 210, 255, 0.4);
            border-radius: 12px;
            padding: 12px 18px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 210, 255, 0.1);
            min-width: 140px;
        }

        .telemetry-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 4px;
        }
        .telemetry-row:last-child { margin-bottom: 0; }

        .telemetry-row .label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            color: rgba(0, 210, 255, 0.6);
            letter-spacing: 1px;
        }

        .telemetry-row .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: white;
            font-variant-numeric: tabular-nums;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            #side-panel { width: 100%; min-width: 100%; height: auto; border-right: none; border-top: 1px solid rgba(0, 210, 255, 0.3); order: 2; padding: 20px; }
            #canvas-container { width: 100%; height: 60vh; min-height: 400px; order: 1; }
        }
    </style>
</head>
<body>

    <div id="side-panel">
        <header id="sidebar-header" style="border: none; padding-bottom: 5px;">
        </header>
        
        <div class="equation-box">
            <span class="equation-label">Funktionsgleichung</span>
            <div id="eq-main"></div>
        </div>

        <div class="stats-card">
            <span class="stats-title">m (Steigung)</span>
            <div id="latex-m" class="val-display"></div>
        </div>

        <div class="stats-card">
            <span class="stats-title">n (y-Abschnitt)</span>
            <div id="latex-n" class="val-display"></div>
        </div>

        <div class="stats-card">
            <span class="stats-title">x₀ (Nullstelle)</span>
            <div id="latex-x0" class="val-display"></div>
        </div>

        <div class="control-group">
            <div class="slider-box">
                <label>Steigung m</label>
                <input type="range" id="m-slider" min="-5" max="5" step="0.05" value="1">
            </div>
            <div class="slider-box">
                <label>Steigungsdreieck Position (x)</label>
                <input type="range" id="x-slider" min="-10" max="10" step="0.5" value="1">
            </div>
            <div class="slider-box">
                <label>Steigungsdreieck Breite (Δx)</label>
                <input type="range" id="size-slider" min="0.5" max="10" step="0.5" value="2">
            </div>
            <button onclick="resetView()">Labor Reset</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cyber-canvas.js"></script>
    <script>
        // --- CORE ENGINE ---
        let cc = null;
        let m = 1.0, n = 2.0;
        let triX = 1.0, triSize = 2.0;
        let dragMode = 0; 

        function startLabor() {
            try {
                if (typeof CyberCanvas === 'undefined') return;
                
                // Initialize UI Engine
                if (typeof CyberUI !== 'undefined') CyberUI.init();

                cc = new CyberCanvas();
                const canvasEl = document.getElementById('canvas');
                if (!canvasEl) return;

                // Branding
                if (typeof CyberBranding !== 'undefined') {
                    CyberBranding.init({
                        title: "Doc Alvers Mathe-Labor",
                        subtitle: "STEIGUNGS-LABOR",
                        briefing: "Verändere m und n mit den Handles oder Slidern."
                    });
                }
                
                cc.init('canvas', { minY: -10, maxY: 10 }, { showTelemetry: false, showLabels: true, allowPan: false });
                cc.onResize = () => draw(); 
                
                // --- FULL VIEWPORT LOCK (Zoom & Pan) ---
                cc.canvas.addEventListener('wheel', e => e.preventDefault(), { passive: false });
                cc.canvas.addEventListener('touchmove', e => { if(e.touches.length > 1) e.preventDefault(); }, { passive: false });

                // --- INTERACTION SETUP ---
                cc.onContextMenu = (e) => {
                    if (typeof CyberUI === 'undefined') return;
                    CyberUI.showContextMenu(e.clientX, e.clientY, [
                        {
                            label: 'Ansicht zurücksetzen',
                            onclick: () => { cc.resetView(-10, 10); draw(); }
                        },
                        { divider: true },
                        {
                            label: 'Achsen an',
                            checked: cc.showAxes,
                            onchange: (val) => { cc.showAxes = val; draw(); }
                        },
                        {
                            label: 'Achsenbeschriftung',
                            checked: cc.showLabels,
                            onchange: (val) => { cc.showLabels = val; draw(); }
                        },
                        {
                            label: 'Koordinaten',
                            checked: cc.showTelemetry,
                            onchange: (val) => { 
                                cc.showTelemetry = val; 
                                if (val && !cc.telePane) cc.injectTelemetryPane();
                            }
                        }
                    ]);
                };
                cc.canvas.addEventListener('mousedown', e => {
                    const rect = cc.canvas.getBoundingClientRect();
                    const px = e.clientX - rect.left;
                    const py = e.clientY - rect.top;
                    
                    const mH = { x: cc.mapX(5.0), y: cc.mapY(m * 5.0 + n) };
                    if (Math.hypot(mH.x - px, mH.y - py) < 30) { dragMode = 2; return; }
                    
                    const nH = { x: cc.mapX(0), y: cc.mapY(n) };
                    if (Math.hypot(nH.x - px, nH.y - py) < 30) { dragMode = 1; return; }
                });

                window.addEventListener('mousemove', e => {
                    if (!dragMode) return;
                    const rect = cc.canvas.getBoundingClientRect();
                    const mathX = cc.unmapX(e.clientX - rect.left);
                    const mathY = cc.unmapY(e.clientY - rect.top);
                    
                    if (dragMode === 1) { n = mathY - m * mathX; }
                    else if (dragMode === 2) { m = (mathY - n) / 5.0; syncSliders(); }
                    draw();
                });

                window.addEventListener('mouseup', () => dragMode = 0);

                syncSliders();
                draw();
            } catch (e) {
                console.error("Init failure:", e);
            }
        }

        function resetView() {
            m = 1.0; n = 2.0; triX = 1.0; triSize = 2.0;
            if(cc) cc.resetView(-10, 10);
            syncSliders();
            draw();
        }

        function syncSliders() {
            const mS = document.getElementById('m-slider');
            const xS = document.getElementById('x-slider');
            const sS = document.getElementById('size-slider');
            if(mS) mS.value = m;
            if(xS) xS.value = triX;
            if(sS) sS.value = triSize;
        }

        function draw() {
            if (!cc || !cc.ctx) return;
            cc.drawGrid({ glow: true, vignette: true });
            const ctx = cc.ctx;

            const xL = cc.view.minX, xR = cc.view.maxX;
            const pL = { x: cc.mapX(xL), y: cc.mapY(m * xL + n) };
            const pR = { x: cc.mapX(xR), y: cc.mapY(m * xR + n) };
            
            ctx.strokeStyle = "#00d2ff";
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(0, 210, 255, 0.5)";
            ctx.beginPath(); ctx.moveTo(pL.x, pL.y); ctx.lineTo(pR.x, pR.y); ctx.stroke();
            ctx.shadowBlur = 0;

            const pA = { x: cc.mapX(triX), y: cc.mapY(m * triX + n) };
            const pB = { x: cc.mapX(triX + triSize), y: cc.mapY(m * triX + n) };
            const pC = { x: cc.mapX(triX + triSize), y: cc.mapY(m * (triX + triSize) + n) };

            ctx.fillStyle = "rgba(157, 80, 187, 0.2)";
            ctx.beginPath(); ctx.moveTo(pA.x, pA.y); ctx.lineTo(pB.x, pB.y); ctx.lineTo(pC.x, pC.y); ctx.closePath(); ctx.fill();

            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = "#9d50bb";
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(pA.x, pA.y); ctx.lineTo(pB.x, pB.y); ctx.lineTo(pC.x, pC.y); ctx.stroke();
            ctx.setLineDash([]);

            ctx.font = "bold 13px Orbitron";
            ctx.fillStyle = "#9d50bb";
            ctx.textAlign = "center";
            ctx.fillText(`Δx = ${triSize.toFixed(1)}`, pA.x + (pB.x - pA.x)/2, pA.y + 20);
            ctx.textAlign = "left";
            ctx.fillText(`Δy = ${(m * triSize).toFixed(2)}`, pC.x + 10, pA.y + (pC.y - pA.y)/2);

            drawHandle(cc.mapX(0), cc.mapY(n), "#ff0055", `n = ${n.toFixed(2)}`);
            drawHandle(cc.mapX(5.0), cc.mapY(m * 5.0 + n), "#9d50bb", "m");

            const x0 = Math.abs(m) > 0.001 ? -n/m : null;
            if (x0 !== null) {
                drawHandle(cc.mapX(x0), cc.mapY(0), "#39FF14", `x₀ = ${x0.toFixed(2)}`);
            }
            updateUI();
        }

        function drawHandle(px, py, color, label) {
            const ctx = cc.ctx;
            ctx.shadowBlur = 10; ctx.shadowColor = color;
            ctx.beginPath();
            ctx.arc(px, py, 8, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 0;
            if (label) {
                ctx.font = "bold 12px Orbitron";
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.fillText(label, px, py - 20);
            }
        }

        function updateUI() {
            if (typeof katex !== 'undefined') {
                const x0 = Math.abs(m) > 0.001 ? -n/m : null;
                const mEl = document.getElementById('latex-m'), nEl = document.getElementById('latex-n'), xEl = document.getElementById('latex-x0'), eqEl = document.getElementById('eq-main');
                if (mEl) katex.render(`\\textcolor{#9d50bb}{m = ${m.toFixed(2)}}`, mEl);
                if (nEl) katex.render(`\\textcolor{#ff0055}{n = ${n.toFixed(2)}}`, nEl);
                if (xEl) katex.render(`\\textcolor{#39FF14}{x_0 = ${x0 !== null ? x0.toFixed(2) : "---"}}`, xEl);
                if (eqEl) {
                    const nSign = n >= 0 ? "+" : "-", nVal = Math.abs(n).toFixed(2);
                    katex.render(`f(x) = \\textcolor{#9d50bb}{${m.toFixed(2)}} \\cdot x ${nSign} \\textcolor{#ff0055}{${nVal}}`, eqEl);
                }
            }
        }

        document.getElementById('m-slider').oninput = e => { m = parseFloat(e.target.value); draw(); };
        document.getElementById('x-slider').oninput = e => { triX = parseFloat(e.target.value); draw(); };
        document.getElementById('size-slider').oninput = e => { triSize = parseFloat(e.target.value); draw(); };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', startLabor);
        } else {
            startLabor();
        }
    </script>
</body>
</html>
