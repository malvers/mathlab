<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Schriftliche Subtraktion | docalvers</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <style>
        body { font-family: 'Orbitron', sans-serif !important; overflow: hidden; height: 100vh; background: #050b18; }
        #canvas-container { position: relative; background: radial-gradient(circle at 50% 50%, rgba(5, 25, 55, 1) 0%, rgba(2, 10, 25, 1) 100%); overflow: hidden; height: 100%; border-radius: 0; }
        .cyber-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0, 210, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 210, 255, 0.03) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
        #math-coach-box { position: absolute; width: 380px; background: rgba(10, 20, 40, 0.5); backdrop-filter: blur(20px); border: 1px solid rgba(0, 210, 255, 0.25); border-radius: 20px; padding: 25px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.1); color: white; opacity: 0; transform: translateX(20px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); z-index: 10; pointer-events: none; }
        #math-coach-box.visible { opacity: 1; transform: translateX(0); }
        .coach-title { font-size: 0.65rem; color: #00d2ff; letter-spacing: 2.5px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        .coach-title::before { content: ''; width: 8px; height: 8px; background: #00d2ff; border-radius: 50%; box-shadow: 0 0 10px #00d2ff; }
        .coach-message { font-family: 'Outfit', sans-serif; font-size: 1.05rem; line-height: 1.5; color: rgba(255, 255, 255, 0.9); }
        .coach-math-highlight { font-family: 'Orbitron', sans-serif; font-weight: 700; color: #ffde00; text-shadow: 0 0 5px rgba(255, 222, 0, 0.3); }
        input[type="number"] { background: rgba(0, 210, 255, 0.05) !important; border: 1px solid rgba(0, 210, 255, 0.2) !important; color: #00d2ff !important; font-family: 'Orbitron', sans-serif !important; border-radius: 8px; padding: 8px; width: 100%; box-sizing: border-box; }
        .stats-card:hover { border-color: #ffde00 !important; background: rgba(255, 222, 0, 0.05) !important; }
    </style>
</head>

<body>
    <aside id="side-panel">
        <header id="sidebar-header" style="min-height: 80px;"></header>
        <div id="ui-container"></div>
        <div style="margin-top: auto; padding: 20px; text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.2); font-family: 'Orbitron';">
            &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull;
        </div>
    </aside>

    <main id="main-content">
        <div id="canvas-container">
            <div class="cyber-grid"></div>
            <div id="math-coach-box">
                <div class="coach-title">Math Coach | Subtraktions-Analyse</div>
                <div id="coach-content" class="coach-message">Bereit für die Subtraktion...</div>
            </div>
            <canvas id="canvas"></canvas>
        </div>
    </main>

    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script>
        CyberBranding.init({ title: "Doc Alvers Mathe-Labor", subtitle: "SCHRIFTLICHE SUBTRAKTION" });
        CyberUI.init();

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        const BRAND_BLUE = "#00d2ff";

        let minuend = 4567890;
        let subtrahend = 1234567;
        let currentStep = -1;
        let stepSequence = [];

        function setupUI() {
            CyberUI.createCard('ui-container', 'SUBTRAKTION', `
                <div class="cyber-control-group">
                    <label class="cyber-label">MINUEND (Oben)</label>
                    <input type="number" id="m-input" value="${minuend}" onchange="updateNumbers()">
                </div>
                <div class="cyber-control-group" style="margin-top:25px;">
                    <label class="cyber-label">SUBTRAHEND (Unten)</label>
                    <input type="number" id="s-input" value="${subtrahend}" onchange="updateNumbers()">
                </div>
                <button class="cyber-btn" onclick="resetSteps()" style="width:100%; margin-top:20px; border-color:var(--neon-blue);">LABOR RESET</button>
            `, BRAND_BLUE);

            CyberUI.createCard('ui-container', 'STEUERUNG', `
                <div class="stats-grid">
                    <div class="stats-card" onclick="nextStep()" style="cursor:pointer; text-align:center;">
                        <span class="stats-label">WEITER</span>
                        <span class="stats-val" style="font-size:1.4rem;">◀</span>
                    </div>
                    <div class="stats-card" onclick="prevStep()" style="cursor:pointer; text-align:center;">
                        <span class="stats-label">ZURÜCK</span>
                        <span class="stats-val" style="font-size:1.4rem;">▶</span>
                    </div>
                </div>
                <div id="step-info" style="margin-top:15px; font-family:'Orbitron'; font-size:0.7rem; color:rgba(255,255,255,0.7); min-height:80px; border-left:2px solid var(--neon-blue); padding-left:12px; display:none;">
                </div>
            `, '#ff9d00');
        }

        function buildStepSequence() {
            stepSequence = [];
            const mStr = String(minuend);
            const sStr = String(subtrahend);
            const maxLen = Math.max(mStr.length, sStr.length);

            let borrow = 0;
            for (let i = 0; i < maxLen; i++) {
                stepSequence.push({ type: 'focus', col: i });

                const d1 = parseInt(mStr[mStr.length - 1 - i] || 0);
                const d2 = parseInt(sStr[sStr.length - 1 - i] || 0);
                
                let currentSub = d2 + borrow;
                let neededBorrow = 0;
                let resultDigit = d1 - currentSub;

                if (resultDigit < 0) {
                    resultDigit += 10;
                    neededBorrow = 1;
                }

                stepSequence.push({
                    type: 'calculate',
                    col: i,
                    d1, d2,
                    oldBorrow: borrow,
                    result: resultDigit,
                    newBorrow: neededBorrow
                });

                borrow = neededBorrow;
            }
            stepSequence.push({ type: 'complete' });
        }

        function updateNumbers() {
            minuend = parseInt(document.getElementById('m-input').value) || 0;
            subtrahend = parseInt(document.getElementById('s-input').value) || 0;
            resetSteps();
        }

        function resetSteps() {
            currentStep = -1;
            buildStepSequence();
            draw();
        }

        function nextStep() {
            if (currentStep < stepSequence.length - 1) { currentStep++; draw(); }
        }

        function prevStep() {
            if (currentStep > -1) { currentStep--; draw(); }
        }

        function init() {
            const dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            buildStepSequence();
            draw();
        }

        function draw() {
            const rect = container.getBoundingClientRect();
            const width = rect.width; const height = rect.height;
            ctx.clearRect(0, 0, width, height);

            const mStr = String(minuend);
            const sStr = String(subtrahend);
            const maxCols = Math.max(mStr.length, sStr.length) + 1;

            let fontSize = Math.floor(width / 22);
            if (fontSize > 70) fontSize = 70;
            ctx.font = `bold ${fontSize}px Orbitron`;
            ctx.textBaseline = 'middle';
            const charWidth = fontSize * 0.85;
            const rowHeight = fontSize * 1.35;

            const rightShift = 150;
            const horizontalCenter = (width / 2) + rightShift - 100;
            const calcWidth = maxCols * charWidth;
            const startX = horizontalCenter + (calcWidth / 2) - (charWidth / 2);
            const startY = height / 2 - (rowHeight * 0.6);

            const coachBox = document.getElementById('math-coach-box');
            if (coachBox) {
                coachBox.style.left = `${horizontalCenter + (calcWidth / 2) + 80}px`;
                coachBox.style.top = `${height / 2 - 100}px`;
                coachBox.classList.add('visible');
            }

            const step = currentStep >= 0 ? stepSequence[currentStep] : null;
            ctx.textAlign = 'center';

            // Top Number (Minuend)
            for (let i = 0; i < mStr.length; i++) {
                const isFocused = step && step.col === i && step.type !== 'complete';
                ctx.fillStyle = isFocused ? '#ffde00' : BRAND_BLUE;
                if (isFocused) { ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = '#ffde00'; }
                ctx.fillText(mStr[mStr.length - 1 - i], startX - i * charWidth, startY);
                if (isFocused) ctx.restore();
            }

            // Bottom Number (Subtrahend with -)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fillText('-', startX - (maxCols - 1) * charWidth, startY + rowHeight);
            for (let i = 0; i < sStr.length; i++) {
                const isFocused = step && step.col === i && step.type !== 'complete';
                ctx.fillStyle = isFocused ? '#ffde00' : BRAND_BLUE;
                ctx.fillText(sStr[sStr.length - 1 - i], startX - i * charWidth, startY + rowHeight);
            }

            // Separator
            ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(startX - (maxCols - 0.5) * charWidth, startY + rowHeight * 1.6);
            ctx.lineTo(startX + charWidth * 0.6, startY + rowHeight * 1.6);
            ctx.stroke();

            // Borrow Marks & Results
            for (let i = 0; i <= currentStep; i++) {
                const s = stepSequence[i];
                if (s.type === 'calculate') {
                    // Result Digit
                    ctx.fillStyle = 'white';
                    ctx.font = `bold ${fontSize}px Orbitron`;
                    ctx.fillText(s.result, startX - s.col * charWidth, startY + rowHeight * 2.2);

                    // Borrow (Small 1) for NEXT column
                    if (s.newBorrow > 0) {
                        ctx.save();
                        ctx.font = `bold ${fontSize * 0.4}px Orbitron`;
                        ctx.fillStyle = (i === currentStep) ? '#ffde00' : 'rgba(150, 150, 150, 0.4)';
                        ctx.fillText('1', startX - (s.col + 1) * charWidth, startY + rowHeight * 1.45);
                        ctx.restore();
                    }
                }
            }
            updateStepInfo();
        }

        function updateStepInfo() {
            const coachContent = document.getElementById('coach-content');
            if (currentStep === -1) {
                coachContent.innerHTML = `Bereit für die Subtraktion von <span class="coach-math-highlight">${minuend}</span> minus <span class="coach-math-highlight">${subtrahend}</span>. Wir rechnen von rechts nach links.`;
            } else {
                const step = stepSequence[currentStep];
                if (step.type === 'focus') {
                    coachContent.innerHTML = `Betrachten wir die <span class="coach-math-highlight">${step.col + 1}. Stelle</span> (von rechts).`;
                } else if (step.type === 'calculate') {
                    if (step.newBorrow > 0) {
                        coachContent.innerHTML = `${step.d1} minus (${step.d2} + ${step.oldBorrow}) geht nicht direkt. Wir borgen uns 10: <br><span class="coach-math-highlight">(${step.d1} + 10) - ${step.d2 + step.oldBorrow} = ${step.result}</span>. <br>Wir notieren die 1 als Übertrag für die nächste Stelle.`;
                    } else {
                        coachContent.innerHTML = `Wir rechnen: <span class="coach-math-highlight">${step.d1} - (${step.d2} + ${step.oldBorrow}) = ${step.result}</span>. Das Ergebnis wird notiert.`;
                    }
                } else if (step.type === 'complete') {
                    coachContent.innerHTML = `<b>Berechnung abgeschlossen!</b> Das Ergebnis der Subtraktion lautet <span class="coach-math-highlight">${minuend - subtrahend}</span>.`;
                }
            }
        }

        window.onresize = init;
        setupUI();
        document.fonts.ready.then(() => { setTimeout(init, 100); });
    </script>
</body>
</html>
