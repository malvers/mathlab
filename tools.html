<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Labor | Mission Control</title>
    <link rel="icon" type="image/png" href="resources/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="js/branding.styles.extracted.css">
    <!-- Central Branding & UI Engine -->
    <script src="js/branding/briefings.js?v=539"></script>
    <script src="js/branding/overlays.js?v=539"></script>
    <script src="js/branding.js?v=539"></script>
    <script src="js/ui.js?v=539"></script>
    <style>
        :root {
            --space-bg: #050b18;
            --neon-blue: #00d2ff;
            --neon-pink: #ff00ff;
            --neon-purple: #9d50bb;
            --neon-green: #adff2f;
            --neon-orange: #ff8c00;
            --glass: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* Hub: niemals zweites Floating-Titel-Branding (eigener Header im Dokument). */
        body.cyber-hub .canvas-branding {
            display: none !important;
        }

        html {
            background-color: var(--space-bg);
            height: 100%;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: white;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        #bg-video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.72;
            pointer-events: none;
        }

        /* --- BACKGROUND EFFECTS --- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.02) 0%, transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(157, 80, 187, 0.02) 0%, transparent 45%);
            z-index: 1;
            pointer-events: none;
        }

        header,
        .search-scan-row,
        #sidebar-header,
        .launcher-grid,
        footer {
            position: relative;
            z-index: 2;
        }

        header {
            width: 100%;
            padding: 22px 0 10px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.12), transparent);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            margin: 0;
            letter-spacing: 5px;
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.4));
        }

        .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 12px;
            color: var(--neon-blue);
            margin-top: 10px;
            opacity: 0.8;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .launcher-grid {
            width: 95%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px; /* Genug Platz gegen Clash */
            padding: 20px 0 28px;
            margin-left: 0; /* Linksbündig */
            flex: 1 0 auto;
        }

        /* --- THE WIDE FLAT BUTTON --- */
        .tool-button {
            display: flex;
            align-items: center;
            padding: 6px 20px;
            /* Extreme Low-Profile Padding */
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 8px;
            /* Etwas kantiger für flachen Look */
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease-out;
            backdrop-filter: blur(20px);
            min-height: 52px; /* Euler-Standard Höhe */
            box-sizing: border-box;
        }

        .tool-button::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-color, var(--neon-blue));
            transition: width 0.3s ease;
        }

        .tool-button:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-color, var(--neon-blue));
        }

        .tool-button:hover::before {
            width: 10px;
        }

        .tool-icon {
            font-size: 1.2rem;
            margin-right: 20px;
            width: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.1));
            transition: transform 0.3s ease;
        }

        .tool-icon svg {
            width: 24px !important;
            height: 24px !important;
            opacity: 0.9;
        }

        .tool-button:hover .tool-icon {
            transform: scale(1.15) rotate(-3deg);
        }

        .tool-info {
            flex-grow: 1;
        }

        .tool-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            /* Ultra-kompakter Font */
            letter-spacing: 1.5px;
            margin-bottom: 0px;
            transition: color 0.3s ease;
            text-transform: uppercase;
        }

        .tool-button:hover .tool-name {
            color: #fff;
            text-shadow: 0 0 10px var(--accent-color, var(--neon-blue));
        }

        .tool-tagline {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .external-icon {
            opacity: 0.3;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            transform: translateX(-10px);
            color: var(--accent-color, var(--neon-blue));
        }

        .tool-button:hover .external-icon {
            opacity: 1;
            transform: translateX(0);
        }

        /* --- ACCENT COLORS --- */
        .color-blue {
            --accent-color: #00d2ff;
            --accent-color-glow: rgba(0, 210, 255, 0.3);
        }

        .color-purple {
            --accent-color: #ff00ff;
            --accent-color-glow: rgba(255, 0, 255, 0.3);
        }

        .color-green {
            --accent-color: #adff2f;
            --accent-color-glow: rgba(173, 255, 47, 0.3);
        }

        .color-orange {
            --accent-color: #ff8c00;
            --accent-color-glow: rgba(255, 140, 0, 0.3);
        }

        .color-gold {
            --accent-color: #ffd700;
            --accent-color-glow: rgba(255, 215, 0, 0.3);
        }

        footer {
            margin-top: auto;
            width: 100%;
            box-sizing: border-box;
            padding: 24px 16px 28px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            opacity: 0.4;
            letter-spacing: 3px;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
            .tool-button {
                padding: 15px 20px;
            }

            .tool-icon {
                margin-right: 15px;
                font-size: 1.8rem;
                width: 45px;
            }

            .tool-name {
                font-size: 1rem;
            }

            .tool-tagline {
                font-size: 0.8rem;
            }
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 0;
            font-family: 'Orbitron', sans-serif;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /*
         * Labor-Scan + Universe-Galaxy (wie index.html)
         * Höhe des Buttons = gemessene Höhe von .search-input (JS), nicht Flex-Stretch/Bild-Höhe.
         */
        .search-scan-row {
            width: 95%;
            max-width: 1000px;
            margin: 12px auto 18px auto;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 100;
            box-sizing: border-box;
        }

        .search-scan-row #search-mount {
            flex: 1;
            min-width: 0;
        }

        .universe-galaxy-btn {
            box-sizing: border-box;
            flex: 0 0 auto;
            width: clamp(42px, 7.5vw, 68px);
            position: relative;
            overflow: hidden;
            align-self: center;
            height: 56px;
            border-radius: 12px;
            border: none;
            box-shadow:
                0 8px 26px rgba(0, 0, 0, 0.38),
                0 0 18px rgba(0, 210, 255, 0.14);
            transition: box-shadow 0.22s ease;
            padding: 0;
            background: #070d18;
            cursor: pointer;
            display: block;
            text-decoration: none;
            line-height: 0;
        }

        .universe-galaxy-btn:hover {
            box-shadow:
                0 0 28px rgba(0, 210, 255, 0.35),
                0 10px 32px rgba(0, 0, 0, 0.45);
        }

        .universe-galaxy-btn:focus-visible {
            outline: 2px solid var(--neon-blue);
            outline-offset: 3px;
        }

        .universe-galaxy-btn img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        @media (max-width: 520px) {
            .search-scan-row {
                gap: 10px;
            }

            .universe-galaxy-btn {
                width: clamp(36px, 14vw, 56px);
            }
        }

        /* Keine Kurzbeschreibung unter den Werkzeugen; kein ?-Briefing auf dieser Seite */
        .cyber-nav .nav-btn[title="Beschreibung anzeigen"] {
            display: none !important;
        }

        .tool-info .tool-tagline {
            display: none;
        }
    </style>
</head>

<body class="cyber-hub">
    <!-- Poster wie index.html (Fallback ohne lokales favicon-PNG). Video: resources/galay20.mp4 -->
    <video id="bg-video" autoplay loop muted playsinline
        poster="https://images.unsplash.com/photo-1464802686167-b939a6910659?q=80&w=2000&auto=format&fit=crop">
        <source src="resources/galay20.mp4" type="video/mp4">
    </video>

    <header>
        <div class="header-content">
            <h1>Doc Alvers Mathe-Labor</h1>
            <div class="subtitle" id="dynamic-subtitle">WERKZEUGE AUF EINEN BLICK</div>
        </div>
    </header>

    <!-- Labor-Scan + Universe (Galaxy) -->
    <div class="search-scan-row">
        <div id="search-mount"></div>
        <a href="universe.html" class="universe-galaxy-btn" title="Universe · Labor-Galerie im Weltraum"
            aria-label="Universe · Labor-Galerie öffnen">
            <img src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564?q=80&amp;w=600&amp;auto=format&amp;fit=crop"
                alt="" width="400" height="400" loading="lazy" decoding="async">
        </a>
    </div>

    <header id="sidebar-header"
        style="display: flex; justify-content: flex-start; margin-bottom: 2px; margin-top: -5px; width: 95%; max-width: 1000px;">
        <!-- Navigation will be injected here by branding.js -->
    </header>

    <div class="launcher-grid" id="launcher-grid" style="padding-top: 0;">
        <!-- Launcher buttons will be rendered dynamically from js/labs-config.js -->
    </div>

    <footer>
        &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull; v5.3.6
    </footer>

    <!-- Configuration Load -->
    <script src="js/labs-config.js"></script>

    <script>
        function renderLauncher(filterText = "") {
            const grid = document.getElementById('launcher-grid');
            if (!grid) return;

            const searchLower = filterText.toLowerCase().trim();
            const filteredData = LABS_DATA.filter(lab => {
                const title = (lab.title || "").toLowerCase();
                const tagline = (lab.tagline || "").toLowerCase();
                const keywords = (lab.keywords || "").toLowerCase();
                return title.includes(searchLower) || 
                       tagline.includes(searchLower) || 
                       keywords.includes(searchLower);
            });

            const count = filteredData.length;
            const subtitle = document.getElementById('dynamic-subtitle');
            if (subtitle) {
                subtitle.innerHTML = filterText === "" ? `${count} WERKZEUGE AUF EINEN BLICK` : `${count} TREFFER GEFUNDEN`;
            }

            if (count === 0) {
                grid.innerHTML = `<div class="no-results">Keine Treffer für "${filterText}"</div>`;
                return 0;
            }

            // Separate Intro from the rest to keep it at top (Priority 1)
            const intro = filteredData.find(lab => lab.id === 'cinematic-intro');
            const otherLabs = filteredData.filter(lab => lab.id !== 'cinematic-intro')
                                          .sort((a, b) => (a.title || "").localeCompare(b.title || ""));
            
            const sortedLabs = intro ? [intro, ...otherLabs] : otherLabs;

            grid.innerHTML = sortedLabs.map(lab => `
                <a href="${lab.href}" target="_blank" class="tool-button color-${lab.color || 'blue'}">
                    <div class="tool-icon">${lab.icon}</div>
                    <div class="tool-info">
                        <div class="tool-name">${lab.title}</div>
                    </div>
                    <div class="external-icon">↗</div>
                </a>
            `).join('');

            return count;
        }

        // Initialize launcher and UI
        CyberUI.init();
        
        CyberUI.createSearch('search-mount', 'LABOR-SCAN STARTEN...', (val) => {
            renderLauncher(val);
        });

        (function syncUniverseGalaxyBtnHeight() {
            const btn = document.querySelector('.search-scan-row .universe-galaxy-btn');
            function sync() {
                const inp = document.querySelector('#search-mount .search-input');
                const wrap = document.querySelector('#search-mount .search-container');
                if (!inp || !btn) return;
                const hInp = inp.getBoundingClientRect().height;
                const hWrap = wrap ? wrap.getBoundingClientRect().height : 0;
                const base = Math.max(hInp, hWrap);
                const px = Math.ceil(base) + 2;
                btn.style.height = Math.max(36, px) + 'px';
            }
            sync();
            requestAnimationFrame(sync);
            window.addEventListener('resize', () => requestAnimationFrame(sync));
            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(() => requestAnimationFrame(sync));
            }
            if (typeof ResizeObserver !== 'undefined') {
                const ro = new ResizeObserver(() => sync());
                const inp = document.querySelector('#search-mount .search-input');
                const wrap = document.querySelector('#search-mount .search-container');
                if (inp) ro.observe(inp);
                if (wrap) ro.observe(wrap);
            }
        })();

        const toolCount = renderLauncher();

        // Ensure background video actually plays across browsers.
        const bgVid = document.getElementById('bg-video');
        if (bgVid) {
            bgVid.playbackRate = 0.5;
            const tryPlay = () => bgVid.play().catch(() => {});
            tryPlay();
            window.addEventListener('pointerdown', tryPlay, { once: true });
        }

        // Use Central Branding for consistent navigation & QR feature
        CyberBranding.init({
            title: "Doc Alvers Mathe-Labor",
            subtitle: `${toolCount} WERKZEUGE AUF EINEN BLICK`,
            useExternalStyles: true,
            skipCanvasBranding: true
        });
    </script>
</body>

</html>
