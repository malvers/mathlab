<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Labor | Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --space-bg: #050b18;
            --neon-blue: #00d2ff;
            --neon-pink: #ff00ff;
            --neon-purple: #9d50bb;
            --neon-green: #adff2f;
            --neon-orange: #ff8c00;
            --glass: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--space-bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- BACKGROUND EFFECTS --- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(157, 80, 187, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        header {
            width: 100%;
            padding: 40px 0;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            margin: 0;
            letter-spacing: 5px;
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.4));
        }

        .subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 12px;
            color: var(--neon-blue);
            margin-top: 10px;
            opacity: 0.8;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .launcher-grid {
            width: 95%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 Buttons pro Zeile */
            gap: 6px; /* Kompakter Abstand */
            padding: 20px 0 100px 0;
        }

        /* --- THE WIDE FLAT BUTTON --- */
        .tool-button {
            display: flex;
            align-items: center;
            padding: 6px 20px; /* Extreme Low-Profile Padding */
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 8px; /* Etwas kantiger für flachen Look */
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(20px);
        }

        .tool-button::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-color, var(--neon-blue));
            box-shadow: 0 0 20px var(--accent-color, var(--neon-blue));
            transition: width 0.3s ease;
        }

        .tool-button:hover {
            transform: scale(1.02) translateX(15px);
            background: rgba(255, 255, 255, 0.08); /* Helleres Glas on Hover */
            border-color: var(--accent-color, var(--neon-blue));
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px var(--accent-color-glow, rgba(0, 210, 255, 0.2));
        }

        .tool-button:hover::before {
            width: 10px;
        }

        .tool-icon {
            font-size: 1.3rem; /* Noch filigraner */
            margin-right: 20px;
            width: 40px;
            text-align: center;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
            transition: transform 0.4s ease;
        }

        .tool-button:hover .tool-icon {
            transform: scale(1.15) rotate(-3deg);
        }

        .tool-info {
            flex-grow: 1;
        }

        .tool-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem; /* Ultra-kompakter Font */
            letter-spacing: 1.5px;
            margin-bottom: 0px;
            transition: color 0.3s ease;
            text-transform: uppercase;
        }

        .tool-button:hover .tool-name {
            color: #fff;
            text-shadow: 0 0 10px var(--accent-color, var(--neon-blue));
        }

        .tool-tagline {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .external-icon {
            opacity: 0.3;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            transform: translateX(-10px);
            color: var(--accent-color, var(--neon-blue));
        }

        .tool-button:hover .external-icon {
            opacity: 1;
            transform: translateX(0);
        }

        /* --- ACCENT COLORS --- */
        .color-blue { --accent-color: #00d2ff; --accent-color-glow: rgba(0, 210, 255, 0.3); }
        .color-purple { --accent-color: #ff00ff; --accent-color-glow: rgba(255, 0, 255, 0.3); }
        .color-green { --accent-color: #adff2f; --accent-color-glow: rgba(173, 255, 47, 0.3); }
        .color-orange { --accent-color: #ff8c00; --accent-color-glow: rgba(255, 140, 0, 0.3); }
        .color-gold { --accent-color: #ffd700; --accent-color-glow: rgba(255, 215, 0, 0.3); }

        footer {
            padding: 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            opacity: 0.4;
            letter-spacing: 3px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .tool-button { padding: 15px 20px; }
            .tool-icon { margin-right: 15px; font-size: 1.8rem; width: 45px; }
            .tool-name { font-size: 1rem; }
            .tool-tagline { font-size: 0.8rem; }
        }
    </style>
</head>

<body>
    <header>
        <h1>Mission Control</h1>
        <div class="subtitle">ULTRA v5.3 LAUNCHER</div>
    </header>

    <div class="launcher-grid" id="launcher-grid">
        <!-- Launcher buttons will be rendered dynamically from js/labs-config.js -->
    </div>

    <footer>
        &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull; AI CO-PILOT: GEMINI &bull; v5.3.6
    </footer>

    <!-- Configuration Load -->
    <script src="js/labs-config.js"></script>

    <script>
        function renderLauncher() {
            const grid = document.getElementById('launcher-grid');
            if (!grid) return;

            // Sort LABS_DATA alphabetically by title
            const sortedLabs = [...LABS_DATA].sort((a, b) => a.title.localeCompare(b.title));

            grid.innerHTML = sortedLabs.map(lab => `
                <a href="${lab.href}" target="_blank" class="tool-button color-${lab.color || 'blue'}">
                    <div class="tool-icon">${lab.icon.startsWith('<svg') ? '🧩' : lab.icon}</div>
                    <div class="tool-info">
                        <div class="tool-name">${lab.title}</div>
                        <div class="tool-tagline">${lab.tagline}</div>
                    </div>
                    <div class="external-icon">↗</div>
                </a>
            `).join('');
        }

        // Initialize launcher
        renderLauncher();
    </script>
</body>

</html>
