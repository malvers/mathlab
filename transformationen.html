<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | Transformationen</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas { display: block; cursor: crosshair; }

        .math-glow {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            font-size: 1.1em;
        }

        .val-display { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 1.2rem; 
            color: white; 
            font-weight: bold;
        }
    </style>
</head>

<body>
    <aside id="side-panel">
        <div id="sidebar-header" style="min-height: 60px;"></div>
        <div id="parameters-container"></div>
        <div style="margin-top: auto; padding-top: 15px; text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.2); font-family: 'Orbitron';">
            &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull;
        </div>
    </aside>

    <main id="main-content">
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </main>

    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cyber-canvas.js"></script>
    <script>
        let cc = null;
        let points = [
            { x: -2, y: -2, id: 'A' },
            { x: 2, y: -2, id: 'B' },
            { x: 0, y: 2, id: 'C' }
        ];
        let rp = { x: 0, y: 0 }; 
        let transform = { rotation: 0, scale: 1, tx: 0, ty: 0 };
        
        window.addEventListener('load', () => {
            // 1. Branding
            CyberBranding.init({
                title: "Doc Alvers Mathe-Labor",
                subtitle: "ÄQUIVALENZ"
            });

            // 2. UI Engine & Cards
            CyberUI.init();
            
            CyberUI.createCard('parameters-container', 'TRANSFORMATION', `
                <div style="display:flex; flex-direction:column; gap:15px;">
                    <div>
                        <div style="display:flex; justify-content:space-between; font-family:Orbitron; font-size:0.6rem; color:var(--neon-blue); margin-bottom:5px;">
                            <span>ROTATION</span>
                            <span id="label-rot" style="color:white;">0°</span>
                        </div>
                        <input type="range" id="slider-rot" min="-180" max="180" value="0" style="width:100%; accent-color:var(--neon-blue);">
                    </div>
                    <div>
                        <div style="display:flex; justify-content:space-between; font-family:Orbitron; font-size:0.6rem; color:var(--neon-blue); margin-bottom:5px;">
                            <span>SKALIERUNG</span>
                            <span id="label-scale" style="color:white;">1.0x</span>
                        </div>
                        <input type="range" id="slider-scale" min="10" max="300" value="100" style="width:100%; accent-color:var(--neon-blue);">
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <div>
                            <div style="font-family:Orbitron; font-size:0.55rem; color:var(--neon-blue); margin-bottom:3px;">DELTA X</div>
                            <input type="range" id="slider-tx" min="-100" max="100" value="0" style="width:100%; accent-color:var(--neon-blue);">
                            <div id="label-tx" style="font-size:0.7rem; text-align:center; margin-top:3px;">0.0</div>
                        </div>
                        <div>
                            <div style="font-family:Orbitron; font-size:0.55rem; color:var(--neon-blue); margin-bottom:3px;">DELTA Y</div>
                            <input type="range" id="slider-ty" min="-100" max="100" value="0" style="width:100%; accent-color:var(--neon-blue);">
                            <div id="label-ty" style="font-size:0.7rem; text-align:center; margin-top:3px;">0.0</div>
                        </div>
                    </div>
                </div>
            `);

            CyberUI.createCard('parameters-container', 'DARSTELLUNG', `
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <input type="checkbox" id="check-helpers" checked style="display:none;">
                    <label style="display:flex; align-items:center; gap:12px; cursor:pointer; font-size:0.75rem; font-family:Orbitron;">
                        <input type="checkbox" id="check-start" checked> URBILD (START)
                    </label>
                    <label style="display:flex; align-items:center; gap:12px; cursor:pointer; font-size:0.75rem; font-family:Orbitron; color:var(--neon-pink);">
                        <input type="checkbox" id="check-hl-lock"> HL FIXIEREN
                    </label>
                    <label style="display:flex; align-items:center; gap:12px; cursor:pointer; font-size:0.75rem; font-family:Orbitron; color:#adff2f;">
                        <input type="checkbox" id="check-measurements" style="accent-color:#adff2f;"> MESSWERTE
                    </label>
                </div>
                <button onclick="resetLab()" class="cyber-btn" style="width:100%; margin-top:15px; font-size:0.7rem;">Labor Reset</button>
            `);

            // 3. Canvas & Input
            cc = new CyberCanvas();
            cc.init('canvas', { minX: -10, maxX: 10, minY: -7, maxY: 7 }, { 
                showGrid: true, 
                showAxes: true, 
                vignette: true, 
                glow: true,
                allowPan: false
            });
            cc.onResize = () => update();

            // Helper to hide/show Hilfslinien dynamically
            const autoShowHL = () => {
                const cb = document.getElementById('check-helpers');
                if (cb && !cb.checked) cb.checked = true;
            };

            const autoHideHL = () => {
                // Check if HL should be locked (not hidden)
                const isLocked = document.getElementById('check-hl-lock').checked;

                // 1. Calculate the current state as the new baseline
                // G is the current centroid
                const G = {
                    x: points.reduce((s, p) => s + p.x, 0) / points.length,
                    y: points.reduce((s, p) => s + p.y, 0) / points.length
                };

                points = points.map(p => {
                    // Local Scale around G
                    let lx = (p.x - G.x) * transform.scale;
                    let ly = (p.y - G.y) * transform.scale;
                    let ps = { x: lx + G.x, y: ly + G.y };

                    // Rotation around RP
                    let nx = ps.x - rp.x;
                    let ny = ps.y - rp.y;
                    const angleRad = (transform.rotation * Math.PI) / 180;
                    const rx = nx * Math.cos(angleRad) - ny * Math.sin(angleRad);
                    const ry = nx * Math.sin(angleRad) + ny * Math.cos(angleRad);
                    
                    return { x: rx + rp.x + transform.tx, y: ry + rp.y + transform.ty, id: p.id };
                });

                // 2. Reset transform state to neutral
                transform = { rotation: 0, scale: 1, tx: 0, ty: 0 };

                // 3. Sync UI Sliders
                sliderRot.value = 0;
                sliderScale.value = 100;
                sliderTX.value = 0;
                sliderTY.value = 0;

                // 4. Handle HL Visibility
                const cb = document.getElementById('check-helpers');
                if (cb && !isLocked) cb.checked = false;
                
                update();
            };

            // Bind Events
            const sliderRot = document.getElementById('slider-rot');
            const sliderScale = document.getElementById('slider-scale');
            const sliderTX = document.getElementById('slider-tx');
            const sliderTY = document.getElementById('slider-ty');

            sliderRot.oninput = (e) => { 
                autoShowHL();
                transform.rotation = parseFloat(e.target.value); 
                update(); 
            };
            sliderRot.onchange = autoHideHL;

            sliderScale.oninput = (e) => { 
                autoShowHL();
                transform.scale = parseFloat(e.target.value) / 100; 
                update(); 
            };
            sliderScale.onchange = autoHideHL;

            sliderTX.oninput = (e) => { 
                autoShowHL();
                transform.tx = parseFloat(e.target.value) / 10; 
                update(); 
            };
            sliderTX.onchange = autoHideHL;

            sliderTY.oninput = (e) => { 
                autoShowHL();
                transform.ty = parseFloat(e.target.value) / 10; 
                update(); 
            };
            sliderTY.onchange = autoHideHL;
            
            document.getElementById('check-helpers').onchange = () => update();
            document.getElementById('check-start').onchange = () => update();
            document.getElementById('check-measurements').onchange = () => update();

            cc.canvas.addEventListener('mousedown', (e) => {
                autoShowHL();
                startAction(e);
            });
            window.addEventListener('mouseup', autoHideHL);

            update();
        });

        function startAction(e) {
            const rect = cc.canvas.getBoundingClientRect();
            rp.x = cc.unmapX(e.clientX - rect.left);
            rp.y = cc.unmapY(e.clientY - rect.top);
            update();
        }

        window.resetLab = () => {
            points = [
                { x: -2, y: -2, id: 'A' },
                { x: 2, y: -2, id: 'B' },
                { x: 0, y: 2, id: 'C' }
            ];
            transform = { rotation: 0, scale: 1, tx: 0, ty: 0 };
            rp = { x: 0, y: 0 };
            document.getElementById('slider-rot').value = 0;
            document.getElementById('slider-scale').value = 100;
            document.getElementById('slider-tx').value = 0;
            document.getElementById('slider-ty').value = 0;
            document.getElementById('check-helpers').checked = true;
            document.getElementById('check-hl-lock').checked = false;
            document.getElementById('check-start').checked = true;
            update();
        }

        function update() {
            document.getElementById('label-rot').innerText = transform.rotation + "°";
            document.getElementById('label-scale').innerText = transform.scale.toFixed(1) + "x";
            document.getElementById('label-tx').innerText = transform.tx.toFixed(1);
            document.getElementById('label-ty').innerText = transform.ty.toFixed(1);
            draw();
        }

        function draw() {
            cc.drawGrid({ vignette: true, glow: true });
            const ctx = cc.ctx;
            const angleRad = (transform.rotation * Math.PI) / 180;

            const G = {
                x: points.reduce((s, p) => s + p.x, 0) / points.length,
                y: points.reduce((s, p) => s + p.y, 0) / points.length
            };
            
            const getTransformed = (p) => {
                // Local Scale around G
                let lx = (p.x - G.x) * transform.scale;
                let ly = (p.y - G.y) * transform.scale;
                let ps = { x: lx + G.x, y: ly + G.y };

                // Rotation around RP
                let nx = ps.x - rp.x;
                let ny = ps.y - rp.y;
                const rx = nx * Math.cos(angleRad) - ny * Math.sin(angleRad);
                const ry = nx * Math.sin(angleRad) + ny * Math.cos(angleRad);
                
                return { x: rx + rp.x + transform.tx, y: ry + rp.y + transform.ty };
            };

            const transformedPoints = points.map(getTransformed);

            // URBILD
            if (document.getElementById('check-start').checked) {
                ctx.setLineDash([5, 8]);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(cc.mapX(points[0].x), cc.mapY(points[0].y));
                ctx.lineTo(cc.mapX(points[1].x), cc.mapY(points[1].y));
                ctx.lineTo(cc.mapX(points[2].x), cc.mapY(points[2].y));
                ctx.closePath();
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // HILFSLINIEN
            if (document.getElementById('check-helpers').checked) {
                ctx.setLineDash([5, 8]);
                ctx.lineWidth = 2;
                points.forEach((p, i) => {
                    const tp = transformedPoints[i];
                    if (Math.abs(transform.rotation) <= 0.1) {
                        ctx.strokeStyle = "rgba(0, 210, 255, 0.5)";
                        ctx.beginPath(); 
                        ctx.moveTo(cc.mapX(p.x), cc.mapY(p.y)); 
                        ctx.lineTo(cc.mapX(tp.x), cc.mapY(tp.y)); 
                        ctx.stroke();
                    } else {
                        const dxPix = cc.mapX(tp.x) - cc.mapX(rp.x);
                        const dyPix = cc.mapY(tp.y) - cc.mapY(rp.y);
                        const pxRadius = Math.hypot(dxPix, dyPix);
                        const dx0 = tp.x - rp.x;
                        const dy0 = tp.y - rp.y;
                        const endAng = Math.atan2(dy0, dx0);
                        const startAng = endAng - angleRad;
                        ctx.strokeStyle = "rgba(255, 0, 85, 0.6)";
                        ctx.beginPath();
                        ctx.arc(cc.mapX(rp.x), cc.mapY(rp.y), pxRadius, -startAng, -endAng, transform.rotation > 0);
                        ctx.stroke();
                    }
                });
                ctx.setLineDash([]);
            }

            // MESSWERTE
            if (document.getElementById('check-measurements').checked) {
                transformedPoints.forEach((tp) => {
                    ctx.setLineDash([2, 5]);
                    ctx.strokeStyle = "rgba(173, 255, 47, 0.5)";
                    ctx.beginPath(); 
                    ctx.moveTo(cc.mapX(rp.x), cc.mapY(rp.y)); 
                    ctx.lineTo(cc.mapX(tp.x), cc.mapY(tp.y)); 
                    ctx.stroke();
                    const distVal = Math.hypot(tp.x - rp.x, tp.y - rp.y);
                    ctx.fillStyle = "#adff2f";
                    ctx.font = '10px Orbitron';
                    ctx.fillText(distVal.toFixed(2), cc.mapX((rp.x + tp.x) / 2), cc.mapY((rp.y + tp.y) / 2));
                });
                ctx.setLineDash([]);
            }

            // BILD-DREIECK
            ctx.beginPath();
            ctx.moveTo(cc.mapX(transformedPoints[0].x), cc.mapY(transformedPoints[0].y));
            ctx.lineTo(cc.mapX(transformedPoints[1].x), cc.mapY(transformedPoints[1].y));
            ctx.lineTo(cc.mapX(transformedPoints[2].x), cc.mapY(transformedPoints[2].y));
            ctx.closePath();
            ctx.fillStyle = "rgba(0, 210, 255, 0.2)";
            ctx.fill();
            ctx.strokeStyle = "#00d2ff";
            ctx.lineWidth = 3;
            ctx.stroke();

            // RP
            ctx.fillStyle = "#ff0055";
            ctx.beginPath(); 
            ctx.arc(cc.mapX(rp.x), cc.mapY(rp.y), 6, 0, Math.PI * 2); 
            ctx.fill();
        }

        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || "#ffffff";
        }
    </script>
</body>

</html>
