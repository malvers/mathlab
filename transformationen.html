<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>docalvers | Transformationen</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="js/cyber-layout.css">
    <link rel="stylesheet" href="js/buttons-ultra.css">
    <link rel="stylesheet" href="js/cyber-lab-overrides.css">
    <link rel="stylesheet" href="js/branding.styles.extracted.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        /* Modernized Styles (ULTRA v5.3.8) */
        .math-glow {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            font-size: 1.1em;
        }

        .val-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <!-- Mini Rail -->
    <nav id="mini-rail">
        <div class="nav-btn" onclick="toggleSidebar()" title="Menü umschalten">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>
    </nav>

    <aside id="side-panel">
        <header id="sidebar-header" style="min-height: 80px;"></header>
        <div id="parameters-container"></div>
    </aside>

    <main id="main-content">
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </main>

    <script src="js/branding/briefings.js"></script>
    <script src="js/branding/overlays.js"></script>
    <script src="js/branding.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/cyber-canvas.js"></script>
    <script>
        function toggleSidebar() {
            const panel = document.getElementById('side-panel');
            panel.classList.toggle('collapsed');
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
                if (typeof update === 'function') update();
            }, 400);
        }
        let cc = null;
        let points = [
            { x: -2, y: -2, id: 'A' },
            { x: 2, y: -2, id: 'B' },
            { x: 0, y: 2, id: 'C' }
        ];
        let rp = { x: 0, y: 0 };
        let m1 = { x: 4, y: -4 }, m2 = { x: 4, y: 4 }; // Mirror axis points
        let transform = { rotation: 0, scale: 1, tx: 0, ty: 0, isMirrored: false, isPointReflected: false };
        let dragID = null; // null, -1 (RP), 0-2 (points), 100 (Body), 200 (m1), 201 (m2)
        let dragStartPos = { x: 0, y: 0 };
        let dragBaseline = null; // Snapshot for HL during drag
        const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
        const pointInTriangle = (p, a, b, c) => {
            const area = (p1, p2, p3) => Math.abs((p1.x * (p2.y - p3.y) + p2.x * (p3.y - p1.y) + p3.x * (p1.y - p2.y)) / 2);
            const A = area(a, b, c);
            const A1 = area(p, b, c);
            const A2 = area(a, p, c);
            const A3 = area(a, b, p);
            return Math.abs(A - (A1 + A2 + A3)) < 0.01;
        };

        window.addEventListener('load', () => {
            // 1. Branding
            CyberBranding.init({
                useExternalStyles: true,
                title: "Doc Alvers Mathe-Labor",
                subtitle: "KONGRUENZ"
            });

            CyberBranding.setBriefing(`
                <b style="color:var(--neon-blue); letter-spacing:1px;">MISSION: ÄQUIVALENZ-BILDUNG</b><br><br>
                Analysiere die Veränderung von Dreiecksformen durch Translation, Rotation und Skalierung.<br><br>
                Verifiziere den Erhalt des Flächeninhalts (Äquivalenz) durch das iterative Festschreiben neuer Zustände (Chaining).<br><br>
                Das gestrichelte Dreieck dient dir dabei stets als statische Referenz (Urbild) deiner aktuellen Aktion.
            `);

            // 2. UI Engine & Cards
            CyberUI.init();

            CyberUI.createCard('parameters-container', 'TRANSFORMATION', `
                <div style="display:flex; flex-direction:column; gap:15px;">
                    <div>
                        <div style="display:flex; justify-content:space-between; font-family:Orbitron; font-size:0.6rem; color:var(--neon-blue); margin-bottom:5px;">
                            <span>ROTATION</span>
                            <span id="label-rot" style="color:white;">0°</span>
                        </div>
                        <input type="range" id="slider-rot" min="-360" max="360" value="0" style="width:100%; accent-color:var(--neon-blue);">
                    </div>
                    <div>
                        <div style="display:flex; justify-content:space-between; font-family:Orbitron; font-size:0.6rem; color:var(--neon-blue); margin-bottom:5px;">
                            <span>SKALIERUNG</span>
                            <span id="label-scale" style="color:white;">1.0x</span>
                        </div>
                        <input type="range" id="slider-scale" min="10" max="300" value="100" style="width:100%; accent-color:var(--neon-blue);">
                    </div>
                    <div style="display:flex; gap:10px; margin-top:5px;">
                        <button id="btn-mirror-v" onclick="toggleMirror()" class="cyber-btn" style="flex:1; border-color:#ff4d4d; color:#ff4d4d; font-size:0.55rem; padding:8px;">ACHSE SPIEGELN</button>
                        <button id="btn-mirror-p" onclick="togglePointMirror()" class="cyber-btn" style="flex:1; border-color:#ff0055; color:#ff0055; font-size:0.55rem; padding:8px;">PUNKT SPIEGELN</button>
                    </div>
                </div>
            `);

            CyberUI.createCard('parameters-container', 'DARSTELLUNG', `
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <input type="checkbox" id="check-helpers" checked style="display:none;">
                    <label style="display:flex; align-items:center; gap:12px; cursor:pointer; font-size:0.75rem; font-family:Orbitron;">
                        <input type="checkbox" id="check-start" checked> URBILD (START)
                    </label>
                    <label style="display:flex; align-items:center; gap:12px; cursor:pointer; font-size:0.75rem; font-family:Orbitron; color:var(--neon-pink);">
                        <input type="checkbox" id="check-hl-lock"> HL FIXIEREN
                    </label>
                    <label style="display:flex; align-items:center; gap:12px; cursor:pointer; font-size:0.75rem; font-family:Orbitron; color:#adff2f;">
                        <input type="checkbox" id="check-measurements" style="accent-color:#adff2f;"> MESSWERTE
                    </label>
                </div>
                <button onclick="resetLab()" class="cyber-btn" style="width:100%; margin-top:15px; font-size:0.7rem;">Labor Reset</button>
            `);

            // 3. Canvas & Input
            cc = new CyberCanvas();
            cc.init('canvas', { minX: -10, maxX: 10, minY: -7, maxY: 7 }, {
                showGrid: true,
                showAxes: true,
                showLabels: false,
                showTelemetry: false,
                vignette: true,
                glow: true,
                allowPan: false
            });
            cc.onResize = () => update();

            // Helper to hide/show Hilfslinien dynamically
            const autoShowHL = () => {
                const cb = document.getElementById('check-helpers');
                if (cb && !cb.checked) cb.checked = true;
            };
            const autoHideHL = () => {
                const cb = document.getElementById('check-helpers');
                const isLocked = document.getElementById('check-hl-lock').checked;

                // 1. Calculate the current state as the new baseline
                // We must use the current rotation/scale/tx/ty to lock the points
                const G = {
                    x: points.reduce((s, p) => s + p.x, 0) / points.length,
                    y: points.reduce((s, p) => s + p.y, 0) / points.length
                };

                points = points.map(p => {
                    let lx = (p.x - G.x) * transform.scale;
                    let ly = (p.y - G.y) * transform.scale;
                    let ps = { x: lx + G.x, y: ly + G.y };
                    let nx = ps.x - rp.x;
                    let ny = ps.y - rp.y;
                    const angleRad = (transform.rotation * Math.PI) / 180;
                    let rx = nx * Math.cos(angleRad) - ny * Math.sin(angleRad);
                    let ry = nx * Math.sin(angleRad) + ny * Math.cos(angleRad);

                    let fx = rx + rp.x + transform.tx;
                    let fy = ry + rp.y + transform.ty;

                    // Bake Point Reflection
                    if (transform.isPointReflected) {
                        fx = 2 * rp.x - fx;
                        fy = 2 * rp.y - fy;
                    }

                    // Bake Mirror State (Arbitrary Axis)
                    if (transform.isMirrored) {
                        const nx = m2.x - m1.x, ny = m2.y - m1.y;
                        const len = Math.hypot(nx, ny);
                        if (len > 0) {
                            const ux = nx / len, uy = ny / len;
                            const dx = fx - m1.x, dy = fy - m1.y;
                            const proj = dx * ux + dy * uy;
                            const px = m1.x + proj * ux;
                            const py = m1.y + proj * uy;
                            fx = 2 * px - fx;
                            fy = 2 * py - fy;
                        }
                    }

                    return { x: fx, y: fy, id: p.id };
                });

                // 2. Reset transform state to neutral
                transform = { rotation: 0, scale: 1, tx: 0, ty: 0, isMirrored: false, isPointReflected: false };
                updateMirrorButtons();

                // 3. Sync UI Sliders
                sliderRot.value = 0;
                sliderScale.value = 100;

                // 4. Handle Visibility Lock
                if (cb && !isLocked) {
                    cb.checked = false;
                }

                update();
            };

            // Canvas Interaction Engine
            cc.onMouseDown = (pos, e) => {
                if (e && e.button !== 0) return;
                dragStartPos = { ...pos };
                dragBaseline = points.map(p => ({ ...p }));
                // Priority 1: Vertices
                let idx = points.findIndex(p => dist(pos, p) < 0.6);
                if (idx !== -1) {
                    dragID = idx;
                } else if (dist(pos, rp) < 0.6) {
                    // Priority 2: RP
                    dragID = -1;
                } else if (dist(pos, m1) < 0.6) {
                    // Priority 2.1: Mirror 1
                    dragID = 200;
                } else if (dist(pos, m2) < 0.6) {
                    // Priority 2.2: Mirror 2
                    dragID = 201;
                } else if (pointInTriangle(pos, points[0], points[1], points[2])) {
                    // Priority 3: Triangle Body
                    dragID = 100;
                } else {
                    // Priority 4: Jump RP
                    rp.x = pos.x;
                    rp.y = pos.y;
                    dragID = -1;
                }

                if (dragID !== null) autoShowHL();
            };

            cc.onMouseMove = (pos) => {
                if (dragID === null) return;

                if (dragID === 100) {
                    const dx = pos.x - dragStartPos.x;
                    const dy = pos.y - dragStartPos.y;
                    points.forEach(p => { p.x += dx; p.y += dy; });
                    dragStartPos = { ...pos };
                } else if (dragID === -1) {
                    rp.x = pos.x;
                    rp.y = pos.y;
                } else if (dragID === 200) {
                    m1.x = pos.x; m1.y = pos.y;
                } else if (dragID === 201) {
                    m2.x = pos.x; m2.y = pos.y;
                } else {
                    points[dragID].x = pos.x;
                    points[dragID].y = pos.y;
                }
                update();
            };

            cc.onMouseUp = () => {
                if (dragID !== null) {
                    dragID = null;
                    autoHideHL();
                }
            };

            cc.onContextMenu = (e) => {
                CyberUI.showContextMenu(e.clientX, e.clientY, [
                    { label: 'Labor Reset', onclick: () => resetLab() },
                    { label: 'Ansicht Reset', onclick: () => cc.resetView(-7, 7) },
                    { divider: true },
                    {
                        label: 'Gitter anzeigen',
                        checked: cc.showGrid,
                        onchange: (val) => { cc.showGrid = val; update(); }
                    },
                    {
                        label: 'Achsen anzeigen',
                        checked: cc.showAxes,
                        onchange: (val) => { cc.showAxes = val; update(); }
                    },
                    {
                        label: 'Achsenbeschriftung',
                        checked: cc.showLabels,
                        onchange: (val) => { cc.showLabels = val; update(); }
                    },
                    {
                        label: 'Koordinaten',
                        checked: cc.showTelemetry,
                        onchange: (val) => { cc.showTelemetry = val; cc.updateTelemetryDOM(); }
                    }
                ]);
            };

            // Catch accidental releases outside canvas
            window.addEventListener('mouseup', () => {
                if (dragID !== null) {
                    dragID = null;
                    autoHideHL();
                }
            });

            // Bind Events
            const sliderRot = document.getElementById('slider-rot');
            const sliderScale = document.getElementById('slider-scale');

            sliderRot.oninput = (e) => {
                autoShowHL();
                transform.rotation = parseFloat(e.target.value);
                update();
            };
            sliderRot.onchange = autoHideHL;

            sliderScale.oninput = (e) => {
                autoShowHL();
                transform.scale = parseFloat(e.target.value) / 100;
                update();
            };
            sliderScale.onchange = autoHideHL;

            document.getElementById('check-helpers').onchange = () => update();
            document.getElementById('check-start').onchange = () => update();
            document.getElementById('check-measurements').onchange = () => update();

            // Mirror Toggle Logic
            window.toggleMirror = () => {
                autoShowHL();
                transform.isMirrored = !transform.isMirrored;
                updateMirrorButtons();
                update();
            };

            function updateMirrorButtons() {
                const btnV = document.getElementById('btn-mirror-v');
                const btnP = document.getElementById('btn-mirror-p');
                if (btnV) btnV.style.background = transform.isMirrored ? "rgba(255, 77, 77, 0.2)" : "transparent";
                if (btnP) btnP.style.background = transform.isPointReflected ? "rgba(255, 0, 85, 0.2)" : "transparent";
            }

            // Point Mirror Toggle
            window.togglePointMirror = () => {
                autoShowHL();
                transform.isPointReflected = !transform.isPointReflected;
                updateMirrorButtons();
                update();
            };

            update();
        });

        window.resetLab = () => {
            points = [
                { x: -2, y: -2, id: 'A' },
                { x: 2, y: -2, id: 'B' },
                { x: 0, y: 2, id: 'C' }
            ];
            transform = { rotation: 0, scale: 1, tx: 0, ty: 0, isMirrored: false, isPointReflected: false };
            rp = { x: 0, y: 0 };
            document.getElementById('slider-rot').value = 0;
            document.getElementById('slider-scale').value = 100;
            document.getElementById('check-helpers').checked = true;
            document.getElementById('check-hl-lock').checked = false;
            document.getElementById('check-start').checked = true;
            cc.resetView(-7, 7);
            update();
        }

        function update() {
            document.getElementById('label-rot').innerText = transform.rotation + "°";
            document.getElementById('label-scale').innerText = transform.scale.toFixed(1) + "x";
            draw();
        }


        function draw() {
            cc.drawGrid({ vignette: true, glow: true });
            const ctx = cc.ctx;
            const angleRad = (transform.rotation * Math.PI) / 180;

            const G = {
                x: points.reduce((s, p) => s + p.x, 0) / points.length,
                y: points.reduce((s, p) => s + p.y, 0) / points.length
            };

            const getTransformed = (p) => {
                // Local Scale around G
                let lx = (p.x - G.x) * transform.scale;
                let ly = (p.y - G.y) * transform.scale;
                let ps = { x: lx + G.x, y: ly + G.y };

                // Rotation around RP
                let nx = ps.x - rp.x;
                let ny = ps.y - rp.y;
                let rx = nx * Math.cos(angleRad) - ny * Math.sin(angleRad);
                let ry = nx * Math.sin(angleRad) + ny * Math.cos(angleRad);

                let fx = rx + rp.x + transform.tx;
                let fy = ry + rp.y + transform.ty;

                // Preview Point Reflection
                if (transform.isPointReflected) {
                    fx = 2 * rp.x - fx;
                    fy = 2 * rp.y - fy;
                }

                // Preview Reflection (Arbitrary Axis)
                if (transform.isMirrored) {
                    const nx = m2.x - m1.x, ny = m2.y - m1.y;
                    const len = Math.hypot(nx, ny);
                    if (len > 0) {
                        const ux = nx / len, uy = ny / len;
                        const dx = fx - m1.x, dy = fy - m1.y;
                        const proj = dx * ux + dy * uy;
                        const px = m1.x + proj * ux;
                        const py = m1.y + proj * uy;
                        fx = 2 * px - fx;
                        fy = 2 * py - fy;
                    }
                }

                return { x: fx, y: fy };
            };

            const transformedPoints = points.map(getTransformed);

            // URBILD
            if (document.getElementById('check-start').checked) {
                const drawPoints = (dragID !== null && dragBaseline) ? dragBaseline : points;
                ctx.setLineDash([5, 8]);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(cc.mapX(drawPoints[0].x), cc.mapY(drawPoints[0].y));
                ctx.lineTo(cc.mapX(drawPoints[1].x), cc.mapY(drawPoints[1].y));
                ctx.lineTo(cc.mapX(drawPoints[2].x), cc.mapY(drawPoints[2].y));
                ctx.closePath();
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // HILFSLINIEN
            if (document.getElementById('check-helpers').checked) {
                ctx.setLineDash([5, 8]);
                ctx.lineWidth = 2;

                const sourcePoints = (dragID !== null && dragBaseline) ? dragBaseline : points;
                const targetPoints = (dragID !== null && dragBaseline) ? points : transformedPoints;

                sourcePoints.forEach((p, i) => {
                    const tp = targetPoints[i];
                    if (transform.isPointReflected) {
                        ctx.strokeStyle = "rgba(255, 0, 85, 0.8)";
                        ctx.beginPath();
                        ctx.moveTo(cc.mapX(p.x), cc.mapY(p.y));
                        ctx.lineTo(cc.mapX(rp.x), cc.mapY(rp.y));
                        ctx.lineTo(cc.mapX(tp.x), cc.mapY(tp.y));
                        ctx.stroke();
                        // Center Dot
                        ctx.fillStyle = "#ff0055";
                        ctx.beginPath();
                        ctx.arc(cc.mapX(rp.x), cc.mapY(rp.y), 3, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (Math.abs(transform.rotation) <= 0.1) {
                        ctx.strokeStyle = "rgba(0, 210, 255, 0.5)";
                        ctx.beginPath();
                        ctx.moveTo(cc.mapX(p.x), cc.mapY(p.y));
                        ctx.lineTo(cc.mapX(tp.x), cc.mapY(tp.y));
                        ctx.stroke();
                    } else {
                        const dxPix = cc.mapX(tp.x) - cc.mapX(rp.x);
                        const dyPix = cc.mapY(tp.y) - cc.mapY(rp.y);
                        const pxRadius = Math.hypot(dxPix, dyPix);
                        const dx0 = tp.x - rp.x;
                        const dy0 = tp.y - rp.y;
                        const endAng = Math.atan2(dy0, dx0);
                        const startAng = endAng - (transform.rotation * Math.PI / 180);
                        ctx.strokeStyle = "rgba(255, 0, 85, 0.6)";
                        ctx.beginPath();
                        ctx.arc(cc.mapX(rp.x), cc.mapY(rp.y), pxRadius, -startAng, -endAng, transform.rotation > 0);
                        ctx.stroke();
                    }
                });
                ctx.setLineDash([]);
            }

            // MESSWERTE
            if (document.getElementById('check-measurements').checked) {
                transformedPoints.forEach((tp) => {
                    ctx.setLineDash([2, 5]);
                    ctx.strokeStyle = "rgba(173, 255, 47, 0.5)";
                    ctx.beginPath();
                    ctx.moveTo(cc.mapX(rp.x), cc.mapY(rp.y));
                    ctx.lineTo(cc.mapX(tp.x), cc.mapY(tp.y));
                    ctx.stroke();
                    const distVal = Math.hypot(tp.x - rp.x, tp.y - rp.y);
                    ctx.fillStyle = "#adff2f";
                    ctx.font = '10px Orbitron';
                    ctx.fillText(distVal.toFixed(2), cc.mapX((rp.x + tp.x) / 2), cc.mapY((rp.y + tp.y) / 2));
                });
                ctx.setLineDash([]);
            }

            // BILD-DREIECK
            ctx.beginPath();
            ctx.moveTo(cc.mapX(transformedPoints[0].x), cc.mapY(transformedPoints[0].y));
            ctx.lineTo(cc.mapX(transformedPoints[1].x), cc.mapY(transformedPoints[1].y));
            ctx.lineTo(cc.mapX(transformedPoints[2].x), cc.mapY(transformedPoints[2].y));
            ctx.closePath();
            ctx.fillStyle = "rgba(0, 210, 255, 0.2)";
            ctx.fill();
            ctx.strokeStyle = "#00d2ff";
            ctx.lineWidth = 3;
            ctx.stroke();

            // RP
            ctx.fillStyle = "#ff0055";
            ctx.beginPath();
            ctx.arc(cc.mapX(rp.x), cc.mapY(rp.y), 6, 0, Math.PI * 2);
            ctx.fill();

            // Mirror Axis Indicator (Red Line + Draggable Ends)
            ctx.save();
            ctx.strokeStyle = "#ff4d4d";
            ctx.lineWidth = transform.isMirrored ? 3 : 1.5;
            if (transform.isMirrored) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ff4d4d";
            } else {
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = "rgba(255, 77, 77, 0.5)";
            }

            ctx.beginPath();
            ctx.moveTo(cc.mapX(m1.x), cc.mapY(m1.y));
            ctx.lineTo(cc.mapX(m2.x), cc.mapY(m2.y));
            ctx.stroke();

            // Draw Endpoints
            ctx.fillStyle = "#ff4d4d";
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(cc.mapX(m1.x), cc.mapY(m1.y), 5, 0, Math.PI * 2);
            ctx.arc(cc.mapX(m2.x), cc.mapY(m2.y), 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // --- ON-CANVAS CONGRUENCE INDICATOR (DEUTLICH GRÖSSER & DYNAMISCH) ---
            const isInteracting = (dragID !== null) ||
                (Math.abs(transform.rotation) > 0.01) ||
                (Math.abs(transform.scale - 1.0) > 0.001) ||
                (transform.isMirrored) ||
                (transform.isPointReflected);

            if (isInteracting) {
                const getDist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
                const urbild = (dragID !== null && dragBaseline) ? dragBaseline : points;
                const bild = transformedPoints;

                const uSides = [getDist(urbild[0], urbild[1]), getDist(urbild[1], urbild[2]), getDist(urbild[2], urbild[0])];
                const bSides = [getDist(bild[0], bild[1]), getDist(bild[1], bild[2]), getDist(bild[2], bild[0])];
                const isCongruent = uSides.every((s, i) => Math.abs(s - bSides[i]) < 0.005);

                const statusColor = isCongruent ? "#4ade80" : "#ff4d4d";
                const statusGlow = isCongruent ? "rgba(74, 222, 128, 0.7)" : "rgba(255, 77, 77, 0.7)";

                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                const padding = 30;
                const boxW = 400, boxH = 100;
                const bx = padding;
                const by = padding;

                // Box with glass effect
                ctx.fillStyle = "rgba(10, 15, 26, 0.92)";
                ctx.strokeStyle = statusColor;
                ctx.lineWidth = 4;
                ctx.shadowBlur = 30;
                ctx.shadowColor = statusGlow;

                const r = 20;
                ctx.beginPath();
                ctx.moveTo(bx + r, by); ctx.lineTo(bx + boxW - r, by);
                ctx.quadraticCurveTo(bx + boxW, by, bx + boxW, by + r);
                ctx.lineTo(bx + boxW, by + boxH - r);
                ctx.quadraticCurveTo(bx + boxW, by + boxH, bx + boxW - r, by + boxH);
                ctx.lineTo(bx + r, by + boxH);
                ctx.quadraticCurveTo(bx, by + boxH, bx, by + boxH - r);
                ctx.lineTo(bx, by + r);
                ctx.quadraticCurveTo(bx, by, bx + r, by);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Icon
                ctx.shadowBlur = 15;
                ctx.fillStyle = statusColor;
                ctx.font = "bold 46px Orbitron";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(isCongruent ? "✓" : "✗", bx + 55, by + boxH / 2 + 4);

                // Text
                ctx.font = "bold 24px Orbitron";
                ctx.textAlign = "left";
                ctx.fillText(isCongruent ? "KONGRUENT" : "NICHT KONGRUENT", bx + 105, by + boxH / 2);

                ctx.restore();
            }

        }

        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || "#ffffff";
        }
    </script>
</body>
