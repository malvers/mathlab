<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Delaunay Labor | UX Final Stable</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
        --neon-blue: #00d2ff;
        --neon-purple: #9d50bb;
        --neon-pink: #ff0055;
        --neon-green: #39FF14;
        --neon-orange: #ff8800;
        --bg-dark: #050b18;
        --glass: rgba(15, 23, 42, 0.7);
        --glass-bright: rgba(255, 255, 255, 0.05);
    }

    body {
        margin: 0;
        font-family: 'Outfit', sans-serif;
        background: radial-gradient(circle at center, #0a1329 0%, #050b18 100%);
        color: white;
        display: flex;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        touch-action: none;
    }

    #side-panel {
        width: 380px;
        min-width: 380px;
        background: var(--glass);
        backdrop-filter: blur(25px);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 10;
        box-sizing: border-box;
        box-shadow: 15px 0 45px rgba(0, 0, 0, 0.6);
        overflow-y: auto;
    }

    #canvas-container {
        flex-grow: 1;
        position: relative;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        overflow: hidden;
    }

    /* --- DASHBOARD BUTTON --- */
    .dashboard-btn {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        padding: 12px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        transition: all 0.3s ease;
        letter-spacing: 1.5px;
        backdrop-filter: blur(5px);
        width: 100%;
        box-sizing: border-box;
    }
    .dashboard-btn:hover {
        color: white;
        background: rgba(0, 210, 255, 0.1);
        border-color: var(--neon-blue);
        box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        transform: translateX(5px);
    }
    .dashboard-btn svg { width: 16px; height: 16px; stroke-width: 2.5; }

    canvas { display: block; cursor: crosshair; touch-action: none; }
    .stats-card {
        background: var(--glass-bright);
        padding: 12px 20px;
        border-radius: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .stats-title {
        font-family: 'Orbitron';
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 1.5px;
        margin-bottom: 5px;
        display: block;
        text-transform: uppercase;
    }

    .val {
        font-family: 'Orbitron', sans-serif;
        font-size: 1.6rem;
        font-weight: bold;
    }

    .target-val { color: var(--neon-orange); text-shadow: 0 0 10px var(--neon-orange); }
    .current-val { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

    .controls { display: flex; flex-direction: column; gap: 12px; }

    button {
        padding: 15px 20px;
        font-size: 0.85rem;
        font-family: 'Orbitron', sans-serif;
        background: var(--glass-bright);
        color: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        width: 100%;
    }
    button:hover { background: rgba(0, 210, 255, 0.1); border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }

    #btn-multi.active {
        background: rgba(0, 210, 255, 0.15);
        color: var(--neon-blue);
        border-color: var(--neon-blue);
        box-shadow: 0 0 25px rgba(0, 210, 255, 0.3);
    }

    #btn-delete {
        background: rgba(255, 0, 85, 0.1);
        color: var(--neon-pink);
        border: 1px solid var(--neon-pink);
    }
    #btn-delete:hover { background: var(--neon-pink); color: white; }

    .footer-credit {
        margin-top: auto;
        padding-top: 15px;
        text-align: center;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.55rem;
        color: rgba(255,255,255,0.3);
        letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div id="side-panel">
  <header style="border: none; padding-bottom: 5px;">
    <a href="index.html" class="dashboard-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      <span>DASHBOARD</span>
    </a>
  </header>

  <div class="stats-card">
    <span class="stats-title">Zielbereich</span>
    <span class="val target-val">100,00 cm²</span>
  </div>
  <div class="stats-card">
    <span class="stats-title">Summe Dreiecke</span>
    <span id="val-area" class="val current-val">0,00 cm²</span>
  </div>

  <div class="controls">
    <button id="btn-multi" onclick="toggleMultiMode()">Mehrfach-Modus: AUS</button>
    <button id="btn-delete" style="display: none;" onclick="deleteSelected()">Auswahl löschen</button>
    <button onclick="resetPoints()">Labor Reset</button>
  </div>

  <div class="footer-credit">
    &bull; &copy; 2026 DR. MICHAEL R. ALVERS &bull;
    <br><br>
    <a href="impressum.html" style="color:rgba(255,255,255,0.2); font-size: 0.5rem; text-decoration: none;">IMPRESSUM</a>
  </div>
</div>

<div id="canvas-container">
  <canvas id="canvas"></canvas>
</div>

<script src="branding.js"></script>
<script>
  // Initialize Branding
  CyberBranding.init({
      title: "Doc Alvers Mathe-Labor",
      subtitle: "Triangulierer"
  });

  class Delaunay {
      static from(points) {
          if (points.length < 3) return [];
          const minX = Math.min(...points.map(p => p[0])), minY = Math.min(...points.map(p => p[1]));
          const maxX = Math.max(...points.map(p => p[0])), maxY = Math.max(...points.map(p => p[1]));
          const dx = maxX - minX, dy = maxY - minY, dmax = Math.max(dx, dy);
          const midX = (minX + maxX) / 2, midY = (minY + maxY) / 2;
          const st = [[midX - 20 * dmax, midY - dmax], [midX + 20 * dmax, midY - dmax], [midX, midY + 20 * dmax]];
          let triangles = [{p: [st[0], st[1], st[2]], circum: this.getCircum(st[0], st[1], st[2])}];
          for (let p of points) {
              let badTris = [], polygon = [];
              for (let j = 0; j < triangles.length; j++) {
                  if (Math.hypot(triangles[j].circum.x - p[0], triangles[j].circum.y - p[1]) < triangles[j].circum.r - 0.0001) badTris.push(j);
              }
              for (let j of badTris) {
                  const edges = [[triangles[j].p[0], triangles[j].p[1]], [triangles[j].p[1], triangles[j].p[2]], [triangles[j].p[2], triangles[j].p[0]]];
                  for (let e of edges) {
                      if (!badTris.some(o => o !== j && triangles[o].p.some(p1 => p1[0]===e[0][0] && p1[1]===e[0][1]) && triangles[o].p.some(p2 => p2[0]===e[1][0] && p2[1]===e[1][1]))) polygon.push(e);
                  }
              }
              badTris.sort((a, b) => b - a).forEach(idx => triangles.splice(idx, 1));
              polygon.forEach(e => { const c = this.getCircum(e[0], e[1], p); if (c) triangles.push({p: [e[0], e[1], p], circum: c}); });
          }
          return triangles.filter(t => !t.p.some(tp => st.some(sp => tp[0]===sp[0] && tp[1]===sp[1])));
      }
      static getCircum(p1, p2, p3) {
          const x1 = p1[0], y1 = p1[1], x2 = p2[0], y2 = p2[1], x3 = p3[0], y3 = p3[1];
          const D = 2 * (x1 * (y2 - y3) + x2 * (y3 - y1) + x3 * (y1 - y2));
          if (Math.abs(D) < 0.1) return null;
          const cx = ((x1*x1+y1*y1)*(y2-y3) + (x2*x2+y2*y2)*(y3-y1) + (x3*x3+y3*y3)*(y1-y2)) / D;
          const cy = ((x1*x1+y1*y1)*(x3-x2) + (x2*x2+y2*y2)*(x1-x3) + (x3*x3+y3*y3)*(x2-x1)) / D;
          return {x: cx, y: cy, r: Math.hypot(x1 - cx, y1 - cy)};
      }
  }

  const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
  let points = [], selectedIndices = new Set(), draggedIdx = -1, ox, oy, sWidth;
  let startPos = {x:0, y:0}, hasMoved = false, multiMode = false;
  let longPressTimer = null, wasSelectedOnDown = false;
  const units = 10;

  function toggleMultiMode(state) {
      multiMode = (state !== undefined) ? state : !multiMode;
      const btn = document.getElementById('btn-multi');
      btn.innerText = multiMode ? "MEHRFACH-MODUS: AN" : "MEHRFACH-MODUS: AUS";
      btn.classList.toggle('active', multiMode);
      if (!multiMode) selectedIndices.clear();
      update();
  }

  function resetPoints() {
      const dpr = window.devicePixelRatio || 1;
      const rect = document.getElementById('canvas-container').getBoundingClientRect();
      canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
      canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      sWidth = Math.min(rect.height * 0.8, rect.width * 0.6, 600);
      ox = 40; oy = (rect.height - sWidth) / 2;
      points = [[ox, oy], [ox+sWidth, oy], [ox+sWidth, oy+sWidth], [ox, oy+sWidth]];
      selectedIndices.clear();
      for (let i = 0; i < 8; i++) points.push([ox + 50 + Math.random()*(sWidth-100), oy + 50 + Math.random()*(sWidth-100)]);
      update();
  }

  function deleteSelected() {
      points = points.filter((_, i) => i < 4 || !selectedIndices.has(i));
      selectedIndices.clear();
      update();
  }

  function update() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const pxToCm = units / sWidth;
      document.getElementById('btn-delete').style.display = (selectedIndices.size > 0) ? 'block' : 'none';

      const triangles = Delaunay.from(points);
      ctx.strokeStyle = "#334155"; ctx.lineWidth = 2; ctx.strokeRect(ox, oy, sWidth, sWidth);

      let totalArea = 0, triangleData = [];
      triangles.forEach((tri, idx) => {
          const p = tri.p;
          const area = Math.abs((p[0][0]*(p[1][1]-p[2][1]) + p[1][0]*(p[2][1]-p[0][1]) + p[2][0]*(p[0][1]-p[1][1])) / 2) * (pxToCm**2);
          totalArea += area; triangleData.push(area);
          ctx.beginPath(); ctx.moveTo(p[0][0], p[0][1]); ctx.lineTo(p[1][0], p[1][1]); ctx.lineTo(p[2][0], p[2][1]); ctx.closePath();
          ctx.fillStyle = "rgba(33, 150, 243, 0.2)"; ctx.fill();
          ctx.strokeStyle = "rgba(255, 255, 255, 0.1)"; ctx.stroke();
          ctx.fillStyle = "rgba(255, 255, 255, 0.4)"; ctx.font = "bold 10px Orbitron"; ctx.textAlign = "center";
          ctx.fillText((idx+1).toString().padStart(2,'0'), (p[0][0]+p[1][0]+p[2][0])/3, (p[0][1]+p[1][1]+p[2][1])/3 + 4);
      });

      points.forEach((p, i) => {
          const isSel = selectedIndices.has(i), isEdge = i < 4;
          ctx.shadowBlur = isSel ? 15 : 0; ctx.shadowColor = "var(--neon-blue)";
          ctx.beginPath(); ctx.arc(p[0], p[1], isEdge ? 4 : (isSel ? 7 : 5), 0, Math.PI*2);
          if (isSel) { ctx.fillStyle = "#ffffff"; }
          else { ctx.fillStyle = isEdge ? "rgba(255,255,255,0.2)" : (i === draggedIdx ? "#ffffff" : "var(--neon-blue)"); }
          ctx.fill(); ctx.shadowBlur = 0;
      });

      document.getElementById('val-area').innerText = totalArea.toFixed(2).replace('.',',') + ' cm²';

      const listX = ox + sWidth + 60; let currentY = oy + 20;
      ctx.textAlign = "left"; ctx.font = "bold 13px Orbitron"; ctx.fillStyle = "rgba(255,255,255,0.3)";
      ctx.fillText("ADDITION (cm²) [Δ]", listX, currentY); currentY += 40;
      ctx.font = "bold 14px Orbitron"; 
      triangleData.forEach((a, i) => {
          if (currentY < oy + sWidth - 40) {
              ctx.fillStyle = "rgba(0, 210, 255, 0.4)";
              ctx.fillText((i+1).toString().padStart(2,'0'), listX, currentY);
              ctx.textAlign = "right"; ctx.fillStyle = "white";
              ctx.fillText(a.toFixed(2).replace('.',','), listX + 130, currentY);
              ctx.textAlign = "left"; currentY += 22;
          }
      });
      ctx.fillStyle = "var(--neon-blue)";
      ctx.font = "bold 20px Orbitron";
      ctx.fillText(`Σ = ${totalArea.toFixed(2).replace('.',',')}`, listX, currentY + 40);
  }

  canvas.onpointerdown = e => {
      const rect = canvas.getBoundingClientRect(); const x = e.clientX - rect.left, y = e.clientY - rect.top;
      let hit = -1; for (let i = 4; i < points.length; i++) if (Math.hypot(points[i][0]-x, points[i][1]-y) < 20) { hit = i; break; }

      startPos = {x, y};
      hasMoved = false;
      wasSelectedOnDown = selectedIndices.size > 0; // Zustand speichern

      if (hit !== -1) {
          draggedIdx = hit;
          longPressTimer = setTimeout(() => {
              if (!hasMoved) {
                  if (navigator.vibrate) navigator.vibrate(50);
                  if (!multiMode) toggleMultiMode(true);
                  selectedIndices.add(hit);
                  update();
              }
          }, 1000);
      } else {
          // Klick ins Leere: Falls etwas selektiert ist, NUR deselektieren
          if (wasSelectedOnDown) {
              selectedIndices.clear();
              toggleMultiMode(false);
          }
      }
      update();
  };

  window.onpointermove = e => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left, y = e.clientY - rect.top;

      if (Math.hypot(x - startPos.x, y - startPos.y) > 5) {
          hasMoved = true;
          if (longPressTimer) clearTimeout(longPressTimer);
      }

      if (draggedIdx !== -1) {
          if (!multiMode && !selectedIndices.has(draggedIdx) && hasMoved) {
              selectedIndices.clear();
          }
          points[draggedIdx] = [Math.max(ox, Math.min(ox+sWidth, x)), Math.max(oy, Math.min(oy+sWidth, y))];
          update();
      }
  };

  window.onpointerup = e => {
      if (longPressTimer) clearTimeout(longPressTimer);
      const rect = canvas.getBoundingClientRect(); const x = e.clientX - rect.left, y = e.clientY - rect.top;

      if (draggedIdx !== -1) {
          if (!hasMoved) {
              if (multiMode || e.shiftKey) {
                  if (selectedIndices.has(draggedIdx)) selectedIndices.delete(draggedIdx);
                  else selectedIndices.add(draggedIdx);
              } else {
                  selectedIndices.clear();
                  selectedIndices.add(draggedIdx);
              }
          } else {
              if (!multiMode && selectedIndices.size <= 1) selectedIndices.clear();
          }
      } else {
          // NEUER PUNKT Logik: Nur wenn beim Klick (Down) NICHTS selektiert war
          if (!hasMoved && !wasSelectedOnDown && x>=ox && x<=ox+sWidth && y>=oy && y<=oy+sWidth) {
              points.push([x,y]);
          }
      }

      draggedIdx = -1;
      hasMoved = false;
      wasSelectedOnDown = false;
      update();
  };

  window.addEventListener('resize', resetPoints);
  window.onload = resetPoints;
</script>
</body>
</html>
