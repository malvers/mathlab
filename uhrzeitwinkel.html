<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Winkel-Uhr Labor | Cyber-Labor</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <style>
        :root {
            --space-bg: #050b18;
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-orange: #ff9d00;
            --text-main: #ffffff;
            --glass-bright: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--space-bg);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* --- BACKGROUND PARTICLES --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 15px);
            background-size: 300px 300px;
            z-index: -1;
            opacity: 0.3;
        }

        /* --- SIDEBAR LAYOUT --- */
        #sidebar {
            width: 320px;
            min-width: 320px;
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }

        #workspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* --- INSTRUMENT CARDS --- */
        .instrument-card {
            background: var(--glass-bright);
            padding: 12px 18px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .card-title {
            font-family: 'Orbitron';
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .val-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 40px;
        }
        .val-display { font-family: 'Orbitron'; font-size: 1.3rem; font-weight: bold; color: var(--neon-blue); }

        /* --- FLOATING LABEL --- */
        #floating-tag {
            position: absolute;
            top: 15%; /* Über der Uhr */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid var(--neon-blue);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.4rem;
            color: var(--neon-blue);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 200;
            pointer-events: none;
            font-family: 'Orbitron';
            white-space: nowrap;
        }

        /* --- CLOCK SVG --- */
        svg#clock {
            width: 80%;
            max-width: 500px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(0, 210, 255, 0.15));
        }

        .clock-face {
            fill: rgba(0, 0, 0, 0.3);
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 1;
        }

        #hour-hand {
            stroke: var(--neon-blue);
            stroke-width: 8;
            stroke-linecap: round;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        #minute-hand {
            stroke: var(--neon-purple);
            stroke-width: 5;
            stroke-linecap: round;
            filter: drop-shadow(0 0 10px var(--neon-purple));
        }

        .angle-arc {
            fill: rgba(0, 210, 255, 0.15);
            stroke: var(--neon-blue);
            stroke-width: 2;
            opacity: 0.7;
        }

        /* --- SLIDER STYLING --- */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            margin: 15px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: #fff;
            border: 4px solid var(--neon-blue);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 8px currentColor;
        }
    </style>
</head>
<body>

    <aside id="sidebar">
        <!-- Sidebar Navigation (Home/Back) Injected here by branding.js -->
        <div id="sidebar-header" style="min-height: 60px;"></div>

        <div class="instrument-card">
            <span class="card-title">Zeitsteuerung</span>
            <div class="val-row">
                <span id="digital-time" class="val-display">12:00</span>
            </div>
            <input type="range" id="time-slider" min="0" max="719" value="0">
        </div>

        <div class="instrument-card">
            <span class="card-title">Legende</span>
            <div class="val-row" style="margin-top: 5px;">
                <span style="font-size: 0.8rem; opacity: 0.8;"><span class="legend-dot" style="color: var(--neon-blue); background: var(--neon-blue);"></span> Stundenzeiger</span>
            </div>
            <div class="val-row">
                <span style="font-size: 0.8rem; opacity: 0.8;"><span class="legend-dot" style="color: var(--neon-purple); background: var(--neon-purple);"></span> Minutenzeiger</span>
            </div>
        </div>
    </aside>

    <main id="workspace">
        <div id="floating-tag">α = 0°</div>

        <svg id="clock" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="95" class="clock-face" />
            <g id="ticks"></g>
            <path id="angle-arc" class="angle-arc" d="" />
            <line id="hour-hand" x1="100" y1="100" x2="100" y2="60" />
            <line id="minute-hand" x1="100" y1="100" x2="100" y2="45" />
            <circle cx="100" cy="100" r="4" fill="white" />
        </svg>
    </main>

    <script src="branding.js"></script>
    <script>
        const slider = document.getElementById('time-slider');
        const digitalTime = document.getElementById('digital-time');
        const floatingTag = document.getElementById('floating-tag');
        const hourHand = document.getElementById('hour-hand');
        const minuteHand = document.getElementById('minute-hand');
        const angleArc = document.getElementById('angle-arc');
        const ticksContainer = document.getElementById('ticks');

        // Create ticks
        for (let i = 0; i < 12; i++) {
            const angle = i * 30;
            const x1 = 100 + 85 * Math.sin(angle * Math.PI / 180);
            const y1 = 100 - 85 * Math.cos(angle * Math.PI / 180);
            const x2 = 100 + 92 * Math.sin(angle * Math.PI / 180);
            const y2 = 100 - 92 * Math.cos(angle * Math.PI / 180);
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1);
            line.setAttribute("y1", y1);
            line.setAttribute("x2", x2);
            line.setAttribute("y2", y2);
            line.setAttribute("stroke", "rgba(255,255,255,0.2)");
            line.setAttribute("stroke-width", "1.5");
            ticksContainer.appendChild(line);
        }

        function update() {
            const minutesTotal = parseInt(slider.value);
            const h = Math.floor(minutesTotal / 60);
            const m = minutesTotal % 60;

            const hDisplay = h === 0 ? 12 : h;
            digitalTime.innerText = `${hDisplay.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;

            const hAngle = (h * 30) + (m * 0.5);
            const mAngle = m * 6;

            hourHand.setAttribute('transform', `rotate(${hAngle}, 100, 100)`);
            minuteHand.setAttribute('transform', `rotate(${mAngle}, 100, 100)`);

            let diff = Math.abs(hAngle - mAngle);
            if (diff > 180) diff = 360 - diff;
            
            if (window.katex) {
                katex.render(`\\alpha = ${diff.toFixed(1)}^\\circ`, floatingTag, { throwOnError: false });
            } else {
                floatingTag.innerText = `α = ${diff.toFixed(1)}°`;
            }

            updateArc(hAngle, mAngle);
        }

        function updateArc(hAngle, mAngle) {
            const r = 35;
            let start = hAngle;
            let end = mAngle;
            
            let diff = (end - start) % 360;
            if (diff < 0) diff += 360;
            
            if (diff > 180) {
                [start, end] = [end, start];
                diff = 360 - diff;
            }

            const x1 = 100 + r * Math.sin(start * Math.PI / 180);
            const y1 = 100 - r * Math.cos(start * Math.PI / 180);
            const x2 = 100 + r * Math.sin(end * Math.PI / 180);
            const y2 = 100 - r * Math.cos(end * Math.PI / 180);

            const d = `M 100 100 L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`;
            angleArc.setAttribute('d', d);
        }

        slider.addEventListener('input', update);
        
        window.addEventListener('load', () => {
            if (window.CyberBranding) {
                CyberBranding.init({
                    title: "Winkel-Uhr Labor",
                    subtitle: "ANALOG-DIGITAL ANALYSE"
                });
            }
            update();
        });
    </script>
</body>
</html>
