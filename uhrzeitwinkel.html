<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Winkel-Uhr Labor | Cyber-Labor</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <style>
        :root {
            --space-bg: #050b18;
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-orange: #ff9d00;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--space-bg);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- BACKGROUND PARTICLES --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 1px, transparent 15px);
            background-size: 300px 300px;
            z-index: -1;
            opacity: 0.3;
        }

        #workspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 40px;
        }

        /* --- CLOCK CONTAINER --- */
        .glass-panel {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        svg#clock {
            width: 400px;
            height: 400px;
            filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.15));
        }

        .clock-face {
            fill: rgba(0, 0, 0, 0.2);
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 2;
        }

        .hand {
            stroke-linecap: round;
        }

        #hour-hand {
            stroke: var(--neon-blue);
            stroke-width: 8;
            filter: drop-shadow(0 0 8px var(--neon-blue));
        }

        #minute-hand {
            stroke: var(--neon-purple);
            stroke-width: 5;
            filter: drop-shadow(0 0 8px var(--neon-purple));
        }

        .angle-arc {
            fill: rgba(0, 210, 255, 0.2);
            stroke: var(--neon-blue);
            stroke-width: 2;
            opacity: 0.6;
        }

        /* --- LABELS --- */
        .formula-tag {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid var(--neon-blue);
            padding: 15px 25px;
            border-radius: 20px;
            font-size: 1.5rem;
            color: var(--neon-blue);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            font-family: 'Orbitron';
        }

        /* --- CONTROLS --- */
        .control-bar {
            width: 100%;
            max-width: 600px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron';
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
        }

        input[type=range] {
            width: 100%;
            appearance: none;
            background: rgba(255,255,255,0.1);
            height: 6px;
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 24px;
            background: white;
            border: 4px solid var(--neon-blue);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .time-display {
            font-family: 'Orbitron';
            color: #fff;
            font-size: 2.5rem;
            letter-spacing: 5px;
            text-shadow: 0 0 15px var(--neon-blue);
        }
    </style>
</head>
<body>

    <div id="workspace">
        <div id="math-display" class="formula-tag">HH:MM | α = 0°</div>

        <div class="glass-panel">
            <svg id="clock" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="95" class="clock-face" />
                <g id="ticks"></g>
                <path id="angle-arc" class="angle-arc" d="" />
                <line id="hour-hand" x1="100" y1="100" x2="100" y2="60" class="hand" />
                <line id="minute-hand" x1="100" y1="100" x2="100" y2="45" class="hand" />
                <circle cx="100" cy="100" r="4" fill="white" />
            </svg>
        </div>

        <div class="control-bar">
            <div class="slider-header">
                <span id="label-time">UHRZEIT EINSTELLEN</span>
                <span id="digital-time" class="time-display">00:00</span>
            </div>
            <input type="range" id="time-slider" min="0" max="719" value="0">
        </div>
    </div>

    <script src="branding.js"></script>
    <script>
        const slider = document.getElementById('time-slider');
        const digitalTime = document.getElementById('digital-time');
        const mathDisplay = document.getElementById('math-display');
        const hourHand = document.getElementById('hour-hand');
        const minuteHand = document.getElementById('minute-hand');
        const angleArc = document.getElementById('angle-arc');
        const ticksContainer = document.getElementById('ticks');

        for (let i = 0; i < 12; i++) {
            const angle = i * 30;
            const x1 = 100 + 85 * Math.sin(angle * Math.PI / 180);
            const y1 = 100 - 85 * Math.cos(angle * Math.PI / 180);
            const x2 = 100 + 92 * Math.sin(angle * Math.PI / 180);
            const y2 = 100 - 92 * Math.cos(angle * Math.PI / 180);
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1);
            line.setAttribute("y1", y1);
            line.setAttribute("x2", x2);
            line.setAttribute("y2", y2);
            line.setAttribute("stroke", "rgba(255,255,255,0.4)");
            line.setAttribute("stroke-width", "2");
            ticksContainer.appendChild(line);
        }

        function update() {
            const minutesTotal = parseInt(slider.value);
            const h = Math.floor(minutesTotal / 60);
            const m = minutesTotal % 60;

            const hDisplay = h === 0 ? 12 : h;
            digitalTime.innerText = `${hDisplay.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;

            const hAngle = (h * 30) + (m * 0.5);
            const mAngle = m * 6;

            hourHand.setAttribute('transform', `rotate(${hAngle}, 100, 100)`);
            minuteHand.setAttribute('transform', `rotate(${mAngle}, 100, 100)`);

            let diff = Math.abs(hAngle - mAngle);
            if (diff > 180) diff = 360 - diff;
            
            if (window.katex) {
                katex.render(`${hDisplay}:${m.toString().padStart(2, '0')} \\implies \\alpha = ${diff.toFixed(1)}^\\circ`, mathDisplay, {
                    throwOnError: false
                });
            } else {
                mathDisplay.innerText = `${hDisplay}:${m.toString().padStart(2, '0')} | α = ${diff.toFixed(1)}°`;
            }

            updateArc(hAngle, mAngle);
        }

        function updateArc(hAngle, mAngle) {
            const r = 35;
            let start = hAngle;
            let end = mAngle;
            
            let diff = (end - start) % 360;
            if (diff < 0) diff += 360;
            
            if (diff > 180) {
                [start, end] = [end, start];
                diff = 360 - diff;
            }

            const x1 = 100 + r * Math.sin(start * Math.PI / 180);
            const y1 = 100 - r * Math.cos(start * Math.PI / 180);
            const x2 = 100 + r * Math.sin(end * Math.PI / 180);
            const y2 = 100 - r * Math.cos(end * Math.PI / 180);

            const largeArcFlag = 0;
            const sweepFlag = 1;

            const d = `M 100 100 L ${x1} ${y1} A ${r} ${r} 0 ${largeArcFlag} ${sweepFlag} ${x2} ${y2} Z`;
            angleArc.setAttribute('d', d);
        }

        slider.addEventListener('input', update);
        window.addEventListener('load', () => {
            if (window.CyberBranding) CyberBranding.injectNavigation();
            update();
        });
    </script>
</body>
</html>
