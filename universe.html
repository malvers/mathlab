<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universe | docalvers ULTRA</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050b18;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            pointer-events: none;
        }

        .glow-sphere {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 600px;
            height: 600px;
            margin-left: -300px;
            margin-top: -300px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            animation: pulse-glow 8s infinite alternate;
            pointer-events: none;
        }

        @keyframes pulse-glow {
            from { transform: scale(1); opacity: 0.3; }
            to { transform: scale(1.2); opacity: 0.55; }
        }

        /* Screenshots: aus der Mitte, darüber klickbar */
        #thumb-plane {
            position: fixed;
            inset: 0;
            z-index: 6;
            pointer-events: none;
        }

        .universe-thumb {
            position: absolute;
            left: 50%;
            top: 50%;
            width: min(42vw, 340px);
            pointer-events: auto;
            border-radius: 14px;
            overflow: hidden;
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.55),
                0 0 0 1px rgba(255, 255, 255, 0.12);
            will-change: transform;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            outline: none;
        }

        .universe-thumb:focus-visible {
            box-shadow:
                0 0 0 3px rgba(0, 210, 255, 0.85),
                0 12px 40px rgba(0, 0, 0, 0.55);
        }

        .universe-thumb:hover {
            box-shadow:
                0 0 28px rgba(0, 210, 255, 0.35),
                0 12px 44px rgba(0, 0, 0, 0.55),
                0 0 0 1px rgba(0, 210, 255, 0.35);
        }

        .universe-thumb img {
            display: block;
            width: 100%;
            height: auto;
            vertical-align: middle;
            user-select: none;
            -webkit-user-drag: none;
        }

        .fs-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(10px);
            opacity: 0.35;
            transition: opacity 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            outline: none;
        }
        .fs-toggle:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }
        .fs-toggle svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="resources/galay20.mp4" type="video/mp4">
    </video>

    <div class="glow-sphere"></div>

    <div id="thumb-plane" aria-live="polite"></div>

    <button type="button" class="fs-toggle" id="fs-btn" onclick="toggleFullscreen()" aria-label="Vollbild">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 3h6v6M9 21H3v-6M21 9V3h-6M3 15v6h6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <script>
        /**
         * Zuordnung Screenshot-Dateiname → Lab (wie resources/screenshots/*.png).
         * Bei neuen Labs: Eintrag + PNG ergänzen.
         */
        const UNIVERSE_LABS = [
            { href: 'orbitals.html', file: 'Atomorbitale.png' },
            { href: 'coolsquares.html', file: 'Cool-Squares.png' },
            { href: 'addition.html', file: 'Schriftliche-Addition.png' },
            { href: 'subtraktion.html', file: 'Schriftliche-Subtraktion.png' },
            { href: 'dividieren.html', file: 'Schriftliche-Division.png' },
            { href: 'index.html', file: 'Labor-Auswahl-Index.png' },
            { href: 'lissajous.html', file: 'Lissajous.png' },
            { href: 'butterfly.html', file: 'Schmetterlingskurve.png' },
            { href: 'logikspiel2.html', file: 'Zahlen-Puzzle.png' },
            { href: 'easyhard.html', file: 'Geometrie-Knobelei.png' },
            { href: 'gleichungssysteme.html', file: 'LGS-Labor.png' },
            { href: 'fourier.html', file: 'Fourier-Transformation.png' },
            { href: 'fibonacci.html', file: 'Fibonacci-Labor.png' },
            { href: 'fermatpunkt.html', file: 'Fermat-Punkt.png' },
            { href: 'gleichschenkligesDreieck.html', file: 'Gleichschenkliges-Dreieck.png' },
        ];

        const SCREENSHOT_BASE = 'resources/screenshots/';

        /** Leertaste: Animation stoppen / weiter */
        let universeAnimPaused = false;

        window.addEventListener('load', () => {
            const video = document.getElementById('bg-video');
            if (video) video.playbackRate = 0.5;
            initUniverseThumbs();
        });

        function toggleFullscreen() {
            const doc = window.document;
            const docEl = doc.documentElement;
            const isFullScreen = doc.fullscreenElement || doc.mozFullScreenElement || doc.webkitFullscreenElement || doc.msFullscreenElement || doc.webkitIsFullScreen;

            if (!isFullScreen) {
                if (docEl.requestFullscreen) docEl.requestFullscreen();
                else if (docEl.mozRequestFullScreen) docEl.mozRequestFullScreen();
                else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT);
                else if (docEl.msRequestFullscreen) docEl.msRequestFullscreen();
            } else {
                if (doc.exitFullscreen) doc.exitFullscreen();
                else if (doc.mozCancelFullScreen) doc.mozCancelFullScreen();
                else if (doc.webkitExitFullscreen) doc.webkitExitFullscreen();
                else if (doc.msExitFullscreen) doc.msExitFullscreen();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'f') toggleFullscreen();
            if (e.code === 'Space' || e.key === ' ') {
                e.preventDefault();
                universeAnimPaused = !universeAnimPaused;
            }
        });

        /* --- Universe thumb flight --- */
        function initUniverseThumbs() {
            const plane = document.getElementById('thumb-plane');
            if (!plane) return;

            const pool = [];
            Promise.all(
                UNIVERSE_LABS.map(
                    (lab) =>
                        new Promise((resolve) => {
                            const img = new Image();
                            img.onload = () => resolve({ ...lab, ok: true });
                            img.onerror = () => resolve({ ...lab, ok: false });
                            img.src = SCREENSHOT_BASE + lab.file;
                        })
                )
            ).then((results) => {
                results.filter((r) => r.ok).forEach((r) => pool.push(r));
                if (pool.length === 0) return;

                /** Mind. gleichzeitig sichtbar (begrenzt durch Pool). Kein zweites gleiches Lab gleichzeitig. */
                const WANT_VISIBLE = Math.min(6, pool.length);
                const maxLive = Math.min(pool.length, 16);

                const active = [];
                let spawnAcc = 0;
                const spawnEveryMs = () => 2200 + Math.random() * 2600;

                let nextSpawnIn = spawnEveryMs();

                const SCALE_FACTOR = 6;
                const scaleMax = 0.92 * SCALE_FACTOR;

                function angleDelta(a, b) {
                    let d = Math.abs(a - b);
                    if (d > Math.PI) d = Math.PI * 2 - d;
                    return d;
                }

                /** Mindest-Winkelabstand zu allen aktiven Strahlen (reduziert Überlappungen). */
                function pickSpawnAngle(minRad) {
                    for (let attempt = 0; attempt < 140; attempt++) {
                        const ang = Math.random() * Math.PI * 2;
                        let ok = true;
                        for (const o of active) {
                            if (angleDelta(ang, o.angle) < minRad) {
                                ok = false;
                                break;
                            }
                        }
                        if (ok) return ang;
                    }
                    return Math.random() * Math.PI * 2;
                }

                function pickUnusedLab() {
                    const used = new Set(active.map((o) => o.href));
                    const cand = pool.filter((l) => !used.has(l.href));
                    if (cand.length === 0) return null;
                    return cand[(Math.random() * cand.length) | 0];
                }

                /** Exakt aus der Bildmitte: dist=0, Skala folgt erst beim Abdriften (siehe tick). */
                function spawnOne(lab) {
                    if (!lab) return;
                    const minSep =
                        active.length > 14 ? 0.28 : active.length > 8 ? 0.34 : 0.4;
                    const angle = pickSpawnAngle(minSep);
                    const initialDist = 0;
                    const speed = 28 + Math.random() * 42;
                    const a = document.createElement('a');
                    a.className = 'universe-thumb';
                    a.href = lab.href;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.setAttribute('aria-label', 'Labor in neuem Tab öffnen');
                    const im = document.createElement('img');
                    im.src = SCREENSHOT_BASE + lab.file;
                    im.alt = '';
                    im.decoding = 'async';
                    im.draggable = false;
                    a.appendChild(im);
                    plane.appendChild(a);

                    const obj = {
                        el: a,
                        angle,
                        dist: initialDist,
                        speed,
                        href: lab.href,
                        frozen: false,
                    };
                    active.push(obj);

                    // Klick hält die Kachel an — Loslassen lässt sie weiter fliegen (kein Link)
                    a.addEventListener('click', (e) => e.preventDefault());

                    a.addEventListener('pointerdown', (e) => {
                        obj.frozen = true;
                        obj.dragX = Math.cos(obj.angle) * obj.dist; // aktuelle screen-Verschiebung
                        obj.dragY = Math.sin(obj.angle) * obj.dist;
                        obj.ptrStartX = e.clientX;
                        obj.ptrStartY = e.clientY;
                        obj.dragStartX = obj.dragX;
                        obj.dragStartY = obj.dragY;
                        a.style.boxShadow = '0 0 30px rgba(0,210,255,0.7), 0 12px 40px rgba(0,0,0,0.55)';
                        a.setPointerCapture(e.pointerId);
                        e.preventDefault();
                    });

                    a.addEventListener('pointermove', (e) => {
                        if (!obj.frozen) return;
                        const ddx = e.clientX - obj.ptrStartX;
                        const ddy = e.clientY - obj.ptrStartY;
                        obj.dragX = obj.dragStartX + ddx;
                        obj.dragY = obj.dragStartY + ddy;
                        // Transform direkt setzen (tick überspringt frozen)
                        const sc = Math.min(1, obj.dist / (Math.hypot(window.innerWidth, window.innerHeight) * 0.96 + 220)) * scaleMax;
                        a.style.transform =
                            'translate(-50%, -50%) translate(' + obj.dragX.toFixed(1) + 'px,' + obj.dragY.toFixed(1) + 'px) scale(' + sc.toFixed(4) + ')';
                    });

                    const resume = () => {
                        if (!obj.frozen) return;
                        obj.frozen = false;
                        // Nur Winkel neu setzen — dist bleibt, kein z-Sprung
                        obj.angle = Math.atan2(obj.dragY, obj.dragX);
                        // dist auf die tatsächliche Drag-Distanz setzen, aber z-index sofort anpassen
                        const newDist = Math.hypot(obj.dragX, obj.dragY);
                        obj.dist = newDist;
                        obj.el.style.zIndex = String(10000 + Math.floor(newDist));
                        a.style.boxShadow = '';
                    };
                    window.addEventListener('pointerup',     resume, { once: false });
                    window.addEventListener('pointercancel', resume, { once: false });

                }

                function refillMinimum() {
                    while (
                        active.length < WANT_VISIBLE &&
                        active.length < maxLive
                    ) {
                        const lab = pickUnusedLab();
                        if (!lab) break;
                        spawnOne(lab);
                    }
                }

                let last = performance.now();

                function tick(now) {
                    let dt = 0;
                    if (!universeAnimPaused) {
                        dt = Math.min(48, now - last) / 1000;
                        last = now;
                    }

                    const diag = Math.hypot(window.innerWidth, window.innerHeight);
                    const killDist = diag * 0.96 + 220;

                    refillMinimum();

                    spawnAcc += dt * 1000;
                    if (
                        active.length >= WANT_VISIBLE &&
                        active.length < maxLive &&
                        spawnAcc >= nextSpawnIn
                    ) {
                        const lab = pickUnusedLab();
                        if (lab) {
                            spawnOne(lab);
                            spawnAcc = 0;
                            nextSpawnIn = spawnEveryMs();
                        }
                    }

                    for (let i = active.length - 1; i >= 0; i--) {
                        const o = active[i];
                    if (o.frozen) continue;  // eingefroren — nicht bewegen
                        o.dist += o.speed * dt;
                        const t = Math.min(1, o.dist / killDist);
                        const sc = t * scaleMax;
                        const dx = Math.cos(o.angle) * o.dist;
                        const dy = Math.sin(o.angle) * o.dist;
                        o.el.style.transform =
                            'translate(-50%, -50%) translate(' +
                            dx.toFixed(1) +
                            'px,' +
                            dy.toFixed(1) +
                            'px) scale(' +
                            sc.toFixed(4) +
                            ')';
                        o.el.style.zIndex = String(10000 + Math.floor(o.dist));
                        o.el.style.pointerEvents = sc < 0.03 ? 'none' : 'auto';

                        if (o.dist > killDist) {
                            if (o.el.parentNode) o.el.parentNode.removeChild(o.el);
                            active.splice(i, 1);
                        }
                    }

                    refillMinimum();

                    requestAnimationFrame(tick);
                }

                refillMinimum();
                requestAnimationFrame(tick);
            });
        }
    </script>
</body>
</html>
