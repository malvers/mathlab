<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Winkelsumme-Labor | docalvers</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --neon-pink: #ff0055;
            --neon-green: #39FF14;
            --neon-orange: #ff8800;
            --neon-yellow: #faff00;
            --bg-dark: #050b18;
            --glass: rgba(15, 23, 42, 0.75);
            --glass-bright: rgba(255, 255, 255, 0.05);
            --labor-red: #ff4757;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #0a1329 0%, #050b18 100%);
            color: white;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
        }

        /* --- SIDEBAR --- */
        #side-panel {
            width: 380px;
            min-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            box-sizing: border-box;
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }


        /* --- STATS CARDS --- */
        .stats-card {
            background: var(--glass-bright);
            padding: 18px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stats-title {
            font-family: 'Orbitron';
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .stats-val {
            font-family: 'Orbitron';
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff;
        }

        #math-log {
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Orbitron';
            font-size: 0.8rem;
            padding-right: 8px;
            margin-top: 10px;
        }
        #math-log::-webkit-scrollbar { width: 4px; }
        #math-log::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 10px; }
        #math-log::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        #math-log::-webkit-scrollbar-thumb:hover { background: var(--neon-blue); }

        .log-entry {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* --- CONTROLS --- */
        .control-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button {
            padding: 10px;
            font-size: 0.7rem;
            font-family: 'Orbitron', sans-serif;
            background: var(--glass-bright);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        button:hover {
            border-color: var(--neon-blue);
            color: white;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }
        button.active {
            background: rgba(0, 210, 255, 0.15);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        .btn-large {
            grid-column: span 4;
            padding: 15px;
            margin-top: 5px;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        /* --- CANVAS --- */
        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: transparent;
            overflow: hidden;
        }


        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .footer-credit {
            margin-top: auto;
            font-family: 'Orbitron';
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            letter-spacing: 3px;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <aside id="side-panel">
        <!-- Sidebar Navigation (Home/Back) Injected here by branding.js -->
        <div id="sidebar-header" style="min-height: 60px;"></div>

        <section class="stats-card">
            <div class="control-group" id="btn-container">
                <!-- Eckenzahl Buttons werden per JS generiert -->
            </div>
            <button class="btn-large" onclick="initPolygon(nEcken)">LABOR RESET</button>
        </section>

        <section class="stats-card">
            <span class="stats-title">Innenwinkelsumme</span>
            <span id="sum-val" class="stats-val">0°</span>
            <div id="math-log"></div>
        </section>

        <footer class="footer-credit">Doc Alvers Mathe-Labor</footer>
    </aside>

    <main id="canvas-container">
        <canvas id="canvas"></canvas>
    </main>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/earcut/dist/earcut.min.js"></script>
    <script src="branding.js"></script>
    <script>
        // Initialize Branding
        CyberBranding.init({
            title: "Doc Alvers Mathe-Labor",
            subtitle: "Polygon-Winkelsumme"
        });

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        const sumValEl = document.getElementById('sum-val');
        const mathLogEl = document.getElementById('math-log');

        const neonBlue   = "#00d2ff";
        const neonPurple = "#9d50bb";
        const neonPink   = "#ff0055";
        const neonGreen  = "#39FF14";
        const neonOrange = "#ff8800";
        const neonYellow = "#faff00";
        const laborColors = [neonBlue, neonGreen, neonOrange, neonPurple, neonPink, neonYellow, "#00ffa2", "#ff0080", "#00ffff"];

        let width, height, dpr;
        let points = [];
        let nEcken = 3;
        let dragIdx = -1;
        const BOGEN_RAD = 50;

        function init() {
            dpr = window.devicePixelRatio || 1;
            const rect = container.getBoundingClientRect();
            width = rect.width;
            height = rect.height;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            
            updateButtons();
            initPolygon(nEcken);
        }

        function updateButtons() {
            const btnContainer = document.getElementById('btn-container');
            btnContainer.innerHTML = '';
            for (let i = 3; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.innerText = i + "E";
                if (i === nEcken) btn.classList.add('active');
                btn.onclick = () => { nEcken = i; updateButtons(); initPolygon(i); };
                btnContainer.appendChild(btn);
            }
        }

        function initPolygon(n) {
            points = [];
            const cx = width / 2;
            const cy = height * 0.4;
            const radius = Math.min(width, height) * 0.22;
            for (let i = 0; i < n; i++) {
                const a = (2 * Math.PI * i) / n - Math.PI / 2;
                points.push({ x: cx + radius * Math.cos(a), y: cy + radius * Math.sin(a) });
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            // Raster
            ctx.strokeStyle = "rgba(255,255,255,0.03)";
            ctx.lineWidth = 1;
            for(let x=0; x<width; x+=50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,height); ctx.stroke(); }
            for(let y=0; y<height; y+=50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(width,y); ctx.stroke(); }

            const n = points.length;
            let logHtml = "";
            let totalDeg = 0;
            let winkelWerte = [];

            // Orientierung für Innenwinkel
            let area = 0;
            for(let i=0; i<n; i++) area += (points[i].x * points[(i+1)%n].y) - (points[(i+1)%n].x * points[i].y);
            const isCW = area < 0;

            // Winkel Zeichnen & Berechnen
            for (let i = 0; i < n; i++) {
                const P = points[i], prev = points[(i + n - 1) % n], next = points[(i + 1) % n];
                const a1 = Math.atan2(prev.y - P.y, prev.x - P.x);
                const a2 = Math.atan2(next.y - P.y, next.x - P.x);
                let diff = a2 - a1;
                if (isCW) { while (diff < 0) diff += Math.PI * 2; }
                else { while (diff > 0) diff -= Math.PI * 2; }

                const deg = Math.abs(diff) * 180 / Math.PI;
                winkelWerte.push(Math.abs(diff));
                totalDeg += deg;

                // Neon-Bogen
                const color = laborColors[i % laborColors.length];
                ctx.shadowBlur = 20; ctx.shadowColor = color;
                ctx.fillStyle = color + "40";
                ctx.beginPath();
                ctx.moveTo(P.x, P.y);
                ctx.arc(P.x, P.y, BOGEN_RAD, a1, a1 + diff, !isCW);
                ctx.closePath(); ctx.fill();
                
                ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
                ctx.shadowBlur = 0;

                logHtml += `<div class="log-entry"><span style="color:${color}">Winkel ${i+1}</span><span>${deg.toFixed(1)}°</span></div>`;
            }

            // Polygon-Umriss (Filigran Weiß, No-Fancy)
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "rgba(255, 255, 255, 0.4)"; ctx.lineWidth = 0.6;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for(let i=1; i<n; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.closePath();
            ctx.stroke();

            // Handles (Dunkelgrau mit Aura)
            points.forEach((p, idx) => {
                const color = laborColors[idx % laborColors.length];
                ctx.shadowBlur = 10; ctx.shadowColor = color;
                ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 0.8; ctx.stroke();
                ctx.shadowBlur = 0;
            });

            // Visual Proof (Addition an der Gerade) - NUR FÜR 3E und 4E
            if (n <= 4) {
                const gY = height * 0.8;
                const gX = width / 2;
                const lineLen = 250;
                ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 0.8;
                ctx.beginPath(); ctx.moveTo(gX - lineLen, gY); ctx.lineTo(gX + lineLen, gY); ctx.stroke();

                let currentStart = Math.PI;
                winkelWerte.forEach((w, i) => {
                    const color = laborColors[i % laborColors.length];
                    ctx.shadowBlur = 15; ctx.shadowColor = color;
                    ctx.fillStyle = color + "80"; // Etwas satter für die Addition
                    ctx.beginPath(); ctx.moveTo(gX, gY);
                    ctx.arc(gX, gY, BOGEN_RAD * 1.5, currentStart, currentStart - w, true);
                    ctx.closePath(); ctx.fill();
                    
                    // Diskrete Trennline zwischen den Winkeln im Beweis
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 0.5;
                    ctx.beginPath(); ctx.moveTo(gX, gY);
                    ctx.lineTo(gX + Math.cos(currentStart) * BOGEN_RAD * 1.5, gY + Math.sin(currentStart) * BOGEN_RAD * 1.5);
                    ctx.stroke();

                    currentStart -= w;
                });
                ctx.shadowBlur = 0;
            }

            // Sidebar Update
            sumValEl.innerText = Math.round(totalDeg) + "°";
            mathLogEl.innerHTML = logHtml;
        }

        // Interaktion
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.onpointerdown = e => {
            const pos = getPos(e);
            dragIdx = points.findIndex(p => Math.hypot(p.x - pos.x, p.y - pos.y) < 30);
        };

        window.onpointermove = e => {
            if (dragIdx === -1) return;
            const pos = getPos(e);
            points[dragIdx] = { x: pos.x, y: pos.y };
            draw();
        };

        window.onpointerup = () => dragIdx = -1;
        window.onresize = init;
        document.fonts.ready.then(init);

    </script>
</body>
</html>
