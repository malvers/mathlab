<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>docalvers | Polygon-Labor</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --neon: #00d2ff; --bg: #050b18; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
    #ui { padding: 10px; text-align: center; background: rgba(0,0,0,0.6); width: 100%; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 10; }
    .controls { display: flex; justify-content: center; gap: 8px; margin-top: 8px; }
    canvas { background: transparent; cursor: crosshair; touch-action: none; flex-grow: 1; width: 100%; }
    .info-box { position: absolute; top: 110px; right: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); font-family: 'Orbitron', sans-serif; text-align: right; }
    button { padding: 5px 10px; cursor: pointer; border-radius: 20px; border: 1px solid var(--neon); background: transparent; color: var(--neon); font-family: 'Orbitron'; font-size: 0.65rem; transition: 0.3s; }
    button:hover { background: var(--neon); color: black; box-shadow: 0 0 10px var(--neon); }
    .active { background: var(--neon); color: black; }
    .back-btn { position: absolute; top: 15px; left: 15px; text-decoration: none; color: white; font-size: 0.7rem; opacity: 0.6; font-family: 'Orbitron'; z-index: 20; }
  </style>
</head>
<body>

<a href="index.html" class="back-btn">← ZURÜCK</a>

<div id="ui">
  <h2 style="margin: 0; font-family: 'Orbitron'; font-size: 1.2rem; letter-spacing: 2px; color: var(--neon);">POLYGON-WINKELSUMME</h2>
  <div class="controls" id="btnContainer"></div>
</div>

<canvas id="canvas"></canvas>
<div class="info-box" id="stats"></div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const stats = document.getElementById('stats');

  let points = [];
  let dragIdx = -1;
  let nEcken = 3;
  const BOGEN_RAD = 45;
  const farben = [
      'rgba(255, 60, 60, 0.8)', 'rgba(60, 255, 60, 0.8)',
      'rgba(60, 130, 255, 0.8)', 'rgba(255, 220, 0, 0.8)',
      'rgba(0, 255, 255, 0.8)', 'rgba(255, 0, 255, 0.8)',
      'rgba(255, 150, 0, 0.8)', 'rgba(150, 255, 0, 0.8)', 'rgba(220, 220, 220, 0.8)'
  ];

  function initPolygon(n) {
      nEcken = n;
      points = [];
      const rect = canvas.getBoundingClientRect();
      const cx = rect.width / 2, cy = rect.height * 0.35;
      const radius = Math.min(rect.width, rect.height) * 0.18;
      for (let i = 0; i < n; i++) {
          const a = (2 * Math.PI * i) / n - Math.PI / 2;
          points.push({ x: cx + radius * Math.cos(a), y: cy + radius * Math.sin(a) });
      }
      updateButtons();
      draw();
  }

  function draw() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr; canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, rect.width, rect.height);

      const n = points.length;
      let winkelWerte = [];
      let summeRad = 0;

      // 1. Polygon Linien
      ctx.beginPath();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,255,255,0.2)";
      ctx.moveTo(points[0].x, points[0].y);
      for(let i=1; i<n; i++) ctx.lineTo(points[i].x, points[i].y);
      ctx.closePath();
      ctx.stroke();

      let area = 0;
      for(let i=0; i<n; i++) area += (points[i].x * points[(i+1)%n].y) - (points[(i+1)%n].x * points[i].y);
      const isCW = area < 0;

      // 2. Winkel oben zeichnen
      for (let i = 0; i < n; i++) {
          const P = points[i], prev = points[(i + n - 1) % n], next = points[(i + 1) % n];
          const a1 = Math.atan2(prev.y - P.y, prev.x - P.x);
          const a2 = Math.atan2(next.y - P.y, next.x - P.x);
          let diff = a2 - a1;
          if (isCW) { while (diff < 0) diff += Math.PI * 2; }
          else { while (diff > 0) diff -= Math.PI * 2; }

          ctx.fillStyle = farben[i % farben.length];
          ctx.beginPath();
          ctx.moveTo(P.x, P.y);
          ctx.arc(P.x, P.y, BOGEN_RAD, a1, a1 + diff, !isCW);
          ctx.fill();
          winkelWerte.push(Math.abs(diff));
          summeRad += Math.abs(diff);
      }

      points.forEach(p => {
          ctx.fillStyle = "#00d2ff";
          ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
          ctx.strokeStyle = "white"; ctx.lineWidth = 1; ctx.stroke();
      });

      // 3. UNTERE ANZEIGE (Nur für 3 und 4 Ecken)
      if (n <= 4) {
          const gY = rect.height * 0.70;
          const gX = rect.width / 2;
          const drawRadius = BOGEN_RAD * 1.5;

          // Grundlinie
          ctx.strokeStyle = "rgba(255,255,255,0.4)";
          ctx.beginPath(); ctx.moveTo(gX - 180, gY); ctx.lineTo(gX + 180, gY); ctx.stroke();

          let currentStart = Math.PI; // Start bei 180° (Links)
          winkelWerte.forEach((w, i) => {
              ctx.fillStyle = farben[i % farben.length];
              ctx.beginPath();
              ctx.moveTo(gX, gY);
              // Zeichne gegen den Uhrzeigersinn (true) nach OBEN
              ctx.arc(gX, gY, drawRadius, currentStart, currentStart - w, true);
              ctx.fill();
              currentStart -= w;
          });
      }

      stats.innerHTML = `<span style="font-size:0.75rem;opacity:0.6">POLYGON (n=${n})</span><br>
                         <span style="color:#00d2ff;font-size:1.3rem">${Math.round(summeRad * 180/Math.PI)}°</span><br>
                         <span style="font-size:0.65rem">(n-2) × 180°</span>`;
  }

  function updateButtons() {
      const container = document.getElementById('btnContainer');
      container.innerHTML = '';
      for (let i = 3; i <= 9; i++) {
          const btn = document.createElement('button');
          btn.innerText = i + " E";
          if (i === nEcken) btn.className = 'active';
          btn.onclick = () => initPolygon(i);
          container.appendChild(btn);
      }
  }

  canvas.onmousedown = (e) => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      dragIdx = points.findIndex(p => Math.hypot(p.x - mx, p.y - my) < 30);
  };
  window.onmousemove = (e) => {
      if (dragIdx === -1) return;
      const rect = canvas.getBoundingClientRect();
      points[dragIdx] = { x: e.clientX - rect.left, y: e.clientY - rect.top };
      draw();
  };
  window.onmouseup = () => dragIdx = -1;
  window.onresize = () => initPolygon(nEcken);
  initPolygon(3);
</script>
</body>
</html>
