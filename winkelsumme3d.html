<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bewis Innenwinkelsatz durch Faltung</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --space-bg: #050b18;
            --neon-blue: #00d2ff;
            --panel-bg: rgba(30, 45, 75, 0.75);
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: var(--space-bg);
            background-image: url('https://images.unsplash.com/photo-1506318137071-a8e063b4b477?q=80&w=2070');
            background-size: cover;
            background-position: center;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .glass-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px 30px;
            width: 90vw;
            max-width: 450px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: var(--neon-blue);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #003366;
            border-radius: 2px;
            border: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--neon-blue);
            cursor: pointer;
            margin-top: -5px;
            /* Centers 14px thumb on 4px track */
            box-shadow: 0 0 8px var(--neon-blue);
        }

        /* Firefox support */
        input[type="range"]::-moz-range-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #003366;
            border-radius: 2px;
        }

        input[type="range"]::-moz-range-thumb {
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--neon-blue);
            cursor: pointer;
            box-shadow: 0 0 8px var(--neon-blue);
            border: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--neon-blue);
        }

        button.active {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .version-badge {
            font-size: 0.55rem;
            color: #555;
            letter-spacing: 1px;
            text-align: right;
            margin-bottom: -10px;
            font-family: 'Orbitron', sans-serif;
            opacity: 0.6;
            pointer-events: none;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .legend {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-btn">⬅ ZENTRALE</a>
    <div id="canvas-container"></div>

    <div class="glass-panel">
        <h1>3D Winkelsumme</h1>

        <div class="controls">
            <div class="control-group">
                <div class="label">Faltung</div>
                <input type="range" id="fold-slider" min="0" max="3" step="0.01" value="0">
            </div>

            <div class="control-group">
                <div class="label">Horizontaler Versatz</div>
                <input type="range" id="skew-slider" min="-1.5" max="1.5" step="0.01" value="0.5">
            </div>

            <div class="version-badge">v2.2.0</div>
            <div class="btn-group">
                <button id="btn-auto-fold">FALTEN</button>
                <button id="btn-auto-rotate">ROTATION</button>
                <button id="btn-reset">RESET</button>
            </div>
        </div>

        <div class="legend">
            <span id="vA" style="color:#ffb100">60°</span>
            <span style="color:#666">+</span>
            <span id="vB" style="color:#77b521">60°</span>
            <span style="color:#666">+</span>
            <span id="vC" style="color:#c62128">60°</span>
            <span style="color:#666">=</span>
            <span style="color:var(--neon-blue)">180°</span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- 1. SETUP ---
        const scene = new THREE.Scene();
        // scene.background should remain null for transparency to show CSS background
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, precision: 'highp' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- 2. LIGHTS ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
        keyLight.position.set(5, 10, 5);
        scene.add(keyLight);
        const rimLight = new THREE.PointLight(0xffffff, 1.2);
        rimLight.position.set(0, 0, -10);
        scene.add(rimLight);

        // --- 3. MATERIALS ---
        const paperMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff, side: THREE.DoubleSide, roughness: 0.1, metalness: 0.05,
            clearcoat: 1.0, emissive: 0x111111
        });
        const tubeMat = new THREE.MeshPhysicalMaterial({
            color: 0x505050, metalness: 0.9, roughness: 0.2
        });
        const colors = { alpha: 0xffb100, beta: 0x77b521, gamma: 0xc62128 };

        // --- 4. GEOMETRY ---
        const groups = { center: new THREE.Group(), top: new THREE.Group(), left: new THREE.Group(), right: new THREE.Group() };
        Object.values(groups).forEach(g => scene.add(g));

        function createTubes(points, material, radius = 0.015) {
            const group = new THREE.Group();
            for (let i = 0; i < points.length; i++) {
                const p1 = points[i], p2 = points[(i + 1) % points.length];
                const tube = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, p1.distanceTo(p2), 8), material);
                tube.position.copy(p1.clone().add(p2).multiplyScalar(0.5));
                tube.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), p2.clone().sub(p1).normalize());
                group.add(tube);
            }
            return group;
        }

        function createArc(origin, start, span, color) {
            const geo = new THREE.CircleGeometry(0.25, 32, start, span);
            const mat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
            const group = new THREE.Group();

            const meshFront = new THREE.Mesh(geo, mat);
            meshFront.position.z = 0.005;
            group.add(meshFront);

            const meshBack = new THREE.Mesh(geo, mat);
            meshBack.position.z = -0.005;
            group.add(meshBack);

            group.position.copy(origin);
            group.renderOrder = 2; // Ensure arcs stay on top
            return group;
        }

        function rebuild(cX) {
            Object.values(groups).forEach(g => { while (g.children.length > 0) g.remove(g.children[0]); });
            const A = new THREE.Vector3(-2.5, 0, 0), B = new THREE.Vector3(2.5, 0, 0), C = new THREE.Vector3(cX, 4, 0), F = new THREE.Vector3(cX, 0, 0);

            const angA = Math.acos(B.clone().sub(A).normalize().dot(C.clone().sub(A).normalize()));
            const angB = Math.acos(A.clone().sub(B).normalize().dot(C.clone().sub(B).normalize()));
            const angG = Math.acos(A.clone().sub(C).normalize().dot(B.clone().sub(C).normalize()));

            document.getElementById('vA').innerText = Math.round(angA * 180 / Math.PI) + "°";
            document.getElementById('vB').innerText = Math.round(angB * 180 / Math.PI) + "°";
            document.getElementById('vC').innerText = (180 - Math.round(angA * 180 / Math.PI) - Math.round(angB * 180 / Math.PI)) + "°";

            const M_AC = A.clone().add(C).multiplyScalar(0.5), M_BC = B.clone().add(C).multiplyScalar(0.5);
            const H1 = new THREE.Vector3((A.x + F.x) / 2, 0, 0), H2 = new THREE.Vector3((B.x + F.x) / 2, 0, 0);

            const addPart = (g, pts) => {
                const shape = new THREE.Shape(); shape.moveTo(pts[0].x, pts[0].y);
                for (let i = 1; i < pts.length; i++) shape.lineTo(pts[i].x, pts[i].y);
                g.add(new THREE.Mesh(new THREE.ShapeGeometry(shape), paperMat));
                g.add(createTubes(pts, tubeMat));
            };

            addPart(groups.center, [H1, H2, M_BC, M_AC]);
            groups.top.position.set(0, 2, 0);
            addPart(groups.top, [M_AC.clone().sub(new THREE.Vector3(0, 2, 0)), M_BC.clone().sub(new THREE.Vector3(0, 2, 0)), C.clone().sub(new THREE.Vector3(0, 2, 0))]);
            groups.top.add(createArc(C.clone().sub(new THREE.Vector3(0, 2, 0)), Math.atan2(-2, M_AC.x - C.x), angG, colors.gamma));

            groups.left.position.set(H1.x, 0, 0);
            addPart(groups.left, [A.clone().sub(H1), new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 2, 0)]);
            groups.left.add(createArc(A.clone().sub(H1), 0, angA, colors.alpha));

            groups.right.position.set(H2.x, 0, 0);
            addPart(groups.right, [new THREE.Vector3(0, 0, 0), B.clone().sub(H2), new THREE.Vector3(0, 2, 0)]);
            groups.right.add(createArc(B.clone().sub(H2), Math.PI - angB, angB, colors.beta));
        }

        const slider = document.getElementById('fold-slider');
        function updateFold(val) {
            groups.top.rotation.x = Math.PI * Math.max(0, Math.min(1, val));
            groups.left.rotation.y = Math.PI * Math.max(0, Math.min(1, val - 1));
            groups.right.rotation.y = -Math.PI * Math.max(0, Math.min(1, val - 2));
            groups.top.position.z = 0.005 * Math.max(0, Math.min(1, val));
            groups.left.position.z = 0.01 * Math.max(0, Math.min(1, val - 1));
            groups.right.position.z = 0.015 * Math.max(0, Math.min(1, val - 2));
        }

        document.getElementById('btn-auto-fold').onclick = function () {
            this.classList.toggle('active');
            isAutoFolding = this.classList.contains('active');
        };
        document.getElementById('btn-auto-rotate').onclick = function () {
            this.classList.toggle('active');
            controls.autoRotate = this.classList.contains('active');
        };
        document.getElementById('btn-reset').onclick = () => {
            rebuild(0.5); updateFold(0); slider.value = 0; document.getElementById('skew-slider').value = 0.5;
            isAutoFolding = false; controls.autoRotate = false;
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            camera.position.set(0, 2, 12); controls.target.set(0, 0, 0);
        };

        let isAutoFolding = false, foldDir = 1;
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if (isAutoFolding) {
                let cur = parseFloat(slider.value);
                if (cur >= 3) foldDir = -1; if (cur <= 0) foldDir = 1;
                slider.value = cur + (0.02 * foldDir);
                updateFold(parseFloat(slider.value));
            }
            renderer.render(scene, camera);
        }

        slider.oninput = (e) => updateFold(parseFloat(e.target.value));
        document.getElementById('skew-slider').oninput = (e) => rebuild(parseFloat(e.target.value));
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };

        rebuild(0.5); animate();
    </script>
</body>

</html>
